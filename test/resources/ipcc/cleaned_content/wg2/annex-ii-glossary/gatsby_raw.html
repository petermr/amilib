                            <p class="Annex_Glossary_body" lang="en-US">The capacity of interconnected social, economic and ecological systems to cope with a hazardous<span class="bold_condensed" lang="en-GB"> </span>event, trend or disturbance, responding or reorganising in ways that maintain their essential function, identity and structure. <span class="condensed_italic">Resilience</span> is a positive attribute when it maintains capacity for <span class="condensed_italic">adaptation</span>, learning and/or <span class="condensed_italic">transformation </span>(Arctic Council, 2016). See also <span class="condensed_italic">Hazard</span>, <span class="condensed_italic">Risk</span> and <span class="condensed_italic">Vulnerability</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Resolution</p>
                            <p class="Annex_Glossary_body" lang="en-US">In <span class="condensed_italic">climate models</span>, this term refers to the physical distance (metres or degrees) between each point on the grid used to compute the equations. Temporal <span class="condensed_italic">resolution</span> refers to the time step or time elapsed between each <span class="condensed_italic">model</span> computation of the equations.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Respiration</p>
                            <p class="Annex_Glossary_body" lang="en-US">The process whereby living organisms convert organic matter to <span class="condensed_italic">carbon dioxide (CO</span><span class="subscript_italic-blue _idGenCharOverride-1">2</span><span class="condensed_italic">)</span>, releasing energy and consuming molecular oxygen.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Restoration</p>
                            <p class="Annex_Glossary_body" lang="en-US">In environmental context, <span class="condensed_italic">restoration</span> involves human interventions to assist the recovery of an <span class="condensed_italic">ecosystem</span> that has been previously degraded, damaged or destroyed.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Return period</p>
                            <p class="Annex_Glossary_body" lang="en-US">An estimate of the average time interval between occurrences of an event (e.g., flood or extreme rainfall) of (or below/above) a defined size or intensity.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Risk</p>
                            <p class="Annex_Glossary_body" lang="en-US">The potential for adverse consequences for human or ecological systems, recognising the diversity of values and objectives associated with such systems. In the context of <span class="condensed_italic">climate change</span>, <span class="condensed_italic">risks</span> can arise from potential <span class="condensed_italic">impacts</span> of <span class="condensed_italic">climate change</span> as well as human responses to <span class="condensed_italic">climate change</span>. Relevant adverse consequences include those on lives, <span class="condensed_italic">livelihoods</span>, <span class="condensed_italic">health</span> and <span class="condensed_italic">well-being</span>, economic, social and cultural assets and investments, <span class="condensed_italic">infrastructure</span>, services (including <span class="condensed_italic">ecosystem services</span>), <span class="condensed_italic">ecosystems</span> and species.</p>
                            <p class="Annex_Glossary_body" lang="en-US">In the context of <span class="condensed_italic">climate change impacts</span>, <span class="condensed_italic">risks</span> result from dynamic interactions between <span class="condensed_italic">climate</span>-related <span class="condensed_italic">hazards</span> with the <span class="condensed_italic">exposure</span> and <span class="condensed_italic">vulnerability</span> of the affected human or ecological system to the <span class="condensed_italic">hazards</span>. <span class="condensed_italic">Hazards</span>, <span class="condensed_italic">exposure</span> and <span class="condensed_italic">vulnerability</span> may each be subject to <span class="condensed_italic">uncertainty</span> in terms of magnitude and <span class="condensed_italic">likelihood</span> of occurrence, and each may change over time and space due to socio-economic changes and human decision-making.</p>
                            <p class="Annex_Glossary_body" lang="en-US">In the context of <span class="condensed_italic">climate change</span> responses, <span class="condensed_italic">risks</span> result from the potential for such responses not achieving the intended objective(s), or from potential <span class="condensed_italic">trade-offs</span> with, or negative side-effects on, other societal objectives, such as the <span class="condensed_italic">Sustainable Development Goals (SDGs)</span>. <span class="condensed_italic">Risks</span> can arise for example from <span class="condensed_italic">uncertainty</span> in the implementation, effectiveness or outcomes of <span class="condensed_italic">climate policy</span>, <span class="condensed_italic">climate</span>-related investments, technology development or adoption, and system <span class="condensed_italic">transitions</span>. See also <span class="condensed_italic">Hazard</span> and <span class="condensed_italic">Impacts</span>.</p>
                            <p class="Annex_Glossary_subhead" lang="en-US">Compound risks <!-- -->{<span class="glyphe-CambriaMath">&#8593;</span> Risk<!-- -->}</p>
                            <p class="Annex_Glossary_body-indent" lang="en-US">arise from the interaction of hazards, which may be characterised by single extreme events or multiple coincident or sequential events that interact with exposed systems or sectors.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Risk assessment</p>
                            <p class="Annex_Glossary_body" lang="en-US">The qualitative and/or quantitative scientific estimation of <span class="condensed_italic">risks</span>. See also <span class="condensed_italic">Risk management</span> and <span class="condensed_italic">Risk perception</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Risk management</p>
                            <p class="Annex_Glossary_body" lang="en-US">Plans, actions, strategies or <span class="condensed_italic">policies</span> to reduce the <span class="condensed_italic">likelihood</span> and/or magnitude of adverse potential consequences, based on assessed or perceived <span class="condensed_italic">risks</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Risk perception</p>
                            <p class="Annex_Glossary_body" lang="en-US">The subjective judgement that people make about the characteristics and severity of a <span class="condensed_italic">risk</span>. See also <span class="condensed_italic">Risk assessment</span> and <span class="condensed_italic">Risk management</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Risk transfer</p>
                            <p class="Annex_Glossary_body" lang="en-US">The process of formally or informally shifting the financial consequences of particular <span class="condensed_italic">risks</span> from one party to another whereby a household, community, enterprise or state authority will obtain resources from the other party after a <span class="condensed_italic">disaster</span> occurs, in exchange for ongoing or compensatory social or financial benefits provided to that other party.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Runoff</p>
                            <p class="Annex_Glossary_body" lang="en-US">The flow of water over the surface or through the subsurface, which typically originates from the part of liquid precipitation and/or snow/ice melt that does not evaporate, transpire or refreeze, and returns to water bodies.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Salt-water intrusion/encroachment</p>
                            <p class="Annex_Glossary_body" lang="en-US">Displacement of fresh surface water or groundwater by the advance of salt water due to its greater density. This usually occurs in coastal and estuarine areas due to decreasing <span class="condensed_italic">land</span>-based influence (e.g., from reduced <span class="condensed_italic">runoff</span> or <span class="condensed_italic">groundwater recharge</span>, or from excessive water withdrawals from aquifers) or increasing marine influence (e.g., relative <span class="condensed_italic">sea level rise</span>).</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Scenario</p>
                            <p class="Annex_Glossary_body" lang="en-US">A plausible description of how the future may develop based on a coherent and internally consistent set of assumptions about key driving forces (e.g., rate of technological change (TC), prices) and relationships. Note that <span class="condensed_italic">scenarios</span> are neither predictions nor forecasts, but are used to provide a view of the implications of developments and actions. See also <span class="condensed_italic">Pathways</span>.</p>
                            <p class="Annex_Glossary_subhead" lang="en-US">Baseline scenario</p>
                            <p class="Annex_Glossary_body-indent" lang="en-US">See <span class="condensed_italic">Reference scenario</span>.</p>
                            <p class="Annex_Glossary_subhead" lang="en-US">Concentration scenario</p>
                            <p class="Annex_Glossary_body-indent" lang="en-US">A plausible representation of the future development of atmospheric concentrations of substances that are radiatively active (e.g., <span class="condensed_italic">greenhouse gases (GHGs)</span>, <span class="condensed_italic">aerosols</span>, tropospheric <span class="condensed_italic">ozone</span>), plus human-induced <span class="condensed_italic">land-cover changes </span>that can be radiatively active via <span class="condensed_italic">albedo</span> changes, and often used as input to a <span class="condensed_italic">climate model </span>to compute <span class="condensed_italic">climate projections</span>.</p>
                            <p class="Annex_Glossary_subhead" lang="en-US">Emission scenario</p>
                            <p class="Annex_Glossary_body-indent" lang="en-US">A plausible representation of the future development of <span class="condensed_italic">emissions</span> of substances that are radiatively active (e.g., <span class="condensed_italic">greenhouse gases (GHGs)</span> or <span class="condensed_italic">aerosols</span>) based on a coherent and internally consistent set of assumptions about driving forces (such as demographic and socio-economic development, technological change, energy and <span class="condensed_italic">land use</span>) and their key relationships. <span class="condensed_italic">Concentration scenarios</span>, derived from <span class="condensed_italic">emission scenarios</span>, are often used as input to a <span class="condensed_italic">climate model</span> to compute <span class="condensed_italic">climate projections</span>.</p>
                            <p class="Annex_Glossary_subhead" lang="en-US">Reference scenario</p>
                            <p class="Annex_Glossary_body-indent" lang="en-US">The <span class="condensed_italic">scenario</span> used as starting or reference point for a comparison between two or more <span class="condensed_italic">scenarios</span>.</p>
                            <p class="Annex_Glossary_body-indent" lang="en-US">[Note 1: In many types of <span class="condensed_italic">climate change</span> research, <span class="condensed_italic">reference scenarios</span> reflect specific assumptions about patterns of socio-economic development and may represent futures that assume no <span class="condensed_italic">climate policies</span> or specified <span class="condensed_italic">climate policies</span>, for example those in place or planned at the time a study is carried out. <span class="condensed_italic">Reference scenarios</span> may also represent futures with limited or no <span class="condensed_italic">climate impacts</span> or <span class="condensed_italic">adaptation</span>, to serve as a point of comparison for futures with <span class="condensed_italic">impacts</span> and <span class="condensed_italic">adaptation</span>. These are also referred to as <span class="condensed_italic">baseline scenarios</span> in the literature.</p>
                            <p class="Annex_Glossary_body-indent" lang="en-US">Note 2: <span class="condensed_italic">Reference scenarios</span> can also be <span class="condensed_italic">climate policy</span> or <span class="condensed_italic">impact scenarios</span>, which in that case are taken as a point of comparison to explore the implications of other features, for example, of delay, technological options, <span class="condensed_italic">policy</span> design and strategy or to explore the effects of additional <span class="condensed_italic">impacts</span> and <span class="condensed_italic">adaptation</span> beyond those represented in the <span class="condensed_italic">reference scenario</span>.</p>
                            <p class="Annex_Glossary_body-indent" lang="en-US">Note 3: The term Business-As-Usual <span class="condensed_italic">scenario</span> has been used to describe a <span class="condensed_italic">scenario</span> that assumes no additional policies beyond those currently in place and that patterns of socio-economic development are consistent with recent trends. The term is now used less frequently than in the past.</p>
                            <p class="Annex_Glossary_body-indent" lang="en-US">Note 4: In <span class="condensed_italic">climate change</span>, <span class="condensed_italic">attribution</span> or <span class="condensed_italic">impact attribution</span> research <span class="condensed_italic">reference scenarios</span> may refer to counterfactual historical <span class="condensed_italic">scenarios</span> assuming no <span class="condensed_italic">anthropogenic greenhouse gas emissions</span> (<span class="condensed_italic">climate change attribution</span>) or no <span class="condensed_italic">climate change</span> (impact <span class="condensed_italic">attribution</span>)]</p>
                            <p class="Annex_Glossary_subhead" lang="en-US">Socio-economic scenario</p>
                            <p class="Annex_Glossary_body-indent" lang="en-US">A <span class="condensed_italic">scenario</span> that describes a possible future in terms of population, <span class="condensed_italic">gross domestic product (GDP)</span>, and other socio-economic factors relevant to understanding the implications of <span class="condensed_italic">climate change</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Sea ice</p>
                            <p class="Annex_Glossary_body" lang="en-US">Ice found at the sea surface that has originated from the freezing of seawater. <span class="condensed_italic">Sea ice</span> may be discontinuous pieces (ice floes) moved on the <span class="condensed_italic">ocean</span> surface by wind and currents (pack ice), or a motionless sheet attached to the <span class="condensed_italic">coast</span> (land-fast ice). <span class="condensed_italic">Sea ice</span> concentration is the fraction of the <span class="condensed_italic">ocean</span> covered by ice. <span class="condensed_italic">Sea ice</span> less than 1&#160;year old is called first-year ice. Perennial ice is <span class="condensed_italic">sea ice</span> that survives at least one summer. It may be subdivided into second-year ice and multi-year ice, where multi-year ice has survived at least two summers.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Sea level change (sea level rise/sea level fall)</p>
                            <p class="Annex_Glossary_body" lang="en-US">Change to the height of sea level, both globally and locally (relative<span class="condensed_italic"> sea level change</span>) (at seasonal, annual or longer time scales) due to (1) a change in <span class="condensed_italic">ocean</span> volume as a result of a change in the mass of water in the <span class="condensed_italic">ocean</span> (e.g., due to melt of <span class="condensed_italic">glaciers</span> and <span class="condensed_italic">ice sheets</span>), (2) changes in <span class="condensed_italic">ocean</span> volume as a result of changes in <span class="condensed_italic">ocean</span> water density (e.g., expansion under warmer conditions), (3) changes in the shape of the <span class="condensed_italic">ocean</span> basins and changes in the Earth&#8217;s gravitational and rotational fields and (4) local subsidence or uplift of the <span class="condensed_italic">land</span>. <span class="condensed_italic">Global mean sea level change</span> resulting from change in the mass of the <span class="condensed_italic">ocean</span> is called barystatic. The amount of barystatic <span class="condensed_italic">sea level change</span> due to the addition or removal of a mass of water is called its sea level equivalent (SLE). <span class="condensed_italic">Sea level changes</span>, both globally and locally, resulting from changes in water density are called steric. Density changes induced by temperature changes only are called thermosteric, while density changes induced by salinity changes are called halosteric. Barystatic and steric <span class="condensed_italic">sea level changes</span> do not include the effect of changes in the shape of <span class="condensed_italic">ocean</span> basins induced by the change in the <span class="condensed_italic">ocean</span> mass and its distribution. See also <span class="condensed_italic">Extreme sea level (ESL)</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Sea surface temperature (SST)</p>
                            <p class="Annex_Glossary_body" lang="en-US">The subsurface bulk temperature in the top few metres of the <span class="condensed_italic">ocean</span>, measured by ships, buoys and drifters. From ships, <span class="condensed_italic">measurements</span> of water samples in buckets were mostly switched in the 1940s to samples from engine intake water. Satellite <span class="condensed_italic">measurements</span> of skin temperature (uppermost layer; a fraction of a millimetre thick) in the infrared or the top centimetre or so in the microwave are also used, but must be adjusted to be compatible with the bulk temperature.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Semi-arid zone</p>
                            <p class="Annex_Glossary_body" lang="en-US">Areas where vegetation growth is constrained by limited water availability, often with short growing seasons and high interannual variation in <span class="condensed_italic">primary production</span>. Annual precipitation ranges from 300 to 800&#160;mm, depending on the occurrence of summer and winter rains.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Sendai Framework for Disaster Risk Reduction</p>
                            <p class="Annex_Glossary_body" lang="en-US">The Sendai Framework for Disaster Risk Reduction 2015&#8211;2030 outlines seven clear targets and four priorities for action to prevent new, and to reduce existing, <span class="condensed_italic">disaster risks</span>. The voluntary, non-binding agreement recognises that the State has the primary role to reduce <span class="condensed_italic">disaster risk</span> but that responsibility should be shared with other stakeholders, including local government and the private sector. Its aim is to achieve &#8216;substantial reduction of <span class="condensed_italic">disaster risk</span> and losses in lives, <span class="condensed_italic">livelihoods</span> and <span class="condensed_italic">health</span> and in the economic, physical, social, cultural and environmental assets of persons, businesses, communities and countries&#8217;.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Sensitivity</p>
                            <p class="Annex_Glossary_body" lang="en-US">The degree to which a system or species is affected, either adversely or beneficially, by <span class="condensed_italic">climate variability</span> or <span class="condensed_italic">change</span>. The effect may be direct (e.g., a change in crop yield in response to a change in the mean, range, or variability of temperature) or indirect (e.g., damages caused by an increase in the frequency of coastal flooding due to <span class="condensed_italic">sea level rise</span>).</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Sequestration</p>
                            <p class="Annex_Glossary_body" lang="en-US">The process of storing carbon in a carbon pool. See also <span class="condensed_italic">Sink</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Settlements</p>
                            <p class="Annex_Glossary_body" lang="en-US">Places of concentrated human habitation. <span class="condensed_italic">Settlements</span> can range from isolated rural villages to <span class="condensed_italic">urban regions</span> with significant global influence. They can include formally planned and informal or illegal habitation and related <span class="condensed_italic">infrastructure</span>. See also <span class="condensed_italic">Cities</span>,<span class="condensed_italic"> Urban </span>and <span class="condensed_italic">Urbanisation</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Shared Socio-economic Pathways (SSPs)</p>
                            <p class="Annex_Glossary_body" lang="en-US">See <span class="condensed_italic">Pathways</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Shelf seas</p>
                            <p class="Annex_Glossary_body" lang="en-US">Relatively shallow water covering the shelf of continents or around islands. The limit of <span class="condensed_italic">shelf seas</span> is conventionally considered as 200&#160;m water depth at the continental shelf edge, where there is usually a steep slope to the deep <span class="condensed_italic">ocean</span> floor. During glacial periods, most <span class="condensed_italic">shelf seas</span> are lost since they become <span class="condensed_italic">land</span> as the build-up of <span class="condensed_italic">ice sheets</span> caused a decrease of global sea level.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Sink</p>
                            <p class="Annex_Glossary_body" lang="en-US">Any process, activity or mechanism which removes a <span class="condensed_italic">greenhouse gas</span>, an <span class="condensed_italic">aerosol</span> or a <span class="condensed_italic">precursor</span> of a <span class="condensed_italic">greenhouse gas</span> from the <span class="condensed_italic">atmosphere</span> (UNFCCC Article 1.8 (UNFCCC, 1992)). See also <span class="condensed_italic">Sequestration</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Small Island Developing States (SIDS)</p>
                            <p class="Annex_Glossary_body" lang="en-US"><span class="condensed_italic">Small Island Developing States (SIDS)</span>, as recognised by the United Nations Office of the High Representative for the Least Developed Countries, Landlocked Developing Countries and Small Island Developing States (OHRLLS), are a distinct group of <span class="condensed_italic">developing countries</span> facing specific social, economic and environmental vulnerabilities (UN-OHRLLS, 2011). They were recognised as a special case for both their environment and their development at the Rio Earth Summit in Brazil in 1992. Fifty-eight countries and territories are presently classified as SIDS by the UN OHRLLS, with 38 being UN member states and 20 being Non-UN Members or Associate Members of the Regional Commissions (UN-OHRLLS, 2018).</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Snow cover extent</p>
                            <p class="Annex_Glossary_body" lang="en-US">The areal extent of snow-covered ground.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Snow water equivalent (SWE)</p>
                            <p class="Annex_Glossary_body" lang="en-US">The depth of liquid water that would result if a mass of snow melted completely.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Social inclusion</p>
                            <p class="Annex_Glossary_body" lang="en-US">A process of improving the terms of participation in society, particularly for people who are disadvantaged, through enhancing opportunities, access to resources and respect for rights (UN, DESA 2016).</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Social infrastructure</p>
                            <p class="Annex_Glossary_body" lang="en-US">See <span class="condensed_italic">Infrastructure</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Social justice</p>
                            <p class="Annex_Glossary_body" lang="en-US">See <span class="condensed_italic">Justice</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Social learning</p>
                            <p class="Annex_Glossary_body" lang="en-US">A process of social interaction through which people learn new behaviours, capacities, values and attitudes.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Social protection</p>
                            <p class="Annex_Glossary_body" lang="en-US">In the context of development aid and <span class="condensed_italic">climate policy</span>, <span class="condensed_italic">social protection</span> usually describes public and private initiatives that provide income or consumption transfers to the poor, protect the vulnerable against <span class="condensed_italic">livelihood risks</span> and enhance the social status and rights of the marginalised, with the overall objective of reducing the economic and social <span class="condensed_italic">vulnerability</span> of poor, vulnerable and marginalised groups (Devereux and Sabates-Wheeler, 2004). In other contexts, <span class="condensed_italic">social protection</span> may be used synonymously with social <span class="condensed_italic">policy</span> and can be described as all public and private initiatives that provide access to services, such as <span class="condensed_italic">health</span>, education or housing, or income and consumption transfers to people. <span class="condensed_italic">Social protection policies</span> protect the poor and vulnerable against <span class="condensed_italic">livelihood risks</span> and enhance the social status and rights of the marginalised, as well as prevent vulnerable people from falling into <span class="condensed_italic">poverty</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Social-ecological system</p>
                            <p class="Annex_Glossary_body" lang="en-US">An integrated system that includes human societies and <span class="condensed_italic">ecosystems</span>, in which humans are part of nature. The functions of such a system arise from the interactions and interdependence of the social and ecological subsystems. The system&#8217;s structure is characterised by reciprocal feedbacks, emphasising that humans must be seen as a part of, not apart from, nature (Arctic Council, 2016; Berkes and Folke, 1998).</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Societal (social) transformation</p>
                            <p class="Annex_Glossary_body" lang="en-US">See <span class="condensed_italic">Transformation</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Socio-economic scenario</p>
                            <p class="Annex_Glossary_body" lang="en-US">See <span class="condensed_italic">Scenarios</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Socio-technical transitions</p>
                            <p class="Annex_Glossary_body" lang="en-US">Where technological change is associated with social systems and the two are inextricably linked.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Soil erosion</p>
                            <p class="Annex_Glossary_body" lang="en-US">The displacement of the soil by the action of water or wind. <span class="condensed_italic">Soil erosion</span> is a major process of <span class="condensed_italic">land degradation</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Soil moisture</p>
                            <p class="Annex_Glossary_body" lang="en-US">Water stored in the soil in liquid or frozen form. Root-zone <span class="condensed_italic">soil moisture</span> is of most relevance for plant activity.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Soil organic carbon</p>
                            <p class="Annex_Glossary_body" lang="en-US">Carbon contained in <span class="condensed_italic">soil organic matter</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Soil organic matter</p>
                            <p class="Annex_Glossary_body" lang="en-US">The organic component of soil, comprising plant and animal residue at various stages of decomposition, and soil organisms.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Solar radiation modification (SRM)</p>
                            <p class="Annex_Glossary_body" lang="en-US">Refers to a range of radiation modification measures not related to <span class="condensed_italic">greenhouse gas (GHG) mitigation</span> that seek to limit <span class="condensed_italic">global warming</span>. Most methods involve reducing the amount of incoming solar radiation reaching the surface, but others also act on the longwave radiation budget by reducing optical thickness and cloud lifetime.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Solution space</p>
                            <p class="Annex_Glossary_body" lang="en-US">The set of biophysical, cultural, socio-economic and political-institutional dimensions within which opportunities and constraints determine why, how, when and who acts to reduce <span class="condensed_italic">climate risks</span>. Within these dimensions, there are &#8216;hard&#8217; (unsurpassable) limits and &#8216;soft&#8217; (surpassable) limits. The boundaries of the <span class="condensed_italic">solution space</span> are path dependent, contested and in constant flux (Haasnoot et. al. 2020).</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Source</p>
                            <p class="Annex_Glossary_body" lang="en-US">Any process or activity which releases a <span class="condensed_italic">greenhouse gas</span>, an <span class="condensed_italic">aerosol</span> or a <span class="condensed_italic">precursor</span> of a <span class="condensed_italic">greenhouse gas</span> into the <span class="condensed_italic">atmosphere</span> (UNFCCC Article 1.9). See also <span class="condensed_italic">Sink</span> and <span class="condensed_italic">Sequestration</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Southern Ocean</p>
                            <p class="Annex_Glossary_body" lang="en-US">The <span class="condensed_italic">ocean region</span> encircling Antarctica&#160;that connects the Atlantic, Indian and Pacific Oceans together, allowing inter-<span class="condensed_italic">ocean</span> exchange. This <span class="condensed_italic">region</span> is the main <span class="condensed_italic">source</span> of much of the deep water of the world&#8217;s <span class="condensed_italic">ocean</span> and also provides the primary return <span class="condensed_italic">pathway</span> for this deep water to the surface (Marshall and Speer, 2012; Toggweiler and Samuels, 1995). The drawing up of deep waters and the subsequent transport into the <span class="condensed_italic">ocean</span> interior has major consequences for the global heat, nutrient and carbon balances, as well as the Antarctic <span class="condensed_italic">cryosphere</span> and marine <span class="condensed_italic">ecosystems</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Spatial and temporal scales</p>
                            <p class="Annex_Glossary_body" lang="en-US"><span class="condensed_italic">Climate</span> may vary on a large range of <span class="condensed_italic">spatial and temporal scales</span>. <span class="condensed_italic">Spatial scales</span> may range from local (less than 100,000&#160;km<span class="superscript _idGenCharOverride-1">2</span>), through regional (100,000 to 10&#160;million km<span class="superscript _idGenCharOverride-1">2</span>) to continental (10&#8211;100&#160;million km<span class="superscript _idGenCharOverride-1">2</span>). <span class="condensed_italic">Temporal scales</span> may range from seasonal to geological (up to hundreds of millions of years).</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Standard</p>
                            <p class="Annex_Glossary_body" lang="en-US">Set of rules or codes mandating or defining product performance (e.g., grades, dimensions, characteristics, test methods and rules for use). Product, technology or performance <span class="condensed_italic">standards</span> establish minimum requirements for affected products or technologies. <span class="condensed_italic">Standards</span> impose reductions in <span class="condensed_italic">greenhouse gas (GHG) emissions</span> associated with the manufacture or use of the products and/or application of the technology.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Storm surge</p>
                            <p class="Annex_Glossary_body" lang="en-US">The temporary increase, at a particular locality, in the height of the sea due to extreme meteorological conditions (low atmospheric pressure and/or strong winds). The <span class="condensed_italic">storm surge</span> is defined as being the excess above the level expected from the tidal variation alone at that time and place. See also <span class="condensed_italic">Extreme sea level</span> and <span class="condensed_italic">Sea level change (sea level rise/sea level fall)</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Storyline</p>
                            <p class="Annex_Glossary_body" lang="en-US">A way of making sense of a situation or a series of events through the construction of a set of explanatory elements. Usually, it is built on logical or causal reasoning. In <span class="condensed_italic">climate </span>research, the term <span class="condensed_italic">storyline</span> is used both in connection to <span class="condensed_italic">scenarios </span>as related to a future trajectory of the <span class="condensed_italic">climate</span> and <span class="condensed_italic">human systems</span> and to a weather or <span class="condensed_italic">climate</span> event. In this context, <span class="condensed_italic">storylines</span> can be used to describe plural, conditional possible futures or explanations of a current situation, in contrast to single, definitive futures or explanations.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Stranded assets</p>
                            <p class="Annex_Glossary_body" lang="en-US">Assets exposed to devaluations or conversion to &#8216;liabilities&#8217; because of unanticipated changes in their initially expected revenues due to innovations and/or evolutions of the business context, including changes in public <span class="condensed_italic">regulations</span> at the domestic and international levels.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Stratification</p>
                            <p class="Annex_Glossary_body" lang="en-US">Process of forming of layers of (<span class="condensed_italic">ocean</span>) water with different properties such as salinity, density and temperature that act as barriers to water mixing. The strengthening of near-surface <span class="condensed_italic">stratification</span> generally results in warmer surface waters, decreased oxygen levels in deeper water and intensification of <span class="condensed_italic">ocean acidification (OA)</span> in the upper <span class="condensed_italic">ocean</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Streamflow</p>
                            <p class="Annex_Glossary_body" lang="en-US">Water flow within a river channel, for example, expressed in m<span class="superscript _idGenCharOverride-1">3</span> s<span class="superscript _idGenCharOverride-1">&#8722;1</span>. A synonym for river discharge.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Stressors</p>
                            <p class="Annex_Glossary_body" lang="en-US">Events and trends, often not <span class="condensed_italic">climate</span>-related, that have an important effect on the system exposed and can increase <span class="condensed_italic">vulnerability</span> to <span class="condensed_italic">climate</span>-related <span class="condensed_italic">risk</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Sustainability</p>
                            <p class="Annex_Glossary_body" lang="en-US">Involves ensuring the persistence of <span class="condensed_italic">natural</span> and <span class="condensed_italic">human systems</span>, implying the continuous functioning of <span class="condensed_italic">ecosystems</span>, the conservation of high <span class="condensed_italic">biodiversity</span>, the recycling of natural resources and, in the human sector, successful application of <span class="condensed_italic">justice</span> and <span class="condensed_italic">equity</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Sustainable development (SD)</p>
                            <p class="Annex_Glossary_body" lang="en-US">Development that meets the needs of the present without compromising the ability of future generations to meet their own needs (WCED, 1987) and balances social, economic and environmental concerns. See also <span class="condensed_italic">Development pathways</span> and <span class="condensed_italic">Sustainable Development Goals (SDGs)</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Sustainable Development Goals (SDGs)</p>
                            <p class="Annex_Glossary_body" lang="en-US">The 17 global goals for development for all countries established by the United Nations through a participatory process and elaborated in the 2030 Agenda for Sustainable Development, including ending <span class="condensed_italic">poverty</span> and hunger; ensuring <span class="condensed_italic">health</span> and <span class="condensed_italic">well-being</span>, education, gender <span class="condensed_italic">equality</span>, clean water and energy, and decent work; building and ensuring resilient and sustainable <span class="condensed_italic">infrastructure</span>, <span class="condensed_italic">cities</span> and consumption; reducing <span class="condensed_italic">inequalities</span>; protecting land and water <span class="condensed_italic">ecosystems</span>; promoting peace, <span class="condensed_italic">justice</span> and partnerships; and taking urgent action on <span class="condensed_italic">climate change</span>. See also <span class="condensed_italic">Development pathways</span> and <span class="condensed_italic">Sustainable development</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Sustainable development pathways (SDPs)</p>
                            <p class="Annex_Glossary_body" lang="en-US">See<span class="condensed_italic"> Pathways</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Sustainable forest management</p>
                            <p class="Annex_Glossary_body" lang="en-US">The stewardship and use of <span class="condensed_italic">forests</span> and <span class="condensed_italic">forest</span> lands in a way, and at a rate, that maintains their <span class="condensed_italic">biodiversity</span>, productivity, regeneration capacity, vitality and potential to fulfil, now and in the future, relevant ecological, economic and social functions, at local, national and global levels, and that does not cause damage to other <span class="condensed_italic">ecosystems</span> (Forest Europe, 1993).</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Sustainable land management</p>
                            <p class="Annex_Glossary_body" lang="en-US">The stewardship and use of <span class="condensed_italic">land</span> resources, including soils, water, animals and plants, to meet changing human needs, while simultaneously ensuring the long-term productive potential of these resources and the maintenance of their environmental functions (adapted from WOCAT, undated).</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Sympagic</p>
                            <p class="Annex_Glossary_body" lang="en-US">Organisms and habitats related to the <span class="condensed_italic">sea ice</span>, analogous to <span class="condensed_italic">pelagic</span> (water column) or <span class="condensed_italic">benthic</span> (sea floor).</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Teleconnection</p>
                            <p class="Annex_Glossary_body" lang="en-US">Association between <span class="condensed_italic">climate</span> variables at widely separated, geographically fixed locations related to each other through physical processes and oceanic and/or atmospheric dynamical pathways. <span class="condensed_italic">Teleconnections</span> can be caused by several <span class="condensed_italic">climate</span> phenomena, such as Rossby wave-trains, mid-latitude jet and storm track displacements, fluctuations of the Atlantic Meridional Overturning Circulation, fluctuations of the Walker circulation, etc. They can be initiated by modes of <span class="condensed_italic">climate variability</span>, thus providing the development of remote <span class="condensed_italic">climate anomalies</span> at various temporal lags.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Temperature overshoot</p>
                            <p class="Annex_Glossary_body" lang="en-US">Exceedance of a specified <span class="condensed_italic">global warming</span> level, followed by a decline to or below that level during a specified period of time (e.g., before 2100). Sometimes the magnitude and <span class="condensed_italic">likelihood</span> of the overshoot is also characterized. The overshoot duration can vary from one <span class="condensed_italic">pathway</span> to the next but in most <span class="condensed_italic">overshoot pathways</span> in the literature and referred to as <span class="condensed_italic">overshoot pathways</span> in the AR6, the overshoot occurs over a period of at least one and up to several decades. See also <span class="condensed_italic">Pathways</span></p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Tier</p>
                            <p class="Annex_Glossary_body" lang="en-US">In the context of the IPCC Guidelines for National Greenhouse Gas Inventories, a tier represents a level of methodological complexity. Usually three tiers are provided. Tier 1 is the basic method, Tier 2 intermediate and Tier 3 most demanding in terms of complexity and data requirements. Tiers 2 and 3 are sometimes referred to as higher-tier methods and are generally considered to be more accurate (IPCC, 2019).</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Tipping element</p>
                            <p class="Annex_Glossary_body" lang="en-US">A component of the Earth system that is susceptible to a <span class="condensed_italic">tipping point</span>. See also <span class="condensed_italic">Abrupt climate change</span> and <span class="condensed_italic">Tipping point</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Tipping point</p>
                            <p class="Annex_Glossary_body" lang="en-US">A critical threshold beyond which a system reorganises, often abruptly and/or irreversibly. See also <span class="condensed_italic">Abrupt climate change</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Trade-off</p>
                            <p class="Annex_Glossary_body" lang="en-US">A competition between different objectives within a decision situation, where pursuing one objective will diminish achievement of other objective(s). A <span class="condensed_italic">trade-off</span> exists when a <span class="condensed_italic">policy</span> or measure aimed at one objective (e.g., reducing <span class="condensed_italic">GHG emissions</span>) reduces outcomes for other objective(s) (e.g., <span class="condensed_italic">biodiversity</span> conservation, <span class="condensed_italic">energy security</span>) due to adverse side effects, thereby potentially reducing the net benefit to society or the environment. See also <span class="condensed_italic">Adverse side-effect</span> and <span class="condensed_italic">Co-benefit</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Transformation</p>
                            <p class="Annex_Glossary_body" lang="en-US">A change in the fundamental attributes of <span class="condensed_italic">natural</span> and <span class="condensed_italic">human systems</span>.</p>
                            <p class="Annex_Glossary_subhead" lang="en-US">Deliberate transformations</p>
                            <p class="Annex_Glossary_body-indent" lang="en-US">A profound shift towards <span class="condensed_italic">sustainability</span>, envisioned and intended by at least some societal actors, facilitated by changes in individual and collective values and behaviours, and a fairer balance of political, cultural and institutional power in society.</p>
                            <p class="Annex_Glossary_subhead" lang="en-US">Societal (social) transformations</p>
                            <p class="Annex_Glossary_body-indent" lang="en-US">A change in the fundamental attributes of <span class="condensed_italic">human systems</span> advanced by societal actors</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Transformational adaptation</p>
                            <p class="Annex_Glossary_body" lang="en-US">See <span class="condensed_italic">Adaptation</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Transformative change</p>
                            <p class="Annex_Glossary_body" lang="en-US">A system-wide change that requires more than technological change through consideration of social and economic factors that, with technology, can bring about rapid change at scale.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Transition</p>
                            <p class="Annex_Glossary_body" lang="en-US">The process of changing from one state or condition to another in a given period of time. <span class="condensed_italic">Transition</span> can occur in individuals, firms, <span class="condensed_italic">cities</span>, <span class="condensed_italic">regions</span> and nations, and can be based on incremental or <span class="condensed_italic">transformative change</span>.</p>
                            <p class="Annex_Glossary_subhead" lang="en-US">Just transitions</p>
                            <p class="Annex_Glossary_body-indent" lang="en-US">A set of principles, processes and practices that aim to ensure that no people, workers, places, sectors, countries or <span class="condensed_italic">regions</span> are left behind in the transition from a high-carbon to a low-carbon economy. It stresses the need for targeted and proactive measures from governments, agencies and authorities to ensure that any negative social, environmental or economic <span class="condensed_italic">impacts</span> of economy-wide transitions are minimised, while benefits are maximised for those disproportionally affected. Key principles of <span class="condensed_italic">just transitions</span> include: respect and dignity for vulnerable groups; <span class="condensed_italic">fairness</span> in energy access and use, social dialogue and democratic consultation with relevant stakeholders; the creation of decent jobs; <span class="condensed_italic">social protection</span>; and rights at work. <span class="condensed_italic">Just transitions</span> could include <span class="condensed_italic">fairness</span> in energy, <span class="condensed_italic">land use</span> and <span class="condensed_italic">climate</span> planning and decision-making processes; economic diversification based on low-carbon investments; realistic training/retraining programs that lead to decent work; gender-specific <span class="condensed_italic">policies</span> that promote equitable outcomes; the fostering of international cooperation and coordinated multilateral actions; and the eradication of <span class="condensed_italic">poverty</span>. Lastly, <span class="condensed_italic">just transitions</span> may embody the redressing of past harms and perceived injustices (ILO 2015; UNFCCC 2016).</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Tree line</p>
                            <p class="Annex_Glossary_body" lang="en-US">The upper limit of tree growth in mountains or at high latitudes. It is more elevated or more poleward than the <span class="condensed_italic">forest line</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Tropical cyclone</p>
                            <p class="Annex_Glossary_body" lang="en-US">The general term for a strong, cyclonic-scale disturbance that originates over tropical <span class="condensed_italic">oceans</span>. Distinguished from weaker systems (often named tropical disturbances or depressions) by exceeding a threshold wind speed. A tropical storm is a <span class="condensed_italic">tropical cyclone</span> with one-minute average surface winds between 18 and 32&#160;m s<span class="superscript _idGenCharOverride-1">&#8722;1</span>. Beyond 32&#160;m s<span class="superscript _idGenCharOverride-1">&#8722;1</span>, a <span class="condensed_italic">tropical cyclone</span> is called a hurricane, typhoon or cyclone, depending on geographic location.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Tsunami</p>
                            <p class="Annex_Glossary_body" lang="en-US">A wave, or train of waves, produced by a disturbance such as a submarine earthquake displacing the sea floor, a landslide, a volcanic eruption or an asteroid impact.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Tundra</p>
                            <p class="Annex_Glossary_body" lang="en-US">A treeless <span class="condensed_italic">biome</span> characteristic of polar and alpine <span class="condensed_italic">regions</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Uncertainty</p>
                            <p class="Annex_Glossary_body" lang="en-US">A state of incomplete knowledge that can result from a lack of information or from disagreement about what is known or even knowable. It may have many types of sources, from imprecision in the data to ambiguously defined concepts or terminology, incomplete understanding of critical processes or uncertain <span class="condensed_italic">projections</span> of <span class="condensed_italic">human behaviour</span>. <span class="condensed_italic">Uncertainty</span> can therefore be represented by quantitative measures (e.g., a probability density function) or by qualitative statements (e.g., reflecting the judgement of a team of experts) (Moss and Schneider, 2000; IPCC, 2004; Mastrandrea et&#160;al., 2010). See also <span class="condensed_italic">Agreement</span>,<span class="condensed_italic"> Confidence</span> and <span class="condensed_italic">Likelihood</span>.</p>
                            <p class="Annex_Glossary_subhead" lang="en-US">Deep uncertainty</p>
                            <p class="Annex_Glossary_body-indent" lang="en-US">A situation of <span class="condensed_italic">deep uncertainty</span> exists when experts or stakeholders do not know or cannot agree on: (1) appropriate conceptual models that describe relationships among key driving forces in a system, (2) the probability distributions used to represent <span class="condensed_italic">uncertainty</span> about key variables and parameters and/or (3) how to weigh and value desirable alternative outcomes (Lempert et&#160;al., 2003).</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">United Nations Framework Convention on Climate Change (UNFCCC)</p>
                            <p class="Annex_Glossary_body" lang="en-US">The UNFCCC was adopted in May 1992 and opened for signature at the 1992 Earth Summit in Rio de Janeiro. It entered into force in March 1994 and as of May 2018 had 197 Parties (196 States and the European Union). The Convention&#8217;s ultimate objective is the &#8216;stabilisation of greenhouse gas concentrations in the atmosphere at a level that would prevent dangerous anthropogenic interference with the climate system&#8217;. The provisions of the Convention are pursued and implemented by two treaties: the Kyoto Protocol and the Paris Agreement.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Uptake</p>
                            <p class="Annex_Glossary_body" lang="en-US">The transfer of substances (such as carbon) or energy (e.g., heat) from one compartment of a system to another; for example, in the Earth system from the <span class="condensed_italic">atmosphere</span> to the <span class="condensed_italic">ocean</span> or to the <span class="condensed_italic">land</span>. See also <span class="condensed_italic">Sequestration</span>, <span class="condensed_italic">Sink</span> and <span class="condensed_italic">Source</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Upwelling region</p>
                            <p class="Annex_Glossary_body" lang="en-US">A region of an <span class="condensed_italic">ocean</span> where cold, typically nutrient-rich waters well up from the deep <span class="condensed_italic">ocean</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Urban</p>
                            <p class="Annex_Glossary_body" lang="en-US">The categorisation of areas as &#8220;<span class="condensed_italic">urban</span>&#8221; by government statistical departments is generally based either on population size, population density, economic base, provision of services, or some combination of the above. <span class="condensed_italic">Urban systems</span> are networks and nodes of intensive interaction and exchange including capital, culture, and material objects. <span class="condensed_italic">Urban</span> areas exist on a continuum with rural areas and tend to exhibit higher levels of complexity, higher populations and population density, intensity of capital investment, and a preponderance of secondary (processing) and tertiary (service) sector industries. The extent and intensity of these features varies significantly within and between <span class="condensed_italic">urban</span> areas. <span class="condensed_italic">Urban</span> places and systems are open, with much movement and exchange between more rural areas as well as other <span class="condensed_italic">urban regions</span>. <span class="condensed_italic">Urban</span> areas can be globally interconnected, facilitating rapid flows between them, of capital investment, of ideas and culture, human migration, and disease. See also <span class="condensed_italic">City</span>, <span class="condensed_italic">City region</span>,<span class="condensed_italic"> Urbanisation </span>and<span class="condensed_italic"> Urban systems</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Urban and peri-urban agriculture</p>
                            <p class="Annex_Glossary_body" lang="en-US">The cultivation of crops and rearing of animals for food and other uses within and surrounding the boundaries of <span class="condensed_italic">cities</span>, including fisheries and forestry (EPRS, 2014).</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Urban heat island (UHI)</p>
                            <p class="Annex_Glossary_body" lang="en-US">The relative warmth of a <span class="condensed_italic">city</span> compared with surrounding rural areas, associated with heat trapping due to <span class="condensed_italic">land use</span>, the configuration and design of the built environment, including street layout and building size, the heat-absorbing properties of <span class="condensed_italic">urban</span> building materials, reduced ventilation, reduced greenery and water features, and domestic and industrial heat <span class="condensed_italic">emissions</span> generated directly from human activities.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Urbanisation</p>
                            <p class="Annex_Glossary_body" lang="en-US"><span class="condensed_italic">Urbanisation</span> is a multi-dimensional process that involves at least three simultaneous changes: (1) <span class="condensed_italic">land-use change</span>: transformation of formerly rural <span class="condensed_italic">settlements</span> or natural land into <span class="condensed_italic">urban settlements</span>, (2) demographic change: a shift in the spatial distribution of a population from rural to <span class="condensed_italic">urban</span> areas and (3) <span class="condensed_italic">infrastructure</span> change: an increase in provision of <span class="condensed_italic">infrastructure</span> services including electricity, sanitation, etc. <span class="condensed_italic">Urbanisation</span> often includes changes in lifestyle, culture and behaviour, and thus alters the demographic, economic and social structure of both <span class="condensed_italic">urban</span> and rural areas (based on World Urbanization Prospects 2018; IPCC 2014; Stokes and Seto, 2019). See also <span class="condensed_italic">Settlements</span>,<span class="condensed_italic"> Urban and Urban systems</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Urban systems</p>
                            <p class="Annex_Glossary_body" lang="en-US"><span class="condensed_italic">Urban systems</span> refer to two interconnected systems-- first, the comprehensive collections of <span class="condensed_italic">city</span> elements with multiple dimensions and characteristics: a) encompass physical, built, socio-economic-technical, political, and ecological subsystems; b) integrate social agent/constituency/processes with physical structure and processes; and c) exist within broader <span class="condensed_italic">spatial and temporal scales</span> and <span class="condensed_italic">governance</span> and institutional contexts; and second, the global system of <span class="condensed_italic">cities</span> and towns. See also <span class="condensed_italic">City region</span>, and <span class="condensed_italic">Urban</span></p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Values and beliefs</p>
                            <p class="Annex_Glossary_body" lang="en-US">Fundamental attitudes about what is important, good and right; strongly held principles or qualities intrinsically valuable or desirable, often enshrined in laws, traditions and religions. Examples include <span class="condensed_italic">human rights</span>, subsistence and equitable distribution of costs and benefits of <span class="condensed_italic">climate policies</span> (Hulme, 2009, 2018; Nakashima et&#160;al., 2012; UNFCCC, 1992; UN Universal Declaration of Human Rights, 1948).</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Vector-borne disease</p>
                            <p class="Annex_Glossary_body" lang="en-US">Illnesses caused by parasites, viruses and bacteria that are transmitted by various vectors (e.g., mosquitoes, sandflies, triatomine bugs, blackflies, ticks, tsetse flies, mites, snails and lice) (UNEP 2018).</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Ventilation (ocean)</p>
                            <p class="Annex_Glossary_body" lang="en-US">The exchange of <span class="condensed_italic">ocean</span> properties with the atmospheric surface layer such that property concentrations are brought closer to equilibrium values with the <span class="condensed_italic">atmosphere</span> (AMS, 2000), and the processes that propagate these properties into the <span class="condensed_italic">ocean</span> interior.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Vulnerability</p>
                            <p class="Annex_Glossary_body" lang="en-US">The propensity or predisposition to be adversely affected. <span class="condensed_italic">Vulnerability</span> encompasses a variety of concepts and elements, including <span class="condensed_italic">sensitivity</span> or susceptibility to harm and lack of capacity to cope and adapt. See also <span class="condensed_italic">Exposure</span>,<span class="condensed_italic"> Hazard</span> and <span class="condensed_italic">Risk</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Vulnerability index</p>
                            <p class="Annex_Glossary_body" lang="en-US">A metric characterising the <span class="condensed_italic">vulnerability</span> of a system. A <span class="condensed_italic">climate vulnerability index</span> is typically derived by combining, with or without weighting, several indicators assumed to represent <span class="condensed_italic">vulnerability</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Water-borne diseases</p>
                            <p class="Annex_Glossary_body" lang="en-US">Illnesses transmitted through contact with, or consumption of, unsafe or contaminated water (UNEP 2018).</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Water security</p>
                            <p class="Annex_Glossary_body" lang="en-US">The capacity of a population to safeguard sustainable access to adequate quantities of acceptable-quality water for sustaining <span class="condensed_italic">livelihoods</span>, human <span class="condensed_italic">well-being</span> and socio-economic development, for ensuring protection against water-borne pollution and water-related <span class="condensed_italic">disasters</span> and for preserving <span class="condensed_italic">ecosystems</span> in a climate of peace and political stability (UN-Water, 2013).</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Water-use efficiency</p>
                            <p class="Annex_Glossary_body" lang="en-US">Carbon gain by <span class="condensed_italic">photosynthesis</span> per unit of water lost by <span class="condensed_italic">evapotranspiration</span>. It can be expressed on a short-term basis as the ratio of photosynthetic carbon gain per unit transpirational water loss, or on a seasonal basis as the ratio of <span class="condensed_italic">net primary production</span> or agricultural yield to the amount of water used.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Weathering</p>
                            <p class="Annex_Glossary_body" lang="en-US">The gradual removal of atmospheric CO<span class="subscript _idGenCharOverride-1">2</span> through dissolution of silicate and carbonate rocks. <span class="condensed_italic">Weathering</span> may involve physical processes (mechanical <span class="condensed_italic">weathering</span>) or chemical activity (chemical <span class="condensed_italic">weathering</span>).</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Well-being</p>
                            <p class="Annex_Glossary_body" lang="en-US">A state of existence that fulfils various human needs, including material living conditions and quality of life, as well as the ability to pursue one&#8217;s goals, to thrive and to feel satisfied with one&#8217;s life. <span class="condensed_italic">Ecosystem well-being</span> refers to the ability of <span class="condensed_italic">ecosystems</span> to maintain their diversity and quality.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Wetland</p>
                            <p class="Annex_Glossary_body" lang="en-US">Land that is covered or saturated by water for all or part of the year (e.g., peatland).</p>
