                            <p class="Annex_Glossary_definitions" lang="en-US">Development pathways</p>
                            <p class="Annex_Glossary_body" lang="en-US">See<span class="bold_condensed" lang="en-GB"> </span><span class="condensed_italic">Pathways</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Diatoms</p>
                            <p class="Annex_Glossary_body" lang="en-US">Microscopic (2&#8211;200&#160;&#181;m) unicellular photosynthetic algae that live in surface waters of lakes, rivers and <span class="condensed_italic">oceans</span> and form shells of opal. In the global <span class="condensed_italic">ocean</span>, marine <span class="condensed_italic">diatom</span> species distribution is primarily driven by nutrient availability. On regional scales, their species distribution in <span class="condensed_italic">ocean</span> sediment cores can be related to past sea surface temperatures.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Diet</p>
                            <p class="Annex_Glossary_body" lang="en-US">The kinds of food that follow a particular pattern that a person or community eats (FAO, 2014).</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Disaster</p>
                            <p class="Annex_Glossary_body" lang="en-US">A &#8216;serious disruption of the functioning of a community or a society at any scale due to hazardous events interacting with conditions of <span class="condensed_italic">exposure</span>, <span class="condensed_italic">vulnerability</span> and capacity, leading to one or more of the following: human, material, economic and environmental losses and impacts&#8217; (UNGA, 2016). See also <span class="condensed_italic">Exposure</span>, <span class="condensed_italic">Hazard</span>, <span class="condensed_italic">Risk</span> and <span class="condensed_italic">Vulnerability</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Disaster management</p>
                            <p class="Annex_Glossary_body" lang="en-US">Social processes for designing, implementing and evaluating strategies, <span class="condensed_italic">policies</span> and measures that promote and improve <span class="condensed_italic">disaster</span> preparedness, response and recovery practices at different organisational and societal levels.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Disaster risk</p>
                            <p class="Annex_Glossary_body" lang="en-US">The <span class="condensed_italic">likelihood</span> over a specified time period of severe alterations in the normal functioning of a community or a society due to hazardous physical events interacting with vulnerable social conditions, leading to widespread adverse human, material, economic or environmental effects that require immediate emergency response to satisfy critical human needs and that may require external support for recovery.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Disaster risk management (DRM)</p>
                            <p class="Annex_Glossary_body" lang="en-US">Processes for designing, implementing and evaluating strategies, <span class="condensed_italic">policies</span> and measures to improve the understanding of current and future <span class="condensed_italic">disaster risk</span>, foster <span class="condensed_italic">disaster risk reduction</span> and transfer, and promote continuous improvement in <span class="condensed_italic">disaster</span> preparedness, prevention and protection, response and recovery practices, with the explicit purpose of increasing <span class="condensed_italic">human security</span>, <span class="condensed_italic">well-being</span>, quality of life and <span class="condensed_italic">sustainable development (SD)</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Disaster risk reduction (DRR)</p>
                            <p class="Annex_Glossary_body" lang="en-US">Denotes both a <span class="condensed_italic">policy</span> goal or objective, and the strategic and instrumental measures employed for anticipating future <span class="condensed_italic">disaster risk</span>; reducing existing <span class="condensed_italic">exposure</span>, <span class="condensed_italic">hazard</span> or <span class="condensed_italic">vulnerability</span>; and improving <span class="condensed_italic">resilience</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Discount rate</p>
                            <p class="Annex_Glossary_body" lang="en-US">See<span class="condensed_italic"> Discounting</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Discounting</p>
                            <p class="Annex_Glossary_body" lang="en-US">A mathematical operation that aims to make monetary (or other) amounts received or expended at different times (years) comparable across time. If the discount rate is positive, future values are given less weight than those today. The choice of discount rate(s) is debated as it is a judgement based on hidden and/or explicit values.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Downscaling</p>
                            <p class="Annex_Glossary_body" lang="en-US">A method that derives local- to regional-scale information from larger-scale <span class="condensed_italic">models</span> or data analyses. Two main methods exist: dynamical <span class="condensed_italic">downscaling</span> and empirical/statistical <span class="condensed_italic">downscaling</span>. The dynamical method uses the output of regional <span class="condensed_italic">climate models</span>, global <span class="condensed_italic">models</span> with variable spatial <span class="condensed_italic">resolution</span> or high-<span class="condensed_italic">resolution</span> global <span class="condensed_italic">models</span>. The empirical/statistical methods are based on observations and develop statistical relationships that link the large-scale atmospheric variables with local/regional <span class="condensed_italic">climate</span> variables. In all cases, the quality of the driving model remains an important limitation on the quality of the downscaled information. The two methods can be combined, for example, applying empirical/statistical <span class="condensed_italic">downscaling</span> to the output of a regional <span class="condensed_italic">climate model</span>, consisting of a dynamical <span class="condensed_italic">downscaling</span> of a global <span class="condensed_italic">climate model</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Drainage</p>
                            <p class="Annex_Glossary_body" lang="en-US">Artificial lowering of the soil water table (IPCC, 2013).</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Driver</p>
                            <p class="Annex_Glossary_body" lang="en-US">Any natural or human-induced factor that directly or indirectly causes a change in a system (adapted from MA, 2005). See also <span class="condensed_italic">Climatic driver</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Drought</p>
                            <p class="Annex_Glossary_body" lang="en-US">An exceptional period of water shortage for existing <span class="condensed_italic">ecosystems</span> and the human population (due to low rainfall, high temperature and/or wind).</p>
                            <p class="Annex_Glossary_subhead" lang="en-US">Megadrought</p>
                            <p class="Annex_Glossary_body-indent" lang="en-US">A very lengthy and pervasive <span class="condensed_italic">drought</span>, lasting much longer than normal, usually a decade or more.</p>
                            <p class="Annex_Glossary_subhead" lang="en-US">Hydrological drought</p>
                            <p class="Annex_Glossary_body-indent" lang="en-US">A period with large <span class="condensed_italic">runoff</span> and water deficits in rivers, lakes and reservoirs.</p>
                            <p class="Annex_Glossary_subhead" lang="en-US">Agricultural and ecological drought</p>
                            <p class="Annex_Glossary_body-indent" lang="en-US"><span class="condensed_italic">Agricultural and ecological drought</span> (depending on the affected <span class="condensed_italic">biome</span>): a period with abnormal <span class="condensed_italic">soil moisture</span> deficit, which results from combined shortage of precipitation and excess <span class="condensed_italic">evapotranspiration</span>, and during the growing season impinges on crop production or <span class="condensed_italic">ecosystem</span> function in general.</p>
                            <p class="Annex_Glossary_subhead" lang="en-US">Meteorological drought</p>
                            <p class="Annex_Glossary_body-indent" lang="en-US">A period with an abnormal precipitation deficit.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Early warning systems (EWS)</p>
                            <p class="Annex_Glossary_body" lang="en-US">The set of technical and institutional capacities to forecast, predict and communicate timely and meaningful warning information to enable individuals, communities, managed <span class="condensed_italic">ecosystems</span> and organisations threatened by a <span class="condensed_italic">hazard</span> to prepare to act promptly and appropriately to reduce the possibility of harm or loss. Dependent upon context, EWS may draw upon scientific and/or <span class="condensed_italic">indigenous knowledge</span>, and other knowledge types. EWS are also considered for ecological applications, for example, conservation, where the organisation itself is not threatened by <span class="condensed_italic">hazard</span> but the ecosystem under conservation is (e.g., <span class="condensed_italic">coral bleaching</span> alerts), in agriculture (e.g., warnings of heavy rainfall, <span class="condensed_italic">drought</span>, ground frost and hailstorms) and in fisheries (e.g., warnings of storms, <span class="condensed_italic">storm surges</span> and <span class="condensed_italic">tsunamis</span>) (UNISDR 2009; IPCC, 2012a).</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Earth system model (ESM)</p>
                            <p class="Annex_Glossary_body" lang="en-US">A coupled <span class="condensed_italic">Atmosphere</span>&#8211;<span class="condensed_italic">Ocean</span> General Circulation Model (AOGCM) in which a representation of the <span class="condensed_italic">carbon cycle</span> is included, allowing for interactive calculation of atmospheric <span class="condensed_italic">carbon dioxide (CO</span><span class="subscript_italic-blue _idGenCharOverride-1">2</span><span class="condensed_italic">)</span> or compatible <span class="condensed_italic">emissions</span>. Additional components (e.g., atmospheric chemistry, <span class="condensed_italic">ice sheets</span>, dynamic vegetation, nitrogen cycle, but also <span class="condensed_italic">urban</span> or crop <span class="condensed_italic">models</span>) may be included.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Eastern boundary upwelling system (EBUS)</p>
                            <p class="Annex_Glossary_body" lang="en-US"><span class="condensed_italic">Eastern boundary upwelling systems (EBUS)</span> are located at the eastern (landward) edges of major <span class="condensed_italic">ocean</span> basins in both hemispheres, where equatorward winds drive upwelling currents that bring cool, nutrient-rich (and often oxygen-poor) waters from the deep <span class="condensed_italic">ocean</span> to the surface near the <span class="condensed_italic">coast</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Ecosystem</p>
                            <p class="Annex_Glossary_body" lang="en-US">A functional unit consisting of living organisms, their non-living environment and the interactions within and between them. The components included in a given <span class="condensed_italic">ecosystem</span> and its spatial boundaries depend on the purpose for which the <span class="condensed_italic">ecosystem</span> is defined: in some cases, they are relatively sharp, while in others they are diffuse. <span class="condensed_italic">Ecosystem</span> boundaries can change over time. <span class="condensed_italic">Ecosystems</span> are nested within other <span class="condensed_italic">ecosystems</span>, and their scale can range from very small to the entire <span class="condensed_italic">biosphere</span>. In the current era, most <span class="condensed_italic">ecosystems</span> either contain people as key organisms or are influenced by the effects of human activities in their environment. See also <span class="condensed_italic">Ecosystem services </span>and<span class="condensed_italic"> Ecosystem health</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Ecosystem health</p>
                            <p class="Annex_Glossary_body" lang="en-US"><span class="condensed_italic">Ecosystem health</span> is a metaphor used to describe the condition of an <span class="condensed_italic">ecosystem</span>, by analogy with human <span class="condensed_italic">health</span>. Note that there is no universally accepted benchmark for a healthy <span class="condensed_italic">ecosystem</span>. Rather, the apparent <span class="condensed_italic">health</span> status of an <span class="condensed_italic">ecosystem</span> is judged on the <span class="condensed_italic">ecosystem</span>&#8217;s <span class="condensed_italic">resilience</span> to change, with details depending upon which metrics are employed in judging it and which societal aspirations are driving the assessment (following IPBES 2019).</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Ecosystem services</p>
                            <p class="Annex_Glossary_body" lang="en-US">Ecological processes or functions having monetary or non-monetary value to individuals or society at large. These are frequently classified as (1) supporting services such as productivity or <span class="condensed_italic">biodiversity</span> maintenance, (2) provisioning services such as food or fibre, (3) regulating services such as <span class="condensed_italic">climate regulation</span> or carbon <span class="condensed_italic">sequestration</span> and (4) cultural services such as tourism or spiritual and aesthetic appreciation. See also <span class="condensed_italic">Ecosystem </span>and<span class="condensed_italic"> Ecosystem health</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Ecosystem-based adaptation (EBA)</p>
                            <p class="Annex_Glossary_body" lang="en-US">See <span class="condensed_italic">Adaptation</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">El Ni&#241;o-Southern Oscillation (ENSO)</p>
                            <p class="Annex_Glossary_body" lang="en-US">The term &#8216;El Ni&#241;o&#8217; was initially used to describe a warm-water current that periodically flows along the <span class="condensed_italic">coast</span> of Ecuador and Peru, disrupting the local fishery. It has since become identified with warming of the tropical Pacific Ocean east of the dateline. This oceanic event is associated with a fluctuation of a global-scale tropical and subtropical surface pressure pattern called the Southern Oscillation. This coupled <span class="condensed_italic">atmosphere</span>&#8211;<span class="condensed_italic">ocean</span> phenomenon, with preferred time scales of 2 to about 7&#160;years, is known as the <span class="condensed_italic">El Ni&#241;o-Southern Oscillation (ENSO)</span>. The warm and cold phases of the ENSO are called El Ni&#241;o and La Ni&#241;a, respectively. ENSO is often measured by the surface pressure <span class="condensed_italic">anomaly</span> difference between Tahiti and Darwin and/or the sea surface temperatures in the central and eastern equatorial Pacific. This phenomenon has a great impact on the wind, sea surface temperature and precipitation patterns in the tropical Pacific. It has climatic effects throughout the Pacific region and in many other parts of the world through global <span class="condensed_italic">teleconnections</span>. See WGI AR6 Annex AIV.2.3 (IPCC 2021a).</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Emergence (of the climate signal)</p>
                            <p class="Annex_Glossary_body" lang="en-US">Emergence of a <span class="condensed_italic">climate change</span> signal or trend refers to when a change in <span class="condensed_italic">climate</span> (the &#8216;signal&#8217;) becomes larger than the amplitude of natural or internal variations (defining the &#8216;noise&#8217;), This concept is often expressed as a signal-to-noise ratio, and <span class="condensed_italic">emergence</span> occurs at a defined threshold of this ratio (e.g., S/N &gt; 1 or 2). <span class="condensed_italic">Emergence</span> can refer to changes relative to a historical or modern baseline (usually at least 20&#160;years long) and can also be expressed in terms of time (time of <span class="condensed_italic">emergence</span>) or in terms of a <span class="condensed_italic">global warming</span> level. <span class="condensed_italic">Emergence</span> is also used to refer to a time when we can expect to see a response of reducing <span class="condensed_italic">greenhouse gas (GHG) emissions</span> (<span class="condensed_italic">emergence</span> with respect to <span class="condensed_italic">mitigation</span>). <span class="condensed_italic">Emergence</span> can be estimated using observations and/or model simulations.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Emission pathways</p>
                            <p class="Annex_Glossary_body" lang="en-US">See <span class="condensed_italic">Pathways</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Emission scenario</p>
                            <p class="Annex_Glossary_body" lang="en-US">See <span class="condensed_italic">Scenario</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Emissions</p>
                            <p class="Annex_Glossary_subhead" lang="en-US">Anthropogenic emissions</p>
                            <p class="Annex_Glossary_body-indent" lang="en-US"><span class="condensed_italic">Emissions</span> of <span class="condensed_italic">greenhouse gases (GHGs)</span>, <span class="condensed_italic">precursors</span> of GHGs and <span class="condensed_italic">aerosols </span>caused by human activities. These activities include the burning of <span class="condensed_italic">fossil fuels</span>, <span class="condensed_italic">deforestation</span>,<span class="condensed_italic"> land use </span>and<span class="condensed_italic"> land-use changes</span> (LULUC), livestock production, fertilisation, waste management and industrial processes.</p>
                            <p class="Annex_Glossary_subhead" lang="en-US">Fossil-fuel emissions</p>
                            <p class="Annex_Glossary_body-indent" lang="en-US"><span class="condensed_italic">Emissions</span> of <span class="condensed_italic">greenhouse gases</span> (in particular, <span class="condensed_italic">carbon dioxide</span>), other trace gases and <span class="condensed_italic">aerosols</span> resulting from the combustion of fuels from fossil carbon deposits such as oil, gas and coal.</p>
                            <p class="Annex_Glossary_subhead" lang="en-US">Non-CO<span class="subscript_bold_condensed_italic CharOverride-2">2</span> emissions and radiative forcing</p>
                            <p class="Annex_Glossary_body-indent" lang="en-US"><span class="condensed_italic">Non-CO</span><span class="subscript_italic-blue _idGenCharOverride-1">2</span> <span class="condensed_italic">emissions</span> included in this report are all <span class="condensed_italic">anthropogenic emissions</span> other than CO<span class="subscript _idGenCharOverride-1">2</span> that result in <span class="condensed_italic">radiative forcing</span>. These include short-lived <span class="condensed_italic">climate</span> forcers, such as <span class="condensed_italic">methane (CH</span><span class="subscript_italic-blue _idGenCharOverride-1">4</span><span class="condensed_italic">)</span>, some fluorinated gases, <span class="condensed_italic">ozone (O</span><span class="subscript_italic-blue _idGenCharOverride-1">3</span><span class="condensed_italic">) precursors</span>, <span class="condensed_italic">aerosols</span> or <span class="condensed_italic">aerosol precursors</span>, such as black carbon and sulphur dioxide, respectively, as well as long-lived <span class="condensed_italic">greenhouse gases</span>, such as nitrous oxide (N<span class="subscript _idGenCharOverride-1">2</span>O) or other fluorinated gases. The <span class="condensed_italic">radiative forcing</span> associated with non-CO<span class="subscript _idGenCharOverride-1">2</span> <span class="condensed_italic">emissions</span> and changes in surface <span class="condensed_italic">albedo</span> is referred to as non-CO<span class="subscript _idGenCharOverride-1">2</span> <span class="condensed_italic">radiative forcing</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Enabling conditions (for adaptation and mitigation options)</p>
                            <p class="Annex_Glossary_body" lang="en-US">Conditions that enhance the<span class="condensed_italic"> feasibility</span> of <span class="condensed_italic">adaptation</span> and <span class="condensed_italic">mitigation options</span>. <span class="condensed_italic">Enabling conditions</span> include finance, technological innovation, strengthening <span class="condensed_italic">policy</span> instruments, <span class="condensed_italic">institutional capacity</span>, multi-level <span class="condensed_italic">governance</span> and changes in human behaviour and lifestyles.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Endemic species</p>
                            <p class="Annex_Glossary_body" lang="en-US">Plants and animals that are only found in one geographic region.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Energy access</p>
                            <p class="Annex_Glossary_body" lang="en-US">Access to clean, reliable and affordable energy services for cooking and heating, lighting, communications and productive uses (with special reference to <span class="condensed_italic">Sustainable Development Goal </span>7) (AGECC, 2010).</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Energy efficiency</p>
                            <p class="Annex_Glossary_body" lang="en-US">The ratio of output or useful energy or energy services or other useful physical outputs obtained from a system, conversion process, transmission or storage activity to the input of energy (measured as kWh kWh<span class="superscript _idGenCharOverride-1">&#8722;1</span>, tonnes kWh<span class="superscript _idGenCharOverride-1">&#8722;1</span> or any other physical measure of useful output like tonne-km transported). <span class="condensed_italic">Energy efficiency</span> is often described by energy intensity.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Energy security</p>
                            <p class="Annex_Glossary_body" lang="en-US">The goal of a given country, or the global community as a whole, to maintain an adequate, stable and predictable energy supply. Measures encompass safeguarding the sufficiency of energy resources to meet national energy demand at competitive and stable prices and the <span class="condensed_italic">resilience</span> of the energy supply; enabling the development and deployment of technologies; building sufficient <span class="condensed_italic">infrastructure</span> to generate, store and transmit energy supplies and ensuring enforceable contracts of delivery.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Energy system</p>
                            <p class="Annex_Glossary_body" lang="en-US">The <span class="condensed_italic">energy system</span> comprises all components related to the production, conversion, delivery and use of energy.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Equality</p>
                            <p class="Annex_Glossary_body" lang="en-US">A principle that ascribes equal worth to all human beings, including equal opportunities, rights and obligations, irrespective of origins. See also <span class="condensed_italic">Equity</span> and <span class="condensed_italic">Fairness</span>.</p>
                            <p class="Annex_Glossary_subhead" lang="en-US">Inequality</p>
                            <p class="Annex_Glossary_body-indent" lang="en-US">Uneven opportunities and social positions, and processes of discrimination within a group or society, based on gender, class, ethnicity, age and (dis)ability, often produced by uneven development. <span class="condensed_italic">Income inequality</span> refers to gaps between the highest and lowest <span class="condensed_italic">income</span> earners within a country and between countries.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Equity</p>
                            <p class="Annex_Glossary_body" lang="en-US">The principle of being fair and impartial, and a basis for understanding how the <span class="condensed_italic">impacts</span> and responses to <span class="condensed_italic">climate change</span>, including costs and benefits, are distributed in and by society in more or less equal ways. Often aligned with ideas of <span class="condensed_italic">equality</span>, <span class="condensed_italic">fairness</span> and <span class="condensed_italic">justice</span> and applied with respect to <span class="condensed_italic">equity</span> in the responsibility for, and distribution of, <span class="condensed_italic">climate impacts</span> and <span class="condensed_italic">policies</span> across society, generations and gender, and in the sense of who participates and controls the processes of decision-making.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Ethics</p>
                            <p class="Annex_Glossary_body" lang="en-US"><span class="condensed_italic">Ethics</span> involves questions of <span class="condensed_italic">justice</span> and value. Justice is concerned with right and wrong, <span class="condensed_italic">equity</span> and <span class="condensed_italic">fairness</span>, and, in general, with the rights to which people and living beings are entitled. Value is a matter of worth, benefit or good.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Eutrophication</p>
                            <p class="Annex_Glossary_body" lang="en-US">Over-enrichment of water by nutrients such as nitrogen and phosphorus. It is one of the leading causes of water quality impairment. The two most acute symptoms of <span class="condensed_italic">eutrophication</span> are hypoxia (or oxygen depletion) and harmful algal blooms.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Evaporation</p>
                            <p class="Annex_Glossary_body" lang="en-US">The physical process by which a liquid (e.g., water) becomes a gas (e.g., water vapour).</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Evapotranspiration</p>
                            <p class="Annex_Glossary_body" lang="en-US">The combined processes through which water is transferred to the <span class="condensed_italic">atmosphere</span> from open water and ice surfaces, bare soil and vegetation that make up the Earth&#8217;s surface.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Evidence</p>
                            <p class="Annex_Glossary_body" lang="en-US">Data and information used in the scientific process to establish findings. In this report, the degree of <span class="condensed_italic">evidence</span> reflects the amount, quality and consistency of scientific/technical information on which the Lead Authors are basing their findings. See also <span class="condensed_italic">Agreement</span>, <span class="condensed_italic">Confidence</span>, <span class="condensed_italic">Likelihood</span> and <span class="condensed_italic">Uncertainty</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Evolutionary adaptation</p>
                            <p class="Annex_Glossary_body" lang="en-US">See <span class="condensed_italic">Adaptation</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Exposure</p>
                            <p class="Annex_Glossary_body" lang="en-US">The presence of people; <span class="condensed_italic">livelihoods</span>; species or <span class="condensed_italic">ecosystems</span>; environmental functions, services, and resources; <span class="condensed_italic">infrastructure</span>; or economic, social, or cultural assets in places and settings that could be adversely affected.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Externality/external cost/external benefit</p>
                            <p class="Annex_Glossary_body" lang="en-US"><span class="condensed_italic">Externalities</span> arise from a human activity, when agents responsible for the activity do not take full account of the activity&#8217;s <span class="condensed_italic">impact</span> on others&#8217; production and consumption possibilities, and no compensation exists for such <span class="condensed_italic">impacts</span>. When the<span class="condensed_italic"> impact</span> is negative, they are <span class="condensed_italic">external costs</span>. When positive they are referred to as <span class="condensed_italic">external benefits</span>. See also <span class="condensed_italic">Co-benefits</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Extinction</p>
                            <p class="Annex_Glossary_body" lang="en-US">A population, species or more inclusive taxonomic group has gone extinct when all its individuals have died. A species may go extinct locally (population <span class="condensed_italic">extinction</span>), regionally (e.g., <span class="condensed_italic">extinction</span> of all populations in a country, continent or <span class="condensed_italic">ocean</span>) or globally (IPBES, 2019). See also <span class="condensed_italic">Extirpation</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Extirpation</p>
                            <p class="Annex_Glossary_body" lang="en-US">The disappearance of a species from an area, sometimes also referred to as local <span class="condensed_italic">extinction</span>. Its use implies that the species still occurs elsewhere. See also <span class="condensed_italic">Extinction</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Extreme sea level (ESL)</p>
                            <p class="Annex_Glossary_body" lang="en-US">The occurrence of an exceptionally low or high local sea surface height, arising from (a combination of) short-term phenomena (e.g., <span class="condensed_italic">storm surges</span>, tides and waves). Relative <span class="condensed_italic">sea level changes</span> affect <span class="condensed_italic">extreme sea levels</span> directly by shifting the mean water levels and indirectly by modulating the propagation of tides, waves and/or surges due to increased water depth. In addition, <span class="condensed_italic">extreme sea levels</span> can be influenced by changes in the frequency, tracks or strength of weather systems and storms, or due to <span class="condensed_italic">anthropogenically</span> induced changes such as the modification of coastlines or dredging. In turn, changes in any or all of the contributions to <span class="condensed_italic">extreme sea levels</span> may lead to long-term relative <span class="condensed_italic">sea level changes</span>. Alternate expressions for ESL may be used depending on the processes resolved.</p>
                            <p class="Annex_Glossary_body" lang="en-US">Extreme still water level (ESWL) refers to the combined contribution of relative <span class="condensed_italic">sea level change</span>, tides and <span class="condensed_italic">storm surges</span>. Wind-waves also contribute to coastal sea level via three processes: infragravity waves (lower-frequency gravity waves generated by wind waves), wave setup (time-mean sea level elevation due to wave energy dissipation) and swash (vertical displacement up the shore-face induced by individual waves). Extreme total water level (ETWL) is the ESWL plus wave setup. When considering coastal <span class="condensed_italic">impacts</span>, swash is also important, and extreme coastal water level (ECWL) is used. See also <span class="condensed_italic">Sea level change (sea level rise/sea level fall)</span></p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Extreme weather event</p>
                            <p class="Annex_Glossary_body" lang="en-US">An event that is rare at a particular place and time of year. Definitions of &#8216;rare&#8217; vary, but an <span class="condensed_italic">extreme weather event</span> would normally be as rare as or rarer than the 10th or 90th percentile of a probability density function estimated from observations. By definition, the characteristics of what is called extreme weather may vary from place to place in an absolute sense. See also <span class="condensed_italic">Heatwave</span> and <span class="condensed_italic">Climate extreme</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Extreme/heavy precipitation event</p>
                            <p class="Annex_Glossary_body" lang="en-US">An <span class="condensed_italic">extreme/heavy precipitation event</span> is an event that is of very high magnitude with a very rare occurrence at a particular place. Types of extreme precipitation may vary depending on its duration, hourly, daily or multi-days (e.g., 5&#160;days), though all of them qualitatively represent high magnitude. The intensity of such events may be defined with block maxima approach such as annual maxima or with peak over threshold approach, such as rainfall above 95th or 99th percentile at a particular space.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Fairness</p>
                            <p class="Annex_Glossary_body" lang="en-US">Impartial and just treatment without favouritism or discrimination in which each person is considered of equal worth with equal opportunity. See also <span class="condensed_italic">Equality</span> and <span class="condensed_italic">Equity</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Feasibility</p>
                            <p class="Annex_Glossary_body" lang="en-US">In this report, <span class="condensed_italic">feasibility</span> refers to the potential for a <span class="condensed_italic">mitigation</span> or <span class="condensed_italic">adaptation option</span> to be implemented. Factors influencing <span class="condensed_italic">feasibility</span> are context dependent, temporally dynamic and may vary between different groups and actors. <span class="condensed_italic">Feasibility</span> depends on geophysical, environmental-ecological, technological, economic, socio-cultural and institutional factors that enable or constrain the implementation of an option. The <span class="condensed_italic">feasibility</span> of options may change when different options are combined, and increase when <span class="condensed_italic">enabling conditions</span> are strengthened. See also <span class="condensed_italic">Enabling conditions (for adaptation and mitigation options)</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Fire weather</p>
                            <p class="Annex_Glossary_body" lang="en-US">Weather conditions conducive to triggering and sustaining wildfires, usually based on a set of indicators and combinations of indicators including temperature, <span class="condensed_italic">soil moisture</span>, humidity and wind. <span class="condensed_italic">Fire weather</span> does not include the presence or absence of fuel load.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Flood</p>
                            <p class="Annex_Glossary_body" lang="en-US">The overflowing of the normal confines of a stream or other water body, or the <span class="condensed_italic">accumulation</span> of water over areas that are not normally submerged. <span class="condensed_italic">Floods</span> can be caused by unusually heavy rain, for example during storms and cyclones. <span class="condensed_italic">Floods</span> include river (fluvial) <span class="condensed_italic">floods</span>, flash <span class="condensed_italic">floods</span>, <span class="condensed_italic">urban floods</span>, rain (pluvial) <span class="condensed_italic">floods</span>, sewer <span class="condensed_italic">floods</span>, coastal <span class="condensed_italic">floods</span>, and <span class="condensed_italic">glacial lake outburst floods (GLOF)</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Flux</p>
                            <p class="Annex_Glossary_body" lang="en-US">A movement (flow) of matter (e.g., water vapour, particles), heat or energy from one place to another, or from one medium (e.g., <span class="condensed_italic">land</span> surface) to another (e.g., <span class="condensed_italic">atmosphere</span>).</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Food security</p>
                            <p class="Annex_Glossary_body" lang="en-US">A situation that exists when all people, at all times, have physical, social and economic access to sufficient, safe and nutritious food that meets their dietary needs and food preferences for an active and healthy life. The four pillars of <span class="condensed_italic">food security</span> are availability, access, utilisation and stability. The nutritional dimension is integral to the concept of <span class="condensed_italic">food security</span> (FAO, 2018/ 2009).</p>
                            <p class="Annex_Glossary_subhead" lang="en-US">Availability</p>
                            <p class="Annex_Glossary_body-indent" lang="en-US">Physical availability of food. <span class="condensed_italic">Food availability</span> addresses the supply side of food security and is determined by the levels of food production, stocks and net trade.</p>
                            <p class="Annex_Glossary_subhead" lang="en-US">Access</p>
                            <p class="Annex_Glossary_body-indent" lang="en-US">Economic and/or physical access to food. Economic access is determined by disposable <span class="condensed_italic">income</span>, food prices and the provision of and access to social support. Physical access is determined by the availability and quality of <span class="condensed_italic">land</span> and other <span class="condensed_italic">infrastructure</span>, property rights or the functioning of markets.</p>
                            <p class="Annex_Glossary_subhead" lang="en-US">Utilisation</p>
                            <p class="Annex_Glossary_body-indent" lang="en-US">The way in which the body uses the various nutrients in food. Individuals achieve sufficient energy and nutrient intake through good care and feeding practices, food preparation, <span class="condensed_italic">diet</span> diversity and intrahousehold distribution of food. Combined with biological utilisation of the food consumed, energy and nutrient intake determine the nutrition status of individuals.</p>
                            <p class="Annex_Glossary_subhead" lang="en-US">Stability</p>
                            <p class="Annex_Glossary_body-indent" lang="en-US">The stability of the other three dimensions over time. Even if individuals&#8217; food intake is adequate today, they are still considered food-insecure if periodically they have inadequate access to food, risking deterioration of their nutrition status. Adverse weather conditions, political instability or economic factors (unemployment, rising food prices) may have an impact on individuals&#8217; <span class="condensed_italic">food security</span> status.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Food system</p>
                            <p class="Annex_Glossary_body" lang="en-US">All the elements (environment, people, inputs, processes, infrastructures, <span class="condensed_italic">institutions</span>, etc.) and activities that relate to the production, processing, distribution, preparation and consumption of food, and the output of these activities, including socio-economic and environmental outcomes (HLPE, 2017). [Note: While there is a global <span class="condensed_italic">food system</span> (encompassing the totality of global production and consumption), each location&#8217;s <span class="condensed_italic">food system</span> is unique, being defined by that place&#8217;s mix of food produced locally, nationally, regionally or globally.]</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Food-borne diseases</p>
                            <p class="Annex_Glossary_body" lang="en-US">Illnesses transmitted through the consumption of unsafe or contaminated food. That contamination can come from a variety of <span class="condensed_italic">sources</span>, including contaminated water (adapted from UNEP, 2018).</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Forest</p>
                            <p class="Annex_Glossary_body" lang="en-US">A vegetation type dominated by trees. Many definitions of the term <span class="condensed_italic">forest</span> are in use throughout the world, reflecting wide differences in bio-geophysical conditions, social structure and economics. See also <span class="condensed_italic">Afforestation</span>, <span class="condensed_italic">Deforestation</span> and <span class="condensed_italic">Reforestation</span></p>
                            <p class="Annex_Glossary_body" lang="en-US">[Note: For a discussion of the term forest in the context of national GHG inventories, see the 2006 IPCC Guidelines for National GHG Inventories and their 2019 Refinement, and information provided by the United Nations Framework Convention on Climate Change (IPCC 2006, 2019; UNFCCC, 2021a, 2021b).]</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Forest degradation</p>
                            <p class="Annex_Glossary_body" lang="en-US">A reduction in the capacity of a <span class="condensed_italic">forest</span> to produce <span class="condensed_italic">ecosystem services</span> such as carbon storage and wood products as a result of <span class="condensed_italic">anthropogenic</span> and environmental changes.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Forest dieback</p>
                            <p class="Annex_Glossary_body" lang="en-US">See <span class="condensed_italic">Forest degradation</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Forest line</p>
                            <p class="Annex_Glossary_body" lang="en-US">The upper limit of the closed upper montane forest or forest at high latitudes. It is less elevated or less poleward than the tree line.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Forest management</p>
                            <p class="Annex_Glossary_body" lang="en-US">See <span class="condensed_italic">Sustainable forest management</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Fossil fuels</p>
                            <p class="Annex_Glossary_body" lang="en-US">Carbon-based fuels from fossil hydrocarbon deposits, including coal, oil and natural gas.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Glacial lake outburst flood (GLOF)/Glacier lake outburst</p>
                            <p class="Annex_Glossary_body" lang="en-US">A sudden release of water from a <span class="condensed_italic">glacier</span> lake, including any of the following types: a <span class="condensed_italic">glacier</span>-dammed lake, a pro-glacial moraine-dammed lake or water that was stored within, under or on the <span class="condensed_italic">glacier</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Glacier</p>
                            <p class="Annex_Glossary_body" lang="en-US">A perennial mass of ice, and possibly firn and snow, originating on the <span class="condensed_italic">land</span> surface by <span class="condensed_italic">accumulation</span> and compaction of snow and showing <span class="condensed_italic">evidence</span> of past or present flow. A <span class="condensed_italic">glacier</span> typically gains mass by <span class="condensed_italic">accumulation</span> of snow and loses mass by ablation. <span class="condensed_italic">Land</span> ice masses of continental size (&gt;50,000&#160;km<span class="superscript _idGenCharOverride-1">2</span>) are referred to as <span class="condensed_italic">ice sheets</span> (Cogley et&#160;al., 2011).</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Global change</p>
                            <p class="Annex_Glossary_body" lang="en-US">A generic term to describe global-scale changes in systems, including the <span class="condensed_italic">climate system</span>, <span class="condensed_italic">ecosystems</span> and <span class="condensed_italic">social-ecological systems</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Global mean sea level change</p>
                            <p class="Annex_Glossary_body" lang="en-US"><span class="condensed_italic">Global mean sea level </span>(GMSL) <span class="condensed_italic">change</span> is the increase or decrease in the volume of the <span class="condensed_italic">ocean</span> divided by the <span class="condensed_italic">ocean</span> surface area. It is the sum of changes in <span class="condensed_italic">ocean</span> density through temperature changes (global mean thermosteric <span class="condensed_italic">sea level change</span>) and changes in the <span class="condensed_italic">ocean</span> mass as a result of changes in the <span class="condensed_italic">cryosphere</span> or land water storage (barystatic <span class="condensed_italic">sea level change</span>).</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Global mean surface air temperature (GSAT)</p>
                            <p class="Annex_Glossary_body" lang="en-US">The global average of near-surface air temperatures over <span class="condensed_italic">land</span>, <span class="condensed_italic">oceans</span> and <span class="condensed_italic">sea ice</span>. Changes in GSAT are often used as a measure of global temperature change in <span class="condensed_italic">climate models</span>. See also <span class="condensed_italic">Global mean surface temperature (GMST)</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Global mean surface temperature (GMST)</p>
                            <p class="Annex_Glossary_body" lang="en-US">The estimated global average of near-surface air temperatures over <span class="condensed_italic">land</span> and <span class="condensed_italic">sea ice</span>, and sea surface temperature (SST) over ice-free <span class="condensed_italic">ocean regions</span>, with changes normally expressed as departures from a value over a specified <span class="condensed_italic">reference period</span>. See also <span class="condensed_italic">Global mean surface air temperature (GSAT)</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Global monsoon</p>
                            <p class="Annex_Glossary_body" lang="en-US">The <span class="condensed_italic">global monsoon</span> (GM) is a global-scale solstitial mode that dominates the annual variation of tropical and sub-tropical precipitation and circulation. The GM domain is defined as the area where the annual range of precipitation (local summer minus winter mean precipitation rate) is greater than 2.5&#160;mm/day, following on from the definition as in Kitoh et&#160;al. (2013). Further details on how the GM is defined, used and related to regional <span class="condensed_italic">monsoons</span> throughout the report are provided by WGI AR6 Annex V (IPCC 2021b).</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Global warming</p>
                            <p class="Annex_Glossary_body" lang="en-US"><span class="condensed_italic">Global warming</span> refers to the increase in global surface temperature relative to a baseline <span class="condensed_italic">reference period</span>, averaging over a period sufficient to remove interannual variations (e.g., 20 or 30&#160;years). A common choice for the baseline is 1850&#8211;1900 (the earliest period of reliable observations with sufficient geographic coverage), with more modern baselines used depending upon the application. See also <span class="condensed_italic">Climate change</span> and <span class="condensed_italic">Climate variability</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Governance</p>
                            <p class="Annex_Glossary_body" lang="en-US">The structures, processes and actions through which private and public actors interact to address societal goals. This includes formal and informal <span class="condensed_italic">institutions</span> and the associated norms, rules, laws and procedures for deciding, managing, implementing and monitoring <span class="condensed_italic">policies</span> and measures at any geographic or political scale, from global to local.</p>
                            <p class="Annex_Glossary_subhead" lang="en-US">Adaptive governance</p>
                            <p class="Annex_Glossary_body-indent" lang="en-US">Adjusting to changing conditions, such as <span class="condensed_italic">climate change</span>, through <span class="condensed_italic">governance</span> interactions that seek to maintain a desired state in a <span class="condensed_italic">social-ecological system</span>.</p>
                            <p class="Annex_Glossary_subhead" lang="en-US">
                              <span class="bold_condensed_italic">Climate governance</span>
                            </p>
                            <p class="Annex_Glossary_body-indent" lang="en-US">The structures, processes and actions through which private and public actors seek to mitigate and adapt to <span class="condensed_italic">climate change</span>.</p>
                            <p class="Annex_Glossary_subhead" lang="en-US">Multi-level governance</p>
                            <p class="Annex_Glossary_body-indent" lang="en-US">The dispersion of <span class="condensed_italic">governance</span> across multiple levels of jurisdiction and decision-making, including, global, regional, national and local as well as trans-regional and trans-national levels.</p>
                            <p class="Annex_Glossary_subhead" lang="en-US">
                              <span class="bold_condensed_italic">Polycentric governance</span>
                            </p>
                            <p class="Annex_Glossary_body-indent" lang="en-US"><span class="condensed_italic">Polycentric governance</span> involves multiple centres of decision-making with overlapping jurisdictions. While the centres have some degree of autonomy, they also take each other into account, coordinating their actions and seeking to resolve conflicts (Carlisle and Gruby, 2017; Jordan et&#160;al., 2018; McGinnis and Ostrom, 2012).</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Governance capacity</p>
                            <p class="Annex_Glossary_body" lang="en-US">The ability of <span class="condensed_italic">governance institutions</span>, leaders and non-state and civil society to plan, coordinate, fund, implement, evaluate and adjust <span class="condensed_italic">policies</span> and measures over the short, medium and long term, adjusting for <span class="condensed_italic">uncertainty</span>, rapid change and wide-ranging <span class="condensed_italic">impacts</span> and multiple actors and demands.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Green Climate Fund (GCF)</p>
                            <p class="Annex_Glossary_body" lang="en-US">The <span class="condensed_italic">Green Climate Fund</span> was established by the 16th Session of the Conference of the Parties (COP) in 2010 as an operating entity of the financial mechanism of the United Nations Framework Convention on Climate Change (UNFCCC), in accordance with Article 11 of the Convention, to support projects, programmes and <span class="condensed_italic">policies</span> and other activities in <span class="condensed_italic">developing country</span> Parties. The Fund is governed by a board and will receive guidance from the COP.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Green infrastructure</p>
                            <p class="Annex_Glossary_body" lang="en-US">See <span class="condensed_italic">Infrastructure</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Greenhouse gases (GHG)</p>
                            <p class="Annex_Glossary_body" lang="en-US">Gaseous constituents of the <span class="condensed_italic">atmosphere</span>, both natural and <span class="condensed_italic">anthropogenic</span>, that absorb and emit radiation at specific wavelengths within the spectrum of radiation emitted by the Earth&#8217;s <span class="condensed_italic">ocean</span> and <span class="condensed_italic">land</span> surface, by the <span class="condensed_italic">atmosphere</span> itself and by clouds. This property causes the greenhouse effect. Water vapour (H<span class="subscript _idGenCharOverride-1">2</span>O), <span class="condensed_italic">carbon dioxide (CO</span><span class="subscript_italic-blue _idGenCharOverride-1">2</span><span class="condensed_italic">)</span>, nitrous oxide (N<span class="subscript _idGenCharOverride-1">2</span>O), <span class="condensed_italic">methane (CH</span><span class="subscript_italic-blue _idGenCharOverride-1">4</span><span class="condensed_italic">)</span> and <span class="condensed_italic">ozone (O</span><span class="subscript_italic-blue _idGenCharOverride-1">3</span><span class="condensed_italic">)</span> are the primary GHGs in the Earth&#8217;s <span class="condensed_italic">atmosphere</span>. Human-made GHGs include sulphur hexafluoride (SF<span class="subscript _idGenCharOverride-1">6</span>), hydrofluorocarbons (HFCs), chlorofluorocarbons (CFCs) and perfluorocarbons (PFCs); several of these are also O<span class="subscript _idGenCharOverride-1">3</span>-depleting (and are regulated under the Montreal Protocol).</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Grey infrastructure</p>
                            <p class="Annex_Glossary_body" lang="en-US">See <span class="condensed_italic">Infrastructure</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Gross domestic product (GDP)</p>
                            <p class="Annex_Glossary_body" lang="en-US">The sum of gross value added, at purchasers&#8217; prices, by all resident and non-resident producers in the economy, plus any taxes and minus any subsidies not included in the value of the products in a country or a geographic region for a given period, normally one year. GDP is calculated without deducting for depreciation of fabricated assets or depletion and degradation of natural resources.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Groundwater recharge</p>
                            <p class="Annex_Glossary_body" lang="en-US">The process by which external water is added to the zone of saturation of an aquifer, either directly into a geologic formation that traps the water or indirectly by way of another formation.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Habitability (human)</p>
                            <p class="Annex_Glossary_body" lang="en-US">The ability of a place to support human life by providing protection from <span class="condensed_italic">hazards</span> which challenge human survival, and by assuring adequate space, food and freshwater.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Hazard</p>
                            <p class="Annex_Glossary_body" lang="en-US">The potential occurrence of a natural or human-induced physical event or trend that may cause loss of life, injury or other <span class="condensed_italic">health impacts</span>, as well as damage and loss to property, <span class="condensed_italic">infrastructure</span>, <span class="condensed_italic">livelihoods</span>, service provision, <span class="condensed_italic">ecosystems </span>and environmental resources. See also <span class="condensed_italic">Impacts</span> and <span class="condensed_italic">Risk</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Health</p>
                            <p class="Annex_Glossary_body" lang="en-US"><span class="condensed_italic">Health</span> is a state of complete physical, mental and social <span class="condensed_italic">well-being</span> and not merely the absence of disease or infirmity (WHO).</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Heat index</p>
                            <p class="Annex_Glossary_body" lang="en-US">A measure of how hot the air feels to the human body. The index is mainly based on surface air temperature and <span class="condensed_italic">relative humidity</span> and thus reflects the combined effect of high temperature and humidity on human physiology and provides a relative indication of potential <span class="condensed_italic">health risks</span>. See also <span class="condensed_italic">Heatwave</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Heat stress</p>
                            <p class="Annex_Glossary_body" lang="en-US">A range of conditions in, for example, terrestrial or aquatic organisms when the body absorbs excess heat during overexposure to high air or water temperatures or thermal radiation. In aquatic water-breathing animals, hypoxia and acidification can exacerbate <span class="condensed_italic">vulnerability</span> to heat. <span class="condensed_italic">Heat stress</span> in mammals (including humans) and birds, both in air, is exacerbated by a detrimental combination of ambient heat, high humidity and low wind speed, causing the regulation of body temperature to fail.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Heatwave</p>
                            <p class="Annex_Glossary_body" lang="en-US">A period of abnormally hot weather, often defined with reference to a relative temperature threshold, lasting from two days to months. <span class="condensed_italic">Heatwaves</span> and warm spells have various and, in some cases, overlapping definitions. See also <span class="condensed_italic">Heat index</span>, <span class="condensed_italic">Heat stress</span> and <span class="condensed_italic">Marine heatwave</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Heavy precipitation event</p>
                            <p class="Annex_Glossary_body" lang="en-US">See <span class="condensed_italic">Extreme/heavy precipitation event</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Human mobility</p>
                            <p class="Annex_Glossary_body" lang="en-US">The permanent or semi-permanent move by a person for at least 1&#160;year and involving crossing an administrative, but not necessarily a national, border.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Human rights</p>
                            <p class="Annex_Glossary_body" lang="en-US">Rights that are inherent to all human beings, universal, inalienable and indivisible, typically expressed and guaranteed by law. They include the right to life, economic, social and cultural rights, and the right to development and self-determination (UNOHCHR, 2018).</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Human security</p>
                            <p class="Annex_Glossary_body" lang="en-US">A condition that is met when the vital core of human lives is protected, and when people have the freedom and capacity to live with dignity. In the context of <span class="condensed_italic">climate change</span>, the vital core of human lives includes the universal and culturally specific, material and non-material elements necessary for people to act on behalf of their interests and to live with dignity.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Human system</p>
                            <p class="Annex_Glossary_body" lang="en-US">Any system in which human organisations and <span class="condensed_italic">institutions</span> play a major role. Often, but not always, the term is synonymous with society or social system. Systems such as agricultural systems, <span class="condensed_italic">urban systems</span>, political systems, technological systems and economic systems are all <span class="condensed_italic">human systems</span> in the sense applied in this report.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Hydrological cycle</p>
                            <p class="Annex_Glossary_body" lang="en-US">The cycle in which water evaporates from the <span class="condensed_italic">ocean</span> and the <span class="condensed_italic">land</span> surface, is carried over the Earth in atmospheric circulation as water vapour, condenses to form clouds, precipitates over the <span class="condensed_italic">ocean</span> and <span class="condensed_italic">land</span> as rain or snow, which on <span class="condensed_italic">land</span> can be intercepted by trees and vegetation, potentially accumulating as snow or ice, provides <span class="condensed_italic">runoff</span> on the <span class="condensed_italic">land</span> surface, infiltrates into soils, recharges groundwater, discharges into streams and, ultimately, flows into the <span class="condensed_italic">oceans</span> as rivers, polar <span class="condensed_italic">glaciers</span> and <span class="condensed_italic">ice sheets</span>, from which it will eventually evaporate again. The various systems involved in the <span class="condensed_italic">hydrological cycle</span> are usually referred to as hydrological systems.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Hydrological drought</p>
                            <p class="Annex_Glossary_body" lang="en-US">See <span class="condensed_italic">Drought</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Hydropower</p>
                            <p class="Annex_Glossary_body" lang="en-US">Power harnessed from the flow of water.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Hyperthermal events</p>
                            <p class="Annex_Glossary_body" lang="en-US">Geologically abrupt <span class="condensed_italic">global warming</span> events of the past associated with disturbances of the carbon cycle and <span class="condensed_italic">impacts</span> on the <span class="condensed_italic">biosphere</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Hypoxic</p>
                            <p class="Annex_Glossary_body" lang="en-US">Conditions of low dissolved oxygen in shallow-water <span class="condensed_italic">ocean</span> and freshwater environments. There is no universal threshold for hypoxia. A value around 60&#160;<span class="glyphe_greek-Calibri">&#956;</span>mol kg<span class="superscript _idGenCharOverride-1">&#8722;1</span> has commonly been used for some estuarine systems, although this does not necessarily directly translate into biological <span class="condensed_italic">impacts</span>. Anoxic conditions occur where there is no oxygen present at all. See also <span class="condensed_italic">Eutrophication</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Hypoxic events</p>
                            <p class="Annex_Glossary_body" lang="en-US">Events that lead to deficiencies of oxygen in water bodies.</p>
                          </div>
                          <div class="col-lg-6 col-12">
                            <p class="Annex_Glossary_definitions" lang="en-US">Ice sheet</p>
                            <p class="Annex_Glossary_body" lang="en-US">An ice body originating on <span class="condensed_italic">land</span> that covers an area of continental size, generally defined as covering &gt;50,000&#160;km<span class="superscript _idGenCharOverride-1">2</span>, and that has formed over thousands of years through <span class="condensed_italic">accumulation</span> and compaction of snow. An <span class="condensed_italic">ice sheet</span> flows outward from a high central ice plateau with a small average surface slope. The margins usually slope more steeply, and most ice is discharged through fast-flowing ice streams or outlet <span class="condensed_italic">glaciers</span>, often into the sea or into ice shelves floating on the sea. There are only two <span class="condensed_italic">ice sheets</span> in the modern world, one on Greenland and one on Antarctica. The latter is divided into the East Antarctic Ice Sheet (EAIS), the West Antarctic Ice Sheet (WAIS) and the Antarctic Peninsula Ice Sheet. During glacial periods, there were other <span class="condensed_italic">ice sheets</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Impacts</p>
                            <p class="Annex_Glossary_body" lang="en-US">The consequences of realised <span class="condensed_italic">risks</span> on <span class="condensed_italic">natural</span> and <span class="condensed_italic">human systems</span>, where <span class="condensed_italic">risks</span> result from the interactions of <span class="condensed_italic">climate</span>-related <span class="condensed_italic">hazards</span> (including <span class="condensed_italic">extreme weather/climate events</span>), <span class="condensed_italic">exposure</span>, and <span class="condensed_italic">vulnerability</span>. <span class="condensed_italic">Impacts</span> generally refer to effects on lives,<span class="condensed_italic"> livelihoods</span>, <span class="condensed_italic">health</span> and <span class="condensed_italic">well-being</span>, <span class="condensed_italic">ecosystems</span> and species, economic, social and cultural assets, services (including <span class="condensed_italic">ecosystem services</span>) and <span class="condensed_italic">infrastructure</span>. <span class="condensed_italic">Impacts</span> may be referred to as consequences or outcomes, and can be adverse or beneficial. See also <span class="condensed_italic">Adaptation</span>,<span class="condensed_italic"> Exposure</span>,<span class="condensed_italic"> Loss and Damage, and losses and damages</span>,<span class="condensed_italic"> Vulnerability</span> and <span class="condensed_italic">Risk</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Income</p>
                            <p class="Annex_Glossary_body" lang="en-US">The maximum amount that a household, or other unit, can consume without reducing its real net worth. Total <span class="condensed_italic">income</span> is the broadest measure of <span class="condensed_italic">income</span> and refers to regular receipts such as wages and salaries, <span class="condensed_italic">income</span> from self-employment, interest and dividends from invested funds, pensions or other benefits from social <span class="condensed_italic">insurance</span>, and other current transfers receivable. OECD (2003).</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Incremental adaptation</p>
                            <p class="Annex_Glossary_body" lang="en-US">See <span class="condensed_italic">Adaptation</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Indigenous knowledge (IK)</p>
                            <p class="Annex_Glossary_body" lang="en-US">The understandings, skills and philosophies developed by societies with long histories of interaction with their natural surroundings. For many indigenous peoples, IK informs decision-making about fundamental aspects of life, from day-to-day activities to longer-term actions. This knowledge is integral to cultural complexes, which also encompass language, systems of classification, resource use practices, social interactions, values, ritual and spirituality. These distinctive ways of knowing are important facets of the world&#8217;s cultural diversity (UNESCO, 2018). See also <span class="condensed_italic">Local knowledge</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Indigenous Peoples</p>
                            <p class="Annex_Glossary_body" lang="en-US">Indigenous Peoples and Nations are those that, having a historical continuity with pre-invasion and pre-colonial societies that developed on their territories, consider themselves distinct from other sectors of the societies now prevailing on those territories, or parts of them. They form at present principally non-dominant sectors of society and are often determined to preserve, develop and transmit to future generations their ancestral territories, and their ethnic identity, as the basis of their continued existence as Peoples, in accordance with their own cultural patterns, social <span class="condensed_italic">institutions</span> and common law system. Cobo (1987)</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Indirect land-use change (iLUC)</p>
                            <p class="Annex_Glossary_body" lang="en-US">See<span class="condensed_italic"> Land-use change</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Inequality</p>
                            <p class="Annex_Glossary_body" lang="en-US">See <span class="condensed_italic">Equality</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Informal settlement</p>
                            <p class="Annex_Glossary_body" lang="en-US">A term given to <span class="condensed_italic">settlements</span> or residential areas that, by at least one criterion, fall outside official rules and <span class="condensed_italic">regulations</span>. Most <span class="condensed_italic">informal settlements</span> have poor housing (with widespread use of temporary materials) and are developed on <span class="condensed_italic">land</span> that is occupied illegally with high levels of overcrowding. In most such <span class="condensed_italic">settlements</span>, provision for safe water, sanitation, <span class="condensed_italic">drainage</span>, paved roads and basic services is inadequate or lacking. The term &#8216;slum&#8217; is often used for <span class="condensed_italic">informal settlements</span>, although it is misleading as many <span class="condensed_italic">informal settlements</span> develop into good-quality residential areas, especially where governments support such development.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Infrastructure</p>
                            <p class="Annex_Glossary_body" lang="en-US">The designed and built set of physical systems and corresponding institutional arrangements that mediate between people, their communities and the broader environment to provide services that support economic growth, <span class="condensed_italic">health</span>, quality of life and safety (Chester, 2019; Dawson et&#160;al., 2018) There are four categories of <span class="condensed_italic">infrastructure</span>:</p>
                            <p class="Annex_Glossary_subhead" lang="en-US">Blue infrastructure</p>
                            <p class="Annex_Glossary_body-indent" lang="en-US"><span class="condensed_italic">Blue infrastructure</span> includes bodies of water, watercourses, ponds, lakes and storm <span class="condensed_italic">drainage</span>, that provide ecological and hydrological functions including <span class="condensed_italic">evaporation</span>, transpiration, <span class="condensed_italic">drainage</span>, infiltration and temporarily storage of <span class="condensed_italic">runoff</span> and discharge.</p>
                            <p class="Annex_Glossary_subhead" lang="en-US">Green infrastructure</p>
                            <p class="Annex_Glossary_body-indent" lang="en-US">The strategically planned interconnected set of natural and constructed ecological systems, green spaces and other landscape features that can provide functions and services including air and water purification, temperature management, floodwater management and coastal defence often with <span class="condensed_italic">co-benefits</span> for human and ecological <span class="condensed_italic">well-being</span>. <span class="condensed_italic">Green infrastructure</span> includes planted and remnant native vegetation, soils, wetlands, parks and green open spaces, as well as building and street-level design interventions that incorporate vegetation (after Culwick and Bobbins, 2016).</p>
                            <p class="Annex_Glossary_subhead" lang="en-US">Grey infrastructure</p>
                            <p class="Annex_Glossary_body-indent" lang="en-US">Engineered physical components and networks of pipes, wires, roads and tracks that underpin energy, transport, communications (including digital), built form, water and sanitation, and solid-waste management systems.</p>
                            <p class="Annex_Glossary_subhead" lang="en-US">Social infrastructure</p>
                            <p class="Annex_Glossary_body-indent" lang="en-US">The social, cultural and financial activities and <span class="condensed_italic">institutions</span> as well as associated property, buildings and artefacts and <span class="condensed_italic">policy</span> domains such as <span class="condensed_italic">social protection</span>, <span class="condensed_italic">health</span> and education that support <span class="condensed_italic">well-being</span> and public life (Frolova et&#160;al., 2016; Latham and Layton, 2019).</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Institutional capacity</p>
                            <p class="Annex_Glossary_body" lang="en-US">Building and strengthening individual organisations and providing technical and management training to support integrated planning and decision-making processes between organisations and people, as well as empowerment, social capital and an enabling environment, including culture, values and power relations (Willems and Baumert, 2003).</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Institutions</p>
                            <p class="Annex_Glossary_body" lang="en-US">Rules, norms and conventions that guide, constrain or enable human behaviours and practices. <span class="condensed_italic">Institutions</span> can be formally established, for instance through laws and <span class="condensed_italic">regulations</span>, or informally established, for instance by traditions or customs. <span class="condensed_italic">Institutions</span> may spur, hinder, strengthen, weaken or distort the emergence, adoption and implementation of <span class="condensed_italic">climate</span> action and <span class="condensed_italic">climate governance</span>.</p>
                            <p class="Annex_Glossary_body" lang="en-US">[Note: <span class="condensed_italic">Institutions</span> can also refer to a large organisation]</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Insurance/reinsurance</p>
                            <p class="Annex_Glossary_body" lang="en-US">A family of financial instruments for sharing and transferring <span class="condensed_italic">risk</span> among a pool of at-<span class="condensed_italic">risk</span> households, businesses and/or governments.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Integrated assessment</p>
                            <p class="Annex_Glossary_body" lang="en-US">A method of analysis that combines results and <span class="condensed_italic">models</span> from the physical, biological, economic and social sciences and the interactions among these components in a consistent framework to evaluate the status and consequences of environmental change and the <span class="condensed_italic">policy</span> responses to it.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Integrated assessment model (IAM)</p>
