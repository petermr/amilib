                        <div class="gx-3 gy-5 ps-2 row">

                            <p class="Annex_Glossary_definitions" lang="en-US">(Internal) Displacement (of humans)</p>
                            <p class="Annex_Glossary_body" lang="en-US">The involuntary movement, individually or collectively, of persons from their country or community, notably for reasons of armed conflict, civil unrest, or natural or human-made disasters (adapted from IOM, 2011).</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">2030 Agenda for Sustainable Development</p>
                            <p class="Annex_Glossary_body" lang="en-US">A UN resolution in September 2015 adopting a plan of action for people, planet and prosperity in a new global development framework anchored in 17 <span class="condensed_italic">Sustainable Development Goals</span> (UN, 2015).</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Abrupt change</p>
                            <p class="Annex_Glossary_body" lang="en-US">A change in the system that is substantially faster than the typical rate of the changes in its history. See also <span class="condensed_italic">Abrupt climate change</span> and<span class="condensed_italic"> Tipping point</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Abrupt climate change</p>
                            <p class="Annex_Glossary_body" lang="en-US">A large-scale <span class="condensed_italic">abrupt change</span> in the <span class="condensed_italic">climate system</span> that takes place over a few decades or less, persists (or is anticipated to persist) for at least a few decades and causes substantial <span class="condensed_italic">impacts</span> in <span class="condensed_italic">human </span>and/or<span class="condensed_italic"> natural systems</span>. See also <span class="condensed_italic">Tipping point</span> and <span class="condensed_italic">Abrupt change</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Access to food</p>
                            <p class="Annex_Glossary_body" lang="en-US">See <span class="condensed_italic">Access </span>under <span class="condensed_italic">Food security</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Acclimatisation</p>
                            <p class="Annex_Glossary_body" lang="en-US">A change in functional or morphological traits occurring once or repeatedly (e.g., seasonally) during the lifetime of an individual organism in its natural environment. Through <span class="condensed_italic">acclimatisation</span>, the individual maintains performance across a range of environmental conditions. For a clear differentiation between findings in laboratory and field studies, the term &#8216;acclimation&#8217; is used in ecophysiology for the respective phenomena when observed in well-defined experimental settings. The term &#8216;(adaptive) <span class="condensed_italic">plasticity</span>&#8217; characterises the generally limited scope of changes in phenotype that an individual can reach through the process of <span class="condensed_italic">acclimatisation</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Accumulation (of glaciers, ice sheets or snow cover)</p>
                            <p class="Annex_Glossary_body" lang="en-US">All processes that add to the mass of a <span class="condensed_italic">glacier</span>, an <span class="condensed_italic">ice sheet</span>, or snow cover. The main process of <span class="condensed_italic">accumulation</span> is snowfall. <span class="condensed_italic">Accumulation</span> also includes deposition of hoar, freezing rain, other types of solid precipitation, gain of wind-blown snow, avalanching and basal accumulation (often beneath floating ice).</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Acute food insecurity</p>
                            <p class="Annex_Glossary_body" lang="en-US">Acute food insecurity is a situation which can occur at any time with a severity that threatens lives, livelihoods or both, regardless of the causes, context or duration, as a result of shocks risking determinants of food security and nutrition, and used to assess the need for humanitarian action (IPC Global Partners, 2019).</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Adaptation</p>
                            <p class="Annex_Glossary_body" lang="en-US">In <span class="condensed_italic">human systems</span>, the process of adjustment to actual or expected <span class="condensed_italic">climate</span> and its effects, in order to moderate harm or exploit beneficial opportunities. In <span class="condensed_italic">natural systems</span>, the process of adjustment to actual <span class="condensed_italic">climate</span> and its effects; human intervention may facilitate adjustment to expected <span class="condensed_italic">climate</span> and its effects. See also <span class="condensed_italic">Adaptation options</span>,<span class="condensed_italic"> Adaptive capacity </span>and <span class="condensed_italic">Maladaptive actions (Maladaptation)</span>.</p>
                            <p class="Annex_Glossary_subhead" lang="en-US">Adaptation deficit</p>
                            <p class="Annex_Glossary_body-indent" lang="en-US">The gap between the current state of a system and a state that minimises adverse <span class="condensed_italic">impacts</span> from existing <span class="condensed_italic">climate</span> conditions and variability.</p>
                            <p class="Annex_Glossary_subhead" lang="en-US">Adaptation gap</p>
                            <p class="Annex_Glossary_body-indent" lang="en-US">The difference between actually implemented <span class="condensed_italic">adaptation</span> and a societally set goal, determined largely by preferences related to tolerated climate change impacts and reflecting resource limitations and competing priorities (UNEP, 2014; UNEP, 2018).</p>
                            <p class="Annex_Glossary_subhead" lang="en-US">Adaptation limits</p>
                            <p class="Annex_Glossary_body-indent" lang="en-US">The point at which an actor&#8217;s objectives (or system needs) cannot be secured from intolerable risks through adaptive actions.</p>
                            <ul>
                              <li class="Annex_Glossary_list" lang="en-GB">Hard adaptation limit &#8211; No adaptive actions are possible to avoid intolerable risks.</li>
                              <li class="Annex_Glossary_list" lang="en-GB">Soft adaptation limit &#8211; Options may exist but are currently not available to avoid intolerable risks through adaptive action.</li>
                            </ul>
                            <p class="Annex_Glossary_subhead" lang="en-US">Adaptation needs</p>
                            <p class="Annex_Glossary_body-indent" lang="en-US">The circumstances requiring action to ensure the safety of populations and the security of assets in response to <span class="condensed_italic">climate impacts</span>.</p>
                            <p class="Annex_Glossary_subhead" lang="en-US">Adaptation options</p>
                            <p class="Annex_Glossary_body-indent" lang="en-US">The array of strategies and measures that are available and appropriate for addressing <span class="condensed_italic">adaptation</span>. They include a wide range of actions that can be categorised as structural, institutional, ecological or behavioural.</p>
                            <p class="Annex_Glossary_subhead" lang="en-US">Autonomous adaptation</p>
                            <p class="Annex_Glossary_body-indent" lang="en-US"><span class="condensed_italic">Adaptation</span> in response to experienced <span class="condensed_italic">climate</span> and its effects, without planning explicitly or consciously focused on addressing <span class="condensed_italic">climate</span> change. Also referred to as spontaneous <span class="condensed_italic">adaptation</span>.</p>
                            <p class="Annex_Glossary_subhead" lang="en-US">Community-based adaptation</p>
                            <p class="Annex_Glossary_body-indent" lang="en-US">Local, community-driven <span class="condensed_italic">adaptation</span>. <span class="condensed_italic">Community-based adaptation</span> focuses attention on empowering and promoting the adaptive capacity of communities. It is an approach that takes context, culture, knowledge, agency and preferences of communities as strengths.</p>
                            <p class="Annex_Glossary_subhead" lang="en-US">Ecosystem-based adaptation (EBA)</p>
                            <p class="Annex_Glossary_body-indent" lang="en-US">The use of <span class="condensed_italic">ecosystem</span> management activities to increase the <span class="condensed_italic">resilience</span> and reduce the <span class="condensed_italic">vulnerability</span> of people and <span class="condensed_italic">ecosystems</span> to <span class="condensed_italic">climate change</span> (Campbell et&#160;al., 2009). See also <span class="condensed_italic">Nature-based solution (NBS)</span>.</p>
                            <p class="Annex_Glossary_subhead" lang="en-US">Evolutionary adaptation</p>
                            <p class="Annex_Glossary_body-indent" lang="en-US">The process whereby a species or population becomes better able to live in a changing environment through the selection of heritable traits. Biologists usually distinguish <span class="condensed_italic">evolutionary adaptation</span> from <span class="condensed_italic">acclimatisation</span>, with the latter occurring within an organism&#8217;s lifetime.</p>
                            <p class="Annex_Glossary_subhead" lang="en-US">
                              <span class="bold_condensed_italic">Incremental adaptation</span>
                            </p>
                            <p class="Annex_Glossary_body-indent" lang="en-US"><span class="condensed_italic">Adaptation</span> that maintains the essence and integrity of a system or process at a given scale (Park et&#160;al., 2012). In some cases, <span class="condensed_italic">incremental adaptation</span> can accrue to result in <span class="condensed_italic">transformational adaptation</span> (T&#224;bara et&#160;al., 2018; Termeer et&#160;al., 2017). Incremental <span class="condensed_italic">adaptations</span> to change in <span class="condensed_italic">climate</span> are understood as extensions of actions and behaviours that already reduce the losses or enhance the benefits of natural variations in <span class="condensed_italic">extreme weather/climate events</span>.</p>
                            <p class="Annex_Glossary_subhead" lang="en-US">Transformational adaptation</p>
                            <p class="Annex_Glossary_body-indent" lang="en-US"><span class="condensed_italic">Adaptation</span> that changes the fundamental attributes of a <span class="condensed_italic">social-ecological system</span> in anticipation of <span class="condensed_italic">climate</span> change and its <span class="condensed_italic">impacts</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Adaptation Fund</p>
                            <p class="Annex_Glossary_body" lang="en-US">A Fund established under the Kyoto Protocol in 2001 and officially launched in 2007. The Fund finances <span class="condensed_italic">adaptation</span> projects and programmes in <span class="condensed_italic">developing countries</span> that are Parties to the Kyoto Protocol. Financing comes mainly from sales of Certified Emissions Reductions (CERs) and a share of proceeds amounting to 2% of the value of CERs issued each year for Clean Development Mechanism (CDM) projects. The Adaptation Fund can also receive funds from governments, the private sector and individuals.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Adaptation limits</p>
                            <p class="Annex_Glossary_body" lang="en-US">See <span class="condensed_italic">Adaptation</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Adaptation needs</p>
                            <p class="Annex_Glossary_body" lang="en-US">See <span class="condensed_italic">Adaptation</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Adaptation options</p>
                            <p class="Annex_Glossary_body" lang="en-US">See <span class="condensed_italic">Adaptation</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Adaptation pathways</p>
                            <p class="Annex_Glossary_body" lang="en-US">See <span class="condensed_italic">Pathways</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Adaptive capacity</p>
                            <p class="Annex_Glossary_body" lang="en-US">The ability of systems, <span class="condensed_italic">institutions</span>, humans and other organisms to adjust to potential damage, to take advantage of opportunities or to respond to consequences (MA, 2005).</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Adaptive governance</p>
                            <p class="Annex_Glossary_body" lang="en-US">See <span class="condensed_italic">Governance</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Adaptive management</p>
                            <p class="Annex_Glossary_body" lang="en-US">A process of iteratively planning, implementing and modifying strategies for managing resources in the face of <span class="condensed_italic">uncertainty</span> and change. Adaptive management involves adjusting approaches in response to observations of their effect on, and changes in, the system brought on by resulting feedback effects and other variables.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Adverse side-effect</p>
                            <p class="Annex_Glossary_body" lang="en-US">A negative effect that a <span class="condensed_italic">policy</span> or measure aimed at one objective has on another objective, thereby potentially reducing the net benefit to society or the environment. See also <span class="condensed_italic">Trade-off</span> and<span class="condensed_italic"> Co-benefit</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Aerosol</p>
                            <p class="Annex_Glossary_body" lang="en-US">A suspension of airborne solid or liquid particles, with typical particle size in the range of a few nanometres to several tens of micrometres and <span class="condensed_italic">atmospheric lifetimes</span> of up to several days in the <span class="condensed_italic">troposphere</span> and up to years in the <span class="condensed_italic">stratosphere</span>. The term aerosol, which includes both the particles and the suspending gas, is often used in this report in its plural form to mean &#8216;aerosol particles&#8217;. Aerosols may be of either natural or <span class="condensed_italic">anthropogenic</span> origin in the troposphere; stratospheric aerosols mostly stem from volcanic eruptions. Aerosols can cause an <span class="condensed_italic">effective radiative forcing</span> directly through scattering and absorbing radiation (<span class="condensed_italic">aerosol&#8211;radiation interaction</span>), and indirectly by acting as <span class="condensed_italic">cloud condensation nuclei</span> or ice nucleating particles that affect the properties of clouds (<span class="condensed_italic">aerosol&#8211;cloud interaction</span>), and upon deposition on snow- or ice-covered surfaces. Atmospheric aerosols may be either emitted as primary particulate matter or formed within the atmosphere from gaseous <span class="condensed_italic">precursors</span> (secondary production). Aerosols may be composed of sea salt, organic carbon, <span class="condensed_italic">black carbon (BC)</span>, mineral species (mainly desert dust), sulphate, nitrate and ammonium or their mixtures. See also <span class="condensed_italic">Particulate matter (PM)</span> and <span class="condensed_italic">Short-lived climate forcers (SLCFs)</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Afforestation</p>
                            <p class="Annex_Glossary_body" lang="en-US">Conversion to <span class="condensed_italic">forest</span> of <span class="condensed_italic">land</span> that historically has not contained <span class="condensed_italic">forests</span>. See also <span class="condensed_italic">Deforestation</span>.</p>
                            <p class="Annex_Glossary_body" lang="en-US">[Note: For a discussion of the term <span class="condensed_italic">forest</span> and related terms such as <span class="condensed_italic">afforestation</span>, <span class="condensed_italic">reforestation</span> and <span class="condensed_italic">deforestation</span>, see the 2006 IPCC Guidelines for National Greenhouse Gas Inventories and their 2019 Refinement, and information provided by the United Nations Framework Convention on Climate Change (IPCC 2006, 2019; UNFCCC 2021a, 2021b)]</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Agreement</p>
                            <p class="Annex_Glossary_body" lang="en-US">In this report, the degree of <span class="condensed_italic">agreement</span> within the scientific body of knowledge on a particular finding is assessed based on multiple lines of <span class="condensed_italic">evidence</span> (e.g., mechanistic understanding, theory, data, <span class="condensed_italic">models</span>, expert judgement) and expressed qualitatively (Mastrandrea et&#160;al., 2010). See also <span class="condensed_italic">Confidence</span>,<span class="condensed_italic"> Evidence</span>,<span class="condensed_italic"> Likelihood </span>and<span class="condensed_italic"> Uncertainty</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Agricultural and ecological drought</p>
                            <p class="Annex_Glossary_body" lang="en-US">See <span class="condensed_italic">Drought</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Agroecology</p>
                            <p class="Annex_Glossary_body" lang="en-US">The science and practice of applying ecological concepts, principles and knowledge (i.e., the interactions of, and explanations for, the diversity, abundance and activities of organisms) to the study, design and management of sustainable agroecosystems. It includes the roles of human beings as a central organism in <span class="condensed_italic">agroecology</span> by way of social and economic processes in farming systems. <span class="condensed_italic">Agroecology</span> examines the roles and interactions among all relevant biophysical, technical and socioeconomic components of farming systems and their surrounding landscapes (IPBES, 2019).</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Agroforestry</p>
                            <p class="Annex_Glossary_body" lang="en-US">Collective name for <span class="condensed_italic">land</span>-<span class="condensed_italic">use</span> systems and technologies where woody perennials (trees, shrubs, palms, bamboos, etc.) are deliberately used on the same <span class="condensed_italic">land</span>-management units as agricultural crops and/or animals, in some form of spatial arrangement or temporal sequence. In agroforestry systems, there are both ecological and economical interactions between the different components. Agroforestry can also be defined as a dynamic, ecologically based, natural resource management system that, through the integration of trees on farms and in the agricultural landscape, diversifies and sustains production for increased social, economic and environmental benefits for <span class="condensed_italic">land</span> users at all levels (FAO, 2015a).</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Air pollution</p>
                            <p class="Annex_Glossary_body" lang="en-US">Degradation of air quality with negative effects on human <span class="condensed_italic">health</span> or the natural or built environment due to the introduction, by natural processes or human activity, into the <span class="condensed_italic">atmosphere</span> of substances (gases, <span class="condensed_italic">aerosols</span>) which have a direct (primary pollutants) or indirect (secondary pollutants) harmful effect.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Albedo</p>
                            <p class="Annex_Glossary_body" lang="en-US">The proportion of sunlight (solar radiation) reflected by a surface or object, often expressed as a percentage. Clouds, snow and ice usually have high <span class="condensed_italic">albedo</span>; soil surfaces cover the <span class="condensed_italic">albedo</span> range from high to low; vegetation in the dry season and/or in <span class="condensed_italic">arid zones</span> can have high <span class="condensed_italic">albedo</span>, whereas photosynthetically active vegetation and the <span class="condensed_italic">ocean</span> have low <span class="condensed_italic">albedo</span>. The Earth&#8217;s planetary <span class="condensed_italic">albedo</span> changes mainly through changes in cloudiness, snow, ice, leaf area and <span class="condensed_italic">land cover</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Anomaly</p>
                            <p class="Annex_Glossary_body" lang="en-US">The deviation of a variable from its value averaged over a <span class="condensed_italic">reference period</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Anthropocene</p>
                            <p class="Annex_Glossary_body" lang="en-US">A proposed new geological epoch resulting from significant human-driven changes to the structure and functioning of the Earth system, including the <span class="condensed_italic">climate system</span>. Originally proposed in the Earth System science community in 2000, the proposed new epoch is undergoing a formalisation process within the geological community based on the stratigraphic <span class="condensed_italic">evidence</span> that human activities have changed the Earth System to the extent of forming geological deposits with a signature that is distinct from those of the Holocene, and which will remain in the geological record. Both the stratigraphic and Earth system approaches to defining the <span class="condensed_italic">Anthropocene</span> consider the mid-20th century to be the most appropriate starting date (Steffen et&#160;al., 2016), although others have been proposed and continue to be discussed. The <span class="condensed_italic">Anthropocene</span> concept has already been informally adopted by diverse disciplines and the public to denote the substantive influence of humans on the Earth system.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Anthropogenic</p>
                            <p class="Annex_Glossary_body" lang="en-US">Resulting from or produced by human activities.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Anthropogenic emissions</p>
                            <p class="Annex_Glossary_body" lang="en-US">See <span class="condensed_italic">Emissions</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Anthropogenic subsidence</p>
                            <p class="Annex_Glossary_body" lang="en-US">Downward motion of the <span class="condensed_italic">land</span> surface induced by <span class="condensed_italic">anthropogenic drivers</span> (e.g., loading, extraction of hydrocarbons and/or groundwater, <span class="condensed_italic">drainage</span> and mining activities) causing sediment compaction or subsidence/deformation of the sedimentary sequence, or oxidation of organic material, thereby leading to relative <span class="condensed_italic">sea level rise</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Arid zone</p>
                            <p class="Annex_Glossary_body" lang="en-US">Areas where vegetation growth is severely constrained due to limited water availability. For the most part, the native vegetation of <span class="condensed_italic">arid zones</span> is sparse. There is high rainfall variability, with annual averages below 300&#160;mm. Crop farming in <span class="condensed_italic">arid zones</span> requires irrigation.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Aridity</p>
                            <p class="Annex_Glossary_body" lang="en-US">The state of a long-term climatic feature characterised by low average precipitation or available water in a <span class="condensed_italic">region</span>. <span class="condensed_italic">Aridity</span> generally arises from widespread persistent <span class="condensed_italic">atmospheric</span> subsidence or anticyclonic conditions, and from more localised subsidence in the lee side of mountains (adapted from Ogallo and Gbeckor-Kove, 1989). See also <span class="condensed_italic">Drought</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Atmosphere</p>
                            <p class="Annex_Glossary_body" lang="en-US">The gaseous envelope surrounding the Earth, divided into five layers: the troposphere, which contains half of the Earth&#8217;s <span class="condensed_italic">atmosphere</span>, the stratosphere, the mesosphere, the thermosphere and the exosphere, which is the outer limit of the <span class="condensed_italic">atmosphere</span>. The dry <span class="condensed_italic">atmosphere</span> consists almost entirely of nitrogen (78.1% volume mixing ratio) and oxygen (20.9% volume mixing ratio), together with a number of trace gases such as argon (0.93% volume mixing ratio), helium and radiatively active <span class="condensed_italic">greenhouse gases (GHGs)</span> such as <span class="condensed_italic">carbon dioxide (CO</span><span class="subscript_italic-blue _idGenCharOverride-1">2</span><span class="condensed_italic">)</span> (0.04% volume mixing ratio) methane (CH4), nitrous oxide (N2O) and <span class="condensed_italic">ozone (O</span><span class="subscript_italic-blue _idGenCharOverride-1">3</span><span class="condensed_italic">)</span>. In addition, the <span class="condensed_italic">atmosphere</span> contains the GHG water vapour (H<span class="subscript _idGenCharOverride-1">2</span>O), whose concentrations are highly variable (0&#8211;5% volume mixing ratio) as the sources (evapotranspiration) and sinks (precipitation) of water vapour show large spatio-temporal variations, and atmospheric temperature exerts a strong constraint on the amount of water vapour an air parcel can hold.. The <span class="condensed_italic">atmosphere</span> also contains clouds and <span class="condensed_italic">aerosols</span>. See also <span class="condensed_italic">Hydrological cycle</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Attribution</p>
                            <p class="Annex_Glossary_body" lang="en-US"><span class="condensed_italic">Attribution</span> is defined as the process of evaluating the relative contributions of multiple causal factors to a change or event with an assessment of <span class="condensed_italic">confidence</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Autonomous adaptation</p>
                            <p class="Annex_Glossary_body" lang="en-US">See <span class="condensed_italic">Adaptation</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Avalanche</p>
                            <p class="Annex_Glossary_body" lang="en-US">A mass of snow, ice, earth or rocks, or a mixture of these, falling down a mountainside.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Baseline scenario</p>
                            <p class="Annex_Glossary_body" lang="en-US">see <span class="condensed_italic">Reference scenario</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Behavioural change</p>
                            <p class="Annex_Glossary_body" lang="en-US">In this report, <span class="condensed_italic">behavioural change</span> refers to alteration of human decisions and actions in ways that mitigate <span class="condensed_italic">climate</span> change and/or reduce negative consequences of <span class="condensed_italic">climate change impacts</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Benthic</p>
                            <p class="Annex_Glossary_body" lang="en-US">Occurring at the bottom of a body of water; related to <span class="condensed_italic">benthos</span> (NOAA, 2018). See also <span class="condensed_italic">Benthos</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Benthos</p>
                            <p class="Annex_Glossary_body" lang="en-US">The community of organisms living on the bottom or in sediments of a body of water (such as an <span class="condensed_italic">ocean</span>, a river or a lake). The ecological zone at the bottom of a body of water, including the sediment surface and some subsurface layers, is known as the <span class="condensed_italic">benthic</span> zone.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Beta diversity</p>
                            <p class="Annex_Glossary_body" lang="en-US">The change in species composition between different areas (spatial turnover) or times (temporal turnover) due to habitat and environmental heterogeneity</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Biodiversity</p>
                            <p class="Annex_Glossary_body" lang="en-US"><span class="condensed_italic">Biodiversity</span> or biological diversity means the variability among living organisms from all sources including, among other things, terrestrial, marine and other aquatic <span class="condensed_italic">ecosystems</span>, and the ecological complexes of which they are part; this includes diversity within species, between species and of <span class="condensed_italic">ecosystems</span> (UN, 1992). See also <span class="condensed_italic">Ecosystem </span>and<span class="condensed_italic"> Ecosystem services</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Biodiversity hotspots</p>
                            <p class="Annex_Glossary_body" lang="en-US"><span class="condensed_italic">Biodiversity hotspots</span> are geographic areas exceptionally rich in species, ecologically distinct, and often contain geographically rare <span class="condensed_italic">endemic species</span>. They are thus priorities for nature conservation action.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Bioenergy</p>
                            <p class="Annex_Glossary_body" lang="en-US">Energy derived from any form of <span class="condensed_italic">biomass</span> or its metabolic by-products. See also <span class="condensed_italic">Biofuel </span>and<span class="condensed_italic"> Biomass</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Biofuel</p>
                            <p class="Annex_Glossary_body" lang="en-US">A fuel, generally in liquid form, produced from <span class="condensed_italic">biomass</span>. <span class="condensed_italic">Biofuels</span> include bioethanol from sugarcane, sugar beet or maize and biodiesel from canola or soybeans. See also <span class="condensed_italic">Bioenergy</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Biomass</p>
                            <p class="Annex_Glossary_body" lang="en-US">Organic material excluding the material that is fossilised or embedded in geological formations. <span class="condensed_italic">Biomass</span> may refer to the mass of organic matter in a specific area (ISO, 2014). See also <span class="condensed_italic">Bioenergy </span>and<span class="condensed_italic"> Biofuel</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Biomes</p>
                            <p class="Annex_Glossary_body" lang="en-US">Global-scale zones, generally defined by the type of plant life that they support in response to average rainfall and temperature patterns. For example, <span class="condensed_italic">tundra</span>, <span class="condensed_italic">coral reefs</span> or savannas (IPBES, 2019).</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Biosphere (terrestrial and marine)</p>
                            <p class="Annex_Glossary_body" lang="en-US">The part of the Earth system comprising all <span class="condensed_italic">ecosystems</span> and living organisms, in the <span class="condensed_italic">atmosphere</span>, on <span class="condensed_italic">land</span> (<span class="condensed_italic">terrestrial biosphere</span>) or in the <span class="condensed_italic">oceans</span> (<span class="condensed_italic">marine biosphere</span>), including derived dead organic matter, such as litter, <span class="condensed_italic">soil organic matter</span> and oceanic detritus.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Blue carbon</p>
                            <p class="Annex_Glossary_body" lang="en-US">Biologically driven carbon <span class="condensed_italic">fluxes</span> and storage in marine systems that are amenable to management. Coastal <span class="condensed_italic">blue carbon</span> focuses on rooted vegetation in the coastal zone, such as tidal marshes, mangroves and seagrasses. These <span class="condensed_italic">ecosystems</span> have high carbon burial rates on a per unit area basis and accumulate carbon in their soils and sediments. They provide many non-climatic benefits and can contribute to <span class="condensed_italic">ecosystem-based adaptation</span>. If degraded or lost, coastal <span class="condensed_italic">blue carbon ecosystems</span> are likely to release most of their carbon back to the <span class="condensed_italic">atmosphere</span>. There is current debate regarding the application of the <span class="condensed_italic">blue carbon</span> concept to other coastal and non-coastal processes and <span class="condensed_italic">ecosystems</span>, including the open <span class="condensed_italic">ocean</span>. See also <span class="condensed_italic">Ecosystem services </span>and<span class="condensed_italic"> Sequestration</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Blue infrastructure</p>
                            <p class="Annex_Glossary_body" lang="en-US">See <span class="condensed_italic">Infrastructure</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Burden</p>
                            <p class="Annex_Glossary_body" lang="en-US">The total mass of a gaseous substance of concern in the <span class="condensed_italic">atmosphere</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Business-As-Usual (BAU)</p>
                            <p class="Annex_Glossary_body" lang="en-US">The term <span class="condensed_italic">Business-As-Usual</span> scenario has been used to describe a scenario that assumes no additional <span class="condensed_italic">policies</span> beyond those currently in place and that patterns of socio-economic development are consistent with recent trends. The term is now used less frequently than in the past. See also <span class="condensed_italic">Reference scenario</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Calcification</p>
                            <p class="Annex_Glossary_body" lang="en-US">The process of biologically precipitating calcium carbonate minerals to create organism shells, skeletons, otoliths or other body structures. The chemical equation describing <span class="condensed_italic">calcification</span> is Ca<span class="superscript _idGenCharOverride-1">2+</span>(aq) + 2HCO<span class="superscript _idGenCharOverride-1">3&#8722;</span>(aq) <span class="glyphe-CambriaMath">&#8594;</span> CaCO<span class="subscript _idGenCharOverride-1">3</span>(s) + CO<span class="subscript _idGenCharOverride-1">2</span> + H<span class="subscript _idGenCharOverride-1">2</span>O. Aragonite and calcite are two common crystalline forms of biologically precipitated calcium carbonate minerals that have different solubilities.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Capacity building</p>
                            <p class="Annex_Glossary_body" lang="en-US">The practice of enhancing the strengths and attributes of, and resources available to, an individual, community, society or organisation to respond to change.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">
                              <span class="bold_condensed" lang="en-GB">Carbon dioxide (CO</span>
                              <span class="bold_condensed-subscript _idGenCharOverride-1" lang="en-GB">2</span>
                              <span class="bold_condensed" lang="en-GB">)</span>
                            </p>
                            <p class="Annex_Glossary_body" lang="en-US">A naturally occurring gas, CO<span class="subscript _idGenCharOverride-1">2</span> is also a by-product of burning <span class="condensed_italic">fossil fuels</span> (such as oil, gas and coal), of burning <span class="condensed_italic">biomass</span>, of <span class="condensed_italic">land-use changes (LUC)</span> and of industrial processes (e.g., cement production). It is the principal <span class="condensed_italic">anthropogenic greenhouse gas (GHG)</span> that affects the Earth&#8217;s radiative balance. It is the reference gas against which other GHGs are measured and therefore has a <span class="condensed_italic">global warming</span> potential (GWP) of 1.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">
                              <span class="bold_condensed" lang="en-GB">Carbon dioxide (CO</span>
                              <span class="bold_condensed-subscript _idGenCharOverride-1" lang="en-GB">2</span>
                              <span class="bold_condensed" lang="en-GB">) fertilisation</span>
                            </p>
                            <p class="Annex_Glossary_body" lang="en-US">The increase of plant <span class="condensed_italic">photosynthesis</span> and <span class="condensed_italic">water-use efficiency</span> in response to increased atmospheric <span class="condensed_italic">carbon dioxide (CO</span><span class="subscript_italic-blue _idGenCharOverride-1">2</span><span class="condensed_italic">)</span> concentration. Whether this increased <span class="condensed_italic">photosynthesis</span> translates into increased plant growth and carbon storage on <span class="condensed_italic">land</span> depends on the interacting effects of temperature, moisture and nutrient availability.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Carbon dioxide removal (CDR)</p>
                            <p class="Annex_Glossary_body" lang="en-US"><span class="condensed_italic">Anthropogenic</span> activities removing <span class="condensed_italic">carbon dioxide (CO</span><span class="subscript_italic-blue CharOverride-1">2</span><span class="condensed_italic">) </span>from the <span class="condensed_italic">atmosphere </span>and durably storing it in geological, terrestrial or <span class="condensed_italic">ocean reservoirs</span>, or in products. It includes existing and potential <span class="condensed_italic">anthropogenic</span> enhancement of biological or geochemical CO<span class="subscript CharOverride-1">2</span> <span class="condensed_italic">sinks</span> and direct air <span class="condensed_italic">carbon dioxide</span> capture and storage (DACCS) but excludes natural CO<span class="subscript CharOverride-1">2</span> <span class="condensed_italic">uptake </span>not directly caused by human activities. See also <span class="condensed_italic">Afforestation</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Carbon footprint</p>
                            <p class="Annex_Glossary_body" lang="en-US">Measure of the exclusive total amount of <span class="condensed_italic">emissions</span> of <span class="condensed_italic">carbon dioxide (CO</span><span class="subscript_italic-blue _idGenCharOverride-1">2</span><span class="condensed_italic">)</span> that is directly and indirectly caused by an activity or accumulated over the life stages of a product (Wiedmann and Minx, 2008).</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Carbon stock</p>
                            <p class="Annex_Glossary_body" lang="en-US">The quantity of carbon in a carbon pool.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Cascading impacts</p>
                            <p class="Annex_Glossary_body" lang="en-US"><span class="condensed_italic">Cascading impacts</span> from <span class="condensed_italic">extreme weather/climate events</span> occur when an extreme <span class="condensed_italic">hazard</span> generates a sequence of secondary events in natural and <span class="condensed_italic">human systems</span> that result in physical, natural, social or economic disruption, whereby the resulting <span class="condensed_italic">impact</span> is significantly larger than the initial <span class="condensed_italic">impact</span>. <span class="condensed_italic">Cascading impacts</span> are complex and multi-dimensional, and are associated more with the magnitude of <span class="condensed_italic">vulnerability</span> than with that of the <span class="condensed_italic">hazard</span> (modified from Pescaroli &amp; Alexander, 2015).</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Catchment</p>
                            <p class="Annex_Glossary_body" lang="en-US">An area that collects and drains precipitation.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Cities</p>
                            <p class="Annex_Glossary_body" lang="en-US"><span class="condensed_italic">Cities</span> are open systems, continually exchanging resources, products and services, waste, people, ideas and finances with the hinterlands and broader world. <span class="condensed_italic">Cities</span> are complex, self-organising, adaptive and constantly evolving. <span class="condensed_italic">Cities</span> also encompass multiple actors with varying responsibilities, capabilities and priorities, as well as processes that transcend the institutional sector-based approach to <span class="condensed_italic">city</span> administration. <span class="condensed_italic">Cities</span> are embedded in broader ecological, economic, technical, institutional, legal and <span class="condensed_italic">governance</span> structures that enable or constrain their systemic function, which cannot be separated from wider power relations. <span class="condensed_italic">Urban</span> processes of a physical, social and economic nature are causally interlinked, with interactions and feedbacks that result in both intended and unintended <span class="condensed_italic">impacts</span> on <span class="condensed_italic">emissions</span>. See also <span class="condensed_italic">City region</span>,<span class="condensed_italic"> Peri-urban areas </span>and<span class="condensed_italic"> Urban</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">City region</p>
                            <p class="Annex_Glossary_body" lang="en-US">The areal extent of an individual <span class="condensed_italic">city</span>&#8217;s material associations and economic or political influence. The <span class="condensed_italic">city region</span> concept accepts that rural <span class="condensed_italic">livelihoods</span> and <span class="condensed_italic">land</span> uses can be incorporated within the functional activities of a <span class="condensed_italic">city</span>. This will include dormitory <span class="condensed_italic">settlements</span>, <span class="condensed_italic">sources</span> for critical inputs of water, some food, and waste disposal. See also <span class="condensed_italic">Region</span>,<span class="condensed_italic"> Cities</span>,<span class="condensed_italic"> Urban </span>and<span class="condensed_italic"> Urban systems</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Climate</p>
                            <p class="Annex_Glossary_body" lang="en-US">In a narrow sense,<span class="condensed_italic"> climate</span> is usually defined as the average weather -or more rigorously, as the statistical description in terms of the mean and variability of relevant quantities- over a period of time ranging from months to thousands or millions of years. The classical period for averaging these variables is 30&#160;years, as defined by the World Meteorological Organization (WMO). The relevant quantities are most often surface variables such as temperature, precipitation and wind. <span class="condensed_italic">Climate</span> in a wider sense is the state, including a statistical description, of the <span class="condensed_italic">climate system</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Climate change</p>
                            <p class="Annex_Glossary_body" lang="en-US">A change in the state of the <span class="condensed_italic">climate</span> that can be identified (e.g., by using statistical tests) by changes in the mean and/or the variability of its properties and that persists for an extended period, typically decades or longer. <span class="condensed_italic">Climate change</span> may be due to natural internal processes or external forcings such as modulations of the solar cycles, volcanic eruptions and persistent <span class="condensed_italic">anthropogenic</span> changes in the composition of the <span class="condensed_italic">atmosphere</span> or in <span class="condensed_italic">land use</span>. Note that the United Nations Framework Convention on Climate Change (UNFCCC), in its Article 1, defines <span class="condensed_italic">climate change</span> as: &#8216;a change of climate which is attributed directly or indirectly to human activity that alters the composition of the global atmosphere and which is in addition to natural climate variability observed over comparable time periods&#8217;. The UNFCCC thus makes a distinction between <span class="condensed_italic">climate change</span> attributable to human activities altering the atmospheric composition and <span class="condensed_italic">climate variability</span> attributable to natural causes. See also <span class="condensed_italic">Climate variability</span>,<span class="condensed_italic"> Detection</span>,<span class="condensed_italic"> Attribution </span>and<span class="condensed_italic"> Ocean acidification (OA)</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Climate extreme (extreme weather or climate event)</p>
                            <p class="Annex_Glossary_body" lang="en-US">The occurrence of a value of a weather or <span class="condensed_italic">climate</span> variable above (or below) a threshold value near the upper (or lower) ends of the range of observed values of the variable.</p>
                            <p class="Annex_Glossary_body" lang="en-US">By definition, the characteristics of what is called extreme weather may vary from place to place in an absolute sense. When a pattern of extreme weather persists for some time, such as a season, it may be classified as an <span class="condensed_italic">extreme climate event</span>, especially if it yields an average or total that is itself extreme (e.g., high temperature, <span class="condensed_italic">drought</span> or heavy rainfall over a season). For simplicity, both <span class="condensed_italic">extreme weather events</span> and <span class="condensed_italic">extreme climate events</span> are referred to collectively as <span class="condensed_italic">climate extremes</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Climate feedback</p>
                            <p class="Annex_Glossary_body" lang="en-US">An interaction in which a perturbation in one <span class="condensed_italic">climate</span> quantity causes a change in a second and the change in the second quantity ultimately leads to an additional change in the first. A negative feedback is one in which the initial perturbation is weakened by the changes it causes; a positive feedback is one in which the initial perturbation is enhanced. The initial perturbation can either be externally forced or arise as part of internal variability.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Climate finance</p>
                            <p class="Annex_Glossary_body" lang="en-US">There is no agreed definition of <span class="condensed_italic">climate finance</span>. The term <span class="condensed_italic">climate finance</span> is applied to the financial resources devoted to addressing <span class="condensed_italic">climate change</span> by all public and private actors from global to local scales, including international financial flows to <span class="condensed_italic">developing countries</span> to assist them in addressing <span class="condensed_italic">climate change</span>. <span class="condensed_italic">Climate finance</span> aims to reduce net <span class="condensed_italic">greenhouse gas emissions</span> and/or to enhance <span class="condensed_italic">adaptation</span> and increase <span class="condensed_italic">resilience</span> to the <span class="condensed_italic">impacts</span> of current and projected <span class="condensed_italic">climate change</span>. Finance can come from private and public sources, channelled by various intermediaries, and is delivered by a range of instruments, including grants, concessional and non-concessional debt, and internal budget reallocations.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Climate governance</p>
                            <p class="Annex_Glossary_body" lang="en-US">See <span class="condensed_italic">Governance</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Climate information</p>
                            <p class="Annex_Glossary_body" lang="en-US">Information about the past, current or future state of the <span class="condensed_italic">climate system</span> that is relevant for <span class="condensed_italic">mitigation</span>, <span class="condensed_italic">adaptation</span> and <span class="condensed_italic">risk management</span>. It may be tailored or &#8220;co-produced&#8221; for specific contexts, taking into account users&#8217; needs and values.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Climate justice</p>
                            <p class="Annex_Glossary_body" lang="en-US">See <span class="condensed_italic">Justice</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Climate literacy</p>
                            <p class="Annex_Glossary_body" lang="en-US">Climate literacy encompasses being aware of climate change, its anthropogenic causes and implications.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Climate model</p>
                            <p class="Annex_Glossary_body" lang="en-US">A qualitative or quantitative representation of the <span class="condensed_italic">climate system</span> based on the physical, chemical and biological properties of its components, their interactions and feedback processes and accounting for some of its known properties. The <span class="condensed_italic">climate system</span> can be represented by <span class="condensed_italic">models</span> of varying complexity; that is, for any one component or combination of components, a spectrum or hierarchy of <span class="condensed_italic">models</span> can be identified, differing in such aspects as the number of spatial dimensions, the extent to which physical, chemical or biological processes are explicitly represented, or the level at which empirical parametrisations are involved. There is an evolution towards more complex <span class="condensed_italic">models</span> with interactive chemistry and biology. <span class="condensed_italic">Climate models</span> are applied as a research tool to study and simulate the <span class="condensed_italic">climate</span> and for operational purposes, including monthly, seasonal and interannual <span class="condensed_italic">climate predictions</span>. See also <span class="condensed_italic">Earth system model (ESM)</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Climate prediction</p>
                            <p class="Annex_Glossary_body" lang="en-US">A <span class="condensed_italic">climate prediction</span> or <span class="condensed_italic">climate</span> forecast is the result of an attempt to produce (starting from a particular state of the <span class="condensed_italic">climate system</span>) an estimate of the actual evolution of the <span class="condensed_italic">climate</span> in the future, for example, at seasonal, interannual or decadal <span class="condensed_italic">time scales</span>. Because the future evolution of the <span class="condensed_italic">climate system</span> may be highly sensitive to initial conditions, such predictions are usually probabilistic in nature.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Climate projection</p>
                            <p class="Annex_Glossary_body" lang="en-US">Simulated response of the <span class="condensed_italic">climate system</span> to a scenario of future <span class="condensed_italic">emissions</span> or concentrations of <span class="condensed_italic">greenhouse gases (GHGs)</span> and <span class="condensed_italic">aerosols</span> and changes in <span class="condensed_italic">land use</span>, generally derived using <span class="condensed_italic">climate models</span>. <span class="condensed_italic">Climate projections</span> depend on an emission/concentration/<span class="condensed_italic">radiative forcing scenario</span>, which is in turn based on assumptions concerning, for example, future socioeconomic and technological developments that may or may not be realised.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Climate refugium</p>
                            <p class="Annex_Glossary_body" lang="en-US">A <span class="condensed_italic">climate refugium</span> is a geographic area that has had a stable <span class="condensed_italic">climate</span> on evolutionary time scales, or that is projected to have a stable <span class="condensed_italic">climate</span> into the future. See also <span class="condensed_italic">Refugium</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Climate services</p>
                            <p class="Annex_Glossary_body" lang="en-US"><span class="condensed_italic">Climate services</span> involve the provision of <span class="condensed_italic">climate information</span> in such a way as to assist decision-making. The service includes appropriate engagement from users and providers, is based on scientifically credible information and expertise, has an effective access mechanism and responds to user needs (Hewitt et&#160;al. 2012).</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Climate simulation ensemble</p>
                            <p class="Annex_Glossary_body" lang="en-US">A group of parallel model simulations characterising historical <span class="condensed_italic">climate</span> conditions, <span class="condensed_italic">climate predictions</span> or <span class="condensed_italic">climate projections</span>. Variation of the results across the ensemble members may give an estimate of modelling-based <span class="condensed_italic">uncertainty</span>. Ensembles made with the same model but different initial conditions characterise the <span class="condensed_italic">uncertainty</span> associated with internal <span class="condensed_italic">climate variability</span>, whereas multi-model ensembles including simulations by several <span class="condensed_italic">models</span> also include the effect of model differences. Perturbed parameter ensembles, in which model parameters are varied in a systematic manner, aim to assess the <span class="condensed_italic">uncertainty</span> resulting from internal model specifications within a single model. Remaining sources of <span class="condensed_italic">uncertainty</span> unaddressed with model ensembles are related to systematic model errors or biases, which may be assessed from systematic comparisons of model simulations with observations wherever available.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Climate system</p>
                            <p class="Annex_Glossary_body" lang="en-US">The global system consisting of five major components: the <span class="condensed_italic">atmosphere</span>, the hydrosphere, the <span class="condensed_italic">cryosphere</span>, the lithosphere and the <span class="condensed_italic">biosphere</span> and the interactions between them. The <span class="condensed_italic">climate system</span> changes in time under the influence of its own internal dynamics and because of external forcings such as volcanic eruptions, solar variations, orbital forcing, and <span class="condensed_italic">anthropogenic</span> forcings such as the changing composition of the <span class="condensed_italic">atmosphere</span> and <span class="condensed_italic">land-use change</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Climate variability</p>
                            <p class="Annex_Glossary_body" lang="en-US">Deviations of some <span class="condensed_italic">climate</span> variables from a given mean state (including the occurrence of extremes, etc.) at all <span class="condensed_italic">spatial and temporal scales</span> beyond that of individual weather events. Variability may be intrinsic, due to fluctuations of processes internal to the <span class="condensed_italic">climate system</span> (internal variability), or extrinsic, due to variations in natural or <span class="condensed_italic">anthropogenic</span> external forcing (forced variability).</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Climate velocity</p>
                            <p class="Annex_Glossary_body" lang="en-US">The speed at which isolines of a specified <span class="condensed_italic">climate</span> variable travel across landscapes or seascapes due to changing <span class="condensed_italic">climate</span>. For example, <span class="condensed_italic">climate velocity</span> for temperature is the speed at which isotherms move due to changing <span class="condensed_italic">climate</span> (km yr<span class="superscript _idGenCharOverride-1">&#8722;1</span>) and is calculated as the temporal change in temperature (&#176;C yr<span class="superscript _idGenCharOverride-1">&#8722;1</span>) divided by the current spatial gradient in temperature (&#176;C km<span class="superscript _idGenCharOverride-1">&#8722;1</span>). It can be calculated using additional <span class="condensed_italic">climate</span> variables such as precipitation or can be based on the climatic niche of organisms.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Climate resilient development</p>
                            <p class="Annex_Glossary_body" lang="en-US">In the WGII report, <span class="condensed_italic">climate resilient development</span> refers to the process of implementing <span class="condensed_italic">greenhouse gas</span> mitigation and <span class="condensed_italic">adaptation</span> measures to support sustainable development for all.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Climate resilient development pathways (CRDPs)</p>
                            <p class="Annex_Glossary_body" lang="en-US">See <span class="condensed_italic">Pathways</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Climate-resilient pathways</p>
                            <p class="Annex_Glossary_body" lang="en-US">See <span class="condensed_italic">Pathways</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Climate-smart agriculture (CSA)</p>
                            <p class="Annex_Glossary_body" lang="en-US">An approach to agriculture that aims to transform and reorient agricultural systems to effectively support development and ensure <span class="condensed_italic">food security</span> in a changing <span class="condensed_italic">climate</span> by sustainably increasing agricultural productivity and <span class="condensed_italic">incomes</span>, adapting and building <span class="condensed_italic">resilience</span> to <span class="condensed_italic">climate change</span>, and reducing and/or removing <span class="condensed_italic">greenhouse gas emissions</span>, where possible (FAO, 2018).</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Climatic driver (Climate driver)</p>
                            <p class="Annex_Glossary_body" lang="en-US">A changing aspect of the <span class="condensed_italic">climate system</span> that influences a component of a <span class="condensed_italic">human</span> or <span class="condensed_italic">natural </span>system.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Climatic impact-drivers (CIDs)</p>
                            <p class="Annex_Glossary_body" lang="en-US">Climatic impact-drivers (CIDs) are physical climate system conditions (e.g., means, events, extremes) that affect an element of society or ecosystems. Depending on system tolerance, CIDs and their changes can be detrimental, beneficial, neutral, or a mixture of each across interacting system elements and regions.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">CMIP3, CMIP5 and CMIP6</p>
                            <p class="Annex_Glossary_body" lang="en-US">See <span class="condensed_italic">Coupled Model Intercomparison Project</span> (CMIP).</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Co-benefit</p>
                            <p class="Annex_Glossary_body" lang="en-US">A positive effect that a <span class="condensed_italic">policy</span> or measure aimed at one objective has on another objective, thereby increasing the total benefit to society or the environment. <span class="condensed_italic">Co-benefits</span> are also referred to as ancillary benefits. See also <span class="condensed_italic">Trade-off </span>and<span class="condensed_italic"> Adverse side-effect</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Coast</p>
                            <p class="Annex_Glossary_body" lang="en-US">The <span class="condensed_italic">land</span> near to the sea. The term &#8216;coastal&#8217; can refer to that <span class="condensed_italic">land</span> (e.g., as in &#8216;coastal communities&#8217;), or to that part of the marine environment that is strongly influenced by <span class="condensed_italic">land</span>-based processes. Thus, coastal seas are generally shallow and near-shore. The landward and seaward limits of the coastal zone are not consistently defined, neither scientifically nor legally. Thus, coastal waters can either be considered as equivalent to territorial waters (extending 12 nautical miles/22.2&#160;km from mean low water), or to the full exclusive economic zone, or to <span class="condensed_italic">shelf seas</span>, with less than 200&#160;m water depth.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Coastal erosion</p>
                            <p class="Annex_Glossary_body" lang="en-US"><span class="condensed_italic">Coastal erosion</span>, sometimes referred to as shoreline retreat, occurs when a net loss of sediment or bedrock from the shoreline results in landward movement of the high-tide mark.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Communicable disease</p>
                            <p class="Annex_Glossary_body" lang="en-US">Illness due to a specific infectious agent or its toxic products that arises through transmission of that agent or its products from an infected person, animal or reservoir to a susceptible host, either directly or indirectly through an intermediate plant or animal host, vector or the inanimate environment. <span class="condensed_italic">Communicable disease</span> pathogens include bacteria, viruses, fungi, parasites and prions.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Community-based adaptation</p>
                            <p class="Annex_Glossary_body" lang="en-US">See <span class="condensed_italic">Adaptation</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Compound risks</p>
                            <p class="Annex_Glossary_body" lang="en-US">See <span class="condensed_italic">Risk</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Compound weather/climate events</p>
                            <p class="Annex_Glossary_body" lang="en-US">The terms &#8216;compound events&#8217;, &#8216;compound extremes&#8217; and &#8216;compound extreme events&#8217; are used interchangeably in the literature and this report and refer to the combination of multiple <span class="condensed_italic">drivers</span> and/or <span class="condensed_italic">hazards</span> that contributes to societal and/or environmental <span class="condensed_italic">risk</span> (Zscheischler et&#160;al., 2018).</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Concentrations scenario</p>
                            <p class="Annex_Glossary_body" lang="en-US">See <span class="condensed_italic">Scenarios</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Confidence</p>
                            <p class="Annex_Glossary_body" lang="en-US">The robustness of a finding based on the type, amount, quality and consistency of <span class="condensed_italic">evidence</span> (e.g., mechanistic understanding, theory, data, <span class="condensed_italic">models</span>, expert judgment) and on the degree of <span class="condensed_italic">agreement</span> across multiple lines of <span class="condensed_italic">evidence</span>. In this report, <span class="condensed_italic">confidence</span> is expressed qualitatively (Mastrandrea et&#160;al., 2010).</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Conservation agriculture</p>
                            <p class="Annex_Glossary_body" lang="en-US">A farming system that promotes minimum soil disturbance (e.g., by using no-till practices), maintenance of a permanent soil cover and diversification of plant species. It aims to prevent <span class="condensed_italic">land degradation</span> and regenerate degraded <span class="condensed_italic">lands</span> by enhancing <span class="condensed_italic">biodiversity</span> and natural biological processes above and below the ground surface that contribute to increased water and nutrient use efficiency and improved and sustained crop production (FAO, 2016).</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Coping</p>
                            <p class="Annex_Glossary_body" lang="en-US">The use of available skills, resources and opportunities to address, manage and overcome adverse conditions, with the aim of achieving basic functioning of people, <span class="condensed_italic">institutions</span>, organisations and systems in the short to medium term (UNISDR, 2009; IPCC, 2012a).</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Coping capacity</p>
                            <p class="Annex_Glossary_body" lang="en-US">The ability of people, <span class="condensed_italic">institutions</span>, organisations and systems, using available skills, values, beliefs, resources and opportunities, to address, manage and overcome adverse conditions in the short to medium term (UNISDR, 2009; IPCC, 2012a). See also <span class="condensed_italic">Resilience</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Coral bleaching</p>
                            <p class="Annex_Glossary_body" lang="en-US">Loss of coral pigmentation through the loss of intracellular symbiotic algae (known as zooxanthellae) and/or loss of their pigments.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Coral reef</p>
                            <p class="Annex_Glossary_body" lang="en-US">An underwater <span class="condensed_italic">ecosystem</span> characterised by structure-building stony corals. Warm-water <span class="condensed_italic">coral reefs</span> occur in shallow seas, mostly in the tropics, with the corals (animals) containing algae (plants) that depend on light and relatively stable temperature conditions. Cold-water <span class="condensed_italic">coral reefs</span> occur throughout the world, mostly at water depths of 50&#8211;500&#160;m. In both kinds of reef, living corals frequently grow on older, dead material, predominantly made of calcium carbonate (CaCO<span class="subscript _idGenCharOverride-1">3</span>). Both warm- and cold-water <span class="condensed_italic">coral reefs</span> support high <span class="condensed_italic">biodiversity</span> of fish and other groups, and are considered to be especially vulnerable to <span class="condensed_italic">climate change</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Cost&#8211;benefit analysis</p>
                            <p class="Annex_Glossary_body" lang="en-US">Monetary assessment of all negative and positive <span class="condensed_italic">impacts</span> associated with a given action. <span class="condensed_italic">Cost&#8211;benefit analysis</span> enables comparison of different interventions, investments or strategies and reveals how a given investment or <span class="condensed_italic">policy</span> effort pays off for a particular person, company or country. <span class="condensed_italic">Cost&#8211;benefit analyses</span> representing society&#8217;s point of view are important for <span class="condensed_italic">climate change</span> decision-making, but there are difficulties in aggregating costs and benefits across different actors and across timescales. See also <span class="condensed_italic">Discounting</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Coupled Model Intercomparison Project (CMIP)</p>
                            <p class="Annex_Glossary_body" lang="en-US">A <span class="condensed_italic">climate modelling</span> activity from the World Climate Research Programme (WCRP) which coordinates and archives <span class="condensed_italic">climate model </span>simulations based on shared model inputs by modelling groups from around the world. The CMIP3 multi-model data set includes <span class="condensed_italic">projections</span> using Special Report on Emissions Scenarios (SRES) scenarios. The CMIP5 data set includes <span class="condensed_italic">projections</span> using the <span class="condensed_italic">Representative Concentration Pathways (RCP)</span>. The CMIP6 phase involves a suite of common model experiments as well as an ensemble of CMIP-endorsed Model Intercomparison Projects (MIPs).</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Cryosphere</p>
                            <p class="Annex_Glossary_body" lang="en-US">The components of the Earth system at and below the <span class="condensed_italic">land</span> and <span class="condensed_italic">ocean</span> surface that are frozen, including snow cover, <span class="condensed_italic">glaciers</span>, <span class="condensed_italic">ice sheets</span>, ice shelves, icebergs, <span class="condensed_italic">sea ice</span>, lake ice, river ice, <span class="condensed_italic">permafrost</span> and seasonally frozen ground.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Cultural impacts</p>
                            <p class="Annex_Glossary_body" lang="en-US"><span class="condensed_italic">Impacts</span> on material and ecological aspects of culture and the lived experience of culture, including dimensions such as identity, community cohesion and belonging, sense of place, worldview, values, perceptions and tradition. <span class="condensed_italic">Cultural impacts</span> are closely related to ecological <span class="condensed_italic">impacts</span>, especially for iconic and representational dimensions of species and landscapes. Culture and cultural practices frame the importance and value of the <span class="condensed_italic">impacts</span> of change, shape the <span class="condensed_italic">feasibility</span> and acceptability of <span class="condensed_italic">adaptation options</span>, and provide the skills and practices that enable <span class="condensed_italic">adaptation</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Decarbonisation</p>
                            <p class="Annex_Glossary_body" lang="en-US">Human actions to reduce <span class="condensed_italic">carbon dioxide emissions</span> from human activities.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Deep uncertainty</p>
                            <p class="Annex_Glossary_body" lang="en-US">See <span class="condensed_italic">Uncertainty</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Deforestation</p>
                            <p class="Annex_Glossary_body" lang="en-US">Conversion of <span class="condensed_italic">forest</span> to non-forest. See also <span class="condensed_italic">Afforestation</span> and <span class="condensed_italic">Reforestation</span>.</p>
                            <p class="Annex_Glossary_body" lang="en-US">[Note: For a discussion of the term <span class="condensed_italic">forest</span> and related terms such as <span class="condensed_italic">afforestation</span>, <span class="condensed_italic">reforestation</span> and <span class="condensed_italic">deforestation</span>, see the 2006 IPCC Guidelines for National Greenhouse Gas Inventories and their 2019 Refinement, and information provided by the United Nations Framework Convention on Climate Change (IPCC 2006, 2019; UNFCCC 2021a, 2021b)]</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Desertification</p>
                            <p class="Annex_Glossary_body" lang="en-US"><span class="condensed_italic">Land degradation</span> in arid, semi-arid, and dry sub-humid areas resulting from many factors, including climatic variations and human activities (UNCCD, 1994).</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Detection</p>
                            <p class="Annex_Glossary_body" lang="en-US"><span class="condensed_italic">Detection</span> of change is defined as the process of demonstrating that <span class="condensed_italic">climate</span> or a system affected by <span class="condensed_italic">climate</span> has changed in some defined statistical sense, without providing a reason for that change. An identified change is detected in observations if its <span class="condensed_italic">likelihood</span> of occurrence by chance due to internal variability alone is determined to be small, for example, &lt;10%.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Detection and attribution</p>
                            <p class="Annex_Glossary_body" lang="en-US">See <span class="condensed_italic">Attribution</span> and <span class="condensed_italic">Detection</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Developed/developing countries (Industrialised/developed/developing countries)</p>
                            <p class="Annex_Glossary_body" lang="en-US">There is a diversity of approaches for categorising countries on the basis of their level of development, and for defining terms such as &#8216;industrialised&#8217;, &#8216;developed&#8217; or &#8216;developing&#8217;. Several categorisations are used in this Special Report. (1) In the United Nations (UN) system, there is no established convention for the designation of <span class="condensed_italic">developed</span> and <span class="condensed_italic">developing countries</span> or areas. (2) The UN Statistics Division specifies developed and developing regions based on common practice. In addition, specific countries are designated as Least Developed Countries, landlocked <span class="condensed_italic">developing countries</span>, <span class="condensed_italic">Small Island Developing States (SIDS)</span> and transition economies. Many countries appear in more than one of these categories. (3) The World Bank uses <span class="condensed_italic">income</span> as the main criterion for classifying countries as low, lower middle, upper middle and high <span class="condensed_italic">income</span>. (4) The UN Development Programme (UNDP) aggregates indicators for life expectancy, educational attainment and <span class="condensed_italic">income</span> into a single composite Human Development Index (HDI) to classify countries as low, medium, high or very high human development.</p>
