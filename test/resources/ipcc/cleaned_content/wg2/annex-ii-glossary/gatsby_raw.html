                            <p class="Annex_Glossary_body" lang="en-US"><span class="condensed_italic">Models</span> that integrate knowledge from two or more domains into a single framework. They are one of the main tools for undertaking <span class="condensed_italic">integrated assessments</span>. One class of IAM used in respect of <span class="condensed_italic">climate change mitigation</span> may include representations of: multiple sectors of the economy, such as energy, <span class="condensed_italic">land</span> use and <span class="condensed_italic">land use change</span>; interactions between sectors; the economy as a whole; associated <span class="condensed_italic">greenhouse gas (GHG) emissions</span> and <span class="condensed_italic">sinks</span>; and reduced representations of the <span class="condensed_italic">climate system</span>. This class of model is used to assess linkages between economic, social and technological development and the evolution of the <span class="condensed_italic">climate system</span>. Another class of IAM additionally includes representations of the costs associated with <span class="condensed_italic">climate change impacts</span>, but includes less detailed representations of economic systems. These can be used to assess <span class="condensed_italic">impacts</span> and <span class="condensed_italic">mitigation</span> in a cost&#8211;benefit framework and have been used to estimate the social cost of carbon.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Invasive species</p>
                            <p class="Annex_Glossary_body" lang="en-US">A species that is not native to a specific location or nearby, lacking natural controls, and that has a tendency to rapidly increase in abundance, displacing <span class="condensed_italic">native species</span>. <span class="condensed_italic">Invasive species</span> may also damage the human economy or human <span class="condensed_italic">health</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Justice</p>
                            <p class="Annex_Glossary_body" lang="en-US"><span class="condensed_italic">Justice</span> is concerned with, setting out the moral or legal principles of <span class="condensed_italic">fairness</span> and <span class="condensed_italic">equity</span> in the way people are treated, often based on the <span class="condensed_italic">ethics</span> and values of society.</p>
                            <p class="Annex_Glossary_subhead" lang="en-US">
                              <span class="bold_condensed_italic">Climate justice</span>
                            </p>
                            <p class="Annex_Glossary_body-indent" lang="en-US"><span class="condensed_italic">Justice</span> that links development and <span class="condensed_italic">human rights</span> to achieve a human-centred approach to addressing <span class="condensed_italic">climate change</span>, safeguarding the rights of the most vulnerable people and sharing the burdens and benefits of <span class="condensed_italic">climate change</span> and its <span class="condensed_italic">impacts</span> equitably and fairly (MRFJC, 2018).</p>
                            <p class="Annex_Glossary_subhead" lang="en-US">Procedural justice</p>
                            <p class="Annex_Glossary_body-indent" lang="en-US"><span class="condensed_italic">Justice</span> in the way outcomes are brought about, including who participates and is heard in the processes of decision-making.</p>
                            <p class="Annex_Glossary_subhead" lang="en-US">Social justice</p>
                            <p class="Annex_Glossary_body-indent" lang="en-US">Just or fair relations within society that seek to address the distribution of wealth, access to resources, opportunity and support according to principles of <span class="condensed_italic">justice</span> and <span class="condensed_italic">fairness</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Key risk</p>
                            <p class="Annex_Glossary_body" lang="en-US">Key risks have potentially severe adverse consequences for humans and social-ecological systems resulting from the interaction of climate related <span class="condensed_italic">hazards </span>with vulnerabilities of societies and systems exposed.</p>
                            <p class="Annex_Glossary_subhead" lang="en-US">Representative Key Risks (RKRs)</p>
                            <p class="Annex_Glossary_body-indent" lang="en-US">are representative, thematic clusters of key risks.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Land</p>
                            <p class="Annex_Glossary_body" lang="en-US">The terrestrial portion of the <span class="condensed_italic">biosphere</span> that comprises the natural resources (soil, near-surface air, vegetation and other biota, and water), the ecological processes, topography, and human <span class="condensed_italic">settlements</span> and <span class="condensed_italic">infrastructure</span> that operate within that system (FAO, 2007; UNCCD, 1994).</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Land cover</p>
                            <p class="Annex_Glossary_body" lang="en-US">The biophysical coverage of <span class="condensed_italic">land</span> (e.g., bare soil, rocks, <span class="condensed_italic">forests</span>, buildings and roads, or lakes). <span class="condensed_italic">Land cover</span> is often categorised in broad <span class="condensed_italic">land-cover</span> classes (e.g., deciduous forest, coniferous forest, mixed forest, grassland and bare ground). Note: In some literature assessed in this report, <span class="condensed_italic">land cover</span> and <span class="condensed_italic">land use</span> are used interchangeably, but the two represent distinct classification systems. For example, the <span class="condensed_italic">land cover</span> class of woodland can be under various <span class="condensed_italic">land uses</span> such as livestock grazing, recreation, conservation or wood harvest.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Land cover change</p>
                            <p class="Annex_Glossary_body" lang="en-US">Change from one <span class="condensed_italic">land cover</span> class to another, due to change in <span class="condensed_italic">land use</span> or change in natural conditions (Pongratz et&#160;al., 2018). See also <span class="condensed_italic">Land cover</span> and <span class="condensed_italic">Land-use change</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Land degradation</p>
                            <p class="Annex_Glossary_body" lang="en-US">A negative trend in <span class="condensed_italic">land</span> condition, caused by direct or indirect human-induced processes including <span class="condensed_italic">anthropogenic climate change</span>, expressed as a long-term reduction or loss of at least one of the following: biological productivity, ecological integrity or value to humans. [Note: This definition applies to <span class="condensed_italic">forest</span> and non-<span class="condensed_italic">forest land</span>. Changes in <span class="condensed_italic">land</span> condition resulting solely from natural processes (such as volcanic eruptions) are not considered to be <span class="condensed_italic">land degradation</span>. Reduction of biological productivity or ecological integrity or value to humans can constitute degradation, but any one of these changes need not necessarily be considered degradation.]</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Land management</p>
                            <p class="Annex_Glossary_body" lang="en-US">The sum of <span class="condensed_italic">land-use</span> practices (e.g., sowing, fertilising, weeding, harvesting, thinning and clear-cutting) that take place within broader <span class="condensed_italic">land-use</span> categories (Pongratz et&#160;al., 2018).</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Land use</p>
                            <p class="Annex_Glossary_body" lang="en-US">The total of arrangements, activities and inputs applied to a parcel of <span class="condensed_italic">land</span>. The term <span class="condensed_italic">land use</span> is also used in the sense of the social and economic purposes for which <span class="condensed_italic">land</span> is managed (e.g., grazing, timber extraction, conservation and <span class="condensed_italic">city</span> dwelling). In national <span class="condensed_italic">greenhouse gas (GHG)</span> inventories, <span class="condensed_italic">land use</span> is classified according to the IPCC <span class="condensed_italic">land-use</span> categories of <span class="condensed_italic">forest land</span>, cropland, grassland, wetlands, <span class="condensed_italic">settlements</span> and other <span class="condensed_italic">lands</span> (see the 2006 IPCC Guidelines for National GHG Inventories and their 2019 Refinement for details (IPCC, 2006, 2019)).</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Land-use change</p>
                            <p class="Annex_Glossary_body" lang="en-US">The change from one <span class="condensed_italic">land-use </span>category to another. Note that, in some scientific literature, <span class="condensed_italic">land-use change</span> encompasses changes in <span class="condensed_italic">land-use</span> categories as well as changes in <span class="condensed_italic">land management</span>. See also <span class="condensed_italic">Afforestation</span>, <span class="condensed_italic">Deforestation</span> and <span class="condensed_italic">Reforestation</span>.</p>
                            <p class="Annex_Glossary_subhead" lang="en-US">Indirect land-use change (iLUC)</p>
                            <p class="Annex_Glossary_body-indent" lang="en-US"><span class="condensed_italic">Land-use change</span> outside the area of focus that occurs as a consequence of change in use or management of <span class="condensed_italic">land</span> within the area of focus, such as through market or <span class="condensed_italic">policy drivers</span>. For example, if agricultural <span class="condensed_italic">land</span> is diverted to <span class="condensed_italic">biofuel</span> production, forest clearance may occur elsewhere to replace the former agricultural production. See <span class="condensed_italic">Land-use change (LUC)</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Least Developed Countries (LDCs)</p>
                            <p class="Annex_Glossary_body" lang="en-US">A list of countries designated by the Economic and Social Council of the United Nations (ECOSOC) as meeting three criteria: (1) a low <span class="condensed_italic">income</span> criterion below a certain threshold of gross national income per capita of between USD 750 and USD 900, (2) a human resource weakness based on indicators of <span class="condensed_italic">health</span>, education and adult literacy, and (3) an economic <span class="condensed_italic">vulnerability</span> weakness based on indicators on instability of agricultural production, instability of export of goods and services, economic importance of non-traditional activities, merchandise export concentration and the handicap of economic smallness. Countries in this category are eligible for a number of programmes focused on assisting countries most in need. These privileges include certain benefits under the articles of the United Nations Framework Convention on Climate Change (UNFCCC).</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Likelihood</p>
                            <p class="Annex_Glossary_body" lang="en-US">The chance of a specific outcome occurring, where this might be estimated probabilistically. <span class="condensed_italic">Likelihood</span> is expressed in this Special Report using a standard terminology (Mastrandrea et&#160;al., 2010). See also <span class="condensed_italic">Agreement</span>,<span class="condensed_italic"> Confidence</span>, <span class="condensed_italic">Evidence</span> and <span class="condensed_italic">Uncertainty</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Livelihood</p>
                            <p class="Annex_Glossary_body" lang="en-US">The resources used and the activities undertaken in order for people to live. <span class="condensed_italic">Livelihoods</span> are usually determined by the entitlements and assets to which people have access. Such assets can be categorised as human, social, natural, physical or financial.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Local extinction</p>
                            <p class="Annex_Glossary_body" lang="en-US">See <span class="condensed_italic">Extirpation</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Local knowledge (LK)</p>
                            <p class="Annex_Glossary_body" lang="en-US">The understandings and skills developed by individuals and populations, specific to the places where they live. Local knowledge informs decision-making about fundamental aspects of life, from day-to-day activities to longer-term actions. This knowledge is a key element of the social and cultural systems which influence observations of and responses to <span class="condensed_italic">climate change</span>; it also informs <span class="condensed_italic">governance</span> decisions (UNESCO, 2018). See also <span class="condensed_italic">Indigenous knowledge</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Lock-in</p>
                            <p class="Annex_Glossary_body" lang="en-US">A situation in which the future development of a system, including <span class="condensed_italic">infrastructure</span>, technologies, investments, institutions and behavioural norms, is determined or constrained (&#8216;locked in&#8217;) by historical developments. See also <span class="condensed_italic">Path dependence</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Loss and Damage, and losses and damages</p>
                            <p class="Annex_Glossary_body" lang="en-US">Research has taken Loss and Damage (capitalised letters) to refer to political debate under the United Nations Framework Convention on Climate Change (UNFCCC) following the establishment of the Warsaw Mechanism on Loss and Damage in 2013, which is to &#8216;address loss and damage associated with impacts of climate change, including extreme events and slow onset events, in developing countries that are particularly vulnerable to the adverse effects of climate change.&#8217; Lowercase letters (losses and damages) have been taken to refer broadly to harm from (observed) <span class="condensed_italic">impacts</span> and (projected) <span class="condensed_italic">risks</span> and can be economic or non-economic (Mechler et&#160;al., 2018).</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Low Elevation Coastal Zones (LECZ)</p>
                            <p class="Annex_Glossary_body" lang="en-US">Coastal areas below 10&#160;m of elevation above sea level that are 13 hydrologically connected to the sea.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Low-likelihood, high-impact outcomes</p>
                            <p class="Annex_Glossary_body" lang="en-US">Outcomes/events whose probability of occurrence is low or not well known (as in the context of <span class="condensed_italic">deep uncertainty</span>) but whose potential <span class="condensed_italic">impacts</span> on society and <span class="condensed_italic">ecosystems</span> could be high. To better inform <span class="condensed_italic">risk</span> assessment and decision-making, such low-<span class="condensed_italic">likelihood</span> outcomes are considered if they are associated with very large consequences and may therefore constitute material <span class="condensed_italic">risks</span>, even though those consequences do not necessarily represent the most likely outcome. See also <span class="condensed_italic">Impacts</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Maladaptive actions (Maladaptation)</p>
                            <p class="Annex_Glossary_body" lang="en-US">Actions that may lead to increased <span class="condensed_italic">risk</span> of adverse climate-related outcomes, including via increased <span class="condensed_italic">greenhouse gas (GHG) emissions</span>, increased or shifted <span class="condensed_italic">vulnerability</span> to <span class="condensed_italic">climate change</span>, more inequitable outcomes, or diminished welfare, now or in the future. Most often, <span class="condensed_italic">maladaptation</span> is an unintended consequence.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Malnutrition</p>
                            <p class="Annex_Glossary_body" lang="en-US">Deficiencies, excesses or imbalances in a person&#8217;s intake of energy and/or nutrients. The term <span class="condensed_italic">malnutrition</span> addresses three broad groups of conditions: undernutrition, which includes wasting (low weight-for-height), stunting (low height-for-age) and underweight (low weight-for-age); micronutrient-related malnutrition, which includes micronutrient deficiencies (a lack of important vitamins and minerals) or micronutrient excess; and overweight, obesity and <span class="condensed_italic">diet</span>-related <span class="condensed_italic">non-communicable diseases</span> (such as heart disease, stroke, diabetes and some cancers) (WHO, 2018). Micronutrient deficiencies are sometimes termed &#8216;hidden hunger&#8217; to emphasise that people can be malnourished in the sense of deficient without being deficient in calories. Hidden hunger can apply even where people are obese.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Marine heatwave</p>
                            <p class="Annex_Glossary_body" lang="en-US">A period during which water temperature is abnormally warm for the time of the year relative to historical temperatures, with that extreme warmth persisting for days to months. The phenomenon can manifest in any place in the <span class="condensed_italic">ocean</span> and at scales of up to thousands of kilometres. See also <span class="condensed_italic">Heatwave</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Mean sea level</p>
                            <p class="Annex_Glossary_body" lang="en-US">The surface level of the <span class="condensed_italic">ocean</span> at a particular point averaged over an extended period of time such as a month or year. <span class="condensed_italic">Mean sea level</span> is often used as a national datum to which heights on land are referred.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Measurement</p>
                            <p class="Annex_Glossary_body" lang="en-US">Processes of data collection over time, providing basic data sets, including associated accuracy and precision, for the range of relevant variables. Possible data sources are field <span class="condensed_italic">measurements</span>, field observations, detection through remote sensing and interviews (UN-REDD, 2009).</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Megacity</p>
                            <p class="Annex_Glossary_body" lang="en-US">An <span class="condensed_italic">urban</span> agglomeration with 10&#160;million inhabitants or more (United Nations, Department of Economic and Social Affairs, Population Division (2019).</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Megadrought</p>
                            <p class="Annex_Glossary_body" lang="en-US">See <span class="condensed_italic">Drought</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Meteorological drought</p>
                            <p class="Annex_Glossary_body" lang="en-US">See <span class="condensed_italic">Drought</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Mental health</p>
                            <p class="Annex_Glossary_body" lang="en-US">The state of <span class="condensed_italic">well-being</span> in which an individual realises his or her own abilities, can cope with the normal stresses of life, can work productively and is able to contribute to his or her community.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">
                              <span class="bold_condensed" lang="en-GB">Methane (CH</span>
                              <span class="bold_condensed-subscript _idGenCharOverride-1" lang="en-GB">4</span>
                              <span class="bold_condensed" lang="en-GB">)</span>
                            </p>
                            <p class="Annex_Glossary_body" lang="en-US">One of the six <span class="condensed_italic">greenhouse gases (GHGs)</span> to be mitigated under the Kyoto Protocol. <span class="condensed_italic">Methane</span> is the major component of natural gas and associated with all hydrocarbon fuels. Significant <span class="condensed_italic">anthropogenic emissions</span> also occur as a result of animal husbandry and paddy rice production. <span class="condensed_italic">Methane</span> is also produced naturally where organic matter decays under anaerobic conditions, such as in wetlands. Under future <span class="condensed_italic">global warming</span>, there is <span class="condensed_italic">risk</span> of increased <span class="condensed_italic">methane emissions</span> from thawing <span class="condensed_italic">permafrost</span>, coastal wetlands and sub-sea gas hydrates.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Metric</p>
                            <p class="Annex_Glossary_body" lang="en-US">A consistent <span class="condensed_italic">measurement</span> of a characteristic of an object or activity that is otherwise difficult to quantify. Within the context of the evaluation of <span class="condensed_italic">climate models</span>, this is a quantitative measure of agreement between a simulated and an observed quantity which can be used to assess the performance of individual <span class="condensed_italic">models</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Metropolitan region</p>
                            <p class="Annex_Glossary_body" lang="en-US">See <span class="condensed_italic">City region</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Microclimate</p>
                            <p class="Annex_Glossary_body" lang="en-US">Local <span class="condensed_italic">climate</span> at or near the Earth&#8217;s surface.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Migrant</p>
                            <p class="Annex_Glossary_body" lang="en-US">Any person who is moving or has moved across an international border or within a state away from his/her habitual place of residence, regardless of (1) the person&#8217;s legal status, (2) whether the movement is voluntary or involuntary, (3) what the causes for the movement are and (4) what the length of the stay is (IOM, 2018).</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Migration (of humans)</p>
                            <p class="Annex_Glossary_body" lang="en-US">Movement of a person or a group of persons, either across an international border, or within a state. It is a population movement, encompassing any kind of movement of people, whatever its length, composition and causes; it includes migration of refugees, displaced persons, economic <span class="condensed_italic">migrants</span> and persons moving for other purposes, including family reunification (IOM, 2018).</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Mitigation (of climate change)</p>
                            <p class="Annex_Glossary_body" lang="en-US">A human intervention to reduce <span class="condensed_italic">emissions</span> or enhance the <span class="condensed_italic">sinks</span> of <span class="condensed_italic">greenhouse gases</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Mitigation measures</p>
                            <p class="Annex_Glossary_body" lang="en-US">In <span class="condensed_italic">climate policy</span>, <span class="condensed_italic">mitigation measures</span> are technologies, processes or practices that contribute to <span class="condensed_italic">mitigation</span>, for example renewable energy technologies, waste minimisation processes and public transport commuting practices.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Mitigation option</p>
                            <p class="Annex_Glossary_body" lang="en-US">A technology or practice that reduces <span class="condensed_italic">greenhouse gas (GHG) emissions</span> or enhances <span class="condensed_italic">sinks</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Mitigation scenario</p>
                            <p class="Annex_Glossary_body" lang="en-US">A plausible description of the future that describes how the (studied) system responds to the implementation of <span class="condensed_italic">mitigation policies</span> and measures.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Model ensemble</p>
                            <p class="Annex_Glossary_body" lang="en-US">See <span class="condensed_italic">Climate simulation ensemble</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Models</p>
                            <p class="Annex_Glossary_body" lang="en-US">Structured imitations of a system&#8217;s attributes and mechanisms to mimic the appearance or functioning of systems, for example, the <span class="condensed_italic">climate</span>, the economy of a country, or a crop. Mathematical <span class="condensed_italic">models</span> assemble (many) variables and relations (often in a computer code) to simulate system functioning and performance for variations in parameters and inputs.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Monitoring and evaluation (M&amp;E)</p>
                            <p class="Annex_Glossary_body" lang="en-US">Mechanisms put in place to respectively monitor and evaluate efforts to reduce <span class="condensed_italic">greenhouse gas emissions</span> and/or adapt to the <span class="condensed_italic">impacts</span> of <span class="condensed_italic">climate change</span> with the aim of systematically identifying, characterising and assessing progress over time.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Monsoon</p>
                            <p class="Annex_Glossary_body" lang="en-US">See <span class="condensed_italic">Global monsoon</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Mountains</p>
                            <p class="Annex_Glossary_body" lang="en-US">A mountain is a landform formed through plate tectonics that rises above its surrounding area, characterised by verticality and ruggedness such as gentle or steep sloping sides, sharp or rounded ridges and a high point called a peak or a summit. Mountain <span class="condensed_italic">regions</span> consist of mountains and mountain ranges as defined by ruggedness, intermontane valleys, plateaus and tablelands, and hills and hilly forelands, together forming a complex terrain.</p>
                            <p class="Annex_Glossary_body" lang="en-US">To delineate mountain <span class="condensed_italic">regions</span>, a combination of terrain characteristics is used, such as elevation above sea level, steepness of slope and relative relief or local elevational range.</p>
                            <p class="Annex_Glossary_body" lang="en-US">Three mountain characterisations using different combinations of the above criteria applied to digital elevation models have been developed to arrive at mountain area statistics, described and analysed in detail by Sayre et&#160;al. (2018), namely K1 (Kapos et&#160;al., 2000), K2 (K&#246;rner et&#160;al., 2011) and K3 (Karagulle et&#160;al., 2017).</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Multi-level governance</p>
                            <p class="Annex_Glossary_body" lang="en-US">See <span class="condensed_italic">Governance</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Narrative</p>
                            <p class="Annex_Glossary_body" lang="en-US">See <span class="condensed_italic">Storyline</span>.<span class="condensed_italic"> </span>See also<span class="condensed_italic"> Pathways</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Native species</p>
                            <p class="Annex_Glossary_body" lang="en-US">Indigenous species of animals or plants that naturally occur in a given region or <span class="condensed_italic">ecosystem</span>. Under <span class="condensed_italic">climate change</span>, many species colonise new areas where they may become native over time (following IPBES, 2019). See also <span class="condensed_italic">Invasive species</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Natural systems</p>
                            <p class="Annex_Glossary_body" lang="en-US">The dynamic physical, physicochemical and biological components of the Earth system that would operate independently of human activities.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Nature-based solution (NBS)</p>
                            <p class="Annex_Glossary_body" lang="en-US">Actions to protect, sustainably manage and restore natural or modified <span class="condensed_italic">ecosystems</span> that address societal challenges effectively and adaptively, simultaneously providing human <span class="condensed_italic">well-being</span> and <span class="condensed_italic">biodiversity</span> benefits. (IUCN, 2016). See also <span class="condensed_italic">Biodiversity</span> and <span class="condensed_italic">Ecosystem</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Net primary production (NPP)</p>
                            <p class="Annex_Glossary_body" lang="en-US">See <span class="condensed_italic">Primary production</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">
                              <span class="bold_condensed" lang="en-GB">Net zero CO</span>
                              <span class="bold_condensed-subscript _idGenCharOverride-1" lang="en-GB">2</span>
                              <span class="bold_condensed" lang="en-GB"> emissions</span>
                            </p>
                            <p class="Annex_Glossary_body" lang="en-US">Condition in which <span class="condensed_italic">anthropogenic carbon dioxide (CO</span><span class="subscript_italic-blue _idGenCharOverride-1">2</span><span class="condensed_italic">)</span> emissions are balanced by <span class="condensed_italic">anthropogenic</span> CO<span class="subscript _idGenCharOverride-1">2</span> removals over a specified period. See also <span class="condensed_italic">Land use</span>.</p>
                            <p class="Annex_Glossary_body" lang="en-US">[Note: Carbon neutrality and <span class="condensed_italic">net zero CO</span><span class="subscript_italic-blue CharOverride-1">2</span><span class="condensed_italic"> emissions</span> are overlapping concepts. The concepts can be applied at global or sub-global scales (e.g., regional, national and sub-national). At a global scale, the terms &#8216;carbon neutrality&#8217; and <span class="condensed_italic">net zero CO</span><span class="subscript_italic-blue CharOverride-1">2</span> <span class="condensed_italic">emissions</span> are equivalent. At sub-global scales, <span class="condensed_italic">net zero CO</span><span class="subscript_italic-blue CharOverride-1">2</span><span class="condensed_italic"> emissions</span> is generally applied to <span class="condensed_italic">emissions</span> and removals under direct control or territorial responsibility of the reporting entity, while carbon neutrality generally includes <span class="condensed_italic">emissions</span> and removals within and beyond the direct control or territorial responsibility of the reporting entity. Accounting rules specified by GHG programmes or schemes can have a significant influence on the quantification of relevant CO<span class="subscript CharOverride-1">2</span> <span class="condensed_italic">emissions</span> and removals.]</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">New Urban Agenda</p>
                            <p class="Annex_Glossary_body" lang="en-US">The New Urban Agenda was adopted at the United Nations Conference on Housing and Sustainable Urban Development (Habitat III) in Quito, Ecuador, on 20 October 2016. It was endorsed by the United Nations General Assembly at its 68th plenary meeting of the 71st session on 23 December 2016.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Non-climatic driver (Non-climate driver)</p>
                            <p class="Annex_Glossary_body" lang="en-US">An agent or process outside the <span class="condensed_italic">climate system</span> that influences a <span class="condensed_italic">human</span> or <span class="condensed_italic">natural system</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Non-communicable diseases</p>
                            <p class="Annex_Glossary_body" lang="en-US"><span class="condensed_italic">Non-communicable diseases</span> (NCDs), also known as chronic diseases, tend to be of long duration and are the result of a combination of genetic, physiological, environmental and behavioural factors. The main types of NCDs are cardiovascular diseases (such as heart attacks and stroke), cancers, chronic respiratory diseases (such as chronic obstructive pulmonary disease and asthma) and diabetes (WHO).</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Ocean</p>
                            <p class="Annex_Glossary_body" lang="en-US">The interconnected body of saline water that covers 71% of the Earth&#8217;s surface, contains 97% of the Earth&#8217;s water and provides 99% of the Earth&#8217;s biologically habitable space. It includes the Arctic, Atlantic, Indian, Pacific and Southern Oceans, as well as their marginal seas and coastal waters.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Ocean acidification (OA)</p>
                            <p class="Annex_Glossary_body" lang="en-US">A reduction in the <span class="condensed_italic">pH</span> of the <span class="condensed_italic">ocean</span>, accompanied by other chemical changes (primarily in the levels of carbonate and bicarbonate ions), over an extended period, typically decades or longer, which is caused primarily by <span class="condensed_italic">uptake</span> of <span class="condensed_italic">carbon dioxide (CO</span><span class="subscript_italic-blue _idGenCharOverride-1">2</span><span class="condensed_italic">)</span> from the <span class="condensed_italic">atmosphere</span>, but can also be caused by other chemical additions or subtractions from the <span class="condensed_italic">ocean</span>. <span class="condensed_italic">Anthropogenic</span> OA refers to the component of pH reduction that is caused by human activity (IPCC, 2011, p. 37).</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Ocean deoxygenation</p>
                            <p class="Annex_Glossary_body" lang="en-US">The loss of oxygen in the <span class="condensed_italic">ocean</span>. It results from <span class="condensed_italic">ocean</span> warming, which reduces oxygen solubility and increases oxygen consumption and <span class="condensed_italic">stratification</span>, thereby reducing the mixing of oxygen into the <span class="condensed_italic">ocean</span> interior.&#160;Deoxygenation can also be exacerbated by the addition of excess nutrients in the coastal zone.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Ocean stratification</p>
                            <p class="Annex_Glossary_body" lang="en-US">See <span class="condensed_italic">Stratification</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Outbreak</p>
                            <p class="Annex_Glossary_body" lang="en-US">Often used synonymously with &#8216;epidemic&#8217;, usually to indicate localised as opposed to generalised epidemics (WHO, 2020).</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Overshoot pathways</p>
                            <p class="Annex_Glossary_body" lang="en-US">See <span class="condensed_italic">Pathways</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Oxygen minimum zone (OMZ)</p>
                            <p class="Annex_Glossary_body" lang="en-US">The midwater layer (200&#8211;1000&#160;m) in the open <span class="condensed_italic">ocean</span> in which oxygen saturation is the lowest in the <span class="condensed_italic">ocean</span>. The degree of oxygen depletion depends on the largely bacterial consumption of organic matter, and the distribution of the OMZs is influenced by large-scale <span class="condensed_italic">ocean</span> circulation. In coastal <span class="condensed_italic">oceans</span>, OMZs extend to the shelves and may also affect <span class="condensed_italic">benthic ecosystems</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">
                              <span class="bold_condensed" lang="en-GB">Ozone (O</span>
                              <span class="bold_condensed-subscript _idGenCharOverride-1" lang="en-GB">3</span>
                              <span class="bold_condensed" lang="en-GB">)</span>
                            </p>
                            <p class="Annex_Glossary_body" lang="en-US">The triatomic form of oxygen, and a gaseous atmospheric constituent. In the troposphere, O<span class="subscript _idGenCharOverride-1">3</span> is created both naturally and by photochemical reactions involving gases resulting from human activities (e.g., smog). Tropospheric O<span class="subscript _idGenCharOverride-1">3</span> acts as a <span class="condensed_italic">greenhouse gas (GHG)</span>. In the stratosphere, O<span class="subscript _idGenCharOverride-1">3</span> is created by the interaction between solar ultraviolet radiation and molecular oxygen (O<span class="subscript _idGenCharOverride-1">2</span>). Stratospheric O<span class="subscript _idGenCharOverride-1">3</span> plays a dominant role in the stratospheric radiative balance. Its concentration is highest in the <span class="condensed_italic">ozone</span> layer.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Pandemic</p>
                            <p class="Annex_Glossary_body" lang="en-US">A worldwide outbreak of a disease in humans in numbers clearly in excess of normal (WHO, 2020).</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Particulate matter (PM)</p>
                            <p class="Annex_Glossary_body" lang="en-US">Atmospheric aerosol involved in air pollution issues. Of greatest concern for health are particles of aerodynamic diameter less than or equal to 10 micrometers, usually designated as PM10 and particles of diameter less than or equal to 2.5 micrometers, usually designated as PM2.5.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Pasture</p>
                            <p class="Annex_Glossary_body" lang="en-US">Area covered with grass or other plants used or suitable for grazing of livestock; grassland.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Path dependence</p>
                            <p class="Annex_Glossary_body" lang="en-US">The generic situation where decisions, events or outcomes at one point in time constrain <span class="condensed_italic">adaptation</span>, <span class="condensed_italic">mitigation</span> or other actions or options at a later point in time. See also <span class="condensed_italic">Lock-in</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Pathways</p>
                            <p class="Annex_Glossary_body" lang="en-US">The temporal evolution of <span class="condensed_italic">natural</span> and/or <span class="condensed_italic">human systems</span> towards a future state. <span class="condensed_italic">Pathway</span> concepts range from sets of quantitative and qualitative <span class="condensed_italic">scenarios</span> or <span class="condensed_italic">narratives</span> of potential futures to solution-oriented decision-making processes to achieve desirable societal goals. <span class="condensed_italic">Pathway</span> approaches typically focus on biophysical, techno-economic and/or socio-behavioural trajectories and involve various dynamics, goals and actors across different scales. See also <span class="condensed_italic">Scenario</span>.</p>
                            <p class="Annex_Glossary_subhead" lang="en-US">Adaptation pathways</p>
                            <p class="Annex_Glossary_body-indent" lang="en-US">A series of <span class="condensed_italic">adaptation</span> choices involving <span class="condensed_italic">trade-offs</span> between short-term and long-term goals and values. These are processes of deliberation to identify solutions that are meaningful to people in the context of their daily lives and to avoid potential <span class="condensed_italic">maladaptation</span>.</p>
                            <p class="Annex_Glossary_subhead" lang="en-US">Climate resilient development pathways (CRDPs)</p>
                            <p class="Annex_Glossary_body-indent" lang="en-US">Trajectories that strengthen sustainable development and efforts to eradicate <span class="condensed_italic">poverty</span> and reduce inequalities while promoting fair and cross-scalar <span class="condensed_italic">adaptation</span> to and <span class="condensed_italic">resilience</span> in a changing <span class="condensed_italic">climate</span>. They raise the <span class="condensed_italic">ethics</span>, <span class="condensed_italic">equity</span> and <span class="condensed_italic">feasibility</span> aspects of the deep <span class="condensed_italic">societal transformation</span> needed to drastically reduce <span class="condensed_italic">emissions</span> to limit <span class="condensed_italic">global warming</span> (e.g., to well below 2&#176;C) and achieve desirable and liveable futures and <span class="condensed_italic">well-being</span> for all.</p>
                            <p class="Annex_Glossary_subhead" lang="en-US">Climate-resilient pathways</p>
                            <p class="Annex_Glossary_body-indent" lang="en-US">Iterative processes for managing change within complex systems in order to reduce disruptions and enhance opportunities associated with <span class="condensed_italic">climate change</span>. See also <span class="condensed_italic">Development pathways</span> and <span class="condensed_italic">Pathways</span>.</p>
                            <p class="Annex_Glossary_subhead" lang="en-US">Development pathways</p>
                            <p class="Annex_Glossary_body-indent" lang="en-US"><span class="condensed_italic">Development pathways</span> evolve as the result of the countless decisions being made and actions being taken at all levels of societal structure, as well due to the emergent dynamics within and between <span class="condensed_italic">institutions</span>, cultural norms, technological systems and other <span class="condensed_italic">drivers</span> of <span class="condensed_italic">behavioural change</span>.</p>
                            <p class="Annex_Glossary_subhead" lang="en-US">Emission pathways</p>
                            <p class="Annex_Glossary_body-indent" lang="en-US">Modelled trajectories of global <span class="condensed_italic">anthropogenic emissions</span> over the 21st century are termed <span class="condensed_italic">emission pathways</span>.</p>
                            <p class="Annex_Glossary_subhead" lang="en-US">Overshoot pathways</p>
                            <p class="Annex_Glossary_body-indent" lang="en-US"><span class="condensed_italic">Pathways</span> that first exceed a specified concentration, forcing or <span class="condensed_italic">global warming</span> level, and then return to or below that level again before the end of a specified period of time (e.g., before 2100). Sometimes the magnitude and <span class="condensed_italic">likelihood</span> of the overshoot are also characterised. The overshoot duration can vary from one <span class="condensed_italic">pathway</span> to the next, but in most <span class="condensed_italic">overshoot pathways</span> in the literature and referred to as <span class="condensed_italic">overshoot pathways</span> in the AR6, the overshoot occurs over a period of at least one decade and up to several decades.</p>
                            <p class="Annex_Glossary_subhead" lang="en-US">Representative Concentration Pathways (RCPs)</p>
                            <p class="Annex_Glossary_body-indent" lang="en-US"><span class="condensed_italic">Scenarios</span> that include time series of <span class="condensed_italic">emissions</span> and concentrations of the full suite of <span class="condensed_italic">greenhouse gases (GHGs)</span> and <span class="condensed_italic">aerosols</span> and chemically active gases, as well as <span class="condensed_italic">land use</span>/<span class="condensed_italic">land cover</span> (Moss et&#160;al., 2008; van Vuuren et&#160;al., 2011). The word &#8216;representative&#8217; signifies that each RCP provides only one of many possible scenarios that would lead to the specific <span class="condensed_italic">radiative forcing</span> characteristics. The term <span class="condensed_italic">pathway</span> emphasises the fact that not only the long-term concentration levels, but also the trajectory taken over time to reach that outcome are of interest (Moss et&#160;al., 2010; van Vuuren et&#160;al., 2011).</p>
                            <p class="Annex_Glossary_body-indent" lang="en-US">RCPs usually refer to the portion of the concentration <span class="condensed_italic">pathway</span> extending up to 2100, for which <span class="condensed_italic">integrated assessment models</span> produced corresponding <span class="condensed_italic">emission scenarios</span>. Extended concentration <span class="condensed_italic">pathways</span> describe extensions of the RCPs from 2100 to 2300 that were calculated using simple rules generated by stakeholder consultations, and do not represent fully consistent scenarios. Four RCPs produced from <span class="condensed_italic">integrated assessment models</span> were selected from the published literature and are used in the Fifth IPCC Assessment and are also used in this Assessment for comparison, spanning the range from approximately below 2&#176;C warming to high (&gt;4&#176;C) warming best-estimates by the end of the 21st century: RCP2.6, RCP4.5 and RCP6.0, and RCP8.5.</p>
                            <ul>
                              <li class="Annex_Glossary_list" lang="en-GB">RCP2.6: One <span class="condensed_italic">pathway</span> where <span class="condensed_italic">radiative forcing</span> peaks at approximately 3&#160;W m<span class="superscript _idGenCharOverride-1">&#8722;2</span> and then declines to be limited at 2.6&#160;W m<span class="superscript _idGenCharOverride-1">&#8722;2</span> in 2100 (the corresponding Extended Concentration Pathway, or ECP, has constant <span class="condensed_italic">emissions</span> after 2100).</li>
                              <li class="Annex_Glossary_list" lang="en-GB">RCP4.5 and RCP6.0: Two intermediate stabilisation <span class="condensed_italic">pathways</span> in which <span class="condensed_italic">radiative forcing</span> is limited at approximately 4.5&#160;W m<span class="superscript _idGenCharOverride-1">&#8722;2</span> and 6.0&#160;W m<span class="superscript _idGenCharOverride-1">&#8722;2</span> in 2100 (the corresponding ECPs have constant concentrations after 2150).</li>
                              <li class="Annex_Glossary_list" lang="en-GB">RCP8.5: One high <span class="condensed_italic">pathway</span> which leads to &gt;8.5&#160;W m<span class="superscript _idGenCharOverride-1">&#8722;2</span> in 2100 (the corresponding ECP has constant <span class="condensed_italic">emissions</span> after 2100 until 2150 and constant concentrations after 2250).</li>
                            </ul>
                            <p class="Annex_Glossary_subhead" lang="en-US">Shared socio-economic pathways (SSPs)</p>
                            <p class="Annex_Glossary_body-indent" lang="en-US"><span class="condensed_italic">Shared socio-economic pathways (SSPs)</span> have been developed to complement the <span class="condensed_italic">Representative Concentration Pathways (RCPs)</span>. By design, the RCP <span class="condensed_italic">emission</span> and concentration <span class="condensed_italic">pathways</span> were stripped of their association with a certain socio-economic development. Different levels of <span class="condensed_italic">emissions </span>and <span class="condensed_italic">climate change </span>along the dimension of the RCPs can hence be explored against the backdrop of different <span class="condensed_italic">socio-economic development pathways</span> (SSPs) on the other dimension in a matrix. This integrative SSP-RCP framework is now widely used in the <span class="condensed_italic">climate impact </span>and <span class="condensed_italic">policy</span> analysis literature (see, e.g., <a href="http://iconics-ssp.org">http://iconics-ssp.org</a>), where <span class="condensed_italic">climate projections </span>obtained under the RCP scenarios are analysed against the backdrop of various SSPs.</p>
                            <p class="Annex_Glossary_body-indent" lang="en-US">As several <span class="condensed_italic">emission</span> updates were due, a new set of <span class="condensed_italic">emission scenarios</span> was developed in conjunction with the SSPs. Hence, the abbreviation SSP is now used for two things: On the one hand SSP1, SSP2, &#8230;, SSP5 is used to denote the five <span class="condensed_italic">socio-economic scenario</span> families. On the other hand, the abbreviations SSP1-1.9, SSP1-2.6, &#8230;, SSP5-8.5 are used to denote the newly developed <span class="condensed_italic">emission scenarios</span> that are the result of an SSP implementation within an <span class="condensed_italic">integrated assessment model</span>. Those SSP scenarios are bare of <span class="condensed_italic">climate policy</span> assumption, but in combination with so-called shared <span class="condensed_italic">policy</span> assumptions (SPAs), various approximate <span class="condensed_italic">radiative forcing</span> levels of 1.9, 2.6, &#8230;, or 8.5&#160;W m<span class="superscript _idGenCharOverride-1">&#8722;2</span> are reached by the end of the century, respectively.</p>
                            <p class="Annex_Glossary_subhead" lang="en-US">Sustainable development pathways (SDPs)</p>
                            <p class="Annex_Glossary_body-indent" lang="en-US">Trajectories aimed at attaining the <span class="condensed_italic">Sustainable Development Goals (SDGs) </span>in the short term and the goals of <span class="condensed_italic">sustainable development</span> in the long term. In the context of <span class="condensed_italic">climate change</span>, such <span class="condensed_italic">pathways</span> denote trajectories that address social, environmental and economic dimensions of sustainable development, <span class="condensed_italic">adaptation</span> and <span class="condensed_italic">mitigation</span>, and <span class="condensed_italic">transformation</span>, in a generic sense or from a particular methodological perspective such as <span class="condensed_italic">integrated assessment models</span> and <span class="condensed_italic">scenario</span> simulations.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Peat</p>
                            <p class="Annex_Glossary_body" lang="en-US">Soft, porous or compressed, sedentary deposit of which a substantial portion is partly decomposed plant material with high water content in the natural state (up to about 90%) (IPCC, 2013).</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Peatlands</p>
                            <p class="Annex_Glossary_body" lang="en-US">Peatlands are wetland <span class="condensed_italic">ecosystems</span> where soils are dominated by <span class="condensed_italic">peat</span>. In peatlands, <span class="condensed_italic">net primary production</span> exceeds organic matter decomposition as a result of waterlogged conditions, which leads to the <span class="condensed_italic">accumulation</span> of <span class="condensed_italic">peat</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Pelagic</p>
                            <p class="Annex_Glossary_body" lang="en-US">The <span class="condensed_italic">pelagic</span> zone consists of the entire water column of the open <span class="condensed_italic">ocean</span>. It is subdivided into the epipelagic zone (&lt;200&#160;m, the uppermost part of the <span class="condensed_italic">ocean</span> that receives enough sunlight to allow <span class="condensed_italic">photosynthesis</span>), the mesopelagic zone (200&#8211;1000&#160;m depth) and the bathypelagic zone (&gt;1000&#160;m depth). The term <span class="condensed_italic">pelagic</span> can also refer to organisms that live in the <span class="condensed_italic">pelagic</span> zone.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Pelagos</p>
                            <p class="Annex_Glossary_body" lang="en-US">Organisms large and small living in the <span class="condensed_italic">pelagic</span> zones. Includes <span class="condensed_italic">plankton</span> (small) and nekton (free swimming, large). See <span class="condensed_italic">Benthos</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Percentiles</p>
                            <p class="Annex_Glossary_body" lang="en-US">A partition value in a population distribution that a given percentage of the data values are below or equal to. The 50th percentile corresponds to the median of the population. Percentiles are often used to estimate the extremes of a distribution. For example, the 90th (10th) percentile may be used to refer to the threshold for the upper (lower) extremes.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Peri-urban areas</p>
                            <p class="Annex_Glossary_body" lang="en-US">Dynamic transition zones that have intense interaction between rural and <span class="condensed_italic">urban</span> economies, activities, households and lifestyles. Neither fully rural or <span class="condensed_italic">urban</span> (following Seto et&#160;al., 2010).</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Permafrost</p>
                            <p class="Annex_Glossary_body" lang="en-US">Ground (soil or rock, and included ice and organic material) that remains at or below 0&#176;C for at least two consecutive years (Harris et&#160;al., 1988). Note that <span class="condensed_italic">permafrost</span> is defined via temperature rather than ice content and, in some instances, may be ice-free.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Permafrost degradation</p>
                            <p class="Annex_Glossary_body" lang="en-US">Decrease in the thickness and/or areal extent of <span class="condensed_italic">permafrost</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Permafrost thaw</p>
                            <p class="Annex_Glossary_body" lang="en-US">Progressive loss of ground ice in <span class="condensed_italic">permafrost</span>, usually due to input of heat. Thaw can occur over decades to centuries over the entire depth of <span class="condensed_italic">permafrost</span> ground, with <span class="condensed_italic">impacts</span> occurring while thaw progresses. During thaw, temperature fluctuations are subdued because energy is transferred by phase change between ice and water. After the transition from <span class="condensed_italic">permafrost</span> to non-<span class="condensed_italic">permafrost</span>, ground can be described as thawed.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">pH</p>
                            <p class="Annex_Glossary_body" lang="en-US">A dimensionless measure of the acidity of a solution given by its concentration of hydrogen ions (H<span class="superscript _idGenCharOverride-1">+</span>). <span class="condensed_italic">pH</span> is measured on a logarithmic scale where <span class="condensed_italic">pH</span> = &#8722;log<span class="subscript _idGenCharOverride-1">10</span>(H<span class="superscript _idGenCharOverride-1">+</span>). Thus, a <span class="condensed_italic">pH</span> decrease of 1 unit corresponds to a 10-fold increase in the concentration of H<span class="superscript _idGenCharOverride-1">+</span>, or acidity.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Phenology</p>
                            <p class="Annex_Glossary_body" lang="en-US">The relationship between biological phenomena that recur periodically (e.g., development stages, migration) especially related to <span class="condensed_italic">climate</span> and seasonal changes.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Photosynthesis</p>
                            <p class="Annex_Glossary_body" lang="en-US">The production of carbohydrates in plants, algae and some bacteria using the energy of light. <span class="condensed_italic">Carbon dioxide (CO</span><span class="subscript_italic-blue _idGenCharOverride-1">2</span><span class="condensed_italic">)</span> is used as the carbon source.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Planetary health</p>
                            <p class="Annex_Glossary_body" lang="en-US">a concept based on the understanding that human health and human civilisation depend on ecosystem health and the wise stewardship of ecosystems.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Plankton</p>
                            <p class="Annex_Glossary_body" lang="en-US">Free-floating organisms living in the upper layers of aquatic systems. Their distribution and migration are primarily determined by water currents. A distinction is made between phytoplankton, which depend on <span class="condensed_italic">photosynthesis</span> for their energy supply, and zooplankton, which feed on phytoplankton, other zooplankton and bacterioplankton.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Planned relocation (of humans)</p>
                            <p class="Annex_Glossary_body" lang="en-US">A form of <span class="condensed_italic">human mobility</span> response in the face of <span class="condensed_italic">sea level rise</span> and related <span class="condensed_italic">impacts</span>. <span class="condensed_italic">Planned relocation</span> is typically initiated, supervised and implemented from national to local level and involves small communities and individual assets but may also involve large populations. Also termed resettlement, managed retreat or managed realignment.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Plasticity (biology)</p>
                            <p class="Annex_Glossary_body" lang="en-US">Change in organismal trait values in response to an environmental cue and which does not require change in underlying DNA sequence.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Policies (for climate change mitigation and adaptation)</p>
                            <p class="Annex_Glossary_body" lang="en-US">Strategies that enable actions to be undertaken to accelerate <span class="condensed_italic">adaptation</span> and <span class="condensed_italic">mitigation</span>. <span class="condensed_italic">Policies</span> include those developed by national and subnational public agencies, and with the private sector. <span class="condensed_italic">Policies</span> for <span class="condensed_italic">adaptation</span> and <span class="condensed_italic">mitigation</span> often take the form of economic incentives, regulatory instruments, and decision-making and engagement processes.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Political economy</p>
                            <p class="Annex_Glossary_body" lang="en-US">The set of interlinked relationships between people, the State, society and markets as defined by law, politics, economics, customs and power that determine the outcome of trade and transactions and the distribution of wealth in a country or economy.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Polycentric governance</p>
                            <p class="Annex_Glossary_body" lang="en-US">See <span class="condensed_italic">Governance</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Potential evapotranspiration</p>
                            <p class="Annex_Glossary_body" lang="en-US">The potential rate of water loss without any limits imposed by the water supply.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Poverty</p>
                            <p class="Annex_Glossary_body" lang="en-US">A complex concept with several definitions stemming from different schools of thought. It can refer to material circumstances (such as need, pattern of deprivation or limited resources), economic conditions (such as standard of living, <span class="condensed_italic">inequality</span> or economic position) and/or social relationships (such as social class, dependency, exclusion, lack of basic security or lack of entitlement). See also <span class="condensed_italic">Poverty trap</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Poverty trap</p>
                            <p class="Annex_Glossary_body" lang="en-US"><span class="condensed_italic">Poverty trap</span> is understood differently across disciplines. In the social sciences, the concept, primarily employed at the individual, household or community level, describes a situation in which escaping <span class="condensed_italic">poverty</span> becomes impossible due to unproductive or inflexible resources. A <span class="condensed_italic">poverty trap</span> can also be seen as a critical minimum asset threshold, below which families are unable to successfully educate their children, build up their productive assets and get out of poverty. Extreme poverty is itself a <span class="condensed_italic">poverty trap</span> since poor persons lack the means to participate meaningfully in society. In economics, the term <span class="condensed_italic">poverty trap</span> is often used at national scales, referring to a self-perpetuating condition where an economy, caught in a vicious cycle, suffers from persistent underdevelopment (Matsuyama, 2008). Many proposed models of <span class="condensed_italic">poverty traps</span> are found in the literature.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Pre-industrial (period)</p>
                            <p class="Annex_Glossary_body" lang="en-US">The multi-century period prior to the onset of large-scale industrial activity around 1750. The <span class="condensed_italic">reference period</span> 1850&#8211;1900 is used to approximate <span class="condensed_italic">pre-industrial global mean surface temperature (GMST)</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Precursors</p>
                            <p class="Annex_Glossary_body" lang="en-US">Atmospheric compounds that are not <span class="condensed_italic">greenhouse gases (GHGs)</span> or <span class="condensed_italic">aerosols</span>, but that have an effect on GHG or <span class="condensed_italic">aerosol</span> concentrations by taking part in physical or chemical processes regulating their production or destruction rates.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Predictability</p>
                            <p class="Annex_Glossary_body" lang="en-US">The extent to which future states of a system may be predicted based on knowledge of current and past states of the system. Because knowledge of the <span class="condensed_italic">climate system</span>&#8217;s past and current states is generally imperfect, as are the models that utilise this knowledge to produce a <span class="condensed_italic">climate prediction</span>, and because the <span class="condensed_italic">climate system</span> is inherently nonlinear and chaotic, the <span class="condensed_italic">predictability</span> of the <span class="condensed_italic">climate system</span> is inherently limited. Even with arbitrarily accurate models and observations, there may still be limits to the <span class="condensed_italic">predictability</span> of such a nonlinear system (AMS, 2000).</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Primary production</p>
                            <p class="Annex_Glossary_body" lang="en-US">The synthesis of organic compounds by plants and microbes, on <span class="condensed_italic">land</span> or in the <span class="condensed_italic">ocean</span>, primarily by <span class="condensed_italic">photosynthesis</span> using light and <span class="condensed_italic">carbon dioxide (CO</span><span class="subscript_italic-blue _idGenCharOverride-1">2</span><span class="condensed_italic">)</span> as <span class="condensed_italic">sources</span> of energy and carbon, respectively. It can also occur through chemosynthesis, using chemical energy, for example, in deep sea vents.</p>
                            <p class="Annex_Glossary_subhead" lang="en-US">Net primary production (NPP)</p>
                            <p class="Annex_Glossary_body-indent" lang="en-US">The difference between how much CO<span class="subscript CharOverride-1">2</span> vegetation takes in during <span class="condensed_italic">photosynthesis</span> (gross <span class="condensed_italic">primary production</span>) minus how much CO<span class="subscript CharOverride-1">2</span> the plants release during <span class="condensed_italic">respiration</span> (IPBES, 2019, Global Assessment).</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Procedural justice</p>
                            <p class="Annex_Glossary_body" lang="en-US">See <span class="condensed_italic">Justice</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Projection</p>
                            <p class="Annex_Glossary_body" lang="en-US">A potential future evolution of a quantity or set of quantities, often computed with the aid of a <span class="condensed_italic">model</span>. Unlike predictions, <span class="condensed_italic">projections</span> are conditional on assumptions concerning, for example, future socio-economic and technological developments that may or may not be realised. See also <span class="condensed_italic">Pathways</span> and <span class="condensed_italic">Scenario</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Proxy</p>
                            <p class="Annex_Glossary_body" lang="en-US">A <span class="condensed_italic">proxy climate</span> indicator is a record that is interpreted, using physical and biophysical principles, to represent some combination of <span class="condensed_italic">climate</span>-related variations back in time. <span class="condensed_italic">Climate</span>-related data derived in this way are referred to as <span class="condensed_italic">proxy</span> data. Examples of <span class="condensed_italic">proxies</span> include <span class="condensed_italic">pollen analysis</span>, <span class="condensed_italic">tree ring</span> records, speleothems, characteristics of corals and various data derived from marine sediments and ice cores. <span class="condensed_italic">Proxy</span> data can be calibrated to provide quantitative <span class="condensed_italic">climate information</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Radiative forcing</p>
                            <p class="Annex_Glossary_body" lang="en-US">The change in the net, downward minus upward, radiative <span class="condensed_italic">flux</span> (expressed in W m<span class="superscript _idGenCharOverride-1">&#8722;2</span>) at the tropopause or top of <span class="condensed_italic">atmosphere</span> due to a change in an (external)&#160;<span class="condensed_italic">driver</span> of <span class="condensed_italic">climate change</span>, such as a change in the concentration of <span class="condensed_italic">carbon dioxide (CO</span><span class="subscript_italic-blue _idGenCharOverride-1">2</span><span class="condensed_italic">)</span>, the concentration of volcanic <span class="condensed_italic">aerosols</span> or the output of the Sun. The traditional <span class="condensed_italic">radiative forcing</span> is computed with all tropospheric properties held fixed at their unperturbed values, and after allowing for stratospheric temperatures, if perturbed, to readjust to radiative-dynamical equilibrium. <span class="condensed_italic">Radiative forcing</span> is called instantaneous if no change in stratospheric temperature is accounted for. The <span class="condensed_italic">radiative forcing</span> once rapid adjustments are accounted for is termed the effective <span class="condensed_italic">radiative forcing</span>. <span class="condensed_italic">Radiative forcing</span> is not to be confused with cloud <span class="condensed_italic">radiative forcing</span>, which describes an unrelated measure of the <span class="condensed_italic">impact</span> of clouds on the radiative <span class="condensed_italic">flux</span> at the top of the <span class="condensed_italic">atmosphere</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Reasons for Concern (RFCs)</p>
                            <p class="Annex_Glossary_body" lang="en-US">Elements of a classification framework, first developed in the IPCC Third Assessment Report, which aims to facilitate judgements about what level of <span class="condensed_italic">climate change</span> may be dangerous (in the language of Article 2 of the UNFCCC) by aggregating <span class="condensed_italic">risks</span> from various sectors, considering <span class="condensed_italic">hazards</span>, <span class="condensed_italic">exposures</span>, vulnerabilities, capacities to adapt and the resulting <span class="condensed_italic">impacts</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Reference period</p>
                            <p class="Annex_Glossary_body" lang="en-US">A time period of interest, or a period over which some relevant statistics are calculated. A <span class="condensed_italic">reference period</span> can be used as a baseline period or as a comparison to a baseline period.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Reforestation</p>
                            <p class="Annex_Glossary_body" lang="en-US">Conversion to <span class="condensed_italic">forest</span> of land that has previously contained <span class="condensed_italic">forests</span> but that has been converted to some other use. See also <span class="condensed_italic">Afforestation</span> and <span class="condensed_italic">Forest</span>.</p>
                            <p class="Annex_Glossary_body" lang="en-US">[Note: For a discussion of the term <span class="condensed_italic">forest</span> and related terms such as <span class="condensed_italic">afforestation</span>, <span class="condensed_italic">reforestation</span> and <span class="condensed_italic">deforestation</span>, see the 2006 IPCC Guidelines for National Greenhouse Gas Inventories and their 2019 Refinement, and information provided by the United Nations Framework Convention on Climate Change (IPCC 2006, 2019; UNFCCC 2021a, 2021b)].</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Refugium</p>
                            <p class="Annex_Glossary_body" lang="en-US">A <span class="condensed_italic">refugium</span> is a geographic area where a population found safety from some threat to its existence, for example, <span class="condensed_italic">climate refugia</span> or glacial refugia (refuge from glaciations). See also <span class="condensed_italic">Climate refugium</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Region</p>
                            <p class="Annex_Glossary_body" lang="en-US">A<span class="condensed_italic"> land</span> and/or <span class="condensed_italic">ocean</span> area characterised by specific geographical and/or climatological features. The <span class="condensed_italic">climate</span> of a <span class="condensed_italic">region</span> emerges from a multi-scale combination of its own features, remote influences from other <span class="condensed_italic">regions</span> and global <span class="condensed_italic">climate</span> conditions.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Regulation</p>
                            <p class="Annex_Glossary_body" lang="en-US">A rule or order issued by governmental executive authorities or regulatory agencies and having the force of law. <span class="condensed_italic">Regulations</span> implement <span class="condensed_italic">policies</span> and are mostly specific for particular groups of people, legal entities or targeted activities. <span class="condensed_italic">Regulation</span> is also the act of designing and imposing rules or orders. Informational, transactional, administrative and political constraints in practice limit the regulator&#8217;s capability for implementing preferred <span class="condensed_italic">policies</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Relative humidity</p>
                            <p class="Annex_Glossary_body" lang="en-US">The <span class="condensed_italic">relative humidity</span> specifies the ratio of actual water vapour pressure to that at saturation with respect to liquid water or ice at the same temperature.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Reporting</p>
                            <p class="Annex_Glossary_body" lang="en-US">The process of formal reporting of assessment results to the UNFCCC, according to predetermined formats and according to established <span class="condensed_italic">standards</span>, especially the Intergovernmental Panel on Climate Change (IPCC) Guidelines and Good Practice Guidance (GPG) (UN REDD, 2009).</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Representative Concentration Pathways (RCPs)</p>
                            <p class="Annex_Glossary_body" lang="en-US">See <span class="condensed_italic">Pathways</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Reservoir</p>
                            <p class="Annex_Glossary_body" lang="en-US">A component or components of the <span class="condensed_italic">climate system</span> where a <span class="condensed_italic">greenhouse gas (GHG)</span> or a <span class="condensed_italic">precursor</span> of a <span class="condensed_italic">greenhouse gas</span> is stored (UNFCCC Article 1.7).</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Residual risk</p>
                            <p class="Annex_Glossary_body" lang="en-US">The <span class="condensed_italic">risk</span> related to <span class="condensed_italic">climate change impacts</span> that remains following <span class="condensed_italic">adaptation </span>and <span class="condensed_italic">mitigation </span>efforts. <span class="condensed_italic">Adaptation</span> actions can redistribute <span class="condensed_italic">risk</span> and <span class="condensed_italic">impacts</span>, with increased <span class="condensed_italic">risk </span>and <span class="condensed_italic">impacts</span> in some areas or populations, and decreased <span class="condensed_italic">risk</span> and <span class="condensed_italic">impacts</span> in others. See also <span class="condensed_italic">Loss and Damage, and losses and damages</span>.</p>
                            <p class="Annex_Glossary_definitions" lang="en-US">Resilience</p>
