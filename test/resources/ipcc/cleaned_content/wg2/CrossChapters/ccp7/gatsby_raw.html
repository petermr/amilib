                        <p class="Body_Body-justify" lang="en-GB">The decrease of tropical forest area due to land-use change will put additional pressures, threatening livelihood practices, traditional land arrangements and customary rights of forest-dependent communities, and impacting the Sustainable Development Goals (SDG) of Climate Action and Life on Land (<a class="reference-link" href="#Djoudi--2011">Djoudi and Brockhaus, 2011</a>; Tiani <span class="condensed_italic" lang=""/> et al., 2015; Hurlbert <span class="condensed_italic" lang=""/> et al., 2019). Globalised trade relations, agricultural expansion, illegal activities and violent conflicts have been identified as important non-climatic drivers of forest degradation (<span class="condensed_italic" lang="">high confidence</span>) (<a class="reference-link" href="#Barr--2012">Barr and Sayer, 2012</a>; Rist <span class="condensed_italic" lang=""/> et al., 2012; Shanley <span class="condensed_italic" lang=""/> et al., 2012; Ruiz-Mall&#233;n <span class="condensed_italic" lang=""/> et al., 2017; <a class="reference-link" href="#IPBES--2018">IPBES, 2018</a>; IPBES<span class="condensed_italic" lang=""/> et al., 2018). Globally, about 70% of tropical forest areas occur outside protected areas. In Latin America and the Caribbean, Indigenous Peoples and local communities have predominant ownership of tropical forest lands, while in West and Central Africa and Asia, forested areas are largely state-owned with exacerbating problems of governance, inequity and conflict with customary land tenure systems (Blaser et al., , 2011).</p>
                        <p class="Body_Body-justify" lang="en-GB">Further research by experts and local stakeholders and Indigenous Peoples is required to design more accurate and comprehensive indicators (Huong <span class="condensed_italic" lang=""/> et al., 2019). Solid evidence shows important knowledge and experiences that Indigenous Peoples and local communities contribute to disaster risk reduction and management (<a class="reference-link" href="#IPBES--2018">IPBES, 2018</a> a). Recognising the land rights of Indigenous Peoples is among the most cost-effective actions to address climate and biodiversity risks according to <a class="reference-link" href="#FAO and FILAC--2021">FAO and FILAC (2021)</a>. In Indigenous Peoples&#8217; forest lands in the Amazon basin, deforestation rates are up to 50% lower than in other forested areas (Ding <span class="condensed_italic" lang=""/> et al., 2016), and Indigenous management is correlated with reduced carbon emissions (<a class="reference-link" href="#Blackman--2018">Blackman and Veit, 2018</a>). Indigenous authors and local authors have pointed out the role of traditional systems of governance, knowledge and belief systems in the resilience of Indigenous Peoples and rural communities in the Amazonian and Andean regions, by regulating seed access and the conservation of agrobiodiversity and tropical forest (Camico <span class="condensed_italic" lang=""/> et al., 2021; Mustonen <span class="condensed_italic" lang=""/> et al., 2021). In the Philippines, the traditional land use system Muyong promotes sustainable agroforestry management based on customary land laws (Camacho <span class="condensed_italic" lang=""/> et al., 2016). Participation of local stakeholders and the inclusion of a gender perspective contribute to prioritising resource allocation and the development of effective legal frameworks for adaptation (Shah <span class="condensed_italic" lang=""/> et al., 2013; Tiani <span class="condensed_italic" lang=""/> et al., 2015; Ihalainen <span class="condensed_italic" lang=""/> et al., 2017; Collantes <span class="condensed_italic" lang=""/> et al., 2018). There is a need to combine quantitative and qualitative methods, and increase research efforts to integrated approaches; including multi-scalar and interdisciplinary assessments of vulnerability (Djoudi <span class="condensed_italic" lang=""/> et al., 2013; Guidi <span class="condensed_italic" lang=""/> et al., 2018; <a class="reference-link" href="#FAO and CIFOR--2019">FAO and CIFOR, 2019</a>).</p>
                      </div>
                    </div>
                    <div class="h1-container" id="CCP7.5">
                      <h1 class="Headings_H1-numbered" lang="en-GB">CCP7.5  Adaptation Options, Costs and Benefits <span class="share-block"><img class="share-icon" src="../../share.png"/></span><button class="btn-ipcc btn btn-primary chapter-expand">Expand section</button></h1>
                      <div class="h1-siblings" id="h1-6-siblings">
                        <p class="Body_Body-justify" lang="en-GB">Ecological adaptation and other spontaneous responses to climate change are discussed in Settele <span class="condensed_italic" lang=""/> et al. (2015) and [AR6 WGII_Chapter 2] Here we consider the role of humans in managing the adaptation of tropical forests to climate change. The focus is on human-assisted adaptation options that help to maintain tropical forest ecosystems and not on the use of forests to supply provisioning services, such as timber, which is covered in [AR6 WGII_Chapter 5]. Forest management and agroforestry are discussed, but only with regard to their role in contributing to the adaptation of tropical ecosystems now and in the future. Maintaining ecosystems has a range of co-benefits for humans, including through &#8216;ecosystem-based adaptation&#8217;. These are explored in [Box 1.3; Cross-Chapter Box NATURAL in Chapter 2, Box CCP7.2 ]. Although there are a number of potentially valuable response options, it is clear that certain hazards, such as heatwaves, may be impossible to manage at the forest community level and require long-term interventions at the landscape scale. Similarly, it will be difficult for forest managers to adapt to indirect climate-related ecosystem disturbances such as loss of pollination agents, invasive species or pest and diseases outbreaks (Allen <span class="condensed_italic" lang=""/> et al., 2010; Anderegg <span class="condensed_italic" lang=""/> et al., 2020). Equally important in adapting to increased pressure from climate change are efforts to minimise disturbance from non-climatic stress factors (e.g., overharvesting, pollution and land use change; Malhi <span class="condensed_italic" lang=""/> et al., 2014; <a class="reference-link" href="#Keenan--2015">Keenan, 2015</a>; Barlow <span class="condensed_italic" lang=""/> et al., 2016; P&#246;rtner <span class="condensed_italic" lang=""/> et al., 2021). Under some emissions scenarios, projected climate change impacts are of such severity that no adaptation measure is <span class="condensed_italic" lang="">likely </span> to protect natural forest systems; for example, with warming of 4&#176;C, some tropical forests are at risk of die-back from high temperature (Malhi <span class="condensed_italic" lang=""/> et al., 2014; Settele <span class="condensed_italic" lang=""/> et al., 2015; Trumbore <span class="condensed_italic" lang=""/> et al., 2015).</p>
                        <p class="Body_Body-justify" lang="en-GB">Actions to protect the extent or reduce the disturbance pressure on forest systems contribute to the capacity of these systems to respond to climate change (increasing resistance and resilience) (<span class="condensed_italic" lang="">high confidence</span>) (Millar <span class="condensed_italic" lang=""/> et al., 2007; Schmitz <span class="condensed_italic" lang=""/> et al., 2015; Settele <span class="condensed_italic" lang=""/> et al., 2015; Sakschewski <span class="condensed_italic" lang=""/> et al., 2016; Hisano <span class="condensed_italic" lang=""/> et al., 2018). Furthermore, if implemented sufficiently well, efforts to manage and restore forests also improve the capacity of forest systems to respond to future climate stressors (increasing resilience and responsiveness). Table CCP7.3  gives an overview of adaptation strategies for tropical forests within the framework of protect, manage, restore (Sayer <span class="condensed_italic" lang=""/> et al., 2003; P&#246;rtner <span class="condensed_italic" lang=""/> et al., 2021). In assessing the available adaptation options, it can be useful to distinguish between actions focused on protecting forest extent, managing biodiversity, managing ecosystem function or restoring ecosystem services (<a class="reference-link" href="#Sepp&#228;l&#228;--2009">Sepp&#228;l&#228;, 2009</a>), Figure CCP7.5  and Table CCP7.4  give a detailed assessment of the major adaptation options in this context. Beyond these specific interventions, and in several cases underpinning them, there is an increasing awareness that effective management and adaptation of tropical forests requires an appreciation of IK, LK and CBA for implementation to be meaningful; these approaches are assessed in [Box CCP7.1 ]</p>
                        <div class="Figure" id="_idContainer041">
                          <p class="Body_Figures_Figure" lang="de-DE">
                            <img alt="" class="_idGenObjectAttribute-12" id="figure-ccp7-005" loading="lazy" src="https://ipcc.ch/report/ar6/wg2/downloads/figures/IPCC_AR6_WGII_Figure_CCP7_005.png"/>
                          </p>
                          <p class="Body_Figures_Figure_title" lang="en-US"><span class="figure_number" lang="">Figure CCP7.5  | </span><span class="bold_condensed-dark-blue" lang="">Framework to assess adaptation response options in tropical forests by adopting a landscape perspective as determined by types of forests and tree cover across different tenure regimes. </span>HCVA, high conservation value areas; HCSA, high carbon stock areas; IPLC, Indigenous Peoples and local communities. The information supporting this figure originates from an extensive literature review that is included in this section, Table CCP7.4. The assessment of confidence levels is based on the judgement of the authors based on the reviewed literature and follows IPBES guidelines.</p>
                          <div class="ch-figure-button-cont"><a href="/report/ar6/wg2/figures/chapter-ccp7/figure-ccp7-005" target="_blank"><button class="btn-ipcc btn btn-primary ch-figure-button">Open figure</button></a> </div>
                        </div>
                      </div>
                      <div class="h2-container box-container" id="box-ccp7.1">
                        <h2 class="Body_Box_blue_Box_head" lang="en-GB"><span>Box CCP7.1  | Indigenous Knowledge and Local Knowledge and Community-Based Adaptation</span> <span class="arrow-up"/><span class="arrow-down"/><span class="share-block"><img class="share-icon" src="../../share.png"/></span></h2>
                        <div class="h2-siblings" id="h2-14-siblings">
                          <p class="Body_Box_blue_Box_body" lang="en-GB">Purely scientific knowledge, albeit indispensable, is insufficient to address climate change. Indigenous knowledge systems, embedded in social and cultural structures, are integral to climate resilience and adaptation (<span class="condensed_italic" lang="">high confidence</span>) (<a class="reference-link" href="#Ajani--2013">Ajani, 2013</a>; Teng&#246;<span class="condensed_italic" lang=""/> et al., 2014; Hiwasaki <span class="condensed_italic" lang=""/> et al., 2015; <a class="reference-link" href="#Roue--2018">Roue and Nakashima, 2018</a>) [AR5 WGII <a class="section-link" data-title="Northern South America Sub-region" href="/report/ar6/wg2/chapter/chapter-12#12.3.3">Section 12.3.3</a>  (Adger et al. 2014), AR5 WGII Section 20.4.2 (Denton et al. 2014), SRCCL <a class="section-link" data-title="Appropriate Technologies" href="/report/ar6/wg2/chapter/chapter-4#4.8.1">Section 4.8.1</a>  (Olsson et al. 2019), SRCCL <a class="section-link" data-title="Adequate and Appropriate Financing" href="/report/ar6/wg2/chapter/chapter-4#4.8.2">Section 4.8.2</a>  (Olsson et al. 2019), SR15 <a class="section-link" data-title="Observed Impacts on Freshwater Ecosystems" href="/report/ar6/wg2/chapter/chapter-4#4.3.5">Section 4.3.5.5</a> (de Coninck et al. 2018) ]. knowledge and local knowledge (IK and LK) and community-based adaptation (CBA) have received increasing recognition across all sectors (<span class="condensed_italic" lang="">high confidence</span>) (<a class="reference-link" href="#Reid--2014">Reid and Huq, 2014</a>; Wright <span class="condensed_italic" lang=""/> et al., 2014; Moste, 2015) [SRCCL <a class="section-link" data-title="Centrality of Water Security in Climate Change and Climate Resilient Development" href="/report/ar6/wg2/chapter/chapter-4#4.1">Section 4.1.6</a> (Olsson et al. 2019), SRCCL <a class="section-link" data-title="Methodologies and Associated Uncertainties" href="/report/ar6/wg2/chapter/chapter-5#5.3">Section 5.3.5</a> (Mbow et al. 2019), SR15 Box 4.3 (de Coninck et al. 2018)] (Figure Box CCP7.1.1). Forest Indigenous knowledge (IK) is closely linked to traditional land-use practices and local governance (Roberts <span class="condensed_italic" lang=""/> et al., 2009); it is embodied in art, rituals, food, agriculture and customary laws, among others (Hiwasaki <span class="condensed_italic" lang=""/> et al., 2015; Camico <span class="condensed_italic" lang=""/> et al., 2021). CBA is a community-led process based on its desires, priorities, knowledge and capacities which empowers people as central players in climate change adaptation (Reid <span class="condensed_italic" lang=""/> et al., 2009) [SRCCL 5.3.5].</p>
                          <p class="Body_Box_blue_Box_body" lang="en-GB">CBA is related with concepts such as community and adaptive collaborative forest management. These approaches acknowledge the importance of cultural and socioeconomic ties between communities and forests, along with community&#8217;s authority and responsibility for forest sustainable management (<a class="reference-link" href="#Ajani--2013">Ajani, 2013</a>; Ellis <span class="condensed_italic" lang=""/> et al., 2015; Torres <span class="condensed_italic" lang=""/> et al., 2015).</p>
                          <p class="Body_Box_blue_Box_subhead_H2" lang="en-GB">Role of IK and LK and CBA for Climate Change Adaptation in Tropical Forests</p>
                          <p class="Body_Box_blue_Box_body" lang="en-GB">Local forest and Indigenous forest management systems have developed over long time periods, generating social practices and institutions that have supported livelihoods and cultures for generations (<span class="condensed_italic" lang="">high confidence</span>) (<a class="reference-link" href="#Sepp&#228;l&#228;--2009">Sepp&#228;l&#228;, 2009</a>; Martin <span class="condensed_italic" lang=""/> et al., 2010; <a class="reference-link" href="#Parrotta--2012">Parrotta and Agnoletti, 2012</a>; Camico <span class="condensed_italic" lang=""/> et al., 2021). Archaeological evidence shows that humans have manipulated tropical forests for at least 45,000 years (<span class="condensed_italic" lang="">high confidence</span>). Indigenous Peoples usually consider themselves as parts of socio-ecosystems, protecting the forest by maintaining healthy socio-ecological relationships and successfully adapting to environmental change (Speranza <span class="condensed_italic" lang=""/> et al., 2010; Swiderska <span class="condensed_italic" lang=""/> et al., 2011; <a class="reference-link" href="#Parrotta--2012">Parrotta and Agnoletti, 2012</a>; Uprety <span class="condensed_italic" lang=""/> et al., 2012; Mistry <span class="condensed_italic" lang=""/> et al., 2016; Roberts <span class="condensed_italic" lang=""/> et al., 2017) [AR5 WGII Setion 12.3.2 (Adger et al. 2014)].</p>
                          <p class="Body_Box_blue_Box_body" lang="en-GB">CBA ensures community engagement in bottom-up management and adaptation approaches (<a class="reference-link" href="#Simane--2014">Simane and Zaitchik, 2014</a>; <a class="reference-link" href="#Keenan--2015">Keenan, 2015</a>). IK, LK and CBA can enhance adaptation in many ways, including through knowledge generation, ecosystem monitoring, climate forecasting, increased resilience and response to climate extremes and slow-onset events (Speranza <span class="condensed_italic" lang=""/> et al., 2010) [AR5 WGII <a class="section-link" data-title="Northern South America Sub-region" href="/report/ar6/wg2/chapter/chapter-12#12.3.3">Section 12.3.3</a>  (Adger et al. 2014); SRCCL <a class="section-link" data-title="Adequate and Appropriate Financing" href="/report/ar6/wg2/chapter/chapter-4#4.8.2">Section 4.8.2</a>  (Olsson et al. 2019)] ] (Figure Box CCP7.1.1).</p>
                          <p class="Body_Box_blue_Box_subhead_H2" lang="en-GB">Integration of IK and LK Systems, CBA and Modern Scientific Systems</p>
                          <p class="Body_Box_blue_Box_body" lang="en-GB">Several authors have highlighted the need to foster a respectful dialogue between Indigenous knowledge (IK) and local knowledge (LK) and modern science towards a holistic research model (<span class="condensed_italic" lang="">high confidence</span>) (<a class="reference-link" href="#Berkes--2010">Berkes, 2010</a>; <a class="reference-link" href="#Ajani--2013">Ajani, 2013</a>; Teng&#246;<span class="condensed_italic" lang=""/> et al., 2014; <a class="reference-link" href="#Roue--2018">Roue and Nakashima, 2018</a>) [AR5 WGII <a class="section-link" data-title="Northern South America Sub-region" href="/report/ar6/wg2/chapter/chapter-12#12.3.3">Section 12.3.3</a>  (Adger et al. 2014) , AR5 WGII <a class="section-link" data-title="Projected Changes in North American Climate" href="/report/ar6/wg2/chapter/chapter-14#14.2.2">Section 14.2.2</a>  (Noble et al. 2014)], but few ecological studies have attempted this integration (<a class="reference-link" href="#Keenan--2015">Keenan, 2015</a>; <a class="reference-link" href="#Vadigi--2016">Vadigi, 2016</a>). Examples in tropical forest ecosystems include topics such as monitoring climate impacts; local climates; seed, water and land management resilience-increasing practices; and climate threats to traditional agriculture (<a class="reference-link" href="#Parrotta--2012">Parrotta and Agnoletti, 2012</a>; Fern&#225;ndez-Llamazares <span class="condensed_italic" lang=""/> et al., 2017; Camico <span class="condensed_italic" lang=""/> et al., 2021; Mustonen <span class="condensed_italic" lang=""/> et al., 2021). A growing number of methods are available to help this dialogue [SRCCL Section 7.5.1 (Hurlbert et al. 2019)] (Reid <span class="condensed_italic" lang=""/> et al., 2009; Teng&#246;<span class="condensed_italic" lang=""/> et al., 2014; Teng&#246;<span class="condensed_italic" lang=""/> et al., 2017; <a class="reference-link" href="#Roue--2018">Roue and Nakashima, 2018</a>) (Figure Box CCP7.1.1). While there is expanding interest among decision makers, researchers, Indigenous Peoples and civil society on IK and LK (Hiwasaki <span class="condensed_italic" lang=""/> et al., 2015; <a class="reference-link" href="#Maillet--2016">Maillet and Ford, 2016</a>), gaps remain regarding links between place-and-culture dimensions and adaptive capacities (Ford <span class="condensed_italic" lang=""/> et al., 2016).</p>
                          <p class="Body_Box_blue_Box_subhead_H2" lang="en-GB">Enhancing Adaptive Capacity through IK and LK and CBA: Lessons Learned</p>
                          <p class="Body_Box_blue_Box_body" lang="en-GB">Useful lessons can be drawn from experience to effectively incorporate IK, LK and CBA in adaptation strategies. A number of barriers to adaptation have also been recognised (Figure Box CCP7.1.1). Considering that IK and LK is increasingly threatened by colonisation, acculturation, dispossession of land rights, and environmental and social change, among others [AR5 WGII <a class="section-link" data-title="Northern South America Sub-region" href="/report/ar6/wg2/chapter/chapter-12#12.3.3">Section 12.3.3</a>  (Adger et al. 2014); SR15Section 4.3.5 (de Coninck et al. 2018)] <a class="reference-link" href="#Sepp&#228;l&#228;--2009">Sepp&#228;l&#228; (2009)</a>  highlighted the importance of supporting community efforts to document, vitalise and protect it. It is essential to consider goals, identity and livelihood priorities of Indigenous Peoples and local communities, including those beyond natural resource management (Reid <span class="condensed_italic" lang=""/> et al., 2009; <a class="reference-link" href="#Diamond--2018">Diamond and Ansharyani, 2018</a>; Zavaleta <span class="condensed_italic" lang=""/> et al., 2018). Adaptation processes are more <span class="condensed_italic" lang="">likely </span> to be transformational when they are locally driven (<span class="condensed_italic" lang="">medium confidence</span>: <span class="condensed_italic" lang="">medium evidence, high agreement </span>) (<a class="reference-link" href="#Chung Tiam Fook--2015">Chung Tiam Fook, 2015</a>; <a class="reference-link" href="#Chanza--2016">Chanza and De Wit, 2016</a>). This requires adaptive institutional frameworks, capable of navigating the complex dynamic of socio-ecosystems (<span class="condensed_italic" lang="">medium confidence</span>: <span class="condensed_italic" lang="">medium evidence, high agreement </span>) (Locatelli <span class="condensed_italic" lang=""/> et al., 2008; <a class="reference-link" href="#Simane--2014">Simane and Zaitchik, 2014</a>) [AR5 WGII <a class="section-link" data-title="Northwestern South America Sub-region" href="/report/ar6/wg2/chapter/chapter-12#12.3.2">Section 12.3.2</a>  (Adger et al. 2014), SR15 <a class="section-link" data-title="Methodologies for Assessing Impacts and Risks" href="/report/ar6/wg2/chapter/chapter-5#5.3.1">Section 5.3.1</a>  (Roy et al. 2018)]. It is important to consider power relations and priority differences to avoid causing social disruption and inequality. &#8216;We need to keep asking: Who benefits? Who loses? Who is empowered? Who is disempowered?&#8217; (Reid <span class="condensed_italic" lang=""/> et al., 2009).</p>
                          <p class="Body_Box_blue_Box_body" lang="en-GB">Finally, vulnerability and adaptive capacity have a historical and geopolitical context, conditioned by value systems and development models. Forest management strategies must take into account the wider picture if they seek to be not just temporally effective (at best), but transformative and sustainable over time (<span class="condensed_italic" lang="">high confidence</span>) (<a class="reference-link" href="#Chung Tiam Fook--2015">Chung Tiam Fook, 2015</a>; <a class="reference-link" href="#Chanza--2016">Chanza and De Wit, 2016</a>).</p>
                          <div class="_idGenObjectLayout-2">
                            <div class="Box_Header-continued" id="_idContainer036">
                              <p class="Body_Box_blue_Box_continued-subhead" lang="en-GB">Box CCP7.1</p>
                            </div>
                          </div>
                          <p class="Body_Tables_Table_note-no-title" lang="en-US"><span class="superscript _idGenCharOverride-1" lang=""> (1) </span> Agricultural expansion is the major driver of deforestation in developing countries. Cost of reducing deforestation is based on opportunity cost of not growing the most common crop in developing countries (maize) for 6 years to reach tree maturity, with yield of 8 t ha <span class="superscript _idGenCharOverride-1" lang="">&#8722;1</span> (high); 5 tons ha <span class="superscript _idGenCharOverride-1" lang="">&#8722;1</span> (medium), and 1.5 t ha <span class="superscript _idGenCharOverride-1" lang="">&#8722;1</span>, with a price of USD 329 t <span class="superscript _idGenCharOverride-1" lang="">&#8722;1</span>. Also, reduced deforestation practices have relatively moderate costs, but they require transaction and administration costs (<a class="reference-link" href="#Kindermann--2008">Kindermann et al., 2008</a>; <a class="reference-link" href="#Overmars--2014">Overmars et al., 2014</a>).</p>
                          <p class="Body_Tables_Table_note-no-title" lang="en-US"><span class="superscript _idGenCharOverride-1" lang=""> (2) </span> May not deal with displacement of wild species due to climate change.</p>
                          <p class="Body_Tables_Table_note-no-title" lang="en-US"><span class="superscript _idGenCharOverride-1" lang=""> (3) </span> Fragments of disconnected HCVAs have less value to preserve ecological services.</p>
                          <p class="Body_Tables_Table_note-no-title" lang="en-US"><span class="superscript _idGenCharOverride-1" lang=""> (4) </span> Forest management strategies may decrease stand-level structural complexity and may make forest ecosystems more susceptive to natural disasters like wind throws, fires and diseases (Seidl <span class="condensed_italic" lang=""/> et al., 2017).</p>
                        </div>
                      </div>
                      <div class="h2-container" id="CCP7.5.1">
                        <h2 class="Headings_H2-numbered" lang="de-DE">CCP7.5.1   Adaptation Options at Different Scales <span class="arrow-up"/><span class="arrow-down"/><span class="share-block"><img class="share-icon" src="../../share.png"/></span></h2>
                        <div class="h2-siblings" id="h2-10-siblings">
                          <p class="Body_Body-justify" lang="en-GB">To retain functioning tropical forests, adaptation will need to take place across many scales, from individual stands to interconnected landscapes, and upwards to regional and global policy changes. From a global perspective, the most effective adaptation and mitigation option is to reduce and reverse the loss of area in tropical forest ecosystems (<a class="reference-link" href="#Alkama--2016">Alkama and Cescatti, 2016</a>; Griscom <span class="condensed_italic" lang=""/> et al., 2017). Maximising tropical forest extent has well-described benefits in mitigating CO<span class="subscript _idGenCharOverride-1" lang="">2</span> emissions and in the role of forests regulating global climate (<span class="condensed_italic" lang="">high confidence</span>) (Smith <span class="condensed_italic" lang=""/> et al., 2014). For nations with tropical forests, adaptation is largely achieved through sustainable management of forested areas, enforcing the land rights/land tenure of Indigenous Peoples, and through establishment of protected areas (Table CCP7.4; <a class="reference-link" href="#Sepp&#228;l&#228;--2009">Sepp&#228;l&#228;, 2009</a>; P&#246;rtner <span class="condensed_italic" lang=""/> et al., 2021). Some of this is achieved through schemes incentivising landowners to retain tree cover for the express purpose of mitigating climate change impacts (e.g., PES- Payments for Ecosystem Services, REDD+ Reducing Emissions from Deforestation and Forest Degradation). For nations outside of the tropics, there is a need to regulate the global drivers of forest loss, such as the consumption of agricultural commodities and of non-sustainable forest products (including timber) (CCP7.3; Henders <span class="condensed_italic" lang=""/> et al., 2015 Nolte et al., 2017, Pendrill et al., 2019).</p>
                          <p class="Body_Body-justify" lang="en-GB">At a landscape scale, increasing forest cover and maintaining biodiversity friendly land-use outside forests increases ecosystem resilience to climate change (and other disturbances) and allows for climate-driven species migration, for example, &#8216;protect&#8217; in Table CCP7.3  (Schmitz <span class="condensed_italic" lang=""/> et al., 2015; <a class="reference-link" href="#Aguirre--2016">Aguirre and Sukumar, 2016</a>). Ensuring forested areas are large and/or interconnected including the use of specific climate refugia and climate corridors is recommended for climate adaptation (<span class="condensed_italic" lang="">high confidence</span>) (Schmitz <span class="condensed_italic" lang=""/> et al., 2015; Settele <span class="condensed_italic" lang=""/> et al., 2015; Simmons <span class="condensed_italic" lang=""/> et al., 2018; P&#246;rtner <span class="condensed_italic" lang=""/> et al., 2021). For habitats or species pushed to the edge of their range, area-based conservation needs to take account of the future climate space and facilitate movement of species through connectivity or assisted migration (<a class="reference-link" href="#Sepp&#228;l&#228;--2009">Sepp&#228;l&#228;, 2009</a>; Schmitz <span class="condensed_italic" lang=""/> et al., 2015; P&#246;rtner <span class="condensed_italic" lang=""/> et al., 2021). Maintaining functioning forest ecosystems is vital due to biophysical, biological (biodiversity-driven) and socioeconomic interactions that contribute to ecosystem resilience (Pielke Sr <span class="condensed_italic" lang=""/> et al., 2011; Malhi <span class="condensed_italic" lang=""/> et al., 2014; <a class="reference-link" href="#Lawrence--2015">Lawrence and Vandecar, 2015</a>; <a class="reference-link" href="#Alkama--2016">Alkama and Cescatti, 2016</a>; Sakschewski <span class="condensed_italic" lang=""/> et al., 2016). Protecting forested areas can be achieved through vertical integration of policies at national, subnational and local levels and effective stakeholder empowerment (<a class="reference-link" href="#Meijer--2015">Meijer, 2015</a>). Community-based and ecosystem-based adaptation approaches provide an overall strategy to help achieve these goals [Cross-Chapter Box NATURAL in Chapter 2] (Locatelli <span class="condensed_italic" lang=""/> et al., 2010; <a class="reference-link" href="#Cerullo--2019">Cerullo and Edwards, 2019</a>). In addition to conservation of tropical forests, restoration and afforestation can be effective climate adaptation measures (e.g., &#8216;restore&#8217; in Table CCP7.3) (<a class="reference-link" href="#Arora--2011">Arora and Montenegro, 2011</a>; Perugini <span class="condensed_italic" lang=""/> et al., 2017). The technical requirements for such adaptation measures are similar to those required for forest landscape restoration (<a class="reference-link" href="#Mansourian--2005">Mansourian and Vallauri, 2005</a>; Mansourian <span class="condensed_italic" lang=""/> et al., 2017; Shimamoto <span class="condensed_italic" lang=""/> et al., 2018; Philipson <span class="condensed_italic" lang=""/> et al., 2020). Agricultural intensification has been proposed as one method to reduce pressure on remaining forested land, although the overall carbon impact of such approaches must be considered (Cross-Chapter Box 6 in SRCCL, Shukla <span class="condensed_italic" lang=""/> et al., 2019; Cerri <span class="condensed_italic" lang=""/> et al., 2018; Kubitza <span class="condensed_italic" lang=""/> et al., 2018).</p>
                          <p class="Body_Body-justify" lang="en-GB">At the forest community level, adaptation options aim to protect the forest microenvironment and retain biodiversity through forest management (e.g., &#8216;manage&#8217; in Table CCP7.3) (<a class="reference-link" href="#Keenan--2015">Keenan, 2015</a>; Jactel <span class="condensed_italic" lang=""/> et al., 2017). In protected areas, this would typically involve reinforcing existing conservation objectives through adaptive management (Salafsky <span class="condensed_italic" lang=""/> et al., 2001; Ellis <span class="condensed_italic" lang=""/> et al., 2015; Tanner-McAllister <span class="condensed_italic" lang=""/> et al., 2017; <a class="reference-link" href="#Hagerman--2018">Hagerman and Pelai, 2018</a>), including support for natural regeneration (Chazdon <span class="condensed_italic" lang=""/> et al., 2016). It is also possible to improve forest cover and interconnectivity through restoration or afforestation. There are many technical guides to improve the implementation and success rate of such approaches (Table CCP7.4) (<a class="reference-link" href="#Lamb--2003">Lamb and Gilmour, 2003</a>; Shimamoto <span class="condensed_italic" lang=""/> et al., 2018; Strassburg <span class="condensed_italic" lang=""/> et al., 2019) and funding support specifically aimed at climate change adaptation and mitigation (e.g., REDD+). In some instances, climate change can alter climate suitability to the extent that managers need to allow for a transition to a new habitat type (e.g., from tropical forest to savanna), adaptive management can help recognise and facilitate these transitions (<a class="reference-link" href="#Sepp&#228;l&#228;--2009">Sepp&#228;l&#228;, 2009</a>; Schmitz <span class="condensed_italic" lang=""/> et al., 2015; Lapola <span class="condensed_italic" lang=""/> et al., 2018). Depending on local conditions, it will be necessary to adapt to specific stress factors that are <span class="condensed_italic" lang="">likely </span> to increase in prevalence or severity because of climate change, such as heatwaves, drought events and forest fires (Allen <span class="condensed_italic" lang=""/> et al., 2010; Malhi <span class="condensed_italic" lang=""/> et al., 2014; Seidl <span class="condensed_italic" lang=""/> et al., 2017). Although it is typically not possible to link individual events or adaptation measures to climate change, the effectiveness of technical interventions has been illustrated in a broader forest management context. Table CCP7.4  assesses the costs and benefits of different adaptation options based on the available literature. However, it should be noted that there is lack of information on many potential adaptation interventions, especially in the context of tropical forests (Locatelli <span class="condensed_italic" lang=""/> et al., 2010; Bele <span class="condensed_italic" lang=""/> et al., 2015; <a class="reference-link" href="#Keenan--2015">Keenan, 2015</a>; <a class="reference-link" href="#Hagerman--2018">Hagerman and Pelai, 2018</a>). The sections below and Figure CCP7.5  offer a framework for optimising management of complex tropical forest ecosystems within a landscape context, through a range of interconnected adaptation options.</p>
                        </div>
                      </div>
                      <div class="h2-container" id="CCP7.5.2">
                        <h2 class="Headings_H2-numbered" lang="de-DE">CCP7.5.2  Adaptation Response Options <span class="arrow-up"/><span class="arrow-down"/><span class="share-block"><img class="share-icon" src="../../share.png"/></span></h2>
                        <div class="h2-siblings" id="h2-11-siblings">
                          <p class="Body_Body-justify" lang="en-GB">Forests will be affected by several climate change impacts that will require forest management towards fulfilling four objectives: maintain forest area; facilitate biodiversity adaptation; maintain healthy functioning forest ecosystems; and restore ecosystem services (including productive capacity) (<a class="reference-link" href="#Sepp&#228;l&#228;--2009">Sepp&#228;l&#228;, 2009</a>), which complement the more conventional approaches to protect, manage and restore forests (Sayer <span class="condensed_italic" lang=""/> et al., 2003). This is dependent on location-specific conditions that are defined by the type of forest and land tenure regimes or dominant actors across forest landscapes. The analysis here proposes 10 adaptation responses that focus on the adaptation potential of tropical forests to climate change and are linked to the management objectives identified (Figure CCP7.5). Each response option (1&#8211;10) implies variable economic costs and benefits, influenced by location-specific conditions, including several important non-monetised benefits. The figure suggests the most relevant situations in which the different response options hold greater potential to meet the forest management objectives for addressing expected climate change impacts.</p>
                          <p class="Body_Body-justify" lang="en-GB">This assessment considers the economic costs and benefits of 10 response options in their contribution to adaptation of tropical forests to climate change impacts but also includes non-market costs that are more difficult to quantify (e.g., cultural values), which are borne by different stakeholders (Chan <span class="condensed_italic" lang=""/> et al., 2016; Pascual <span class="condensed_italic" lang=""/> et al., 2017). Similarly, benefits also include the social and environmental benefits that result from adaptation options over extended time horizons. Economic costs and benefit&#8211;cost ratios suggest the short-term economic potential of different options, but responsibly designed adaptation measures involving a combination of different response options and embracing a long-time horizon have the potential to provide significant social and climate benefits over the coming 50 years or more.</p>
                        </div>
                      </div>
                      <div class="h2-container" id="CCP7.5.3">
                        <h2 class="Headings_H2-numbered" lang="de-DE">CCP7.5.3  Costs <span class="arrow-up"/><span class="arrow-down"/><span class="share-block"><img class="share-icon" src="../../share.png"/></span></h2>
                        <div class="h2-siblings" id="h2-12-siblings">
                          <p class="Body_Body-justify" lang="en-GB">The cost of implementing adaptation options varies widely and will change based on the location, time horizon and who bears the cost. As a result, most existing estimates are offered in broad ranges that include only partial cost estimates. Here we group the adaptation costs into three categories: low- (&lt;USD 1000 ha <span class="superscript _idGenCharOverride-1" lang="">&#8722;1</span>), medium- (between USD 1000 ha <span class="superscript _idGenCharOverride-1" lang="">&#8722;1</span> and USD 5000 ha <span class="superscript _idGenCharOverride-1" lang="">&#8722;1</span>) and high-cost options (&gt;USD 5000 ha <span class="superscript _idGenCharOverride-1" lang="">&#8722;1</span>).</p>
                          <ul>
                            <li class="Body_Lists_List_unnumbered-first" lang="en-GB">Low-cost options are those estimated to cost less than USD 1000 ha <span class="superscript _idGenCharOverride-1" lang="">&#8722;1</span> and include recognition of tenure rights of Indigenous Peoples and local communities (<a class="reference-link" href="#Hatcher--2009">Hatcher, 2009</a>), restoring ecological connectivity (<a class="reference-link" href="#Crossman--2009"> </a><a class="reference-link" href="#Crossman--2009">Crossman and Bryan, 2009</a>; Torrubia <span class="condensed_italic" lang=""/> et al., 2014), fire prevention and management (Griscom <span class="condensed_italic" lang=""/> et al., 2017; Arneth <span class="condensed_italic" lang=""/> et al., 2019), assisted natural regeneration (<a class="reference-link" href="#Cury--2011">Cury and Carvalho, 2011</a>; Lira <span class="condensed_italic" lang=""/> et al., 2012; MMA, 2017; <a class="reference-link" href="#Silva--2017">Silva and Nunes, 2017</a>) and sustainable forest management (Boltz <span class="condensed_italic" lang=""/> et al., 2001; Holmes <span class="condensed_italic" lang=""/> et al., 2002; <a class="reference-link" href="#Pokorny--2005">Pokorny and Steinbrenner, 2005</a>; <a class="reference-link" href="#Medjibe--2012">Medjibe and Putz, 2012</a>; <a class="reference-link" href="#Singer--2016">Singer, 2016</a>).</li>
                            <li class="Body_Lists_List_unnumbered-continued" lang="en-GB">Medium-cost options are those estimated to cost between USD 1000 and USD 5000 ha <span class="superscript _idGenCharOverride-1" lang="">&#8722;1</span> and include estimates for tree planting (<a class="reference-link" href="#Rodrigues--2009">Rodrigues, 2009</a>; Campos-Filho <span class="condensed_italic" lang=""/> et al., 2013; <a class="reference-link" href="#Silva--2017">Silva and Nunes, 2017</a>; Nello <span class="condensed_italic" lang=""/> et al., 2019) and avoided deforestation (Kindermann <span class="condensed_italic" lang=""/> et al., 2008; Overmars <span class="condensed_italic" lang=""/> et al., 2014; Smith <span class="condensed_italic" lang=""/> et al., 2019).</li>
                            <li class="Body_Lists_List_unnumbered-continued" lang="en-GB">High-cost options are those estimated to cost more than USD 5000 ha <span class="superscript _idGenCharOverride-1" lang="">&#8722;1</span> and include actions associated with agroforestry systems, particularly the most biodiverse systems (Raes <span class="condensed_italic" lang=""/> et al., 2017; Nello <span class="condensed_italic" lang=""/> et al., 2019).</li>
                            <li class="Body_Lists_List_unnumbered-last" lang="en-GB">Costs per hectare are either not available or vary too widely for several options, including protected areas (<a class="reference-link" href="#Balmford--2003">Balmford and Whitten, 2003</a>; Bruner <span class="condensed_italic" lang=""/> et al., 2004) and high-value conservation areas in working lands (<a class="reference-link" href="#Naidoo--2006">Naidoo and Adamowicz, 2006</a>). Griscom <span class="condensed_italic" lang=""/> et al., (2017) provided recent estimated costs for many of the above adaptation options; in most cases, these costs are much lower than other estimates referenced here, which are particularly focused on tropical forest landscapes.</li>
                          </ul>
                          <p class="Body_Body-justify" lang="en-GB">While economic costs constitute an important factor in determining the feasibility of options, there are other factors that have an important influence on the viability of the options including opportunity costs, transaction costs and social feasibility, which are not included in this analysis. For example, options such as recognition of rights for Indigenous Peoples and local communities can be a low-cost option but often face political opposition (<a class="reference-link" href="#RRI--2021">RRI, 2021</a>), including from some conservation organisations; fire prevention and management require political coordination across multiple governance levels (Fonseca-Morello <span class="condensed_italic" lang=""/> et al., 2017); and sustainable forest management can be seen as a less attractive option when compared with other more profitable land uses (<a class="reference-link" href="#K&#246;thke--2014">K&#246;thke, 2014</a>). Table CCP7.4  offers a more detailed assessment of the costs included, along with a reference to the costs for society.</p>
                        </div>
                      </div>
                      <div class="h2-container" id="CCP7.5.4">
                        <h2 class="Headings_H2-numbered" lang="de-DE">CCP7.5.4  Benefits <span class="arrow-up"/><span class="arrow-down"/><span class="share-block"><img class="share-icon" src="../../share.png"/></span></h2>
                        <div class="h2-siblings" id="h2-13-siblings">
                          <p class="Body_Body-justify" lang="en-GB">Estimates of economic benefits across options tend to vary greatly, largely based on the scale of operations, and the market and institutional contexts in which they are implemented. The longer-term non-monetary benefits tend to be larger than has been acknowledged in the past (Chan <span class="condensed_italic" lang=""/> et al., 2016; Pascual <span class="condensed_italic" lang=""/> et al., 2017; <a class="reference-link" href="#UNEP--2021">UNEP, 2021</a>). The shorter-term horizon of the economic benefits of adaptation options suggest that benefit-cost ratios of investments are higher in more biodiverse agroforestry systems in comparison with simpler ones (Miccolis <span class="condensed_italic" lang=""/> et al., 2016), and agroforestry system benefits are comparatively higher compared with commercial tree planting depending on the species (Table CCP7.4; Nello <span class="condensed_italic" lang=""/> et al., 2019).</p>
                          <p class="Body_Body-justify" lang="en-GB">All the objectives here support not only a large number of local people in fulfilling their livelihoods, but often provide services to distant urban populations as well. The benefits differ according to which of the four forest landscape management objectives is prioritised (Table CCP7.4):</p>
                          <ul>
                            <li class="Body_Lists_List_unnumbered-first" lang="en-GB">Objectives that seek to maintain the extent of forests contribute to improved landscape continuity, persistence of species and metapopulations (including floral recruitment) (<a class="reference-link" href="#Nord&#233;n--2014">Nord&#233;n et al., 2014</a>), maintaining hydrological cycles (<a class="reference-link" href="#Creed--2011">Creed et al., 2011</a>) and avoiding surface temperature increases (<a class="reference-link" href="#Perugini--2017">Perugini et al., 2017</a>). In many cases high conservation value areas (HCVAs) are based on the presence of threatened or endemic species or dense, carbon-rich forest ecosystems (e.g., primary forest) (<a class="reference-link" href="#Jennings--2003">Jennings et al., 2003</a>).</li>
                            <li class="Body_Lists_List_unnumbered-continued" lang="en-GB">Objectives that prioritise natural regeneration and adaptation of biological diversity allow greater opportunity for climate refugia (<a class="reference-link" href="#Morelli--2017">Morelli et al., 2017</a>; <a class="reference-link" href="#Simmons--2018">Simmons et al., 2018</a>), provide increased dispersal opportunities for different species (<a class="reference-link" href="#Christie--2015">Christie and Knowles, 2015</a>), increase flora and fauna diversity, and may provide small benefits in reducing warming (<a class="reference-link" href="#Arora--2011">Arora and Montenegro, 2011</a>).</li>
                            <li class="Body_Lists_List_unnumbered-continued" lang="en-GB">Objectives to maintain and enhance the quality and persistence of vital forest ecosystems contribute to securing the provision of habitat, maintain soil structure and fertility, and regulate water quantity and quality (<a class="reference-link" href="#Imai--2009">Imai et al., 2009</a>; <a class="reference-link" href="#Putz--2012">Putz et al., 2012</a>).</li>
                            <li class="Body_Lists_List_unnumbered-last" lang="en-GB">Objectives that prioritise the restoration of ecological productivity of degraded forest ecosystems and landscapes contribute to increased biodiversity conservation, soil structure and fertility, nutrient cycling, water infiltration/water recharge, erosion control and climate regulation (<a class="reference-link" href="#Sepp&#228;l&#228;--2009">Sepp&#228;l&#228;, 2009</a>; <a class="reference-link" href="#Shimamoto--2018">Shimamoto et al., 2018</a>; <a class="reference-link" href="#P&#246;rtner--2021">P&#246;rtner et al., 2021</a>).<h2 class="Headings_H2-numbered _idGenParaOverride-2" lang="de-DE">CCP7.5.5 Strategic Approaches to Combine Response Options</h2></li>
                          </ul>
                          <p class="Body_Body-justify" lang="en-GB">While adaptation costs and benefits of response options differ, their benefit-to-cost ratios are almost always positive, particularly in the longer term (<a class="reference-link" href="#M&#252;ller--2018">M&#252;ller and Sukhdev, 2018</a>; Chausson <span class="condensed_italic" lang=""/> et al., 2020; Seddon <span class="condensed_italic" lang=""/> et al., 2020; Baste <span class="condensed_italic" lang=""/> et al., 2021). However, implementation of adaptation actions can be economically unviable if the benefits accrue over longer periods of time because development banks apply much higher discount rates to low income countries than the standard rates (<a class="reference-link" href="#Watkiss--2015">Watkiss, 2015</a>). Achieving conditions that do not disincentivise against, and rather encourage investments in nature-based solutions to protect, sustainably manage or restore tropical forest landscapes is therefore critical to enhancing their implementation (<a class="reference-link" href="#UNEP--2021">UNEP, 2021</a>).</p>
                          <p class="Body_Body-justify" lang="en-GB">In addition, implementation of response options should consider equity aspects to ensure that the costs and benefits of actions within a landscape are equitably distributed among public institutions, private enterprise and civil society (<a class="reference-link" href="#Verdone--2015">Verdone, 2015</a>). Strategic approaches to restoring ecosystems can increase conservation gains and reduce costs (Shimamoto <span class="condensed_italic" lang=""/> et al., 2018; Strassburg <span class="condensed_italic" lang=""/> et al., 2019). Cost-effective solutions that consider multiple costs and benefits need a &#8216;compromise solution&#8217; between short- and long-term social and economic gains. Pursuing spatial allocations for adaptation options has the potential to deliver greater benefits at lower costs, therefore aligning aims for tropical forest adaptation, species conservation and climate mitigation targets with the interests of farmers under short and long time horizons (Beatty <span class="condensed_italic" lang=""/> et al., 2018).</p>
                          <p class="Body_Box_blue_Box_Figure" lang="de-DE">
                            <img alt="" class="_idGenObjectAttribute-11" src="ccp7-web-resources/image/1.png"/>
                          </p>
                          <p class="Body_Tables_Table_title" lang="en-US"><span class="table_number" lang="">Table CCP7.3  | </span>Overview of adaptation strategies for tropical forests. This table includes key policy frameworks and common management approaches with potential for adapting native forests to increased disturbance from climate hazards. Details on each management approach and the associated literature are given in Table CCP7.4: Costs and Benefits of Adaptation Options in Tropical Forests.</p>
                          <table class="Table" id="table003">
                            <colgroup>
                              <col class="_idGenTableRowColumn-14"/>
                              <col class="_idGenTableRowColumn-15"/>
                              <col class="_idGenTableRowColumn-16"/>
                            </colgroup>
                            <thead>
                              <tr class="Table _idGenTableRowColumn-9">
                                <td class="Table Head-blue Head-blue CellOverride-1"/>
                                <td class="Table Head-blue Head-blue CellOverride-2">
                                  <p class="Body_Tables_Table_header-black" lang="en-US">
                                    <span class="CharOverride-3" lang="">Strategy</span>
                                  </p>
                                </td>
                                <td class="Table Head-blue Head-blue CellOverride-2">
                                  <p class="Body_Tables_Table_header-black" lang="en-US">
                                    <span class="CharOverride-3" lang="">Expected contribution to climate adaptation</span>
                                  </p>
                                </td>
                              </tr>
                            </thead>
                            <tbody>
                              <tr class="Table _idGenTableRowColumn-4">
                                <td class="Table Body Body CellOverride-3" rowspan="5">
                                  <p class="Body_Tables_Table_body-black-left ParaOverride-5" lang="en-US">Protect</p>
                                </td>
                                <td class="Table Body Body CellOverride-4">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Protected Areas</p>
                                </td>
                                <td class="Table Body Body CellOverride-4">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Maintaining forest extent builds resistance and resilience to climate change (Sepp&#228;l&#228; et al. 2009; Schmitz et al. 2015).</p>
                                </td>
                              </tr>
                              <tr class="Table _idGenTableRowColumn-17">
                                <td class="Table Body Body CellOverride-4">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Area-based conservation / Climate refugia</p>
                                </td>
                                <td class="Table Body Body CellOverride-4">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Where forests are under threat from progressive warming, protection of less disturbance prone areas (e.g., higher altitude stands) allows for migration and recolonisation improving the ability of the whole ecosystem to respond to climate change (Schmitz et al. 2015; P&#246;rtner et al. 2021).</p>
                                </td>
                              </tr>
                              <tr class="Table _idGenTableRowColumn-12">
                                <td class="Table Body Body CellOverride-4">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Buffer zones</p>
                                </td>
                                <td class="Table Body Body CellOverride-4">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Maintaining buffer zones around protected forests builds resistance and resilience to climate change and allows for adjustment of boundaries, under future conditions (Sepp&#228;l&#228; et al. 2009; Schmitz et al. 2015).</p>
                                </td>
                              </tr>
                              <tr class="Table _idGenTableRowColumn-6">
                                <td class="Table Body Body CellOverride-4">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Avoid deforestation</p>
                                </td>
                                <td class="Table Body Body CellOverride-4">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Reducing loss of trees due to non-climate stressors, protects forest extent and builds resistance and resilience to climate change (Locatelli et al. 2010; Smith et al. 2019).</p>
                                </td>
                              </tr>
                              <tr class="Table _idGenTableRowColumn-12">
                                <td class="Table Body Body CellOverride-4">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Public education / awareness</p>
                                </td>
                                <td class="Table Body Body CellOverride-4">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Publicising the role of forests in supporting human society can reduce anthropogenic pressures on forested areas (Sepp&#228;l&#228; et al. 2009; Hagerman &amp; Pelai, 2018).</p>
                                </td>
                              </tr>
                              <tr class="Table _idGenTableRowColumn-13">
                                <td class="Table Body Body CellOverride-1"/>
                                <td class="Table Body Body CellOverride-2"/>
                                <td class="Table Body Body CellOverride-2"/>
                              </tr>
                              <tr class="Table _idGenTableRowColumn-12">
                                <td class="Table Body Body CellOverride-5" rowspan="6">
                                  <p class="Body_Tables_Table_body-black-left ParaOverride-5" lang="en-US">Manage</p>
                                </td>
                                <td class="Table Body Body CellOverride-6">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Vulnerability assessment and monitoring programs</p>
                                </td>
                                <td class="Table Body Body CellOverride-6">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Recognising changes in climate and in disturbance regimes allows for other management interventions, such as area-based conservation and assisted migration, to be implemented (Schmitz et al. 2015; Hagerman &amp; Pelai, 2018).</p>
                                </td>
                              </tr>
                              <tr class="Table _idGenTableRowColumn-6">
                                <td class="Table Body Body CellOverride-6">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Adaptive management / climate services</p>
                                </td>
                                <td class="Table Body Body CellOverride-6">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Adaptive management along with information on the changing climate can improve the capacity of forest managers to respond to climate change (Sepp&#228;l&#228; et al. 2009; Tanner-McAllister et al. 2017).</p>
                                </td>
                              </tr>
                              <tr class="Table _idGenTableRowColumn-12">
                                <td class="Table Body Body CellOverride-6">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Strengthen land tenure</p>
                                </td>
                                <td class="Table Body Body CellOverride-6">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Strong land tenure, e.g., for Indigenous Peoples, often leads to more sustainable management of forested areas, so building resistance and resilience to climate change (Porter-Bolland et al. 2012; Garnett et al. 2018).</p>
                                </td>
                              </tr>
                              <tr class="Table _idGenTableRowColumn-6">
                                <td class="Table Body Body CellOverride-6">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Conserve biodiversity, promote mixed stands</p>
                                </td>
                                <td class="Table Body Body CellOverride-6">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Within managed forests, using diverse planting stock and managing for biodiversity improves resilience to disturbances from future climate changes (<a class="reference-link" href="#Keenan--2015">Keenan, 2015</a>; P&#246;rtner et al. 2021).</p>
                                </td>
                              </tr>
                              <tr class="Table _idGenTableRowColumn-12">
                                <td class="Table Body Body CellOverride-6">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Fire prevention and management</p>
                                </td>
                                <td class="Table Body Body CellOverride-6">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">The use of fire suppression, fire breaks, controlled burning and water table maintenance can build resistance to climate change driven wildfires, in both managed and natural systems (Stephens et al. 2013; Musri et al. 2020; Bowman et al. 2020).</p>
                                </td>
                              </tr>
                              <tr class="Table _idGenTableRowColumn-6">
                                <td class="Table Body Body CellOverride-6">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Sustainable forest management</p>
                                </td>
                                <td class="Table Body Body CellOverride-6">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Within managed forests, vegetation control to manage tree density and stand conditions can build resistance to climate driven disturbance such as fire (Sepp&#228;l&#228; et al. 2009; P&#246;rtner et al. 2021).</p>
                                </td>
                              </tr>
                              <tr class="Table _idGenTableRowColumn-18">
                                <td class="Table Body Body CellOverride-1"/>
                                <td class="Table Body Body CellOverride-2"/>
                                <td class="Table Body Body CellOverride-2"/>
                              </tr>
                              <tr class="Table _idGenTableRowColumn-17">
                                <td class="Table Body Body CellOverride-7" rowspan="3">
                                  <p class="Body_Tables_Table_body-black-left ParaOverride-5" lang="en-US">Restore</p>
                                </td>
                                <td class="Table Body Body CellOverride-8">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Increase connectivity</p>
                                </td>
                                <td class="Table Body Body CellOverride-8">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Providing connection corridors between forested areas builds resilience and helps the system response to climate change. This can include thermal corridors that allow for species migration under progressive climate change (Schmitz et al. 2015; Hagerman &amp; Pelai, 2018).</p>
                                </td>
                              </tr>
                              <tr class="Table _idGenTableRowColumn-19">
                                <td class="Table Body Body CellOverride-8">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Forest restoration / assisted natural regeneration</p>
                                </td>
                                <td class="Table Body Body CellOverride-8">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Forest restoration helps restore forest extent and connectivity, and can reduce edge pressure, improving resilience and the capacity to respond to future climate stressors. In some cases, assisted migration and the use of planting stock selected for tolerance to climate change may be appropriate (Locatelli et al. 2015a; P&#246;rtner et al. 2021).</p>
                                </td>
                              </tr>
                              <tr class="Table _idGenTableRowColumn-17">
                                <td class="Table Body Body CellOverride-8">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Agroforestry / trees on farm</p>
                                </td>
                                <td class="Table Body Body CellOverride-8">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">In degraded areas, such as buffer zones and mosaic landscapes, planted trees can reduce resource pressure on intact forest, improve soil conservation, regulate temperature and water cycles, and increase resilience through ecological processes (<a class="reference-link" href="#Jose--2009">Jose, 2009</a>; Lasco et al. 2014).</p>
                                </td>
                              </tr>
                              <tr class="Table _idGenTableRowColumn-18">
                                <td class="Table Body Body CellOverride-1"/>
                                <td class="Table Body Body CellOverride-2"/>
                                <td class="Table Body Body CellOverride-2"/>
                              </tr>
                              <tr class="Table _idGenTableRowColumn-6">
                                <td class="Table Body Body CellOverride-9"/>
                                <td class="Table Body Body CellOverride-10">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Indigenous and Local knowledge of ecosystems</p>
                                </td>
                                <td class="Table Body Body CellOverride-10">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Incorporating Indigenous and Local knowledge can improve the ability to protect and sustainably manage forest systems so building resilience (Sepp&#228;l&#228; et al. 2009; Porter-Bolland et al. 2012).</p>
                                </td>
                              </tr>
                            </tbody>
                          </table>
                          <p class="Body_Tables_Table_title" lang="en-US"><span class="table_number" lang="">Table CCP7.4  | </span>Costs and benefits of adaptation options in tropical forests.</p>
                          <table class="Table" id="table004">
                            <colgroup>
                              <col class="_idGenTableRowColumn-20"/>
                              <col class="_idGenTableRowColumn-21"/>
                              <col class="_idGenTableRowColumn-22"/>
                              <col class="_idGenTableRowColumn-23"/>
                              <col class="_idGenTableRowColumn-24"/>
                              <col class="_idGenTableRowColumn-25"/>
                              <col class="_idGenTableRowColumn-26"/>
                              <col class="_idGenTableRowColumn-27"/>
                            </colgroup>
                            <thead>
                              <tr class="Table _idGenTableRowColumn-28">
                                <td class="Table Head-blue Head-blue CellOverride-2">
                                  <p class="Body_Tables_Table_header-black" lang="en-US">
                                    <span class="bold_condensed CharOverride-3" lang="en-GB">Climate change impact </span>
                                  </p>
                                </td>
                                <td class="Table Head-blue Head-blue CellOverride-2">
                                  <p class="Body_Tables_Table_header-black" lang="en-US">
                                    <span class="bold_condensed CharOverride-3" lang="en-GB">Adaptation measures</span>
                                  </p>
                                </td>
                                <td class="Table Head-blue Head-blue CellOverride-2">
                                  <p class="Body_Tables_Table_header-black" lang="en-US">
                                    <span class="bold_condensed CharOverride-3" lang="en-GB">Expected contribution to adaptation</span>
                                  </p>
                                </td>
                                <td class="Table Head-blue Head-blue CellOverride-2">
                                  <p class="Body_Tables_Table_header-black" lang="en-US">
                                    <span class="bold_condensed CharOverride-3" lang="en-GB">Context/location of implementation</span>
                                  </p>
                                </td>
                                <td class="Table Head-blue Head-blue CellOverride-2">
                                  <p class="Body_Tables_Table_header-black" lang="en-US">
                                    <span class="bold_condensed CharOverride-3" lang="en-GB">Economic costs</span>
                                  </p>
                                </td>
                                <td class="Table Head-blue Head-blue CellOverride-2">
                                  <p class="Body_Tables_Table_header-black" lang="en-US">
                                    <span class="bold_condensed CharOverride-3" lang="en-GB">Costs to society</span>
                                  </p>
                                </td>
                                <td class="Table Head-blue Head-blue CellOverride-2">
                                  <p class="Body_Tables_Table_header-black" lang="en-US">
                                    <span class="bold_condensed CharOverride-3" lang="en-GB">Benefits for forest ecosystems</span>
                                  </p>
                                </td>
                                <td class="Table Head-blue Head-blue CellOverride-2">
                                  <p class="Body_Tables_Table_header-black" lang="en-US">
                                    <span class="bold_condensed CharOverride-3" lang="en-GB">Benefits/impacts t </span>
                                    <span class="bold_condensed CharOverride-3" lang="en-GB">o people</span>
                                  </p>
                                </td>
                              </tr>
                            </thead>
                            <tbody>
                              <tr class="Table _idGenTableRowColumn-4">
                                <td class="Table Body Body CellOverride-11" colspan="8">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">
                                    <span class="bold_condensed" lang="en-GB">1. Forest management strategies to maintain the extent of forests</span>
                                  </p>
                                </td>
                              </tr>
                              <tr class="Table _idGenTableRowColumn-29">
                                <td class="Table Body Body CellOverride-2" rowspan="3">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Changes in the frequency and severity of forest disturbance</p>
                                </td>
                                <td class="Table Body Body CellOverride-2">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Avoid deforestation</p>
                                </td>
                                <td class="Table Body Body CellOverride-2">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Forests counteract wind-driven degradation of soils, and contribute to soil erosion protection and soil fertility enhancement for agricultural resilience (<a class="reference-link" href="#Locatelli--2015a">Locatelli et al., 2015a</a>). The impact of reduced deforestation may be higher when the large biophysical impacts on the water cycle (and thus drought) are taken into account (e.g., <a class="reference-link" href="#Alkama--2016">Alkama and Cescatti, 2016</a>). Reducing deforestation and habitat alteration contribute to limiting infectious diseases (e.g., malaria) (Karjalainen <span class="condensed_italic" lang=""/> et al., 2010). Avoiding deforestation contributes to climate change mitigation due to reduced carbon emissions (Smith <span class="condensed_italic" lang=""/> et al., 2019).</p>
                                </td>
                                <td class="Table Body Body CellOverride-2">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">In private lands (individual and collective) and in state lands, in areas with larger presence of intact forests or mosaic agriculture and forest lands under management.</p>
                                </td>
                                <td class="Table Body Body CellOverride-2">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">500&#8211;2600 USD ha <span class="superscript _idGenCharOverride-1" lang="">&#8722;1</span> (Kindermann <span class="condensed_italic" lang=""/> et al., 2008; Overmars <span class="condensed_italic" lang=""/> et al., 2014; <a class="reference-link" href="#Smith--2019">Smith et al., 2019</a>). <span class="superscript _idGenCharOverride-1" lang=""> (1) </span> </p>
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">20&#8211;200 USD ha <span class="superscript _idGenCharOverride-1" lang="">&#8722;1</span> (<a class="reference-link" href="#Griscom--2017"/><a class="reference-link" href="#Griscom--2017">Griscom et al., 2017</a> ; <a class="reference-link" href="#Arneth--2019">Arneth et al., 2019</a>) (global estimate).</p>
                                </td>
                                <td class="Table Body Body CellOverride-2">
                                  <ul>
                                    <li class="Body_Tables_Table_list-unnumbered-last" lang="en-US">Opportunity costs associated with different alternatively productive land uses (Kindermann <span class="condensed_italic" lang=""/> et al., 2008).</li>
                                  </ul>
                                </td>
                                <td class="Table Body Body CellOverride-2">
                                  <ul>
                                    <li class="Body_Tables_Table_list-unnumbered-first" lang="en-US">Landscape continuity, persistence of species and metapopulations (including floral recruitment) (<a class="reference-link" href="#Nord&#233;n--2014">Nord&#233;n et al., 2014</a>).</li>
                                    <li class="Body_Tables_Table_list-unnumbered-continued" lang="en-US">Maintained hydrology (<a class="reference-link" href="#Creed--2011">Creed et al., 2011</a>) and flood mitigation.</li>
                                    <li class="Body_Tables_Table_list-unnumbered-continued" lang="en-US">Avoided surface temperature increases (<a class="reference-link" href="#Perugini--2017">Perugini et al., 2017</a>).</li>
                                    <li class="Body_Tables_Table_list-unnumbered-last" lang="en-US">Protects other regulatory functions of forests, with positive impacts on human health.</li>
                                  </ul>
                                </td>
                                <td class="Table Body Body CellOverride-2">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Potential to affect the lives of 1&#8211;25 million people globally (<span class="condensed_italic" lang="">low confidence</span>) (<a class="reference-link" href="#Keenan--2015">Keenan, 2015</a>; CRED, 2015; <a class="reference-link" href="#Smith--2019">Smith et al., 2019</a>).</p>
                                </td>
                              </tr>
                              <tr class="Table _idGenTableRowColumn-30">
                                <td class="Table Body Body CellOverride-2">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Protect and/or increase the size and number of protected areas, especially in &#8216;high-value&#8217; areas</p>
                                </td>
                                <td class="Table Body Body CellOverride-2">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Protected areas play a key role for improving adaptation (Lopoukhine <span class="condensed_italic" lang=""/> et al., 2012; <a class="reference-link" href="#Watson--2014">Watson et al., 2014</a>), through reducing water flow, stabilising rock movements, creating physical barriers to coastal erosion, improving resistance to fires and buffering storm damages. Primary forests sustain tropical biodiversity (Gibson <span class="condensed_italic" lang=""/> et al., 2011); thus, protecting intact forests preserves current patterns of biodiversity (Schmitz <span class="condensed_italic" lang=""/> et al., 2015). <span class="superscript _idGenCharOverride-1" lang=""> (2) </span> </p>
                                </td>
                                <td class="Table Body Body CellOverride-2">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Mainly established in state lands where there is dominance of intact forests, in some cases overlapping with Indigenous territories.</p>
                                </td>
                                <td class="Table Body Body CellOverride-2">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Costs include recurrent management costs, system wide costs, and establishment costs. The cost per ha decreases with increased area (<a class="reference-link" href="#Balmford--2003">Balmford and Whitten, 2003</a>; Bruner <span class="condensed_italic" lang=""/> et al., 2004).</p>
                                </td>
                                <td class="Table Body Body CellOverride-2">
                                  <ul>
                                    <li class="Body_Tables_Table_list-unnumbered-first" lang="en-US">Potential land use and tenure conflicts over protected area expansion.</li>
                                    <li class="Body_Tables_Table_list-unnumbered-continued" lang="en-US">&#8216;High value&#8217; areas are often priority areas for human activity (e.g., lowlands) (Venter <span class="condensed_italic" lang=""/> et al., 2014).</li>
                                    <li class="Body_Tables_Table_list-unnumbered-last" lang="en-US">Management costs (Bruner <span class="condensed_italic" lang=""/> et al., 2004).</li>
                                  </ul>
                                </td>
                                <td class="Table Body Body CellOverride-2">
                                  <ul>
                                    <li class="Body_Tables_Table_list-unnumbered-first" lang="en-US">May create additional dispersal corridors and support metapopulations for forest species increasing ecosystem resilience (Nord&#233;n <span class="condensed_italic" lang=""/> et al., 2014).</li>
                                    <li class="Body_Tables_Table_list-unnumbered-continued" lang="en-US">Improved hydrology (Creed <span class="condensed_italic" lang=""/> et al., 2011).</li>
                                    <li class="Body_Tables_Table_list-unnumbered-last" lang="en-US">Protected areas contribute to income generation through tourism (<a class="reference-link" href="#Snyman--2019">Snyman and Bricker, 2019</a>).</li>
                                  </ul>
                                </td>
                                <td class="Table Body Body CellOverride-2">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Empirical studies of protected areas that use impact evaluation methods, provide evidence that parks help increase household incomes (<a class="reference-link" href="#Mullan--2009">Mullan et al., 2009</a>), poverty alleviation and environmental sustainability (<a class="reference-link" href="#Andam--2010">Andam et al., 2010</a>).</p>
                                </td>
                              </tr>
                              <tr class="Table _idGenTableRowColumn-31">
                                <td class="Table Body Body CellOverride-2">
