                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Set aside high value conservation areas (HVCA) and high carbon stock areas (HCSA) in working lands</p>
                                </td>
                                <td class="Table Body Body CellOverride-2">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Setting aside HCVA and HCSA within agriculture or tree-crop plantations has benefits for preserving endemic species, and some ecological services (e.g., pollination services from insects) (Scriven <span class="condensed_italic" lang=""/> et al., 2019). <span class="superscript _idGenCharOverride-1" lang=""> (3) </span> </p>
                                </td>
                                <td class="Table Body Body CellOverride-2">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Established in private intact and managed forest lands often allocated to mid- and large-scale plantations.</p>
                                </td>
                                <td class="Table Body Body CellOverride-2">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Opportunity costs to landowners who would lose working land/productive area to HCVA or HCSA. Management costs (<a class="reference-link" href="#Naidoo--2006">Naidoo and Adamowicz, 2006</a>).</p>
                                </td>
                                <td class="Table Body Body CellOverride-2">
                                  <ul>
                                    <li class="Body_Tables_Table_list-unnumbered-first" lang="en-US">Opportunity costs to landowners who would lose working land/productive area to HCVA or HCSA.</li>
                                    <li class="Body_Tables_Table_list-unnumbered-last" lang="en-US">Management costs (<a class="reference-link" href="#Naidoo--2006">Naidoo and Adamowicz, 2006</a>).</li>
                                  </ul>
                                </td>
                                <td class="Table Body Body CellOverride-2">
                                  <ul>
                                    <li class="Body_Tables_Table_list-unnumbered-last" lang="en-US">In many cases HCVA are based on the presence of threatened or endemic species or dense, carbon-rich forest ecosystems (e.g., primary forest) (Jennings <span class="condensed_italic" lang=""/> et al., 2003).</li>
                                  </ul>
                                </td>
                                <td class="Table Body Body CellOverride-2">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">HCVA also provide ecosystem services, and therefore can contain valuable economic benefits; forests provide for some basic needs of local communities (health and subsistence) as well as traditional/cultural identity (<a class="reference-link" href="#Sepp&#228;l&#228;--2009">Sepp&#228;l&#228;, 2009</a>; Karjalainen <span class="condensed_italic" lang=""/> et al., 2010).</p>
                                </td>
                              </tr>
                              <tr class="Table _idGenTableRowColumn-4">
                                <td class="Table Body Body CellOverride-12" colspan="8">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">
                                    <span class="bold_condensed" lang="en-GB">2. Forest management strategies to facilitate adaptation of biological diversity</span>
                                  </p>
                                </td>
                              </tr>
                              <tr class="Table _idGenTableRowColumn-32">
                                <td class="Table Body Body CellOverride-2">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Alteration of plant and animal distribution</p>
                                </td>
                                <td class="Table Body Body CellOverride-2">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Restore ecological connectivity through the establishment of corridors</p>
                                </td>
                                <td class="Table Body Body CellOverride-2">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Conserve biodiversity by enabling natural migration of species to areas with more suitable climates (Malcolm <span class="condensed_italic" lang=""/> et al., 2002), maintaining connectedness, especially between various protected areas, and ensuring that different stages of forest development are present (<a class="reference-link" href="#Sepp&#228;l&#228;--2009">Sepp&#228;l&#228;, 2009</a>). Building corridors creates landscape permeability for plant and animal movement (Schmitz <span class="condensed_italic" lang=""/> et al., 2015).</p>
                                </td>
                                <td class="Table Body Body CellOverride-2">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Corridors are implemented in managed lands across state, collective and private tenure regimes circumscribed to specific project targeted areas.</p>
                                </td>
                                <td class="Table Body Body CellOverride-2">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">60&#8211;1294 USD ha <span class="superscript _idGenCharOverride-1" lang="">&#8722;1</span> (in USD 2019) (<a class="reference-link" href="#Crossman--2009"> </a><a class="reference-link" href="#Crossman--2009">Crossman and Bryan, 2009</a>; Torrubia <span class="condensed_italic" lang=""/> et al., 2014)</p>
                                </td>
                                <td class="Table Body Body CellOverride-2">
                                  <ul>
                                    <li class="Body_Tables_Table_list-unnumbered-first" lang="en-US">Land use opportunity costs, financial costs of land acquisition and restoration (<a class="reference-link" href="#Naidoo--2006">Naidoo and Adamowicz, 2006</a>).</li>
                                    <li class="Body_Tables_Table_list-unnumbered-last" lang="en-US">Research and pilot costs of different corridor connection methods (<a class="reference-link" href="#Naidoo--2006">Naidoo and Adamowicz, 2006</a>).</li>
                                  </ul>
                                </td>
                                <td class="Table Body Body CellOverride-2">
                                  <ul>
                                    <li class="Body_Tables_Table_list-unnumbered-first" lang="en-US">Landscape connectivity allows greater opportunity for climate refugia (Morelli <span class="condensed_italic" lang=""/> et al., 2017; Simmons <span class="condensed_italic" lang=""/> et al., 2018) and the restoration of ecosystem patches of native forests can provide dispersal opportunities for different species using alternate successional stages (<a class="reference-link" href="#Christie--2015">Christie and Knowles, 2015</a>).</li>
                                    <li class="Body_Tables_Table_list-unnumbered-last" lang="en-US">Improved hydrology.</li>
                                  </ul>
                                </td>
                                <td class="Table Body Body CellOverride-2">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Ecosystem services could be enhanced (e.g., hydrological benefits, soil conservation, health, recreational and cultural benefits through establishment and restoration of green spaces).</p>
                                </td>
                              </tr>
                              <tr class="Table _idGenTableRowColumn-33">
                                <td class="Table Body Body CellOverride-2"/>
                                <td class="Table Body Body CellOverride-2">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Mixed planting with native species tree planting, with consideration of intraspecific genetic diversity of seedlings</p>
                                </td>
                                <td class="Table Body Body CellOverride-2">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Reforestation is an important climate change adaptation response option (Reyer <span class="condensed_italic" lang=""/> et al., 2009; Locatelli <span class="condensed_italic" lang=""/> et al., 2015b; Ellison <span class="condensed_italic" lang=""/> et al., 2017), and can potentially help a large proportion of the global population to adapt to climate change and related natural disasters. Native tree planting aimed at increasing resilience should include planting genotypes tolerant of drought, insects and/or disease, as well as increasing the genetic diversity within species used for planting and recognising provenance. Tree planting should avoid conversion of natural ecosystems including grasslands and savannahs (<a class="reference-link" href="#Bond--2016">Bond and Zaloumis, 2016</a>).</p>
                                </td>
                                <td class="Table Body Body CellOverride-2">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Tree planting is implemented in degraded lands across different state, collective and private lands</p>
                                </td>
                                <td class="Table Body Body CellOverride-2">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Planting of seedlings 978&#8211;3450 USD ha <span class="superscript _idGenCharOverride-1" lang="">&#8722;1</span> (in USD 2019) (<a class="reference-link" href="#Chabaribery--2008">Chabaribery et al., 2008</a>; <a class="reference-link" href="#Rodrigues--2009">Rodrigues, 2009</a>; <a class="reference-link" href="#Campos-Filho--2013">Campos-Filho et al., 2013</a>; MMA, 2017; <a class="reference-link" href="#Silva--2017">Silva and Nunes, 2017</a>; Nello <span class="condensed_italic" lang=""/> et al., 2019)</p>
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">20&#8211;200 USD ha <span class="superscript _idGenCharOverride-1" lang="">&#8722;1</span></p>
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">(Arneth <span class="condensed_italic" lang=""/> et al., 2019), for reforestation and forest restoration (Griscom <span class="condensed_italic" lang=""/> et al., 2017) (global estimate).</p>
                                </td>
                                <td class="Table Body Body CellOverride-2">
                                  <ul>
                                    <li class="Body_Tables_Table_list-unnumbered-last" lang="en-US">Loss of water yield (at least on an annual average basis) due to increased evapotranspiration</li>
                                  </ul>
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Reforestation helps maintaining base flow during the dry season may reduce the amount of water available for people downstream (Ellison <span class="condensed_italic" lang=""/> et al., 2017).</p>
                                  <ul>
                                    <li class="Body_Tables_Table_list-unnumbered-last" lang="en-US">Research costs on genetic varieties and implementation.</li>
                                  </ul>
                                </td>
                                <td class="Table Body Body CellOverride-2">
                                  <ul>
                                    <li class="Body_Tables_Table_list-unnumbered-first" lang="en-US">Better water retention capacity; reduced risk of erosion and landslides.</li>
                                    <li class="Body_Tables_Table_list-unnumbered-continued" lang="en-US">Carbon gain.</li>
                                    <li class="Body_Tables_Table_list-unnumbered-continued" lang="en-US">Increases both flora and fauna biodiversity.</li>
                                    <li class="Body_Tables_Table_list-unnumbered-continued" lang="en-US">In cases of reforestation/afforestation, small benefits in reducing warming are expected (<a class="reference-link" href="#Arora--2011">Arora and Montenegro, 2011</a>).</li>
                                    <li class="Body_Tables_Table_list-unnumbered-last" lang="en-US">Increased potential for adaptive evolutionary responses within populations to the varied effects of climate change (drought, disease, etc.) (<a class="reference-link" href="#Puettmann--2014">Puettmann, 2014</a>).</li>
                                  </ul>
                                </td>
                                <td class="Table Body Body CellOverride-2">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Reforestation/afforestation has the potential to impact the lives of &gt;25 million people globally (<span class="condensed_italic" lang="">medium confidence</span>) (Reyer <span class="condensed_italic" lang=""/> et al., 2009; CRED, 2015; Sonntag <span class="condensed_italic" lang=""/> et al., 2016; <a class="reference-link" href="#Griscom--2017"/><a class="reference-link" href="#Griscom--2017">Griscom et al., 2017</a> ; Smith <span class="condensed_italic" lang=""/> et al., 2019) (global estimate). No availability of information on differentiated impacts from reforestation and afforestation.</p>
                                </td>
                              </tr>
                              <tr class="Table _idGenTableRowColumn-5">
                                <td class="Table Body Body CellOverride-13" colspan="8">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">
                                    <span class="bold_condensed" lang="en-GB">3. Forest management strategies to maintain the vitality of forest ecosystems</span>
                                  </p>
                                </td>
                              </tr>
                              <tr class="Table _idGenTableRowColumn-34">
                                <td class="Table Body Body CellOverride-2">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Changes in the frequency and severity of forest disturbance</p>
                                </td>
                                <td class="Table Body Body CellOverride-2">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Recognising the rights of Indigenous Peoples and local communities</p>
                                </td>
                                <td class="Table Body Body CellOverride-2">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Granting tenure rights to Indigenous People has the potential to maintain the forest, and ensure provision of ecosystem services, thus supporting local strategies for adaptation to climate change threats (Porter-Bolland <span class="condensed_italic" lang=""/> et al., 2012).</p>
                                </td>
                                <td class="Table Body Body CellOverride-2">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Recognising local tenure rights takes place in land belonging to Indigenous Peoples and local communities across all different forest and trees conditions.</p>
                                </td>
                                <td class="Table Body Body CellOverride-2">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">0.05&#8211;9.96 USD ha <span class="superscript _idGenCharOverride-1" lang="">&#8722;1</span> (<a class="reference-link" href="#Hatcher--2009">Hatcher, 2009</a>). Include the costs of mapping, delimitation, and titling. RRI, (2021) estimates the following costs: 5 USD ha <span class="superscript _idGenCharOverride-1" lang="">&#8722;1</span> for large projects, 22.5 USD</p>
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">ha <span class="superscript _idGenCharOverride-1" lang="">&#8722;1</span> for medium, sub-national projects, and 50 USD ha <span class="superscript _idGenCharOverride-1" lang="">&#8722;1</span> for small</p>
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">investments.</p>
                                </td>
                                <td class="Table Body Body CellOverride-2">
                                  <ul>
                                    <li class="Body_Tables_Table_list-unnumbered-last" lang="en-US">Costs to local populations for protecting forest lands, and opportunity costs for avoiding land conversion (Hajjar et al <span class="condensed_italic" lang="">., </span>2016).</li>
                                  </ul>
                                </td>
                                <td class="Table Body Body CellOverride-2">
                                  <ul>
                                    <li class="Body_Tables_Table_list-unnumbered-last" lang="en-US">Landscape continuity, persistence of species and metapopulations (including floral recruitment) (<a class="reference-link" href="#Nord&#233;n--2014">Nord&#233;n et al., 2014</a>).</li>
                                  </ul>
                                </td>
                                <td class="Table Body Body CellOverride-2">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Some estimates indicate that Indigenous People manage or have tenure rights over at least ~38 million km <span class="superscript _idGenCharOverride-1" lang="">2</span> (Garnett <span class="condensed_italic" lang=""/> et al., 2018) (global estimate). Recognition of rights often translates into positive social and environmental benefits (<a class="reference-link" href="#RRI--2021">RRI, 2021</a>), yet they may differ depending on local conditions.</p>
                                </td>
                              </tr>
                              <tr class="Table _idGenTableRowColumn-35">
                                <td class="Table Body Body CellOverride-2">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Increased mortality due to climate stresses (including fire)</p>
                                </td>
                                <td class="Table Body Body CellOverride-2">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Within production forests, practice sustainable logging by embracing reduced-impact logging (RIL) and other practices.</p>
                                </td>
                                <td class="Table Body Body CellOverride-2">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Some production forests can retain most ecosystem functions and services, and a similar species richness of animals, insects and plants to that found in nearby old-growth forest but can be more susceptible to defaunation and fire (Edwards <span class="condensed_italic" lang=""/> et al., 2014). Sustainable forest management plays a role in adaptation by ensuring that through long-term forest management the diversity of forests is maintained as well as benefits from forest resource use (Putz <span class="condensed_italic" lang=""/> et al., 2012). Improved forest management positively impacts adaptation by limiting the negative effects associated with pollution (of air and fresh water), diseases, and exposure to extreme weather events and natural disasters, e.g., (Smith <span class="condensed_italic" lang=""/> et al., 2014). <span class="superscript _idGenCharOverride-1" lang=""> (4) </span> </p>
                                </td>
                                <td class="Table Body Body CellOverride-2">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">SFM is undertaken at a large scale in public forests allocated as concessions, and at smaller scales in private and community forests lands.</p>
                                </td>
                                <td class="Table Body Body CellOverride-2">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">70&#8211;160 USD ha <span class="superscript _idGenCharOverride-1" lang="">&#8722;1</span> (<a class="reference-link" href="#Singer--2016">Singer, 2016</a>)</p>
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">169&#8211;345 USD ha <span class="superscript _idGenCharOverride-1" lang="">&#8722;1</span> (in USD 2019)</p>
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">(Boltz <span class="condensed_italic" lang=""/> et al., 2001; <a class="reference-link" href="#Holmes--2002">Holmes et al., 2002</a>; <a class="reference-link" href="#Pokorny--2005">Pokorny and Steinbrenner, 2005</a>; <a class="reference-link" href="#Medjibe--2012">Medjibe and Putz, 2012</a>)</p>
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">20&#8211;200 USD ha <span class="superscript _idGenCharOverride-1" lang="">&#8722;1</span> (Griscom <span class="condensed_italic" lang=""/> et al., 2017; <a class="reference-link" href="#Arneth--2019">Arneth et al., 2019</a>) (global estimate).</p>
                                </td>
                                <td class="Table Body Body CellOverride-2">
                                  <ul>
                                    <li class="Body_Tables_Table_list-unnumbered-last" lang="en-US">The tendency of interventions is a (direct or indirect) reduction of diversity because the natural interest of the forest owner is to favour commercial species.</li>
                                  </ul>
                                </td>
                                <td class="Table Body Body CellOverride-2">
                                  <ul>
                                    <li class="Body_Tables_Table_list-unnumbered-first" lang="en-US">Secures the provision of species habitat.</li>
                                    <li class="Body_Tables_Table_list-unnumbered-continued" lang="en-US">Soil structure and fertility.</li>
                                    <li class="Body_Tables_Table_list-unnumbered-continued" lang="en-US">Regulates water quantity and quality.</li>
                                    <li class="Body_Tables_Table_list-unnumbered-last" lang="en-US">Carbon storage (<a class="reference-link" href="#Imai--2009">Imai et al., 2009</a>).</li>
                                  </ul>
                                </td>
                                <td class="Table Body Body CellOverride-2">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">The benefits of sustainable forest management have the potential to affect the lives of &gt;25 million people globally (<span class="condensed_italic" lang="">low confidence</span>) (CRED, 2015; Smith <span class="condensed_italic" lang=""/> et al., 2019) (global estimate).</p>
                                </td>
                              </tr>
                              <tr class="Table _idGenTableRowColumn-36">
                                <td class="Table Body Body CellOverride-2"/>
                                <td class="Table Body Body CellOverride-2">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Reduce the incidence of fire hazard and improve fire management</p>
                                </td>
                                <td class="Table Body Body CellOverride-2">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">As fire hazard increases in some forests with climate change, adaptation measures to reduce fire hazard will be needed (<a class="reference-link" href="#Sepp&#228;l&#228;--2009">Sepp&#228;l&#228;, 2009</a>).</p>
                                </td>
                                <td class="Table Body Body CellOverride-2">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Fire prevention and management is practiced in private lands (individual and collective) and state lands across managed and intact forest lands.</p>
                                </td>
                                <td class="Table Body Body CellOverride-2">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">&lt;20 USD ha <span class="superscript _idGenCharOverride-1" lang="">&#8722;1</span></p>
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Griscom <span class="condensed_italic" lang=""/> et al., 2017; <a class="reference-link" href="#Arneth--2019">Arneth et al., 2019</a>) (global estimate).</p>
                                </td>
                                <td class="Table Body Body CellOverride-2">
                                  <ul>
                                    <li class="Body_Tables_Table_list-unnumbered-last" lang="en-US">Costs of fuel management and prescribed burns. -Costs of implementing fire management plans with many groups of stakeholders (Stephens <span class="condensed_italic" lang=""/> et al., 2013).</li>
                                  </ul>
                                </td>
                                <td class="Table Body Body CellOverride-2">
                                  <ul>
                                    <li class="Body_Tables_Table_list-unnumbered-first" lang="en-US">Avoids forest degradation and deforestation.</li>
                                    <li class="Body_Tables_Table_list-unnumbered-continued" lang="en-US">Prevents biodiversity loss and species loss.</li>
                                    <li class="Body_Tables_Table_list-unnumbered-last" lang="en-US">Protects local livelihoods and cultural values.</li>
                                  </ul>
                                </td>
                                <td class="Table Body Body CellOverride-2">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">&gt;5.8 million people affected by wildfire globally; max. 0.5 million deaths yr <span class="superscript _idGenCharOverride-1" lang="">-1</span> by smoke globally (<span class="condensed_italic" lang="">medium confidence</span>) (<a class="reference-link" href="#Johnston--2012">Johnston et al., 2012</a>; <a class="reference-link" href="#Doerr--2016">Doerr and Sant&#237;n, 2016</a>; Smith et al., 2019) (global estimate).</p>
                                </td>
                              </tr>
                              <tr class="Table _idGenTableRowColumn-5">
                                <td class="Table Body Body CellOverride-14" colspan="8">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">
                                    <span class="bold_condensed" lang="en-GB">4. Forest management strategies to restore the productive capacity of forest ecosystems</span>
                                  </p>
                                </td>
                              </tr>
                              <tr class="Table _idGenTableRowColumn-37">
                                <td class="Table Body Body CellOverride-2">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Increased mortality due to climate stresses</p>
                                </td>
                                <td class="Table Body Body CellOverride-2">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Assisted natural regeneration in degraded forest landscapes</p>
                                </td>
                                <td class="Table Body Body CellOverride-2">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Forest landscape restoration positively affects the structure and function of degraded ecosystems (Shimamoto <span class="condensed_italic" lang=""/> et al., 2018). Forest restoration may enhance connectivity between forest areas and help conserve biodiversity hotspots (Locatelli et al., 2015a; <a class="reference-link" href="#Ellison--2017">Ellison et al., 2017</a>; <a class="reference-link" href="#Dooley--2018">Dooley and Kartha, 2018</a>). Forest restoration may improve ecosystem functionality and services, provide microclimatic regulation for people and crops, wood and fodder as safety nets, soil erosion protection and soil fertility enhancement (<a class="reference-link" href="#Locatelli--2015a">Locatelli et al., 2015a</a>). Land restoration can reduce future risks (e.g., by protecting against hazards) and current vulnerability (e.g., by diversifying livelihoods) (Pramova <span class="condensed_italic" lang=""/> et al., 2019). Natural forest regeneration contributes to climate mitigation through carbon removals (Lewis <span class="condensed_italic" lang=""/> et al., 2019), and this would imply less need for climate adaptation.</p>
                                </td>
                                <td class="Table Body Body CellOverride-2">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Tree regeneration takes place in more degraded lands across different types of tenure regimes in public, community and private lands.</p>
                                </td>
                                <td class="Table Body Body CellOverride-2">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Assisted natural regeneration 180&#8211;980 USD ha <span class="superscript _idGenCharOverride-1" lang="">&#8722;1</span> (in USD 2019) (<a class="reference-link" href="#Cury--2011">Cury and Carvalho, 2011</a>; Lira <span class="condensed_italic" lang=""/> et al., 2012; MMA, 2017; <a class="reference-link" href="#Silva--2017">Silva and Nunes, 2017</a>).</p>
                                </td>
                                <td class="Table Body Body CellOverride-2">
                                  <ul>
                                    <li class="Body_Tables_Table_list-unnumbered-first" lang="en-US">Opportunity costs of alternative land uses.</li>
                                    <li class="Body_Tables_Table_list-unnumbered-continued" lang="en-US">Costs of maintaining regenerating landscapes (e.g., exclusion plots).</li>
                                    <li class="Body_Tables_Table_list-unnumbered-last" lang="en-US">Costs of facilitated dispersal or seeding (<a class="reference-link" href="#Naidoo--2006">Naidoo and Adamowicz, 2006</a>).</li>
                                  </ul>
                                </td>
                                <td class="Table Body Body CellOverride-2">
                                  <ul>
                                    <li class="Body_Tables_Table_list-unnumbered-first" lang="en-US">Uses microclimatic changes from regeneration to create emergent landscape restoration from available and present species in soil seed banks or dispersive capacity of local habitat patches.</li>
                                    <li class="Body_Tables_Table_list-unnumbered-last" lang="en-US">Increases potential area and influence of forest ecosystems even into marginal matrix habitat (<a class="reference-link" href="#Chazdon--2016">Chazdon and Guariguata, 2016</a>).</li>
                                  </ul>
                                </td>
                                <td class="Table Body Body CellOverride-2">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">The benefits of regeneration of degraded landscapes have the potential to impact the lives of &gt;25 million people globally (<span class="condensed_italic" lang="">medium confidence</span>) (<a class="reference-link" href="#Reyer--2009">Reyer et al., 2009</a>; CRED, 2015; <a class="reference-link" href="#Sonntag--2016">Sonntag et al., 2016</a>; <a class="reference-link" href="#Griscom--2017"/><a class="reference-link" href="#Griscom--2017">Griscom et al., 2017</a> ; <a class="reference-link" href="#Smith--2019">Smith et al., 2019</a>) (global estimate).</p>
                                </td>
                              </tr>
                              <tr class="Table _idGenTableRowColumn-32">
                                <td class="Table Body Body CellOverride-2">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Changes in the frequency and severity of forest disturbance</p>
                                </td>
                                <td class="Table Body Body CellOverride-2">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Expand agroforestry systems (AFs) in buffer zones and mosaic landscapes</p>
                                </td>
                                <td class="Table Body Body CellOverride-2">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Agroforestry reduces pressure on intact forests and can enhance ecosystem services at the landscape level (<a class="reference-link" href="#Jose--2009">Jose, 2009</a>). It can also help to increase resilience to pests and diseases through ecological processes (Miccolis <span class="condensed_italic" lang=""/> et al., 2016). Agroforestry can reduce vulnerability to hazards like wind and drought, particularly for subsistence farmers (<a class="reference-link" href="#Thorlakson--2012">Thorlakson and Neufeldt, 2012</a>).</p>
                                </td>
                                <td class="Table Body Body CellOverride-2">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Agroforestry has a large potential in collective forest lands, both managed and degraded.</p>
                                </td>
                                <td class="Table Body Body CellOverride-2">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">7150&#8211;22,575 USD ha <span class="superscript _idGenCharOverride-1" lang="">&#8722;1</span> (in USD 2019) (Raes <span class="condensed_italic" lang=""/> et al., 2017; <a class="reference-link" href="#Nello--2019">Nello et al., 2019</a>).</p>
                                </td>
                                <td class="Table Body Body CellOverride-2">
                                  <ul>
                                    <li class="Body_Tables_Table_list-unnumbered-first" lang="en-US">Opportunity costs of other land uses.</li>
                                    <li class="Body_Tables_Table_list-unnumbered-continued" lang="en-US">Costs of engaging in markets and/or developing markets for agroforestry products.</li>
                                    <li class="Body_Tables_Table_list-unnumbered-last" lang="en-US">Risks of market saturation and supply/demand inconsistencies (Torres <span class="condensed_italic" lang=""/> et al., 2010; Mercer <span class="condensed_italic" lang=""/> et al., 2014).</li>
                                  </ul>
                                </td>
                                <td class="Table Body Body CellOverride-2">
                                  <ul>
                                    <li class="Body_Tables_Table_list-unnumbered-first" lang="en-US">Biodiversity (habitat, migratory corridors, gene flow).</li>
                                    <li class="Body_Tables_Table_list-unnumbered-continued" lang="en-US">Soil structure and fertility, nutrient cycling.</li>
                                    <li class="Body_Tables_Table_list-unnumbered-continued" lang="en-US">Water infiltration/water recharge, erosion control.</li>
                                    <li class="Body_Tables_Table_list-unnumbered-last" lang="en-US">Buffer strips can reduce the resource pressures on native ecosystems by providing income and resources for people (Vieira <span class="condensed_italic" lang=""/> et al., 2009).</li>
                                  </ul>
                                </td>
                                <td class="Table Body Body CellOverride-2">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Potential to improve farmers&#8217; livelihoods and quality of life of 2300 million people globally (<span class="condensed_italic" lang="">medium confidence</span>) (<a class="reference-link" href="#Lasco--2014">Lasco et al., 2014</a>; <a class="reference-link" href="#Smith--2019">Smith et al., 2019</a>) (global estimate).</p>
                                </td>
                              </tr>
                            </tbody>
                          </table>
                          <p class="Body_Tables_Table_note-no-title" lang="en-US">This table draws on Appendix 6.1&#8211;6.4 from Seppala et al. (2009), pp. 71&#8211;77</p>
                        </div>
                      </div>
                    </div>
                    <div class="h1-container" id="CCP7.6">
                      <h1 class="Headings_H1-numbered" lang="en-GB">CCP7.6  Governance of Tropical Forests for Resilience and Adaptation to Climate Change <span class="share-block"><img class="share-icon" src="../../share.png"/></span><button class="btn-ipcc btn btn-primary chapter-expand">Expand section</button></h1>
                      <div class="h1-siblings" id="h1-7-siblings">
                        <p class="Body_Body-justify" lang="en-GB">Deforestation and forest degradation in tropical forests has grown in prominence as priorities for environmental governance in the face of climate change, given the large share of forest and land use GHG emissions in the national profiles of tropical forest countries (<span class="condensed_italic" lang="">high confidence</span>) (Butt <span class="condensed_italic" lang=""/> et al., 2015; <a class="reference-link" href="#IPCC--2019b">IPCC, 2019b</a>). This is reflected in Parties&#8217; Nationally Determined Contributions to the Paris Climate Agreement (UNFCCC, 2021). Significant investments in REDD+ readiness, improved forest monitoring, assessments of drivers of deforestation and forest degradation and related policy responses, and stakeholder engagement have occurred over the past decade in countries across Africa, Asia-Pacific, and Latin America and the Caribbean (Hein <span class="condensed_italic" lang=""/> et al., 2018; <a class="reference-link" href="#UN-REDD Programme--2018">UN-REDD Programme, 2018</a>; <a class="reference-link" href="#World Bank--2018">World Bank, 2018</a>). Fifty-three percent of countries use the highest-quality remote sensing data for forest monitoring and reporting, covering 93% of forest cover (Nesha <span class="condensed_italic" lang=""/> et al., 2021). However, improved monitoring has not yet translated into forest governance effectiveness. Since the New York Declaration on Forests was endorsed in 2014, average annual humid tropical primary forest loss has accelerated by 44% (NYDF, 2019). Policy responses towards conservation and ecosystem resilience are found to be insufficient to stem the direct and indirect drivers of nature deterioration (<span class="condensed_italic" lang="">high confidence</span>) (IPBES, 2019). For governance measures to be effective, it is necessary to alter the direct and underlying drivers that are leading to forest destruction or impeding the implementation of sustainable forest management practices and actions to restore degraded forests (<span class="condensed_italic" lang="">high confidence</span>) (Section CCP7.2.3; Section CCP7.5; UNFCCC, 2013).</p>
                        <p class="Body_Body-justify" lang="en-GB">Private sector commitments to reduce deforestation impacts in their commodity supply chains are growing, but evidence of impact is slim and inconclusive (Garrett <span class="condensed_italic" lang=""/> et al., 2019; NYDF, 2019). Half of the biodiversity loss associated with consumption in developed economies occurs outside their territorial boundaries (Wilting <span class="condensed_italic" lang=""/> et al., 2017), and trends in international trade in land-based production systems are increasing, with greatest impacts on tropical forests (Nystr&#246;m <span class="condensed_italic" lang=""/> et al., 2019; <a class="reference-link" href="#Hoang--2021">Hoang and Kanemoto, 2021</a>). In addition, in some cases the impacts of financialisation (e.g., correlation of commodity prices with stock market dynamics rather than pure demand) are found to be larger than those related to timber and agricultural commodity production dynamics (<a class="reference-link" href="#Girardi--2015">Girardi, 2015</a>; <a class="reference-link" href="#Ouyang--2020">Ouyang and Zhang, 2020</a>; cross-reference to Chapter 5.13). Such factors present challenges for governance and policy responses.</p>
                        <p class="Body_Body-justify" lang="en-GB">The complexity of tackling drivers of forest loss and degradation will increase as climate impacts on forests and ecosystems intensify in the context of incomplete information and limited understanding of risks (<a class="reference-link" href="#Helbing--2013">Helbing, 2013</a>; Hughes <span class="condensed_italic" lang=""/> et al., 2013; Springmann <span class="condensed_italic" lang=""/> et al., 2018; Tu <span class="condensed_italic" lang=""/> et al., 2019), necessitating novel approaches to forest governance for resilience (<a class="reference-link" href="#Keenan--2015">Keenan, 2015</a>; Spathelf <span class="condensed_italic" lang=""/> et al., 2018). Therefore, governance, defined as efforts that seek to influence the relationship between existing social processes and governance arrangements by using regulatory processes, mechanisms and organisations (Agrawal <span class="condensed_italic" lang=""/> et al., 2018), is a crucial process to convene stakeholders for decisions (<a class="reference-link" href="#FAO--2018a">FAO, 2018a</a>).</p>
                        <p class="Body_Body-justify" lang="en-GB">This section describes seven levers that support transformative environmental governance towards resilience of tropical forests by tackling the underlying indirect drivers, offering policy solutions and governance challenges and opportunities. The first five build on IPBES (2019), whereas the remaining two are drawn from the governance literature as highly relevant variables specific to the tropical forest context owing to their prominence in the international frameworks developed over the past 10 years (Table CCP7.5). Monitoring and finance are embedded in multiple levers. The levers include:</p>
                        <ol>
                          <li class="Body_Lists_List_numbered-first" lang="en-GB">Developing incentives and increased capacity for environmental responsibility (particularly in relation to global targets such as the SDGs, Aichi Biodiversity Targets and the Paris Agreement) and discontinuing harmful subsidies and disincentives;</li>
                          <li class="Body_Lists_List_numbered-continued" lang="en-GB">Reforming sectoral and segmented decision-making to promote integration across sectors and jurisdictions to mainstream environmental objectives across institutions, within and among all relevant sectors;</li>
                          <li class="Body_Lists_List_numbered-continued" lang="en-GB">Pursuing pre-emptive and precautionary actions in regulatory and management institutions and businesses to avoid, mitigate and remedy the deterioration of nature and monitor outcomes;</li>
                          <li class="Body_Lists_List_numbered-continued" lang="en-GB">Managing for resilient social and ecological systems in the face of uncertainty and complexity;</li>
                          <li class="Body_Lists_List_numbered-continued" lang="en-GB">Strengthening environmental laws and policies and their implementation, and the rule of law more generally (P&#246;rtner <span class="condensed_italic" lang=""/> et al., 2021);</li>
                          <li class="Body_Lists_List_numbered-continued" lang="en-GB">Acknowledging land tenure and rights to recognise the need of bringing human rights considerations into the climate change regime; and</li>
                          <li class="Body_Lists_List_numbered-last" lang="en-GB">Enhancing inclusive stakeholder participation to ensure effective, efficient and equitable outcomes (Pasgaard <span class="condensed_italic" lang=""/> et al., 2016).</li>
                        </ol>
                        <p class="Body_Body-justify" lang="en-GB">While the first five levers are relevant to environmental governance more broadly, the exploration of these levers in Table CCP7.5  is more specific to governance for forest resilience, drawing upon insights related to each transformation lever. Next to the governance solutions being implemented currently, indications of future challenges/opportunities related to resilience in tropical forests are explored based on examples from the recent literature.</p>
                        <p class="Body_Tables_Table_title" lang="en-US"><span class="table_number" lang="">Table CCP7.5  | </span>Levers of transformative change to tackle the underlying indirect drivers of forest deterioration for resilience.</p>
                        <table class="Table" id="table005">
                          <colgroup>
                            <col class="_idGenTableRowColumn-38"/>
                            <col class="_idGenTableRowColumn-39"/>
                            <col class="_idGenTableRowColumn-40"/>
                          </colgroup>
                          <thead>
                            <tr class="Table _idGenTableRowColumn-3">
                              <td class="Table Head-blue">
                                <p class="Body_Tables_Table_header-black" lang="en-US">Levers of transformative change</p>
                              </td>
                              <td class="Table Head-blue">
                                <p class="Body_Tables_Table_header-black" lang="en-US">Barriers</p>
                              </td>
                              <td class="Table Head-blue">
                                <p class="Body_Tables_Table_header-black" lang="en-US">Current governance and policy solutions and potential future challenges and opportunities with an orientation towards resilience in tropical forests</p>
                              </td>
                            </tr>
                          </thead>
                          <tbody>
                            <tr class="Table _idGenTableRowColumn-36">
                              <td class="Table Body CellOverride-2" rowspan="2">
                                <p class="Body_Tables_Table_body-black-left" lang="en-US">1. Incentives and capacity-building</p>
                              </td>
                              <td class="Table Body CellOverride-2" rowspan="2">
                                <ul>
                                  <li class="Body_Tables_Table_list-unnumbered-continued" lang="en-US">Population growth and corruption counteract governance effects (<a class="reference-link" href="#Enrici--2016">Enrici and Hubacek, 2016</a>; <a class="reference-link" href="#Busch--2020">Busch and Ferretti-Gallon, 2020</a>; Fischer <span class="condensed_italic" lang=""/> et al., 2020)</li>
                                  <li class="Body_Tables_Table_list-unnumbered-continued" lang="en-US">Macroeconomic development favoured over ecosystem service provision&#8212;environment ministries under resourced and politically weak compared with those for economic and natural resource development (<a class="reference-link" href="#UNEP--2019">UNEP, 2019</a>)</li>
                                  <li class="Body_Tables_Table_list-unnumbered-continued" lang="en-US">Though food systems are the major driver, many interconnected food system activities and effects do not have established governance regimes to address them (<a class="reference-link" href="#Clapp--2018">Clapp and Scott, 2018</a>)</li>
                                  <li class="Body_Tables_Table_list-unnumbered-continued" lang="en-US">Reliance on non-state market-based approaches (e.g., zero-net deforestation) has not achieved necessary impact against stated targets, reporting is lacking (Lambin <span class="condensed_italic" lang=""/> et al., 2018; <a class="reference-link" href="#Global Canopy--2019">Global Canopy, 2019</a>)</li>
                                  <li class="Body_Tables_Table_list-unnumbered-continued" lang="en-US">Finance for forest mitigation is less than 1.5% of total since 2010 (<a class="reference-link" href="#NYDF Assessment Partners--2019">NYDF Assessment Partners, 2019</a>), and amount for forest adaptation is even less (Micale <span class="condensed_italic" lang=""/> et al., 2018).</li>
                                </ul>
                              </td>
                              <td class="Table Body CellOverride-2">
                                <p class="Body_Tables_Table_body-black-left" lang="en-US">
                                  <span class="bold_condensed" lang="en-GB">Current policy solutions</span>
                                </p>
                                <ul>
                                  <li class="Body_Tables_Table_list-unnumbered-continued" lang="en-US">REDD+ and payments for ecosystem services (PES)</li>
                                  <li class="Body_Tables_Table_list-unnumbered-continued" lang="en-US">Corporate supply chain commitments (<a class="reference-link" href="#WWF and BCG--2021">WWF and BCG, 2021</a>)</li>
                                  <li class="Body_Tables_Table_list-unnumbered-continued" lang="en-US">Product certification and forest certification have mixed results in addressing deforestation (Blackman <span class="condensed_italic" lang=""/> et al., 2018; van der Ven <span class="condensed_italic" lang=""/> et al., 2018)</li>
                                  <li class="Body_Tables_Table_list-unnumbered-continued" lang="en-US">Agricultural credit restrictions (Assun&#231;&#227;o <span class="condensed_italic" lang=""/> et al., 2020)</li>
                                  <li class="Body_Tables_Table_list-unnumbered-continued" lang="en-US">Protected areas and area-based conservation measures (OECMs) (Maxwell <span class="condensed_italic" lang=""/> et al., 2020)</li>
                                  <li class="Body_Tables_Table_list-unnumbered-continued" lang="en-US">Clear performance indicators and monitoring systems to assess performance (Agrawal <span class="condensed_italic" lang=""/> et al., 2018).</li>
                                </ul>
                              </td>
                            </tr>
                            <tr class="Table _idGenTableRowColumn-35">
                              <td class="Table Body CellOverride-15">
                                <p class="Body_Tables_Table_body-black-left" lang="en-US">
                                  <span class="bold_condensed" lang="en-GB">Future policy challenges/opportunities</span>
                                </p>
                                <ul>
                                  <li class="Body_Tables_Table_list-unnumbered-continued" lang="en-US">Policies that insulate the forest frontier from the influence of high commodity prices (<a class="reference-link" href="#Busch--2020">Busch and Ferretti-Gallon, 2020</a>)</li>
                                  <li class="Body_Tables_Table_list-unnumbered-continued" lang="en-US">Project-level biodiversity responses linked to broader jurisdictional biodiversity targets (Simmonds <span class="condensed_italic" lang=""/> et al., 2020)</li>
                                  <li class="Body_Tables_Table_list-unnumbered-continued" lang="en-US">Ecological fiscal transfers to base portions of intergovernmental fiscal transfers on ecological indicators (Busch <span class="condensed_italic" lang=""/> et al., 2021)</li>
                                  <li class="Body_Tables_Table_list-unnumbered-continued" lang="en-US">Financial disclosure on risks, divestiture, environment-related investment mandates (<a class="reference-link" href="#Halvorssen--2021">Halvorssen, 2021</a>)</li>
                                  <li class="Body_Tables_Table_list-unnumbered-continued" lang="en-US">Identification of means for the forest-based bioeconomy (wood fuel, timber) to be sustained (<a class="reference-link" href="#Dieterle--2020">Dieterle and Karsenty, 2020</a>)</li>
                                  <li class="Body_Tables_Table_list-unnumbered-continued" lang="en-US">Incentives towards less emissions-intensive inputs in manufactured products, such as bamboo (van der Lugt <span class="condensed_italic" lang=""/> et al., 2018)</li>
                                  <li class="Body_Tables_Table_list-unnumbered-continued" lang="en-US">Reducing imports of embedded deforestation (role of land-use telecoupling) (Gardner <span class="condensed_italic" lang=""/> et al., 2019)</li>
                                  <li class="Body_Tables_Table_list-unnumbered-continued" lang="en-US">Supply chain traceability and public reporting (Gardner <span class="condensed_italic" lang=""/> et al., 2019; <a class="reference-link" href="#Global Canopy--2019">Global Canopy, 2019</a>).</li>
                                </ul>
                              </td>
                            </tr>
                            <tr class="Table _idGenTableRowColumn-41">
                              <td class="Table Body CellOverride-2" rowspan="2">
                                <p class="Body_Tables_Table_body-black-left" lang="en-US">2. Cross-sectoral cooperation</p>
                              </td>
                              <td class="Table Body CellOverride-2" rowspan="2">
                                <ul>
                                  <li class="Body_Tables_Table_list-unnumbered-continued" lang="en-US">Inherent vertical and horizontal fragmentation of policy arena</li>
                                  <li class="Body_Tables_Table_list-unnumbered-continued" lang="en-US">Challenge of silos between ministries (Nilsson <span class="condensed_italic" lang=""/> et al., 2016)</li>
                                  <li class="Body_Tables_Table_list-unnumbered-continued" lang="en-US">Policy integration has a stronger chance of reforming existing policies and competing sectors than coordination, but is challenged to overcome sectoral fragmentation and reach international actors and markets (Kissinger <span class="condensed_italic" lang=""/> et al., 2021).</li>
                                </ul>
                              </td>
                              <td class="Table Body CellOverride-2">
                                <p class="Body_Tables_Table_body-black-left" lang="en-US">
                                  <span class="bold_condensed" lang="en-GB">Current policy solutions</span>
                                </p>
                                <ul>
                                  <li class="Body_Tables_Table_list-unnumbered-continued" lang="en-US">Policy coordination and integration (<a class="reference-link" href="#Candel--2016">Candel and Biesbroek, 2016</a>)</li>
                                  <li class="Body_Tables_Table_list-unnumbered-continued" lang="en-US">Jurisdictional and landscape approaches in targeted regions and commodity sectors/supply chains (Reed <span class="condensed_italic" lang=""/> et al., 2017; <a class="reference-link" href="#von Essen--2021">von Essen and Lambin, 2021</a>).</li>
                                </ul>
                              </td>
                            </tr>
                            <tr class="Table _idGenTableRowColumn-42">
                              <td class="Table Body CellOverride-2">
                                <p class="Body_Tables_Table_body-black-left" lang="en-US">
                                  <span class="bold_condensed" lang="en-GB">Future policy challenges/opportunities</span>
                                </p>
                                <ul>
                                  <li class="Body_Tables_Table_list-unnumbered-continued" lang="en-US">Theories of change applied and testing of policy effectiveness (Meehan <span class="condensed_italic" lang=""/> et al., 2019; Bager <span class="condensed_italic" lang=""/> et al., 2021)</li>
                                  <li class="Body_Tables_Table_list-unnumbered-continued" lang="en-US">Whole-of-government approaches to change mandates across ministries</li>
                                  <li class="Body_Tables_Table_list-unnumbered-continued" lang="en-US">Mainstreaming climate change into sectoral policies (Di Gregorio <span class="condensed_italic" lang=""/> et al., 2017)</li>
                                  <li class="Body_Tables_Table_list-unnumbered-continued" lang="en-US">Policy mixes implemented as a bundle, policy instrument selection attuned to complexity of the problem (<a class="reference-link" href="#Henstra--2015">Henstra, 2015</a>; <a class="reference-link" href="#Head--2018">Head, 2018</a>).</li>
                                </ul>
                              </td>
                            </tr>
                            <tr class="Table _idGenTableRowColumn-19">
                              <td class="Table Body CellOverride-2" rowspan="2">
                                <p class="Body_Tables_Table_body-black-left" lang="en-US">3. Pre-emptive action</p>
                              </td>
                              <td class="Table Body CellOverride-2" rowspan="2">
                                <ul>
                                  <li class="Body_Tables_Table_list-unnumbered-continued" lang="en-US">Complexity of the issues for any specific level of jurisdiction to grapple with scale mismatches (temporal, spatial and institutional) and institutional inertia (Bai <span class="condensed_italic" lang=""/> et al., 2016)</li>
                                  <li class="Body_Tables_Table_list-unnumbered-continued" lang="en-US">Reliance on path dependency rather than innovation (Beland Lindahl <span class="condensed_italic" lang=""/> et al., 2017; Peters <span class="condensed_italic" lang=""/> et al., 2018; <a class="reference-link" href="#Wieczorek--2018">Wieczorek, 2018</a>)</li>
                                  <li class="Body_Tables_Table_list-unnumbered-continued" lang="en-US">Agenda setting and framing influences political and policy responses (Soto Golcher <span class="condensed_italic" lang=""/> et al., 2018)</li>
                                  <li class="Body_Tables_Table_list-unnumbered-continued" lang="en-US">Problem denial and blame avoidance on the part of decision makers (<a class="reference-link" href="#Howlett--2017">Howlett and Kemmerling, 2017</a>).</li>
                                </ul>
                              </td>
                              <td class="Table Body CellOverride-2">
                                <p class="Body_Tables_Table_body-black-left" lang="en-US">
                                  <span class="bold_condensed" lang="en-GB">Current policy solutions</span>
                                </p>
                                <ul>
                                  <li class="Body_Tables_Table_list-unnumbered-continued" lang="en-US">GHG emission cap-and-trade systems and carbon pricing (<a class="reference-link" href="#Green--2021">Green, 2021</a>)</li>
                                  <li class="Body_Tables_Table_list-unnumbered-continued" lang="en-US">Moratoria.</li>
                                </ul>
                              </td>
                            </tr>
                            <tr class="Table _idGenTableRowColumn-43">
                              <td class="Table Body CellOverride-15">
                                <ul>
                                  <li class="Body_Tables_Table_list-unnumbered-continued" lang="en-US">Identifying thresholds of concern, when critical thresholds of fast-changing variables are triggered, and nonlinear responses erode the resilience of ecosystems (such as in the case of changing forest fire regimes) (Gillson <span class="condensed_italic" lang=""/> et al., 2019)</li>
                                  <li class="Body_Tables_Table_list-unnumbered-continued" lang="en-US">Reduce loss and waste of biomass</li>
                                  <li class="Body_Tables_Table_list-unnumbered-continued" lang="en-US">Change in consumption patterns, sharing and reuse</li>
                                  <li class="Body_Tables_Table_list-unnumbered-continued" lang="en-US">Shareholder divestiture due to climate/forest and biodiversity risk (<a class="reference-link" href="#Halvorssen--2021">Halvorssen, 2021</a>).</li>
                                </ul>
                              </td>
                            </tr>
                            <tr class="Table _idGenTableRowColumn-41">
                              <td class="Table Body" rowspan="2">
                                <p class="Body_Tables_Table_body-black-left" lang="en-US">4. Decision-making in the context of resilience and uncertainty</p>
                              </td>
                              <td class="Table Body" rowspan="2">
                                <ul>
                                  <li class="Body_Tables_Table_list-unnumbered-continued" lang="en-US">Scope of problem identification limited (Beland Lindahl <span class="condensed_italic" lang=""/> et al., 2017)</li>
                                  <li class="Body_Tables_Table_list-unnumbered-continued" lang="en-US">Increasingly complex and networked world increases risks, but reduces our ability to understand and manage these risks (<a class="reference-link" href="#Helbing--2013">Helbing, 2013</a>; Tu <span class="condensed_italic" lang=""/> et al., 2019).</li>
                                </ul>
                              </td>
                              <td class="Table Body">
                                <p class="Body_Tables_Table_body-black-left" lang="en-US">
                                  <span class="bold_condensed" lang="en-GB">Current policy solutions</span>
                                </p>
                                <ul>
                                  <li class="Body_Tables_Table_list-unnumbered-continued" lang="en-US">Forecasting, scenarios of future climate and forest condition, socioeconomic dimensions, science-policy dialogue (Bele <span class="condensed_italic" lang=""/> et al., 2015) and thresholds for ecosystem shifts due to mortality (tipping points) (Verbesselt <span class="condensed_italic" lang=""/> et al., 2016).</li>
                                </ul>
                              </td>
                            </tr>
                            <tr class="Table _idGenTableRowColumn-44">
                              <td class="Table Body CellOverride-2">
                                <p class="Body_Tables_Table_body-black-left" lang="en-US">
                                  <span class="bold_condensed" lang="en-GB">Future policy challenges/opportunities</span>
                                </p>
                                <ul>
                                  <li class="Body_Tables_Table_list-unnumbered-continued" lang="en-US">Interdisciplinary and transdisciplinary approaches to data gathering and policy design (<a class="reference-link" href="#Keenan--2015">Keenan, 2015</a>)</li>
                                  <li class="Body_Tables_Table_list-unnumbered-continued" lang="en-US">&#8216;Robust&#8217; decision-making approaches for adaptive forest management (H&#246;rl <span class="condensed_italic" lang=""/> et al., 2020)</li>
                                  <li class="Body_Tables_Table_list-unnumbered-continued" lang="en-US">Maintain diversity and redundancy, manage connectivity, and slow variables and feedbacks (Biggs <span class="condensed_italic" lang=""/> et al., 2012)</li>
                                  <li class="Body_Tables_Table_list-unnumbered-continued" lang="en-US">Measurement and disclosure of climate and ecosystem risk (<a class="reference-link" href="#NBIM--2021">NBIM, 2021</a>).</li>
                                </ul>
                              </td>
                            </tr>
                            <tr class="Table _idGenTableRowColumn-41">
                              <td class="Table Body" rowspan="2">
                                <p class="Body_Tables_Table_body-black-left" lang="en-US">5. Environmental law and implementation</p>
                              </td>
                              <td class="Table Body" rowspan="2">
                                <ul>
                                  <li class="Body_Tables_Table_list-unnumbered-continued" lang="en-US">69% of agricultural conversion of tropical forests <span class="condensed_italic" lang="">likely </span> illegal between 2013 and 2019 (Dummett <span class="condensed_italic" lang=""/> et al., 2021)</li>
                                  <li class="Body_Tables_Table_list-unnumbered-continued" lang="en-US">90% of countries (of 31 assessed), identify weak forest sector governance and institutions, conflicting policies beyond the forest sector, and illegal activity as main underlying drivers (Kissinger <span class="condensed_italic" lang=""/> et al., 2012); corruption and illegality are identified as key factors in increasing forest loss (Piabuo <span class="condensed_italic" lang=""/> et al., 2021)</li>
                                  <li class="Body_Tables_Table_list-unnumbered-continued" lang="en-US">Implementation and enforcement of environmental laws falls far short; primary obstacle is political will (<a class="reference-link" href="#UNEP--2019">UNEP, 2019</a>)</li>
                                  <li class="Body_Tables_Table_list-unnumbered-continued" lang="en-US">Conflicting legal instruments, lack of clarity in implementation, monitoring and evaluation, responsibilities are poorly defined and fragmented across multiple agencies (Ranabhat <span class="condensed_italic" lang=""/> et al., 2018)</li>
                                  <li class="Body_Tables_Table_list-unnumbered-continued" lang="en-US">Lack of sanctions, transparency and accountability (Bai <span class="condensed_italic" lang=""/> et al., 2016; <a class="reference-link" href="#Enrici--2016">Enrici and Hubacek, 2016</a>)</li>
                                  <li class="Body_Tables_Table_list-unnumbered-continued" lang="en-US">Open-ended decision-making exacerbates political asymmetries (<a class="reference-link" href="#Holley--2017">Holley and Sofronova, 2017</a>).</li>
                                </ul>
                              </td>
                              <td class="Table Body CellOverride-2">
                                <p class="Body_Tables_Table_body-black-left" lang="en-US">
                                  <span class="bold_condensed" lang="en-GB">Current policy solutions</span>
                                </p>
                                <ul>
                                  <li class="Body_Tables_Table_list-unnumbered-continued" lang="en-US">Environmental laws and regulations (<a class="reference-link" href="#Head--2018">Head, 2018</a>)</li>
                                  <li class="Body_Tables_Table_list-unnumbered-continued" lang="en-US">Trained prosecutors</li>
                                  <li class="Body_Tables_Table_list-unnumbered-continued" lang="en-US">Citizen rights to information (<a class="reference-link" href="#Bizzo--2017">Bizzo and Michener, 2017</a>).</li>
                                </ul>
                              </td>
                            </tr>
                            <tr class="Table _idGenTableRowColumn-45">
                              <td class="Table Body CellOverride-15">
                                <p class="Body_Tables_Table_body-black-left" lang="en-US">
                                  <span class="bold_condensed" lang="en-GB">Future policy challenges/opportunities</span>
                                </p>
                                <ul>
                                  <li class="Body_Tables_Table_list-unnumbered-continued" lang="en-US">Capacity and willingness to engage iterative processes for continuous effort in transparency and accountability (in implementing the Extractive Industry Transparency Initiative) (<a class="reference-link" href="#Lujala--2018">Lujala, 2018</a>)</li>
                                  <li class="Body_Tables_Table_list-unnumbered-continued" lang="en-US">Regulatory frameworks as enablers to motivate and hold private sector initiatives to account (test effectiveness) (Begemann <span class="condensed_italic" lang=""/> et al., 2021)</li>
                                  <li class="Body_Tables_Table_list-unnumbered-continued" lang="en-US">Nested and multi-level governance arrangements (Ravikumar <span class="condensed_italic" lang=""/> et al., 2015)</li>
                                  <li class="Body_Tables_Table_list-unnumbered-continued" lang="en-US">Diagnosing the political drivers of decision making through political economy assessment (Fritz <span class="condensed_italic" lang=""/> et al., 2014).</li>
                                </ul>
                              </td>
                            </tr>
                            <tr class="Table _idGenTableRowColumn-46">
                              <td class="Table Body" rowspan="2">
                                <p class="Body_Tables_Table_body-black-left" lang="en-US">6. Land tenure/rights</p>
                              </td>
                              <td class="Table Body" rowspan="2">
                                <ul>
                                  <li class="Body_Tables_Table_list-unnumbered-continued" lang="en-US">Though recognition of Indigenous self-determination is growing, many cases of legal recognition still lack full authority to govern (<a class="reference-link" href="#UN-DESA--2021">UN-DESA, 2021</a>)</li>
                                  <li class="Body_Tables_Table_list-unnumbered-continued" lang="en-US">Free, Prior Informed Consent (FPIC).</li>
                                </ul>
                              </td>
                              <td class="Table Body CellOverride-2">
                                <p class="Body_Tables_Table_body-black-left" lang="en-US">
                                  <span class="bold_condensed" lang="en-GB">Current policy solutions</span>
                                </p>
                                <ul>
                                  <li class="Body_Tables_Table_list-unnumbered-continued" lang="en-US">Legal and constitutional recognition of rights, collective/communal rights (Safitri, 2015; Blackman <span class="condensed_italic" lang=""/> et al., 2017; <a class="reference-link" href="#Gebara--2018">Gebara, 2018</a>)</li>
                                  <li class="Body_Tables_Table_list-unnumbered-continued" lang="en-US">Indigenous land demarcation (<a class="reference-link" href="#Baragwanath--2020">Baragwanath and Bayi, 2020</a>)</li>
                                  <li class="Body_Tables_Table_list-unnumbered-continued" lang="en-US">Community-based forest management (Pelletier <span class="condensed_italic" lang=""/> et al., 2016).</li>
                                </ul>
                              </td>
                            </tr>
                            <tr class="Table _idGenTableRowColumn-47">
                              <td class="Table Body CellOverride-2">
                                <p class="Body_Tables_Table_body-black-left" lang="en-US">
                                  <span class="bold_condensed" lang="en-GB">Future policy challenges/opportunities</span>
                                </p>
                                <ul>
                                  <li class="Body_Tables_Table_list-unnumbered-continued" lang="en-US">Forest protection/climate and biodiversity is strongest when indigenous people hold collective legal titles to their lands (<a class="reference-link" href="#IPCC--2019b">IPCC, 2019b</a>) (in Latin America, deforestation rates are about 50% lower in Indigenous territories than in other forested areas) (<a class="reference-link" href="#FAO and FILAC--2021">FAO and FILAC, 2021</a>).</li>
                                </ul>
                              </td>
                            </tr>
                            <tr class="Table _idGenTableRowColumn-41">
                              <td class="Table Body" rowspan="2">
                                <p class="Body_Tables_Table_body-black-left" lang="en-US">7. Participation and stakeholder inclusion</p>
                              </td>
                              <td class="Table Body" rowspan="2">
                                <ul>
                                  <li class="Body_Tables_Table_list-unnumbered-continued" lang="en-US">Governments increasingly rely on highly autonomous semi-public or private organisations for policy results which weakens control of the process (Howlett <span class="condensed_italic" lang=""/> et al., 2015), yet mediating between diverse values and interests of citizens, consumers, business and community is a determinant of policy effectiveness (Peters <span class="condensed_italic" lang=""/> et al., 2018)</li>
                                  <li class="Body_Tables_Table_list-unnumbered-continued" lang="en-US">Growing legal restrictions on civil society involvement in governance and access to funding (<a class="reference-link" href="#UNEP--2019">UNEP, 2019</a>)</li>
                                  <li class="Body_Tables_Table_list-unnumbered-continued" lang="en-US">Institutional practices of stakeholder consultation in REDD+ not well operationalised (criteria and transparency often lacking) (Fujisaki <span class="condensed_italic" lang=""/> et al., 2016).</li>
                                </ul>
                              </td>
                              <td class="Table Body CellOverride-2">
                                <p class="Body_Tables_Table_body-black-left" lang="en-US">
                                  <span class="bold_condensed" lang="en-GB">Current policy solutions</span>
                                </p>
                                <ul>
                                  <li class="Body_Tables_Table_list-unnumbered-continued" lang="en-US">Multi-stakeholder dialogue combined with moratoria (e.g., Brazilian soy moratorium) (Gibbs <span class="condensed_italic" lang=""/> et al., 2015)</li>
                                  <li class="Body_Tables_Table_list-unnumbered-continued" lang="en-US">Community-based monitoring (Slough <span class="condensed_italic" lang=""/> et al., 2021).</li>
                                </ul>
                              </td>
                            </tr>
                            <tr class="Table _idGenTableRowColumn-43">
                              <td class="Table Body CellOverride-2">
                                <p class="Body_Tables_Table_body-black-left" lang="en-US">
                                  <span class="bold_condensed" lang="en-GB">Future policy challenges/opportunities</span>
                                </p>
                                <ul>
                                  <li class="Body_Tables_Table_list-unnumbered-continued" lang="en-US">Collaborative networks (Thomas <span class="condensed_italic" lang=""/> et al., 2018)</li>
                                  <li class="Body_Tables_Table_list-unnumbered-continued" lang="en-US">Re-evaluating agency, social structures and the distribution of power to uphold rights (Delabre <span class="condensed_italic" lang=""/> et al.)</li>
                                  <li class="Body_Tables_Table_list-unnumbered-continued" lang="en-US">Community engagement correlated to secure rights to resources (Pham <span class="condensed_italic" lang=""/> et al., 2015).</li>
                                </ul>
                              </td>
                            </tr>
                          </tbody>
                        </table>
                      </div>
                      <div class="h2-container box-container" id="box-ccp7.2">
                        <h2 class="Body_Box_blue_Box_head" lang="en-GB"><span>Box CCP7.2  | Contribution of Sustainable Tropical Forest Management to the SDGs</span> <span class="arrow-up"/><span class="arrow-down"/><span class="share-block"><img class="share-icon" src="../../share.png"/></span></h2>
                        <div class="h2-siblings" id="h2-15-siblings">
                          <p class="Body_Box_blue_Box_body" lang="en-GB">There is increasing evidence of positive impacts of resilient tropical forests, biodiversity and sustainable forest management in achieving SDGs, as presented in Table Box CCP7.2.1. However, there is also risk of unintended consequences based on conflicts between the use of forest-based goods and services, and effects on tropical forest resilience, ecosystem services and biodiversity (<a class="reference-link" href="#Baumgartner--2019">Baumgartner, 2019</a>). For instance, substitution of fossil fuels and non-renewable resources with bio-based products can lead to deforestation and the loss of biodiversity (Carrasco, 2017) (Cross-Working-Group Box BIOECONOMY in Chapter 5). Deforestation as a result of increased agricultural production and productivity could hamper efforts in addressing long-term food security, particularly for forest-dependent people (Newton <span class="condensed_italic" lang=""/> et al., 2016; Section CCP7.2.3). Synergies and trade-offs depend very much on local contexts and are therefore presented in exemplary form.</p>
