                      <div id="chapter-citation">
                        <p class="Headings_Chapter_citation" lang="en-GB">This cross-chapter paper should be cited as:</p>
                        <p class="Body_Chapter_citation" lang="en-GB">Ometto, J.P., K. Kalaba, G.Z. Anshari, N. Chac&#243;n, A. Farrell, S.A. Halim, H. Neufeldt, and R. Sukumar, 2022: Cross-Chapter Paper 7: Tropical Forests. In: <span class="light_condensed_italic" lang="">Climate Change 2022: Impacts, Adaptation and Vulnerability. </span>Contribution of Working Group II to the Sixth Assessment Report of the Intergovernmental Panel on Climate Change [H.-O. P&#246;rtner, D.C. Roberts, M. Tignor, E.S. Poloczanska, K. Mintenbeck, A. Alegr&#237;a, M. Craig, S. Langsdorf, S. L&#246;schke, V. M&#246;ller, A. Okem, B. Rama (eds.)]. Cambridge University Press, Cambridge, UK and New York, NY, USA, pp. 2369&#8211;2410, doi:10.1017/9781009325844.024.</p>
                      </div>
                    </div>
                    <div class="h1-container" id="Executive">
                      <h1 class="Headings_H1-unnumbered" lang="en-GB">Executive Summary <span class="share-block"><img class="share-icon" src="../../share.png"/></span><button class="btn-ipcc btn btn-primary chapter-expand">Expand section</button></h1>
                      <div class="h1-siblings" id="h1-1-siblings">
                        <p class="Body_Body-justify" lang="en-GB"><span class="bold_condensed" lang="en-GB">Over 420 million ha of forest were lost to deforestation from 1990 to 2020; more than 90% of that loss took place in tropical areas (</span><span class="bold_condensed_italic" lang="">high confidence</span><span class="bold_condensed" lang="en-GB">), threatening biodiversity, environmental services, livelihoods of forest communities and resilience to climate shocks (</span><span class="bold_condensed_italic" lang="">high confidence</span><span class="superscript _idGenCharOverride-1" lang=""><span id="footnote-001-backlink"><a class="_idFootnoteLink _idGenColorInherit" href="ccp7.html#footnote-001">1</a> </span></span><span class="bold_condensed" lang="en-GB">). </span>Forty-five percent of the world&#8217;s forested areas are in the tropics, and they are among the most important regulators of regional and global climate, natural carbon sinks and the most significant repositories of terrestrial biomass. They are of immeasurable value to biodiversity, ecosystem services, social and cultural identities, livelihoods, and climate change adaptation and mitigation. <!-- -->{CCP7.2.1; CCP7.2.2; Box CCP7.2; Table CCP7.2 }</p>
                        <p class="Body_Body-justify" lang="en-GB"><span class="bold_condensed" lang="en-GB">Climate change affects tropical forests through warming and increased occurrence of extreme events such as droughts and heatwaves, as well as more frequent fires, which increase tree mortality and reduce tree growth, limiting the ability of forests to regenerate (</span><span class="bold_condensed_italic" lang="">high confidence</span><span class="bold_condensed" lang="en-GB">). </span>Climate change is altering the structure and species composition of tropical tree communities (<span class="condensed_italic" lang="">high confidence</span>), including transitions from moist to drier forest in regions such as the Amazon (<span class="condensed_italic" lang="">high confidence</span>), and movement of species from lower to higher elevations (<span class="condensed_italic" lang="">high confidence</span>). Despite CO<span class="subscript _idGenCharOverride-1" lang="">2</span> fertilisation, ongoing climate change has weakened the carbon sink potential of tropical forests in Amazonia and, to a lesser extent, in Africa and Asia (<span class="condensed_italic" lang="">medium confidence</span>). <!-- -->{CCP7.2.3; CCP7.3 }</p>
                        <p class="Body_Body-justify" lang="en-GB"><span class="bold_condensed" lang="en-GB">Large-scale tropical deforestation affects regional to continental scale climates with significant impacts on forest resilience (</span><span class="bold_condensed_italic" lang="">high confidence</span><span class="bold_condensed" lang="en-GB">). </span>Deforestation generally reduces rainfall and enhances temperatures, with effects depending on scales (<span class="condensed_italic" lang="">high confidence</span>), while often increasing surface runoff (<span class="condensed_italic" lang="">medium confidence</span>). Continued deforestation-driven landscape drying and fragmentation will aggravate fire risk and reduce forest resilience, leading to degradation or savannisation of the tropical forest biomes, in particular in combination with climate change (<span class="condensed_italic" lang="">high confidence</span>). <!-- -->{CCP7.3.6}</p>
                        <p class="Body_Body-justify" lang="en-GB"><span class="bold_condensed" lang="en-GB">Implementing sustainable management strategies can improve the ability of tropical forest ecosystems to adapt to climate change (</span><span class="bold_condensed_italic" lang="">high confidence) </span> <span class="bold_condensed" lang="en-GB">, and the benefits of adaptation interventions often outweigh the costs (</span><span class="bold_condensed_italic" lang="">medium confidence</span><span class="bold_condensed" lang="en-GB">). </span>Adaptation of tropical forests to climate change provides an opportunity for tropical countries to develop forest policies that create incentives for environmental services such as carbon storage and biodiversity refugia. Forest restoration using a diverse mix of native species can help rebuild the climate resilience of tropical forests, but is best implemented alongside other sustainable forest management strategies and adaptation interventions (<span class="condensed_italic" lang="">high confidenc</span> e). <!-- -->{CCP7.5; Box CCP7.1 }</p>
                        <p class="Body_Body-justify ParaOverride-1" lang="en-GB"><span class="bold_condensed" lang="en-GB">Community-based adaptation, built on Indigenous knowledge and local knowledge (IK and LK) over centuries or millennia, is often identified as an effective adaptation strategy to climate change (</span><span class="bold_condensed_italic" lang="">high confidence</span><span class="bold_condensed" lang="en-GB">). </span>For successful adaptation of tropical forest communities, it is vital to consider IK and LK in addition to modern scientific approaches, together with consideration of non-climatic vulnerabilities (e.g., poverty, gender inequality and power asymmetries) (<span class="condensed_italic" lang="">high confidence</span>). Climate change vulnerability and adaptive capacity have a historical and geopolitical context, conditioned by value systems and development models. Transformative and sustainable practices are required for effective management of tropical forests (<span class="condensed_italic" lang="">high confidence</span>). <!-- -->{CCP7.4; Box CCP7.1 }</p>
                        <p class="Body_Body-justify" lang="en-GB"><span class="bold_condensed" lang="en-GB">Building resilience of tropical forests to climate change relies on adaptation in combination with reduction of direct and underlying drivers of deforestation and forest degradation (</span><span class="bold_condensed_italic" lang="">high confidence</span><span class="bold_condensed" lang="en-GB">). </span>Tropical deforestation is largely driven by agriculture, both from subsistence farming and industrial agriculture (e.g., oil palm, timber plantations, soybeans, livestock) (<span class="condensed_italic" lang="">high confidence</span>). While poverty and population growth combined with poor governance often fuel subsistence agriculture (<span class="condensed_italic" lang="">high confidence</span>), industrial agriculture is often driven by international market forces for commodities and large-scale land acquisitions (<span class="condensed_italic" lang="">high confidence</span>). <!-- -->{CCP7.2.3}</p>
                        <p class="Body_Body-justify _idGenParaOverride-1" lang="en-GB"><span class="bold_condensed" lang="en-GB">Governance responses to addressing the direct and underlying drivers of deforestation have been inadequate to reduce pressures, yet the urgency of tackling drivers of forest loss and degradation is increasing as climate impacts on forests and ecosystems increase (</span><span class="bold_condensed_italic" lang="">high confidence</span><span class="bold_condensed" lang="en-GB">). </span>Transformative levers towards improving environmental governance and resilience of tropical forests include: incentivising and building capacity for environmental responsibility and discontinuing harmful subsidies and disincentives; reforming segmented decision-making to promote integration across sectors and jurisdictions; pursuing pre-emptive and precautionary actions; managing for resilient social and ecological systems in the face of uncertainty and complexity; strengthening environmental laws and policies and their implementation; acknowledging land tenure and rights; and inclusive stakeholder participation (medium confidence). <!-- -->{CCP7.6}</p>
                      </div>
                    </div>
                    <div class="h1-container" id="CCP7.1">
                      <h1 class="Headings_H1-numbered" lang="en-GB">CCP7.1  Introduction <span class="share-block"><img class="share-icon" src="../../share.png"/></span><button class="btn-ipcc btn btn-primary chapter-expand">Expand section</button></h1>
                      <div class="h1-siblings" id="h1-2-siblings">
                        <p class="Body_Body-justify" lang="en-GB">Climate change is already impacting tropical forests around the world, including through distributional shifts of forest biomes, changes in species composition, biomass, pests and diseases, and increases in forest fires (<span class="condensed_italic" lang="">high confidence</span>). These impacts are often compounded by non-climatic factors such as conversion of land for other uses, burning to clear land, mining, and road and infrastructure development. It is notable that, despite societal awareness and financial opportunities to restore forests (<a class="reference-link" href="#Brancalion--2017">Brancalion and Chazdon, 2017</a>), tropical forests are increasingly threatened. For instance, the conversion of tropical forests to large-scale agricultural production (mainly soybeans, oil palm, maize, cotton, livestock), is among the strongest drivers of species richness decline of both flora and fauna, thereby impacting the adaptation opportunities of ecosystems and local people to climate change (<a class="reference-link" href="#IPBES--2018">IPBES, 2018</a>). Reducing direct and indirect drivers of deforestation and forest degradation is therefore critical to building, maintaining or enhancing the resilience of tropical forests against climate and non-climate drivers alike (<span class="condensed_italic" lang="">high confidence</span>).</p>
                        <p class="Body_Body-justify" lang="en-GB">With climate change-related drivers becoming increasingly important in the future, changes to tropical forests will most <span class="condensed_italic" lang="">likely </span><span class="superscript CharOverride-1" lang=""><span id="footnote-000-backlink"><a class="_idFootnoteLink _idGenColorInherit" href="ccp7.html#footnote-000">2</a> </span></span> be aggravated overall, although some tropical forests may temporarily benefit, physiologically, from higher temperatures and changes in precipitation patterns. To the degree to which forests are affected by climate change and other drivers, their resilience against these stressors is diminishing leading to a reduction in the regulating, supporting, provisioning and cultural ecosystem services they provide (<a class="reference-link" href="#Alroy--2017">Alroy, 2017</a>; Cadman <span class="condensed_italic" lang=""/> et al., 2017; P&#246;rtner <span class="condensed_italic" lang=""/> et al., 2021) (Chapter 2) (<span class="condensed_italic" lang="">high confidence</span>). This, in turn, is affecting the lives and livelihoods of millions of people who depend on forests and their products, in particular forest dwelling communities, but also, via the teleconnections between forests and surrounding areas of influence, in socio-ecological systems outside the forests themselves.</p>
                        <p class="Body_Body-justify" lang="en-GB">While strong mitigation efforts are fundamental to minimising future climate impacts on forests, forest management can be improved in many places in support of enhancing the resilience of tropical forests, often with significant co-benefits for carbon storage, biodiversity, food security and ecosystem services (<span class="condensed_italic" lang="">high confidence</span>). Sustainable management practices allow forests to be utilised, frequently with equally high or even higher productivity levels, while keeping their core functions intact. While there are numerous approaches to managing forests and forest landscapes sustainably, an element that appears to be critical is property rights and tenure arrangements allowing stewards of the land, including Indigenous Peoples, securing long-term access and utilisation of forest resources (<span class="condensed_italic" lang="">medium confidence</span>) (<a class="reference-link" href="#Rahman--2016">Rahman and Alam, 2016</a>; Naughton-Treves, 2014).</p>
                        <p class="Body_Body-justify ParaOverride-2" lang="en-GB">Figure CCP7.1  illustrates the interconnections of climate risks and non-climate drivers facing tropical forests. On the one hand, the rates and extent of deforestation and forest degradation result in loss of ecosystem services, biodiversity and human well-being and enhance the vulnerability of the social-ecological system to the impacts of climate change. On the other, forest protection and sustainable forest management result in higher resilience of the ecosystem against climate impacts. This framing illustrates both the complexity and scale of the challenge and provides opportunities to reduce impacts at different scales by eliminating the underlying drivers, both climate and non-climate related, through policies and measures at global, national and subnational levels, involving state and non-state actors alike.</p>
                        <div class="Figure" id="_idContainer007">
                          <p class="Body_Figures_Figure" lang="de-DE">
                            <img alt="" class="_idGenObjectAttribute-1" id="figure-ccp7-001" loading="lazy" src="https://ipcc.ch/report/ar6/wg2/downloads/figures/IPCC_AR6_WGII_Figure_CCP7_001.png"/>
                          </p>
                          <p class="Body_Figures_Figure_title" lang="en-US"><span class="figure_number" lang="">Figure CCP7.1  | </span><span class="bold_condensed-dark-blue" lang="">Impacts of climate change and human disturbances on tropical forests lead to high risk of biodiversity loss and uncertainty of livelihoods for the majority of forest-dependent communities (left side). </span>Good forest governance would increase the resilience of tropical forest through better adaptation to and mitigation of climate change (right side).</p>
                          <div class="ch-figure-button-cont"><a href="/report/ar6/wg2/figures/chapter-ccp7/figure-ccp7-001" target="_blank"><button class="btn-ipcc btn btn-primary ch-figure-button">Open figure</button></a> </div>
                        </div>
                        <p class="Body_Body-justify" lang="en-GB">Building on what has been presented in IPCC AR5, SR15 and SRCCL, Section CCP7.2  first briefly describes the types and extent of tropical forest ecosystems, and then looks at current rates and drivers of deforestation and forest degradation. Section CCP7.3  presents current and projected climate change impacts on tropical trees and forests, focusing primarily on drought, heat and fires, looking from physiological responses to risks, projected climate change impact and forest resilience. Section CCP7.4  addresses the impacts of climate change and tropical forest destruction on the livelihoods and well-being of communities and peoples living in or being strongly dependent upon tropical forests. This section includes a Box on Indigenous knowledge and local knowledge and community-based adaptation. Section CCP7.5  assesses adaptation options for the sustainable management of tropical forests drawing upon the protection, management and restoration framework, and includes a Box on the connection between sustainable forest management and the United Nations Sustainable Development Goals. Section CCP7.6, finally, assesses opportunities and challenges of tropical forest governance to maintain and enhance resilience against climate change impacts on forests.</p>
                      </div>
                    </div>
                    <div class="h1-container" id="CCP7.2">
                      <h1 class="Headings_H1-numbered" lang="en-GB">CCP7.2  The Current State of Tropical Forests <span class="share-block"><img class="share-icon" src="../../share.png"/></span><button class="btn-ipcc btn btn-primary chapter-expand">Expand section</button></h1>
                      <div class="h1-siblings" id="h1-3-siblings">
                        <p class="Body_Body-justify" lang="en-GB">In the most recent Global Ecological Zones map produced by the Food and Agriculture Organization (FAO) for the year 2010, tropical vegetation has been defined as encompassing regions which are frost-free during all months in the year (<a class="reference-link" href="#FAO--2012">FAO, 2012</a>). Further, the tropical vegetation has been sub-classified into tropical rainforest, tropical moist forest, tropical dry forest, tropical shrubland, tropical desert and tropical mountain systems based on climate in combination with vegetation physiognomy and orographic zone (Table SMCCP7.1). IPCC has used the basic FAO classification in its National Greenhouse Gas Inventories Guidelines (<a class="reference-link" href="#IPCC--2019a">IPCC, 2019a</a>).</p>
                        <p class="Body_Body-justify ParaOverride-3" lang="en-GB">Since the FAO ecological zones represent potential biome extents, the present area under forest is assessed using the European Space Agency Climate Change Initiative Land Cover data set (<a class="reference-link" href="#ESA--2017">ESA, 2017</a>). The ESA data set provides a direct mapping to IPCC land categories (e.g., &#8216;forest&#8217;), allowing for standardised and consistent reporting of existing forest and forest gain/loss in each ecological zone. The most extensive tropical ecological zone is the tropical rainforest (1459 Mha or about 25% of all tropical ecological zones), followed by tropical desert (which is not further considered here), tropical moist forest, tropical shrubland, tropical dry forest and tropical mountain system (Table CCP7.1; Figure CCP7.2). Mangroves are not explicitly considered in the FAO classification. Tropical rainforest occurs largely in South America, Africa, and South and Southeast Asia, and is the most intact tropical forest biome (Table CCP7.1). Significant portions of tropical moist forest, which abut tropical rainforest in many regions but experience a longer dry season, have been lost in most regions (Table CCP7.2). Tropical moist forest typically grades into the highly threatened tropical dry forest ecological zone, of which only about a third exists under forest cover at present. Only about 44% of tropical mountain systems, which occur approximately above 1000 m above mean sea level, are presently under forest cover. While the FAO classification provides the potential tropical ecological zones (roughly, &#8216;vegetation types&#8217;), there are large differences in the extents of global tropical forest biomes which are still remaining as reported by different sources (Sayre <span class="condensed_italic" lang=""/> et al., 2020; Oc&#243;n <span class="condensed_italic" lang=""/> et al., 2021). These differences result from differences in biome definition, data source, the definition of &#8216;forest&#8217;, and the method used for classifying remotely sensed data. For example, the reported global area of tropical dry forests ranges from 105 to 645 Mha (Pan <span class="condensed_italic" lang=""/> et al., 2013; Bastin <span class="condensed_italic" lang=""/> et al., 2017; Oc&#243;n <span class="condensed_italic" lang=""/> et al., 2021).</p>

                      <div class="h2-container" id="CCP7.2.1">
                        <h2 class="Headings_H2-numbered" lang="de-DE">CCP7.2.1  Distribution and Biodiversity of Tropical Forest Ecosystems <span class="arrow-up"/><span class="arrow-down"/><span class="share-block"><img class="share-icon" src="../../share.png"/></span></h2>
                        <div class="h2-siblings" id="h2-1-siblings">
                          <p class="Body_Body-justify" lang="en-GB">Tropical forests are indisputably the areas with highest biological diversity on Earth, both in absolute and density (species per area) terms (Plotkin <span class="condensed_italic" lang=""/> et al., 2000). Estimates account that tropical forests harbour half or even more of world&#8217;s biodiversity (Kier <span class="condensed_italic" lang=""/> et al., 2009; Jenkins <span class="condensed_italic" lang=""/> et al., 2013), even though this figure is highly uncertain owing to varying estimates of undescribed species (Mora <span class="condensed_italic" lang=""/> et al., 2011). For example, it is estimated that there are at least 40,000, but possibly more than 53,000 tree species in tropical forests (Slik <span class="condensed_italic" lang=""/> et al., 2015). A vast majority of this biodiversity and Indigenous knowledge and local knowledge associated with its use remains poorly explored, presenting a vast unlocked genetic reserve at risk of loss, although many of today&#8217;s important medicines, foods and ecosystem products originate from tropical forests (<a class="reference-link" href="#Kouznetsov--2008">Kouznetsov and Amado Torres, 2008</a>; Calderon <span class="condensed_italic" lang=""/> et al., 2009, <a class="reference-link" href="#Maia--2016">Maia and Mour&#227;o, 2016</a>).</p>
                          <p class="Body_Body-justify" lang="en-GB">Rates of global biodiversity loss in the past few decades have acelerated to levels that are, for some taxa, approaching the estimated rate of 75% of taxa extinction found in Earth&#8217;s &#8216;big five&#8217; mass extinction events (Barnosky <span class="condensed_italic" lang=""/> et al., 2011; D&#237;az <span class="condensed_italic" lang=""/> et al., 2019; <a class="reference-link" href="#Davison--2021">Davison et al., 2021</a>). Even though species&#8211;area relationships tend to overestimate extinction rates (<a class="reference-link" href="#He--2011">He and Hubbell, 2011</a>), there is evidence that species richness in tropical forests is alarmingly approaching or surpassing the taxa extinction value in this period (45% for dung beetles, 51% for lizards, 65% for ants, and 80% for mammals) should deforestation and habitat loss continue at the current pace (<a class="reference-link" href="#Alroy--2017">Alroy, 2017</a>; Ceballos <span class="condensed_italic" lang=""/> et al., 2017). Moreover, there is reasonable understanding that these numbers are underestimated and, as such, tropical forest loss and degradation alone will precipitate a sixth mass extinction event (<a class="reference-link" href="#Giam--2017">Giam, 2017</a>). A total of 13 out of the 25 global biodiversity hotspots for conservation are located in tropical forests, such as Brazil&#8217;s Atlantic Forest and India&#8217;s Western Ghats/Sri Lanka (Myers <span class="condensed_italic" lang=""/> et al., 2000). While forest loss and degradation have been the main cause of tropical biodiversity loss in the past, climate change now arises as a major threat not only for individual tropical forest species or taxa&#8212;as already observed for frogs (Pounds <span class="condensed_italic" lang=""/> et al., 2006)&#8212;but for whole communities (Esquivel-Muelbert <span class="condensed_italic" lang=""/> et al., 2019), and even entire tropical forest ecoregions (Lapola <span class="condensed_italic" lang=""/> et al., 2018).</p>
                        </div>
                      </div>
                      <div class="h2-container" id="CCP7.2.2">
                        <h2 class="Headings_H2-numbered" lang="de-DE">CCP7.2.2  Rates of Deforestation, Tropical Reforestation and Connections to Climate Resilience of Tropical Forests <span class="arrow-up"/><span class="arrow-down"/><span class="share-block"><img class="share-icon" src="../../share.png"/></span></h2>
                        <div class="h2-siblings" id="h2-2-siblings">
                          <p class="Body_Body-justify" lang="en-GB">More than 420 million ha of forest were lost globally in the 1990&#8211;2020 period because of deforestation, and more than 90% of that loss took place in tropical areas (<a class="reference-link" href="#FAO--2020">FAO, 2020</a>). For the 2015&#8211;2020 period, the tropical deforestation rate decreased compared with 2010&#8211;2015, being estimated at 10.2 Mha yr <span class="superscript _idGenCharOverride-1" lang="">&#8722;1</span> (<a class="reference-link" href="#FAO--2020">FAO, 2020</a>). But reforestation and afforestation rates have also decreased, resulting in a tropical forests net loss rate of 7.3 Mha yr <span class="superscript _idGenCharOverride-1" lang="">&#8722;1</span> in the 2015&#8211;2020 period. Overall, the net loss rate has slightly decreased (&#8722;4%) since 1990 (<span class="condensed_italic" lang="">high confidence</span>). However, a particularly high upward trend is observed in Central America and the Caribbean, while a small increase (2%) is observed in the tropical zone of Africa, during the periods from 2010&#8211;2015 to 2015&#8211;2020 (Table CPP7.2).</p>
                        </div>
                      </div>
                      <div class="h2-container" id="CCP7.2.3">
                        <h2 class="Headings_H2-numbered" lang="de-DE">CCP7.2.3  Drivers of Deforestation and Forest Degradation <span class="arrow-up"/><span class="arrow-down"/><span class="share-block"><img class="share-icon" src="../../share.png"/></span></h2>
                        <div class="h2-siblings" id="h2-3-siblings">
                          <p class="Body_Body-justify" lang="en-GB">Deforestation and forest degradation both affect carbon stocks, biodiversity loss and the provision of ecosystem services, leading to a reduction in resilience to climate change and exacerbating forest landscape vulnerability even in the absence of direct anthropogenic action (<span class="condensed_italic" lang="">high confidence</span>) (Barlow <span class="condensed_italic" lang=""/> et al., 2016; Aleixo <span class="condensed_italic" lang=""/> et al., 2019; Feng <span class="condensed_italic" lang=""/> et al., 2021; Saatchi <span class="condensed_italic" lang=""/> et al., 2021). There is also clear evidence of deforestation influencing temperatures and the hydrological cycle at local to regional scales resulting in reduced precipitation and evaporation and increased runoff relative to unaffected areas (<span class="condensed_italic" lang="">high confidence</span>) [CCP7.3.6] (Jia <span class="condensed_italic" lang=""/> et al., 2019; Douville <span class="condensed_italic" lang=""/> et al., 2021). Negative trends in biodiversity and ecosystems are predicted to undermine 80% of the Sustainable Development Goals targets related to poverty, hunger, health, water, cities, climate, oceans and land (IPBES, 2019). Therefore, besides greenhouse gas (GHG) mitigation, reducing the driving forces leading to deforestation and forest degradation is of the utmost importance for forest resilience, biodiversity protection, avoiding regional climatic changes and the provision of critical ecosystem services, and communities whose livelihoods depend on forests (<span class="condensed_italic" lang="">high confidence</span>) (Curtis <span class="condensed_italic" lang=""/> et al., 2018; IPBES, 2019; Jia <span class="condensed_italic" lang=""/> et al., 2019; <a class="reference-link" href="#Seymour--2019">Seymour and Harris, 2019</a>; P&#246;rtner <span class="condensed_italic" lang=""/> et al., 2021; Saatchi <span class="condensed_italic" lang=""/> et al., 2021).</p>
                          <p class="Body_Body-justify" lang="en-GB">Drivers of deforestation and forest degradation can be distinguished between proximate (i.e., direct) and underlying (i.e., indirect). Direct drivers, such as agriculture (including crops, livestock and plantation forestry), infrastructure development (which often provides access to intact forests and catalyses deforestation) or timber extraction, are place-based and visible. They are influenced by underlying driving forces, such as demographic, economic, technological, political and institutional, or cultural factors, which typically form complex interactions and act at multiple scales, frequently without any direct connection to the areas of forest loss (<a class="reference-link" href="#Geist--2002">Geist and Lambin, 2002</a>).</p>
                          <p class="Body_Body-justify" lang="en-GB">Agriculture is by far the largest direct driver of tropical deforestation, with great differences between commercial and subsistence farming and large variation across regions (Figure CCP7.3). Over 80% of tropical deforestation between 2000 and 2010 was caused by agriculture, proportionally ranging from ca. 75% in Africa and Asia to ca. 95% in the Americas (<a class="reference-link" href="#FAO and UNEP--2020">FAO and UNEP, 2020</a>), but both the scale of deforestation and the relative contribution of different drivers have changed considerably over time (<span class="condensed_italic" lang="">high confidence</span>) (Hosonuma <span class="condensed_italic" lang=""/> et al., 2012; Curtis <span class="condensed_italic" lang=""/> et al., 2018; <a class="reference-link" href="#Seymour--2019">Seymour and Harris, 2019</a>; <a class="reference-link" href="#FAO and UNEP--2020">FAO and UNEP, 2020</a>).</p>
                          <div class="Figure" id="_idContainer033">
                            <p class="Body_Figures_Figure" lang="de-DE">
                              <img alt="" class="_idGenObjectAttribute-9" id="figure-ccp7-003" loading="lazy" src="https://ipcc.ch/report/ar6/wg2/downloads/figures/IPCC_AR6_WGII_Figure_CCP7_003.png"/>
                            </p>
                            <p class="Body_Figures_Figure_title" lang="en-US"><span class="figure_number" lang="">Figure CCP7.3  | </span><span class="bold_condensed-dark-blue" lang="">Primary drivers of tropical forest cover loss for the period 2001&#8211;2015. </span>Darker colour intensity indicates greater total quantity of forest cover loss. While some tropical forest cover loss is temporary, a large portion is related to deforestation. Source: Curtis <span class="light_condensed_italic" lang=""/> et al. (2018). Cropped figure reprinted with permission from AAAS.</p>
                            <div class="ch-figure-button-cont"><a href="/report/ar6/wg2/figures/chapter-ccp7/figure-ccp7-003" target="_blank"><button class="btn-ipcc btn btn-primary ch-figure-button">Open figure</button></a> </div>
                          </div>
                          <p class="Body_Body-justify" lang="en-GB">Forest degradation is more difficult to track, but can have large negative effects on carbon storage, provision of ecosystem services, and biodiversity (Griscom <span class="condensed_italic" lang=""/> et al., 2017; <a class="reference-link" href="#Houghton--2017">Houghton and Nassikas, 2017</a>). A recent analysis suggests that forest degradation is increasing and is now surpassing deforestation rates in the Brazilian Amazon (Aparecido Trondoli Matricardi <span class="condensed_italic" lang=""/> et al., 2020). As with deforestation, drivers of forest degradation differ by region, such that timber extraction was by far the most important degradation driver in Latin America and Asia, whereas in Africa wood fuel consumption contributed to about half of forest degradation between 2000 and 2010 (Hosonuma <span class="condensed_italic" lang=""/> et al., 2012).</p>
                          <p class="Body_Body-justify" lang="en-GB">Though not as visible as direct drivers, indirect or underlying causes can greatly influence direct drivers, and must be addressed to reduce pressures on forests (<span class="condensed_italic" lang="">high confidence</span>) (e.g., <a class="reference-link" href="#FAO--2016b">FAO, 2016b</a>; Fehlenberg <span class="condensed_italic" lang=""/> et al., 2017; Pendrill <span class="condensed_italic" lang=""/> et al., 2019b; Bos <span class="condensed_italic" lang=""/> et al., 2020; Junquera <span class="condensed_italic" lang=""/> et al., 2020; Ken <span class="condensed_italic" lang=""/> et al., 2020; <a class="reference-link" href="#Kissinger--2020">Kissinger, 2020</a>; Siqueira-Gay <span class="condensed_italic" lang=""/> et al., 2020; <a class="reference-link" href="#Hoang--2021">Hoang and Kanemoto, 2021</a>). Next to population growth, poverty and insecure land tenure (Ariti <span class="condensed_italic" lang=""/> et al., 2015; <a class="reference-link" href="#Arevalo--2016">Arevalo, 2016</a>; <a class="reference-link" href="#FAO--2016a">FAO, 2016a</a>; Ken <span class="condensed_italic" lang=""/> et al., 2020; Siqueira-Gay <span class="condensed_italic" lang=""/> et al., 2020; Verma <span class="condensed_italic" lang=""/> et al., 2021), many developing tropical countries identify weak forest sector governance and institutions, lack of cross-sectoral coordination, and illegal activity (related to weak enforcement) as critical underlying drivers (<a class="reference-link" href="#FAO--2016a">FAO, 2016a</a>; Ken <span class="condensed_italic" lang=""/> et al., 2020; <a class="reference-link" href="#Kissinger--2020">Kissinger, 2020</a>) [CCP7.6].</p>
                          <p class="Body_Body-justify" lang="en-GB">International and market forces, particularly commodity markets and, increasingly, large-scale land acquisitions are also key underlying drivers (<span class="condensed_italic" lang="">high confidence</span>) (Assun&#231;&#227;o <span class="condensed_italic" lang=""/> et al., 2015; Henders <span class="condensed_italic" lang=""/> et al., 2015; Conigliani <span class="condensed_italic" lang=""/> et al., 2018; Ingalls <span class="condensed_italic" lang=""/> et al., 2018; Garrett <span class="condensed_italic" lang=""/> et al., 2019; Pendrill <span class="condensed_italic" lang=""/> et al., 2019b; <a class="reference-link" href="#Kissinger--2020">Kissinger, 2020</a>; <a class="reference-link" href="#Neef--2020">Neef, 2020</a>; <a class="reference-link" href="#Hoang--2021">Hoang and Kanemoto, 2021</a>) [WGII Chapter 5.13]. Deforestation related to commodity imports is increasing, illustrating the growing influence of global markets in deforestation dynamics (Henders <span class="condensed_italic" lang=""/> et al., 2015). Although some of this production is consumed domestically, 29&#8211;39% of deforestation was driven by international trade, primarily from Europe, China, the Middle East and North America (Pendrill <span class="condensed_italic" lang=""/> et al., 2019a). While many developed countries, as well as China and India, have achieved net domestic forest gains, their consumption patterns have increased deforestation embodied in their imports to varying degrees, frequently from biodiversity hotspots (<a class="reference-link" href="#Hoang--2021">Hoang and Kanemoto, 2021</a>). Fifty percent of the biodiversity loss associated with consumption in developed economies occurs outside their territorial boundaries (Wilting <span class="condensed_italic" lang=""/> et al., 2017). The increasing prominence of medium- and large-scale clearings of forest between 2000 and 2012, particularly in Southeast Asia and South America, suggests the growing need for policy interventions targeting industrial-scale agricultural commodity producers (Austin <span class="condensed_italic" lang=""/> et al., 2017). However, countries have been slow to address underlying drivers such as international demand for agricultural commodities. A review of 43 countries&#8217; REDD+ readiness documents found that proposed policy interventions largely missed the agricultural drivers identified (Salvini <span class="condensed_italic" lang=""/> et al., 2014). An assessment of policy responses to rubber and coffee production highlights the challenges governments face in identifying correlations between the direct drivers and related underlying drivers, with international drivers being the most challenging to address (<a class="reference-link" href="#Kissinger--2020">Kissinger, 2020</a>).</p>
                        </div>
                      </div>
                    </div>
                    <div class="h1-container" id="CCP7.3">
                      <h1 class="Headings_H1-numbered" lang="en-GB">CCP7.3  Current and Projected Climate Change Impacts on Tropical Forests (Drought, Temperature, Extreme Events)<span class="share-block"><img class="share-icon" src="../../share.png"/></span><button class="btn-ipcc btn btn-primary chapter-expand">Expand section</button></h1>
                      <div class="h1-siblings" id="h1-4-siblings">
                        <p class="Body_Body-justify" lang="en-GB">While early dynamic global vegetation models predicted biome shifts and contractions of tropical forests, more recent efforts have focused on biome changes at more regional scales, or on functional aspects of tropical forests, such as plant physiological and phenological changes, drought-related mortality, population dynamics, interspecies interactions and community responses, ecohydrology, risk of fire and related impacts, soil nutrient and microbe&#8211;plant interactions. Climate change is expected to increase temperatures across the tropics, with attendant variability in rainfall, and more extreme events such as intense storms, droughts and wildfires (Zelazowski <span class="condensed_italic" lang=""/> et al., 2011; Malhi <span class="condensed_italic" lang=""/> et al., 2014; Brando <span class="condensed_italic" lang=""/> et al., 2019). This could be expected to have structural and functional impacts on tropical forest biomes (Malhi <span class="condensed_italic" lang=""/> et al., 2014; Adams <span class="condensed_italic" lang=""/> et al., 2017). This section looks at responses of tropical trees and forests to current and future climate-change related pressures, focusing on physiological responses including growth, mortality and regeneration, fire risk and ecological vulnerability, as well as on climate effects of tropical forest loss.</p>
                      </div>
                      <div class="h2-container" id="CCP7.3.1">
                        <h2 class="Headings_H2-numbered" lang="de-DE">CCP7.3.1 Tropical Tree Physiological Responses to Climate Change <span class="arrow-up"/><span class="arrow-down"/><span class="share-block"><img class="share-icon" src="../../share.png"/></span></h2>
                        <div class="h2-siblings" id="h2-4-siblings">
                          <p class="Body_Body-justify" lang="en-GB">With rising temperatures and atmospheric carbon dioxide, possibly accompanied by greater variability in soil moisture availability, a key question is how tropical forest trees respond physiologically (especially photosynthesis and respiration which determine net growth rates) and how well they can acclimate (i.e., able to adapt) to climate change (Dusenge <span class="condensed_italic" lang=""/> et al., 2019). Key climate factors influencing tree growth on pan-tropical forests are precipitation, solar radiation, temperature amplitude and relative soil moisture (Wagner <span class="condensed_italic" lang=""/> et al., 2014).</p>
                          <p class="Body_Body-justify" lang="en-GB">The temperature response of photosynthetic carbon uptake in tropical trees seems remarkably similar across moist and dry forest types, as well as for light-demanding, fast-growing species compared with shade-tolerant, slow-growing species (<a class="reference-link" href="#Slot--2017">Slot and Winter, 2017</a>). It is generally agreed that photosynthesis in tropical species can acclimate to moderate levels of warming but beyond this there would be no net gain in carbon (<a class="reference-link" href="#Slot--2017">Slot and Winter, 2017</a>). The factor that limits photosynthesis in different tropical forests will depend on water availability. In water-limited dry forests, photosynthesis may decline largely due to stomatal closure, while in wet forests the decline may largely be driven by warming-related changes to leaf biochemistry (<a class="reference-link" href="#Slot--2017">Slot and Winter, 2017</a>). A recent modelling approach suggests that the limits of photosynthetic thermal acclimation may be an increase of about 2&#176;C, in terms of maximum tolerated temperature, with enhanced tree mortality beyond this level of warming (<a class="reference-link" href="#Sterck--2016">Sterck et al., 2016</a>).</p>
                          <p class="Body_Body-justify" lang="en-GB">A critical concern for plant function has been that higher temperatures will enhance respiration rates, potentially resulting in tropical forests becoming net carbon sources (rather than photosynthesis-driven carbon sinks) (<a class="reference-link" href="#Gatti--2021">Gatti et al., 2021</a>). Some studies suggest that excessive respiration is less of a concern as respiration rates can acclimate to elevated temperatures over time (<a class="reference-link" href="#Lombardozzi--2015">Lombardozzi et al., 2015</a>; <a class="reference-link" href="#Pau--2018">Pau et al., 2018</a>). Thermal acclimation of respiration has been shown in a seasonally dry neotropical forest (<a class="reference-link" href="#Slot--2014">Slot et al., 2014</a>), while models indicate that increases in plant respiration could halve by the end of the 21st century through acclimation, thereby partly ameliorating the potential release of carbon from tropical forests (<a class="reference-link" href="#Vanderwel--2015">Vanderwel et al., 2015</a>). A contrary view is that plant physiological processes, such as the photosynthesis in tropical canopy trees, are already functioning at levels close to or beyond their thermal optimum limits and that any further temperature increase would turn them from a sink into a carbon source (<a class="reference-link" href="#Mau--2018">Mau et al., 2018</a>). One of the most pressing questions regarding forest responses to increasing atmospheric CO<span class="subscript _idGenCharOverride-1" lang="">2</span> levels is whether trees experience enhanced growth rates as a result of the so-called CO<span class="subscript _idGenCharOverride-1" lang="">2</span> fertilisation effect [Box 2.3 in IPCC 2019b]. Observed changes in the terrestrial carbon sink and process-based vegetation models indicate that tropical vegetation response to CO<span class="subscript _idGenCharOverride-1" lang="">2</span> fertilisation (<a class="reference-link" href="#Schimel--2015">Schimel et al., 2015</a>) is combined with other factors such as nitrogen deposition and length of the growing season, while aerosol-induced cooling may also have played a role in enhancing the carbon sink [Box 2.3 in IPCC 2019b]. Contrastingly, evidence for CO<span class="subscript _idGenCharOverride-1" lang="">2</span> fertilisation of growth in individual tropical tree species is generally lacking or controversial (<a class="reference-link" href="#Silva--2013">Silva and Anand, 2013</a>), or not as substantial as expected (<a class="reference-link" href="#Sampaio--2021">Sampaio et al., 2021</a>). It is, however, widely agreed that the intrinsic water-use efficiency of a tree, that is, the amount of carbon assimilated as biomass per unit of water used, increases under elevated atmospheric CO<span class="subscript _idGenCharOverride-1" lang="">2</span> levels owing to the regulation of stomata (cells on the leaf surface which regulate the exchange of water and gases between the plant and the atmosphere) (<a class="reference-link" href="#Van Der Sleen--2015">Van Der Sleen et al., 2015</a>; <a class="reference-link" href="#Bartlett--2016">Bartlett et al., 2016</a>; <a class="reference-link" href="#Rahman--2016">Rahman and Alam, 2016</a>; <a class="reference-link" href="#Keeling--2017">Keeling et al., 2017</a>). Tropical dry forests (ca. 1000 mm annual rainfall) exhibit changes in water-use efficiency (WUE), relative to CO<span class="subscript _idGenCharOverride-1" lang="">2</span>, at least twice as much as tropical moist forests (c. 4000 mm rainfall) (<a class="reference-link" href="#Adams--2019">Adams et al., 2019</a>).</p>
                          <p class="Body_Body-justify" lang="en-GB">Other key components in the forest system are plant&#8211;microbe&#8211;soil nutrient interactions, which play major roles in carbon cycling and plant photosynthetic response to increased atmospheric CO<span class="subscript _idGenCharOverride-1" lang="">2</span> and warming (Zhang <span class="condensed_italic" lang=""/> et al., 2014; <a class="reference-link" href="#Singh--2015">Singh and Singh, 2015</a>; Du <span class="condensed_italic" lang=""/> et al., 2019). Phosphorus is generally a limiting factor in tropical forest soils, though this may be species-specific (Ellsworth <span class="condensed_italic" lang=""/> et al., 2017; Turner <span class="condensed_italic" lang=""/> et al., 2018). Mycorrhizal fungi (both arbuscular and ectomycorrhizal) play major roles in water acquisition of host plant and their responses to drought in dry tropical forest (<a class="reference-link" href="#Lehto--2011">Lehto and Zwiazek, 2011</a>) as well as in the capture and transfer of nutrients, especially nitrogen (which may otherwise become limiting), to host plants. Climate change factors can thus be expected to alter the nature of soil&#8211;plant interactions with consequences for the species composition and biodiversity of tropical ecosystems (Pugnaire <span class="condensed_italic" lang=""/> et al., 2019; Terrer <span class="condensed_italic" lang=""/> et al., 2019)</p>
                        </div>
                      </div>
                      <div class="h2-container" id="CCP7.3.2">
                        <h2 class="Headings_H2-numbered" lang="de-DE">CCP7.3.2  Climate-Related Mortality and Regeneration in Tropical Forests <span class="arrow-up"/><span class="arrow-down"/><span class="share-block"><img class="share-icon" src="../../share.png"/></span></h2>
                        <div class="h2-siblings" id="h2-5-siblings">
                          <p class="Body_Body-justify" lang="en-GB">Drought-related mortality of tropical trees shows complex patterns which could change forest community structure and composition with cascading effects on biodiversity (McDowell <span class="condensed_italic" lang=""/> et al., 2020). During drought, the mortality rate is enhanced in larger-sized trees in tropical forests (as is the case with all forests globally), with significant impacts on forest structure, carbon storage and regional hydrology (Bennett <span class="condensed_italic" lang=""/> et al., 2015). The mortality rate of neotropical moist forest trees appears to be consistently increasing since the 1980s (McDowell <span class="condensed_italic" lang=""/> et al., 2020), with plant functional types such as softwood, pioneer and evergreen species suffering higher mortality during years of extreme drought (Aleixo <span class="condensed_italic" lang=""/> et al., 2019). Large trees (&gt;30 cm diameter at breast height (dbh)) in tropical dry forests have much lower mortality rates than those reported for tropical moist forests (Suresh <span class="condensed_italic" lang=""/> et al., 2010). Contrary to expectation, during prolonged droughts in these dry forests, deeper-rooted tree species are more <span class="condensed_italic" lang="">likely </span> to die than shallow-rooted ones, which are more adapted to changes in soil moisture content, because of water depletion in the deepest unsaturated zone (Chitra-Tarak <span class="condensed_italic" lang=""/> et al., 2018).</p>
                          <p class="Body_Body-justify" lang="en-GB">Regeneration of tropical tree seedlings and their response to a changing climate is inadequately understood. Experimental work suggests that tropical moist forest tree seedlings and saplings can acclimate photosynthetically to moderate levels of warming and, unlike adults, may even exhibit increased growth rates (<a class="reference-link" href="#Cheesman--2013">Cheesman and Winter, 2013</a>; <a class="reference-link" href="#Slot--2018">Slot and Winter, 2018</a>). Some moist forest seedlings also show plasticity to recurrent drought episodes by enhancing their growth rates when favourable moisture conditions return, while others fail to respond (O&#8217;Brien <span class="condensed_italic" lang=""/> et al., 2017). The nature of response also seems to be mediated by neighbourhood diversity, with greater plasticity in more diverse communities (O&#8217;Brien <span class="condensed_italic" lang=""/> et al., 2017). Seedlings in tropical dry forests subject to burning show enhanced growth rates post-fire and within two years attain similar height of seedlings in unburnt areas (Pulla <span class="condensed_italic" lang=""/> et al., 2015), though the environmental drivers of seedling growth post-fire are not well understood (Bhadouria <span class="condensed_italic" lang=""/> et al., 2017).</p>
                          <p class="Body_Body-justify" lang="en-GB">The net outcome of the population dynamics processes of growth, mortality and regeneration is change in species composition as a consequence of a changing climate. In the Amazon forests, dry habitat-affiliated genera have become more abundant among the newly recruited trees, while the mortality of moist habitat-affiliated genera has increased in places where the dry season has intensified most, thus driving a slow shift towards a drier forest type (Esquivel-Muelbert <span class="condensed_italic" lang=""/> et al., 2019). A similar multi-decadal shift in West-African forest species composition towards more dry-affiliated species as a response to long-term drying has been recorded (Aguirre-Guti&#233;rrez <span class="condensed_italic" lang=""/> et al., 2020). While upward shifts in the tree line and in the range of individual tree species have been recorded at several temperate mountain regions, evidence from the tropics is rare. A large-scale study from 200 plot inventories of &gt;2000 tree species across a ~3000 m elevation gradient in the Andean tropics and sub-tropics has shown that the relative abundances of tree species from lower, warmer locations were increasing at these sites indicating that &#8216;thermophilisation of vegetation&#8217; (increased domination of plant species from warmer locations) was indeed taking place as expected (Fadrique <span class="condensed_italic" lang=""/> et al., 2018) [Section 2.5.4.2.1 in Chapter 2].</p>
                          <div class="Figure" id="_idContainer035">
                            <p class="Body_Figures_Figure" lang="de-DE">
                              <img alt="" class="_idGenObjectAttribute-10" id="figure-ccp7-004" loading="lazy" src="https://ipcc.ch/report/ar6/wg2/downloads/figures/IPCC_AR6_WGII_Figure_CCP7_004.png"/>
                            </p>
                            <p class="Body_Figures_Figure_title" lang="en-US"><span class="figure_number" lang="">Figure CCP7.4  | </span><span class="bold_condensed-dark-blue" lang="">Documented instances of tree mortality in tropical moist forests due to fire (1992&#8211;2016) and drought (1982&#8211;2005). </span>These occurrences were associated with anomalies in precipitation and temperature over the study period. Adapted from Brando <span class="light_condensed_italic" lang=""/> et al. (2019).</p>
                            <div class="ch-figure-button-cont"><a href="/report/ar6/wg2/figures/chapter-ccp7/figure-ccp7-004" target="_blank"><button class="btn-ipcc btn btn-primary ch-figure-button">Open figure</button></a> </div>
                          </div>
                        </div>
                      </div>
                      <div class="h2-container" id="CCP7.3.3">
                        <h2 class="Headings_H2-numbered" lang="de-DE">CCP7.3.3  Fire Risks from Climate Change in Tropical Forests <span class="arrow-up"/><span class="arrow-down"/><span class="share-block"><img class="share-icon" src="../../share.png"/></span></h2>
                        <div class="h2-siblings" id="h2-6-siblings">
                          <p class="Body_Body-justify" lang="en-GB">Temperature rise and prolonged droughts increase the danger of fires in drained peatlands and tropical forests in Southeast Asia and the Amazon (da Silva <span class="condensed_italic" lang=""/> et al., 2018; Pan <span class="condensed_italic" lang=""/> et al., 2018; Sullivan Martin <span class="condensed_italic" lang=""/> et al., 2020), resulting in large carbon emissions, which reached 11.3 Tg CO<span class="subscript _idGenCharOverride-1" lang="">2</span> day <span class="superscript _idGenCharOverride-1" lang="">&#8722;1</span> during September&#8211;October 2015 (Huijnen <span class="condensed_italic" lang=""/> et al., 2016; Yin <span class="condensed_italic" lang=""/> et al., 2020) and changes in forest composition and biodiversity (Asner <span class="condensed_italic" lang=""/> et al., 2000; Hoffmann <span class="condensed_italic" lang=""/> et al., 2003) (<span class="condensed_italic" lang="">high confidence</span>). In many cases, tree mortality due to fire is poorly recorded in the literature, but the available data suggest that fire-induced mortality has increased in recent years (Figure CCP7.2) (Malhi <span class="condensed_italic" lang=""/> et al., 2014; Brando <span class="condensed_italic" lang=""/> et al., 2019) (<span class="condensed_italic" lang="">high confidence</span>). While large forest and peat fires used to be associated mainly with El Ni&#241;o-Southern Oscillation (ENSO) events, there is now evidence that tropical rainforests in Indonesia may experience higher fire danger from increased temperatures even during non-drought years due to high evaporation rates of fragmented forests (Fernandes <span class="condensed_italic" lang=""/> et al., 2017; McAlpine <span class="condensed_italic" lang=""/> et al., 2018). The droughts of 2007 and 2010 in the Amazonian region caused 12% and 5% of the southeastern Amazon forests to burn, respectively, as compared with &lt;1% of these forests burning during non-drought years (Brando <span class="condensed_italic" lang=""/> et al., 2014; da Silva J&#250;nior <span class="condensed_italic" lang=""/> et al., 2019; Pontes-Lopes <span class="condensed_italic" lang=""/> et al., 2021). Moreover, degraded forests in Ghana are more vulnerable to fires during droughts (Dwomoh <span class="condensed_italic" lang=""/> et al., 2019).</p>
                          <p class="Body_Body-justify" lang="en-GB">Factors other than solely climate also interact in enhancing the danger of tropical forest fires. For instance, the extent of burned area of rainforests in Borneo has shown that subsurface hydrology, (i.e., hydrological drought), interacts with meteorological drought and, hence, fires have become more intense in recent decades following the progressive desiccation of the island over the past century (Taufik <span class="condensed_italic" lang=""/> et al., 2017). Bornean forest fire risk also increased through the interaction of drought with land use conversion for logging, oil palm and tree plantations, and human settlements (Sloan <span class="condensed_italic" lang=""/> et al., 2017). Similarly, simulations of future fire risks in the Amazon show that extensive land use change under the RCP 8.5 scenario results in 4- to 28-fold enhanced area of forest burned by fire by 2080&#8211;2100, as compared with 1990&#8211;2010, whereas in an RCP 4.5 scenario, the area burned would be enhanced by 0.9- to 5.4-fold (Le Page <span class="condensed_italic" lang=""/> et al., 2017).</p>
                        </div>
                      </div>
                      <div class="h2-container" id="CCP7.3.4">
                        <h2 class="Headings_H2-numbered" lang="de-DE">CCP7.3.4 Current Climate Risks for Tropical Forests <span class="arrow-up"/><span class="arrow-down"/><span class="share-block"><img class="share-icon" src="../../share.png"/></span></h2>
                        <div class="h2-siblings" id="h2-7-siblings">
                          <p class="Body_Body-justify" lang="en-GB">Impacts of climate change on tropical forest cover seem to correlate with climatic zone. Natural selection of drought tolerant species is observed in tropical dry forests under a prolonged water deficit environment (<a class="reference-link" href="#Stan--2019">Stan and Sanchez-Azofeifa, 2019</a>). Tropical montane forests are highly sensitive to warming and associated changes in cloud cover and moisture, with evidence that such forests are already being impacted through &#8216;browning&#8217; (loss of biomass) from increased warming since the 1990s (Krishnaswamy <span class="condensed_italic" lang=""/> et al., 2014).</p>
                          <p class="Body_Body-justify" lang="en-GB">Besides higher temperatures, current climate risks also depend on regional responses to a variety of climate events. For example, tropical biomes across the three continents may respond differently to ENSO events in terms of carbon fluxes and balance. During the 2015&#8211;2016 ENSO event, different processes were dominant for the carbon fluxes anomaly in the tropical regions. In Asian forests, this anomaly was primarily derived from enhanced fire occurrence, in African forests through increased ecosystem respiration (from higher temperatures), and in South American forests by ecophysiological effects, through the gross primary production (GPP) expressed as reduced carbon uptake (Liu <span class="condensed_italic" lang=""/> et al., 2017; van Schaik <span class="condensed_italic" lang=""/> et al., 2018). It has also been shown that the probability of drought spells at the beginning and end of the rainy season is higher in the areas with the highest deforestation (Leite-Filho <span class="condensed_italic" lang=""/> et al., 2019). Furthermore, it has been observed that Amazon rainforest resilience is being lost faster in regions with less rainfall and in parts of the rainforest that are closer to human activity (<a class="reference-link" href="#IPCC--2014">IPCC, 2014</a>; Seiler <span class="condensed_italic" lang=""/> et al., 2015) (CCP7.3.6). Conversely, it has been pointed out, on the basis of vegetation indices, that temperature has a greater influence on resilience than does precipitation, and tropical forests are more resilient to climate change when they are more diverse (Feng <span class="condensed_italic" lang=""/> et al., 2021) (CCP7.3.6).</p>
                          <p class="Body_Body-justify" lang="en-GB">Biomes such as seasonally dry tropical forests subject to higher variability in rainfall or other climatic factors may be more resilient to fire and drought (Pulla <span class="condensed_italic" lang=""/> et al., 2015; Liu <span class="condensed_italic" lang=""/> et al., 2017), though there could be changes in species distributions as a result of disturbances (Allen <span class="condensed_italic" lang=""/> et al., 2017). A regime of long-term, high rainfall variability seems to be critical in determining the overall resilience of tropical forests and savannas to climate disturbances (Ciemer <span class="condensed_italic" lang=""/> et al., 2019), highlighting the heterogeneity of the tropical landscape to climate risk. Similarly, forest composition, nutrient limitations and biodiversity can influence forest resilience to disturbances. Recent evidence suggests that the degree of forest disturbance also affects the mechanisms through which biodiversity influences forest functioning (Schmitt <span class="condensed_italic" lang=""/> et al., 2020). Neotropical secondary forests also showed high resilience by maintaining their biomass through high productivity and rates of recovery following major disturbances (Poorter <span class="condensed_italic" lang=""/> et al., 2016). However, the possibility of tropical forests reaching &#8216;tipping points&#8217; in their resilience and experiencing rapid die-off cannot be ruled out (Verbesselt <span class="condensed_italic" lang=""/> et al., 2016).</p>
                        </div>
                      </div>
                      <div class="h2-container" id="CCP7.3.5">
                        <h2 class="Headings_H2-numbered" lang="de-DE">CCP7.3.5  Projected Impacts of Climate Change on Tropical Forest <span class="arrow-up"/><span class="arrow-down"/><span class="share-block"><img class="share-icon" src="../../share.png"/></span></h2>
                        <div class="h2-siblings" id="h2-8-siblings">
                          <p class="Body_Body-justify" lang="en-GB">Climate change projections indicate increased warming and changes in rainfall patterns in the tropical region as elsewhere globally (IPCC, 2021, AR6 WGI). These would have impacts on carbon stocks (<a class="reference-link" href="#Mitchard--2018">Mitchard, 2018</a>; Hubau <span class="condensed_italic" lang=""/> et al., 2020), water availability (Tamoffo <span class="condensed_italic" lang=""/> et al., 2019), and structure and diversity (Malhi <span class="condensed_italic" lang=""/> et al., 2014; McDowell <span class="condensed_italic" lang=""/> et al., 2020) in tropical forests, amplified by deforestation (CCP7.3.6).</p>
                          <p class="Body_Body-justify" lang="en-GB">Tropical forests are critical repositories of global carbon; living tropical trees are estimated to hold 200&#8211;300 Pg C or about one-third of the levels in the atmosphere (<a class="reference-link" href="#Mitchard--2018">Mitchard, 2018</a>). CMIP5 and CMIP6 Earth System Models (ESM) project an increasing future tropical carbon sink, which is particularly strong in the scenarios with more pronounced increases in atmospheric CO<span class="subscript _idGenCharOverride-1" lang="">2</span> concentration (Koch et al., 2021). However, major uncertainties regarding the ecophysiological processes governing carbon turnover and tree mortality under a changing climate (<a class="reference-link" href="#Hartmann--2015">Hartmann et al., 2015</a>; <a class="reference-link" href="#Pugh--2020">Pugh et al., 2020</a>), and the ecosystem-level responses of tropical forests to elevated atmospheric CO<span class="subscript _idGenCharOverride-1" lang="">2</span> (<a class="reference-link" href="#K&#246;rner--2009">K&#246;rner, 2009</a>) explain the contrast between observational data and modelling results (<a class="reference-link" href="#Rammig--2021">Rammig and Lapola, 2021</a>). Observational data show that structurally intact old-growth tropical forests have been net sinks of atmospheric carbon in recent decades, but there is evidence that the capacity of such intact tropical forests to build up carbon stock may be limited as biomass peaked during the 1990s and has since weakened by 30% in the Amazon since the 1990s (<span class="condensed_italic" lang="">high confidence</span>), mainly due to increased tree mortality and faster carbon turnover, and the African tropical forest sink following this trend since about 2010 (<a class="reference-link" href="#Hubau--2020">Hubau et al., 2020</a>; <a class="reference-link" href="#Gatti--2021">Gatti et al., 2021</a>). From a peak pan-tropical (Amazonia, Africa and Southeast Asia) forest sink of 1.26 Pg C yr <span class="superscript _idGenCharOverride-1" lang="">&#8722;1</span> during the 1990s, it is projected to decline to an uptake of only 0.29 Pg C yr <span class="superscript _idGenCharOverride-1" lang="">&#8722;1</span>, reaching zero in the Amazon, during the 2030s (<a class="reference-link" href="#Hubau--2020">Hubau et al., 2020</a>). This decline will possibly be driven by the reduced rates of forest carbon uptake from the weakening global CO<span class="subscript _idGenCharOverride-1" lang="">2</span> fertilisation effect mediated by limiting soil nutrient, and reduced water availability and higher temperatures during extreme droughts (<a class="reference-link" href="#Qie--2017">Qie et al., 2017</a>; <a class="reference-link" href="#Fleischer--2019">Fleischer et al., 2019</a>; <a class="reference-link" href="#Wang--2020">Wang et al., 2020</a>), reinforced by deforestation and forest degradation [IPCC SRCCL, 2019].</p>
                          <p class="Body_Body-justify" lang="en-GB">Offline (uncoupled) vegetation model simulations indicate that the extensive tropical and subtropical forests of the Americas could gradually transit towards a savanna-like vegetation, with the most pronounced shifts (of up to 600 km northward) from relatively stable forests to savanna-forest transitions occurring in the eastern Amazonian region (Huntingford <span class="condensed_italic" lang=""/> et al., 2013; Anadon <span class="condensed_italic" lang=""/> et al., 2014; Nobre <span class="condensed_italic" lang=""/> et al., 2016) depending largely on the yet uncertain strength of the CO<span class="subscript CharOverride-1" lang="">2</span> fertilisation effect and future dry season length, with important feedbacks on the flux of moisture from the forest to the atmosphere (Zemp <span class="condensed_italic" lang=""/> et al., 2017). More limited simulations for Central American rainforests under RCP 4.5 and 8.5 also support a transition in some areas to lower biomass tropical dry forest and savanna-like vegetation (Lyra <span class="condensed_italic" lang=""/> et al., 2017). Such transitions from one biome type to another will cause major changes in forest structure, species compositions and overall biodiversity. Additionally, the difficulty of species to migrate through highly fragmented tropical forested regions (such as West Africa or South and Southeast Asia) and &#8216;non-analogue climates&#8217;, under a climate change scenario, poses extra pressure on tropical biodiversity to adapt and survive (P&#246;rtner <span class="condensed_italic" lang=""/> et al., 2021). Even in expansive tracts of forests, such as in the Amazon, climate change is expected to become more important than deforestation by 2050 in causing the loss of tree species (Gomes <span class="condensed_italic" lang=""/> et al., 2019). Tropical mountain biodiversity hotspots (e.g., Andes, Himalayas) are particularly vulnerable to species loss due to elevation range shifts (Sekercioglu <span class="condensed_italic" lang=""/> et al., 2008). Under a 2&#176;C increase scenario, a substantial reduction of tropical montane cloud forest in Kenya is estimated (Los <span class="condensed_italic" lang=""/> et al., 2019).</p>
                        </div>
                      </div>
                      <div class="h2-container" id="CCP7.3.6">
                        <h2 class="Headings_H2-numbered" lang="de-DE">CCP7.3.6  Climate Responses to Tropical Deforestation and Links to Forest Resilience <span class="arrow-up"/><span class="arrow-down"/><span class="share-block"><img class="share-icon" src="../../share.png"/></span></h2>
                        <div class="h2-siblings" id="h2-9-siblings">
                          <p class="Body_Body-justify" lang="en-GB">Since AR5, there has been meaningful advancement in understanding the climate effects of deforestation and concomitant changes in forest ecosystem resilience. The IPCC Special Report on Climate Change and Land (Jia <span class="condensed_italic" lang=""/> et al., 2019) and IPCC AR6 WGI (Douville <span class="condensed_italic" lang=""/> et al., 2021) both describe significant climate-related changes resulting from tropical deforestation (<span class="condensed_italic" lang="">high confidence</span>).</p>
                          <p class="Body_Body-justify" lang="en-GB">Deforestation generally reduces rainfall and enhances temperatures and landscape dryness; effects that increase with the scale of forest loss, whereas reforestation and afforestation generally reverses these effects (<span class="condensed_italic" lang="">high confidence</span>) (<a class="reference-link" href="#Lawrence--2015">Lawrence and Vandecar, 2015</a>; <a class="reference-link" href="#Alkama--2016">Alkama and Cescatti, 2016</a>; Khanna <span class="condensed_italic" lang=""/> et al., 2017; Jia <span class="condensed_italic" lang=""/> et al., 2019; Staal <span class="condensed_italic" lang=""/> et al., 2020; Douville <span class="condensed_italic" lang=""/> et al., 2021; Hofmann <span class="condensed_italic" lang=""/> et al., 2021; Leite-Filho <span class="condensed_italic" lang=""/> et al., 2021). There is also <span class="condensed_italic" lang="">medium evidence</span> from observations and modelling that deforestation enhances surface runoff (Douville <span class="condensed_italic" lang=""/> et al., 2021). Whereas quantitative information is much more limited for other tropical regions, past deforestation in the Amazon has led to a small reduction in rainfall of &#8722;2.3% to &#8722;1.3%, shortening and delay of the wet season, and an estimated 4% increase in dryness (Leite-Filho <span class="condensed_italic" lang=""/> et al., 2020; Staal <span class="condensed_italic" lang=""/> et al., 2020; Douville <span class="condensed_italic" lang=""/> et al., 2021).</p>
                          <p class="Body_Body-justify" lang="en-GB">Modelling studies estimate that large-scale tropical deforestation will contribute to average warming of the deforested areas with +0.61 &#177; 0.48&#176;C and will lead to large changes in diurnal temperature ranges owing to a reduction of nocturnal cooling (<span class="condensed_italic" lang="">medium confidence</span>) (Jia <span class="condensed_italic" lang=""/> et al., 2019). Large-scale deforestation will also strongly decrease average regional precipitation and evapotranspiration and further delay the onset of the wet season, enhancing the chance of dry spells and intensifying dry seasons, but the magnitude of the decline depends on the scale and type of land-cover change (<span class="condensed_italic" lang="">high confidence</span>) (Zemp <span class="condensed_italic" lang=""/> et al., 2017; Jia <span class="condensed_italic" lang=""/> et al., 2019; Douville <span class="condensed_italic" lang=""/> et al., 2021; Gatti <span class="condensed_italic" lang=""/> et al., 2021).</p>
                          <p class="Body_Body-justify" lang="en-GB">Continued forest landscape drying and fragmentation in connection with deforestation may also enhance surface flow variability (Farinosi <span class="condensed_italic" lang=""/> et al., 2019; Souza <span class="condensed_italic" lang=""/> et al., 2019) and will aggravate the risk of forest dieback (Zemp <span class="condensed_italic" lang=""/> et al., 2017), elevate forest flammability (Alencar <span class="condensed_italic" lang=""/> et al., 2015) and increase fire incidence (<span class="condensed_italic" lang="">high confidence</span>) (Arag&#227;o <span class="condensed_italic" lang=""/> et al., 2018; Jia <span class="condensed_italic" lang=""/> et al., 2019; Silveira <span class="condensed_italic" lang=""/> et al., 2020; dos Reis <span class="condensed_italic" lang=""/> et al., 2021), ultimately leading to savannisation of many tropical rainforests (Sales <span class="condensed_italic" lang=""/> et al., 2020). However, compositional heterogeneity and diversity of forest assemblages increases resilience against climate-enhanced forest degradation (R&#233;jou-M&#233;chain <span class="condensed_italic" lang=""/> et al., 2021).</p>
                          <p class="Body_Body-justify" lang="en-GB">For the Amazon, deforestation (ca. 40% of the region) in combination with climate change will raise the prospect of passing a tipping point leading to large-scale savannisation of the rainforest biome, but uncertainty remains whether this will take place in the 21st century (Nobre <span class="condensed_italic" lang=""/> et al., 2016; Jia <span class="condensed_italic" lang=""/> et al., 2019; Douville <span class="condensed_italic" lang=""/> et al., 2021). However, considering that the Amazon has already lost ca. 20% of its forests (Nobre <span class="condensed_italic" lang=""/> et al., 2016), crossing the tipping point may not only create savannas of the deforested parts but may also result in precipitation reductions of 40% in non-deforested parts of the western Amazon due to a breakdown of the South American monsoonal circulation and the subsequent western cascade of precipitation and evapotranspiration (Boers <span class="condensed_italic" lang=""/> et al., 2017). Other effects of forest degradation include loss of ecosystem services, biodiversity, carbon storage and Indigenous culture (Watson <span class="condensed_italic" lang=""/> et al., 2018; Strassburg <span class="condensed_italic" lang=""/> et al., 2019; Gatti <span class="condensed_italic" lang=""/> et al., 2021), as well as potentially reduced hydropower capacity and agricultural production (Sumila <span class="condensed_italic" lang=""/> et al., 2017), and increases in tropical diseases (Husnina <span class="condensed_italic" lang=""/> et al., 2019).</p>
                          <p class="Body_Body-justify" lang="en-GB">The dearth of data for tropical forest regions other than the Amazon makes assessments of deforestation-related changes in temperature, precipitation and streamflow difficult (<span class="condensed_italic" lang="">high confidence</span>), and hampers estimates of tropical forest ecosystem health, biodiversity loss and vulnerability to current and future climatic and other pressures (<span class="condensed_italic" lang="">high confidence</span>). There is, hence, a strong need for increased investment in relevant data and research to narrow the knowledge gaps (Davison <span class="condensed_italic" lang=""/> et al., 2021). Nonetheless, conclusions based on a newly developed tropical vulnerability index synthesising remotely sensed land use and climate information indicate that forests in the Americas are already reaching critical levels to multiple stressors, while forests in Asia reveal vulnerability primarily to land-use change and African forests still show relative resilience to climate change (Saatchi <span class="condensed_italic" lang=""/> et al., 2021).</p>
                        </div>
                      </div>
                    </div>
                    <div class="h1-container" id="CCP7.4">
                      <h1 class="Headings_H1-numbered" lang="en-GB">CCP7.4  Social-Economical Vulnerabilities of Indigenous Peoples and Local Communities Living in Tropical Forests <span class="share-block"><img class="share-icon" src="../../share.png"/></span><button class="btn-ipcc btn btn-primary chapter-expand">Expand section</button></h1>
                      <div class="h1-siblings" id="h1-5-siblings">
                        <p class="Body_Body-justify" lang="en-GB">Around 800 million people live in or in the immediate vicinity of tropical forests (<a class="reference-link" href="#Keenan--2015">Keenan, 2015</a>). Short-term impacts of climate change on biodiversity will exacerbate the inequalities affecting those livelihoods which heavily rely on forests (P&#246;rtner <span class="condensed_italic" lang=""/> et al., 2021).</p>
                        <p class="Body_Body-justify" lang="en-GB">Livelihoods, gender, land-use change and dependency on forest resources for food, fuel, housing and other needs have been identified as key elements of vulnerability in Indigenous Peoples and rural communities in Africa and South America (<span class="condensed_italic" lang="">high confidence</span>) (<a class="reference-link" href="#Nkem--2013">Nkem et al., 2013</a>; <a class="reference-link" href="#Field--2014">Field et al., 2014</a>; <a class="reference-link" href="#Newton--2016">Newton et al., 2016</a>; <a class="reference-link" href="#Pearse--2017">Pearse, 2017</a>; <a class="reference-link" href="#IPBES--2018">IPBES, 2018</a>; <a class="reference-link" href="#P&#246;rtner--2021">P&#246;rtner et al., 2021</a>). Socioeconomic vulnerability varies depending on the level of dependency of forest food consumption (<a class="reference-link" href="#Rowland--2017">Rowland et al., 2017</a>), livelihood strategies and settlement patterns. In Cameroon (<a class="reference-link" href="#Nkem--2013">Nkem et al., 2013</a>), nomadic hunter-gatherers and sedentary communities showed differences in their vulnerability, driven by their preferences in forest settlement locations for farming, hunting, fishing, gathering, trapping and maintaining livestock.</p>
                        <p class="Body_Body-justify" lang="en-GB">Increasing temperatures, extreme climatic events, drought and fire will affect the proportion and frequency of forest resources availability. In communities of tropical America, Asia and Africa, social vulnerability factors identified include: deforestation pressures for agriculture expansion to cope with climate-induced food shortages, conflicts over access to forest land as a result of uncontrolled fire induced by higher drought frequency and severity, the availability of wild game, the work capacity, and the time consumed in work and gender-based differences (Blaser et al, 2011; <a class="reference-link" href="#Bele--2013">Bele et al., 2013</a>; <a class="reference-link" href="#IPCC--2014">IPCC, 2014</a>). Although the size and quality of harvest in crops and non-timber forest products (NTFPs) will be affected, the literature reports the use of NTFPs, hunting and fishing is less sensitive to climate change, and relevant for household incomes (<a class="reference-link" href="#Bele--2013">Bele et al., 2013</a>; <a class="reference-link" href="#Djoudi--2013">Djoudi et al., 2013</a>; <a class="reference-link" href="#Newton--2016">Newton et al., 2016</a>; <a class="reference-link" href="#Onyekuru--2016">Onyekuru and Marchant, 2016</a>). Data from tropical forests document the contribution of NTFPs to local livelihoods (Issaka, 2018), with well-established NTFPs such as Brazil nut (<span class="condensed_italic" lang="">Bertholletia excelsa</span>), rattan (<span class="condensed_italic" lang="">Calamus</span> and <span class="condensed_italic" lang="">Daemonorops</span> species), rubber (<span class="condensed_italic" lang="">Hevea</span> species) and a&#231;ai (<span class="condensed_italic" lang="">Euterpe oleracea</span>) showing promise for sustainable harvesting strategies which could reduce socioeconomic vulnerability (<a class="reference-link" href="#Blaser--2021">Blaser et al., 2021</a>).</p>
