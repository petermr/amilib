                          <p class="Body_Box_blue_Box_body" lang="en-GB"><a class="reference-link" href="#IFAD--2016">IFAD (2016)</a>  estimated that there are 640 million people living below the poverty line in rural areas of 43 tropical countries. Poor communities rely on ecosystem services for their subsistence livelihoods, and often they have limited capacity to adapt to change, making them more vulnerable to climate change and other forms of changes (Bhatta, 2015). Managing forests sustainably benefits both urban and rural communities, including provision of food and fibre, and on watershed hydrology and agroforestry production, among others (Powell <span class="condensed_italic" lang=""/> et al., 2013; Dawson <span class="condensed_italic" lang=""/> et al., 2014; <a class="reference-link" href="#Clark--2013">Clark and Nicholas, 2013</a>, Mbow <span class="condensed_italic" lang=""/> et al., 2014) (Table Box CCP7.2.1).</p>
                          <p class="Body_Box_blue_Box_Table_title" lang="en-US"><span class="table_number" lang="">Table Box CCP7.2.1  | </span>Examples from sustainable tropical forest management (STFM) in achieving SDGs.</p>
                          <table class="Table _idGenTablePara-1" id="table006">
                            <colgroup>
                              <col class="_idGenTableRowColumn-21"/>
                              <col class="_idGenTableRowColumn-48"/>
                              <col class="_idGenTableRowColumn-49"/>
                              <col class="_idGenTableRowColumn-50"/>
                            </colgroup>
                            <thead>
                              <tr class="Table _idGenTableRowColumn-9">
                                <td class="Table Head-blue Head-blue">
                                  <p class="Body_Tables_Table_header-black" lang="en-US">SDGs</p>
                                </td>
                                <td class="Table Head-blue Head-blue">
                                  <p class="Body_Tables_Table_header-black" lang="en-US">Contribution of STFM to the goals</p>
                                </td>
                                <td class="Table Head-blue Head-blue">
                                  <p class="Body_Tables_Table_header-black" lang="en-US">Adaptation interventions</p>
                                </td>
                                <td class="Table Head-blue Head-blue">
                                  <p class="Body_Tables_Table_header-black" lang="en-US">Supporting references</p>
                                </td>
                              </tr>
                            </thead>
                            <tbody>
                              <tr class="Table _idGenTableRowColumn-41">
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">1 No poverty</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Area of forest land with legal property status held by communities</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">In Mexico, community forest management (CFM) has played a pivotal role in forest cover and biodiversity conservation in the region where timber production and processing generate income and thereby offers a way out of poverty for families in communities with rights to forests.</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">(Ellis <span class="condensed_italic" lang=""/> et al., 2015)</p>
                                </td>
                              </tr>
                              <tr class="Table _idGenTableRowColumn-17">
                                <td class="Table Body Body"/>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Improve incomes through selling forest products or by generating employment for the poorest</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Non-timber forest products (NTFPs) are a significant source for socioeconomic, employment and income generation, particularly for tribal people.</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">(<a class="reference-link" href="#Kumar--2015">Kumar, 2015</a>)</p>
                                </td>
                              </tr>
                              <tr class="Table _idGenTableRowColumn-19">
                                <td class="Table Body Body"/>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Improve income through valuation of ecosystem services</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">In Cambodia, contribution of forest resources should be integrated into payment for ecosystem services schemes, to provide more diversified income streams, insulating Indigenous People from shocks and stressors.</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">(Nhem, 2018)</p>
                                </td>
                              </tr>
                              <tr class="Table _idGenTableRowColumn-51">
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">2 Zero hunger</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Forests also provide food, which improves food security and nutrition</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">In Cameroon, forest fruits provide important macro- and micronutrients lacking from the family diets of rural people. Association between tree cover and the dietary diversity of children in the communities of 21 countries across Africa.</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">(Fungo <span class="condensed_italic" lang=""/> et al., 2015; Ickowitz <span class="condensed_italic" lang=""/> et al., 2014)</p>
                                </td>
                              </tr>
                              <tr class="Table _idGenTableRowColumn-46">
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">3 Good health and well-being</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Medicinal plants contribute to emotional and spiritual well-being</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Medicinal plants and the associated Bhutanese traditional medicine are protected by the country&#8217;s constitution and receive both government support and acceptance by the wider public. These medicinal plants have been one of the drivers of the &#8216;gross national happiness&#8217; and biodiscovery projects in Bhutan.</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">(<a class="reference-link" href="#Wangchuk--2015">Wangchuk and Tobgay, 2015</a>)</p>
                                </td>
                              </tr>
                              <tr class="Table _idGenTableRowColumn-52">
                                <td class="Table Body Body"/>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Health co-benefits of preserving biodiversity</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">In the Brazilian Amazon, interventions targeted specifically at preserving biodiversity in protected areas generate health co-benefits. From the perspectives of malaria, acute respiratory infection and diarrhoea, results suggest that the public health benefits of strict partnership agreements may offset some of their local costs. Nature is doing its part by providing a form of (human) capital for the rural poor and the politically voiceless.</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">(Bauch <span class="condensed_italic" lang=""/> et al., 2015)</p>
                                </td>
                              </tr>
                              <tr class="Table _idGenTableRowColumn-19">
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">4 Quality education</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Inclusive education that builds and reinforces positive attitudes to forest</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Encouraging and enabling pro-forest behaviour as well as strengthening education systems that respect, nurture and enable Indigenous Knowledge and Local Knowledge.</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">(Kanowski, 2019; Teng&#246;, 2017; Vaidyanathan, 2014)</p>
                                </td>
                              </tr>
                              <tr class="Table _idGenTableRowColumn-52">
                                <td class="Table Body Body"/>
                                <td class="Table Body Body"/>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">The value of social capital for maintaining sustainability of community forest management includes, among others, individual characteristics, procedural knowledge and access to information. Initiatives to manage natural resources are <span class="condensed_italic" lang="">likely </span> to be more successful if the forest management program initiators consider several factors that influence the capacity development of resource users.</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">(Lee, 2017)</p>
                                </td>
                              </tr>
                              <tr class="Table _idGenTableRowColumn-53">
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">5 Gender equality</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Within genders, other characteristics such as class, race, caste, culture, wealth, age and ethnicity influence responses and affect the impact of climate variability and change on livelihoods</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Despite challenges, Nepal&#8217;s community forestry policy is considered one of the most progressive, as it allows women to exercise equal rights with men in the management and utilisation of community forests. Furthermore, women-only forestry groups have registered many success stories.</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">(Lama <span class="condensed_italic" lang=""/> et al., 2017; <a class="reference-link" href="#Agarwal--2015">Agarwal, 2015</a>)</p>
                                </td>
                              </tr>
                              <tr class="Table _idGenTableRowColumn-47">
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">6 Clean water and sanitation</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Regulate water supply, water quality and water purification</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Evidence from the Hindu Kush Himalayas require improved upstream&#8211;downstream integration, transboundary cooperation and greater coordination of implementation of different SDGs. Greater efforts are required to make the communities struggling on the frontline of sustainable forest management more climate resilient.</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">(Scott C.A., 2019; Amezaga, 2019)</p>
                                </td>
                              </tr>
                              <tr class="Table _idGenTableRowColumn-41">
                                <td class="Table Body Body"/>
                                <td class="Table Body Body"/>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Forest concessions can make a positive contribution to this by minimising the negative impacts of harvesting operations on water access and by employing appropriate restoration techniques as required by the concession contract and national legislation.</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">(Bruggeman <span class="condensed_italic" lang=""/> et al., 2015)</p>
                                </td>
                              </tr>
                              <tr class="Table _idGenTableRowColumn-51">
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">7 Affordable and clean energy</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Energy transitions</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Decreased reliance on traditional wood fuels and increased use of forest-derived modern fuels (e.g., biofuel) are generally synergistic with achieving other SDGs, such as livelihoods strategies. However, modern wood fuels need improved stoves to ensure the energy is clean.</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">(Jagger, 2019; Simangunsong <span class="condensed_italic" lang=""/> et al., 2017)</p>
                                </td>
                              </tr>
                              <tr class="Table _idGenTableRowColumn-41">
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">8 Decent work and economic growth</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Stimulating economic growth and minimising forest loss</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Synergy potentials exist where growth strategies and associated policies target the forest section with NTFPs from natural forests, ecotourism and payments for environmental services.</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">(Stoian, 2019)</p>
                                </td>
                              </tr>
                              <tr class="Table _idGenTableRowColumn-47">
                                <td class="Table Body Body"/>
                                <td class="Table Body Body"/>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Community forestry enterprises have the potential to make significant contributions by providing a solid institutional framework to efficiently translate SDGs into actions. It also improves forest management, social cohesion and rural incomes among local communities in developing countries.</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">(Aryal, 2020; <a class="reference-link" href="#V&#225;zquez-Maguirre--2020">V&#225;zquez-Maguirre, 2020</a>; Baynes, 2015)</p>
                                </td>
                              </tr>
                              <tr class="Table _idGenTableRowColumn-53">
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">9 Industry innovation and infrastructure</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Integration of small-scale business into value chains and markets</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Strategies in relation to sustainable supply chains and tropical forest protection, i.e., Unilever and Instituto Centro de Vida (ICV), demonstrate both alignment and variability between and within organisations. Associated incentives could help balance the burden of responsibility for implementation between global and local actors of promoting zero deforestation.</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">(Delabre <span class="condensed_italic" lang=""/> et al., 2020)</p>
                                </td>
                              </tr>
                              <tr class="Table _idGenTableRowColumn-32">
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">10 Reduced inequalities</p>
                                </td>
                                <td class="Table Body Body CellOverride-16">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Reduction in the number of poor households</p>
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Protect the workers and communities long-term and economic well-being</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Results from Waseda&#8211;Bridgestone Initiative for Development of Global Environment (W-BRIDGE Initiative) in South Kalimantan province through capacity building delivered by academic partners. This initiative also increased land area ownership from 0.28 to 1.23 ha per household.</p>
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Rural agrarian communities in low-latitude tropical forests (e.g., communities in Southeast Asia, South America, Central Africa) adapting to chronically hotter temperatures in common ways, such as adjusting when and how they work. Decision makers should develop an understanding of these behavioural adaptations that are already being adopted before establishing broader adaptation strategies.</p>
                                </td>
                                <td class="Table Body Body CellOverride-16">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">(Hiratsuka, 2019)</p>
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">(Masuda, 2019)</p>
                                </td>
                              </tr>
                              <tr class="Table _idGenTableRowColumn-41">
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">11 Sustainable cities and communities</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Upstream forests influence water supplies to cities</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Watershed condition is associated with measurable health outcomes downstream. Maintaining natural capitals within watersheds is an important public health investment especially for populations with low levels of built capital.</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">(Herrera <span class="condensed_italic" lang=""/> et al., 2017)</p>
                                </td>
                              </tr>
                              <tr class="Table _idGenTableRowColumn-51">
                                <td class="Table Body Body"/>
                                <td class="Table Body Body"/>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Evidence from the Marikina Watershed Integrated Resources Development Alliance in the Philippines working together with all stakeholders to restore Marikina Watershed to reduce disaster risk and urban resilience.</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">(Devisscher, 2019)</p>
                                </td>
                              </tr>
                              <tr class="Table _idGenTableRowColumn-41">
                                <td class="Table Body Body"/>
                                <td class="Table Body Body"/>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Synergies delivered through sound urban forestry approaches could benefit not only urban dwellers but also forest communities. Community groups have also taken responsibility for urban forestry in the absence of strong government commitment.</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">(<a class="reference-link" href="#Konijnendijk--2018">Konijnendijk, 2018</a>)</p>
                                </td>
                              </tr>
                              <tr class="Table _idGenTableRowColumn-47">
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">12 Responsible consumption and production)</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Generates materials for sustainable consumption</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Forest concessionaires can also increase the repurposing of waste to improve sustainable consumption. For instance, the logging company Congolaise Industrielle des Bois produces electricity from sawmill wood waste.</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">(Tegegne <span class="condensed_italic" lang=""/> et al., 2019)</p>
                                </td>
                              </tr>
                              <tr class="Table _idGenTableRowColumn-19">
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">13 Climate action</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Enhance resilience and adaptive capacities to climate change through forest management</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Mixed agroforestry systems offer opportunities to simultaneously meet the water, food, energy and income needs of densely populated rural and peri-urban areas in Indonesia.</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">(van Noordwijk <span class="condensed_italic" lang=""/> et al., 2016)</p>
                                </td>
                              </tr>
                              <tr class="Table _idGenTableRowColumn-17">
                                <td class="Table Body Body"/>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Carbon-based conservation</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Payment for carbon-based conservation (eg., REDD+, Green Climate Fund) protecting peatlands from avoidable human impacts for favourable return from carbon conservation investments.</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">(Roucoux <span class="condensed_italic" lang=""/> et al., 2017)</p>
                                </td>
                              </tr>
                              <tr class="Table _idGenTableRowColumn-46">
                                <td class="Table Body Body"/>
                                <td class="Table Body Body"/>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">REDD+ has mixed impacts on communities&#8217; socio-ecological resilience. On one hand, increases in network ties and participation in decision making would enhance potential for local adaptability. However, restrictions on local forest practices could limit communities&#8217; ability to manage uncertainty.</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">(Hajjar, 2021)</p>
                                </td>
                              </tr>
                              <tr class="Table _idGenTableRowColumn-31">
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">14 Life below water)</p>
                                </td>
                                <td class="Table Body Body CellOverride-16">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Support numerous ecosystem services</p>
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Protection for aquatic macroinvertebrates habitats</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Complex root systems serve as shelter as they protect juvenile fish from predators and provide food and nutrients for fish.</p>
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Mangroves contribute to fisheries production and have become one of the higher carbon stocks compared with other forests. The mangroves system of the Zambezi River Delta, Mozambique confirms the consistency of substantial C stocks typical of mangroves across a relatively large and hydrologically diverse area.</p>
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">The riparian canopy of the tropical forest is significantly able to maintain in-stream temperature that is important to aquatic macroinvertebrates. The study of Gunung Tebu, Malaysia showed high diversity and abundance of steams invertebrates as the natural habitats are minimally impacted.</p>
                                </td>
                                <td class="Table Body Body CellOverride-16">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">(Friess, 2019)</p>
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">(Stringer, 2015)</p>
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">(Md rai, 2014)</p>
                                </td>
                              </tr>
                              <tr class="Table _idGenTableRowColumn-19">
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">15 Life on land)</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Community monitoring of their own forests or forest within communal jurisdiction, sustainable certification</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Mainstreaming SFM in vast tracts of forest, thereby increasing the share of forest area under a forest management plan, including the proportion of forest area certified under independent forest certification schemes.</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">(<a class="reference-link" href="#van Hensbergen--2016">van Hensbergen, 2016</a>)</p>
                                </td>
                              </tr>
                              <tr class="Table _idGenTableRowColumn-47">
                                <td class="Table Body Body"/>
                                <td class="Table Body Body"/>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Even with tension between the management of resources for local goals and the need for public good values, still there are some communities that maintain strong control over their lands and resources in achieving desirable conservation outcomes and willing to see large tracts of land set aside, i.e., areas held to be sacred.</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">(Sayer <span class="condensed_italic" lang=""/> et al., 2015; Sheil, 2015)</p>
                                </td>
                              </tr>
                              <tr class="Table _idGenTableRowColumn-46">
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">16 Peace, justice and strong institutions</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Addressing complexity of implementing conservation policy</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Target 16.7 calls for responsive, inclusive participatory and representative decision making at all levels. Decentralisation in forest governance observed through community-based/collaborative forest management depends on the strength of underlying land tenure and use rights, as well as capacity to benefit from those rights.</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">(Baynes, 2015; McDermott, 2019; Myers, 2017; Nunan, 2018)</p>
                                </td>
                              </tr>
                              <tr class="Table _idGenTableRowColumn-47">
                                <td class="Table Body Body"/>
                                <td class="Table Body Body"/>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">By 2021, Thailand plans to increase use of renewable and alternative energy by 25% including energy crops. Adequate forest protection is critical, as increasing demand for energy crops may drive demand for expanding agricultural production into public forests, benefitting some SDGs and threatening others.</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">(Phumee, 2018)</p>
                                </td>
                              </tr>
                              <tr class="Table _idGenTableRowColumn-54">
                                <td class="Table Body Body"/>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Modern technologies in forest management control</p>
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Governance laws and policies provide access to justice for all</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Technologies including remote sensing and geographic information systems (GIS) are interrelated as they support management actions in global forest resources management thus reducing exploitation through monitoring and evaluation activities.</p>
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">The Forest Stewardship Council (FSC) and the Program for the Endorsement of Forest Certification (PEFC) significantly contribute to ensuring the legality of the timber supply chain. The (<a class="reference-link" href="#FAO--2018b">FAO, 2018b</a>) considers the proportion of forest with secure tenure rights for forest dependent people and the local community in ensuring equal rights to economic resources for all.</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">(Beckline, 2017)</p>
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">(Gabay, 2019)</p>
                                </td>
                              </tr>
                              <tr class="Table _idGenTableRowColumn-17">
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">17 Partnership for the goals</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Co-benefits derived from tropical forest conservation</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Raising awareness of the interconnectedness of tropical forests and the SDGs through multi-disciplinary collaboration will support more informed decisions of social, cultural, economic and policy interest.</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">(Swamy, 2018; Bukoski <span class="condensed_italic" lang=""/> et al., 2018)</p>
                                </td>
                              </tr>
                              <tr class="Table _idGenTableRowColumn-36">
                                <td class="Table Body Body"/>
                                <td class="Table Body Body CellOverride-16">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Voluntary partnership agreements (VPAs) stabilise and reproduce the forest governance regime</p>
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Central bureaucracies promote forest benefits: countering conservation</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">In Ghana, the adoption of the VPA resulted in an improved the timber legality assurance system (TLAS), strengthened social responsibility agreements (SRA) enforcement, updated forest management plans, artisanal milling strategies and technical transparent timber dights allocations.</p>
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Forest management units (FMUs) could be utilised to support conservation-oriented regimes with worldwide interests as well as domestic production-oriented regimes. For example, FMUs might potentially link up with global and domestic timber certification regimes under the Multistakeholder Forestry Programme (MFP3) initiative.</p>
                                  <div class="_idGenObjectLayout-2">
                                    <div class="Box_Header-continued" id="_idContainer044">
                                      <p class="Body_Box_blue_Box_continued-subhead" lang="en-GB">Box CCP7.2</p>
                                    </div>
                                  </div>
                                </td>
                                <td class="Table Body Body CellOverride-16">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">(Hansen, 2018)</p>
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">(Sahide, 2016)</p>
                                </td>
                              </tr>
                            </tbody>
                          </table>
                        </div>
                      </div>
                    </div>
                    <div class="h1-container" id="frequently-asked-questions">
                      <h1 class="Body_Box_FAQ_FAQ-Box_head" lang="en-US">Frequently Asked Questions <span class="share-block"><img class="share-icon" src="../../share.png"/></span><button class="btn-ipcc btn btn-primary chapter-expand">Expand section</button></h1>
                      <div class="h1-siblings" id="h1-9-siblings"/>
                      <div class="h2-container" id="FAQ">
                        <h2 class="Body_Box_FAQ_FAQ-Box_subhead" lang="en-GB">FAQ CCP7.1  | How is climate change affecting tropical forests and what can we do to protect and increase their resilience?<span class="arrow-up"/><span class="arrow-down"/><span class="share-block"><img class="share-icon" src="../../share.png"/></span></h2>
                        <div class="h2-siblings" id="h2-16-siblings">
                          <p class="Body_Box_FAQ_FAQ-Box_body" lang="en-US">
                            <span class="condensed_italic" lang="">Global warming, droughts, extreme rainfalls and sea level rise cause significant impacts on tropical forests. </span>
                          </p>
                          <p class="Body_Box_FAQ_FAQ-Box_body" lang="en-US">In addition to climate change, tropical forests are experiencing non-climatic stressors. Conversion of forest into large-scale agriculture land and exploitation of timber and non-timber forest products are increasing pressure and amplifying the impacts of climate change on the remaining areas of tropical forests. These include biodiversity decline, increases of fires, large-scale ecosystem transformation (e.g., into savannah in southeastern Amazon) and increasing carbon emissions due to deforestation, forest conversion and forest degradation. Further, loss of forest resources leads to the decline of livelihoods of Indigenous Peoples and local communities. All nations need to collaborate to implement collective actions to protect tropical forests.</p>
                          <p class="Body_Box_FAQ_FAQ-Box_body" lang="en-US">Tropical forests are essentially important for the health of planet Earth. Tropical forests in Asia, Africa and South America regulate carbon, water and chemical cycles, which maintain a healthy climate and nutrient cycles for supporting life. Tropical forests are home to two-thirds of our world&#8217;s biodiversity, although they cover only about 13% of the land on Earth, but it is not known exactly how many millions of living creatures, such as microorganisms, insects, amphibians, snakes, fish, birds, mammals and primates, live in tropical forests.</p>
                          <p class="Body_Box_FAQ_FAQ-Box_body" lang="en-US">Approximately 1.3 billion people directly depend upon tropical forest resources to survive. Others are indirectly dependent upon the health and provisioning of ecosystem services and goods from tropical forests. The forests provide many kinds of economic products, such as timber, medicines and food, and recreational services, such as nature trekking, bird and wildlife watching, to mention a few. Indigenous People and other forest-dependent communities have shown extraordinary knowledge on how to manage forest resources to meet their subsistence needs without causing forest degradation. This forest culture and wisdom are broken when the rate of forest extraction changes into unplanned and unsustainable large-scale transformation.</p>
                          <p class="Body_Box_FAQ_FAQ-Box_body" lang="en-US">Deforestation and land-use changes in tropical forests cause not only physical and biological changes on flora and fauna, but also rapid changes in cultures harming forest peoples. A degraded tropical forest is prone and more vulnerable to climate change. An increase in temperature in lowlands creates an unfavourable condition for optimum growths of many kinds of plant species which also affects several agricultural plants. Coffee farmers, for example, are forced to open new forest frontiers in highland areas to meet an optimum temperature for the growth of coffee.</p>
                          <p class="Body_Box_FAQ_FAQ-Box_body" lang="en-US">The onset and duration of dry and rainy seasons also changes. A prolonged wet season has excessive rains which cause flash floods and substantially disturbs the fruiting cycle of many plant species. Due to high rainfall and high humidity, most flowers of forest trees fail to mature, and hence essentially deplete fruit production. Most trees in tropical forests require a short period of a dry season to have a mass fruiting season. On the other hand, a prolonged dry season causes soils to dry in deeper layers, higher atmospheric demand for water vapour and enhanced forest fires. In the tropical humid forests, the majority of forest fires are anthropogenic. In Southeast Asia, peat fires cause large carbon emissions and haze pollution which harms locals and people in neighbouring countries. The impact on tropical forest comes also from the sea level rise which is due to changes in salinity and sedimentation rates, and the expansion of inundated areas leads to the decline of mangrove productivity.</p>
                          <p class="Body_Box_FAQ_FAQ-Box_body" lang="en-US">Projected impacts of climate change on the tropical forest might be detrimental to safeguards of local communities and a significant number of flora and fauna in the tropics. In southeastern Amazon, reduction in precipitation, due to changes in the climate pattern, associated with intense deforestation and land cover change are leading to reduction of productivity in the remaining forest areas, and might lead to a large-scale change in the forest structure which can become a savannah. In Southeast Asia, in particular in Indonesia and Malaysia, prolonged dry seasons associated with the El Ni&#241;o phenomenon cause extensive peat fires, releasing large amounts of carbon dioxide and creating various health problems related to haze pollution. Furthermore, climate change interacts with deforestation for agriculture (crops, livestock and plantation forestry), logging, mining or infrastructure development, exacerbating temperature and rainfall changes resulting in more degradation.</p>
                          <p class="Body_Box_FAQ_FAQ-Box_body" lang="en-US">Climate change, together with forest fragmentation and deforestation, also harms wildlife. For example, the orangutan, an endemic species to tropical peat forests in Kalimantan and Sumatra, is classified as critically endangered. Many other endemic and unknown species of flora in tropical forests are in the same condition and could experience a mass extinction at a more rapid rate than the previous five mass extinctions on Earth. About 1.3 million Indigenous Peoples depending on the natural resources of the tropical forest would suffer from cultural disruption and livelihood change due to forest loss.</p>
                          <p class="Body_Box_FAQ_FAQ-Box_body" lang="en-US">To protect tropical forests a collective action of all nations is needed. It requires a global effort to stop deforestation and the conversion of tropical forests. The role of Indigenous Peoples and local communities as forest keepers must be strengthened. Economic incentives for protecting tropical forests, among other strategies, could facilitate collective actions towards a sustainable management of tropical forests. Sustainable, effective and just strategies to increase the resilience of tropical forests need to consider the complex political, social and economic dynamics involved, including the goals, identity and livelihood priorities of Indigenous Peoples and local communities beyond natural resource management. Strategies can benefit from integrating knowledge and know-how from traditional cultures, fostering transitions towards more sustainable systems.</p>
                          <div class="_idGenObjectLayout-2">

                            <p class="Body_Footnotes" lang="en-US"><a class="_idFootnoteAnchor _idGenColorInherit" href="ccp7.html#footnote-001-backlink">1</a> In this Report, the following summary terms are used to describe the available evidence: limited, medium, or robust; and for the degree of agreement: low, medium, or high. A level of confidence is expressed using five qualifiers: very low, low, medium, high, and very high, and typeset in italics, e.g., <span class="light_condensed_italic" lang="">medium confidence</span>. For a given evidence and agreement statement, different confidence levels can be assigned, but increasing levels of evidence and degrees of agreement are correlated with increasing confidence.</p>
