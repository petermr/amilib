                      <div id="chapter-citation">
                        <p class="Headings_Chapter_citation" lang="en-GB">This cross-chapter paper should be cited as:</p>
                        <p class="Body_Chapter_citation" lang="en-GB">Glavovic, B.C., R. Dawson, W. Chow, M. Garschagen, M. Haasnoot, C. Singh, and A. Thomas, 2022: Cross-Chapter Paper 2: Cities and Settlements by the Sea. In: <span class="light_condensed_italic" lang="">Climate Change 2022: Impacts, Adaptation and Vulnerability. </span>Contribution of Working Group II to the Sixth Assessment Report of the Intergovernmental Panel on Climate Change [H.-O. P&#246;rtner, D.C. Roberts, M. Tignor, E.S. Poloczanska, K. Mintenbeck, A. Alegr&#237;a, M. Craig, S. Langsdorf, S. L&#246;schke, V. M&#246;ller, A. Okem, B. Rama (eds.)]. Cambridge University Press, Cambridge, UK and New York, NY, USA, pp. 2163&#8211;2194, doi:10.1017/9781009325844.019.</p>
                      </div>
                    </div>
                    <div class="h1-container" id="Executive">
                      <h1 class="Headings_H1-unnumbered" lang="en-GB">Executive Summary <span class="share-block"><img class="share-icon" src="../../share.png"/></span><button class="btn-ipcc btn btn-primary chapter-expand">Expand section</button></h1>
                      <div class="h1-siblings" id="h1-1-siblings">
                        <div class="h4-container" id="Cities">
                          <h4 class="Headings_H4-unnumbered" lang="de-DE">
                            <span class="bold_condensed" lang="en-GB">Cities and settlements (C&amp;S) by the sea are on the frontline of climate change&#8212;they face climate-compounded risks that are amongst the highest, but are a key source of innovation in climate resilient development (</span>
                            <span class="bold_condensed_italic" lang="">high confidence</span>
                            <span class="superscript _idGenCharOverride-1" lang="">
                              <span id="footnote-002-backlink"><a class="_idFootnoteLink _idGenColorInherit" href="ccp2.html#footnote-002">1</a> </span>
                            </span>
                            <span class="bold_condensed" lang="en-GB">) <!-- -->{Sections 6.1, 6.2; Chapter 7; Box 15.2; Cross-Chapter Box COVID in Chapter 7; Cross-Chapter Box SLR in Chapter 3; CCP2.2; SMCCP2.1}<!-- -->. </span>
                            <span class="arrow-up"/>
                            <span class="arrow-down"/>
                            <span class="share-block">
                              <img class="share-icon" src="../../share.png"/>
                            </span>
                          </h4>
                          <div class="h4-siblings" id="h4-1-siblings">
                            <p class="Body_Body-justify" lang="en-GB">Much of the world&#8217;s population, economic activities and critical infrastructure are concentrated near the sea (<span class="condensed_italic" lang="">high confidence</span>), with nearly 11% of the global population, or 896 million people, already living on low-lying coasts directly exposed to interacting climatic and non-climatic coastal hazards (<span class="condensed_italic" lang="">very high confidence</span>). Low-lying cities and settlements (C&amp;S) by the sea are experiencing adverse climate impacts that are superimposed on extensive and accelerating anthropogenic coastal change (<span class="condensed_italic" lang="">very high confidence</span>). Depending on coastal C&amp;S characteristics, continuing existing patterns of coastal development will worsen exposure and vulnerability <span class="condensed_italic" lang=""/> (<span class="condensed_italic" lang="">high confidence</span>). With accelerating sea level rise (SLR) and worsening climate-driven risks in a warming world, prospects for achieving the Sustainable Development Goals (SDGs) and charting climate resilient development (CRD) pathways are dismal (<span class="condensed_italic" lang="">high confidence</span>). However, coastal C&amp;S are also the source of SDG and CRD solutions, because they are centres of innovation with long histories of place-based livelihoods, many of which are globally connected through maritime trade and exchange (<span class="condensed_italic" lang="">medium confidence</span>) <!-- -->{CCP2.1, CCP2.2  CCP2.3, CCP2.4; SMCCP2.1; Chapters 16, 18}<!-- -->.</p>
                          </div>
                        </div>
                        <div class="h4-container" id="Regardless">
                          <h4 class="Headings_H4-unnumbered" lang="de-DE">
                            <span class="bold_condensed" lang="en-GB">Regardless of climate and socioeconomic scenarios, many C&amp;S face severe disruption to coastal ecosystems and livelihoods by 2050&#8212;extending to all C&amp;S by 2100 and beyond&#8212;caused by compound and cascading risks, including submergence of some low-lying island states (</span>
                            <span class="bold_condensed_italic" lang="">very high confidence</span>
                            <span class="bold_condensed" lang="en-GB">) <!-- -->{CCP2.1; CCP2.2; SROCC SPM, Chapter 4; 6.2}<!-- -->. </span>
                            <span class="arrow-up"/>
                            <span class="arrow-down"/>
                            <span class="share-block">
                              <img class="share-icon" src="../../share.png"/>
                            </span>
                          </h4>
                          <div class="h4-siblings" id="h4-2-siblings">
                            <p class="Body_Body-justify" lang="en-GB">There is <span class="condensed_italic" lang="">high confidence</span> that projected climate risks will increase with (i) exposure to climate- and ocean-driven hazards manifest at the coast, such as heat waves, droughts, pluvial floods and impacts due to SLR, tropical cyclones, marine and land heatwaves, and ocean acidification; (ii) with increasing vulnerability driven by inequity and (iii) increasing exposure driven by urban growth in at-risk locations. Compounded and cascading climate risks, such as to coastal C&amp;S infrastructure and supply chain networks, are also expected to increase. These risks are acute for C&amp;S on subsiding and/or low-lying small islands, the Arctic, and open, estuarine and deltaic coasts (<span class="condensed_italic" lang="">high confidence</span>). By 2050, more than a billion people located in low-lying C&amp;S will be at risk from coast-specific climate hazards, influenced by coastal geomorphology, geographical location and adaptation action (<span class="condensed_italic" lang="">high confidence</span>). Between USD 7 and 14 trillion of coastal infrastructure assets will be exposed by 2100, depending on warming levels and socioeconomic development trajectories (<span class="condensed_italic" lang="">medium confidence</span>). Historically rare extreme sea level events will occur annually by 2100, with some atolls being uninhabitable by 2050. The coastal flood risk will rapidly increase during coming decades, possibly by 2&#8211;3 orders of magnitude by 2100 in the absence of effective adaptation and mitigation, with severe impacts on coast-dependent livelihoods and socioecological systems (<span class="condensed_italic" lang="">high confidence</span>). Impacts reach far beyond C&amp;S; for example damage to ports severely compromising global supply chains and maritime trade, with local&#8211;global geopolitical and economic ramifications. Global investment costs to accommodate port growth and adapt to SLR will amount to USD 223&#8211;768 billion before 2050, presenting opportunities for C&amp;S by the sea to build climate resilience (<span class="condensed_italic" lang="">medium evidence</span>, <span class="condensed_italic" lang="">high agreement </span>). Severely accelerated SLR resulting from rapid continental ice mass loss would bring impacts forward by decades, and adaptation would need to occur much faster and on a much greater scale than ever performed in the past (<span class="condensed_italic" lang="">medium confidence</span>) <!-- -->{Table SMCCP2.1; CCP2.1; CCP2.2; Cross-Chapter Box SLR in Chapter 3; Chapter 4; Sections 6.2.7}<span class="condensed_italic" lang="">. </span></p>
                          </div>
                        </div>
                        <div class="h4-container" id="A">
                          <h4 class="Headings_H4-unnumbered" lang="de-DE">
                            <span class="bold_condensed" lang="en-GB">A mix of interventions is necessary to manage coastal risks and build resilience over time. An adaptation-pathways approach sets out near-term &#8216;low-regret&#8217; actions that align with societal goals, facilitates implementation of a locally appropriate sequence of interventions in the face of uncertain climate and development futures, and enables necessary transformation (</span>
                            <span class="bold_condensed_italic" lang="">high confidence</span>
                            <span class="bold_condensed" lang="en-GB">) <!-- -->{CCP2.3; Cross-Chapter Box DEEP in Chapter 17, Cross-Chapter Box SLR in Chapter 3}<!-- -->. </span>
                            <span class="arrow-up"/>
                            <span class="arrow-down"/>
                            <span class="share-block">
                              <img class="share-icon" src="../../share.png"/>
                            </span>
                          </h4>
                          <div class="h4-siblings" id="h4-3-siblings">
                            <p class="Body_Body-justify" lang="en-GB">A mix of infrastructural, nature-based, institutional and sociocultural interventions are needed to reduce the multifaceted risk facing C&amp;S, including vulnerability-reducing measures, avoidance (i.e., disincentivising developments in high-risk areas), hard and soft protection, accommodation, advance (i.e., building up and out to sea) and retreat (i.e., landward movement of people and development) (<span class="condensed_italic" lang="">very high confidence</span>). Depending on the C&amp;S archetype, technical limits for hard protection may be reached beyond 2100 under high-emission scenarios, with socioeconomic and governance barriers reached before then (<span class="condensed_italic" lang="">medium confidence</span>). However, hard protection can set up lock-in of assets and people to risks and, in some cases, may reach limits&#8212;due to technical and financial constraints&#8212;by 2100 or sooner depending on the scenario, local SLR effects and community tolerance thresholds (<span class="condensed_italic" lang="">medium confidence</span>)<span class="condensed_italic" lang="">. </span>Where sufficient space and adequate habitats are available, nature-based solutions can help to reduce coastal hazard risks and provide other benefits, but biophysical limits may be reached before end-century (<span class="condensed_italic" lang="">medium confidence</span>). Accommodation is easier, faster and cheaper to implement than hard protection, but limits may be reached by 2100, or sooner in some settings. An adaptation-pathways planning approach demonstrates how the solution space can expand or shrink depending on the type and timing of adaptation interventions. As SLR is relentless on human timescales, the solution space will shrink without adoption of an adaptation-pathways planning approach (<span class="condensed_italic" lang="">high confidence</span>). Due to long implementation lead times and the need to avoid maladaptive lock-in, particularly in localities facing rapid SLR and climate-compounded risk, adaptation will be more successful if timely action is taken accounting for long-term (committed) SLR, and if this is underpinned by sustained and ambitious mitigation to slow greenhouse gas emission rates (<span class="condensed_italic" lang="">high confidence</span>) <!-- -->{ &lt;a class='section-link' data-title='Adaptation and Solutions' href='/report/ar6/wg2/chapter/ccp2#CCP1.3'&gt;CCP1.3.1.2&lt;/a&gt;; CCP2.3; CCP2.4; Cross-Chapter Box SLR in Chapter 3}<!-- -->.</p>
                          </div>
                        </div>
                        <div class="h4-container" id="Individual">
                          <h4 class="Headings_H4-unnumbered" lang="de-DE">
                            <span class="bold_condensed" lang="en-GB">Individual and collective choices founded on public-centred values and norms, as well as pro-social behaviour, help to foster climate-resilient coastal development in C&amp;S (</span>
                            <span class="bold_condensed_italic" lang="">high confidence</span>
                            <span class="bold_condensed" lang="en-GB">) <!-- -->{CCP2.4.1}<!-- -->. </span>
                            <span class="arrow-up"/>
                            <span class="arrow-down"/>
                            <span class="share-block">
                              <img class="share-icon" src="../../share.png"/>
                            </span>
                          </h4>
                          <div class="h4-siblings" id="h4-4-siblings">
                            <p class="Body_Body-justify" lang="en-GB">The effectiveness of different approaches (e.g., awareness and education, market-based and legal strategies) is mediated by how well they address contextual and psychosocial factors influencing adaptation choices in coastal C&amp;S (<span class="condensed_italic" lang="">medium confidence</span>). Adaptation options accounting for risk perceptions and aligning with public values tend to be more socioculturally acceptable, and consequently facilitate pro-social behavioural change <!-- -->{CCP2.4.1}<!-- -->.</p>
                          </div>
                        </div>
                        <div class="h4-container" id="Locally">
                          <h4 class="Headings_H4-unnumbered" lang="de-DE">
                            <span class="bold_condensed" lang="en-GB">Locally appropriate institutional capabilities, including regulatory provisions and finances dedicated to maintaining healthy coastal socioecological systems, build adaptive capacity in C&amp;S by the sea (</span>
                            <span class="bold_condensed_italic" lang="">high confidence</span>
                            <span class="bold_condensed" lang="en-GB">) <!-- -->{CCP2.4}<!-- -->. </span>
                            <span class="arrow-up"/>
                            <span class="arrow-down"/>
                            <span class="share-block">
                              <img class="share-icon" src="../../share.png"/>
                            </span>
                          </h4>
                          <div class="h4-siblings" id="h4-5-siblings">
                            <p class="Body_Body-justify" lang="en-GB">Implementing integrated multi-level coastal zone governance, pre-emptive planning, enabling behavioural change and alignment of financial resources with a wide set of values will provide C&amp;S with greater flexibility to open up the solution space to adapt to climate change (<span class="condensed_italic" lang="">high confidence</span>). Insufficient financial resources are a key constraint for coastal adaptation, particularly in the Global South (<span class="condensed_italic" lang="">high confidence</span>). Engaging the private sector in coastal adaptation action with a range of financial tools is crucial to address the coastal adaptation funding gap (<span class="condensed_italic" lang="">high confidence</span>). Considering the full range of economic and non-economic values will improve adaptation effectiveness and equity across C&amp;S archetypes (<span class="condensed_italic" lang="">high confidence</span>). Aligning adaptation in C&amp;S with socioeconomic development, infrastructure maintenance and COVID-19 recovery investments will provide additional co-benefits. Urgency is also driven by the need to avoid lock-in to new and additional risks, for example to avoid C&amp;S sprawl into fragile ecosystems and the most exposed coastal localities <!-- -->{CCP2.3; CCP2.4.2; CCP2.4.4 }<!-- -->.</p>
                          </div>
                        </div>
                        <div class="h4-container" id="Realising">
                          <h4 class="Headings_H4-unnumbered" lang="de-DE">
                            <span class="bold_condensed" lang="en-GB">Realising global aspirations for CRD depends on the extent to which coastal C&amp;S institutionalise key enabling conditions and chart place-based adaptation pathways to close the coastal adaptation gap, and on the extent to which they take urgent action to mitigate greenhouse gas emissions (</span>
                            <span class="bold_condensed_italic" lang="">medium confidence</span>
                            <span class="bold_condensed" lang="en-GB">) <!-- -->{CCP2.4; Table CCP2.1 }<!-- -->. </span>
                            <span class="arrow-up"/>
                            <span class="arrow-down"/>
                            <span class="share-block">
                              <img class="share-icon" src="../../share.png"/>
                            </span>
                          </h4>
                          <div class="h4-siblings" id="h4-6-siblings">
                            <p class="Body_Body-justify" lang="en-GB">Extensive adaptation planning has been undertaken since the IPCC Fifth Assessment Report (AR5), but there has not been widespread effective implementation, thus giving rise to a &#8216;coastal adaptation gap&#8217; (<span class="condensed_italic" lang="">high confidence</span>). To date, most interventions have been reactive and often rely on protective works alone (<span class="condensed_italic" lang="">high confidence</span>). The effectiveness of alternative interventions differs among C&amp;S archetypes, while their feasibility is influenced by geomorphology and socioeconomic conditions as well as cultural, political and institutional considerations (<span class="condensed_italic" lang="">very high confidence</span>). Mismatches between adaptation needs and patterns of physical development are commonplace in many coastal C&amp;S, with particularly adverse impacts on poor and marginalised communities in the Global North and Global South (<span class="condensed_italic" lang="">high confidence</span>). Overcoming this gap is key to transitioning towards CRD (<span class="condensed_italic" lang="">medium confidence</span>). Under higher warming levels and higher SLR, increasingly dichotomous coastal futures will become more entrenched (<span class="condensed_italic" lang="">medium confidence</span>), with stark differences between more urbanised, resource-rich coastal C&amp;S dependent on hard protection, and more rural, resource-poor C&amp;S facing displacement and migration <!-- -->{CCP2.3; CCP2.4, Chapter 18}<!-- -->.</p>
                            <p class="Body_Body-justify" lang="en-GB">Coastal adaptation innovators adopt more flexible, anticipatory and integrative strategies, combining technical and non-technical interventions that account for uncertainties and facilitate effective resolution of conflicting interests and worldviews (<span class="condensed_italic" lang="">limited evidence</span>, <span class="condensed_italic" lang="">high agreement </span>). Moreover, a core set of critical enablers is foundational for C&amp;S to chart CRD pathways. These include building and strengthening governance capabilities to tackle complex problems; taking a long-term perspective in making short-term decisions; enabling more effective coordination across scales, sectors and policy domains; reducing injustice, inequity, and social vulnerability; and unlocking the productive potential of coastal conflict while strengthening local democracy <span class="bold_condensed" lang="en-GB"/> (<span class="condensed_italic" lang="">medium evidence</span>, <span class="condensed_italic" lang="">high agreement </span>) <!-- -->{Table CCP2.1, Table CCP2.2; CCP2.3; CCP2.4; Chapters 17, 18; Cross-Chapter Box DEEP in Chapter 17}<!-- -->.</p>
                            <p class="Body_Body-justify _idGenParaOverride-1" lang="en-GB">C&amp;S play a pivotal role in global aspirations to implement the Paris Agreement, advance the SDGs and foster CRD. Progress towards these ends depends on the extent to which C&amp;S mobilise urgent and transformational changes to institutionalise enabling conditions, close the coastal adaptation gap by addressing the drivers and root causes of exposure and vulnerability to climate-compounded coastal hazard risks, and drastically reduce greenhouse gas emissions (<span class="condensed_italic" lang="">medium confidence</span>) <!-- -->{CCP2.4; Chapter 18}</p>
                          </div>
                        </div>
                      </div>
                    </div>
                    <div class="h1-container" id="CCP2.1">
                      <h1 class="Headings_H1-numbered" lang="en-GB">CCP2.1  Context of Cities and Settlements by the Sea <span class="share-block"><img class="share-icon" src="../../share.png"/></span><button class="btn-ipcc btn btn-primary chapter-expand">Expand section</button></h1>
                      <div class="h1-siblings" id="h1-2-siblings"/>
                      <div class="h2-container" id="CCP2.1.1">
                        <h2 class="Headings_H2-sub" lang="de-DE">CCP2.1.1  Introduction and Context <span class="arrow-up"/><span class="arrow-down"/><span class="share-block"><img class="share-icon" src="../../share.png"/></span></h2>
                        <div class="h2-siblings" id="h2-1-siblings">
                          <p class="Body_Body-justify" lang="en-GB">This cross-chapter paper examines the distinctive roles played by C&amp;S by the sea in vulnerability and coastal hazard risk reduction, adaptation, resilience and sustainability in a changing climate. The paper builds upon evidence from AR5 (<a class="reference-link" href="#Wong--2014">Wong et al., 2014</a>), the Special Report on the Ocean and Cryosphere in a Changing Climate (SROCC; <a class="reference-link" href="#Magnan--2019">Magnan et al., 2019</a>; <a class="reference-link" href="#Oppenheimer--2019">Oppenheimer et al., 2019</a>) and draws material from across WGII AR6 (especially Chapters 3, 6, 9&#8211;15). It differs from the SLR-focused analysis of urban areas in SROCC (<a class="section-link" data-title="Observed Sectoral Impacts of Current Hydrological Changes" href="/report/ar6/wg2/chapter/chapter-4#4.3">Section 4.3</a>) through a more integrated assessment that distinguishes between archetypal coastal C&amp;S (Section CCP2.1.2), sectoral risks to C&amp;S by the sea (Section CCP2.2), responses to address these risks (Section CCP2.3) and enabling conditions and lessons learned (Section CCP2.4).</p>
                          <p class="Body_Body-justify" lang="en-GB">We define C&amp;S as concentrated human habitation centres, whether small or large, rural or urban (<a class="section-link" data-title="Terminology and Definitions" href="/report/ar6/wg2/chapter/chapter-6#6.1.3">Section 6.1.3</a>). We highlight the unique exposure and vulnerability of coastal C&amp;S resulting from rapid urbanisation at the narrow land&#8211;sea interface, and a high concentration of economic activity and at-risk people, many with long-standing cultural ties to the coast and dependence on coastal ecosystems that are prone to climate change impacts (<span class="condensed_italic" lang="">high confidence</span>; <a class="reference-link" href="#He--2019">He and Silliman, 2019</a>; <a class="reference-link" href="#Lau--2019">Lau et al., 2019</a>; <a class="reference-link" href="#Oppenheimer--2019">Oppenheimer et al., 2019</a>; <a class="reference-link" href="#Sterzel--2020">Sterzel et al., 2020</a>)<span class="condensed_italic" lang="">. </span></p>
                          <p class="Body_Body-justify" lang="en-GB">Presently, the coastal C&amp;S population exposure to ocean-driven impacts from SLR and other climate-driven impacts is considerable by any measure (<a class="reference-link" href="#Buddemeier--2008">Buddemeier et al., 2008</a>; <a class="reference-link" href="#Barrag&#225;n--2015">Barrag&#225;n and de Andr&#233;s, 2015</a>; <a class="reference-link" href="#Kay--2017">Kay and Alder, 2017</a>; <a class="reference-link" href="#Haasnoot--2019">Haasnoot et al., 2019</a>; <a class="reference-link" href="#McMichael--2020">McMichael et al., 2020</a>; <a class="reference-link" href="#Sterzel--2020">Sterzel et al., 2020</a>). In 2020, almost 11% of the global population&#8212;896 million people&#8212;resided in C&amp;S within the low-elevation coastal zone (LECZ; coastal areas below 10 m of elevation above sea level that are hydrologically connected to the sea; <a class="reference-link" href="#Haasnoot--2021b">Haasnoot et al., 2021b</a>), a figure which will potentially increase beyond 1 billion by 2050 (<a class="reference-link" href="#Oppenheimer--2019">Oppenheimer et al., 2019</a>). Infrastructural and economic assets worth USD 6,500&#8211;11,000 billion are also exposed in the 1-in-100-year floodplain for C&amp;S of all sizes (<a class="reference-link" href="#Neumann--2015">Neumann et al., 2015</a>; <a class="reference-link" href="#Muis--2016">Muis et al., 2016</a>; <a class="reference-link" href="#Brown--2018">Brown et al., 2018</a>; <a class="reference-link" href="#Andrew--2019">Andrew et al., 2019</a>; <a class="reference-link" href="#Kulp--2019">Kulp and Strauss, 2019</a>; <a class="reference-link" href="#Kirezci--2020">Kirezci et al., 2020</a>; <a class="reference-link" href="#Thomas--2020">Thomas et al., 2020</a>; <a class="reference-link" href="#Haasnoot--2021b">Haasnoot et al., 2021b</a>; <a class="reference-link" href="#Hooijer--2021">Hooijer and Vernimmen, 2021</a>).</p>
                          <p class="Body_Body-justify" lang="en-GB">Further, coastal cities located at higher elevations (e.g., S&#227;o Paulo, Brazil) or distantly located inland along tidally influenced rivers (e.g., the Recife Metropolitan Region, Brazil) also have populations and infrastructure exposed to climate impacts. As such, the inclusion of C&amp;S beyond the LECZ is warranted when assessing climate impacts and associated exposure, vulnerabilities and risks. The coastal zone includes some of the world&#8217;s largest, most densely populated megacities, as well as the fastest-growing urban areas. However, vast coastal areas are sparsely populated, with populations in these regions concentrated in smaller C&amp;S, including along subsiding shorelines and in deltas (<a class="reference-link" href="#Nicholls--2002">Nicholls and Small, 2002</a>; <a class="reference-link" href="#McGranahan--2007">McGranahan et al., 2007</a>; <a class="reference-link" href="#Merkens--2018">Merkens et al., 2018</a>; <a class="reference-link" href="#Edmonds--2020">Edmonds et al., 2020</a>; <a class="reference-link" href="#Nicholls--2021">Nicholls et al., 2021</a>). From this wider perspective, climate change impacts on the coast directly or indirectly affect a large portion of the global population, economic activity and associated critical infrastructure. Some estimates suggest that 23&#8211;37% of the global population lives within 100 km of the shoreline (<a class="reference-link" href="#Nicholls--2002">Nicholls and Small, 2002</a>; <a class="reference-link" href="#Shi--2003">Shi and Singh, 2003</a>; Christopher Small and Joel E. Cohen, 2004; <a class="reference-link" href="#McMichael--2020">McMichael et al., 2020</a>).</p>
                          <p class="Body_Body-justify" lang="en-GB">C&amp;S by the sea are thus on the frontline of action to adapt to climate change, mitigate greenhouse gas emissions and chart CRD pathways for several distinct reasons. First, home to a concentrated (and growing) portion of the world&#8217;s population, many coastal C&amp;S are simultaneously exposed and vulnerable to climate-compounded hazards as well as being centres of creativity and innovation (<a class="reference-link" href="#Glavovic--2013">Glavovic, 2013</a>; <a class="reference-link" href="#Crescenzi--2017">Crescenzi and Rodr&#237;guez-Pose, 2017</a>; <a class="reference-link" href="#Druzhinin--2021">Druzhinin et al., 2021</a>; <a class="reference-link" href="#Mariano--2021">Mariano et al., 2021</a>; <a class="reference-link" href="#Storbj&#246;rk--2021">Storbj&#246;rk and Hjerpe, 2021</a>). Second, people in C&amp;S by the sea rely on coastal ecosystems, many of which are highly sensitive to climate change impacts that compound non-climatic risks and increase the precarity of coastal livelihoods (<a class="reference-link" href="#Lu--2018">Lu et al., 2018</a>; <a class="reference-link" href="#He--2019">He and Silliman, 2019</a>; <a class="reference-link" href="#Thrush--2021">Thrush et al., 2021</a>). Third, coastal C&amp;S are linked together through a network of ports and harbours that underpin global trade and exchange, but which are prone to climate change impacts, especially SLR, with significant implications for global CRD prospects (<a class="reference-link" href="#Becker--2018">Becker et al., 2018</a>; <a class="reference-link" href="#Christodoulou--2019">Christodoulou et al., 2019</a>; <a class="reference-link" href="#Walsh--2019">Walsh et al., 2019</a>; <a class="reference-link" href="#Hanson--2020">Hanson and Nicholls, 2020</a>). For these reasons, this paper assesses responses, enabling conditions and lessons learned for addressing climate change in C&amp;S by the sea.</p>
                        </div>
                      </div>
                      <div class="h2-container" id="CCP2.1.2">
                        <h2 class="Headings_H2-numbered" lang="de-DE">CCP2.1.2  Urbanisation in Coastal Systems: Coastal City and Settlement Archetypes <span class="arrow-up"/><span class="arrow-down"/><span class="share-block"><img class="share-icon" src="../../share.png"/></span></h2>
                        <div class="h2-siblings" id="h2-2-siblings">
                          <p class="Body_Body-justify" lang="en-GB">This assessment uses an archetype framework categorizing coastal C&amp;S according to geomorphological characteristics, urban growth, economic resources and inequalities (Figure CCP2.1). Three broadly defined coastal settlement geomorphologies are used in each row: open coasts (a coast with sediment without river mouths) and two transitional coastal zones with river mouths, distinguishing between estuaries (a wetland receiving sediment from both fluvial and marine sources, which is affected by tide, wave and river processes) and deltas (a wetland where fluvial sediment is supplied and deposited more rapidly than it can be redistributed by basin processes such as waves and tides; <a class="reference-link" href="#Bhattacharya--1978">Bhattacharya, 1978</a>; <a class="reference-link" href="#Barrag&#225;n--2015">Barrag&#225;n and de Andr&#233;s, 2015</a>; <a class="reference-link" href="#Kay--2017">Kay and Alder, 2017</a>; <a class="reference-link" href="#Haasnoot--2019">Haasnoot et al., 2019</a>; <a class="reference-link" href="#Sterzel--2020">Sterzel et al., 2020</a>). Small island C&amp;S are not singled out in this typology, because their coastlines often include the geomorphic features listed above, or require a different adaptation approach at larger spatial scales (<a class="reference-link" href="#Haasnoot--2019">Haasnoot et al., 2019</a>). Several coastal C&amp;S have a combination of two typologies, for example, Maputo-Matola, Mozambique and Mumbai, India, having both open and transitional riverine coasts, and can be classed as mixed. We also acknowledge that several coastal C&amp;S may have areas sited in mountainous topography that abruptly rises from the coast (e.g., along the Mediterranean), but generally these cities have narrow, densely populated coastlines exhibiting these three archetypal categories (<a class="reference-link" href="#Blackburn--2019">Blackburn et al., 2019</a>). Arctic settlements are addressed separately in this cross-chapter paper.</p>
                          <div class="Figure" id="_idContainer007">
                            <p class="Body_Figures_Figure" lang="de-DE">
                              <img alt="" class="_idGenObjectAttribute-1" id="figure-ccp2-001" loading="lazy" src="https://ipcc.ch/report/ar6/wg2/downloads/figures/IPCC_AR6_WGII_Figure_CCP2_001.png"/>
                            </p>
                            <p class="Body_Figures_Figure_title ParaOverride-1" lang="en-US"><span class="figure_number" lang="">Figure CCP2.1  | </span><span class="bold_condensed-dark-blue" lang="">Archetypal cities and settlements (C&amp;S) affected by ocean, terrestrial, geological, atmospheric and hydrological hazards driven by climate change. </span>Coastal C&amp;S are grouped by physical geomorphology along estuarine, deltaic or open coasts (<a class="reference-link" href="#Barrag&#225;n--2015">Barrag&#225;n and de Andr&#233;s, 2015</a>; <a class="reference-link" href="#Kay--2017">Kay and Alder, 2017</a>; <a class="reference-link" href="#Haasnoot--2019">Haasnoot et al., 2019</a>). C&amp;S are also classified according to relative inequality (e.g., urban Gini coefficient or poverty rates) and growth rates (e.g., recent population growth and increasing density of urban form or built-up areas over the past decade; <a class="reference-link" href="#OECD--2018">OECD, 2018</a>; <span class="CharOverride-4" lang=""><a class="reference-link" href="#CEIC--2021">CEIC, 2021</a> </span>; <a class="reference-link" href="#OECD--2020">OECD, 2020</a>). Settlement types (e.g., informal, low-density or high-density developments) and economic resources (e.g., urban per capita gross domestic product) are also reflected in their respective categories. The bottom map shows location, 2020 population size and geomorphological types.</p>
                            <div class="ch-figure-button-cont"><a href="/report/ar6/wg2/figures/chapter-ccp2/figure-ccp2-001" target="_blank"><button class="btn-ipcc btn btn-primary ch-figure-button">Open figure</button></a> </div>
                          </div>
                          <p class="Body_Body-justify" lang="en-GB">Coastal C&amp;S within these geomorphological categories are further distinguished according to higher or lower rates of urban growth and inequality, which can be estimated through population growth from national census data or areal extent of urban development (<a class="reference-link" href="#CEIC--2021">CEIC, 2021</a>), as well as by relative urban inequalities estimated by Gini coefficient data and urban&#8211;rural poverty rates (<a class="reference-link" href="#OECD--2018">OECD, 2018</a>; <a class="reference-link" href="#OECD--2020">OECD, 2020</a>). Combining geomorphological and socioeconomic data accounts for urban&#8211;rural interconnections and differences, with levels of capital generation, diversity of economic functions and human development indices having previously been used to discern cultural, economic, administrative and political differences between cities and their hinterland (<a class="reference-link" href="#Blackburn--2019">Blackburn et al., 2019</a>; <a class="reference-link" href="#Rocle--2020">Rocle et al., 2020</a>). For instance, the ecological, cultural and economic footprint of tertiary sectors, for example, coastal tourism associated with the Australian Great Barrier Reef, stretches far beyond the nearest onshore settlement of Cairns (<a class="reference-link" href="#Bohnet--2010">Bohnet and Pert, 2010</a>; <a class="reference-link" href="#Brodie--2016">Brodie and Pearson, 2016</a>).</p>
                          <p class="Body_Body-justify" lang="en-GB">Some caveats are warranted. First, locating a specific city or settlement in a particular archetype does not account for future reclassification due to growth or shifts in development trajectories. Second, significant socioeconomic, political and governance variations exist within many C&amp;S, such as impoverished informal settlements alongside wealthy neighbourhoods in cities like Cape Town and S&#227;o Paulo (also see Table SMCCP2.1). Third, this archetype framework does not explicitly reveal important interconnections between coastal C&amp;S and their hinterlands, or between particular C&amp;S through maritime trade or other economic, sociocultural and geopolitical interdependencies. Notwithstanding these caveats, these archetypes reveal differentiated physical impacts and socioeconomic conditions, as well as the variable challenges and opportunities arising when addressing climate change impacts and projected risk, which, depending on coastal type, C&amp;S size and resource availability, help to inform efforts to adapt and chart CRD for each archetype (<a class="reference-link" href="#S&#225;nchez-Arcilla--2016">S&#225;nchez-Arcilla et al., 2016</a>; <a class="reference-link" href="#Rocle--2020">Rocle et al., 2020</a>; <a class="reference-link" href="#Sterzel--2020">Sterzel et al., 2020</a>).</p>
                        </div>
                      </div>
                    </div>
                    <div class="h1-container" id="CCP2.2">
                      <h1 class="Headings_H1-numbered" lang="en-GB">CCP2.2  Climate Change Risks to Cities and Settlements by the Sea <span class="share-block"><img class="share-icon" src="../../share.png"/></span><button class="btn-ipcc btn btn-primary chapter-expand">Expand section</button></h1>
                      <div class="h1-siblings" id="h1-3-siblings">
                        <p class="Body_Body-justify" lang="en-GB">Coastal C&amp;S are at the forefront of climate risk (FAQ CCP2.1). The dynamic interaction between ocean and climate drivers and varied coastal geographies influences the character of coastal risks, including many that are unique to C&amp;S by the sea. The interaction of coastal hazards with exposure and vulnerability is differentiated by coastal archetypes, leading to distinct climate change-compounded risks and associated responses (Figure CCP2.2; <a class="section-link" data-title="The Complexities of Climate Risk" href="/report/ar6/wg2/chapter/chapter-1#1.3.1.2">Section 1.3.1.2</a>; <a class="reference-link" href="#Simpson--2021">Simpson et al., 2021</a>).</p>
                        <div class="Figure" id="_idContainer009">
                          <p class="Body_Figures_Figure" lang="de-DE">
                            <img alt="" class="_idGenObjectAttribute-2" id="figure-ccp2-002" loading="lazy" src="https://ipcc.ch/report/ar6/wg2/downloads/figures/IPCC_AR6_WGII_Figure_CCP2_002.png"/>
                          </p>
                          <p class="Body_Figures_Figure_title" lang="en-US"><span class="figure_number" lang="">Figure CCP2.2  | </span><span class="bold_condensed-dark-blue" lang="">Schematic of how climate and ocean drivers (from WGI Chapter 12. </span><span class="bold_condensed-dark-blue" lang="">4.10.2 (Ranasinghe et al., 2021)) and consequential physical impacts on coastal cities and settlements (C&amp;S) influence risks assessed in (Section CCP2.2; figure based on <a class="reference-link" href="#Simpson--2021">Simpson et al., 2021</a>, and <a class="section-link" data-title="The Complexities of Climate Risk" href="/report/ar6/wg2/chapter/chapter-1#1.3.1.2">Section 1.3.1.2</a>). </span>These risks to C&amp;S by the sea are shaped and mediated by adaptation interventions aimed at reducing vulnerability and exposure to coastal hazards given settlement archetypes, as well as by expanding the space for responses to risk via the enabling conditions assessed in Section CCP2.4. Note that exposure to coastal hazards is controlled chiefly by underlying coastal C&amp;S geomorphology and changes in coastal hazards and urban growth, including population and infrastructure growth. Vulnerability is controlled, for example, by socioeconomic development and inequality, and responses that shape the risks assessed in Section CCP2.3  can be enhanced by enabling conditions, including behavioural change, conducive finance and prudent governance.</p>
                          <div class="ch-figure-button-cont"><a href="/report/ar6/wg2/figures/chapter-ccp2/figure-ccp2-002" target="_blank"><button class="btn-ipcc btn btn-primary ch-figure-button">Open figure</button></a> </div>
                        </div>
                        <p class="Body_Body-justify" lang="en-GB">Overall, interactions between climatic and non-climatic drivers of coastal change are increasing the frequency and intensity of many coastal hazards, with settlement archetypes and the wider coastal zone subject to escalating risk (<span class="condensed_italic" lang="">high confidence</span>; Figure CCP2.2; Table SMCCP2.1 for examples of selected coastal C&amp;S). Risks can vary markedly between different archetypes: C&amp;S sited on deltaic and estuarine coasts face additional risks of pluvial flooding compared to open coasts, while greater vulnerabilities arise in coastal settlements with higher inequalities.</p>
                        <p class="Body_Body-justify" lang="en-GB">Risks to C&amp;S by the sea were extensively covered in SROCC (<a class="reference-link" href="#Oppenheimer--2019">Oppenheimer et al., 2019</a>) and also in Chapters 3, 6 and regional chapters; in this paper, specific risks to livelihoods, activities, the built environment and ecosystems are assessed in detail in Supplementary Material SMCCP2.1. The ocean and climate impact drivers influencing these risks are assessed in WGI (Ranasinghe et al., 2021 ), which include extreme heat, pluvial floods from increasing rainfall intensity, coastal erosion and coastal flood driven by increasing SLR, and tropical cyclone storm surges (<span class="condensed_italic" lang="">high confidence</span>). Further, Arctic coastal settlements are particularly exposed to climate change due to sea ice retreat as well as from permafrost melt (<span class="condensed_italic" lang="">high confidence</span>).</p>
                        <p class="Body_Body-justify" lang="en-GB">Without adaptation, risks to land and people in coastal C&amp;S from pluvial and coastal flooding will <span class="condensed_italic" lang="">very likely </span><span class="superscript _idGenCharOverride-1" lang=""><span id="footnote-001-backlink"><a class="_idFootnoteLink _idGenColorInherit" href="ccp2.html#footnote-001">2</a> </span></span> increase substantially by 2100 and <span class="condensed_italic" lang="">likely </span> beyond as a result of SLR, with significant impacts even under RCP2.6 (<a class="reference-link" href="#Neumann--2015">Neumann et al., 2015</a>; <a class="reference-link" href="#Muis--2016">Muis et al., 2016</a>; <a class="reference-link" href="#Brown--2018">Brown et al., 2018</a>; <a class="reference-link" href="#Nicholls--2018">Nicholls et al., 2018</a>; <a class="reference-link" href="#Kulp--2019">Kulp and Strauss, 2019</a>; <a class="reference-link" href="#Oppenheimer--2019">Oppenheimer et al., 2019</a>; <a class="reference-link" href="#Kirezci--2020">Kirezci et al., 2020</a>; <a class="reference-link" href="#Haasnoot--2021b">Haasnoot et al., 2021b</a>). Across these studies, by 2100, 158&#8211;510 million people and USD 7,919&#8211;12,739 billion assets under RCP4.5, and 176&#8211;880 million people and USD 8,813&#8211;14,178 billion assets under RCP8.5 will be within the 1-in-100-year floodplain (<span class="condensed_italic" lang="">very high confidence</span>). There is <span class="condensed_italic" lang="">medium confidence</span> that accelerated SLR will increase shoreline erosion globally, although biophysical feedbacks will allow many coastlines to maintain relatively stable morphology if room exists to accommodate mangroves in estuarine and deltaic coasts and beach movement along open coasts (<a class="reference-link" href="#Kench--2015">Kench et al., 2015</a>; <a class="reference-link" href="#McLean--2015">McLean and Kench, 2015</a>; <a class="reference-link" href="#Perkins--2015">Perkins et al., 2015</a>; <a class="reference-link" href="#Richards--2016">Richards and Friess, 2016</a>; <a class="reference-link" href="#CCC--2017">CCC, 2017</a>; <a class="reference-link" href="#Duncan--2018">Duncan et al., 2018</a>; <a class="reference-link" href="#Luijendijk--2018">Luijendijk et al., 2018</a>; <a class="reference-link" href="#Mentaschi--2018">Mentaschi et al., 2018</a>; <a class="reference-link" href="#Schuerch--2018">Schuerch et al., 2018</a>; <a class="reference-link" href="#Ghosh--2019">Ghosh et al., 2019</a>; <a class="reference-link" href="#Masselink--2020">Masselink et al., 2020</a>; <a class="reference-link" href="#Toimil--2020">Toimil et al., 2020</a>; <a class="reference-link" href="#Vousdoukas--2020b">Vousdoukas et al., 2020b</a>). Limiting emissions to RCP2.6 (corresponding to a mean post-industrial global temperature increase of 1.5&#8211;2&#176;C) significantly reduces future SLR risks (<a class="reference-link" href="#Hinkel--2014">Hinkel et al., 2014</a>; <a class="reference-link" href="#Brown--2018">Brown et al., 2018</a>; <a class="reference-link" href="#Nicholls--2018">Nicholls et al., 2018</a>; <a class="reference-link" href="#Schinko--2020">Schinko et al., 2020</a>). For example, by 2100, the population at risk of permanent submergence increases by 26% under RCP2.6 compared with 53% under RCP8.5 (median values from <a class="reference-link" href="#Kulp--2019">Kulp and Strauss, 2019</a>).</p>
                        <p class="Body_Body-justify" lang="en-GB">There is <span class="condensed_italic" lang="">high confidence</span> regarding regionally differentiated but considerable global sectoral impacts in coastal C&amp;S arising from exposure to hazards. Tangible impacts include damage, loss of life and loss of livelihoods, especially fisheries and tourism (<a class="reference-link" href="#Tessler--2015">Tessler et al., 2015</a>; <a class="reference-link" href="#Avelino--2018">Avelino et al., 2018</a>; <a class="reference-link" href="#Hoegh-Guldberg--2018">Hoegh-Guldberg et al., 2018</a>; <a class="reference-link" href="#Seekamp--2019">Seekamp et al., 2019</a>; <a class="reference-link" href="#Arabadzhyan--2020">Arabadzhyan et al., 2020</a>); negative impacts on health and wellbeing, especially under extreme events (<a class="reference-link" href="#McIver--2016">McIver et al., 2016</a>; <a class="reference-link" href="#Bakkensen--2019">Bakkensen and Mendelsohn, 2019</a>; <a class="reference-link" href="#Bindoff--2019">Bindoff et al., 2019</a>; <a class="reference-link" href="#Pugatch--2019">Pugatch, 2019</a>); and involuntary displacement and migration (<a class="reference-link" href="#Hauer--2017">Hauer, 2017</a>; <a class="reference-link" href="#Davis--2018">Davis et al., 2018</a>; <a class="reference-link" href="#Neef--2018">Neef et al., 2018</a>; <a class="reference-link" href="#Boas--2019">Boas et al., 2019</a>; <a class="reference-link" href="#McLeman--2021">McLeman et al., 2021</a>). Intangible impacts include psychological impacts due to extreme events such as heatwaves, flooding, droughts and tropical cyclones; heightened inequality in coastal archetypes with systematic gender/ethnicity/structural vulnerabilities; and loss of things of personal or cultural value and sense of place or connection, including an existential risk of the demise of nations due to submergence (<a class="reference-link" href="#Allison--2015">Allison and Bassett, 2015</a>; <a class="reference-link" href="#Barnett--2017">Barnett, 2017</a>; <a class="reference-link" href="#Schmutter--2017">Schmutter et al., 2017</a>; <a class="reference-link" href="#Weir--2017">Weir et al., 2017</a>; <a class="reference-link" href="#Farbotko--2020">Farbotko et al., 2020</a>; <a class="reference-link" href="#Hauer--2020">Hauer et al., 2020</a>; <a class="reference-link" href="#Hoffmann--2020">Hoffmann et al., 2020</a>; <a class="reference-link" href="#Bell--2021">Bell et al., 2021</a>). Impacts extend beyond the coastal zone, for example disruption to ports and supply chains, with major geopolitical and economic ramifications from the C&amp;S to the global scale (<span class="condensed_italic" lang="">very high confidence</span>; <a class="reference-link" href="#Becker--2018">Becker et al., 2018</a>; <a class="reference-link" href="#Camus--2019">Camus et al., 2019</a>; <a class="reference-link" href="#Christodoulou--2019">Christodoulou et al., 2019</a>; <a class="reference-link" href="#Walsh--2019">Walsh et al., 2019</a>; <a class="reference-link" href="#Hanson--2020">Hanson and Nicholls, 2020</a>; <a class="reference-link" href="#Yang--2020">Yang and Ge, 2020</a>; <a class="reference-link" href="#Izaguirre--2021">Izaguirre et al., 2021</a>; <a class="reference-link" href="#Le&#243;n-Mateos--2021">Le&#243;n-Mateos et al., 2021</a>; <a class="reference-link" href="#Ribeiro--2021">Ribeiro et al., 2021</a>).</p>
                        <p class="Body_Body-justify" lang="en-GB">Many coastal C&amp;S have densely built physical infrastructure and assets that are exposed and vulnerable to climate change-compounded coastal hazards. There is <span class="condensed_italic" lang="">high confidence</span> that SLR, land subsidence, poorly regulated coastal development and the rise of asset values are major drivers of future risk in all coastal archetypes and, without adaptation, built environment risks&#8212;especially in archetypes with high exposure due to rapid growth&#8212;are expected to rise considerably in this century across all RCPs (<a class="reference-link" href="#Koks--2019">Koks et al., 2019</a>; <a class="reference-link" href="#Magnan--2019">Magnan et al., 2019</a>; <a class="reference-link" href="#Oppenheimer--2019">Oppenheimer et al., 2019</a>; <a class="reference-link" href="#Abadie--2020">Abadie et al., 2020</a>; <a class="reference-link" href="#Nicholls--2021">Nicholls et al., 2021</a>). Archetypes with more informal settlements are often disproportionally exposed to coastal risks (<a class="reference-link" href="#Roy--2016">Roy et al., 2016</a>; <a class="reference-link" href="#Hallegatte--2017">Hallegatte et al., 2017</a>; <a class="reference-link" href="#Bangalore--2019">Bangalore et al., 2019</a>).</p>
                        <p class="Body_Body-justify" lang="en-GB">There is <span class="condensed_italic" lang="">high confidence</span> that loss of coastal ecosystem services will increase risks to all coastal C&amp;S archetypes that include reduced provisioning of materials and food (e.g., wood, fishery habitat; <a class="reference-link" href="#Kok--2021">Kok et al., 2021</a>), amelioration of coastal hazards (e.g., attenuation of storm surges, waves and containing erosion) (<a class="section-link" data-title="Hazards and Exposure" href="/report/ar6/wg2/chapter/chapter-2#2.3">Section 2.3.2.3</a>; <a class="reference-link" href="#Godfroy--2019">Godfroy et al., 2019</a>; <a class="reference-link" href="#Schoutens--2019">Schoutens et al., 2019</a>; <a class="reference-link" href="#Zhu--2020b">Zhu et al., 2020b</a>), climate change mitigation (through carbon sequestration; <a class="reference-link" href="#Macreadie--2017">Macreadie et al., 2017</a>; <a class="reference-link" href="#Rovai--2018">Rovai et al., 2018</a>; <a class="reference-link" href="#Ward--2020">Ward, 2020</a>), water quality regulation (nutrient, pollutant and sediment retention and cycling; <a class="reference-link" href="#Wilson--2018">Wilson et al., 2018</a>; <a class="reference-link" href="#Zhao--2018">Zhao et al., 2018</a>) and recreation and tourism (<a class="reference-link" href="#Pueyo-Ros--2018">Pueyo-Ros et al., 2018</a>).</p>
                        <p class="Body_Body-justify" lang="en-GB">Most studies of coastal C&amp;S focus on adaptation to a single or limited set of risks, but there is <span class="condensed_italic" lang="">high confidence</span> that compound and cascading risks significantly alter C&amp;S risk profiles (<a class="reference-link" href="#Nicholls--2015">Nicholls et al., 2015</a>; <a class="reference-link" href="#Estrada--2017">Estrada et al., 2017</a>; <a class="reference-link" href="#Edmonds--2020">Edmonds et al., 2020</a>; <a class="reference-link" href="#Eilander--2020">Eilander et al., 2020</a>; <a class="reference-link" href="#Yin--2020">Yin et al., 2020</a>; <a class="reference-link" href="#Ghanbari--2021">Ghanbari et al., 2021</a>). Extreme events can lead to cascading infrastructure failures that cause damage and economic losses well beyond the coastal zone (<a class="reference-link" href="#Haraguchi--2016">Haraguchi and Kim, 2016</a>; <a class="reference-link" href="#Kishore--2018">Kishore et al., 2018</a>; <a class="reference-link" href="#Rey--2019">Rey et al., 2019</a>; <a class="reference-link" href="#So--2019">So et al., 2019</a>), and have forced evacuation of C&amp;S and small islands (<a class="reference-link" href="#Look--2019">Look et al., 2019</a>; <a class="reference-link" href="#Thomas--2020">Thomas and Benjamin, 2020</a>). These risks are exacerbated by non-climatic drivers, for example compound and cascading impacts arising from exposure to tropical cyclones and COVID-19 that threaten population health and hamper pandemic responses (<a class="reference-link" href="#Salas--2020">Salas et al., 2020</a>; <a class="reference-link" href="#Shultz--2020a">Shultz et al., 2020a</a>; <a class="reference-link" href="#Shultz--2020b">Shultz et al., 2020b</a>). There is emerging evidence (<span class="condensed_italic" lang="">low confidence</span>) from individual coastal C&amp;S and regional case studies (e.g., in Europe, Australia and the US) to illustrate the increasing influence of compound risks on vulnerability due to accelerating climate change (<a class="reference-link" href="#Wahl--2015">Wahl et al., 2015</a>; <a class="reference-link" href="#Xu--2019">Xu et al., 2019</a>; <a class="reference-link" href="#Kirezci--2020">Kirezci et al., 2020</a>).</p>
                        <p class="Body_Body-justify" lang="en-GB">Figure CCP2.3  shows that ocean-driven coastal risks to people, land and infrastructure in East and Southeast Asia are highest compared to other regions, even for low levels of projected SLR. However, risks facing coastal C&amp;S are high across the globe, especially under higher SLR projections (<span class="condensed_italic" lang="">high confidence</span>). Without adaptation, the population at risk of a 100-year coastal flood increases by ~20% if the global mean sea level rises by 0.15 m relative to current levels; this at-risk population doubles at a rise of 0.75 m in mean sea level and triples at 1.4 m. Simultaneously, coastal C&amp;S are projected to experience shoreline retreat, with coastlines having more than 100 m of retreat increasing by ~165% if current mean sea levels rise between 0.23 and 0.53 m. Ocean-driven flooding in coastal C&amp;S is also projected to disrupt flights by up to three orders of magnitude per year in selected coastal C&amp;S as mean sea level increases. Typically, larger risks correspond to archetypes associated with higher inequality and high growth rates, especially in deltas, leading to larger vulnerability and exposure, respectively, under higher warming levels.</p>
                        <div class="Figure" id="_idContainer011">
                          <p class="Body_Figures_Figure" lang="de-DE">

                          </p>
                          <p class="Body_Figures_Figure_title" lang="en-US"><span class="figure_number" lang="">Figure CCP2.3  | </span><span class="bold_condensed-dark-blue" lang="">Map of coastal cities and settlements&#8217; risks according to IPCC regions</span><span class="bold_condensed-dark-blue CharOverride-4" lang="">, showing risks to people (number of people at risk from a 100-year coastal flood event; Haasnoot et al. </span><span class="CharOverride-4" lang="">, 2021b), risks of loss of coastal land (length of coast with more than 100 m retreat; <a class="reference-link" href="#Vousdoukas--2020b">Vousdoukas et al., 2020b</a>), risks to the built </span><span class="CharOverride-2" lang="">en</span> vironment (airports at risk indicated by expected annual number of flights disrupted by coastal flooding (<a class="reference-link" href="#Yesudian--2021">Yesudian and Dawson, 2021</a>) and risk to wetlands (&#177; indicates positive or negative area change; <a class="reference-link" href="#Schuerch--2018">Schuerch et al., 2018</a>). Risks are reported against global mean sea level rise relative to 2020, depending on data availability.</p>

                    <div class="h1-container" id="CCP2.3">
                      <h1 class="Headings_H1-numbered" lang="en-GB">CCP2.3  Adaptation in Cities and Settlements by the Sea <span class="share-block"><img class="share-icon" src="../../share.png"/></span><button class="btn-ipcc btn btn-primary chapter-expand">Expand section</button></h1>
                      <div class="h1-siblings" id="h1-4-siblings"/>
                      <div class="h2-container" id="CCP2.3.1">
                        <h2 class="Headings_H2-sub" lang="de-DE">CCP2.3.1  Introduction <span class="arrow-up"/><span class="arrow-down"/><span class="share-block"><img class="share-icon" src="../../share.png"/></span></h2>
                        <div class="h2-siblings" id="h2-3-siblings">
                          <p class="Body_Body-justify" lang="en-GB">This section extends SROCC <a class="section-link" data-title="Water" href="/report/ar6/wg2/chapter/chapter-4">Chapter 4</a>  (<a class="reference-link" href="#Oppenheimer--2019">Oppenheimer et al., 2019</a>), which focused on SLR, and draws from Chapters 6 and 9&#8211;15 to cover all C&amp;S archetypes. Adaptation interventions span psychosocial (e.g., awareness raising), economic (e.g., insurance), physical (e.g., retreat), technical (e.g., sea walls) and natural dimensions (e.g., wetland restoration; <a class="reference-link" href="#Nicholls--2015">Nicholls et al., 2015</a>). Adaptation strategies for coastal C&amp;S are typically classified in terms of protect, accommodate, advance and retreat, which are used below.</p>
                          <p class="Body_Body-justify" lang="en-GB">Some coastal cities have adapted to meters of SLR in the past, indicating that adaptation is feasible (<a class="reference-link" href="#Esteban--2020a">Esteban et al., 2020a</a>), but future adaptation options are influenced by variations in projected socioeconomic conditions and rates of SLR (Cross-Chapter Box SLR in Chapter 3). To date, interventions are typically implemented reactively in response to extreme events (<span class="condensed_italic" lang="">high confidence</span>), but leading adaptors are increasingly proactive (<span class="condensed_italic" lang="">medium confidence</span>; <a class="reference-link" href="#Araos--2016">Araos et al., 2016</a>; <a class="reference-link" href="#Dulal--2019">Dulal, 2019</a>; <a class="reference-link" href="#Dedekorkut-Howes--2020">Dedekorkut-Howes et al., 2020</a>) and those that move from previously rigid to more adaptive and flexible solutions, using an adaptation-pathways approach that keeps options open in the face of uncertainty, have improved climate risk management (<span class="condensed_italic" lang="">high confidence</span>; Sections 9.9.4; 10.5; 11.7; 12.5.5; 13.2; 14.7; 15.5; Cross-Chapter Box DEEP in Chapter 17; <a class="reference-link" href="#Walker--2013">Walker et al., 2013</a>; <a class="reference-link" href="#Marchau--2019">Marchau et al., 2019</a>).</p>
                          <p class="Body_Body-justify" lang="en-GB">The effectiveness of different strategies and interventions is mediated by physical coastal features for hard adaptation measures and by the scope and depth of soft adaptation measures, for example by the coverage and extent of social safety nets for the urban poor (<a class="section-link" data-title="Adaptation Pathways" href="/report/ar6/wg2/chapter/chapter-6#6.3">Section 6.3</a>). Their feasibility is also shaped by socioeconomic, cultural, political and institutional factors, for example social acceptance of measures (Section CCP2.2, SMCCP2.2.4). Together, response effectiveness and feasibility shape the solution space for mediating risks (<a class="section-link" data-title="The Complexities of Climate Risk" href="/report/ar6/wg2/chapter/chapter-1#1.3.1.2">Section 1.3.1.2</a>; Figure CCP2.3; <a class="reference-link" href="#Simpson--2021">Simpson et al., 2021</a>), which is achieved chiefly through governance interventions, for example laws and regulations (<a class="reference-link" href="#Haasnoot--2020">Haasnoot et al., 2020</a>). Access to financial resources expands the solution space, most notably for some resource-rich coastal archetypes (Section CCP2.4.2; Table SMCCP2.1; Sections 3.6; 14.7), but rapid population growth and unfolding climate-driven impacts can increase risks (<a class="reference-link" href="#Haasnoot--2021a">Haasnoot et al., 2021a</a>), especially for small island and poorer C&amp;S (<span class="condensed_italic" lang="">high confidence</span>; <a class="section-link" data-title="Observed Impacts and Projected Risks of Climate Change" href="/report/ar6/wg2/chapter/chapter-15#15.3">Section 15.3</a>; <a class="reference-link" href="#Magnan--2020">Magnan and Duvat, 2020</a>).</p>
                        </div>
                      </div>
                      <div class="h2-container" id="CCP2.3.2">
                        <h2 class="Headings_H2-numbered" lang="de-DE">CCP2.3.2  Protection of Coastal Cities and Settlements <span class="arrow-up"/><span class="arrow-down"/><span class="share-block"><img class="share-icon" src="../../share.png"/></span></h2>
                        <div class="h2-siblings" id="h2-4-siblings">
                          <div class="h3-container" id="CCP2.3.2.1">
                            <h3 class="Headings_H3" lang="de-DE">CCP2.3.2.1  Hard Engineering Measures <span class="arrow-up"/><span class="arrow-down"/><span class="share-block"><img class="share-icon" src="../../share.png"/></span></h3>
                            <div class="h3-siblings" id="h3-1-siblings">
                              <p class="Body_Body-justify" lang="en-GB">Hard engineering protective measures are commonly used to reduce coastal flooding and to drain or store excess water from intense precipitation. Many coastal cities, in particular densely populated and high-resource archetypes, have planned and are planning to continue a protection-based strategy, comprising, for example, breakwaters, sea walls and/or dikes, which could be raised or complemented with large barriers, or with &#8216;super-levees&#8217; enabling construction on top of them (<span class="condensed_italic" lang="">high confidence</span>; Table SMCCP2.1; <a class="reference-link" href="#Takagi--2016">Takagi et al., 2016</a>; <a class="reference-link" href="#Haasnoot--2019">Haasnoot et al., 2019</a>; <a class="reference-link" href="#Hall--2019">Hall et al., 2019</a>; <a class="reference-link" href="#Esteban--2020b">Esteban et al., 2020b</a>).</p>
                              <p class="Body_Body-justify" lang="en-GB">Protection is effective in the short- to medium-term for many coastal cities, and can be cost effective in the 21st century (Section CCP2.4.2), but residual risk remains because protection can fail. Even under RCP8.5, technical limits to hard protection may only be reached after 2100 in many regions, but socioeconomic and institutional barriers may be reached before then (<a class="reference-link" href="#Hinkel--2018">Hinkel et al., 2018</a>). With progressive SLR, protection eventually becomes unaffordable and impractical (<a class="reference-link" href="#Strauss--2021">Strauss et al., 2021</a>). Combining hard engineering measures with nature-based solutions, spatial planning and early warning systems can help to contain residual risk (<a class="reference-link" href="#Du--2020">Du et al., 2020</a>). Protective works do not prevent salinisation and higher groundwater levels (<a class="reference-link" href="#Alves--2020">Alves et al., 2020</a>), and can lead to loss of coastal habitat (Cross-Chapter Box SLR in Chapter 3; <a class="reference-link" href="#Achete--2017">Achete et al., 2017</a>; <a class="reference-link" href="#Cooper--2020">Cooper et al., 2020</a>). Hard protective measures also create long-term path dependency as they last for decades and attract new development, locking in impact and exposure as C&amp;S grow, with the expectation of ongoing protection (Chapter 3; <a class="reference-link" href="#Di Baldassarre--2015">Di Baldassarre et al., 2015</a>; <a class="reference-link" href="#Gibbs--2016">Gibbs, 2016</a>; <a class="reference-link" href="#Griggs--2019">Griggs and Patsch, 2019</a>; <a class="reference-link" href="#Siders--2019a">Siders, 2019a</a>).</p>
                            </div>
                          </div>
                          <div class="h3-container" id="CCP2.3.2.2">
                            <h3 class="Headings_H3" lang="de-DE">CCP2.3.2.2  Soft Engineering and Sediment-Based Measures <span class="arrow-up"/><span class="arrow-down"/><span class="share-block"><img class="share-icon" src="../../share.png"/></span></h3>
                            <div class="h3-siblings" id="h3-2-siblings">
                              <p class="Body_Body-justify" lang="en-GB">Sediment-based interventions, for example beach nourishment, aim to limit coastal erosion and flood risk and have become a widely applied strategy, especially in open-coast archetypal C&amp;S. This is in part because there is less impact on adjacent beaches and coastal ecology and also lower construction and maintenance costs compared to hard protection (<span class="condensed_italic" lang="">high confidence</span>; <a class="reference-link" href="#Parkinson--2018">Parkinson and Ogurcak, 2018</a>). In addition, it is considered a flexible strategy under more rapid SLR conditions (<a class="reference-link" href="#Kabat--2009">Kabat et al., 2009</a>; <a class="reference-link" href="#Stive--2013">Stive et al., 2013</a>) and can be applied in the form of a mega-nourishment strategy, wherein natural currents distribute sand along the coast (<a class="reference-link" href="#Stive--2013">Stive et al., 2013</a>; <a class="reference-link" href="#de Schipper--2021">de Schipper et al., 2021</a>). However, there are limits to this strategy due to environmental impacts, costs and the availability of potential and permitted sand reserves, which may be unable to keep up with higher rates of SLR (<a class="reference-link" href="#Parkinson--2018">Parkinson and Ogurcak, 2018</a>; <a class="reference-link" href="#Haasnoot--2019">Haasnoot et al., 2019</a>; <a class="reference-link" href="#Harris--2021">Harris et al., 2021</a>; <a class="reference-link" href="#Staudt--2021">Staudt et al., 2021</a>). Simultaneously, other socioeconomic needs (e.g., damming rivers or for building and transport infrastructure) may compete for sand as a limited resource (<a class="reference-link" href="#Torres--2017">Torres et al., 2017</a>; <a class="reference-link" href="#Bendixen--2019">Bendixen et al., 2019</a>). Regional and global governance provisions (e.g., spatial reservations for sand mining, international frameworks for distribution) could improve long-term feasibility (<a class="reference-link" href="#Torres--2017">Torres et al., 2017</a>; <a class="reference-link" href="#Parkinson--2018">Parkinson and Ogurcak, 2018</a>; <a class="reference-link" href="#Bendixen--2019">Bendixen et al., 2019</a>; <a class="reference-link" href="#Haasnoot--2019">Haasnoot et al., 2019</a>).</p>
                            </div>
                          </div>
                          <div class="h3-container" id="CCP2.3.2.3">
                            <h3 class="Headings_H3" lang="de-DE">CCP2.3.2.3  Nature-Based Measures <span class="arrow-up"/><span class="arrow-down"/><span class="share-block"><img class="share-icon" src="../../share.png"/></span></h3>
                            <div class="h3-siblings" id="h3-3-siblings">
                              <p class="Body_Body-justify" lang="en-GB">Nature-based measures, such as retaining mangroves and marshes, have been successful in reducing deaths and damage due to storm surges (<span class="condensed_italic" lang="">medium evidence, high agreement </span>; <a class="reference-link" href="#Das--2009">Das and Vincent, 2009</a>; <a class="reference-link" href="#Saleh--2016">Saleh and Weinstein, 2016</a>; <a class="reference-link" href="#Narayan--2017">Narayan et al., 2017</a>; <a class="reference-link" href="#Triyanti--2017">Triyanti et al., 2017</a>; <a class="reference-link" href="#Hochard--2019">Hochard et al., 2019</a>; <a class="reference-link" href="#del Valle--2020">del Valle et al., 2020</a>), and reportedly provide USD 23.2 billion yr&#8211;1 in storm protection services across the USA (<a class="reference-link" href="#Saleh--2016">Saleh and Weinstein, 2016</a>). They are also a cost-effective strategy (<span class="condensed_italic" lang="">medium confidence</span>) that provides C&amp;S with additional co-benefits through ecosystem services (<span class="condensed_italic" lang="">high confidence</span>; Cross-Chapter Box NATURAL in Chapter 2; <a class="section-link" data-title="Connections of Ecosystem Services to Climate Change" href="/report/ar6/wg2/chapter/chapter-2#2.2">Section 2.2.4</a>; <a class="reference-link" href="#Narayan--2016">Narayan et al., 2016</a>; <a class="reference-link" href="#Depietri--2017">Depietri and McPhearson, 2017</a>; <a class="reference-link" href="#Morris--2018">Morris et al., 2018</a>; <a class="reference-link" href="#Reguero--2018">Reguero et al., 2018</a>; <a class="reference-link" href="#Chausson--2020">Chausson et al., 2020</a>; <a class="reference-link" href="#Du--2020">Du et al., 2020</a>; NIES and ISME, 2020; <a class="reference-link" href="#Reguero--2020">Reguero et al., 2020</a>; <a class="reference-link" href="#Sudmeier-Rieux--2021">Sudmeier-Rieux et al., 2021</a>).</p>
                              <p class="Body_Body-justify" lang="en-GB">Nature-based measures can reduce inland propagation of extreme sea levels (high tides, storm surges; <span class="condensed_italic" lang="">high agreement </span>; <a class="reference-link" href="#Godfroy--2019">Godfroy et al., 2019</a>; <a class="reference-link" href="#James--2020">James et al., 2020</a>; <a class="reference-link" href="#Zhu--2020b">Zhu et al., 2020b</a>), with vertical reduction in water levels ranging from 5 to 50 cm/km behind large mangroves and marshes (<a class="reference-link" href="#Stark--2015">Stark et al., 2015</a>; <a class="reference-link" href="#Van Coppenolle--2020">Van Coppenolle and Temmerman, 2020</a>). They also attenuate wind-driven waves and reduce shoreline erosion (<span class="condensed_italic" lang="">high agreement </span>), and this can be by as much as 90% over stretches of 10&#8211;100 m for dense mangrove and marsh vegetation (<span class="condensed_italic" lang="">medium evidence</span>; <span class="condensed_italic" lang=""/><a class="reference-link" href="#Li--2014">Li et al., 2014</a>; <a class="reference-link" href="#M&#246;ller--2014">M&#246;ller et al., 2014</a>; <a class="reference-link" href="#Vuik--2016">Vuik et al., 2016</a>; <a class="reference-link" href="#Vuik--2018">Vuik et al., 2018</a>; <a class="reference-link" href="#Godfroy--2019">Godfroy et al., 2019</a>; <a class="reference-link" href="#Zhu--2020a">Zhu et al., 2020a</a>) and up to 40% for dunes (<a class="reference-link" href="#Feagin--2019">Feagin et al., 2019</a>). Coral reefs on average reduce wave energy by 97% (<a class="reference-link" href="#Ferrario--2014">Ferrario et al., 2014</a>). Seagrass meadows attenuate wind waves to a lesser extent, and are only effective in water &lt;0.2 m deep (<a class="reference-link" href="#Ondiviela--2014">Ondiviela et al., 2014</a>; <a class="reference-link" href="#Narayan--2016">Narayan et al., 2016</a>; <a class="reference-link" href="#Morris--2019">Morris et al., 2019</a>).</p>
                              <p class="Body_Body-justify" lang="en-GB">Within limits, coastal ecosystems can respond to RSL through sediment accretion and lateral inland movement (<a class="reference-link" href="#Kirwan--2016">Kirwan et al., 2016</a>; <a class="reference-link" href="#Schuerch--2018">Schuerch et al., 2018</a>). Nature-based measures have the greatest potential in coastal deltas and estuaries, where human populations are exposed, but large ecosystems, like mangroves and marshes, can be conserved and restored (<a class="reference-link" href="#Men&#233;ndez--2020">Men&#233;ndez et al., 2020</a>; <a class="reference-link" href="#Van Coppenolle--2020">Van Coppenolle and Temmerman, 2020</a>). Their feasibility depends on physical, ecological, institutional and socioeconomic conditions that are typically locality dependent (<a class="reference-link" href="#Temmerman--2015">Temmerman and Kirwan, 2015</a>; <a class="reference-link" href="#Arkema--2017">Arkema et al., 2017</a>); space may not be available in certain places (e.g., intensive urbanization on the shoreline), or these measures may conflict with other human demands for scarce land (<a class="reference-link" href="#Tian--2016">Tian et al., 2016</a>). Successful nature-based measures require site-specific knowledge and science-based design, pilot monitoring and adaptive upscaling (<a class="reference-link" href="#Evans--2017">Evans et al., 2017</a>; <a class="reference-link" href="#Nessh&#246;ver--2017">Nessh&#246;ver et al., 2017</a>), as well as a more rigorous understanding of long-term performance, maintenance and costs (<a class="reference-link" href="#Kumar--2021">Kumar et al., 2021</a>).</p>
                              <p class="Body_Body-justify" lang="en-GB">Nature-based measures are increasingly implemented in combination with hard protection measures (<a class="reference-link" href="#Hu--2019">Hu et al., 2019</a>; <a class="reference-link" href="#Schoonees--2019">Schoonees et al., 2019</a>; <a class="reference-link" href="#Morris--2020">Morris et al., 2020</a>; <a class="reference-link" href="#Oanh--2020">Oanh et al., 2020</a>). They can reduce dike failure and increase design life where sediment accretion allows wetlands to respond to SLR (<a class="reference-link" href="#Jongman--2018">Jongman, 2018</a>; <a class="reference-link" href="#Vuik--2019">Vuik et al., 2019</a>; <a class="reference-link" href="#Zhu--2020a">Zhu et al., 2020a</a>). There is <span class="condensed_italic" lang="">high agreement </span> that a hybrid strategy combining hard and soft protection strategies is more effective and less costly under many circumstances, and there is <span class="condensed_italic" lang="">limited evidence</span> that technical limits will be encountered with such a strategy for low-lying C&amp;S built on soft or permeable soil or with high exposure to monsoons and river discharges (<a class="reference-link" href="#Spalding--2014">Spalding et al., 2014</a>; <a class="reference-link" href="#Sutton-Grier--2015">Sutton-Grier et al., 2015</a>; <a class="reference-link" href="#Pontee--2016">Pontee et al., 2016</a>; <a class="reference-link" href="#Morris--2018">Morris et al., 2018</a>; <a class="reference-link" href="#Reguero--2018">Reguero et al., 2018</a>; <a class="reference-link" href="#Du--2020">Du et al., 2020</a>; <a class="reference-link" href="#Morris--2020">Morris et al., 2020</a>; <a class="reference-link" href="#Seddon--2020">Seddon et al., 2020</a>; <a class="reference-link" href="#Waryszak--2021">Waryszak et al., 2021</a>).</p>
                            </div>
                          </div>
                        </div>
                      </div>
                      <div class="h2-container" id="CCP2.3.3">
                        <h2 class="Headings_H2-numbered" lang="de-DE">CCP2.3.3  Accommodation of the Built Environment <span class="arrow-up"/><span class="arrow-down"/><span class="share-block"><img class="share-icon" src="../../share.png"/></span></h2>
                        <div class="h2-siblings" id="h2-5-siblings">
                          <p class="Body_Body-justify" lang="en-GB">The most effective solution for limiting the growth of climate risks in C&amp;S by the sea is to avoid new development in coastal locations prone to major flooding and/or SLR impacts (<span class="condensed_italic" lang="">very high confidence</span>; Cross-Chapter Box SLR in Chapter 3; <a class="reference-link" href="#Oppenheimer--2019">Oppenheimer et al., 2019</a>; <a class="reference-link" href="#Doberstein--2019">Doberstein et al., 2019</a>). For existing C&amp;S, accommodation includes biophysical and institutional responses to reduce exposure and/or vulnerability of coastal residents, human activities, ecosystems and the built environment, enabling continued habitation of coastal C&amp;S (<a class="reference-link" href="#Oppenheimer--2019">Oppenheimer et al., 2019</a>). Next to hard protection, accommodation is the most widely used adaptation strategy across all archetypes to date (<span class="condensed_italic" lang="">high confidence</span>; <a class="reference-link" href="#Sayers--2015">Sayers et al., 2015</a>; <a class="reference-link" href="#Olazabal--2019">Olazabal et al., 2019</a>; <a class="reference-link" href="#Le--2020">Le, 2020</a>). Measures include elevation or flood proofing of houses and other infrastructure (<a class="reference-link" href="#Garschagen--2015">Garschagen, 2015</a>; <a class="reference-link" href="#Aerts--2018">Aerts et al., 2018</a>; <a class="reference-link" href="#Buchori--2018">Buchori et al., 2018</a>; <a class="reference-link" href="#Jamero--2018">Jamero et al., 2018</a>; <a class="reference-link" href="#Tamura--2019">Tamura et al., 2019</a>), spatial planning (e.g., <a class="reference-link" href="#Duy--2018">Duy et al., 2018</a>), amphibious building designs (<a class="reference-link" href="#Nilubon--2016">Nilubon et al., 2016</a>), increasing water storage and/or drainage capacity within C&amp;S (<a class="reference-link" href="#Chan--2018">Chan et al., 2018</a>), early warning systems and disaster responses (<a class="reference-link" href="#Hissel--2014">Hissel et al., 2014</a>) and slum upgrading (<a class="reference-link" href="#Jain--2017">Jain et al., 2017</a>; <a class="reference-link" href="#Olthuis--2020">Olthuis et al., 2020</a>).</p>
