                                    <li class="Body_Tables_Table_list-unnumbered-first" lang="en-US">Collaborative projects involve state and non-state actors.</li>
                                    <li class="Body_Tables_Table_list-unnumbered-continued" lang="en-US">Multi-lateral agreements, e.g., between neighbouring countries, coastal regions and C&amp;S.</li>
                                    <li class="Body_Tables_Table_list-unnumbered-continued" lang="en-US">Connect people, organisations and communities through boundary-spanning organizations.</li>
                                    <li class="Body_Tables_Table_list-unnumbered-continued" lang="en-US">Leadership by central actors with capable teams is key.</li>
                                    <li class="Body_Tables_Table_list-unnumbered-continued" lang="en-US">Mobilise the capabilities of communities and non-state actors.</li>
                                    <li class="Body_Tables_Table_list-unnumbered-continued" lang="en-US">Address policy inconsistencies and clarify roles and responsibilities.</li>
                                    <li class="Body_Tables_Table_list-unnumbered-continued" lang="en-US">Secure national and regional resources to support local efforts.</li>
                                    <li class="Body_Tables_Table_list-unnumbered-continued" lang="en-US">Use measures to promote interaction, deliberation and coordination to manage spill-over effects.</li>
                                    <li class="Body_Tables_Table_list-unnumbered-continued" lang="en-US">Strengthen linkages between formal (e.g., regulatory) and informal (e.g., traditions and rituals) institutions, e.g., through information sharing.</li>
                                    <li class="Body_Tables_Table_list-unnumbered-last" lang="en-US">Use spatial coordination mechanisms, e.g., land-use planning, to translate national and regional provisions into local competencies.</li>
                                  </ul>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US"><span class="bold_condensed" lang="en-GB">Seychelles (0.1 million; open coast, small island): </span> Cross-sectoral and institutional collaboration to improve use of limited financial resources; community-based and ecosystem-based adaptation to bridge adaptation and mitigation and improve coordination.</p>
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US"><span class="bold_condensed" lang="en-GB">Florianopolis, Santa Catarina Island, Brazil (1.2 million; mixed): </span>Effective local climate action hampered by governance constraints and weak federal leadership.</p>
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US"><span class="bold_condensed" lang="en-GB">Cape Town, South Africa (4.6 million; mixed): </span>Multi-level climate governance advanced at local-provincial level, but political turf battles hamper national&#8211;provincial&#8211;local progress.</p>
                                </td>
                              </tr>
                              <tr class="Table _idGenTableRowColumn-13">
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">
                                    <span class="bold_condensed" lang="en-GB"> Cross-scale and cross-domain coordination: shared understanding</span>
                                  </p>
                                  <ul>
                                    <li class="Body_Tables_Table_list-unnumbered-first" lang="en-US">Prioritise social learning and shared understanding, e.g., information accessible to all, irrespective of education, language, etc.</li>
                                    <li class="Body_Tables_Table_list-unnumbered-continued" lang="en-US">Account for local history, culture and politics through engagement, experimentation and innovation.</li>
                                    <li class="Body_Tables_Table_list-unnumbered-continued" lang="en-US">Generate socioeconomic, livelihood and climate development co-benefits.</li>
                                    <li class="Body_Tables_Table_list-unnumbered-last" lang="en-US">Leverage national and trans-national community and local authority networks.</li>
                                  </ul>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US"><span class="bold_condensed" lang="en-GB">Cape Town, South Africa (4.6 million; mixed): </span>Capable local leaders collaborate with researchers in municipality-initiated community-based adaptation. Translating plans into action challenging given &#8216;everyday&#8217; vulnerability exacerbated by climate change impacts.</p>
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US"><span class="bold_condensed" lang="en-GB">New York City, USA (23.5 million; mixed): </span> State and city government work with communities to build adaptive capacity and resilience; drawing on technical capabilities but many challenges.</p>
                                </td>
                              </tr>
                              <tr class="Table _idGenTableRowColumn-14">
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">
                                    <span class="bold_condensed" lang="en-GB">Equity and social vulnerability: address vulnerability</span>
                                  </p>
                                  <ul>
                                    <li class="Body_Tables_Table_list-unnumbered-first" lang="en-US">Expose drivers and root causes of injustice, structural inequity and vulnerability.</li>
                                    <li class="Body_Tables_Table_list-unnumbered-continued" lang="en-US">Link human development concerns, risk reduction, resilience and adaptation.</li>
                                    <li class="Body_Tables_Table_list-unnumbered-continued" lang="en-US">Raise awareness and public support for actions that are just and equitable.</li>
                                    <li class="Body_Tables_Table_list-unnumbered-continued" lang="en-US">Understand discriminatory drivers (e.g., on racial grounds) of coastal land-use patterns and risk.</li>
                                    <li class="Body_Tables_Table_list-unnumbered-continued" lang="en-US">Address barriers facing marginalised groups.</li>
                                    <li class="Body_Tables_Table_list-unnumbered-last" lang="en-US">Use inclusive planning, decision-making and implementation processes that give voice to vulnerable people.</li>
                                  </ul>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US"><span class="bold_condensed" lang="en-GB">Cape Town, South Africa (4.6 million; mixed): </span>Adaptation framed by apartheid legacy; focus on reducing vulnerability, public safety and securing critical infrastructure and community assets.</p>
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US"><span class="bold_condensed" lang="en-GB">Maputo-Matola, Mozambique (3 million; mixed): </span>Livelihood opportunities compromised by ecological degradation compelling community DIY coping in face of severe poverty and vulnerability, weak governance and institutional capacity, and reliance on donors.</p>
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US"><span class="bold_condensed" lang="en-GB">New York City, USA (23.5 million; estuary): </span>Hurricane Sandy (2012) focused attention on climate risk and the plight of exposed and vulnerable people, and sparked adaptation action.</p>
                                </td>
                              </tr>
                              <tr class="Table _idGenTableRowColumn-15">
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">
                                    <span class="bold_condensed" lang="en-GB">Equity and social vulnerability: community capabilities</span>
                                  </p>
                                  <ul>
                                    <li class="Body_Tables_Table_list-unnumbered-first" lang="en-US">Raise vulnerability and risk awareness and understanding; build community capability and leverage external support by working with professionals, academics, local NGOs, journalists and activists.</li>
                                    <li class="Body_Tables_Table_list-unnumbered-continued" lang="en-US">Secure rights of vulnerable groups through court action where necessary.</li>
                                    <li class="Body_Tables_Table_list-unnumbered-continued" lang="en-US">Integrate traditional community responses with local government efforts.</li>
                                    <li class="Body_Tables_Table_list-unnumbered-last" lang="en-US">Ensure gender equity, e.g., representation on planning and decision-making bodies.</li>
                                  </ul>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US"><span class="bold_condensed" lang="en-GB">Monkey River Village, Belize (200 people; estuary): </span>Remote indigenous community; capacity to tackle erosion enabled by interventions by researchers, journalists and local NGOs to secure media and political attention after hurricane damage.</p>
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US"><span class="bold_condensed" lang="en-GB">Accra, Ghana (2.5 million; delta): </span>Household adaptation mediated by local government flood-mitigation efforts; need better early warning and maintenance of local stormwater to prevent flooding.</p>
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US"><span class="bold_condensed" lang="en-GB">Lagos, Nigeria (14 million; open coast): </span>Building adaptive capacity to overcome &#8216;everyday&#8217; vulnerability and poverty severely challenging.</p>
                                </td>
                              </tr>
                              <tr class="Table _idGenTableRowColumn-12">
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">
                                    <span class="bold_condensed" lang="en-GB">Social conflict: tailor-made participation</span>
                                  </p>
                                  <ul>
                                    <li class="Body_Tables_Table_list-unnumbered-first" lang="en-US">Create opportunities for integrative and inclusive solutions.</li>
                                    <li class="Body_Tables_Table_list-unnumbered-continued" lang="en-US">Use conflict-resolution mechanisms.</li>
                                    <li class="Body_Tables_Table_list-unnumbered-continued" lang="en-US">Appoint independent facilitators/mediators and involve officials as &#8216;bureaucratic activists&#8217; to improve inclusivity and iterative and reflexive engagement.</li>
                                    <li class="Body_Tables_Table_list-unnumbered-continued" lang="en-US">Align informal participatory processes with statutory processes and government practices.</li>
                                    <li class="Body_Tables_Table_list-unnumbered-continued" lang="en-US">Sustain engagement by securing resources for local use and aligning activities with political and bureaucratic cycles.</li>
                                    <li class="Body_Tables_Table_list-unnumbered-continued" lang="en-US">Involve historically disadvantaged and socially vulnerable groups, e.g., accessible meeting locations/venues, local languages and culturally appropriate meeting protocols.</li>
                                    <li class="Body_Tables_Table_list-unnumbered-continued" lang="en-US">Involve local leaders who will champion adaptation and help mainstream findings to be integrated into C&amp;S decision-making.</li>
                                    <li class="Body_Tables_Table_list-unnumbered-last" lang="en-US">Inclusive processes help address conflict and drivers of vulnerability and promote just adaptation</li>
                                  </ul>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US"><span class="bold_condensed" lang="en-GB">Napier (0.07 million), Hawkes Bay, New Zealand (0.18 million, open coast): </span>Collaboration between local authorities and Indigenous People (M&#257;ori) involving stakeholders led to co-designed long-term strategy with implementation commitment.</p>
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US"><span class="bold_condensed" lang="en-GB">Manila, Philippines (14 million; open coast): </span>Metro-wide planning and infrastructure provisions that foster climate justice and resilience explored, with community-based actions.</p>
                                </td>
                              </tr>
                              <tr class="Table _idGenTableRowColumn-16">
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">
                                    <span class="bold_condensed" lang="en-GB">Social conflict: safe arenas of engagement </span>
                                  </p>
                                  <ul>
                                    <li class="Body_Tables_Table_list-unnumbered-first" lang="en-US">Use flexible and enabling processes based in local institutions that are robust and fair, supported by governing authorities.</li>
                                    <li class="Body_Tables_Table_list-unnumbered-continued" lang="en-US">Attend to local social dynamics and reduce elite domination.</li>
                                    <li class="Body_Tables_Table_list-unnumbered-continued" lang="en-US">Use local and Indigenous knowledge and science.</li>
                                    <li class="Body_Tables_Table_list-unnumbered-continued" lang="en-US">Use institutional improvisation to address local concerns.</li>
                                    <li class="Body_Tables_Table_list-unnumbered-continued" lang="en-US">Use trusted independent facilitators.</li>
                                    <li class="Body_Tables_Table_list-unnumbered-continued" lang="en-US">Incentivise participation by disadvantaged groups.</li>
                                    <li class="Body_Tables_Table_list-unnumbered-continued" lang="en-US">Focus on improving risk literacy, optimism and capacity for joint problem-solving.</li>
                                    <li class="Body_Tables_Table_list-unnumbered-continued" lang="en-US">Use joint, collaborative activities to facilitate public dialogue, and secure institutional support for action.</li>
                                    <li class="Body_Tables_Table_list-unnumbered-continued" lang="en-US">Enable ongoing deliberation and social learning.</li>
                                    <li class="Body_Tables_Table_list-unnumbered-last" lang="en-US">Make continual adjustments as circumstances change, e.g., build shared understanding about locally relevant thresholds beyond which alternative courses of action need to be actioned.</li>
                                  </ul>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US"><span class="bold_condensed" lang="en-GB">Napier (0.07 million), Hawkes Bay, New Zealand (0.18 million, open coast): </span>Active involvement of local communities, Indigenous People (M&#257;ori) and research community to co-produce fit-for-purpose long-term coastal hazard risk strategy.</p>
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US"><span class="bold_condensed" lang="en-GB">Rotterdam, the Netherlands (0.65 mill.; delta): </span>Delta Programme institutionalised multi-level adaptation governance with strong accountability mechanisms.</p>
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US"><span class="bold_condensed" lang="en-GB">Greater London, UK (8.9 mill.; estuary): </span>Long-term provisions for at-risk Thames Estuary including major protective works, embedded in Greater London Spatial Development Plan and London Climate Change Partnership, championed by strategic leadership and supported by the public and strong technical capability.</p>
                                </td>
                              </tr>
                            </tbody>
                          </table>
                        </div>

                      <div class="h2-container" id="CCP2.4.4">
                        <h2 class="Headings_H2-numbered" lang="de-DE">CCP2.4.4  Enabling Climate Resilient Development for Cities and Settlements by the Sea <span class="arrow-up"/><span class="arrow-down"/><span class="share-block"><img class="share-icon" src="../../share.png"/></span></h2>
                        <div class="h2-siblings" id="h2-12-siblings">
                          <p class="Body_Body-justify" lang="en-GB">The above critical enablers and lessons learned from around the world establish a strong foundation for charting pathways for CRD in coastal C&amp;S. These pathways will necessarily vary in different C&amp;S, and synergies and commonalities within different coastal archetypes can be leveraged. Pivotal is recognition of the narrow window of time remaining to translate embryonic risk assessment and adaptation planning into concerted implementation efforts. C&amp;S by the sea could be the centres of innovation that lead the way to advancing SDGs through to 2030 and CRD beyond this decade (see <a class="section-link" data-title="Overview" href="/report/ar6/wg2/chapter/chapter-2#2.1.1">Section 2.1.1</a>).</p>
                          <p class="Body_Body-justify" lang="en-GB">This cross-chapter paper shows that a range of adaptation solutions, hard and soft protection, nature-based measures, accommodate, advance, retreat and behavioural change will need to be implemented as an integrated and sequenced portfolio of responses if coastal C&amp;S are to contain the adverse risks of climate change (<span class="condensed_italic" lang="">high confidence</span>). The effectiveness and feasibility of any intervention&#8212;at any given moment&#8212;to reduce a particular climate-compounded coastal hazard risk or combination of risks depend upon the settlement archetype, including its geomorphological, cultural, economic, technical, institutional and political features, as well as on its historical development trajectory. Coastal C&amp;S will benefit from developing flexible adaptation pathways&#8212;sequences of adaptation strategies and intervention options&#8212;to navigate a dynamic solution space that changes in response to climate and other drivers of change, and is also shaped by human development choices and socioeconomic, technological and institutional change.</p>
                          <p class="Body_Body-justify" lang="en-GB">There is no silver bullet or panacea. But developing locally appropriate yet flexible pathways for CRD will help coastal communities to address escalating risks and uncertainty (Cross-Chapter Box DEEP in Chapter 17). Effective pathways are based on robust integrated information about dynamic coastal hazard risk and plausible interventions. However, their successful implementation requires multi-scale governance arrangements and practices able to bridge different administrative and sectoral capacities in the coastal zone; effective and accountable leadership; and inclusive decision-making arrangements to enable participation, manage conflicts and trade-offs, engender local ownership, and promote equity and justice in coastal adaptation plans and policies. Further, the feasibility of adaptation strategies and interventions, especially those entailing changing behaviours and practices, is increased by recognising and incorporating peoples&#8217; values and beliefs and Indigenous and local knowledge systems, as well as the voices of women and vulnerable groups.</p>
                          <p class="Body_Body-justify" lang="en-GB">Coastal C&amp;S are on the frontline of observed climate change impacts and future risk (<span class="condensed_italic" lang="">high confidence</span>). Difficult choices will be made as climate- and ocean-driven extremes become more frequent. In the next few decades, many coastal regions and C&amp;S will have the opportunity to take actions to avoid and reduce risk, through incremental as well as more transformative interventions. Under higher levels of global warming, decisions will need to be made faster or respond to higher levels of SLR (<span class="condensed_italic" lang="">high confidence</span>; Cross-Chapter Box SLR in Chapter 3). This is particularly challenging in coastal C&amp;S characterised by the inertia and path dependency of development choices, with long lead times for adaptation planning and implementation, and the long design life and societal impact of many interventions. Given the risks assessed in coastal C&amp;S, the scale of climate impacts globally will depend to a large extent on whether coastal settlements develop and implement pre-emptive and flexible adaptation pathways, and whether a significant and timely reduction in greenhouse gas emissions is achieved in C&amp;S and globally <span class="condensed_italic" lang=""> (high confidence). </span></p>
                        </div>
                      </div>
                    </div>
                    <div class="h1-container" id="frequently-asked-questions">
                      <h1 class="Body_Box_FAQ_FAQ-Box_head" lang="en-US">Frequently Asked Questions <span class="share-block"><img class="share-icon" src="../../share.png"/></span><button class="btn-ipcc btn btn-primary chapter-expand">Expand section</button></h1>
                      <div class="h1-siblings" id="h1-7-siblings"/>
                      <div class="h2-container" id="FAQ">
                        <h2 class="Body_Box_FAQ_FAQ-Box_subhead" lang="en-GB">FAQ CCP2.1  | Why are coastal cities and settlements by the sea especially at risk in a changing climate, and which cities are most at risk?<span class="arrow-up"/><span class="arrow-down"/><span class="share-block"><img class="share-icon" src="../../share.png"/></span></h2>
                        <div class="h2-siblings" id="h2-13-siblings">
                          <p class="Body_Box_FAQ_FAQ-Box_body" lang="en-US">
                            <span class="condensed_italic" lang="">Coastal cities and settlements (C&amp;S) by the sea face a much greater risk than comparable inland C&amp;S because they concentrate a large proportion of the global population and economic activity, whilst being exposed and vulnerable to a range of climate- and ocean-compounded hazard risks driven by climate change. Coastal C&amp;S range from small settlements along waterways and estuaries, to small island states with maritime populations and/or beaches and atolls that are major tourist attractions, large cities that are major transport and financial hubs in coastal deltas, to megacities and even megaregions with several coastal megacities. </span>
                          </p>
                          <p class="Body_Box_FAQ_FAQ-Box_body" lang="en-US">The concentration of people, economic activity and infrastructure dynamically interacts with coast-specific hazards to magnify the exposure of these C&amp;S to climate risks. While large inland cities and coastal settlements can be exposed to climate-driven hazards, such as urban heat islands and air pollution, the latter are also subject to distinctive ocean-driven hazards, such as sea level rise (SLR), exposure to tropical cyclones and storm surges, flooding from extreme tides and land subsidence from decreased sediment deposition along coastal deltas and estuaries. With climate change increasing, the intensity and frequency of hazards under all future warming levels and thus the risks to lives, livelihoods and property are especially acute in C&amp;S by the sea.</p>
                          <p class="Body_Box_FAQ_FAQ-Box_body" lang="en-US">Coastal cities are diverse in shape, size, growth patterns and trajectories, and in terms of access to cultural, financial and ecosystem resources and services. Along deltaic and estuarine archetypes, cities most vulnerable to a changing climate have relatively high levels of poverty and inequality in terms of access to resources and ecosystem services, with large populations and dense built environments translating into higher exposure to coastal climate risks.</p>
                          <p class="Body_Box_FAQ_FAQ-Box_body" lang="en-US">These climate risks at the coast can also be magnified by compounding and cascading effects due to non-climate drivers directly affecting vulnerable peri- and ex-urban areas inland. These risks include disruption to transport supply chains and energy infrastructure from airports and power plants sited along the coastline, as occurred in New York City, USA, during Hurricane Sandy in 2012. The impacts can be felt around the world through globalised economic and geopolitical linkages, for example through maritime trade and port linkages.</p>
                          <p class="Body_Box_FAQ_FAQ-Box_body" lang="en-US">For open coasts, settlements on low-lying small island states and the Arctic are especially vulnerable to climate change, and SLR impacts in particular, well before 2100. While the economic risks may not compare to the scale of those faced in coastal megacities with high per capita GDP, the existential risks to some nations and an array of distinctive livelihoods, cultural heritage and ways of life in these settlements are great, even with modest SLR.</p>
                        </div>
                        <h2 class="Body_Box_FAQ_FAQ-Box_subhead" lang="en-GB">FAQ CCP2.2  | What actions can be taken by coastal cities and settlements to reduce climate change risk?<span class="arrow-up"/><span class="arrow-down"/><span class="share-block"><img class="share-icon" src="../../share.png"/></span></h2>
                        <div class="h2-siblings" id="h2-14-siblings">
                          <p class="Body_Box_FAQ_FAQ-Box_body" lang="en-US">
                            <span class="condensed_italic" lang="">Sea level rise (SLR) responds to climate change over long timeframes and will continue even after successful mitigation. However, rapid global mitigation of greenhouse gases significantly reduces risks to coastal cities and settlements (C&amp;S), and, crucially, buys time for adaptation. </span>
                          </p>
                          <p class="Body_Box_FAQ_FAQ-Box_body" lang="en-US">Appropriate actions to reduce climate change risks in coastal C&amp;S depend on the scale and speed of coastal change interacting with unfolding local circumstances, reflecting the hazards, exposure, vulnerability and response to risks.</p>
                          <p class="Body_Box_FAQ_FAQ-Box_body" lang="en-US">&#8216;Hard&#8217; protection, like dikes and seawalls, can reduce the risk of flooding for several metres of SLR in some coastal C&amp;S. These are most cost effective for densely populated cities and some islands, but may be unaffordable for poorer regions. Although these measures reduce the likelihood of coastal flooding, residual risk remains, and hard protection typically has negative consequences for natural systems. In low-lying protected coastal zones, draining river and excess water will increasingly be hampered, eventually requiring pumping or transferring to alternative strategies.</p>
                          <p class="Body_Box_FAQ_FAQ-Box_body" lang="en-US">Whereas structures can disrupt natural beach morphology processes, sediment-based protection replenishes beaches. These have lower impact on adjacent beaches and coastal ecology and lower costs for construction and maintenance compared to hard structures. Another form of &#8216;soft&#8217; protection involves establishing, rehabilitating and preserving coastal ecosystems, like marshes, mangroves, seagrass, coral reefs and dunes, providing &#8216;soft&#8217; protection against storm surges, reducing coastal erosion and offering additional benefits including food, materials and carbon sequestration. However, these are less effective where there is limited space in the coastal zone, limited sediment supply and under higher rates of SLR.</p>
                          <p class="Body_Box_FAQ_FAQ-Box_body" lang="en-US">Coastal settlements can &#8216;avoid&#8217; new flood and erosion risks by preventing development in areas exposed to current and future coastal hazards. Where development already exists, settlements can &#8216;accommodate&#8217; climate change impacts through, among other things, land-use zoning, raising ground or buildings above storm surge levels, installing flood-proofing measures within and outside properties, and early warning systems. Improving the capacity of urban drainage, incorporating nature-based solutions within urban areas and managing land upstream of settlements to reduce runoff from the hinterland reduces the risk of compound flood events. More radically, land can also be reclaimed from the sea, which offers opportunities for further development but has impacts on the natural system and wider implications for the trajectory of development.</p>
                          <p class="Body_Box_FAQ_FAQ-Box_body" lang="en-US">Coastal risks and impacts such as floods, loss of fisheries or tourism, or salinization of groundwater require people to change behaviour to adapt, such as diversifying livelihoods or moving away from low-lying areas. Currently, most of these practices are reactive and help people adjust to/cope with current impacts. While a critical part of coastal adaptation, changing behaviour can be enabled by supportive policies and financial structures aligned with sociocultural values and worldviews.</p>
                          <p class="Body_Box_FAQ_FAQ-Box_body" lang="en-US">Where risks are very high or resources are insufficient to manage risks, submergence or erosion of coastal C&amp;S will be inevitable, requiring &#8216;retreat&#8217; from the coastline. This is the outlook for millions of people in the coming decades, including those living in river deltas, Arctic communities, small islands and low-lying small settlements in poor and wealthy nations. Whilst the impacts of retreat on communities can be devastating, the prospect of many C&amp;S and even whole nations being permanently inundated in the coming centuries underscores the imperative for urgent action.</p>
                          <p class="Body_Box_FAQ_FAQ-Box_body" lang="en-US">Crucial to making choices about how to mitigate greenhouse gas emissions and adapt to climate change in coastal C&amp;S is to establish institutions and governance practices supporting climate resilient development&#8212;a mix and sequence of mitigation and adaptation actions&#8212;that are fair, just and inclusive as well as technically and economically effective across successive generations.</p>
                        </div>
                        <h2 class="Body_Box_FAQ_FAQ-Box_subhead" lang="en-GB">FAQ CCP2.3  | Considering the wide-ranging and interconnected climate and development challenges coastal cities and settlements face, how can more climate resilient development pathways be enabled?<span class="arrow-up"/><span class="arrow-down"/><span class="share-block"><img class="share-icon" src="../../share.png"/></span></h2>
                        <div class="h2-siblings" id="h2-15-siblings">
                          <p class="Body_Box_FAQ_FAQ-Box_body" lang="en-US">
                            <span class="condensed_italic" lang="">Coastal cities and settlements (C&amp;S) are on the frontline of the climate change challenge. They are the interface of three interconnected realities. First, they are critical nodes of global trade, economic activity and coast-dependent livelihoods, all of which are highly and increasingly exposed to climate- and ocean-driven hazards (FAQ CCP2.1). Second, coastal C&amp;S are also sites where some of the most pressing development challenges are at play (e.g., trade-offs between expanding critical built infrastructure while protecting coastal ecosystems, high economic growth coupled with high inequality in some coastal megacities). Third, coastal C&amp;S are also centres of innovation and creativity, thus presenting a tremendous opportunity for climate action through a range of infrastructural, nature-based, institutional and behavioural solutions (FAQ CCP2.2). Given these three realities of high climate change risks, rapid but contested and unequal development trajectories, and high potential for innovative climate action, C&amp;S are key to charting pathways for climate resilient development (CRD). </span>
                          </p>
                          <p class="Body_Box_FAQ_FAQ-Box_body" lang="en-US">Three key levers can enable pathways that are climate resilient and meet goals of inclusive, sustainable development. One key enabler involves flexible, proactive, and transparent governance systems, built on a bedrock of accountable local leadership, evidence-based decision-making&#8212;even under uncertainty&#8212;and inclusive institutions that consider different stakeholder voices and knowledge systems. Another key enabler is acknowledging the sociocultural and psychological barriers to climate action and incentivising people to change to lifestyles and behaviours that are pro-climate and aligned with community-oriented values and norms. In practice, coastal C&amp;S are experimenting with different strategies to change practices and behaviours, such as using subsidies and zoning policies, tax rebates and public awareness campaigns to promote individual and collective action. Finally, enabling CRD needs dedicated short- and long-term financing to reorient current trajectories of unsustainable and unequal development towards climate mitigation and adaptation action that reduces current and predicted losses and damages, especially in highly vulnerable coasts such as the small island states, the Arctic and low-lying C&amp;S. Currently, adaptation finance is concentrated in coastal megacities and tends to be deployed for risk-proofing high-value waterfront properties or key infrastructures. Addressing these financial imbalances (globally, regionally and sub-nationally) remains a critical barrier to inclusive climate resilient coastal development.</p>
                          <p class="Body_Box_FAQ_FAQ-Box_body" lang="en-US">Notwithstanding the many interconnected challenges faced, from more frequent and intense extreme events to the COVID-19 pandemic, many coastal C&amp;S are experimenting with ways to pivot towards CRD. Critical enablers have been identified and lesson learned, which, if translated into practice, will enhance the prospects for advancing the SDGs and charting pathways for CRD that are appropriate to local contexts and foster human well-being and planetary health.</p>
                        </div>
                      </div>

                            <p class="Body_Footnotes" lang="en-US"><a class="_idFootnoteAnchor _idGenColorInherit" href="ccp2.html#footnote-002-backlink">1</a> In this report, the following summary terms are used to describe the available evidence: <span class="light_condensed_italic" lang="">limited</span>, <span class="light_condensed_italic" lang="">medium</span> or <span class="light_condensed_italic" lang="">robust </span>; and for the degree of agreement: <span class="light_condensed_italic" lang="">low</span>, <span class="light_condensed_italic" lang="">medium</span> or <span class="light_condensed_italic" lang="">high</span>. A level of confidence is expressed using five qualifiers: <span class="light_condensed_italic" lang="">very low</span>, <span class="light_condensed_italic" lang="">low</span>, <span class="light_condensed_italic" lang="">medium</span>, <span class="light_condensed_italic" lang="">high</span> and <span class="light_condensed_italic" lang="">very high</span>. The terms expressing evidence, agreement and confidence are typeset in italics (e.g., <span class="light_condensed_italic" lang="">medium confidence</span>, also <span class="light_condensed_italic" lang="">medium to high confidence</span>, <span class="light_condensed_italic" lang="">robust evidence</span>, <span class="light_condensed_italic" lang="">low agreement </span>). For a given evidence and agreement statement, different confidence levels can be assigned, but increasing levels of evidence and degrees of agreement are correlated with increasing confidence.</p>
                          </div>
                          <div class="_idFootnote" id="footnote-001">
                            <p class="Body_Footnotes" lang="en-US"><a class="_idFootnoteAnchor _idGenColorInherit" href="ccp2.html#footnote-001-backlink">2</a> In this report, the following terms have been used to indicate the assessed likelihood of an outcome or a result: <span class="light_condensed_italic" lang="">virtually certain</span>99&#8211;100% probability, <span class="light_condensed_italic" lang="">very likely </span>90&#8211;100%, <span class="light_condensed_italic" lang="">likely </span>66&#8211;100%, <span class="light_condensed_italic" lang="">about as likely  as not </span>33&#8211;66%, <span class="light_condensed_italic" lang="">unlikely </span>0&#8211;33%, <span class="light_condensed_italic" lang="">very unlikely </span>0&#8211;10% and <span class="light_condensed_italic" lang="">exceptionally unlikely </span>0&#8211;1%. Additional terms (<span class="light_condensed_italic" lang="">extremely likely </span>95&#8211;100%, <span class="light_condensed_italic" lang="">more likely  than not </span>&gt;50&#8211;100% and <span class="light_condensed_italic" lang="">extremely unlikely </span>0&#8211;5%) may also be used when appropriate. Assessed likelihood is typeset in italics (e.g., <span class="light_condensed_italic" lang="">very likely </span>). This report also uses the term &#8216;<span class="light_condensed_italic" lang="">likely </span> range&#8217; to indicate that the assessed likelihood of an outcome lies within the 17&#8211;83% probability range.</p>
                          </div>
                          <div class="_idFootnote" id="footnote-000">
                            <p class="Body_Footnotes" lang="en-US"><a class="_idFootnoteAnchor _idGenColorInherit" href="ccp2.html#footnote-000-backlink">3</a> Nudges are interventions or conditions that steer people towards better choices while retaining freedom of choice. Boosts improve decision-making by creating new competencies or improving existing ones.</p>
