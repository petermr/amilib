                          <p class="Body_Body-justify" lang="en-GB">Raising land, or individual buildings, can avert flooding and be accomplished artificially or by nature-based interventions through river diversion and control in estuarine and deltaic archetypes (<a class="reference-link" href="#Nittrouer--2012">Nittrouer et al., 2012</a>; <a class="reference-link" href="#Auerbach--2015">Auerbach et al., 2015</a>; <a class="reference-link" href="#Day--2016">Day et al., 2016</a>; <a class="reference-link" href="#S&#225;nchez-Arcilla--2016">S&#225;nchez-Arcilla et al., 2016</a>; <a class="reference-link" href="#Hiatt--2019">Hiatt et al., 2019</a>; <a class="reference-link" href="#Cornwall--2021">Cornwall, 2021</a>). Nature-based land elevation is limited by sediment supply and can address SLR rates of up to 10 mm yr&#8211;1 (<a class="reference-link" href="#Kleinhans--2010">Kleinhans et al., 2010</a>; <a class="reference-link" href="#Kirwan--2016">Kirwan et al., 2016</a>; <a class="reference-link" href="#IPCC--2019">IPCC, 2019</a>). It also assumes that existing land-use patterns permit land raising (e.g., in rural or newly developed areas; <a class="reference-link" href="#Scussolini--2017">Scussolini et al., 2017</a>). Artificial land raising can achieve significant elevations and be implemented over a large spatial scale (<a class="reference-link" href="#Esteban--2015">Esteban et al., 2015</a>; <a class="reference-link" href="#Esteban--2019">Esteban et al., 2019</a>). Raising land can be cost beneficial for small areas or where lower safety levels are satisfactory, but protection is usually more economical for larger areas, although both strategies are often combined (<a class="reference-link" href="#Lendering--2020">Lendering et al., 2020</a>).</p>
                          <p class="Body_Body-justify" lang="en-GB">Accommodation measures can be very effective for current conditions and small changes in SLR (<a class="reference-link" href="#Laurice Jamero--2017">Laurice Jamero et al., 2017</a>; <a class="reference-link" href="#Scussolini--2017">Scussolini et al., 2017</a>; <a class="reference-link" href="#Oppenheimer--2019">Oppenheimer et al., 2019</a>; <a class="reference-link" href="#Du--2020">Du et al., 2020</a>; <a class="reference-link" href="#Haasnoot--2021a">Haasnoot et al., 2021a</a>), and buy time to prepare for more significant changes in sea level and other climate-compounded coastal hazards. However, limits to this strategy occur comparatively soon in some locations, possibly requiring protection in the medium term and retreat in the long run and beyond 2100, particularly in scenarios of dramatic SLR (<a class="reference-link" href="#Oppenheimer--2019">Oppenheimer et al., 2019</a>). For the foreseeable future, accommodation can play an important role in combination with protective measures to form hybrid interventions, with higher effectiveness than either approach in isolation (<a class="reference-link" href="#Du--2020">Du et al., 2020</a>). Accommodation can play an increasingly important role where hard protection is neither technically nor financially viable, but detailed studies about expected trends of accommodation are lacking (<a class="reference-link" href="#Oppenheimer--2019">Oppenheimer et al., 2019</a>).</p>
                        </div>
                      </div>
                      <div class="h2-container" id="CCP2.3.4">
                        <h2 class="Headings_H2-numbered" lang="de-DE">CCP2.3.4  Advance <span class="arrow-up"/><span class="arrow-down"/><span class="share-block"><img class="share-icon" src="../../share.png"/></span></h2>
                        <div class="h2-siblings" id="h2-6-siblings">
                          <p class="Body_Body-justify" lang="en-GB">An advance strategy creates new land by building seaward, which can reduce risk for the hinterland and the newly elevated land, either by land reclamation through landfilling or polderisation through planting of vegetation to support natural land accretion (<a class="reference-link" href="#Wang--2014">Wang et al., 2014</a>; <a class="reference-link" href="#Sengupta--2018">Sengupta et al., 2018</a>). Advance has occurred in all archetypes (<span class="condensed_italic" lang="">high confidence</span>), from open coasts (e.g., Singapore) and small atolls (e.g., Hulhumal&#233; in the Maldives; <a class="reference-link" href="#Hinkel--2018">Hinkel et al., 2018</a>; <a class="reference-link" href="#Brown--2020">Brown et al., 2020</a>), to cities on estuaries (e.g., Rotterdam) and deltas (e.g., Shanghai <a class="reference-link" href="#Sengupta--2020">Sengupta et al., 2020</a>), and mountainous coasts (e.g., Hong Kong SAR, China). Earth observations show that between 14,000 and 33,700 km <span class="superscript CharOverride-1" lang="">2</span> of land has been gained in coastal areas over the past 30 years, the dominant drivers being urban development and activities like fish farming (<a class="reference-link" href="#Donchyts--2016">Donchyts et al., 2016</a>; <a class="reference-link" href="#Zhang--2017">Zhang et al., 2017</a>; <a class="reference-link" href="#Mentaschi--2018">Mentaschi et al., 2018</a>). Advancing seawards through large floating structures may be a viable option in the future (<a class="reference-link" href="#Wang--2019">Wang et al., 2019</a>; <a class="reference-link" href="#Setiadi--2020">Setiadi et al., 2020</a>; <a class="reference-link" href="#Wang--2020">Wang and Wang, 2020</a>) but is at an experimental stage, and, so far, only applied in calm water within a city as part of an accommodate strategy (<a class="reference-link" href="#Scussolini--2017">Scussolini et al., 2017</a>; <a class="reference-link" href="#Penning-Rowsell--2020">Penning-Rowsell, 2020</a>; <a class="reference-link" href="#Storbj&#246;rk--2021">Storbj&#246;rk and Hjerpe, 2021</a>).</p>
                          <p class="Body_Body-justify" lang="en-GB">Advance is seen as an attractive option to adapt to SLR in growing cities that are already densely populated and have limited available land for safe development, with a moderate to high adaptive capacity. But advance can have significant negative impacts on coastal ecosystems and livelihoods, requires substantial financial and material resources and time to build, and may be subject to land subsidence (<a class="reference-link" href="#Jeuken--2014">Jeuken et al., 2014</a>; <a class="reference-link" href="#Garschagen--2018">Garschagen et al., 2018</a>; <a class="reference-link" href="#Brown--2019">Brown et al., 2019</a>; <a class="reference-link" href="#NYCEDC--2019">NYCEDC, 2019</a>; <a class="reference-link" href="#Oppenheimer--2019">Oppenheimer et al., 2019</a>; <a class="reference-link" href="#Sengupta--2020">Sengupta et al., 2020</a>; <a class="reference-link" href="#Bendixen--2021">Bendixen et al., 2021</a>).</p>
                        </div>
                      </div>
                      <div class="h2-container" id="CCP2.3.5">
                        <h2 class="Headings_H2-numbered" lang="de-DE">CCP2.3.5  Retreat <span class="arrow-up"/><span class="arrow-down"/><span class="share-block"><img class="share-icon" src="../../share.png"/></span></h2>
                        <div class="h2-siblings" id="h2-7-siblings">
                          <p class="Body_Body-justify" lang="en-GB">Retreat is a strategy to reduce exposure and eventually risks facing coastal C&amp;S by moving people, assets and activities out of coastal hazard zones (<a class="reference-link" href="#Oppenheimer--2019">Oppenheimer et al., 2019</a>). This includes adaptive migration, involuntary displacement and planned relocation of population and assets from the coast (<a class="section-link" data-title="Observed Impacts on Migration" href="/report/ar6/wg2/chapter/chapter-7#7.2.6">Section 7.2.6</a>; Cross-Chapter Box CB-MIGRATE in Chapter 7).</p>
                          <p class="Body_Body-justify" lang="en-GB">Planned relocation in coastal C&amp;S with high hazard exposure and climate impacts is already occurring and has been increasing in frequency (<span class="condensed_italic" lang="">medium confidence</span>; <a class="reference-link" href="#Hino--2017">Hino et al., 2017</a>; <a class="reference-link" href="#Mortreux--2018">Mortreux et al., 2018</a>), with some small islands purchasing land in other countries to facilitate movement (<a class="reference-link" href="#Klepp--2018">Klepp, 2018</a>). In the Arctic, the pressure to relocate away from the coast is expected to rise given the interacting effects of permafrost thaw and coastal erosion. Native villages in Alaska are already relocating (<a class="reference-link" href="#Ristroph--2017">Ristroph, 2017</a>; <a class="reference-link" href="#Ristroph--2019">Ristroph, 2019</a>). Involuntary resettlement may be a secondary effect of large-scale hard coastal protection projects, or inner-city river and canal regulation. In Jakarta, for example, a new giant seawall project involves resettling coastal households along large parts of the coastline (<a class="reference-link" href="#Garschagen--2018">Garschagen et al., 2018</a>).</p>
                          <p class="Body_Body-justify" lang="en-GB">Increased migration is to be expected across different climate scenarios, but there is <span class="condensed_italic" lang="">limited evidence</span> and <span class="condensed_italic" lang="">medium agreement </span> about the scale of climate-induced migration at the coast (<a class="reference-link" href="#Oppenheimer--2019">Oppenheimer et al., 2019</a>; Chapter 16, RKR on peace). Planned relocation is expected to rise in C&amp;S in response to SLR and other coastal hazards (<span class="condensed_italic" lang="">high agreement </span>, <span class="condensed_italic" lang="">medium evidence</span>; <a class="reference-link" href="#Siders--2019">Siders et al., 2019</a>). Relocation has predominantly been reactive to date, but increased attention is being given to pre-emptive resettlement and the potential pathways and necessary governance, finance and institutional arrangements to support this strategy (<a class="reference-link" href="#Ramm--2018">Ramm et al., 2018</a>; <a class="reference-link" href="#Lawrence--2020">Lawrence et al., 2020</a>; <a class="reference-link" href="#Haasnoot--2021a">Haasnoot et al., 2021a</a>). There is <span class="condensed_italic" lang="">limited evidence</span> about the costs of planned relocation and retreat more generally (<a class="reference-link" href="#Oppenheimer--2019">Oppenheimer et al., 2019</a>).</p>
                          <p class="Body_Body-justify" lang="en-GB">Retreat can effectively reduce exposure of urban residents to coastal hazards and provide opportunity for re-establishment of ecosystem services (<span class="condensed_italic" lang="">very high confidence</span>; <a class="reference-link" href="#Song--2018">Song et al., 2018</a>; <a class="reference-link" href="#Carey--2020">Carey, 2020</a>; <a class="reference-link" href="#Hindsley--2020">Hindsley and Yoskowitz, 2020</a>; <a class="reference-link" href="#Lincke--2020">Lincke et al., 2020</a>; <a class="reference-link" href="#Lincke--2021">Lincke and Hinkel, 2021</a>). But there is <span class="condensed_italic" lang="">high confidence</span> that it can sever cultural ties to the coast (<a class="reference-link" href="#Reimann--2018">Reimann et al., 2018</a>) and lead to negative and inequitable socioeconomic effects for resettled communities if not planned and implemented in ways that are inclusive and just and address cultural, place-attachment and livelihood considerations (<a class="reference-link" href="#Ajibade--2019">Ajibade, 2019</a>; <a class="reference-link" href="#Adger--2020">Adger et al., 2020</a>; <a class="reference-link" href="#Carey--2020">Carey, 2020</a>; <a class="reference-link" href="#Jain--2021">Jain et al., 2021</a>; <a class="reference-link" href="#Johnson--2021">Johnson et al., 2021</a>), as well as the rights and practices of Indigenous People (<a class="reference-link" href="#Nakashima--2018">Nakashima et al., 2018</a>; <a class="reference-link" href="#Ristroph--2019">Ristroph, 2019</a>; <a class="reference-link" href="#Mohamed Shaffril--2020">Mohamed Shaffril et al., 2020</a>). If planned well ahead and aligned with social goals, pathways to managed retreat can achieve positive outcomes and provide opportunities for transformation of coastal C&amp;S (<a class="reference-link" href="#Haasnoot--2021a">Haasnoot et al., 2021a</a>; <a class="reference-link" href="#Mach--2021">Mach and Siders, 2021</a>). There is <span class="condensed_italic" lang="">medium confidence</span> that the availability of suitable and affordable land as well as appropriate financing is a major bottleneck for planned relocation (<a class="reference-link" href="#Alexander--2012">Alexander et al., 2012</a>; <a class="reference-link" href="#Ong--2016">Ong et al., 2016</a>; <a class="reference-link" href="#Hino--2017">Hino et al., 2017</a>; <a class="reference-link" href="#Fisher--2019">Fisher and Goodliffe, 2019</a>; <a class="reference-link" href="#Hanna--2019">Hanna et al., 2019</a>; <a class="reference-link" href="#Buser--2020">Buser, 2020</a>; <a class="reference-link" href="#Doberstein--2020">Doberstein et al., 2020</a>), particularly in very dense mega-urban areas (<a class="reference-link" href="#Ajibade--2019">Ajibade, 2019</a>) and crowded small islands (<a class="reference-link" href="#Neise--2019">Neise and Revilla Diez, 2019</a>; <a class="reference-link" href="#Weber--2019">Weber et al., 2019</a>; <a class="reference-link" href="#Kool--2020">Kool et al., 2020</a>; <a class="reference-link" href="#Lincke--2020">Lincke et al., 2020</a>).</p>
                        </div>
                      </div>
                      <div class="h2-container" id="CCP2.3.6">
                        <h2 class="Headings_H2-numbered" lang="de-DE">CCP2.3.6  Adaptation Pathways <span class="arrow-up"/><span class="arrow-down"/><span class="share-block"><img class="share-icon" src="../../share.png"/></span></h2>
                        <div class="h2-siblings" id="h2-8-siblings">
                          <p class="Body_Body-justify" lang="en-GB">No single adaptation intervention comprehensively addresses coastal risks and enables CRD. An adaptation-pathways approach can facilitate long-term thinking, foresee maladaptive consequences and lock-ins, and address dynamic risk in the face of relentless and potentially high SLR; it can also frame adaptation as a series of manageable steps over time (Cross-Chapter Box DEEP in Chapter 17; Figure CCP2.4; <a class="reference-link" href="#Haasnoot--2019">Haasnoot et al., 2019</a>). A portfolio of hard, soft and nature-based interventions can be used to implement strategies to protect, accommodate, retreat and advance, individually or in combination.</p>
                          <div class="Figure" id="_idContainer013">
                            <p class="Body_Figures_Figure" lang="de-DE">
                              <img alt="" class="_idGenObjectAttribute-4" id="figure-ccp2-004" loading="lazy" src="https://ipcc.ch/report/ar6/wg2/downloads/figures/IPCC_AR6_WGII_Figure_CCP2_004.png"/>
                            </p>
                            <p class="Body_Figures_Figure_title" lang="en-US"><span class="figure_number" lang="">Figure CCP2.4  | </span><span class="bold_condensed-dark-blue" lang="">Generic adaptation pathways for coastal cities and settlements (a) and the typical solution space, with illustrative pathways for three coastal archetypes (b). </span>As risk increases under rising sea levels, solutions need to be combined or sequenced in order to contain risk. Pathways involve different trade-offs. Based on Tables SMCCP2.1&#8211;2.3; Chapters 11 and 13; <a class="reference-link" href="#Magnan--2020">Magnan and Duvat (2020)</a>; <a class="reference-link" href="#Lawrence--2020">Lawrence et al. (2020)</a>; <a class="reference-link" href="#Haasnoot--2019">Haasnoot et al. (2019)</a>. Depending on local conditions, archetype and risk tolerance, alternative pathways are needed and possible to contain risk. Dashed lines indicate uncertainty in the pathway (a); dashed and plain borders are used for illustrating various local situations within each archetype (b).</p>
                            <div class="ch-figure-button-cont"><a href="/report/ar6/wg2/figures/chapter-ccp2/figure-ccp2-004" target="_blank"><button class="btn-ipcc btn btn-primary ch-figure-button">Open figure</button></a> </div>
                          </div>
                          <p class="Body_Body-justify" lang="en-GB">The strategy and the portfolio of interventions can be adjusted in response to new information about SLR and other climate risks according to economic, environmental, social, institutional, technical or other objectives. In cases of rapid SLR, it may be necessary to implement a short-term protection strategy to buy time to implement more transformative and enduring strategies (<span class="condensed_italic" lang="">high confidence</span>; <a class="reference-link" href="#Du--2020">Du et al., 2020</a>; <a class="reference-link" href="#Lawrence--2020">Lawrence et al., 2020</a>; <a class="reference-link" href="#Morris--2020">Morris et al., 2020</a>; <a class="reference-link" href="#Haasnoot--2021a">Haasnoot et al., 2021a</a>). There is <span class="condensed_italic" lang="">high agreement </span> that combining and sequencing adaptation interventions can reduce risk over time (<a class="reference-link" href="#Du--2020">Du et al., 2020</a>; <a class="reference-link" href="#Morris--2020">Morris et al., 2020</a>). Phasing interventions can help to spread costs and minimise regret (<a class="reference-link" href="#de Ruig--2019">de Ruig et al., 2019</a>), provided options are kept open to adjust to changing conditions (<a class="reference-link" href="#Buurman--2016">Buurman and Babovic, 2016</a>; <a class="reference-link" href="#Haasnoot--2019">Haasnoot et al., 2019</a>; <a class="reference-link" href="#Hall--2019">Hall et al., 2019</a>).</p>
                          <p class="Body_Body-justify" lang="en-GB">
                            <span lang="en-US">Many megacities plan to continue a protection strategy (Table SMCCP2.1). This becomes increasingly costly, institutionally challenging and requires space, possibly facilitated through local relocation. There is</span>
                            <span class="condensed_italic" lang="en-US">high agreement </span>
                            <span lang="en-US">that many C&amp;S are locked-in to a self-reinforcing pathway: coastal defences have a long lifetime and attract people and assets that require further protection (<a class="reference-link" href="#Gralepois--2016">Gralepois et al., 2016</a>; <a class="reference-link" href="#Bubeck--2017">Bubeck et al., 2017</a>; <a class="reference-link" href="#Welch--2017">Welch et al., 2017</a>; <a class="reference-link" href="#Di Baldassarre--2018">Di Baldassarre et al., 2018</a>; <a class="reference-link" href="#Jongman--2018">Jongman, 2018</a>). Transitioning to alternative pathways may involve major transfer and sunk costs (e.g., <a class="reference-link" href="#Gralepois--2016">Gralepois et al., 2016</a>), but these may prove to be less costly in the long term. Because of considerable inertia in the built form of cities, such transitions have a greater chance of success and alignment with societal goals if embedded early into C&amp;S planning and development processes that enable transformational change and CRD (Sections 6.4.8; 11.7; 13.11; Box 18.1; <a class="reference-link" href="#&#220;rge-Vorsatz--2018">&#220;rge-Vorsatz et al., 2018</a>; Siders 2019b). </span>
                          </p>
                          <p class="Body_Body-justify" lang="en-GB">In islands, hybrid options of nature-based (where space and environmental conditions allow) and protection measures (on wealthy, already densely populated islands) could reduce risk for low SLR in the next few decades (<a class="section-link" data-title="Assessment of Adaptation Options and Their Implementation" href="/report/ar6/wg2/chapter/chapter-15#15.5">Section 15.5</a>). Where feasible, retreat is a compelling option to reduce risk (Figure CCP2.4). With higher rates and levels of SLR in the medium to long term, financial, governance and material barriers may differentiate resource-rich and more rural islands, leading to a dichotomy between which islands retreat or can rely on protection for a period of time.</p>
                        </div>
                      </div>
                    </div>
                    <div class="h1-container" id="CCP2.4">
                      <h1 class="Headings_H1-numbered" lang="en-GB">CCP2.4  Enabling Conditions and Lessons Learned <span class="share-block"><img class="share-icon" src="../../share.png"/></span><button class="btn-ipcc btn btn-primary chapter-expand">Expand section</button></h1>
                      <div class="h1-siblings" id="h1-5-siblings">
                        <p class="Body_Body-justify" lang="en-GB">Here we distil enabling conditions and lessons learned from C&amp;S archetypes adapting to coastal risk (Table SMCCP2.1; Table SMCCP2.2; Sections 6.4; 9.9.4; 10.5; 10.6; 11.7; 11.8; 12.5.5; 13.6.2; 14.7.2; 15.6).</p>
                      </div>
                      <div class="h2-container" id="CCP2.4.1">
                        <h2 class="Headings_H2-numbered" lang="de-DE">CCP2.4.1  Enabling Behavioural Change <span class="arrow-up"/><span class="arrow-down"/><span class="share-block"><img class="share-icon" src="../../share.png"/></span></h2>
                        <div class="h2-siblings" id="h2-9-siblings">
                          <p class="Body_Body-justify" lang="en-GB">Changing behaviours and practices are a critical enabler of adaptation in coastal C&amp;S. Behavioural enablers include using economic, informational, sociocultural and psychological incentives to motivate adaptation actions (<a class="reference-link" href="#van Valkengoed--2019">van Valkengoed and Steg, 2019</a>; <a class="reference-link" href="#Gibbs--2020">Gibbs, 2020</a>), for example leveraging Indigenous knowledge and local knowledge (IKLK) and religious beliefs to incentivise adaptation (<a class="reference-link" href="#Hiwasaki--2014">Hiwasaki et al., 2014</a>; <a class="reference-link" href="#Ford--2015">Ford et al., 2015</a>), implementing subsidies/bans to incentivise sustainable aquaculture (<a class="reference-link" href="#Condie--2014">Condie et al., 2014</a>; <a class="reference-link" href="#Krause--2020">Krause et al., 2020</a>), providing localised flood warnings and forecasts to inform individual risk perceptions and risk management (<a class="reference-link" href="#Bruine de Bruin--2014">Bruine de Bruin et al., 2014</a>; <a class="reference-link" href="#Gibbs--2020">Gibbs, 2020</a>) or incentivise risk insurance (<a class="reference-link" href="#Bradt--2019">Bradt, 2019</a>).</p>
                          <p class="Body_Body-justify" lang="en-GB">There is <span class="condensed_italic" lang="">high evidence</span> with <span class="condensed_italic" lang="">medium agreement </span> that public attitudes and perceptions of climate risks significantly influence individual adaptation behaviour across all coastal archetypes (<a class="reference-link" href="#Bradt--2019">Bradt, 2019</a>; <a class="reference-link" href="#Buchanan--2019">Buchanan et al., 2019</a>; <a class="reference-link" href="#Javeline--2019">Javeline et al., 2019</a>). Information on climate risks and impacts (e.g., flood warnings, SLR projections) strongly shapes public perceptions of climate risks. It is most effective at incentivising and enabling adaptation behaviour if provided on meaningful spatial and temporal scales, with guidance about how to interpret the information (<span class="condensed_italic" lang="">medium evidence</span>, <span class="condensed_italic" lang="">high agreement </span>; <a class="reference-link" href="#Gibbs--2020">Gibbs, 2020</a>; <a class="reference-link" href="#Cools--2016">Cools et al., 2016</a>). Further, there is <span class="condensed_italic" lang="">medium evidence</span>, <span class="condensed_italic" lang="">high agreement </span> that integrating climate information with existing knowledge systems, such as local norms and beliefs and IKLK, is critical to improve public acceptability and develop context-specific solutions (<a class="reference-link" href="#Ford--2015">Ford et al., 2015</a>).</p>
                          <p class="Body_Body-justify" lang="en-GB">A second key enabler of coastal adaptation behaviour is self-efficacy or belief in one&#8217;s capacity to undertake adaptation. There is <span class="condensed_italic" lang="">medium evidence</span>, <span class="condensed_italic" lang="">high agreement </span> that high risk perception is in itself insufficient to motivate people to undertake adaptation (<a class="reference-link" href="#Fox-Rogers--2016">Fox-Rogers et al., 2016</a>; <a class="reference-link" href="#Roder--2019">Roder et al., 2019</a>; <a class="reference-link" href="#Gibbs--2020">Gibbs, 2020</a>) and needs to be supplemented with supportive policy and financial provisions to enable adaptation (<a class="reference-link" href="#Fox-Rogers--2016">Fox-Rogers et al., 2016</a>).</p>
                          <p class="Body_Body-justify" lang="en-GB">Third, there is <span class="condensed_italic" lang="">medium evidence</span> on how trust in state-led, planned adaptation measures can hinder or enable individual adaptation (<a class="reference-link" href="#van Valkengoed--2019">van Valkengoed and Steg, 2019</a>; <a class="reference-link" href="#Schneider--2020">Schneider et al., 2020</a>). As an enabler, trust in early warnings can mitigate flood risk by incentivising evacuation (<a class="reference-link" href="#Binh--2020">Binh et al., 2020</a>) and high trust can help overcome uncertainty attached to projected climate impacts and/or adaptation decisions (<a class="reference-link" href="#Frederiksen--2014">Frederiksen, 2014</a>). As a barrier, low trust can disincentivise adaptation, for example willingness to pay for flood insurance (<a class="reference-link" href="#Roder--2019">Roder et al., 2019</a>) or public support for managed retreat (<a class="reference-link" href="#Hanna--2020">Hanna et al., 2020</a>). Paradoxically, high trust in existing adaptation measures can reduce people&#8217;s perceived need for ongoing adaptation (e.g., levees potentially reducing individual flood-proofing actions). Adaptation decisions also manifest &#8216;single-action bias&#8217;, with modest cost-adaptation actions in the present disincentivising further adaptation (<a class="reference-link" href="#Buchanan--2019">Buchanan et al., 2019</a>).</p>
                          <p class="Body_Body-justify" lang="en-GB">Several tools to incentivise adaptation behaviour are being tested around the world. For example, nudges and boosts <span class="superscript _idGenCharOverride-1" lang=""><span id="footnote-000-backlink"><a class="_idFootnoteLink _idGenColorInherit" href="ccp2.html#footnote-000">3</a> </span></span> are being experimented with to shape individual risk beliefs and the demand for flood insurance (<a class="reference-link" href="#Bradt--2019">Bradt, 2019</a>); ordinances are being used to ban, authorise or limit certain activities (<a class="reference-link" href="#Herrick--2018">Herrick, 2018</a>); subsidies and financial support are being used to incentivise adaptation such as subsidised beach nourishment (<a class="reference-link" href="#McNamara--2015">McNamara et al., 2015</a>); and zoning restrictions and building codes restrict or guide climate-resilient infrastructural development (<a class="reference-link" href="#Schneider--2020">Schneider et al., 2020</a>). Overall, the literature affirms that behavioural interventions are more readily taken up if they are aligned with cultural practices, norms and beliefs; are on temporal scales within peoples&#8217; planning horizons; and if they build upon relationships of trust and legitimacy (<a class="reference-link" href="#Donner--2014">Donner and Webber, 2014</a>; <a class="reference-link" href="#Herrick--2018">Herrick, 2018</a>; <a class="reference-link" href="#Schneider--2020">Schneider et al., 2020</a>).</p>
                        </div>
                      </div>
                      <div class="h2-container" id="CCP2.4.2">
                        <h2 class="Headings_H2-numbered" lang="de-DE">CCP2.4.2  Finance <span class="arrow-up"/><span class="arrow-down"/><span class="share-block"><img class="share-icon" src="../../share.png"/></span></h2>
                        <div class="h2-siblings" id="h2-10-siblings">
                          <p class="Body_Body-justify" lang="en-GB">Lack of financial resources is a key constraint affecting all coastal archetypes (<span class="condensed_italic" lang="">high confidence</span>; Table SMCCP2.2). Adaptation to coastal hazards is costly: the global costs of protecting coastal areas with levees (annual investment and maintenance costs) are estimated at USD 12&#8211;71 billion for 2100 with SLR up to 1.2 m (<a class="reference-link" href="#Hinkel--2014">Hinkel et al., 2014</a>). Broadly speaking, it is cost effective to contain coastal hazard risk in the short to medium term in densely populated wealthy localities by using protective works, but such measures are unaffordable in dispersed poorer coastal C&amp;S (<a class="reference-link" href="#Lincke--2018">Lincke and Hinkel, 2018</a>).</p>
                          <p class="Body_Body-justify" lang="en-GB">Archetypes with high adaptive capacity may currently have financial resources to meet adaptation needs, but such funding may be unsustainable in the long term. In Catalonia, while public funds are currently used to finance beach nourishment, these costs will increase with SLR and it is unclear whether public finance will remain a feasible source (<a class="reference-link" href="#Hinkel--2018">Hinkel et al., 2018</a>). Even in relatively richer municipalities, financing adaptation is constrained by other urban priorities (<a class="reference-link" href="#Bisaro--2018">Bisaro and Hinkel, 2018</a>). In Europe, shifting responsibilities from national governments to transnational and local actors has resulted in reduced national budgets for coastal adaptation investment and increased pressure on local authorities to raise public funds for adaptation without alienating electoral bases (<a class="reference-link" href="#Bisaro--2018">Bisaro and Hinkel, 2018</a>).</p>
                          <p class="Body_Body-justify" lang="en-GB">Locations in the Global South have limited public budgets allocated to coastal adaptation and may rely on international donor aid (<a class="reference-link" href="#Donner--2016">Donner et al., 2016</a>; <a class="reference-link" href="#Araos--2017">Araos et al., 2017</a>). Such aid is often inconsistent and short term, which limits long-term maintenance of the knowledge, equipment and infrastructure needed to sustain adaptation measures beyond initial funding periods (<a class="reference-link" href="#Weiler--2018">Weiler et al., 2018</a>; <a class="reference-link" href="#Thomas--2020">Thomas et al., 2020</a>), with resultant negative consequences in places as different as Kiribati (<a class="reference-link" href="#Donner--2014">Donner and Webber, 2014</a>) and Bangladesh (<a class="reference-link" href="#Hinkel--2018">Hinkel et al., 2018</a>). Donor-funded adaptation programs aimed at promoting behavioural change, for example through coastal planning or new decision-making systems, require enduring training and institutional capacity, which is difficult to upkeep after aid is depleted. Donor funding is often project based and there are few avenues available to fund the additional permanent and long-term staff needed to bolster climate change institutions. Without funding to support additional staff, existing institutions often lack the human capacity and resources needed for coastal adaptation (<a class="reference-link" href="#Ziervogel--2014">Ziervogel and Parnell, 2014</a>).</p>
                          <p class="Body_Body-justify" lang="en-GB">C&amp;S in the Global South also face financial challenges in addressing loss and damage due to climate-induced slow-onset and extreme events. Financial support to address both quantifiable damages and non-economic losses through measures such as climate-resilient reconstruction after extreme weather events as well as national and local-level emergency contingency funds are lacking, which has been an issue of contention in international policy arenas (<a class="reference-link" href="#Bahinipati--2017">Bahinipati et al., 2017</a>; <a class="reference-link" href="#Wewerinke-Singh--2020">Wewerinke-Singh and Salili, 2020</a>; <a class="reference-link" href="#Martyr-Koller--2021">Martyr-Koller et al., 2021</a>).</p>
                          <p class="Body_Body-justify" lang="en-GB">While coastal adaptation has largely been viewed as the responsibility of governments, private finance is increasingly recognised as necessary to help close the coastal adaptation funding gap (<a class="reference-link" href="#Ware--2020">Ware and Banhalmi-Zakar, 2020</a>). Financial arrangements for coastal adaptation measures that align public-actor and private-investor interests are suitable for a range of budgets, from USD 10,000 to 100 million (<a class="reference-link" href="#Bisaro--2018">Bisaro and Hinkel, 2018</a>). Private equity instruments that involve real estate development companies have already been successfully implemented and are most effective in urban areas with high-value real estate development (<a class="reference-link" href="#Chiang--2017">Chiang and Ling, 2017</a>). Public&#8211;private partnership equity instruments that engage construction and real estate developers have been successful for small- to medium-scale infrastructural projects. While public&#8211;private partnership bonds and public bonds have the potential to align public actors and private investors, such instruments require de-risking of coastal adaptation through enabling economic policy instruments, such as concessional loans (<a class="reference-link" href="#Bisaro--2018">Bisaro and Hinkel, 2018</a>).</p>
                          <p class="Body_Body-justify" lang="en-GB">Explicitly identifying the benefits, or goods and services, that are provided by coastal adaptation is critical to supplement limited government funds and engage a broader set of financial tools and actors (<a class="reference-link" href="#Woodruff--2020">Woodruff et al., 2020</a>). Matching goods and services provided by particular adaptation strategies to specific beneficiaries helps to identify the range of fair and equitable financial tools. In the Netherlands, public fundings through state, regional and local entities have independent tax revenue systems to provide the funding needed to maintain flooding infrastructure (<a class="reference-link" href="#Hinkel--2018">Hinkel et al., 2018</a>).</p>
                          <p class="Body_Body-justify" lang="en-GB">Given the high costs of coastal adaptation, benefit-to-cost ratios (BCR) are often used to determine the value of investing in adaptation. BCR are high for urbanised coastal areas with high concentrations of assets (13% of the world&#8217;s coastline), covering 90% of the global coastal floodplain population and 96% of assets in the global coastal floodplain (<a class="reference-link" href="#Lincke--2018">Lincke and Hinkel, 2018</a>). A global assessment shows a BCR for investing in flood protection of up to ~120 (<a class="reference-link" href="#Tiggeloven--2020">Tiggeloven et al., 2020</a>). For Europe, at least 83% of flood damages could be avoided by elevating dikes along ~23&#8211;32% of Europe&#8217;s coastline and BCR vary from 8.3 to 14.9, with higher ratios for higher concentration pathways (<a class="section-link" data-title="Water" href="/report/ar6/wg2/chapter/chapter-13#13.2">Section 13.2</a>; <a class="reference-link" href="#Vousdoukas--2020a">Vousdoukas et al., 2020a</a>). Globally, 40% of damages can be reduced with levees of 1 m and costs lower than avoided damage (<a class="reference-link" href="#Tamura--2019">Tamura et al., 2019</a>). For a mix of expensive storm surge barriers, nature-based solutions and flood-proofing measures for New York City, <a class="reference-link" href="#Aerts--2014">Aerts et al. (2014)</a>  found BCRs &lt;1 for the current situation, but &gt;2 for a SLR scenario of +1 m.</p>
                          <p class="Body_Body-justify" lang="en-GB">However, BCR values may be low and adaptation investment may not be financially viable for small coastal settlements, less densely populated poorer coasts or isolated communities <span class="condensed_italic" lang=""> (medium confidence). </span>Considering BCRs of protection and coastal migration across a range of SLR and Shared Socioeconomic Pathways (SSP) scenarios for the 21st century, a higher BCR was found for protection of only 3% of the global coastline protecting 78% of the coastal population and 92% of global coastal floodplain assets, while for the remaining coasts, coastal migration was estimated to be optimal in terms of economic costs (<a class="reference-link" href="#Lincke--2021">Lincke and Hinkel, 2021</a>). Considering coastal migration as part of the solution space could lower global costs in investment and maintenance for SLR protection by a factor of 2&#8211;4 in the 21st century, but would result in large land losses and high levels of migration for South and Southeast Asia in particular, and in relative terms, small island nations would suffer most. The need to consider place attachment, community relationships, livelihoods and the spiritual and cultural significance of settlements limits the application of BCR as a tool for coastal adaptation decisions in these contexts (<a class="reference-link" href="#Thomas--2020">Thomas and Benjamin, 2020</a>). Moreover, there is limited knowledge on trade-offs, including BCR, of alternative adaptation options and pathways at a global to regional scale, in particular over the long term (beyond 2100).</p>
                          <p class="Body_Body-justify" lang="en-GB">Even where BCR is high, finance may be inaccessible, as it is challenging to convert the long-term benefits of adaptation into the revenue streams that may be needed to initially finance adaptation investments (<a class="reference-link" href="#Hinkel--2018">Hinkel et al., 2018</a>). For example, in Ho Chi Minh City, Vietnam, despite high BCR, high costs of flood protection (USD 1.4&#8211;2.6 billion) have prevented such adaptation measures from being implemented (<a class="reference-link" href="#Hinkel--2018">Hinkel et al., 2018</a>; <a class="reference-link" href="#Cao--2021">Cao et al., 2021</a>). Moreover, drawing from places as distinct as small communities in Fiji (<a class="reference-link" href="#Neef--2018">Neef et al., 2018</a>) and Belize (<a class="reference-link" href="#Karlsson--2015">Karlsson and Hovelsrud, 2015</a>), and megacities like New York City and Shanghai (<a class="reference-link" href="#Oppenheimer--2019">Oppenheimer et al., 2019</a>), BCR provides only a limited view and consideration of feasibility, effectiveness, efficiency, equity, culture, politics and power, and attachment to place has a greater chance of fostering CRD (<span class="condensed_italic" lang="">high confidence</span>).</p>
                        </div>
                      </div>
                      <div class="h2-container" id="CCP2.4.3">
                        <h2 class="Headings_H2-numbered" lang="de-DE">CCP2.4.3  Governance <span class="arrow-up"/><span class="arrow-down"/><span class="share-block"><img class="share-icon" src="../../share.png"/></span></h2>
                        <div class="h2-siblings" id="h2-11-siblings">
                          <p class="Body_Body-justify" lang="en-GB">An array of climatic and non-climatic perils (<a class="reference-link" href="#Le Cozannet--2017">Le Cozannet et al., 2017</a>) present coastal communities and their governing authorities with immense governance and institutional challenges that will become progressively more difficult as sea level rises (<span class="condensed_italic" lang="">high confidence</span>; <a class="reference-link" href="#Wallace--2017">Wallace, 2017</a>; <a class="reference-link" href="#Leal Filho--2018">Leal Filho et al., 2018</a>; <a class="reference-link" href="#Oppenheimer--2019">Oppenheimer et al., 2019</a>). Yet a study of public provisions for coastal adaptation in 136 of the largest coastal port&#8211;urban agglomerations across 68 countries found no policy implementation in 50% of the cases; in 85% of cases, adaptation actions are not framed by current impacts or future risks, and formal efforts are recent and concentrated in more developed settings (<a class="reference-link" href="#Olazabal--2019">Olazabal et al., 2019</a>; <a class="reference-link" href="#Olazabal--2021">Olazabal and Ruiz De Gopegui, 2021</a>), thus underscoring a persistent coastal adaptation gap. Translating these challenges into enabling governance conditions is difficult, but instructive lessons are being learned and are summarised (from Table SMCCP2.4) for archetypal C&amp;S in Tables CCP2.1  and 2.2.</p>
                          <p class="Body_Body-justify" lang="en-GB">We start with a synopsis of governance settings within which coastal adaptation and CRD choices are made, and spotlight factors hindering and enabling translation of adaptation into practice. Then, building upon and extending the SROCC analysis of enablers and lessons learned in responding to SLR (<a class="reference-link" href="#Oppenheimer--2019">Oppenheimer et al., 2019</a>), we assess key governance challenges, related enablers and lessons learned (Tables CCP2.1, Section CCP2.2).</p>
                          <p class="Body_Body-justify" lang="en-GB">Governance arrangements and practices are embedded in the sociopolitical and institutional fabric of coastal C&amp;S<span class="condensed_italic" lang="">. </span>Consequently, barriers and enablers for adapting to climate change at the coast and charting pathways for CRD reflect more general constraints and opportunities (<span class="condensed_italic" lang="">high confidence</span>; <a class="reference-link" href="#Meerow--2017">Meerow, 2017</a>; <a class="reference-link" href="#Rocle--2018">Rocle and Salles, 2018</a>; <a class="reference-link" href="#Rosendo--2018">Rosendo et al., 2018</a>; <a class="reference-link" href="#Di Giulio--2019">Di Giulio et al., 2019</a>; <a class="reference-link" href="#H&#246;lscher--2019">H&#246;lscher et al., 2019</a>; <a class="reference-link" href="#Van Assche--2020">Van Assche et al., 2020</a>; <a class="reference-link" href="#Williams--2020">Williams et al., 2020</a>). Local-level action is often constrained: 231 cities in the USA report weak leadership, lack of funding and staffing, and low political will (<a class="reference-link" href="#Fu--2020">Fu, 2020</a>). A meta-analysis of coastal municipal planning documents in Australia shows that few localities have moved beyond risk assessment (<a class="reference-link" href="#Bradley--2015">Bradley et al., 2015</a>). Coastal C&amp;S tend to prefer strategies that protect and accommodate existing coastline assets in the sense of a &#8216;fix and forget&#8217; approach (<a class="reference-link" href="#Gibbs--2015">Gibbs, 2015</a>), rather than enduring proactive adaptation (<a class="reference-link" href="#Cooper--2014">Cooper and Pile, 2014</a>).</p>
                          <p class="Body_Body-justify" lang="en-GB">Many C&amp;S, especially in the Global South, already face high exposure to coastal risks and development constraints associated with poverty and socioeconomic inequality, lack of transparent resource allocation mechanisms and low political will (<span class="condensed_italic" lang="">high confidence</span>; <a class="reference-link" href="#Di Giulio--2019">Di Giulio et al., 2019</a>; <a class="reference-link" href="#Nagy--2019">Nagy et al., 2019</a>; <a class="reference-link" href="#Pasquini--2020">Pasquini, 2020</a>; <a class="reference-link" href="#Lehmann--2021">Lehmann et al., 2021</a>)<span class="condensed_italic" lang="">. </span>Research from across South America notes inadequate regulatory frameworks, missing data and information, widespread coastal ecosystem degradation and complex interactions between natural disasters and civil conflict (<a class="reference-link" href="#Villamizar--2017">Villamizar et al., 2017</a>; <a class="reference-link" href="#Nagy--2019">Nagy et al., 2019</a>). Coastal climate risks in the Global South are often compounded by ongoing land-use management conflicts and other pressures including informal land uses, unregulated and/or inadequate infrastructure/building development, public health priorities such as combating Dengue fever, inadequate income diversification, low education levels and political marginalization of communities historically not represented in the urban development process (<a class="reference-link" href="#Barbi--2014">Barbi and Ferreira, 2014</a>; <a class="reference-link" href="#Salik--2015">Salik et al., 2015</a>; <a class="reference-link" href="#Cabral--2017">Cabral et al., 2017</a>; <a class="reference-link" href="#Goh--2019">Goh, 2019</a>). There are also entrenched socioeconomic inequalities leading to the maldistribution of adaptation actions and benefits in the Global North (<a class="reference-link" href="#Gould--2018">Gould and Lewis, 2018</a>; <a class="reference-link" href="#Keenan--2018">Keenan et al., 2018</a>; <a class="reference-link" href="#Ranganathan--2019">Ranganathan and Bratman, 2019</a>; <a class="reference-link" href="#Yumagulova--2020">Yumagulova, 2020</a>; <a class="reference-link" href="#Long--2021">Long et al., 2021</a>).</p>
                          <p class="Body_Body-justify" lang="en-GB">To address the myriad governance challenges attributed to low awareness, low skills, scalar mismatches, and high socioeconomic inequality and coastal vulnerability, post-AR5 research highlights enablers of more innovative approaches to bridge capacity, policy and financial deficits (<a class="reference-link" href="#Reiblich--2019">Reiblich et al., 2019</a>), and facilitate more proactive implementation of coastal adaptation actions (Table SMCCP2.2; <a class="reference-link" href="#Fu--2020">Fu, 2020</a>). A survey of NGOs, state and local government across Alaska, Florida and Maryland in the USA found that perceived risk, uncertainty and trust in support for climate adaptation varied across two stages of adaptation, that is between support for the development of plans and willingness to allocate human and financial resources to implement plans (<a class="reference-link" href="#Kettle--2016">Kettle and Dow, 2016</a>). To bridge this gap, <a class="reference-link" href="#Cinner--2018">Cinner et al. (2018)</a>  suggest the need to build capacity across five domains: the assets that people can draw upon in times of need; the flexibility to change strategies and interventions; the ability to organise and act collectively; learning to recognise and respond to change (especially as important thresholds are approached); and the agency to determine whether to change or not, and to then take prudent action.</p>
                          <p class="Body_Body-justify" lang="en-GB">Effective and accountable local leadership can help to mobilise capacities, resources and climate awareness within coastal C&amp;S. Strong leadership is associated with agenda-setting authorities and the ability to navigate complex institutional interests towards more strategic planning efforts (<span class="condensed_italic" lang="">high confidence</span>; <a class="reference-link" href="#Ferguson--2013">Ferguson et al., 2013</a>; <a class="reference-link" href="#Anguelovski--2014">Anguelovski et al., 2014</a>; <a class="reference-link" href="#Chu--2017">Chu et al., 2017</a>; <a class="reference-link" href="#Valdivieso--2018">Valdivieso and Andersson, 2018</a>; <a class="reference-link" href="#Fink--2019">Fink, 2019</a>; <a class="reference-link" href="#Ndebele-Murisa--2020">Ndebele-Murisa et al., 2020</a>). Policy leadership can positively influence the motivation and initiative of municipal officers (<a class="reference-link" href="#Lassa--2014">Lassa and Nugraha, 2014</a>; <a class="reference-link" href="#Wijaya--2020">Wijaya et al., 2020</a>), whilst local leadership is needed integrate coastal management, disaster management and climate adaptation mandates (<a class="reference-link" href="#Rosendo--2018">Rosendo et al., 2018</a>).</p>
                          <p class="Body_Body-justify" lang="en-GB">Inclusive decision-making arrangements can enable participation, local ownership, and further equity in crafting coastal adaptation plans and policies (<a class="reference-link" href="#Chu--2016">Chu et al., 2016</a>). Inclusion of diverse stakeholders can help improve awareness of adaptation needs; help to bridge existing social inequalities in decision-making about adaption needs, options and outcomes; close the gap between formal and informal institutions and engage indigenous forms of decision-making, which often associate climate risks with livelihood, housing and employment stressors (<a class="reference-link" href="#Ziervogel--2016">Ziervogel et al., 2016</a>; <a class="reference-link" href="#Fayombo--2020">Fayombo, 2020</a>). For example, research from Pacific island states (<a class="reference-link" href="#Nunn--2017">Nunn et al., 2017</a>) and coastal Arctic zones (<a class="reference-link" href="#Romero Manrique--2018">Romero Manrique et al., 2018</a>) highlights the need to engage with indigenous environmental knowledge. Case studies from Indonesia, the Philippines and Timor-Leste show that Indigenous knowledge and local knowledge and customary laws can support environmental awareness, strengthen social cohesion and help communities to better respond to climate impacts (<a class="reference-link" href="#Hiwasaki--2015">Hiwasaki et al., 2015</a>). Research from coastal Cambodia shows that inclusive governance arrangements can target empowerment of the most vulnerable groups to facilitate better adaptation behaviour and mainstream adaption knowledge through both formal and informal education at the community level (<a class="reference-link" href="#Ung--2016">Ung et al., 2016</a>).</p>
                          <p class="Body_Body-justify" lang="en-GB">The law is key to governing climate risks in C&amp;S, including regulating exposure to coastal hazards; facilitating accountable decision-making; funding arrangements, liabilities and resolving disputes; and also for securing human rights (<span class="condensed_italic" lang="">high confidence</span>; <a class="reference-link" href="#Setzer--2019">Setzer and Vanhala, 2019</a>; <a class="reference-link" href="#Averill--2020">Averill, 2020</a>). However, it has limits and can be both an adaptation enabler and barrier (<a class="reference-link" href="#Green--2015">Green et al., 2015</a>; <a class="reference-link" href="#Cosens--2017">Cosens et al., 2017</a>; <a class="reference-link" href="#Craig--2017">Craig et al., 2017</a>; <a class="reference-link" href="#DeCaro--2017">DeCaro et al., 2017</a>). Contemporary legal practice has not enabled effective adaptation in part because SLR affects compensable property rights that are secured by the law, and which generally trump concerns about public safety, resilience and sustainability (<a class="reference-link" href="#Reiblich--2019">Reiblich et al., 2019</a>). Private property rights can be used as both a sword and a shield to privilege dominant interests by undermining land use policies, plans and implementation efforts intended to promote integrated coastal management and risk reduction (<a class="reference-link" href="#O&#8217;Donnell--2019">O&#8217;Donnell et al., 2019</a>; <a class="reference-link" href="#Reiblich--2019">Reiblich et al., 2019</a>). Climate change litigation has proliferated over the past decade (<a class="reference-link" href="#Setzer--2019">Setzer and Vanhala, 2019</a>), addressing, among other things, failures to prepare for or adapt to climate change, and to secure human rights (<a class="reference-link" href="#Peel--2018">Peel and Osofsky, 2018</a>). Reflexive and adaptive law that accounts for the distinctive features of coastal hazard risk and associated governance imperatives builds coastal C&amp;S adaptive capacity and resilience (<span class="condensed_italic" lang="">high confidence</span>; <a class="reference-link" href="#Garmestani--2013">Garmestani and Benson, 2013</a>; <a class="reference-link" href="#Cosens--2017">Cosens et al., 2017</a>; <a class="reference-link" href="#DeCaro--2017">DeCaro et al., 2017</a>). Procedural justice, due process and use of substantive standards instead of rules provide legal stability and enable adaptation (<a class="reference-link" href="#Craig--2017">Craig et al., 2017</a>). Coastal adaptation efforts are ultimately implemented through C&amp;S actions that are enabled or constrained by prevailing legislative, executive and judicial provisions and practices, which differ significantly across jurisdictions (<a class="reference-link" href="#He--2018">He, 2018</a>). In practice, the &#8216;coastal lawscape&#8217; is made up of interconnected cultural normative, political and legal systems that need to be understood holistically to enable coastal adaptation in C&amp;S (<a class="reference-link" href="#O&#8217;Donnell--2021">O&#8217;Donnell, 2021</a>).</p>
                          <p class="Body_Body-justify" lang="en-GB">Tables CCP2.1  and CCP2.2  summarise key insights about key governance challenges facing archetypal coastal C&amp;S around the world as well as associated critical enablers and lessons learned to address climate change-compounded coastal hazard risk (based on synthesis of Table SMCCP2.3).</p>
                          <p class="Body_Body-justify" lang="en-GB">In sum, prospects for addressing climate risk in archetypal coastal C&amp;S around the world depend on the extent to which societal choices&#8212;and associated governance processes and practices&#8212;address the drivers and root causes of exposure and social vulnerability (<span class="condensed_italic" lang="">very high confidence</span>)<span class="condensed_italic" lang="">. </span>Coastal C&amp;S are more able to address these challenges when authorities work with local communities and vulnerable groups in particular, and with stakeholders from the local to national levels and beyond, to chart adaptation pathways that enable sustained reduction in the exposure and vulnerability of those most at risk <span class="condensed_italic" lang=""> (very high confidence</span>; Cross-Chapter Box SLR in Chapter 3; <a class="reference-link" href="#Magnan--2019">Magnan et al., 2019</a>; <a class="reference-link" href="#Oppenheimer--2019">Oppenheimer et al., 2019</a>). Unlocking potential enablers for locally appropriate and effective adaptation is difficult because many drivers and root causes of coastal risk are historically and institutionally embedded <span class="condensed_italic" lang=""> (high confidence</span>; <a class="reference-link" href="#Thomas--2019">Thomas et al., 2019</a>). Charting credible, salient and legitimate adaptation pathways is consequently a struggle in reconciling divergent worldviews, values and interests (<a class="reference-link" href="#Sovacool--2018">Sovacool, 2018</a>; <a class="reference-link" href="#Mendenhall--2020">Mendenhall et al., 2020</a>; <a class="reference-link" href="#Bowden--2021a">Bowden et al., 2021a</a>; <a class="reference-link" href="#Bowden--2021b">Bowden et al., 2021b</a>). Unlocking the productive potential of conflict is foundational for transitioning towards pathways that foster CRD<span class="condensed_italic" lang=""> (high confidence</span>; <a class="reference-link" href="#Abrahams--2017">Abrahams and Carr, 2017</a>; <a class="reference-link" href="#Harris--2018">Harris et al., 2018</a>; <a class="reference-link" href="#Sharifi--2020">Sharifi, 2020</a>). But this can be especially challenging for low-lying coastal C&amp;S characterised by degraded coastal ecosystems susceptible to climate change impacts as well as pronounced inequity and governance constraints <span class="condensed_italic" lang=""> (high confidence</span>; <a class="reference-link" href="#Esteban--2017">Esteban et al., 2017</a>; <a class="reference-link" href="#Jones--2020">Jones et al., 2020</a>).</p>
                          <p class="Body_Tables_Table_title" lang="en-US"><span class="table_number" lang="">Table CCP2.1  | </span>Governance challenges and critical enablers for addressing coastal hazard risk in C&amp;S</p>
                          <table class="Table" id="table001">
                            <colgroup>
                              <col class="_idGenTableRowColumn-1"/>
                              <col class="_idGenTableRowColumn-1"/>
                            </colgroup>
                            <thead>
                              <tr class="Table _idGenTableRowColumn-2">
                                <td class="Table Head-blue Head-blue">
                                  <p class="Body_Tables_Table_header-black" lang="en-US">
                                    <span class="bold_condensed" lang="en-GB">Key governance challenges</span>
                                  </p>
                                </td>
                                <td class="Table Head-blue Head-blue">
                                  <p class="Body_Tables_Table_header-black" lang="en-US">
                                    <span class="bold_condensed" lang="en-GB">Critical enablers for C&amp;S to address coastal hazard risk</span>
                                  </p>
                                </td>
                              </tr>
                            </thead>
                            <tbody>
                              <tr class="Table _idGenTableRowColumn-3">
                                <td class="Table Body Body" rowspan="2">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US"><span class="bold_condensed" lang="en-GB">Complexity: </span> climate change compounds non-climatic hazard risks facing coastal C&amp;S in interconnected, dynamic and emergent ways for which there are no simple solutions.</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Draw on <span class="bold_condensed" lang="en-GB">multiple knowledge systems</span> to co-design and co-produce more acceptable, effective and enduring responses.</p>
                                </td>
                              </tr>
                              <tr class="Table _idGenTableRowColumn-4">
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Build <span class="bold_condensed" lang="en-GB">governance capacity</span> to tackle complex problems.</p>
                                </td>
                              </tr>
                              <tr class="Table _idGenTableRowColumn-3">
                                <td class="Table Body Body" rowspan="2">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US"><span class="bold_condensed" lang="en-GB">Time horizon and uncertainty: </span>The future is uncertain, but climate change will continue for generations and cannot be addressed by short-term (e.g., 1&#8211;10 years) responses alone.</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Adopt a <span class="bold_condensed" lang="en-GB">long-term view</span> but take action now. <span class="bold_condensed" lang="en-GB">Keep options open</span> to adjust responses as climate risk escalates and circumstances change.</p>
                                </td>
                              </tr>
                              <tr class="Table _idGenTableRowColumn-5">
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US"><span class="bold_condensed" lang="en-GB">Avoid</span> new development commitments in exposed locations. Enable managed retreat in most at-risk locations by <span class="bold_condensed" lang="en-GB">anticipatory actions</span>, e.g., secure funds, legal provisions for buy-outs, resettlement, etc.</p>
                                </td>
                              </tr>
                              <tr class="Table _idGenTableRowColumn-6">
                                <td class="Table Body Body" rowspan="2">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US"><span class="bold_condensed" lang="en-GB"> Cross-scale and cross-domain coordination: </span>Decisions bound by jurisdictional and sectoral boundaries fail to address linkages within and between coastal ecosystems and C&amp;S facing interconnected climate change-compounded impacts and risk.</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Develop networks and linkages within and between different governance scales and levels and across policy domains and sectors, to improve <span class="bold_condensed" lang="en-GB">coordination</span>, build trust and legitimise decisions.</p>
                                </td>
                              </tr>
                              <tr class="Table _idGenTableRowColumn-7">
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Build <span class="bold_condensed" lang="en-GB">shared understanding</span> and enable locally appropriate responses through experimentation, innovation and social learning.</p>
                                </td>
                              </tr>
                              <tr class="Table _idGenTableRowColumn-3">
                                <td class="Table Body Body" rowspan="2">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US"><span class="bold_condensed" lang="en-GB">Equity and social vulnerability: </span>Climate change compounds everyday inequity and vulnerability in coastal C&amp;S, making it difficult to disentangle and address social drivers and root causes of risk.</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Recognise political realities and <span class="bold_condensed" lang="en-GB">prioritise vulnerability</span>, justice and equity concerns to enable just, impactful and enduring outcomes.</p>
                                </td>
                              </tr>
                              <tr class="Table _idGenTableRowColumn-7">
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Strengthen <span class="bold_condensed" lang="en-GB">community capabilities</span> to respond to coastal hazard risk, using external assistance and government support if necessary.</p>
                                </td>
                              </tr>
                              <tr class="Table _idGenTableRowColumn-3">
                                <td class="Table Body Body" rowspan="2">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US"><span class="bold_condensed" lang="en-GB">Social conflict: </span>Coastal C&amp;S will be the focal point of contending views about appropriate climate responses, and face the challenge of avoiding destructive conflict and realising its productive potential.</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Design and facilitate <span class="bold_condensed" lang="en-GB">tailor-made participation processes</span>, involving stakeholders early and consistently from negotiating responses to implementation.</p>
                                </td>
                              </tr>
                              <tr class="Table _idGenTableRowColumn-7">
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Create <span class="bold_condensed" lang="en-GB">safe arenas of engagement </span> for inclusive, informed and meaningful deliberation and collaborative problem-solving.</p>
                                </td>
                              </tr>
                            </tbody>
                          </table>
                          <p class="Body_Tables_Table_title" lang="en-US"><span class="table_number" lang="">Table CCP2.2  | </span>Lessons learned from efforts to address coastal hazard risk</p>
                          <table class="Table" id="table002">
                            <colgroup>
                              <col class="_idGenTableRowColumn-1"/>
                              <col class="_idGenTableRowColumn-1"/>
                            </colgroup>
                            <thead>
                              <tr class="Table _idGenTableRowColumn-2">
                                <td class="Table Head-blue Head-blue">
                                  <p class="Body_Tables_Table_header-black" lang="en-US">
                                    <span class="bold_condensed" lang="en-GB">Lessons to address governance challenges and unlock enablers</span>
                                  </p>
                                </td>
                                <td class="Table Head-blue Head-blue">
                                  <p class="Body_Tables_Table_header-black" lang="en-US">
                                    <span class="bold_condensed" lang="en-GB">Archetypal C&amp;S initiatives, constraints aside</span>
                                  </p>
                                </td>
                              </tr>
                            </thead>
                            <tbody>
                              <tr class="Table _idGenTableRowColumn-8">
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">
                                    <span class="bold_condensed" lang="en-GB">Complexity: multiple knowledge systems</span>
                                  </p>
                                  <ul>
                                    <li class="Body_Tables_Table_list-unnumbered-first" lang="en-US">Reveal dynamic complexity drawing on multiple sources of locally relevant evidence.</li>
                                    <li class="Body_Tables_Table_list-unnumbered-continued" lang="en-US">Use and integrate local, Indigenous and scientific knowledge.</li>
                                    <li class="Body_Tables_Table_list-unnumbered-continued" lang="en-US">Include marginalised voices and knowledge of vulnerable groups, women, young people, etc.</li>
                                    <li class="Body_Tables_Table_list-unnumbered-continued" lang="en-US">Build shared understanding through storytelling.</li>
                                    <li class="Body_Tables_Table_list-unnumbered-last" lang="en-US">Bridge gaps between science, policy and practice by experimenting with novel approaches and working across organisational, sectoral and institutional boundaries.</li>
                                  </ul>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US"><span class="bold_condensed" lang="en-GB">Seychelles (0.1 million; open coast): </span> Science&#8211;policy&#8211;local knowledge partnerships to co-produce usable information for decision-making.</p>
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US"><span class="bold_condensed" lang="en-GB">Dhaka, Bangladesh (21 million; delta): </span>Climate change is national priority. Partnering with the Netherlands to develop long-term data plans.</p>
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US"><span class="bold_condensed" lang="en-GB">Jakarta, Indonesia (10.8 million; delta): </span>Community-based efforts to foster mutual assistance and self-organisation.</p>
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US"><span class="bold_condensed" lang="en-GB">Utqiagvik (formerly Barrow) Alaska, USA (0.04 million; Arctic, open coast): </span>Using local knowledge and historical precedent of transformative change to integrate local and scientific knowledge.</p>
                                </td>
                              </tr>
                              <tr class="Table _idGenTableRowColumn-9">
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">
                                    <span class="bold_condensed" lang="en-GB">Complexity: governance capacity</span>
                                  </p>
                                  <ul>
                                    <li class="Body_Tables_Table_list-unnumbered-first" lang="en-US">Joined-up visionary leadership is key, e.g., cabinet- and C&amp;S-level commitments to long-term implementation.</li>
                                    <li class="Body_Tables_Table_list-unnumbered-continued" lang="en-US">Translate political will into substantial dedicated budgets to build government capacity to tackle complex problems.</li>
                                    <li class="Body_Tables_Table_list-unnumbered-continued" lang="en-US">Use flexible approaches to build resilience, e.g., independent agency alongside traditional administrative bodies.</li>
                                    <li class="Body_Tables_Table_list-unnumbered-continued" lang="en-US">Counter deadlocks due to short-term priorities and vested interests with long-term perspectives, considering plausible scenarios and incentivising novel solutions.</li>
                                    <li class="Body_Tables_Table_list-unnumbered-continued" lang="en-US">Translate national requirements into local action with enabling provisions for tailored local policy and practice.</li>
                                    <li class="Body_Tables_Table_list-unnumbered-continued" lang="en-US">Tackle emergent problems by setting up enduring monitoring and lesson-learning processes.</li>
                                    <li class="Body_Tables_Table_list-unnumbered-continued" lang="en-US">Governance arrangements reconcile competing interests in an inclusive, timely and legitimate manner.</li>
                                    <li class="Body_Tables_Table_list-unnumbered-last" lang="en-US">Make visible and reflect on underlying reasons for policy actions/inaction, including values, attitudes and taken-for-granted habits influencing problem-solving capability.</li>
                                  </ul>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US"><span class="bold_condensed" lang="en-GB">Singapore (5.6 million; open coast): </span>Integrated approach across ministries committing to long-term adaptation (and mitigation goals) by 2030.</p>
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US"><span class="bold_condensed" lang="en-GB">Rotterdam, the Netherlands (0.65 million; delta): </span>Delta Programme, supported by law, administrative arrangements and a &#8364;1 bill. pa budget to 2029.</p>
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US"><span class="bold_condensed" lang="en-GB">Florianopolis, Santa Catarina Island, Brazil (1.2 million; mixed): </span>Building knowledge hub via public&#8211;private&#8211;civil society partnerships.</p>
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US"><span class="bold_condensed" lang="en-GB">Nassau, Bahamas (0.275 million; open coast, small island): </span>Identifying responsibilities, accessing funding and preparing adaptation plans drawing on evidence-based studies.</p>
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US"><span class="bold_condensed" lang="en-GB">Shanghai (27 million; estuary), China: </span>Contain risk by combining long-term planning, political will, national and municipal provisions, and technical capability.</p>
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US"><span class="bold_condensed" lang="en-GB">Can Tho City, Vietnam (0.4 million; delta): </span>Engage international donors and research community.</p>
                                </td>
                              </tr>
                              <tr class="Table _idGenTableRowColumn-10">
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">
                                    <span class="bold_condensed" lang="en-GB">Time horizon and uncertainty: long-term view</span>
                                  </p>
                                  <ul>
                                    <li class="Body_Tables_Table_list-unnumbered-first" lang="en-US">Establish national policies and guidance with a long-term view (e.g., 100 years) that enable action now.</li>
                                    <li class="Body_Tables_Table_list-unnumbered-continued" lang="en-US">Develop shared medium- (10&#8211;50 years) to long-term vision (100+ years).</li>
                                    <li class="Body_Tables_Table_list-unnumbered-continued" lang="en-US">Use an adaptation-pathways approach to make short-term decisions consistent with long-term goals.</li>
                                    <li class="Body_Tables_Table_list-unnumbered-continued" lang="en-US">Meaningfully involve stakeholders, e.g., involve representatives in decision-making.</li>
                                    <li class="Body_Tables_Table_list-unnumbered-continued" lang="en-US">Address power imbalances and human development needs, e.g., in goal setting and process design.</li>
                                    <li class="Body_Tables_Table_list-unnumbered-last" lang="en-US">Reconcile divergent perspectives through tailored responses.</li>
                                  </ul>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US"><span class="bold_condensed" lang="en-GB">Napier (0.07 million), Hawkes Bay (0.18 million; open coast), New Zealand: </span>National law compels local authorities to take a 100-year perspective; 2100 Strategy accounts for dynamic complexity and uncertain future through adaptation pathways.</p>
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US"><span class="bold_condensed" lang="en-GB">Shanghai, China (27 million; estuary): </span>Plans up to 2100, strong national and municipal focus on climate change, and access to technical expertise.</p>
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US"><span class="bold_condensed" lang="en-GB">Dhaka, Bangladesh (21 million; delta): </span>Long-term adaptation plans through to 2100.</p>
                                </td>
                              </tr>
                              <tr class="Table _idGenTableRowColumn-11">
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">
                                    <span class="bold_condensed" lang="en-GB">Time horizon and uncertainty: avoidance and anticipatory action</span>
                                  </p>
                                  <ul>
                                    <li class="Body_Tables_Table_list-unnumbered-first" lang="en-US">Avoid development in exposed localities using spatial plans.</li>
                                    <li class="Body_Tables_Table_list-unnumbered-continued" lang="en-US">Use window of opportunity created by extreme events.</li>
                                    <li class="Body_Tables_Table_list-unnumbered-continued" lang="en-US">Prepare pre-event plans and tailor risk reduction and resilience building post disaster.</li>
                                    <li class="Body_Tables_Table_list-unnumbered-last" lang="en-US">Reveal political pressures and opposition that hamper efforts to address intolerable risk and unacceptable impacts.</li>
                                  </ul>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US"><span class="bold_condensed" lang="en-GB">Rotterdam, the Netherlands (0.65 million; delta): </span>Delta Programme promotes &#8216;living with water&#8217;, allowing and managing urban flooding.</p>
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US"><span class="bold_condensed" lang="en-GB">Napier (0.07 million), Hawkes Bay, New Zealand (0.18 million, open coast): </span>Regulatory provisions discourage new development in high-risk locations; strategy sequences adaptation interventions.</p>
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US"><span class="bold_condensed" lang="en-GB">Florianopolis, Santa Catarina Island, Brazil (1.2 million; mixed): </span>Research reveals unregulated ad hoc development in at-risk locations preventing effective adaptation.</p>
                                </td>
                              </tr>
                              <tr class="Table _idGenTableRowColumn-12">
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">
                                    <span class="bold_condensed" lang="en-GB"> Cross-scale and cross-domain coordination: coordination</span>
                                  </p>
                                  <ul>
