                        <div class="h4-container" id="Climate">
                          <h4 class="Headings_H4-unnumbered" lang="de-DE">
                            <span class="bold_condensed" lang="en-GB">Climate change impacts and cascading impacts in polar regions, particularly the Arctic, are already occurring at a magnitude and pace unprecedented in recent history (</span>
                            <span class="bold_condensed_italic" lang="">very high confidence</span>
                            <span class="bold_condensed" lang="en-GB">), and much faster than projected for other world regions (</span>
                            <span class="bold_condensed_italic" lang="">high confidence</span>
                            <span class="superscript _idGenCharOverride-1" lang="">
                              <span id="footnote-001-backlink"><a class="_idFootnoteLink _idGenColorInherit" href="ccp6.html#footnote-001">1</a> </span>
                            </span>
                            <span class="bold_condensed" lang="en-GB">). </span>
                            <span class="arrow-up"/>
                            <span class="arrow-down"/>
                            <span class="share-block">
                              <img class="share-icon" src="../../share.png"/>
                            </span>
                          </h4>
                          <div class="h4-siblings" id="h4-2-siblings">
                            <p class="Body_Body-justify" lang="en-GB"><span class="bold_condensed" lang="en-GB">The polar regions, notably the Arctic and maritime Antarctic, are experiencing impacts from climate change at magnitudes and rates that are among the highest in the world, and will become profoundly different in the near-term future (by 2050) under all warming scenarios (</span><span class="bold_condensed_italic" lang="">high confidence</span><span class="bold_condensed" lang="en-GB">). </span>In the Arctic, accelerated sea ice loss (particularly during summer), increased permafrost thaw and extreme high temperatures have substantially impacted marine, freshwater and terrestrial sociological&#8211;ecological systems (<span class="condensed_italic" lang="">very high confidence</span>). Multiple physical, ecological and societal elements of polar regions are approaching a level of change potentially irreversible for hundreds of years, if not millennia (<span class="condensed_italic" lang="">high confidence</span>). Evidence of borealisation of terrestrial and marine systems is emerging (<span class="condensed_italic" lang="">high confidence</span>), and cascading impacts are ongoing and widespread yet challenging to quantify fully due to complexity and lags in ecological expression of change. Loss of multi-year sea ice and the occurrence of a seasonally ice-free Arctic Ocean by the middle of this century will result in substantial range contraction, if not the disappearance of several Arctic fish, crab, bird and marine mammal species, including possible extinction of seals and polar bears in certain regions (<span class="condensed_italic" lang="">high confidence</span>). In the Arctic, permafrost thaw and snowfall decrease lead to profound hydrological changes, an overall greening of the tundra and regional browning of tundra and boreal forests (<span class="condensed_italic" lang="">high confidence</span>). <!-- -->{CCP6.1; Table CCP6.1; Table CCP6.2; CCP6.2.1; CCP6.2.2; Table CCP6.5 }</p>
                            <p class="Body_Body-justify" lang="en-GB"><span class="bold_condensed" lang="en-GB">Contractions of the polar climate zones lead to distribution shifts and changes in food webs, induce declines in many species (</span><span class="bold_condensed_italic" lang="">medium confidence</span><span class="bold_condensed" lang="en-GB">) with impacts on subsistence harvests and commercial fisheries, and threaten global dependence on polar regions for substantial marine food production (</span><span class="bold_condensed_italic" lang="">high confidence</span><span class="bold_condensed" lang="en-GB">). </span>Climate change has induced food web changes resulting in population declines in polar sea birds, including penguins, and marine and terrestrial mammals (<span class="condensed_italic" lang="">high confidence</span>). Globally and regionally important harvested fish and invertebrate species are also contracting ranges and declining productivity, including Pacific cod, salmon, snow and king crab in the Arctic and krill in the Antarctic (<span class="condensed_italic" lang="">medium confidence</span>), with implications for global food systems (<span class="condensed_italic" lang="">high confidence</span>). <!-- -->{Table CCP6.2; CCP6.2.1; CCP6.2.3; Table CCP6.3; Table CCP6.4 }</p>
                            <p class="Body_Body-justify" lang="en-GB"><span class="bold_condensed" lang="en-GB">Loss of sea ice is rapidly expanding opportunities, but also increasing risks for shipping and other economic industries in polar regions (</span><span class="bold_condensed_italic" lang="">very high confidence</span><span class="bold_condensed" lang="en-GB">). </span>Reduced sea ice enables greater access to high-latitudinal seas for industries, such as fisheries, shipping, tourism (<span class="condensed_italic" lang="">very high confidence</span>) and Arctic maritime trade and resource extraction (<span class="condensed_italic" lang="">medium confidence</span>). Navigational risks have grown due to increasingly mobile multi-year ice, poor hydrographic charting in newly open areas, and limited weather, water, ice and climate data and services (<span class="condensed_italic" lang="">high confidence</span>). Cascading risks from polar shipping growth include increased air emissions, underwater noise pollution, disruption to subsistence hunting and cultural activities in the Arctic (<span class="condensed_italic" lang="">high confidence</span>) and potential for invasive marine species and geopolitical tensions (<span class="condensed_italic" lang="">medium confidence</span>). <!-- -->{Table CCP6.3; CCP6.2.4; Box CCP6.1; Table CCP6.5; Table CCP6.6}</p>
                            <p class="Body_Body-justify" lang="en-GB"><span class="bold_condensed" lang="en-GB">Increased permafrost thaw and flooding will disrupt economically important transportation and supply-chain infrastructure to remote Arctic settlements (</span><span class="bold_condensed_italic" lang="">high confidence</span><span class="bold_condensed" lang="en-GB">), increasing risks to economies, Arctic tourism and tourism to cultural heritage sites (</span><span class="bold_condensed_italic" lang="">medium confidence</span><span class="bold_condensed" lang="en-GB">). </span>Arctic permafrost thaw is projected to impact most infrastructure by the middle of this century, impacting millions of people and their economies, and costing billions in damages (<span class="condensed_italic" lang="">high confidence</span>). <!-- -->{CCP6.2.3; CCP6.2.4; Box CCP6.1; CCP6.2.5; CCP6.3.1; Table CCP6.5; Table CCP6.6}</p>
                            <p class="Body_Body-justify" lang="en-GB"><span class="bold_condensed" lang="en-GB">Climate change increasingly threatens many facets of Arctic livelihoods, culture, identity, health and security, particularly for Indigenous Peoples (</span><span class="bold_condensed_italic" lang="">very high confidence</span><span class="bold_condensed" lang="en-GB">). </span>It has negatively impacted mental health and increased risks of injury, food insecurity and foodborne and waterborne disease, with risks amplified for those reliant on the environment for subsistence, livelihoods and identity (<span class="condensed_italic" lang="">high confidence</span>). Permafrost thaw, sea level rise and reduced sea ice protection have already damaged or destroyed many cultural heritage sites in some Arctic regions (<span class="condensed_italic" lang="">very high confidence</span>) and are projected to continue across all Arctic regions (<span class="condensed_italic" lang="">very high confidence</span>). <!-- -->{CCP6.2.3; Table CCP6.3; CCP6.2.4; CCP6.2.5; CCP6.2.6; Figure CCP6.3; Box CCP6.2; CCP6.3.1; Table CCP6.5; Table CCP6.6}</p>
                          </div>
                          <h4 class="Headings_H4-unnumbered" lang="de-DE">
                            <i>Climate Resilient Development</i>
                          </h4>
                          <div class="h4-siblings" id="h4-5-siblings"/>
                          <h4 class="Headings_H4-unnumbered" lang="de-DE">
                            <span class="bold_condensed" lang="en-GB">Climate resilience for Arctic Indigenous Peoples and local communities is dependent on Indigenous self-determination in climate-adaptation action (</span>
                            <span class="bold_condensed_italic" lang="">very high confidence</span>
                            <span class="bold_condensed" lang="en-GB">), inclusive, coordinated and transboundary governance (</span>
                            <span class="bold_condensed_italic" lang="">high confidence</span>
                            <span class="bold_condensed" lang="en-GB">) and ecosystem-based policies (</span>
                            <span class="bold_condensed_italic" lang="">high confidence</span>
                            <span class="bold_condensed" lang="en-GB">) to effectively address climate change impacts and risks across scales and sectors, and to achieve a resilient, secure and equitable future. </span>
                            <span class="arrow-up"/>
                            <span class="arrow-down"/>
                            <span class="share-block">
                              <img class="share-icon" src="../../share.png"/>
                            </span>
                          </h4>
                          <div class="h4-siblings" id="h4-6-siblings">
                            <p class="Body_Body-justify" lang="en-GB"><span class="bold_condensed" lang="en-GB">Development of robust pathways for climate resilience in the Arctic can be accelerated by adaptation strategies and governance that reflect local conditions, cultures and adaptive capacities of communities and sectors (</span><span class="bold_condensed_italic" lang="">high confidence</span><span class="bold_condensed" lang="en-GB">). </span>Effectiveness of adaptation strategies will be enhanced by accounting for the geographic, climatic, ecological and cultural uniqueness of the polar regions (<span class="condensed_italic" lang="">medium confidence</span>). Colonialism can inhibit the development of robust climate adaptation strategies, and exacerbate climate risks (<span class="condensed_italic" lang="">very high confidence</span>). Inclusive decision making in establishing climate adaptations can foster resilience, reflect the unique environmental, cultural and economic imperatives of the region and support both market-based and sharing economies (<span class="condensed_italic" lang="">high confidence</span>). <!-- -->{Box CCP6.2; Table CCP6.6; CCP6.3.2; CCP6.4 }</p>
                            <p class="Body_Body-justify _idGenParaOverride-1" lang="en-GB"><span class="bold_condensed" lang="en-GB">Indigenous self-determination in managing climate change impacts, adaptations and solutions can accelerate effective robust climate resilient development pathways in the Arctic (</span><span class="bold_condensed_italic" lang="">very high confidence</span><span class="bold_condensed" lang="en-GB">). </span>Arctic Indigenous self-determination in decision making can establish robust climate resilience, especially in Indigenous communities, incorporating locally derived definitions of social and economic success, culturally legitimate institutions of government, strategic visioning and thinking and public-spirited, nation-building leadership (very high confidence). <!-- -->{Box CCP6.2; CCP6.3; CCP6.4 }</p>
                          </div>
                        </div>
                        <div class="h4-container" id="Adaptation">
                          <h4 class="Headings_H4-unnumbered" lang="de-DE"><i>Adaptation</i> </h4>
                          <div class="h4-siblings" id="h4-3-siblings"/>
                        </div>
                        <div class="h4-container" id="Adaptations">
                          <h4 class="Headings_H4-unnumbered" lang="de-DE">
                            <span class="bold_condensed" lang="en-GB">Adaptations to manage climate change impacts and risks in polar regions are urgently needed (</span>
                            <span class="bold_condensed_italic" lang="">very high confidence</span>
                            <span class="bold_condensed" lang="en-GB">), but implementation is uneven (</span>
                            <span class="bold_condensed_italic" lang="">high confidence</span>
                            <span class="bold_condensed" lang="en-GB">), limits to adaptation are high and maladaptation is probable (</span>
                            <span class="bold_condensed_italic" lang="">high confidence</span>
                            <span class="bold_condensed" lang="en-GB">). </span>
                            <span class="arrow-up"/>
                            <span class="arrow-down"/>
                            <span class="share-block">
                              <img class="share-icon" src="../../share.png"/>
                            </span>
                          </h4>
                          <div class="h4-siblings" id="h4-4-siblings">
                            <p class="Body_Body-justify" lang="en-GB"><span class="bold_condensed" lang="en-GB">Polar zones will continue to contract and diminish in extent under climate change, and local adaptations will be insufficient to achieve long-term resilience of polar systems (</span><span class="bold_condensed_italic" lang="">medium confidence</span><span class="bold_condensed" lang="en-GB">). </span>The pace and extent of change in polar regions is challenging the ability of social and natural systems to adapt (<span class="condensed_italic" lang="">medium confidence</span>). Management of different sectors with specific measures to reduce the potential for compounding risks and the development of climate-sensitive strategies would support the resilience of polar systems. Resilience of natural systems can be enhanced through strategies that maintain ecological connectivity over large spatial scales and reduce the particular impact of local extreme events on biodiversity (<span class="condensed_italic" lang="">medium confidence</span>). <!-- -->{CCP6.2; Box CCP6.1; CCP6.3; Table CCP6.5; Table CCP6.6; Figure CCP6.6; CCP6.4 }</p>
                            <p class="Body_Body-justify" lang="en-GB"><span class="bold_condensed" lang="en-GB">Timing, direction and scale of polar climate change impacts differ sub-regionally and will require adaptation strategies that are flexible, equitable, inclusive and integrated across sectors and governance arrangements to effectively reduce risks (</span><span class="bold_condensed_italic" lang="">high confidence</span><span class="bold_condensed" lang="en-GB">). </span>Governance around climate change planning, preparation and response has been limited in scope, and has often not considered interacting effects of climate change with other risks (<span class="condensed_italic" lang="">high confidence</span>). Reactive management strategies will not succeed in reducing risks in polar regions given the rapid change and increasing potential for extreme events (<span class="condensed_italic" lang="">high confidence</span>). Greater inclusivity of stakeholders and communities, along with using diverse sources of information, including Indigenous knowledge and local knowledge, can benefit robust planning and decision making, and uptake of adaptations (<span class="condensed_italic" lang="">high confidence</span>). Effectiveness in preparing for and adapting to climate risks can benefit from improved climate, weather and ice forecasting services, tools for integrating climate change data and different types of knowledge into management processes and enhanced polar search, rescue and emergency response capabilities (<span class="condensed_italic" lang="">high confidence</span>). <!-- -->{CCP6.2.3.1; CCP6.3; Table CCP6.6; CCP6.4; Box CCP6.2; Box CCP6.3; Figure CCP6.8}</p>
                          </div>
                        </div>
                      </div>
                    </div>
                    <div class="h1-container" id="CCP6.1">
                      <h1 class="Headings_H1-numbered" lang="en-GB">CCP6.1  The Global Importance of Climate Change in Polar Regions <span class="share-block"><img class="share-icon" src="../../share.png"/></span><button class="btn-ipcc btn btn-primary chapter-expand">Expand section</button></h1>
                      <div class="h1-siblings" id="h1-2-siblings">
                        <p class="Body_Body-justify" lang="en-GB">Polar regions (Figure CCP6.1) are considered flagship areas for climate change, since some of the most extreme climate change impacts that are projected to occur by 2050 elsewhere in the world have already been observed in the Arctic and Antarctic and have resulted in transformative and unprecedented change. Polar regions are not only home to cultural keystone species such as polar bears (Arctic) and penguins (Antarctic) but they also play fundamental roles in regulating the global climate system and in the provision of ecosystem services for the global community and for Arctic Indigenous Peoples and local communities in the region.</p>
                        <div class="Figure" id="_idContainer007">
                          <p class="Body_Figures_Figure" lang="de-DE">
                            <img alt="" class="_idGenObjectAttribute-1" id="figure-ccp6-001" loading="lazy" src="https://ipcc.ch/report/ar6/wg2/downloads/figures/IPCC_AR6_WGII_Figure_CCP6_001.png"/>
                          </p>
                          <p class="Body_Figures_Figure_title" lang="en-US"><span class="figure_number" lang="">Figure CCP6.1  | </span><span class="bold_condensed-dark-blue" lang="">Polar regions include the Arctic, Antarctica, Iceland, Greenland, Faroe Islands and some sub-Arctic areas (e</span><span class="bold_condensed-dark-blue" lang="">. </span><span class="bold_condensed-dark-blue" lang="">g., Bering Sea and Aleutian Islands as well as the Fennoscandian and Siberian boreal areas), and all sub-Antarctic areas. </span>This CCP augments the geographical boundaries for the Arctic (<a class="reference-link" href="#Meredith--2019">Meredith et al., 2019</a>) to also include the sub-Arctic boundary (as defined by the Arctic Biodiversity Assessment), northern boreal areas, parts of the Siberian taiga and southern Labrador. The Antarctic region is delineated along the sub-Antarctic Front (<a class="reference-link" href="#Orsi--1995">Orsi et al., 1995</a>). Geographic boundaries of the polar regions and important sub-regional locations are displayed, including five marine sectors as defined in the Marine Ecosystem Assessment for the Southern Ocean (MEASO), for example, Grant et al., (2021).</p>
                          <div class="ch-figure-button-cont"><a href="/report/ar6/wg2/figures/chapter-ccp6/figure-ccp6-001" target="_blank"><button class="btn-ipcc btn btn-primary ch-figure-button">Open figure</button></a> </div>
                        </div>
                        <p class="Body_Body-justify" lang="en-GB">These changes are causing a suite of direct and cascading risks for all polar ecosystems with larger effects to date in the Arctic than the Antarctic (<span class="condensed_italic" lang="">high confidence</span>), due to larger and regionally more consistent physical changes (Figure CCP6.2, Table CCP6.1; Chapter 3) (<a class="reference-link" href="#Meredith--2019">Meredith et al., 2019</a>; <a class="reference-link" href="#Ranasinghe--2021">Ranasinghe et al., 2021</a>). In the Arctic, these changes affect every sector of society, impacting its 4,000,000 inhabitants, including 400,000 Indigenous People. The Antarctic has no permanent human settlements; however, many nations conduct field research, operate seasonal and permanent stations and have an interest in the management of the region (<a class="reference-link" href="#Hughes--2018">Hughes et al., 2018</a>; <a class="reference-link" href="#Grant--2021">Grant et al., 2021</a>). During summer, when Antarctic science, tourism and fishery activities are greatest, 4400 people live there, whereas only 1100 people live there over winter (<a class="reference-link" href="#Meredith--2019">Meredith et al., 2019</a>). Although adaptation is occurring in polar regions, it is uneven and sporadic and does not meet the risks posed by future climate change. Indigenous knowledge-based solutions, inclusive ecosystem-based policies and integrated technologies demonstrate the potential to effectively address climate change impacts across scales and sectors, yet implementation barriers remain (CCP6.4.1).</p>
                        <div class="Figure" id="_idContainer010">
                          <p class="Body_Figures_Figure" lang="de-DE">
                            <img alt="" class="_idGenObjectAttribute-2" id="figure-ccp6-002" loading="lazy" src="https://ipcc.ch/report/ar6/wg2/downloads/figures/IPCC_AR6_WGII_Figure_CCP6_002.png"/>
                          </p>
                          <p class="Body_Figures_Figure_title" lang="en-US"><span class="figure_number" lang="">Figure CCP6.2  | </span><span class="bold_condensed-dark-blue" lang="">Observed and projected climate changes across the Arctic (A, C&#8211;H) and Antarctic (B, I&#8211;N). </span>Boundary lines in each plot are based on the polar regions defined in Figure CCP6.1. All data shown here are extracted from the IPCC WGI Interactive Atlas (<a class="reference-link" href="#Guti&#233;rrez--2021">Guti&#233;rrez et al., 2021</a>; <a class="reference-link" href="#Iturbide--2021">Iturbide et al., 2021</a>); data set details can be found in the Atlas (<a href="https://interactive-atlas.ipcc.ch/">https://interactive-atlas.ipcc.ch/</a>). Arctic (A) and Antarctic (B) are observed temperature trends (&#176;C per decade) over land for the period 1980&#8211;2015, derived from ERA5 adjusted data set. Projected changes from an ensemble of CMIP6 projections: annual mean temperature over land is depicted for 2&#176;C (C, I) and 4&#176;C (F, L). Global warming levels (GWL) in the Arctic and Antarctic, respectively; annual mean sea surface temperature is depicted for 2&#176;C (D, J) and 4&#176;C (G, M) GWL in the Arctic and Antarctic respectively; annual sea ice (%) is depicted for 2&#176;C (E, K) and 4&#176;C (H, N) GWL in the Arctic and Antarctic, respectively.</p>
                          <div class="ch-figure-button-cont"><a href="/report/ar6/wg2/figures/chapter-ccp6/figure-ccp6-002" target="_blank"><button class="btn-ipcc btn btn-primary ch-figure-button">Open figure</button></a> </div>
                        </div>
                        <p class="Body_Body-justify" lang="en-GB">This Cross Chapter Paper (CCP) assesses the impacts, risks and adaptation implications resulting from the physical and chemical changes in the polar regions that were detailed in the Intergovernmental Panel on Climate Change (IPCC) Working Group I (WGI) contribution to the IPCC 6th Assessment Report (AR6) (<a class="reference-link" href="#IPCC--2021">IPCC, 2021</a>). Several key WGI AR6 findings have important implications for natural and human systems in polar regions. Warming and wetting have persisted as key climatic impact drivers in polar regions (<span class="condensed_italic" lang="">very high confidence</span>) and will <span class="condensed_italic" lang="">very likely </span><span class="superscript _idGenCharOverride-1" lang=""><span id="footnote-000-backlink"><a class="_idFootnoteLink _idGenColorInherit" href="ccp6.html#footnote-000">2</a> </span></span> continue to 2100 (<a class="reference-link" href="#Fox-Kemper--2021">Fox-Kemper et al., 2021</a>; <a class="reference-link" href="#Gulev--2021">Gulev et al., 2021</a>) with cascading climate effects regarding heatwaves, fire, weather, floods and heavy precipitation, river runoff, snowfall, glaciers and ice sheets (IS), permafrost, lake, river and sea ice, relative sea level and coastal flooding and erosion (<a class="reference-link" href="#Guti&#233;rrez--2021">Guti&#233;rrez et al., 2021</a>; <a class="reference-link" href="#Ranasinghe--2021">Ranasinghe et al., 2021</a>) (Table CCP6.1). They represent major climate hazards in all key risks for polar regions (Table CCP6.5). Key points of departure for this CCP also include IPCC 5th Assessment Report (AR5) (<a class="reference-link" href="#IPCC--2014">IPCC, 2014</a>) and the Polar Regions chapter in the Special Report on the Ocean and Cryosphere in a Changing Climate (SROCC) (<a class="reference-link" href="#Meredith--2019">Meredith et al., 2019</a>). SROCC assessed physical, biological and social systems concerning the Arctic and Antarctic Oceans and cryosphere, and how they are affected by current and future climate change. This CCP assesses the rapidly increasing evidence that has been published since AR5 and SROCC, and advances previous IPCC assessments. First, results from the Coupled Model Intercomparison Projects (CMIP6) are an important advance since SROCC, which improve the certainty and resolution of projections of the main climate impact drivers and the risks they have for polar systems (<a class="reference-link" href="#Fox-Kemper--2021">Fox-Kemper et al., 2021</a>; <a class="reference-link" href="#Ranasinghe--2021">Ranasinghe et al., 2021</a>). Second, building from the framework outlined in SROCC (<a class="reference-link" href="#Crate--2019">Crate et al., 2019</a>), scientific, Indigenous knowledge (IK) and local knowledge (LK) systems are included in this assessment. Importantly, Indigenous authors led the assessment of the impacts, adaptation and governance of climate change for Indigenous Peoples, which is an important advance since AR5 and represents an important step towards Indigenous self-determination in international assessment processes (<a class="reference-link" href="#Ford--2012">Ford et al., 2012</a>; <a class="reference-link" href="#Ford--2016">Ford et al., 2016</a>; <a class="reference-link" href="#Hill--2020">Hill et al., 2020</a>).</p>
                        <p class="Body_Body-justify" lang="en-GB">Herein, observed impacts and future risks (CCP6.2), key risks and adaptation (CCP6.3) and climate resilient development pathways (CCP6.4) in the polar regions are assessed. The CCP describes how the implications of climate change impacts in the Arctic and Antarctic extend beyond their boundaries, in terms of transregional coupled ecological systems (CCP6.2.1, CCP6.2.2), global nutritional security (CCP6.2.3), global trade and shipping (CCP6.2.4) and cultural value (CCP6.2.5, CCP6.2.6). Given the synthetic and policy-facing mandate of CCPs and with SROCC as a key point of departure, this CCP is not intended to cover the full breadth of issues for polar regions but rather it highlights select key policy-relevant topics by synthesising and adding value to the relevant material from AR6 sectoral and regional chapters.</p>

                                <p class="Body_Tables_Table_body-black-left" lang="en-US">Increase of extreme sea levels in Russian Arctic and northwest America (<span class="condensed_italic" lang="">high confidence</span>) Greenland/Iceland and northeast America (given glacial isostatic adjustment) (<span class="condensed_italic" lang="">medium confidence, </span>WG1-12)</p>
                              </td>
                            </tr>
                            <tr class="Table _idGenTableRowColumn-7">
                              <td class="Table Body Body"/>
                              <td class="Table Body Body">
                                <p class="Body_Tables_Table_body-black-left" lang="en-US">Antarctic</p>
                              </td>
                              <td class="Table Body Body"/>
                              <td class="Table Body Body">
                                <p class="Body_Tables_Table_body-black-left" lang="en-US">Rise in all polar regions (except areas of substantial land uplift in west Antarctica) (<span class="condensed_italic" lang="">high confidence</span>, WG1-12)</p>
                              </td>
                            </tr>
                            <tr class="Table _idGenTableRowColumn-8">
                              <td class="Table Body Body">
                                <p class="Body_Tables_Table_body-black-left" lang="en-US">
                                  <span class="condensed_italic" lang="">Sea surface temperature</span>
                                </p>
                              </td>
                              <td class="Table Body Body">
                                <p class="Body_Tables_Table_body-black-left" lang="en-US">Arctic</p>
                              </td>
                              <td class="Table Body Body">
                                <p class="Body_Tables_Table_body-black-left" lang="en-US">Increase of ~0.5&#176;C per decade during 1982&#8211;2017 in ice-free regions in summer (<span class="condensed_italic" lang="">high confidence</span>, SROCC-3)</p>
                              </td>
                              <td class="Table Body Body">
                                <p class="Body_Tables_Table_body-black-left" lang="en-US">Further increases (<span class="condensed_italic" lang="">high confidence</span>, WG1-12)</p>
                              </td>
                            </tr>
                            <tr class="Table _idGenTableRowColumn-9">
                              <td class="Table Body Body"/>
                              <td class="Table Body Body">
                                <p class="Body_Tables_Table_body-black-left" lang="en-US">Antarctic</p>
                              </td>
                              <td class="Table Body Body">
                                <p class="Body_Tables_Table_body-black-left" lang="en-US">Warmed in northern areas of Southern Ocean but cooled in its southernmost regions since the 1980s (<span class="condensed_italic" lang="">high confidence</span>, SROCC-3)</p>
                              </td>
                              <td class="Table Body Body">
                                <p class="Body_Tables_Table_body-black-left" lang="en-US">Circumpolar increases (<span class="condensed_italic" lang="">high confidence</span>, WG1-12)</p>
                              </td>
                            </tr>
                            <tr class="Table _idGenTableRowColumn-10">
                              <td class="Table Body Body">
                                <p class="Body_Tables_Table_body-black-left" lang="en-US">
                                  <span class="condensed_italic" lang="">Sea ice cover</span>
                                </p>
                              </td>
                              <td class="Table Body Body">
                                <p class="Body_Tables_Table_body-black-left" lang="en-US">Arctic</p>
                              </td>
                              <td class="Table Body Body">
                                <p class="Body_Tables_Table_body-black-left" lang="en-US">Loss (particularly of multi-year sea ice) accelerated since 2001<span class="superscript _idGenCharOverride-1" lang=""/> (<span class="condensed_italic" lang="">very likely </span>, WG1-9)</p>
                              </td>
                              <td class="Table Body Body">
                                <p class="Body_Tables_Table_body-black-left" lang="en-US">Will become sea ice free (&lt; 1 &#215; 10<span class="superscript _idGenCharOverride-1" lang="">6</span> km <span class="superscript _idGenCharOverride-1" lang="">2</span>) during summer before 2050, irrespective of global warming level (<span class="condensed_italic" lang="">likely </span>, WG1-9)</p>
                              </td>
                            </tr>
                            <tr class="Table _idGenTableRowColumn-11">
                              <td class="Table Body Body"/>
                              <td class="Table Body Body">
                                <p class="Body_Tables_Table_body-black-left" lang="en-US">Antarctic</p>
                              </td>
                              <td class="Table Body Body">
                                <p class="Body_Tables_Table_body-black-left" lang="en-US">No significant circumpolar trend from 1979&#8211;2018 (<span class="condensed_italic" lang="">very high confidence</span>), but decrease off the Antarctic Peninsula (<span class="condensed_italic" lang="">high confidence</span>) and increases and decreases in other regions (<span class="condensed_italic" lang="">medium confidence</span>, WG1-9)</p>
                              </td>
                              <td class="Table Body Body">
                                <p class="Body_Tables_Table_body-black-left" lang="en-US">Circumpolar decrease (<span class="condensed_italic" lang="">low confidence</span> due to limited understanding of driving processes, WG1-9)</p>
                              </td>
                            </tr>
                            <tr class="Table _idGenTableRowColumn-10">
                              <td class="Table Body Body">
                                <p class="Body_Tables_Table_body-black-left" lang="en-US">
                                  <span class="condensed_italic" lang="">Ocean surface pH</span>
                                </p>
                              </td>
                              <td class="Table Body Body">
                                <p class="Body_Tables_Table_body-black-left" lang="en-US">Both poles</p>
                              </td>
                              <td class="Table Body Body">
                                <p class="Body_Tables_Table_body-black-left" lang="en-US">Decrease since 1980 at rates of 0.003&#8211;0.026 pH units per decade in open polar zones <span class="superscript _idGenCharOverride-1" lang=""/> (<span class="condensed_italic" lang="">very likely </span>, WG1-12)</p>
                              </td>
                              <td class="Table Body Body">
                                <p class="Body_Tables_Table_body-black-left" lang="en-US">Further acidification by 0.1&#8211;0.6 pH by 2100 (Atlas), characterised by year-round conditions corrosive for aragonite minerals by 2100 (<span class="condensed_italic" lang="">very likely </span>, SROCC-3)</p>
                              </td>
                            </tr>
                            <tr class="Table _idGenTableRowColumn-5">
                              <td class="Table Body Body" colspan="4">
                                <p class="Body_Tables_Table_body-black-left" lang="en-US">
                                  <span class="bold_condensed_italic" lang="">Terrestrial, freshwater and ice</span>
                                </p>
                              </td>
                            </tr>
                            <tr class="Table _idGenTableRowColumn-8">
                              <td class="Table Body Body">
                                <p class="Body_Tables_Table_body-black-left" lang="en-US">Atmospheric temperature</p>
                              </td>
                              <td class="Table Body Body">
                                <p class="Body_Tables_Table_body-black-left" lang="en-US">Arctic</p>
                              </td>
                              <td class="Table Body Body">
                                <p class="Body_Tables_Table_body-black-left" lang="en-US">Increase of means higher than twice global mean, most pronounced in cold season (<span class="condensed_italic" lang="">high confidence</span>, WG1-12)</p>
                              </td>
                              <td class="Table Body Body">
                                <p class="Body_Tables_Table_body-black-left" lang="en-US">Further increase (Table SMCCP6.1)</p>
                              </td>
                            </tr>
                            <tr class="Table _idGenTableRowColumn-9">
                              <td class="Table Body Body"/>
                              <td class="Table Body Body">
                                <p class="Body_Tables_Table_body-black-left" lang="en-US">Antarctic</p>
                              </td>
                              <td class="Table Body Body">
                                <p class="Body_Tables_Table_body-black-left" lang="en-US">Warmed from 1957 to 2016 at 0.2&#8211;0.3&#176;C per decade in west Antarctica (<span class="condensed_italic" lang="">very likely </span>); no consistent change in east Antarctica (<span class="condensed_italic" lang="">limited evidence</span>, WG1-12)</p>
                              </td>
                              <td class="Table Body Body">
                                <p class="Body_Tables_Table_body-black-left" lang="en-US">Region: future warming across continent (<span class="condensed_italic" lang="">high confidence</span>, WG1-12)</p>
                              </td>
                            </tr>
                            <tr class="Table _idGenTableRowColumn-8">
                              <td class="Table Body Body">
                                <p class="Body_Tables_Table_body-black-left" lang="en-US">Extreme heat events</p>
                              </td>
                              <td class="Table Body Body">
                                <p class="Body_Tables_Table_body-black-left" lang="en-US">Arctic</p>
                              </td>
                              <td class="Table Body Body">
                                <p class="Body_Tables_Table_body-black-left" lang="en-US">Increase since 1979 (WG1-12)</p>
                              </td>
                              <td class="Table Body Body">
                                <p class="Body_Tables_Table_body-black-left" lang="en-US">Polar amplification will drive further increases (<span class="condensed_italic" lang="">high confidence</span>, WG1-12)</p>
                              </td>
                            </tr>
                            <tr class="Table _idGenTableRowColumn-11">
                              <td class="Table Body Body"/>
                              <td class="Table Body Body">
                                <p class="Body_Tables_Table_body-black-left" lang="en-US">Antarctic</p>
                              </td>
                              <td class="Table Body Body">
                                <p class="Body_Tables_Table_body-black-left" lang="en-US">Heatwave across Antarctica (2020) (WG1-12, (<a class="reference-link" href="#Robinson--2020">Robinson et al., 2020</a>).</p>
                              </td>
                              <td class="Table Body Body">
                                <p class="Body_Tables_Table_body-black-left" lang="en-US">Further increase, with &gt;50 additional days above freezing by 2100 (under RCP8.5, vs. 2014) over the Antarctic Peninsula but smaller changes over mainland Antarctica (<span class="condensed_italic" lang="">medium confidence, </span>WG1-12)</p>
                              </td>
                            </tr>
                            <tr class="Table _idGenTableRowColumn-8">
                              <td class="Table Body Body">
                                <p class="Body_Tables_Table_body-black-left" lang="en-US"><span class="condensed_italic" lang="">Fire weather (FW) </span> </p>
                              </td>
                              <td class="Table Body Body">
                                <p class="Body_Tables_Table_body-black-left" lang="en-US">Arctic</p>
                              </td>
                              <td class="Table Body Body">
                                <p class="Body_Tables_Table_body-black-left" lang="en-US">Over four decades, fire season lengthened and number of fires increased in North America (WG1-12)</p>
                              </td>
                              <td class="Table Body Body">
                                <p class="Body_Tables_Table_body-black-left" lang="en-US">FW index increases and more frequent fires in tundra regions (<span class="condensed_italic" lang="">high confidence</span>, WG1-12)</p>
                              </td>
                            </tr>
                            <tr class="Table _idGenTableRowColumn-12">
                              <td class="Table Body Body">
                                <p class="Body_Tables_Table_body-black-left" lang="en-US">Precipitation</p>
                              </td>
                              <td class="Table Body Body">
                                <p class="Body_Tables_Table_body-black-left" lang="en-US">Arctic</p>
                              </td>
                              <td class="Table Body Body">
                                <p class="Body_Tables_Table_body-black-left" lang="en-US">Increase, highest during the cold season (<span class="condensed_italic" lang="">likely </span>, Atlas)</p>
                              </td>
                              <td class="Table Body Body"/>
                            </tr>
                            <tr class="Table _idGenTableRowColumn-10">
                              <td class="Table Body Body"/>
                              <td class="Table Body Body">
                                <p class="Body_Tables_Table_body-black-left" lang="en-US">Antarctic</p>
                              </td>
                              <td class="Table Body Body">
                                <p class="Body_Tables_Table_body-black-left" lang="en-US">Increasing trend over the 20th century, while large interannual variability masks any existing trend since the end of 1970 (<span class="condensed_italic" lang="">medium confidence</span>, Atlas)</p>
                              </td>
                              <td class="Table Body Body"/>
                            </tr>
                            <tr class="Table _idGenTableRowColumn-7">
                              <td class="Table Body Body">
                                <p class="Body_Tables_Table_body-black-left" lang="en-US">
                                  <span class="condensed_italic" lang="">Floods</span>
                                </p>
                              </td>
                              <td class="Table Body Body">
                                <p class="Body_Tables_Table_body-black-left" lang="en-US">Arctic</p>
                              </td>
                              <td class="Table Body Body">
                                <p class="Body_Tables_Table_body-black-left" lang="en-US">Increasing river runoff, increasing heavy precipitation (<span class="condensed_italic" lang="">high confidence</span>, WG1-12)</p>
                              </td>
                              <td class="Table Body Body">
                                <p class="Body_Tables_Table_body-black-left" lang="en-US">Further increases in all variables (<span class="condensed_italic" lang="">high confidence</span>, WG1-12)</p>
                              </td>
                            </tr>
                            <tr class="Table _idGenTableRowColumn-8">
                              <td class="Table Body Body">
                                <p class="Body_Tables_Table_body-black-left" lang="en-US">
                                  <span class="condensed_italic" lang="">Snowfall</span>
                                </p>
                              </td>
                              <td class="Table Body Body">
                                <p class="Body_Tables_Table_body-black-left" lang="en-US">Arctic</p>
                              </td>
                              <td class="Table Body Body">
                                <p class="Body_Tables_Table_body-black-left" lang="en-US">Recent overall declines in snow extent and seasonal duration (<span class="condensed_italic" lang="">high confidence</span>, WG1-12)</p>
                              </td>
                              <td class="Table Body Body">
                                <p class="Body_Tables_Table_body-black-left" lang="en-US">Higher % of precipitation as rain (fall and spring) (<span class="condensed_italic" lang="">high confidence</span>, WG1-12)</p>
                              </td>
                            </tr>
                            <tr class="Table _idGenTableRowColumn-7">
                              <td class="Table Body Body"/>
                              <td class="Table Body Body">
                                <p class="Body_Tables_Table_body-black-left" lang="en-US">Antarctic</p>
                              </td>
                              <td class="Table Body Body">
                                <p class="Body_Tables_Table_body-black-left" lang="en-US">Increases in the 20th century (<span class="condensed_italic" lang="">medium confidence</span>, WG1-12)</p>
                              </td>
                              <td class="Table Body Body">
                                <p class="Body_Tables_Table_body-black-left" lang="en-US">Further increases (over land) (<span class="condensed_italic" lang="">likely </span>, WG1-12)</p>
                              </td>
                            </tr>
                            <tr class="Table _idGenTableRowColumn-10">
                              <td class="Table Body Body">
                                <p class="Body_Tables_Table_body-black-left" lang="en-US">
                                  <span class="condensed_italic" lang="">Glaciers and IS</span>
                                </p>
                              </td>
                              <td class="Table Body Body">
                                <p class="Body_Tables_Table_body-black-left" lang="en-US">Arctic</p>
                              </td>
                              <td class="Table Body Body">
                                <p class="Body_Tables_Table_body-black-left" lang="en-US">Losses in glacier mass since 2000 (<span class="condensed_italic" lang="">high confidence</span>, WG1-12); losses in Greenland IS mass since 1980 at increasing rates (<span class="condensed_italic" lang="">high confidence</span>, WG1-9)</p>
                              </td>
                              <td class="Table Body Body">
                                <p class="Body_Tables_Table_body-black-left" lang="en-US">Further mass loss until 2100 under all warming scenarios (<span class="condensed_italic" lang="">virtually certain</span>, WG1-9 and -12)</p>
                              </td>
                            </tr>
                            <tr class="Table _idGenTableRowColumn-11">
                              <td class="Table Body Body"/>
                              <td class="Table Body Body">
                                <p class="Body_Tables_Table_body-black-left" lang="en-US">Antarctic</p>
                              </td>
                              <td class="Table Body Body">
                                <p class="Body_Tables_Table_body-black-left" lang="en-US">Losses in glacier mass since 2000 (<span class="condensed_italic" lang="">high confidence</span>, WG1-12); losses in Antarctic IS mass since 1992 (in west Antarctica but also parts of east Antarctica since 2000) (<span class="condensed_italic" lang="">high confidence</span>, WG1-9)</p>
                              </td>
                              <td class="Table Body Body">
                                <p class="Body_Tables_Table_body-black-left" lang="en-US">Further mass loss until 2100 under all warming scenarios (<span class="condensed_italic" lang="">likely </span>, WG1-9 and -12)</p>
                              </td>
                            </tr>
                            <tr class="Table _idGenTableRowColumn-13">
                              <td class="Table Body Body">
                                <p class="Body_Tables_Table_body-black-left" lang="en-US">
                                  <span class="condensed_italic" lang="">Permafrost </span>
                                </p>
                              </td>
                              <td class="Table Body Body">
                                <p class="Body_Tables_Table_body-black-left" lang="en-US">Arctic</p>
                              </td>
                              <td class="Table Body Body">
                                <p class="Body_Tables_Table_body-black-left" lang="en-US">Rising permafrost temperatures over past three to four decades (<span class="condensed_italic" lang="">high confidence</span>, WG1-9); decreases in permafrost active layer thickness (<span class="condensed_italic" lang="">very high confidence</span>) (<a class="reference-link" href="#Biskaborn--2019">Biskaborn et al., 2019</a>). Submarine permafrost warming (<span class="condensed_italic" lang="">medium confidence</span>, WG1-9)</p>
                              </td>
                              <td class="Table Body Body">
                                <p class="Body_Tables_Table_body-black-left" lang="en-US">Increases in temperature and active layer thickness (WG1-9); near-surface terrestrial permafrost extent will reduce under all scenarios by 2100 (<span class="condensed_italic" lang="">virtually certain</span>, WG1-9)</p>
                              </td>

                              <td class="Table Body Body">
                                <p class="Body_Tables_Table_body-black-left" lang="en-US">Antarctic</p>
                              </td>
                              <td class="Table Body Body">
                                <p class="Body_Tables_Table_body-black-left" lang="en-US">Rising permafrost temperatures over past three to four decades (<span class="condensed_italic" lang="">high confidence</span>, WG1-9)</p>
                              </td>
                              <td class="Table Body Body"/>
                            </tr>
                            <tr class="Table _idGenTableRowColumn-14">
                              <td class="Table Body Body">
                                <p class="Body_Tables_Table_body-black-left" lang="en-US">
                                  <span class="condensed_italic" lang="">Lake, river ice</span>
                                </p>

                              <td class="Table Body Body">
                                <p class="Body_Tables_Table_body-black-left" lang="en-US">Arctic</p>
                              </td>
                              <td class="Table Body Body">
                                <p class="Body_Tables_Table_body-black-left" lang="en-US">Declines in seasonal lake ice cover thickness and duration over most Arctic lakes; declines in cold-season river ice extent (<span class="condensed_italic" lang="">high confidence, </span>WG1-12)</p>
                              </td>
                              <td class="Table Body Body">
                                <p class="Body_Tables_Table_body-black-left" lang="en-US">Many lakes will lose &gt;1 month lake ice cover by 2050 (<span class="condensed_italic" lang="">medium confidence</span>), Reductions in average Northern Hemisphere seasonal river ice duration of 6.10 days per 1&#176;C GWL (WG1-12)</p>
                              </td>

                                </p>

                                <p class="Body_Tables_Table_body-black-left" lang="en-US">Arctic</p>
                              </td>

                                <p class="Body_Tables_Table_body-black-left" lang="en-US">Increase (<span class="condensed_italic" lang="">medium confidence</span>, WG1-12)</p>
                              </td>
                              <td class="Table Body Body">
                                <p class="Body_Tables_Table_body-black-left" lang="en-US">Further increase (<span class="condensed_italic" lang="">high agreement-limited evidence, </span>WG1-12)</p>
                              </td>
                            </tr>
                            <tr class="Table _idGenTableRowColumn-15">

                              <td class="Table Body Body">

                              </td>
                              <td class="Table Body Body">
                                <p class="Body_Tables_Table_body-black-left" lang="en-US">(Lack of studies, WG1-12)</p>

                    <div class="h1-container" id="CCP6.2">
                      <h1 class="Headings_H1-numbered" lang="en-GB">CCP6.2  Observed Impacts and Future Risks <span class="share-block"><img class="share-icon" src="../../share.png"/></span><button class="btn-ipcc btn btn-primary chapter-expand">Expand section</button></h1>
                      <div class="h1-siblings" id="h1-3-siblings"/>
                      <div class="h2-container" id="CCP6.2.1">
                        <h2 class="Headings_H2-sub" lang="de-DE">CCP6.2.1  Marine and Coastal Ecosystems <span class="arrow-up"/><span class="arrow-down"/><span class="share-block"><img class="share-icon" src="../../share.png"/></span></h2>
                        <div class="h2-siblings" id="h2-1-siblings">
                          <div class="h3-container" id="CCP6.2.1.1">
                            <h3 class="Headings_H3" lang="de-DE">CCP6.2.1.1  Warming and sea ice retreat cause shifts in distribution ranges of species <span class="arrow-up"/><span class="arrow-down"/><span class="share-block"><img class="share-icon" src="../../share.png"/></span></h3>
                            <div class="h3-siblings" id="h3-1-siblings">
                              <p class="Body_Body-justify" lang="en-GB">In Arctic seas, warming and other climate impact drivers, primarily sea ice retreat, have led to range contractions of Arctic marine and ice-associated species and poleward expansions of boreal species (<span class="condensed_italic" lang="">very high confidence</span>) (Table CCP6.2) (<a class="reference-link" href="#Bouchard--2020">Bouchard and Fortier, 2020</a>; <a class="reference-link" href="#Huntington--2020">Huntington et al., 2020</a>; <a class="reference-link" href="#Mueter--2020">Mueter et al., 2020</a>) even though light and energetics at seasonal extremes may limit some range shifts (<span class="condensed_italic" lang="">limited evidence</span>) (<a class="reference-link" href="#Ljungstr&#246;m--2021">Ljungstr&#246;m et al., 2021</a>). Altered conditions allow more microorganisms to move poleward and provide opportunities for invasive species (<a class="reference-link" href="#Cavicchioli--2019">Cavicchioli et al., 2019</a>; <a class="reference-link" href="#Nielsen--2020">Nielsen et al., 2020</a>; Mustonen, 2021). Phytoplankton communities harbour increasing numbers of taxa, including harmful species (<a class="reference-link" href="#Lovejoy--2017">Lovejoy et al., 2017</a>) and the coccolithophore <span class="condensed_italic" lang="">Emiliania huxleyi</span>, which meanwhile forms regular blooms in the Barents Sea (<a class="reference-link" href="#Neukermans--2018">Neukermans et al., 2018</a>; <a class="reference-link" href="#Silkin--2020">Silkin et al., 2020</a>). Northward shifts of pelagic, benthic and demersal species and subsequent changes in Arctic community composition have been observed in the Bering, Greenland and Barents Seas (<a class="reference-link" href="#Grebmeier--2018">Grebmeier et al., 2018</a>; <a class="reference-link" href="#Mueter--2020">Mueter et al., 2020</a>), as have higher numbers of economically important boreal species such as haddock and Pacific and Atlantic cod (CCP6.2.3). Cold-adapted Arctic fish species such as polar cod (<span class="condensed_italic" lang="">Boreogadus saida</span>) are expected to decline further and lose spawning habitats at GWL &gt;1.5&#176;C, mainly due to a lack of phenotypic plasticity, as well as increasing interspecific competition with and predation from invading boreal species (<a class="reference-link" href="#Dahlke--2018">Dahlke et al., 2018</a>; <a class="reference-link" href="#Marsh--2020">Marsh and Mueter, 2020</a>). Numerous mammals and sea birds respond to changes in the distribution of their preferred habitats and prey by shifting their range, altering the timing or pathways for migration or switching prey (<span class="condensed_italic" lang="">very high confidence</span>) (<a class="reference-link" href="#Hamilton--2017">Hamilton et al., 2017</a>; <a class="reference-link" href="#Loseto--2018">Loseto et al., 2018</a>; <a class="reference-link" href="#Meredith--2019">Meredith et al., 2019</a>). Ice-breeding seals (e.g., harp seals &#8211;<span class="condensed_italic" lang="">Pagophilus groenlandicus</span>)<span class="condensed_italic" lang=""/> often have little scope to shift distribution, leading to increases in strandings and pup mortality in years with little ice cover (<span class="condensed_italic" lang="">medium confidence</span>) (Table CCP6.2) (<a class="reference-link" href="#Boveng--2020">Boveng et al., 2020</a>). Recent studies confirm that polar bears (<span class="condensed_italic" lang="">Ursus maritimus</span>)<span class="condensed_italic" lang=""/> are negatively affected by changing ice and snow conditions with decreases in denning, foraging, reproduction, genetic diversity and survival rates (<span class="condensed_italic" lang="">very high confidence</span>) (Table CCP6.2) (<a class="reference-link" href="#Boonstra--2020">Boonstra et al., 2020</a>; <a class="reference-link" href="#Johnson--2020">Johnson and Derocher, 2020</a>; <a class="reference-link" href="#Maduna--2021">Maduna et al., 2021</a>).</p>
                              <p class="Body_Body-justify" lang="en-GB">In the Southern Ocean, southward range shifts are expected to result from increased warming coupled with the narrow thermal tolerance of cold-adapted Antarctic species (<a class="reference-link" href="#Convey--2019">Convey and Peck, 2019</a>; <a class="reference-link" href="#Morley--2019">Morley et al., 2019</a>; <a class="reference-link" href="#Gutt--2021">Gutt et al., 2021</a>). Such shifts have so far only been detected for Antarctic krill (<span class="condensed_italic" lang="">Euphausia superba</span>), with a poleward contraction of the highest densities of krill in the Atlantic sector (<span class="condensed_italic" lang="">medium confidence</span>) (Table CCP6.2); (<a class="reference-link" href="#Atkinson--2019">Atkinson et al., 2019</a>). Ocean warming is expected to put pressure on Antarctic phytoplankton (<a class="reference-link" href="#Pinkerton--2021">Pinkerton et al., 2021</a>) and fish species unable to move further south in shelf areas, including waters off sub-Antarctic islands (<span class="condensed_italic" lang="">low confidence</span>) (Table CCP6.2) (<a class="reference-link" href="#Caccavo--2021">Caccavo et al., 2021</a>). Off the Antarctic Peninsula and sub-Antarctic islands, invasive benthic invertebrates and macroalgae have already been detected (<span class="condensed_italic" lang="">medium confidence</span>) (<a class="reference-link" href="#Fraser--2018">Fraser et al., 2018</a>; <a class="reference-link" href="#Avila--2020">Avila et al., 2020</a>; <a class="reference-link" href="#Brasier--2021">Brasier et al., 2021</a>), and projected changes will further favour the spread of invasive species (<a class="reference-link" href="#Fraser--2020">Fraser et al., 2020</a>; <a class="reference-link" href="#Macaya--2020">Macaya et al., 2020</a>). On a local to regional scale, the benthic recolonisation of the newly exposed seabed after the disintegration of ice shelves shows typical succession patterns, with mass occurrences of few pioneer species followed by gradual shifts to a more diverse typical shelf community, driven by increasing pelagic primary production upon ice-shelf collapse and strengthening of the pelagic&#8211;benthic coupling (<span class="condensed_italic" lang="">high confidence</span>) (<a class="reference-link" href="#Brasier--2021">Brasier et al., 2021</a>; <a class="reference-link" href="#Gutt--2021">Gutt et al., 2021</a>). Range changes of Antarctic birds and marine mammals have been observed, which vary among sub-regions and are mostly attributable to changes in sea ice extent and food availability (<span class="condensed_italic" lang="">high confidence</span>) (Table CCP6.2) (<a class="reference-link" href="#Gutt--2018">Gutt et al., 2018</a>; <a class="reference-link" href="#Convey--2019">Convey and Peck, 2019</a>; <a class="reference-link" href="#Bestley--2020">Bestley et al., 2020</a>). With projected sea ice retreat and associated change in prey distribution (<a class="reference-link" href="#Henley--2020">Henley et al., 2020</a>), foraging areas of sub-Antarctic sea birds and marine mammals will shift southwards, leading to elevated pressure on populations due to higher foraging costs during the breeding season (<span class="condensed_italic" lang="">medium confidence</span>) (<a class="reference-link" href="#Ropert-Coudert--2018">Ropert-Coudert et al., 2018</a>; <a class="reference-link" href="#Bestley--2020">Bestley et al., 2020</a>; <a class="reference-link" href="#Hindell--2020">Hindell et al., 2020</a>; <a class="reference-link" href="#H&#252;ckst&#228;dt--2020">H&#252;ckst&#228;dt et al., 2020</a>; <a class="reference-link" href="#Wege--2021">Wege et al., 2021</a>). These changes are particularly impacting emperor penguins (<span class="condensed_italic" lang="">Aptenodytes forsteri</span>) (Table CCP6.2), with the projected population declining close to extinction by 2100 under Business-As-Usual climate scenarios (<span class="condensed_italic" lang="">medium confidence</span>) (<a class="reference-link" href="#Jenouvrier--2020">Jenouvrier et al., 2020</a>; <a class="reference-link" href="#Trathan--2020">Trathan et al., 2020</a>; <a class="reference-link" href="#Jenouvrier--2021">Jenouvrier et al., 2021</a>), whereas population decline is halted by 2060 under the 1.5&#176;C climate scenario (<span class="condensed_italic" lang="">low confidence</span>) (<a class="reference-link" href="#Jenouvrier--2020">Jenouvrier et al., 2020</a>).</p>
                              <p class="Body_Tables_Table_title" lang="en-US"><span class="table_number" lang="">Table CCP6.2  | </span> Summary of observed impacts (and projected risks of climate change for polar marine, terrestrial and freshwater ecosystems identified in <a class="section-link" data-title="Chemical Changes" href="/report/ar6/wg2/chapter/chapter-3#3.2.3">Section 3.2.3</a>  and Box 3.4 in <a class="section-link" data-title="Oceans and Coastal Ecosystems and their Services" href="/report/ar6/wg2/chapter/chapter-3">Chapter 3</a>  of the IPCC SROCC (<a class="reference-link" href="#Meredith--2019">Meredith et al., 2019</a>).</p>

                                    <td class="Table Body Body">
                                      <p class="Body_Tables_Table_body-black-left" lang="en-US">Risk: decreasing production of walleye pollock, Pacific cod and arrowtooth flounder, due to declines in large copepods (<span class="condensed_italic" lang="">medium confidence</span>)</p>

                                  </tr>
                                  <tr class="Table _idGenTableRowColumn-7">

                                    <td class="Table Body Body">
                                      <p class="Body_Tables_Table_body-black-left" lang="en-US">Sea ice loss</p>
                                    </td>
                                    <td class="Table Body Body">
                                      <p class="Body_Tables_Table_body-black-left" lang="en-US">Impact: phenological, behavioural, physiological and distributional changes; endemic marine mammals have little scope to move northwards in response to warming (<span class="condensed_italic" lang="">high confidence</span>)</p>

                                    </td>
                                    <td class="Table Body Body">
                                      <p class="Body_Tables_Table_body-black-left" lang="en-US">Impact: phenological shifts, and changes in distribution, denning, foraging behaviour and survival rates (<span class="condensed_italic" lang="">hi</span><span class="condensed_italic" lang="">gh co</span><span class="condensed_italic" lang="">nfidence</span>)</p>

                          <div class="h3-container" id="CCP6.2.1.2">
                            <h3 class="Headings_H3" lang="de-DE">CCP6.2.1.2  Ocean warming and sea ice changes affect marine primary productivity <span class="arrow-up"/><span class="arrow-down"/><span class="share-block"><img class="share-icon" src="../../share.png"/></span></h3>
                            <div class="h3-siblings" id="h3-2-siblings">
                              <p class="Body_Body-justify" lang="en-GB">In the central Arctic Ocean, primary productivity remains low (<span class="condensed_italic" lang="">medium confidence</span>), mostly due to persisting nutrient and light limitations (<a class="reference-link" href="#Randelhoff--2016">Randelhoff and Guthrie, 2016</a>; <a class="reference-link" href="#Ardyna--2020">Ardyna and Arrigo, 2020</a>). In inflowing (Barents and Chukchi Sea) and interior shelf regions (Laptev, Kara, and Siberian Sea), changes in sea ice extent, thickness and seasonal timing have altered light and mixing regimes, causing increasing overall productivity in open-water and under-ice habitats, and in leads (<span class="condensed_italic" lang="">high confidence</span>) (Table CCP6.2) (<a class="reference-link" href="#Ardyna--2020">Ardyna and Arrigo, 2020</a>; <a class="reference-link" href="#Lannuzel--2020">Lannuzel et al., 2020</a>). Productivity changes are associated with the earlier-onset phytoplankton spring blooms and the increasing occurrence of autumn blooms, particularly at lower latitudes of the Arctic (<span class="condensed_italic" lang="">high confidence</span>) (Table CCP6.2) (<a class="reference-link" href="#Tedesco--2019">Tedesco et al., 2019</a>; <a class="reference-link" href="#Ardyna--2020">Ardyna et al., 2020</a>). Ice algal communities are expected to change in productivity and species composition in response to the transition from a predominantly multi-year to a seasonal sea ice pack (<span class="condensed_italic" lang="">high confidence</span>) (<a class="reference-link" href="#Meredith--2019">Meredith et al., 2019</a>; <a class="reference-link" href="#Tedesco--2019">Tedesco et al., 2019</a>; <a class="reference-link" href="#Lannuzel--2020">Lannuzel et al., 2020</a>). Thinner sea ice increases the likelihood of surface flooding, resulting in the occurrence of snow-infiltration algal communities, which have been described in the Atlantic sector of the Arctic Ocean (<a class="reference-link" href="#Fern&#225;ndez-M&#233;ndez--2018">Fern&#225;ndez-M&#233;ndez et al., 2018</a>) and observed by Indigenous Peoples off northern Greenland (Box CCP6.2). The observed transition from marine-terminating to land-terminating glaciers has a negative impact on coastal ecosystems in Greenland (<span class="condensed_italic" lang="">medium confidence</span>) (<a class="reference-link" href="#Meire--2017">Meire et al., 2017</a>; <a class="reference-link" href="#Hopwood--2018">Hopwood et al., 2018</a>) and Svalbard (<a class="reference-link" href="#Halbach--2019">Halbach et al., 2019</a>), as land-terminating glacial meltwater input increases stratification, which hinders vertical mixing and lowers local productivity, whereas marine-terminating glaciers can trigger upwelling, which supplies nutrients and enables higher productivity in the summer (<a class="reference-link" href="#Hopwood--2020">Hopwood et al., 2020</a>). Macroalgae and seagrass are generally expanding in the Arctic (<span class="condensed_italic" lang="">medium confidence</span>), though there are negative trends in some regions, partly due to increased runoff and turbidity from melting glaciers (<a class="reference-link" href="#Hopwood--2020">Hopwood et al., 2020</a>; <a class="reference-link" href="#Krause-Jensen--2020">Krause-Jensen et al., 2020</a>). In the future Arctic Ocean, higher light availability in response to further sea ice decline and reduced deep mixing is projected to generally increase primary productivity (<span class="condensed_italic" lang="">medium confidence</span>), leading to an increase in phytoplankton biomass from 2000 to 2100 by ~20% for SSP1-2.6 and ~30&#8211;40% for SSP5-8.5 (Chapter 3) (<a class="reference-link" href="#Kwiatkowski--2020">Kwiatkowski et al., 2020</a>). However, productivity may increase less than predicted and eventually even decrease once nutrient limitation outweighs the benefits of higher light availability (<span class="condensed_italic" lang="">low confidence</span>) (<a class="reference-link" href="#Randelhoff--2020">Randelhoff et al., 2020</a>; <a class="reference-link" href="#Seifert--2020">Seifert et al., 2020</a>).</p>
                              <p class="Body_Body-justify" lang="en-GB">Despite large-scale environmental changes in the Southern Ocean, such as the deepening of the summer mixed layer (<span class="condensed_italic" lang="">medium confidence</span>) (<a class="reference-link" href="#Panassa--2018">Panassa et al., 2018</a>; <a class="reference-link" href="#Sall&#233;e--2021">Sall&#233;e et al., 2021</a>), and the expected impacts via altered nutrient entrainment, light availability and grazer encounter rates (Chapter 3) (<a class="reference-link" href="#Behrenfeld--2014">Behrenfeld and Boss, 2014</a>; <a class="reference-link" href="#Llort--2019">Llort et al., 2019</a>), assessments indicated no consistent changes in primary production at the circumpolar scale, as sectors and regions show different trends (<span class="condensed_italic" lang="">medium confidence</span>). Although a global assessment found no overall changes in circumpolar primary production from 1998 to 2015 (Table CCP6.2) (<a class="reference-link" href="#Gregg--2019">Gregg and Rousseaux, 2019</a>), another study showed an overall increase in phytoplankton biomass in the mixed layer over the period 1997&#8211;2019 (<a class="reference-link" href="#Pinkerton--2021">Pinkerton et al., 2021</a>). Primary productivity has increased in the Pacific sector and decreased in the Atlantic sector and the Ross Sea (<span class="condensed_italic" lang="">low confidence</span>) (<a class="reference-link" href="#Kahru--2017">Kahru et al., 2017</a>; <a class="reference-link" href="#Henley--2020">Henley et al., 2020</a>; <a class="reference-link" href="#Pinkerton--2021">Pinkerton et al., 2021</a>). Higher productivity has also been observed in regions where rapid environmental changes occurred, such as in the vicinity of retreating IS and declining sea ice cover off the Antarctic Peninsula (<span class="condensed_italic" lang="">medium confidence</span>) (<a class="reference-link" href="#Henley--2020">Henley et al., 2020</a>; <a class="reference-link" href="#Rogers--2020">Rogers et al., 2020</a>), although diversity of phytoplankton may decrease with warming temperatures and less sea ice (<span class="condensed_italic" lang="">limited evidence</span>) (<a class="reference-link" href="#Lin--2021">Lin et al., 2021</a>). In the future Southern Ocean, stronger upwelling due to strengthened westerly winds is projected to increase primary productivity at the circumpolar scale in the Antarctic Zone and to the north of the sub-Antarctic Front, but not in the sub-Antarctic Zone (<span class="condensed_italic" lang="">low to medium confidence</span>) (Chapter 3) (<a class="reference-link" href="#Henley--2020">Henley et al., 2020</a>; <a class="reference-link" href="#Kwiatkowski--2020">Kwiatkowski et al., 2020</a>; <a class="reference-link" href="#Pinkerton--2021">Pinkerton et al., 2021</a>). The largest changes are projected to occur after 2100 at 2&#8211;6&#176;C warming of the surface ocean (<a class="reference-link" href="#Moore--2018">Moore et al., 2018</a>). Such an increase in Southern Ocean productivity will lead to a decline in global ocean productivity (<span class="condensed_italic" lang="">medium confidence</span>), due to nutrient trapping (<a class="reference-link" href="#Moore--2018">Moore et al., 2018</a>) and altered ocean carbon uptake through ecosystem feedbacks (<a class="reference-link" href="#Hauck--2018">Hauck et al., 2018</a>).</p>
                            </div>
                          </div>
                          <div class="h3-container" id="CCP6.2.1.3">
                            <h3 class="Headings_H3" lang="de-DE">CCP6.2.1.3  Impacts of ocean acidification vary spatially and among biotas <span class="arrow-up"/><span class="arrow-down"/><span class="share-block"><img class="share-icon" src="../../share.png"/></span></h3>
                            <div class="h3-siblings" id="h3-3-siblings">
                              <p class="Body_Body-justify" lang="en-GB">In Arctic seas, areas with acidification levels corrosive to organisms forming CaCO<span class="subscript _idGenCharOverride-1" lang="">3</span> shells or skeletons expanded between the 1990s and 2010 (<span class="condensed_italic" lang="">high confidence</span>), with instances of extreme aragonite under-saturation (<a class="reference-link" href="#Ding--2017">Ding et al., 2017</a>; <a class="reference-link" href="#Zhang--2020">Zhang et al., 2020</a>). Key species of diatom and picoeukaryote phytoplankton species yet appear relatively resilient to decreasing pH levels over a range of temperature and light conditions (<span class="condensed_italic" lang="">medium confidence</span>) (Table CCP6.2) (<a class="reference-link" href="#Thoisen--2015">Thoisen et al., 2015</a>; <a class="reference-link" href="#Wolf--2018">Wolf et al., 2018</a>; <a class="reference-link" href="#White--2020">White et al., 2020</a>). In contrast, there is evidence for species- and stage-specific sensitivities of zooplankton, pteropods and fishes (<span class="condensed_italic" lang="">high confidence</span>) (Table CCP6.2) (<a class="reference-link" href="#Bailey--2016">Bailey et al., 2016</a>; <a class="reference-link" href="#Dahlke--2018">Dahlke et al., 2018</a>; <a class="reference-link" href="#Thor--2018">Thor et al., 2018</a>). Warming, rising river-sediment discharge and coastal erosion in Arctic shelf regions are expected to increase the input of labile, often permafrost-derived organic carbon, the remineralisation of which further increases acidification rates (<span class="condensed_italic" lang="">medium confidence</span>) (<a class="reference-link" href="#Semiletov--2016">Semiletov et al., 2016</a>; <a class="reference-link" href="#AMAP--2018b">AMAP, 2018b</a>; <a class="reference-link" href="#Br&#246;der--2018">Br&#246;der et al., 2018</a>). Interactions with other physical changes, such as warming or freshening, are expected to aggravate the impacts of ocean acidification (Chapter 3) (<a class="reference-link" href="#Falkenberg--2018">Falkenberg et al., 2018</a>).</p>
                              <p class="Body_Body-justify" lang="en-GB">In the Southern Ocean, calcifying organisms are also most vulnerable to ocean acidification (<span class="condensed_italic" lang="">high confidence</span>) (Table CCP6.2), as evidenced by rates of calcification declining by 3.9% between 1998 and 2014 (<a class="reference-link" href="#Freeman--2015">Freeman and Lovenduski, 2015</a>). Calcifying species with low-magnesium calcite or mechanisms to protect their skeletons are less vulnerable to the corrosive effects of acidification than those using aragonite or high-magnesium calcite (<span class="condensed_italic" lang="">high confidence</span>) (<a class="reference-link" href="#Figuerola--2021">Figuerola et al., 2021</a>). In diatom-dominated communities, silicification diminishes with reduced pH levels, albeit with rates differing among taxa (<span class="condensed_italic" lang="">low confidence</span>) (<a class="reference-link" href="#Petrou--2019">Petrou et al., 2019</a>). Species-specific responses exist regarding growth and primary production, which are further strongly modulated by iron and light availability (<span class="condensed_italic" lang="">high confidence</span>) (<a class="reference-link" href="#Hoppe--2013">Hoppe et al., 2013</a>; <a class="reference-link" href="#Trimborn--2013">Trimborn et al., 2013</a>; <a class="reference-link" href="#Hoppe--2015">Hoppe et al., 2015</a>; <a class="reference-link" href="#Henley--2020">Henley et al., 2020</a>; <a class="reference-link" href="#Seifert--2020">Seifert et al., 2020</a>). A meta-analysis yielded different CO<span class="subscript _idGenCharOverride-1" lang="">2</span> thresholds for Antarctic organismal groups; for example, negative impacts emerged at &gt;1000<span class="glyphe_greek-Calibri" lang="">&#956;</span> atm CO<span class="subscript _idGenCharOverride-1" lang="">2</span> in phytoplankton and at &gt;1500<span class="glyphe_greek-Calibri" lang="">&#956;</span> atm CO<span class="subscript _idGenCharOverride-1" lang="">2</span> in invertebrates, whereas bacterial abundance was positively affected by ocean acidification (<a class="reference-link" href="#Hancock--2020">Hancock et al., 2020</a>). Species sensitivity can also differ strongly between life-cycle stages (Chapter 3.3.2). For instance, eggs and embryos of Antarctic krill are negatively impacted at &gt;1250<span class="glyphe_greek-Calibri" lang="">&#956;</span> atm CO<span class="subscript _idGenCharOverride-1" lang="">2</span> whereas adults can thrive even at 1000&#8211;2000 &#181;atm CO<span class="subscript _idGenCharOverride-1" lang="">2</span> over one year (<a class="reference-link" href="#Kawaguchi--2013">Kawaguchi et al., 2013</a>; <a class="reference-link" href="#Ericson--2018">Ericson et al., 2018</a>).</p>
                            </div>
                          </div>
                          <div class="h3-container" id="CCP6.2.1.4">
                            <h3 class="Headings_H3" lang="de-DE">CCP6.2.1.4  Climate change alters food web dynamics <span class="arrow-up"/><span class="arrow-down"/><span class="share-block"><img class="share-icon" src="../../share.png"/></span></h3>
                            <div class="h3-siblings" id="h3-4-siblings">
