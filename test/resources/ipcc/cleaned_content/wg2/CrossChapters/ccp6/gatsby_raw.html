                      <div class="h2-container" id="CCP6.3.2">
                        <h2 class="Headings_H2-numbered" lang="de-DE">CCP6.3.2  Adaptation <span class="arrow-up"/><span class="arrow-down"/><span class="share-block"><img class="share-icon" src="../../share.png"/></span></h2>
                        <div class="h2-siblings" id="h2-8-siblings">
                          <div class="h3-container" id="CCP6.3.2.1">
                            <h3 class="Headings_H3" lang="de-DE">CCP6.3.2.1  Current adaptation <span class="arrow-up"/><span class="arrow-down"/><span class="share-block"><img class="share-icon" src="../../share.png"/></span></h3>
                            <div class="h3-siblings" id="h3-11-siblings">
                              <p class="Body_Body-justify" lang="en-GB">Across polar regions, adaptation responses to climate change impacts have ranged from rapid and incremental (e.g., shifting phenologies, alternative harvest or herding strategies) to large and transformative (e.g., switching livelihoods, social&#8211;ecological system transformation) (Figure CCP6.6). Some adaptation measures and opportunities induce novel risks to other sectors or systems resulting in cascading and compounding consequences that are sometimes hard to predict or prepare for (<a class="reference-link" href="#Huntington--2015">Huntington et al., 2015</a>) (Table CCP6.6). Adaptation planning and implementation is greater in the Arctic than Antarctic regions, in part due to disparate magnitudes of realised climate impacts and change between regions (Figure CCP6.2; Table CCP6.1) but also because of the differing governance systems in place (<a class="reference-link" href="#Meredith--2019">Meredith et al., 2019</a>). In the Antarctic region, a climate action plan has been developed for terrestrial systems but not for the Southern Ocean (<a class="reference-link" href="#Meredith--2019">Meredith et al., 2019</a>), although strategies for adapting to climate change have been proposed, including incorporation of precaution in decision making (<a class="reference-link" href="#Constable--2017">Constable et al., 2017</a>). In the Arctic, climate change information is increasingly integrated into research, policy and decision making including incorporation of climate change projections, forecasts and early warnings (<a class="reference-link" href="#AMAP--2017">AMAP, 2017</a>; <a class="reference-link" href="#AMAP--2018a">AMAP, 2018a</a>; <a class="reference-link" href="#Marshall--2019">Marshall et al., 2019</a>; <a class="reference-link" href="#Dorn--2020">Dorn and Zador, 2020</a>; <a class="reference-link" href="#Hollowed--2020">Hollowed et al., 2020</a>; <a class="reference-link" href="#Stram--2021">Stram et al., 2021</a>).</p>
                              <div class="Figure" id="_idContainer046">
                                <p class="Body_Figures_Figure" lang="de-DE">
                                  <img alt="" class="_idGenObjectAttribute-20" id="figure-ccp6-006" loading="lazy" src="https://ipcc.ch/report/ar6/wg2/downloads/figures/IPCC_AR6_WGII_Figure_CCP6_006.png"/>
                                </p>
                                <p class="Body_Figures_Figure_title" lang="en-US">
                                  <span class="figure_number" lang="">Figure CCP6.6 | </span>
                                  <span class="bold_condensed-dark-blue" lang="">Assessment of feasibility and effectiveness of adaptation options by KR in the polar regions (Table CCP6. </span>
                                  <span class="bold_condensed-dark-blue" lang="">6). </span>
                                </p>
                                <div class="ch-figure-button-cont"><a href="/report/ar6/wg2/figures/chapter-ccp6/figure-ccp6-006" target="_blank"><button class="btn-ipcc btn btn-primary ch-figure-button">Open figure</button></a> </div>
                              </div>
                              <p class="Body_Body-justify" lang="en-GB">The majority of adaptations in the Arctic are occurring at sub-regional levels in response to both observed and projected climate change, with evidence of increasing regional level action driven by climate planning processes of subnational governments (<a class="reference-link" href="#AMAP--2017">AMAP, 2017</a>; <a class="reference-link" href="#Labb&#233;--2017">Labb&#233; et al., 2017</a>; <a class="reference-link" href="#AMAP--2018a">AMAP, 2018a</a>; <a class="reference-link" href="#Canosa--2020">Canosa et al., 2020</a>). Implemented adaptation includes alterations to building codes and infrastructure design (<a class="reference-link" href="#Shiklomanov--2017">Shiklomanov et al., 2017</a>; <a class="reference-link" href="#Flynn--2019">Flynn et al., 2019</a>; <a class="reference-link" href="#Standards Council of Canada--2020">Standards Council of Canada, 2020</a>), surveillance (<a class="reference-link" href="#Ruscio--2015">Ruscio et al., 2015</a>; <a class="reference-link" href="#Ford--2019">Ford and Clark, 2019</a>; <a class="reference-link" href="#Meredith--2019">Meredith et al., 2019</a>), information sharing (<a class="reference-link" href="#Berner--2016">Berner et al., 2016</a>), changes to survey and monitoring design (<a class="reference-link" href="#Stevenson--2019">Stevenson and Lauth, 2019</a>), hazard mapping (<a class="reference-link" href="#Flynn--2019">Flynn et al., 2019</a>), use of new technologies (<a class="reference-link" href="#Tejsner--2018">Tejsner and Veldhuis, 2018</a>; <a class="reference-link" href="#Galappaththi--2019">Galappaththi et al., 2019</a>), the development of regional and municipal adaptation plans (<a class="reference-link" href="#Labb&#233;--2017">Labb&#233; et al., 2017</a>), shifting stocks and changes in fishery operations and location (<a class="reference-link" href="#J&#248;rgensen--2019">J&#248;rgensen et al., 2019</a>; <a class="reference-link" href="#Fedewa--2020">Fedewa et al., 2020</a>; <a class="reference-link" href="#Thompson--2020">Thompson et al., 2020</a>), alterations to subsistence harvesting activities (<a class="reference-link" href="#Anderson--2018">Anderson et al., 2018</a>; <a class="reference-link" href="#Ford--2018">Ford et al., 2018</a>; <a class="reference-link" href="#Galappaththi--2019">Galappaththi et al., 2019</a>), co-production of knowledge (<a class="reference-link" href="#Raymond-Yakoubian--2018">Raymond-Yakoubian and Daniel, 2018</a>) and application of IK for resource management (<a class="reference-link" href="#Robards--2018">Robards et al., 2018</a>) and to monitor storms (<a class="reference-link" href="#Rosales--2021">Rosales et al., 2021</a>; <a class="reference-link" href="#Simonee--2021">Simonee et al., 2021</a>). Pan-Arctic and national-level adaptation remains limited (<a class="reference-link" href="#Ford--2014">Ford et al., 2014</a>; <a class="reference-link" href="#Canosa--2020">Canosa et al., 2020</a>), although there have been few efforts to examine the nature of adaptation responses in Arctic regions and large gaps in understanding.</p>
                              <p class="Body_Body-justify" lang="en-GB">Illustrative examples of direct and cascading risks, enabling principles of climate resilience pathways, anticipated future conditions (with certainty levels and compounding risks for key sectors within polar regions) are outlined in Table CCP6.6. A list of adaptation options responding directly to the challenges outlined for each sector, including an analysis of adaptation effectiveness and feasibility and cross referenced with KR assessed in this chapter (Table CCP6.5), is provided in Figure CCP6.6.</p>
                              <p class="Body_Body-justify" lang="en-GB">The need for self-determination for Indigenous Peoples and local communities in decision making and cooperation across Arctic nations to manage a rapidly changing Arctic is increasingly recognised, particularly in a shipping and wildlife management context where climate impacts will be transboundary and multi-sectoral (<a class="reference-link" href="#Spence--2017">Spence, 2017</a>; <a class="reference-link" href="#Forbis--2018">Forbis and Hayhoe, 2018</a>; <a class="reference-link" href="#Ford--2019">Ford and Clark, 2019</a>; <a class="reference-link" href="#Dawson--2020">Dawson et al., 2020</a>) (CCP6.2.6; Box CCP6.2). Effective Indigenous and community-led adaptation efforts have been implemented across the Arctic to alleviate climate and non-climate stressors and build resilience through restoration and conservation (<a class="reference-link" href="#Huntington--2017">Huntington et al., 2017</a>; <a class="reference-link" href="#Brattland--2018">Brattland and Mustonen, 2018</a>; <a class="reference-link" href="#Hudson--2020">Hudson and Vodden, 2020</a>; <a class="reference-link" href="#Mustonen--2020">Mustonen and Feodoroff, 2020</a>; <a class="reference-link" href="#Uboni--2020">Uboni et al., 2020</a>; <a class="reference-link" href="#Huntington--2021">Huntington et al., 2021</a>). For example, IK and science has been used by the Skolt S&#225;mi in Finland to attenuate warming, drought and water quality impacts on salmonids through restoration of spawning and nursery habitats in the Vainosjoki River catchment (<a class="reference-link" href="#Brattland--2018">Brattland and Mustonen, 2018</a>; <a class="reference-link" href="#Mustonen--2020">Mustonen and Feodoroff, 2020</a>; <a class="reference-link" href="#Ogar--2020">Ogar et al., 2020</a>). This ecological restoration of damaged habitats for fish represents community-led actions. In Aasiaat, Greenlandic hunters have implemented community-based oceanographic and ecological monitoring to convey IK observations of rapid change to the government and scientists. A special aspect of land use in the Russian North is the preservation of nomadic lifestyles of the Nenets and Chukchi (<a class="reference-link" href="#Mustonen--2016">Mustonen and Mustonen, 2016</a>), and while these traditional economies have undergone rapid change due to non-climate drivers, their land uses, observational frameworks and cultural matrixes remain of high importance in the context of climate change. Endemic responses (self-agency from within the culture) and Indigenous governance enable adaptation to the rapid and accelerating changes under way (<a class="reference-link" href="#Mustonen--2018a">Mustonen et al., 2018a</a>). Therefore, community-based monitoring and inclusion of IK in dialogue with science has been an effective mechanism to detect and respond to climate change.</p>
                              <p class="Body_Tables_Table_title" lang="en-US"><span class="table_number" lang="">Table CCP6.6 | </span>Assessment of risks needing adaptation by sector in the polar regions.</p>

                                      <p class="Body_Tables_Table_body-black-left" lang="en-US">(CCP6.2.4.3)</p>

                                    <td class="Table Body Body">
                                      <p class="Body_Tables_Table_body-black-left" lang="en-US">Permafrost thaw, sea ice change, storm surge, coastal erosion, changing precipitation patterns (ice pellets, hail) and extreme events create risks to transportation infrastructure with consequences to navigation, economics, safety and security</p>
                                    </td>
                                    <td class="Table Body Body">
                                      <p class="Body_Tables_Table_body-black-left" lang="en-US">Financial and human resources for: climate-resilient infrastructure research, development and implementation; improved weather, water, ice and climate forecasting at appropriate scales; improved communications infrastructure; local search and rescue</p>
                                    </td>
                                    <td class="Table Body Body">
                                      <p class="Body_Tables_Table_body-black-left" lang="en-US">Limits to adaptation exist (<span class="condensed_italic" lang="">high confidence</span>), but strategic investments in technologically innovative infrastructure that offers mitigation co-benefits will greatly enhance adaptation effectiveness (<span class="condensed_italic" lang="">very high confidence</span>)</p>
                                    </td>
                                    <td class="Table Body Body">
                                      <p class="Body_Tables_Table_body-black-left" lang="en-US">Level of local, regional and national infrastructure development, commitment of national and state level government to sustainable development pathways, global economic and political trends, commodity prices, unforeseen system shocks</p>
                                    </td>
                                  </tr>
                                  <tr class="Table _idGenTableRowColumn-34">
                                    <td class="Table Body Body">
                                      <p class="Body_Figures_Figure" lang="de-DE">

                                      </p>
                                      <p class="Body_Tables_Table_body-black-left" lang="en-US">Shipping</p>
                                      <p class="Body_Tables_Table_body-black-left" lang="en-US">(Box CCP6.1; FAQ CCP2)</p>
                                    </td>
                                    <td class="Table Body Body">
                                      <p class="Body_Tables_Table_body-black-left" lang="en-US">Sea ice reduction leading to increased shipping related to trade, tourism, fisheries, resource development and re-supply with cascading risks from ships such as: increased under-water noise, potential introduction of invasive species, fuel spill risks, release of black carbon and air emissions, impacts to cultural resources, implications for subsistence hunting and food security, increased accidents and incidents</p>
                                    </td>
                                    <td class="Table Body Body">
                                      <p class="Body_Tables_Table_body-black-left" lang="en-US">Financial support for ship-building technologies (e.g., low-emission fuels, propulsion technologies, hull strength); development of robust multi-national agreements (in addition to existing agreements); inclusion of Indigenous Peoples in decision making; investment in multi-national and longitudinal research on shipping impacts; and enhancing modern digital maritime charting</p>
                                    </td>
                                    <td class="Table Body Body">
                                      <p class="Body_Tables_Table_body-black-left" lang="en-US">Ship traffic will continue to grow in polar regions (<span class="condensed_italic" lang="">high confidence</span>), with Arctic trade routes becoming increasing accessible (<span class="condensed_italic" lang="">very high confidence</span>) albeit with more challenging navigation due to increases in mobile ice in the near-term compared with late century when ice is expected to diminish completely during the shipping season (<span class="condensed_italic" lang="">high confidence</span>)</p>
                                    </td>
                                    <td class="Table Body Body">
                                      <p class="Body_Tables_Table_body-black-left" lang="en-US">Geopolitical and sovereignty debates; shipping insurance premiums; global economic trends; commodity prices; national policies and politics; level of infrastructure investment; availability of search-and-rescue assets, and modern charting</p>
                                    </td>
                                  </tr>
                                  <tr class="Table _idGenTableRowColumn-24">

                                      <p class="Body_Tables_Table_body-black-left" lang="en-US">(CCP6.2.5)</p>
                                    </td>
                                    <td class="Table Body Body">
                                      <p class="Body_Tables_Table_body-black-left" lang="en-US">Loss and damage to infrastructure from permafrost thaw affecting stability of ground; coastal erosion; SLR</p>
                                    </td>

                                    <td class="Table Body Body">

                                    <td class="Table Body Body">

                                      <p class="Body_Tables_Table_body-black-left" lang="en-US">(CCP6.2.3.1; 6.2.3.2; 6.2.5; Box CCP6.2)</p>
                                    </td>
                                    <td class="Table Body Body">
                                      <p class="Body_Tables_Table_body-black-left" lang="en-US">Rain-on-snow events causing high mortality of herds, especially in the autumn season; shrubification of tundra pasture lowering forage quality</p>
                                    </td>
                                    <td class="Table Body Body">
                                      <p class="Body_Tables_Table_body-black-left" lang="en-US">Flexibility in movement to respond to changes in pastures, secure land use rights; adaptive management; continued economic viability and cultural tradition; self-determination in decision making; adequate support for communication and technological services; Indigenous rights upheld and protected</p>
                                    </td>
                                    <td class="Table Body Body">
                                      <p class="Body_Tables_Table_body-black-left" lang="en-US">Increased frequency of extreme events and changing forage quality adding to vulnerabilities of reindeer and herders (<span class="condensed_italic" lang="">high confidence) </span> ; adaptation limits are being approached</p>
                                    </td>
                                    <td class="Table Body Body">
                                      <p class="Body_Tables_Table_body-black-left" lang="en-US">Change in market value of meat; overgrazing; land use policies affecting access to pasture and migration routes, property rights; cost of feed</p>
                                    </td>
                                  </tr>
                                  <tr class="Table _idGenTableRowColumn-38">
                                    <td class="Table Body Body">
                                      <p class="Body_Figures_Figure" lang="de-DE">
                                        <img alt="" class="_idGenObjectAttribute-16" src="https://www.ipcc.ch/report/ar6/wg2/downloads/figures/ccp6-icon9.jpg"/>
                                      </p>
                                      <p class="Body_Tables_Table_body-black-left" lang="en-US">Commercial fisheries</p>
                                      <p class="Body_Tables_Table_body-black-left" lang="en-US">(CCP6.2.3)</p>
                                    </td>
                                    <td class="Table Body Body">
                                      <p class="Body_Tables_Table_body-black-left" lang="en-US">Loss of sea ice, warming waters and MHWs transform ecosystems in the Arctic with impacts on fisheries including declines in multiple regions; changes to Antarctic ecosystems affect southern fisheries productivity and distribution</p>
                                    </td>
                                    <td class="Table Body Body">
                                      <p class="Body_Tables_Table_body-black-left" lang="en-US">Implementation of adaptive management that is closely linked to monitoring, research and low cost and inclusive public participation in decisions, high-resolution forecast and projection tools, climate-informed survey and monitoring design</p>
                                    </td>
                                    <td class="Table Body Body">
                                      <p class="Body_Tables_Table_body-black-left" lang="en-US">Changes in availability and location of fishery resources will impact fish operations in the EBS and Barents Sea as well as the Convention for the Conservation of Antarctic Marine Living Resources area. Declines in catch impact livelihoods, coastal communities, and pose a risk to regional and global food and nutritional security (<span class="condensed_italic" lang="">very high confidence</span>)</p>
                                    </td>
                                    <td class="Table Body Body">
                                      <p class="Body_Tables_Table_body-black-left" lang="en-US">Changes in global demand for seafood, demand and markets, changes in gear, changes in policies affecting property rights. Changes due to offshore development and transportation</p>
                                    </td>
                                  </tr>
                                  <tr class="Table _idGenTableRowColumn-37">
                                    <td class="Table Body Body">
                                      <p class="Body_Figures_Figure" lang="de-DE">
                                        <img alt="" class="_idGenObjectAttribute-17" src="https://www.ipcc.ch/report/ar6/wg2/downloads/figures/ccp6-icon10.jpg"/>
                                      </p>
                                      <p class="Body_Tables_Table_body-black-left" lang="en-US">Marine subsistence</p>
                                      <p class="Body_Tables_Table_body-black-left" lang="en-US">(CCP6.2.3; CCP6.2.3.1)</p>
                                    </td>
                                    <td class="Table Body Body">
                                      <p class="Body_Tables_Table_body-black-left" lang="en-US">Changes in species distribution and abundance (not all negative); impediments to access of harvesting areas especially sea ice; increased interactions with shipping; safety; changes in seasonality; reduced harvesting success and process of food production (processing, food storage; quality); threats to culture and food security</p>
                                    </td>
                                    <td class="Table Body Body">
                                      <p class="Body_Tables_Table_body-black-left" lang="en-US">Systems of adaptive co-management that allow for species switching, changes in harvesting methods and timing, secure harvesting rights, communication and relationship building, co-production of knowledge</p>
                                    </td>
                                    <td class="Table Body Body">
                                      <p class="Body_Tables_Table_body-black-left" lang="en-US">Changes in distribution and abundance of resources combined with more regulations related to species at risk. Adaptation at the local, individual, and household level under low mitigation scenarios will be costly and possibly undermined by the scale and pace of change, including climate shocks and extreme events (<span class="condensed_italic" lang="">medium confidence</span>)</p>
                                    </td>
                                    <td class="Table Body Body">
                                      <p class="Body_Tables_Table_body-black-left" lang="en-US">Changes in cost of fuel, land use affecting access, food preferences, harvesting rights; colonialism, international agreements to protect vulnerable species</p>
                                    </td>
                                  </tr>
                                  <tr class="Table _idGenTableRowColumn-33">
                                    <td class="Table Body Body">
                                      <p class="Body_Figures_Figure" lang="de-DE">
                                        <img alt="" class="_idGenObjectAttribute-18" src="https://www.ipcc.ch/report/ar6/wg2/downloads/figures/ccp6-icon11.jpg"/>
                                      </p>
                                      <p class="Body_Tables_Table_body-black-left" lang="en-US">Marine ecosystems</p>
                                      <p class="Body_Tables_Table_body-black-left" lang="en-US">(CCP6.2.1)</p>
                                    </td>
                                    <td class="Table Body Body">
                                      <p class="Body_Tables_Table_body-black-left" lang="en-US">Warming, sea ice loss, OA resulting in poleward contraction of polar zones, invasive species introduction, displacement of polar species, and restructuring of food webs</p>
                                    </td>
                                    <td class="Table Body Body">
                                      <p class="Body_Tables_Table_body-black-left" lang="en-US">Reduce effects of external and compounding risks and increase application of EBM to meet biodiversity and management goals. Conservation of genetic diversity and biodiversity to preserve resilience, and supplementation and assisted migration may be needed</p>
                                    </td>
                                    <td class="Table Body Body">
                                      <p class="Body_Tables_Table_body-black-left" lang="en-US">Without institutional investment in sustaining climate resilience in ecosystems across sectors, there is a high risk of failure (<span class="condensed_italic" lang="">high confidence</span>)</p>
                                    </td>
                                    <td class="Table Body Body">
                                      <p class="Body_Tables_Table_body-black-left" lang="en-US">Novel and expanding activities in ice-free areas (shipping; fishing), energy development and mineral extraction, increased tourism, global markets and demand for polar resources, population growth and community relocation to coastal areas</p>
                                    </td>
                                  </tr>
                                  <tr class="Table _idGenTableRowColumn-34">
                                    <td class="Table Body Body">
                                      <p class="Body_Figures_Figure" lang="de-DE">
                                        <img alt="" class="_idGenObjectAttribute-19" src="https://www.ipcc.ch/report/ar6/wg2/downloads/figures/ccp6-icon12.jpg"/>
                                      </p>
                                      <p class="Body_Tables_Table_body-black-left" lang="en-US">Terrestrial and freshwater ecosystems</p>
                                      <p class="Body_Tables_Table_body-black-left" lang="en-US">(CCP6.2.2)</p>
                                    </td>
                                    <td class="Table Body Body">
                                      <p class="Body_Tables_Table_body-black-left" lang="en-US">Warming, hydrology changes (reduced ice on lakes and rivers, flooding, snow) and permafrost thaw lead to impacts on polar terrestrial and freshwater systems, food webs, the distribution of polar fish, implications for peat systems with consequent changes on dependent animal assemblages and increasingly favourable conditions for parasites and pathogens. Increased risk of wildfires in the Arctic</p>
                                    </td>
                                    <td class="Table Body Body">
                                      <p class="Body_Tables_Table_body-black-left" lang="en-US">Improving biodiversity and redundancy to enhance resilience. Efforts to minimise and prevent extinctions; preservation of ecosystem processes and habitats during critical life stages; coordinated governance; measures and planning that consider dynamic interactions within and among social and ecological systems are more effective</p>
                                    </td>
                                    <td class="Table Body Body">
                                      <p class="Body_Tables_Table_body-black-left" lang="en-US">Without institutional investment in sustaining climate resilience in ecosystems across sectors there is a high risk of failure (<span class="condensed_italic" lang="">high confidence</span>). Arctic regions have greater understanding of resilience needs, but coordination is not widespread. Antarctic has established action plans to identify key management needs for conserving terrestrial and freshwater biota.</p>
                                    </td>
                                    <td class="Table Body Body">
                                      <p class="Body_Tables_Table_body-black-left" lang="en-US">Novel and expanding activities in ice-free areas (shipping; fishing), energy development and mineral extraction, increased tourism, global markets and demand for polar resources, population growth and community relocation to coastal areas</p>
                                    </td>
                                  </tr>
                                </tbody>
                              </table>
                            </div>
                          </div>
                          <div class="h3-container" id="CCP6.3.2.2">
                            <h3 class="Headings_H3" lang="de-DE">CCP6.3.2.2  Adaptation gaps <span class="arrow-up"/><span class="arrow-down"/><span class="share-block"><img class="share-icon" src="../../share.png"/></span></h3>
                            <div class="h3-siblings" id="h3-12-siblings">
                              <p class="Body_Body-justify ParaOverride-1" lang="en-GB">In a study of adaptation progress across the Arctic from 2004 to 2019, 233 cases of adaptation were documented, with the majority of actions primarily behavioural and reactionary in nature and undertaken in the subsistence harvesting sector, with resource management, and infrastructure and transportation other prominent sectors where adaptation responses were documented to be occurring (<a class="reference-link" href="#Canosa--2020">Canosa et al., 2020</a>). The study found few changes in the profile of adaptation over time, except for an increase in responses being motivated solely by climate impacts, and few cases of transformational change, although it should be noted that a lack of data on adaptation actions makes documenting trends challenging. Human health is generally under-represented in adaptation initiatives, along with adaptations being developed within larger Arctic settlements (<a class="reference-link" href="#Ford--2014">Ford et al., 2014</a>; <a class="reference-link" href="#Canosa--2020">Canosa et al., 2020</a>), and in many sectors decisions continue to be made without explicit inclusion of climate change impacts and risk in planning and design (<span class="condensed_italic" lang="">high confidence</span>) (<a class="reference-link" href="#Cherry--2017">Cherry et al., 2017</a>; <a class="reference-link" href="#Lauta--2018">Lauta et al., 2018</a>; <a class="reference-link" href="#Meredith--2019">Meredith et al., 2019</a>). There is <span class="condensed_italic" lang="">limited evidence</span> of transformational adaptation taking place in the policy arena (e.g., <a class="reference-link" href="#U.S. Executive Order 13990--2021">U.S. Executive Order 13990, 2021</a>), but many examples of how impacts and responses to climate change have transformed social&#8211;ecological connections, traditions, markets, trade and livelihoods of Arctic residents and Indigenous Peoples (<a class="reference-link" href="#Ford--2015">Ford et al., 2015</a>).</p>
                            </div>
                          </div>
                          <div class="h3-container" id="CCP6.3.2.3">
                            <h3 class="Headings_H3" lang="de-DE">CCP6.3.2.3  Maladaptation and limits to adaptation <span class="arrow-up"/><span class="arrow-down"/><span class="share-block"><img class="share-icon" src="../../share.png"/></span></h3>
                            <div class="h3-siblings" id="h3-13-siblings">
                              <p class="Body_Body-justify" lang="en-GB">In polar regions, multiple entities operate simultaneously to manage lands and resources, resulting in layered approaches and policies for the same sector or region, only some of which are synergistic and a few of which may counter each other (e.g., Southern Ocean: <a class="reference-link" href="#Solomonsz--2021">Solomonsz et al., 2021</a>). Climate change and attendant uncertainty can undermine stakeholder confidence in management, leading to less effective management even when scientific understanding is stable (<a class="reference-link" href="#Mumby--2017">Mumby et al., 2017</a>). In the Arctic, large landscapes, dispersed population centres, limited resources and settler colonialism are structural barriers to effective planning, emergency response, and relief and recovery from climate impacts (<span class="condensed_italic" lang="">medium confidence</span>), which limit adaptation and sometimes exacerbate climate and non-climate pressures on social and ecological systems (<a class="reference-link" href="#Ford--2015">Ford et al., 2015</a>; <a class="reference-link" href="#Ford--2020">Ford et al., 2020</a>; <a class="reference-link" href="#Snook--2020">Snook et al., 2020</a>).</p>
                              <p class="Body_Body-justify" lang="en-GB">Adaptation strategies that are beneficial in the short term can result in long-term maladaptive outcomes. For Indigenous Peoples, strategies that fail to address colonialism, inequities and injustices undermine effective adaptation (<a class="reference-link" href="#Canosa--2020">Canosa et al., 2020</a>; <a class="reference-link" href="#Schipper--2020">Schipper, 2020</a>; <a class="reference-link" href="#Ford--2021">Ford et al., 2021</a>). Large &#8216;responsiveness gaps&#8217; between impacts and implementation, approaches that fail to consider dynamic responses within social and ecological systems (which amplify or attenuate climate impacts), and a paucity of <span class="condensed_italic" lang="">a priori</span> planning can contribute to maladaptation (<span class="condensed_italic" lang="">high confidence</span>) (<a class="reference-link" href="#Pentz--2017">Pentz and Klenk, 2017</a>; <a class="reference-link" href="#Turner--2020b">Turner et al., 2020b</a>). For example, rationalisation (privatisation) can stabilise fisheries and incentivise long-term sustainability under stationary conditions, yet also promote low diversity in harvest (or livelihood) portfolios, and when combined with behaviours to offset climate driven declines in yield (e.g., effort or price), rationalisation can create lock-in to declining stocks, increasing the risk of income variability and collapse (<a class="reference-link" href="#Kasperski--2013">Kasperski and Holland, 2013</a>; <a class="reference-link" href="#Pinkerton--2015">Pinkerton and Davis, 2015</a>; <a class="reference-link" href="#Holland--2017">Holland et al., 2017</a>; <a class="reference-link" href="#Ojea--2017">Ojea et al., 2017</a>; <a class="reference-link" href="#Anderies--2019">Anderies et al., 2019</a>; <a class="reference-link" href="#Fisher--2021">Fisher et al., 2021</a>). Policies that foster stewardship yet also allow for diversification in fisheries may further attenuate climate shocks to individual fisheries (<a class="reference-link" href="#Kasperski--2013">Kasperski and Holland, 2013</a>; <a class="reference-link" href="#Fisher--2021">Fisher et al., 2021</a>) and stabilise catches (e.g., US Bering Sea pollock fleet (<a class="reference-link" href="#Watson--2018">Watson and Haynie, 2018</a>)). Inclusive and participatory decision making underpins long-term resilience to climate change (<span class="condensed_italic" lang="">medium confidence</span>)(<a class="reference-link" href="#Flynn--2018">Flynn et al., 2018</a>; <a class="reference-link" href="#Ford--2020">Ford et al., 2020</a>), but a high cost of participation can disproportionately favour entities with strong investment, ample resources and extreme viewpoints such that decision outcomes are not in the broad interest of polar societies (<a class="reference-link" href="#Lynham--2017">Lynham et al., 2017</a>).</p>
                              <p class="Body_Body-justify" lang="en-GB">There are significant limits to adaptation in the polar regions related to the rate of warming and cascading changes that are occurring, which is equivalent to double and sometimes triple the global average depending on the region (<a class="reference-link" href="#Bush--2019">Bush and Lemmen, 2019</a>; <a class="reference-link" href="#IPCC--2021">IPCC, 2021</a>). The rapid pace of change, such as sea ice loss, can outpace ecological processes and induce substantial ecological shifts (CCP6.2) (<span class="condensed_italic" lang="">medium confidence</span>). The speed of climate change in the Arctic limits options for adaptation in communities who rely on a narrow resource base, when adaptation involves loss of culture and livelihoods, and when the costs of adaptation make it infeasible (<span class="condensed_italic" lang="">medium confidence</span>) (<a class="reference-link" href="#Ford--2015">Ford et al., 2015</a>), such as for reindeer herding (Table CCP6.6; Figure CCP6.6; Figure CCP6.7) (<a class="reference-link" href="#Meredith--2019">Meredith et al., 2019</a>). Adapting infrastructure in response to a rapidly changing cryosphere will be limited by available technologies and the relatively higher costs associated with updating infrastructure over vast polar regions (<a class="reference-link" href="#Schneider von Deimling--2021">Schneider von Deimling et al., 2021</a>).</p>
                              <div class="Figure" id="_idContainer048">
                                <p class="Body_Figures_Figure" lang="de-DE">
                                  <img alt="" class="_idGenObjectAttribute-21" id="figure-ccp6-007" loading="lazy" src="https://ipcc.ch/report/ar6/wg2/downloads/figures/IPCC_AR6_WGII_Figure_CCP6_007.png"/>
                                </p>
                                <p class="Body_Figures_Figure_title" lang="en-US">
                                  <span class="figure_number" lang="">Figure CCP6.7 | </span>
                                  <span class="bold_condensed-dark-blue" lang="">Climate change impacts, risks and potential for adaptation in Arctic (upper panel) and Antarctic (lower panel) social&#8211;ecological systems. </span>
                                </p>
                                <div class="ch-figure-button-cont"><a href="/report/ar6/wg2/figures/chapter-ccp6/figure-ccp6-007" target="_blank"><button class="btn-ipcc btn btn-primary ch-figure-button">Open figure</button></a> </div>
                              </div>
                            </div>
                          </div>
                        </div>
                      </div>
                    </div>
                    <h2 class="Body_Box_FAQ_FAQ-Box_subhead" lang="en-GB">FAQ CCP6.4  | When will climate change impacts in polar regions surpass our ability to adapt?<span class="arrow-up"/><span class="arrow-down"/><span class="share-block"><img class="share-icon" src="../../share.png"/></span></h2>
                    <div class="h2-siblings" id="h2-17-siblings">
                      <p class="Body_Box_FAQ_FAQ-Box_body" lang="en-US">
                        <span class="condensed_italic" lang="">When environmental variability is within the range of the current adaptive management approaches, the social&#8211;ecological system can thrive. However, the rapidly changing polar systems are causing disruptions to societies, economies and ecosystems. The current management systems are yet to develop procedures for managing rapid change being experienced in warming waters, sea ice declines, permafrost thaw and erosion, and poleward shifts in species. These challenges are expected to become more pronounced within a few decades rather than later this century. </span>
                      </p>
                      <p class="Body_Box_FAQ_FAQ-Box_body" lang="en-US">Polar regions are naturally dynamic environments. Ecosystems in polar regions, and the people who rely on them, have adapted to natural variability and dynamic nature of polar environments. Fish populations in polar regions are known to exhibit cycles of productivity, and shift their distribution across hundreds of kilometres in response to changes in winter sea ice cover and concomitant summer ocean conditions. Management of the productive fisheries in polar regions is also designed to allow for these changes, using adaptive and ecosystem-based approaches that buffer populations from overexploitation and also stabilise fisheries, livelihoods and food resources. Indigenous Peoples diversify their subsistence harvest across species and resources and, therefore, similarly stabilise food and nutritional security.</p>
                      <p class="Body_Box_FAQ_FAQ-Box_body" lang="en-US">When environmental variability is within the range of these adaptive measures, the social&#8211;ecological system can thrive. Thus, there are fundamental components in place in polar regions already to help ecosystems and people adapt to some degree of climate change. However, as climate change impacts like warming waters, sea ice loss, permafrost thaw and erosion systematically alter components of the system, shift species increasingly poleward, and disrupt linkages between species and people, the ability to adapt is reduced. There are critical tipping points (e.g., sea ice melt, permafrost thaw) where changes may cascade, self-reinforce and accelerate, outpacing adaptation actions and force natural and human systems irreversibly (on the scale of human existence) into novel regimes. The risk of crossing tipping points is greater and the probability much increased after mid-century under scenarios without global carbon mitigation (SSP5 8.5), where changes are largest and most rapid.</p>
                    </div>
                    <div class="h1-container" id="CCP6.4">
                      <h1 class="Headings_H1-numbered" lang="en-GB">CCP6.4  Climate Resilient Development Pathways <span class="share-block"><img class="share-icon" src="../../share.png"/></span><button class="btn-ipcc btn btn-primary chapter-expand">Expand section</button></h1>
                      <div class="h1-siblings" id="h1-5-siblings">
                        <p class="Body_Body-justify" lang="en-GB">The polar regions are expected to experience many economic development opportunities as a result of climate change, including increased accessibility for shipping and attractiveness for fisheries and tourism (CCP6.2.3.1, CCP6.2.4). For polar regions, equitable climate resilient development requires diverse perspectives in planning and implementation. In the Arctic, cultural, social and economic dimensions of Indigenous Peoples and local communities are critical (<a class="reference-link" href="#Ritsema--2015">Ritsema et al., 2015</a>; <a class="reference-link" href="#Huntington--2021">Huntington et al., 2021</a>). For both poles, there are global cultural connections to polar systems (<a class="reference-link" href="#Roberts--2021">Roberts et al., 2021</a>), along with important global and local needs for sustained ecosystems and their services, in the face of diminishing polar zonal conditions (<a class="reference-link" href="#Cavanagh--2021">Cavanagh et al., 2021</a>; <a class="reference-link" href="#Murphy--2021">Murphy et al., 2021</a>; <a class="reference-link" href="#Solomonsz--2021">Solomonsz et al., 2021</a>).</p>
                        <p class="Body_Body-justify" lang="en-GB">Sustainable pathways integrating across sectors, and taking account of local and global connections, can be readily achieved in polar regions to balance trade-offs between economic, ecological and sociocultural imperatives, yet challenges remain (<a class="reference-link" href="#Murphy--2021">Murphy et al., 2021</a>). Notably, terrestrial areas of greatest interest for infrastructure development, agriculture and visitation potential are often also the same areas that have been identified as culturally and ecologically significant (<a class="reference-link" href="#PEW--2016">PEW, 2016</a>; <a class="reference-link" href="#Eliasson--2017">Eliasson et al., 2017</a>; <a class="reference-link" href="#Grant--2021">Grant et al., 2021</a>) (<span class="condensed_italic" lang="">high confidence</span>). Development of low-impact shipping corridors in Arctic Canada is an example of an effective mechanism where climate-resilient infrastructure can be prioritised and where regulation (voluntary and enforced) focused on cascading climatic risks can be implemented (<a class="reference-link" href="#Ch&#233;nier--2017">Ch&#233;nier et al., 2017</a>; <a class="reference-link" href="#Dawson--2020">Dawson et al., 2020</a>).</p>
                      </div>
                      <div class="h2-container" id="CCP6.4.1">
                        <h2 class="Headings_H2-numbered" lang="de-DE">CCP6.4.1  Challenges to Climate Resilient Development Pathways <span class="arrow-up"/><span class="arrow-down"/><span class="share-block"><img class="share-icon" src="../../share.png"/></span></h2>
                        <div class="h2-siblings" id="h2-9-siblings">
                          <p class="Body_Body-justify" lang="en-GB">Decision making in polar regions is complicated by globalisation processes and the complexity of governance arrangements from local to global instruments and differing stakeholder perspectives and needs (<a class="reference-link" href="#Hughes--2018">Hughes et al., 2018</a>; <a class="reference-link" href="#Stephen--2018">Stephen, 2018</a>; <a class="reference-link" href="#Huntington--2021">Huntington et al., 2021</a>; <a class="reference-link" href="#Murphy--2021">Murphy et al., 2021</a>; <a class="reference-link" href="#Solomonsz--2021">Solomonsz et al., 2021</a>). Substantial interest in and management of polar resources from non-polar states can lead to decision making that lacks explicit consideration of local impacts and responses, thus reducing the effectiveness of adaptation and, in some cases, causing maladaptation. Participatory decision making is increasingly used in some sectors, but high costs of participation, a focus on consensus, and systematic erosion of resources can undermine outcomes (<a class="reference-link" href="#Mumby--2017">Mumby et al., 2017</a>; <a class="reference-link" href="#Parlee--2018">Parlee and Wiber, 2018</a>; <a class="reference-link" href="#Mendenhall--2020">Mendenhall et al., 2020</a>). In the Arctic, the societal burden of climate change impacts and risks will manifest at the local level, and thus the importance of local scale leadership and involvement in decision making is essential for effective adaptation (<a class="reference-link" href="#AMAP--2017">AMAP, 2017</a>).</p>
                          <p class="Body_Body-justify" lang="en-GB">Many losses and damages within Indigenous contexts are not able to be monetised but can be profound, such as loss of Indigenous languages (<a class="reference-link" href="#CAFF--2013">CAFF, 2013</a>), loss of IK associated with nomadic lifestyles and cultures (Box CCP6.2), and loss of geographical knowledge associated with an intimate knowledge of landscapes across seasons (<a class="reference-link" href="#Brattland--2018">Brattland and Mustonen, 2018</a>), changing landscapes resulting in solastalgia and ecological grief (<a class="reference-link" href="#Cunsolo--2018">Cunsolo and Ellis, 2018</a>), and some Indigenous practices and cultural assets, such as burial grounds, nomadic camp sites, graveyards, seasonal dwellings, and routes and pathways causing disruptions to mind and memory (<a class="reference-link" href="#Mustonen--2016">Mustonen and Mustonen, 2016</a>). Recognising these intangible losses and damages is critical for understanding how to achieve climate resilience in the Arctic (<a class="reference-link" href="#Tschakert--2019">Tschakert et al., 2019</a>; <a class="reference-link" href="#Sawatzky--2020">Sawatzky et al., 2020</a>).</p>
                          <p class="Body_Body-justify" lang="en-GB">For the Antarctic, the governance for managing climate impacts is emerging, particularly for terrestrial and nearshore habitats (<span class="condensed_italic" lang="">high confidence</span>) (<a class="reference-link" href="#Hughes--2018">Hughes et al., 2018</a>; <a class="reference-link" href="#Chown--2019">Chown and Brooks, 2019</a>). However, it is poorly developed for marine ecosystems, despite its importance for decision making (<a class="reference-link" href="#Trebilco--2020">Trebilco et al., 2020</a>; <a class="reference-link" href="#Goldsworthy--2021">Goldsworthy and Brennan, 2021</a>). A diversity of stakeholders is involved in developing evidence-based management for the region, which presents challenges for adaptation planning (<a class="reference-link" href="#Solomonsz--2021">Solomonsz et al., 2021</a>), particularly in identifying sustainable practices in a changing environment (<a class="reference-link" href="#Constable--2017">Constable et al., 2017</a>; <a class="reference-link" href="#Brooks--2018">Brooks et al., 2018</a>). Spatial management for enhancing the resilience of endemic polar biodiversity is increasingly proposed as the best option for managing risks of climate change (<a class="reference-link" href="#Chown--2019">Chown and Brooks, 2019</a>).</p>
                        </div>
                      </div>
                      <div class="h2-container" id="CCP6.4.2">
                        <h2 class="Headings_H2-numbered" lang="de-DE">CCP6.4.2  Inclusive, Integrated Co-management <span class="arrow-up"/><span class="arrow-down"/><span class="share-block"><img class="share-icon" src="../../share.png"/></span></h2>
                        <div class="h2-siblings" id="h2-10-siblings">
                          <p class="Body_Body-justify" lang="en-GB">Inclusive, low-cost participatory decision making can deliver equitable responses to climate change (<span class="condensed_italic" lang="">high confidence</span>). Land use, maritime activities and subsistence fishery and other extracted resources in the polar regions are co-managed through multi-lateral and national government bodies. The capacity of governance systems in some Arctic regions to respond to climate change has strengthened recently (<span class="condensed_italic" lang="">high confidence</span>). Synthetic themes in adaptation for the Arctic have emerged from and since SROCC and include flexibility through diversity in livelihoods, and subsistence and harvest portfolios; co-management of resources; adaptive and ecosystem-based approaches; adoption of advanced technology, forecasts and longer-term projections to improve safety and resources management; and imperative need for low-cost, inclusive and participatory decision making (<a class="reference-link" href="#Kasperski--2013">Kasperski and Holland, 2013</a>; <a class="reference-link" href="#Brattland--2018">Brattland and Mustonen, 2018</a>; <a class="reference-link" href="#Parlee--2018">Parlee and Wiber, 2018</a>; <a class="reference-link" href="#Galappaththi--2019">Galappaththi et al., 2019</a>; <a class="reference-link" href="#Holsman--2020">Holsman et al., 2020</a>; <a class="reference-link" href="#Huntington--2021">Huntington et al., 2021</a>; <a class="reference-link" href="#Melbourne-Thomas--2021">Melbourne-Thomas et al., 2021</a>; <a class="reference-link" href="#Mustonen--2021">Mustonen and Van Dam, 2021</a>). This was demonstrated in community-level adaptation by Pangnirtung Inuit to climate change impacts on fisheries (<a class="reference-link" href="#Galappaththi--2019">Galappaththi et al., 2019</a>). Inclusive approaches to co-management, especially those that enable diverse perspectives, embrace conflict, and address equity and justice across power holders, can help alleviate the risk and promote solutions (<a class="reference-link" href="#Raymond-Yakoubian--2017">Raymond-Yakoubian et al., 2017</a>; <a class="reference-link" href="#Brattland--2018">Brattland and Mustonen, 2018</a>; <a class="reference-link" href="#Parlee--2018">Parlee and Wiber, 2018</a>; <a class="reference-link" href="#Raymond-Yakoubian--2018">Raymond-Yakoubian and Daniel, 2018</a>; <a class="reference-link" href="#Snook--2020">Snook et al., 2020</a>). Integration across levels of management and diverse regional perspectives can reduce climate risks and support equitable adaptation measures (<a class="reference-link" href="#Allison--2015">Allison and Bassett, 2015</a>; <a class="reference-link" href="#Raymond-Yakoubian--2017">Raymond-Yakoubian et al., 2017</a>; <a class="reference-link" href="#Raymond-Yakoubian--2018">Raymond-Yakoubian and Daniel, 2018</a>; <a class="reference-link" href="#Holsman--2020">Holsman et al., 2020</a>).</p>
                          <p class="Body_Body-justify" lang="en-GB">Increased flexibility in management measures, greater investment in ecosystem monitoring, and more inclusive participatory methods and communication may help foster high levels of local investment and resilience and promote adaptive pathways (<a class="reference-link" href="#Cinner--2016">Cinner et al., 2016</a>; <a class="reference-link" href="#Weymouth--2019">Weymouth and Hartz-Karp, 2019</a>), although explicit measures may be needed to reduce costs and increase representation, enhance transparency, embrace dissent and clarify accountability are needed as these are not inherent outcomes (<a class="reference-link" href="#Lynham--2017">Lynham et al., 2017</a>; <a class="reference-link" href="#Parlee--2018">Parlee and Wiber, 2018</a>). EBM, which includes provisions aimed at sustaining critical connections within and among social and ecological systems, enhances resilience and attenuates climate impacts on ecosystems and provisioning services; for example, EBM enhances climate resilience for Antarctic krill and Northeast Arctic cod fisheries (<a class="reference-link" href="#Troell--2017">Troell et al., 2017</a>; <a class="reference-link" href="#Meyer--2020">Meyer et al., 2020</a>) and forestalls fishery collapse in the Bering Sea in the near term (<a class="reference-link" href="#Holsman--2020">Holsman et al., 2020</a>). Increasing likelihood of transboundary resources, interactions and novel commerce may strain existing regulatory and international agreements, suggesting that <span class="condensed_italic" lang="">a priori</span> governance agreements designed to manage climate risks and aimed at attenuating potential conflicts over resources and regions may be important for resolving these issues (<a class="reference-link" href="#Parlee--2018">Parlee and Wiber, 2018</a>; <a class="reference-link" href="#Mendenhall--2020">Mendenhall et al., 2020</a>).</p>
                        </div>
                      </div>
                      <div class="h2-container" id="CCP6.4.3">
                        <h2 class="Headings_H2-numbered" lang="de-DE">CCP6.4.3  Enabling Climate Resilience in the Arctic: Self-determination and Indigenous Peoples&#8217; Rights <span class="arrow-up"/><span class="arrow-down"/><span class="share-block"><img class="share-icon" src="../../share.png"/></span></h2>
                        <div class="h2-siblings" id="h2-11-siblings">
                          <p class="Body_Body-justify" lang="en-GB">Climate change disproportionately impacts Indigenous Peoples (Box CCP6.2), which directly affects their livelihoods, health and Sustainable Development Goal targets. For residents in the Arctic, a sustainable development pathway has been found to be highly effective if a self-determined development model is employed (<span class="condensed_italic" lang="">very high confidence</span>). Known determinants of Indigenous self-determined development in regions in the Arctic, include: (1) Indigenous self-determined decision making (and inherent sovereignty); (2) effective and culturally legitimate institutions of government; (3) strategic vision and strategic thinking; and (4) public-spirited, nation-building leadership (<a class="reference-link" href="#Cornell--1992">Cornell and Kalt, 1992</a>; <a class="reference-link" href="#Cornell--1998">Cornell and Kalt, 1998</a>; <a class="reference-link" href="#Cornell--2007">Cornell and Kalt, 2007</a>; <a class="reference-link" href="#Ritsema--2015">Ritsema et al., 2015</a>). For Indigenous Peoples, advances in recognition of self-governance, land and resource sovereignty, and resource co-management, particularly in the North American Arctic but also elsewhere, provide a strong basis for responding to climate impacts (<a class="reference-link" href="#Ford--2015">Ford et al., 2015</a>; <a class="reference-link" href="#Robards--2018">Robards et al., 2018</a>). These developments expand the solution space (<a class="reference-link" href="#Haasnoot--2020">Haasnoot et al., 2020</a>) for responding to climate impacts, although historical and ongoing forms of colonialism in research and government institutions continues to undermine Indigenous self-determination and reinforce climate change vulnerability (<a class="reference-link" href="#Marino--2015">Marino and Lazrus, 2015</a>; <a class="reference-link" href="#Whyte--2019">Whyte et al., 2019</a>; <a class="reference-link" href="#Ford--2020">Ford et al., 2020</a>; <a class="reference-link" href="#Snook--2020">Snook et al., 2020</a>). Readiness for adaptation across Arctic nations continues to be challenged by a number of factors, including the existence of pressing socioeconomic challenges, institutional and governmental barriers, lack of meaningful inclusion of IK in government planning and response, and lack of financial resources (<a class="reference-link" href="#Ford--2015">Ford et al., 2015</a>; <a class="reference-link" href="#Loring--2016">Loring et al., 2016</a>; <a class="reference-link" href="#AMAP--2017">AMAP, 2017</a>; <a class="reference-link" href="#Ford--2017">Ford et al., 2017</a>; <a class="reference-link" href="#Birchall--2019">Birchall and Bonnett, 2019</a>) (<a class="reference-link" href="#AMAP--2018a">AMAP, 2018a</a>). In Alaska, for example, the need to relocate high-risk villages has been recognised by researchers, decision makers and communities themselves for some time, and while progress is being made in some locations (<a class="reference-link" href="#Ristroph--2017">Ristroph, 2017</a>), institutional barriers have generally resulted in negligible progress (<a class="reference-link" href="#Bronen--2013">Bronen and Chapin, 2013</a>; <a class="reference-link" href="#Marino--2015">Marino and Lazrus, 2015</a>; <a class="reference-link" href="#Albert--2018">Albert et al., 2018</a>; <a class="reference-link" href="#Rosales--2021">Rosales et al., 2021</a>).</p>
                        </div>
                      </div>
                    </div>
                    <div class="h1-container" id="CCP6.5">
                      <h1 class="Headings_H1-numbered" lang="en-GB">CCP6.5  Summary and Conclusion <span class="share-block"><img class="share-icon" src="../../share.png"/></span><button class="btn-ipcc btn btn-primary chapter-expand">Expand section</button></h1>
                      <div class="h1-siblings" id="h1-6-siblings">
                        <p class="Body_Body-justify" lang="en-GB">Rapid changes occurring in polar systems are clear and unequivocal, indicating that swift and effective responses are urgently needed to avoid substantial future impacts and reduce risks to polar social and ecological systems. Some underlying principles emerge from this assessment that appear fundamental to achieving climate resilient development in polar systems (Figure CCP6.8) because they could facilitate rapid, equitable and just responses to achieve climate resilience. These principles include having locally relevant and accessible tools and services (e.g., regional forecasts and projections) to support climate-informed decision making, along with adequate and appropriate resourcing (including finance and integrated planning) for climate adaptation and for responding to emergencies. Effective decision making processes integrate across sectors, all levels of governance, including through multi-national instruments, and, most importantly, apply low-cost and inclusive participatory processes to address gender, equitable and socially just outcomes. In the Arctic, there is evidence that overcoming colonialism through meaningful and explicit inclusion of IK in research and resource management, as well as co-management and self-determination in decision making, are effective measures to support equitable climate resilience across multiple sectors. Lastly, climate resilience is strongly dependent on both mitigation of climate change as well as effective adaptation to meet the challenges of unprecedented change in polar regions.</p>

                            <p class="Body_Footnotes" lang="en-US"><a class="_idFootnoteAnchor _idGenColorInherit" href="ccp6.html#footnote-001-backlink">1</a> In this Report, the following summary terms are used to describe the available evidence: limited, medium, or robust; and for the degree of agreement: low, medium, or high. A level of confidence is expressed using five qualifiers: very low, low, medium, high, and very high, and typeset in italics, for example, <span class="light_condensed_italic" lang="">medium confidence</span>. For a given evidence and agreement statement, different confidence levels can be assigned, but increasing levels of evidence and degrees of agreement are correlated with increasing confidence.</p>
