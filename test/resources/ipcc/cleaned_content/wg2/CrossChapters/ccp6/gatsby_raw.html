                            <span class="CharOverride-2" lang="en-US">There has been debate among shipping stakeholders, rightsholders and experts about the extent to which climate change and sea ice change is directly influencing increases in shipping activity in the polar regions relative to other social, technological, political and economic factors such as commodity prices, tourism demand, global economic trends, infrastructure support and service availability. Understanding the connection between climate change and polar shipping activity will allow for more reliable projections of possible future traffic trends and will aid in identifying appropriate adaptation and infrastructure needs required to support future management of the industry. Recent studies have observed increasing statistical correlations between sea ice change and shipping trends in the polar regions, and many have concluded that although economic factors remain the main driver of shipping activities, followed by infrastructure availability, climate change does indeed play a varying but important role in influencing operator intentions. The &#8216;opening of polar seaways&#8217; due to sea ice reduction is indeed &#8216;enabling&#8217; opportunities for polar shipping among all types of vessels due to increasingly accessible areas that were previously covered by multi-year ice, but the extent to which climate change will specifically &#8216;drive&#8217; an increase in shipping demand remains highly dependent on the vessel type and the reasons for operation. There are certain vessel types, such as those supporting international trade, mining operations or community re-supply, where analysis shows no correlation or weak correlations with sea ice change, suggesting that climate change is enabling these types of ships via increased open water areas and season lengths but that it is not necessarily driving demand. Conversely, there are certain vessel types, such as yachts and cruise ships, where correlations between sea ice change and traffic increases are stronger, and where there is evidence to suggest that these vessels are indeed driven to visit the polar regions because they perceive waterways as exotic and exciting due to being newly accessible or they want to have a Polar experience before it disappears or is irreversibly changed as is the case with last chance tourists. As sea ice recedes and polar shipping opportunities grow, there will be an increased need to better identify and implement Indigenous self-determined and equitable shipping governance frameworks that facilitate benefits and minimise risks. </span>
                          </p>
                          <div class="Figure" id="_idContainer031">
                            <p class="Body_Figures_Figure" lang="de-DE">
                              <img alt="" class="_idGenObjectAttribute-7" id="figure-ccp6-005" loading="lazy" src="https://www.ipcc.ch/report/ar6/wg2/downloads/figures/IPCC_AR6_WGII_Figure_CCP6_FAQ_CCP6_2_1.png"/>
                            </p>
                            <p class="Body_Box_FAQ_FAQ-Box_Figure_title" lang="en-US">
                              <span class="figure_number" lang="">
                                <span class="ZFCaption" lang="">Figure FAQ CCP6.2.1 </span>

                              <span class="bold_condensed-dark-blue" lang="">Projected operational accessibility along Arctic maritime trade routes (Northwest Passage, Transpolar Route and Northern Sea Route) under future warming (left) and observed increases in commercial ship traffic along the routes from 2012 to 2019. </span>
                            </p>

                      <div class="h2-container" id="CCP6.2.4">
                        <h2 class="Headings_H2-numbered" lang="de-DE">CCP6.2.4  Economic Activities <span class="arrow-up"/><span class="arrow-down"/><span class="share-block"><img class="share-icon" src="../../share.png"/></span></h2>
                        <div class="h2-siblings" id="h2-4-siblings">
                          <p class="Body_Body-justify" lang="en-GB">Climate change presents significant risks to economic activities in the polar regions (<span class="condensed_italic" lang="">very high confidence</span>) and simultaneously enables development possibilities for fisheries (CCP6.2.3.3), agriculture (CCP6.2.3.2), the sharing and subsistence economy (CCP6.2.3.1) (SMCCP6.2) (<span class="condensed_italic" lang="">high confidence</span>), maritime trade (Box CCP6.1), natural resource development (CCP6.2.4.1) (<span class="condensed_italic" lang="">medium confidence</span>), tourism (CCP6.2.4.2) and transportation (including shipping) (CCP6.2.4.3; FAQ CCP6.2). Hundreds of billions of dollars are expected to be invested in the polar regions in the next several decades (<a class="reference-link" href="#Lloyd&#8217;s--2012">Lloyd&#8217;s, 2012</a>; <a class="reference-link" href="#Barnhart--2016">Barnhart et al., 2016</a>; <a class="reference-link" href="#Pendakur--2017">Pendakur, 2017</a>; <a class="reference-link" href="#Tsukerman--2019">Tsukerman et al., 2019</a>), and, as this unfolds, there are opportunities to simultaneously implement adaptation strategies that support climate resilient development pathways in line with self-determination for Indigenous Peoples and local communities and locally derived visions of successful adaptation and development (CCP6.3.2, CCP6.4.3) (<a class="reference-link" href="#Jorgenson--2007">Jorgenson, 2007</a>; <a class="reference-link" href="#Ritsema--2015">Ritsema et al., 2015</a>; <a class="reference-link" href="#Ready--2017">Ready and Power, 2017</a>; <a class="reference-link" href="#Larsen--2020">Larsen and Petrov, 2020</a>).</p>
                          <div class="h3-container" id="CCP6.2.4.1">
                            <h3 class="Headings_H3" lang="de-DE">CCP6.2.4.1  Changing access to natural resources with consequences for safety, economic development and climate mitigation <span class="arrow-up"/><span class="arrow-down"/><span class="share-block"><img class="share-icon" src="../../share.png"/></span></h3>
                            <div class="h3-siblings" id="h3-8-siblings">
                              <p class="Body_Body-justify" lang="en-GB">Climate change is improving access to natural resources in the Arctic with consequences for human safety (<span class="condensed_italic" lang="">high confidence</span>), economic development (<span class="condensed_italic" lang="">very high confidence</span>) and global mitigation efforts (<span class="condensed_italic" lang="">medium confidence</span>). Reductions in sea ice combined with improved extraction and transportation technologies have increased accessibility to natural resources across the Arctic (<a class="reference-link" href="#Eliasson--2017">Eliasson et al., 2017</a>; <a class="reference-link" href="#Dawson--2018b">Dawson et al., 2018b</a>; <a class="reference-link" href="#Stephen--2018">Stephen, 2018</a>), a situation that could support continued global dependence on relatively cheap and abundant fossil fuels resources and contribute to further warming. By 2040 (RCP4.5) it is expected that sea ice will have receded enough to make gas production technologically feasible in the European off-shore Arctic (<a class="reference-link" href="#Petrick--2017">Petrick et al., 2017</a>). However, increased sea ice mobility, iceberg abundance, storm surge and surface wave action (<a class="reference-link" href="#Ng--2018">Ng et al., 2018</a>; <a class="reference-link" href="#Howell--2019">Howell and Brady, 2019</a>; <a class="reference-link" href="#Casas-Prat--2020">Casas-Prat and Wang, 2020</a>) will also increase risks to ships servicing mines in a region that already exhibits disproportionately high accident rates (<a class="reference-link" href="#Council of Canadian Academies--2016">Council of Canadian Academies, 2016</a>) (CCP6.3.1, Table CCP6.1). Season lengths for ship-based support to mines and extraction sites will increase with sea ice change, while access via ice roads will decrease with warming (<a class="reference-link" href="#Perrin--2015">Perrin et al., 2015</a>; <a class="reference-link" href="#Council of Canadian Academies--2016">Council of Canadian Academies, 2016</a>; <a class="reference-link" href="#Trofimenko--2017">Trofimenko et al., 2017</a>; <a class="reference-link" href="#Southcott--2018">Southcott and Natcher, 2018</a>). By 2050, climate change impacts to the Tibbitt to Contwoyto Winter Road servicing mines in the northeastern region of the Northwest Territories, Canada could cost between $55 million to $213 million CAD to maintain for a shorter period of time than at present (<a class="reference-link" href="#Perrin--2015">Perrin et al., 2015</a>). Changes in submarine permafrost, critical to mining infrastructure, such as pipelines and offshore infrastructure (<a class="reference-link" href="#Bashaw--2016">Bashaw et al., 2016</a>; <a class="reference-link" href="#Paulin--2016">Paulin and Caines, 2016</a>), are expected to increase production costs and impact safety for workers (<a class="reference-link" href="#Riedel--2017">Riedel et al., 2017</a>). By mid-century, regardless of emissions scenario, it is expected that risks from permafrost thaw will be disproportionately high for industrial infrastructure along major pipeline systems in Alaska and natural gas extraction areas in the Yamal-Nenets region in northwestern Siberia, Russia (<a class="reference-link" href="#Hjort--2018">Hjort et al., 2018</a>).</p>
                            </div>
                          </div>
                          <div class="h3-container" id="CCP6.2.4.2">
                            <h3 class="Headings_H3" lang="de-DE">CCP6.2.4.2  Changing demand, opportunities and risks for polar tourism <span class="arrow-up"/><span class="arrow-down"/><span class="share-block"><img class="share-icon" src="../../share.png"/></span></h3>
                            <div class="h3-siblings" id="h3-9-siblings">
                              <p class="Body_Body-justify" lang="en-GB">Climate change has increased risks to, and demand for, polar tourism experiences related to increased maritime accessibility (<span class="condensed_italic" lang="">high confidence</span>), lengthening of warm weather season lengths (<span class="condensed_italic" lang="">very high confidence</span>) and development of a &#8216;last chance tourism market&#8217; (<span class="condensed_italic" lang="">medium confidence</span>). <span class="condensed_italic" lang=""/>Reductions in sea ice extent have facilitated increased access for polar cruising (<a class="reference-link" href="#Dawson--2018b">Dawson et al., 2018b</a>; <a class="reference-link" href="#Stewart--2020">Stewart et al., 2020</a>). Demand for Arctic cruises has increased by 20.5% over the past 5 years and resulted in 27.2 million passengers in 2018 (<a class="reference-link" href="#Shijin--2020">Shijin et al., 2020</a>). In the Antarctic, tourist numbers increased by 27% from 1992 to 2018 and attracted 75,000 visitors in 2019&#8211;2020 (IAATO, 2020; <a class="reference-link" href="#Shijin--2020">Shijin et al., 2020</a>), making it the largest economic sector in the entire region (<a class="reference-link" href="#Stewart--2020">Stewart et al., 2020</a>). The recent increase in polar tourism is due in part to the development of a niche market called &#8216;last chance tourism&#8217;, which involves explicitly marketing vulnerable or vanishing destinations or features (i.e., glaciers, polar bears, landscapes) and encouraging tourists to see them &#8216;before they are gone&#8217; (<a class="reference-link" href="#Dawson--2018a">Dawson et al., 2018a</a>; <a class="reference-link" href="#Groulx--2019">Groulx et al., 2019</a>). However, tourism development opportunities will also contend with ongoing risks related to the coronavirus disease 2019 (COVID-19) pandemic, which halted tourism globally in 2020&#8211;2021 (<a class="reference-link" href="#Frame--2020">Frame and Hemmings, 2020</a>; <a class="reference-link" href="#Lorenzo--2020">Lorenzo et al., 2020</a>), as well as those related to increased climatic risks limiting participation and reducing safety and security. By 2100, under RCP8.5, snow cover season length suitable for winter recreational activities is projected to decrease by 21&#8211;49% in West Greenland (<a class="reference-link" href="#Schrot--2019">Schrot et al., 2019</a>). Reduced sea ice and snow cover creates hazards for and could limit dog sledding, cross country skiing, snowmobiling and floe edge tours, with limited adaptation strategies available for low-elevation areas (<a class="reference-link" href="#Stephen--2018">Stephen, 2018</a>; <a class="reference-link" href="#Palma--2019">Palma et al., 2019</a>).</p>
                            </div>
                          </div>
                          <div class="h3-container" id="CCP6.2.4.3">
                            <h3 class="Headings_H3" lang="de-DE">CCP6.2.4.3  Risks and opportunities in transportation systems <span class="arrow-up"/><span class="arrow-down"/><span class="share-block"><img class="share-icon" src="../../share.png"/></span></h3>
                            <div class="h3-siblings" id="h3-10-siblings">
                              <p class="Body_Body-justify" lang="en-GB">Climate hazards create risks to transportation sectors with consequences for human safety (<span class="condensed_italic" lang="">very high confidence</span>), security (<span class="condensed_italic" lang="">low confidence</span>) and economic development (<span class="condensed_italic" lang="">high confidence</span>). Remote polar regions are highly reliant on transportation systems (air, road, sea) to support and service communities (Arctic) and scientific stations (Antarctic and Arctic). Changes in permafrost, snow, ice and precipitation patterns have increased the risk of rail infrastructure and of using permanent roads and semi-permanent trails that service Antarctic research stations, connect Arctic communities and support Indigenous food harvesting activities (<a class="reference-link" href="#Calmels--2015">Calmels et al., 2015</a>; <a class="reference-link" href="#Council of Canadian Academies--2016">Council of Canadian Academies, 2016</a>; <a class="reference-link" href="#Ford--2019">Ford et al., 2019</a>; <a class="reference-link" href="#Stewart--2020">Stewart et al., 2020</a>). Warming temperatures have particularly decreased the reliability, safety level and season length of winter ice roads (<a class="reference-link" href="#Perrin--2015">Perrin et al., 2015</a>; <a class="reference-link" href="#Council of Canadian Academies--2016">Council of Canadian Academies, 2016</a>; <a class="reference-link" href="#G&#228;deke--2021">G&#228;deke et al., 2021</a>) in the northern Baltic (Finland) (<a class="reference-link" href="#Kiani--2018">Kiani et al., 2018</a>), James Bay (Canada) (<a class="reference-link" href="#Hori--2018a">Hori et al., 2018a</a>; <a class="reference-link" href="#Hori--2018b">Hori et al., 2018b</a>) and Yakutia (Russia) (<a class="reference-link" href="#Mustonen--2021">Mustonen and </a><a class="reference-link" href="#Shadrin--2021">Shadrin, 2021</a> ). Dog sled travel in northwest Greenland has experienced shorter season lengths (<a class="reference-link" href="#Nuttall--2020">Nuttall, 2020</a>), Alaskan whale hunters have had difficulty finding suitable ice for safe harvest activities (<a class="reference-link" href="#Huntington--2016">Huntington et al., 2016</a>; <a class="reference-link" href="#Nyland--2017">Nyland et al., 2017</a>), and unpredictability in break-up and freeze-up of sea ice has compromised safe travel to and from culturally significant hunting and camping areas in Canada (<a class="reference-link" href="#Dawson--2020">Dawson et al., 2020</a>; <a class="reference-link" href="#Simonee--2021">Simonee et al., 2021</a>) and northeast Siberia (<a class="reference-link" href="#Ksenofontov--2017">Ksenofontov et al., 2017</a>; <a class="reference-link" href="#Mustonen--2021">Mustonen and </a><a class="reference-link" href="#Shadrin--2021">Shadrin, 2021</a> ). Fog (<span class="condensed_italic" lang="">low confidence</span>) and an increase in precipitation falling as ice pellets or hail (<span class="condensed_italic" lang="">high confidence</span>) (<a class="reference-link" href="#Kochtubajda--2017">Kochtubajda et al., 2017</a>) is expected to continue to cause operational delays and create safety issues for aviation in the polar regions (<a class="reference-link" href="#Debortoli--2019">Debortoli et al., 2019</a>).</p>
                            </div>
                          </div>
                        </div>
                      </div>
                      <div class="h2-container box-container" id="box-ccp6.2">
                        <h2 class="Body_Box_blue_Box_head" lang="en-GB"><span>Box CCP6.2  | Arctic Indigenous Self-determination in Climate Change Assessment and Decision Making</span> <span class="arrow-up"/><span class="arrow-down"/><span class="share-block"><img class="share-icon" src="../../share.png"/></span></h2>
                        <div class="h2-siblings" id="h2-16-siblings">
                          <p class="Body_Box_blue_Box_body" lang="en-GB">Similar to Indigenous Peoples globally (Cross-Chapter Box INDIG in Chapter 18), climate change vulnerability for Arctic Indigenous Peoples is often rooted in colonialism, which has led to land dispossession and displacement, carbon-intensive economies, discrimination, racism, marginalisation and social, cultural and health inequities (<a class="reference-link" href="#Whyte--2016">Whyte, 2016</a>; <a class="reference-link" href="#Whyte--2017">Whyte, 2017</a>; <a class="reference-link" href="#Whyte--2019">Whyte et al., 2019</a>; <a class="reference-link" href="#Chakraborty--2021">Chakraborty and Sherpa, 2021</a>). Therefore, effective responses to climate change risks for Indigenous Peoples are self-determined and underpinned by Indigenous knowledge (IK) (<span class="condensed_italic" lang="">very high confidence</span>).</p>
                          <p class="Body_Box_blue_Box_body" lang="en-GB">IK systems are diverse among and within Arctic Indigenous Peoples, and reflect deep and rich knowledge that situates and contextualises values, traditions, governance and practical ways of adapting to the ecosystem over millennia (<a class="reference-link" href="#Raymond-Yakoubian--2017">Raymond-Yakoubian et al., 2017</a>; <a class="reference-link" href="#Brattland--2018">Brattland and Mustonen, 2018</a>). IK is a valuable source of knowledge; a method to detect change, evaluate risk and inform adaptation approaches; and a cultural ecological service (<a class="reference-link" href="#Brattland--2018">Brattland and Mustonen, 2018</a>; <a class="reference-link" href="#Crate--2019">Crate et al., 2019</a>; <a class="reference-link" href="#Meredith--2019">Meredith et al., 2019</a>) that is critical for decision making (<a class="reference-link" href="#Mustonen--2016">Mustonen and Mustonen, 2016</a>; <a class="reference-link" href="#Huntington--2017">Huntington et al., 2017</a>). For instance, Kalaallit knowledge in Greenland has been used to detect and attribute long-term (over 50 years) marine change that reaches beyond scientific instrumental data (<a class="reference-link" href="#Mustonen--2018b">Mustonen et al., 2018b</a>).</p>
                          <p class="Body_Box_blue_Box_body" lang="en-GB">This Box was written by Indigenous authors, recognising that IK and LK are intellectual property (Cross-Chapter Box INDIG in Chapter 18), alleviating the risk of this knowledge being misinterpreted (<a class="reference-link" href="#David-Chavez--2018">David-Chavez and Gavin, 2018</a>; <a class="reference-link" href="#Hughes--2018">Hughes, 2018</a>; <a class="reference-link" href="#Raymond-Yakoubian--2018">Raymond-Yakoubian and Daniel, 2018</a>) and acknowledging that meaningful inclusion of Indigenous Peoples strengthens and supports Indigenous self-determination (<a class="reference-link" href="#ITK--2019">ITK, 2019</a>). Self-determination signifies and values the capacity and decisions made by these peoples in their own right and from their own autonomous cultural positioning. Following the format used in SROCC, this Box prioritises Indigenous voices by presenting climate change assessments premised on IK and written by Indigenous Peoples.</p>
                          <p class="Body_Box_blue_Box_subhead_H2" lang="en-GB">Climate Change, Nomadic Lifestyles and Preservation of Traditions</p>
                          <p class="Body_Box_blue_Box_body" lang="en-GB">Perspectives from the Yukaghir Council of Elders and Russian Association of Indigenous Peoples, Russia</p>
                          <p class="Body_Box_blue_Box_body" lang="en-GB">Climate change threatens reindeer herding, hunting, fishing and gathering, which form the basis of Siberian Indigenous societies. Nomadic herding lifestyle is premised on IK which has accumulated over millennia. IK, including the ability to predict weather, has played a substantial role in the adaptation to the extreme conditions. According to <a class="reference-link" href="#Shadrin--2021">Shadrin (2021)</a>, present, rapid changes are changing Indigenous concepts of reality; they are increasingly finding themselves in situations where their experience and knowledge cannot help them. An Elder in Northeast Siberia explained that &#8216;nature does not trust us anymore&#8217; (<a class="reference-link" href="#Mustonen--2021">Mustonen and </a><a class="reference-link" href="#Shadrin--2021">Shadrin, 2021</a> ).</p>
                          <p class="Body_Box_blue_Box_body" lang="en-GB">A major problem for nomadic reindeer herding is the degradation of reindeer pastures (<a class="reference-link" href="#Mustonen--2021">Mustonen and </a><a class="reference-link" href="#Shadrin--2021">Shadrin, 2021</a> ). The expansion of willows and shrubs into the tundra has resulted in losses of pastures. In other nomadic communities, these changes have led to the expansion of moose into tundra area and effects of reindeer populations, as well as changes in wild reindeer migration routes leading to the destruction of domestic reindeer pastures (<a class="reference-link" href="#Mustonen--2021">Mustonen and </a><a class="reference-link" href="#Shadrin--2021">Shadrin, 2021</a> ).</p>
                          <p class="Body_Box_blue_Box_body" lang="en-GB">Due to the steady changes in precipitation in recent years, a deeper than usual snow cover has formed in Northeast Siberia (<a class="reference-link" href="#Mustonen--2021">Mustonen and </a><a class="reference-link" href="#Shadrin--2021">Shadrin, 2021</a> ). This alters the capacity of reindeer to access lichen, their primary food source. Late onset of cold weather has led to difficulties in the herds moving to their winter pastures. In the summer, increased rainfall has led to waterlogging of low-lying pastures. The most important challenge is the instability of the weather (<a class="reference-link" href="#Mustonen--2021">Mustonen and </a><a class="reference-link" href="#Shadrin--2021">Shadrin, 2021</a> ). This includes frequent, never-before-seen warming, combined with rains in the late winter and early spring. Sharp temperature drops of over 30&#176;C occurring within a few hours lead to formation of an ice crust on the ground which becomes a challenge for reindeer, especially in autumn, and are becoming more frequent. Furthermore, the number of summer storms and rapid cooling accompanied with snowfall during July has increased. Using IK to predict weather is the basis of effective survival. It has become extremely difficult due to the unprecedented fast changing conditions (<a class="reference-link" href="#Mustonen--2021">Mustonen and </a><a class="reference-link" href="#Shadrin--2021">Shadrin, 2021</a> ) (<a class="reference-link" href="#Shadrin--2021">Shadrin, 2021</a>). All of these events lead to increased risks in the lives of Indigenous Peoples (<a class="reference-link" href="#Mustonen--2021">Mustonen and </a><a class="reference-link" href="#Shadrin--2021">Shadrin, 2021</a> ).</p>
                          <p class="Body_Box_blue_Box_body" lang="en-GB">Climate change impacts Indigenous Peoples&#8217; health. Degradation of the quality of surface waters has increased, resulting from new floods and the thawing of permafrost, which increases risk of gastrointestinal diseases (CCP6.2.8). The 2007 flood on Alazaya River was of special importance and was locally identified to have produced the first regional &#8216;climate refugees&#8217; (<a class="reference-link" href="#Mustonen--2021">Mustonen and </a><a class="reference-link" href="#Shadrin--2021">Shadrin, 2021</a> ). Warming has expanded the distribution of new disease-carrying insects and ticks into new territories (<a class="reference-link" href="#Mustonen--2021">Mustonen and </a><a class="reference-link" href="#Shadrin--2021">Shadrin, 2021</a> ). Ancient cemeteries and campsites, as well as the burial sites of reindeer, become dangerous as permafrost thaws and coastal erosion proceeds.</p>
                          <p class="Body_Box_blue_Box_body" lang="en-GB">Traditional food security is under threat. Permafrost-based storage facilities have deteriorated (CCP6.2.6) (<a class="reference-link" href="#Mustonen--2021">Mustonen and </a><a class="reference-link" href="#Shadrin--2021">Shadrin, 2021</a> ). There is an increase in the number of people who are forced to abandon the consumption of raw fish. As a result, the likelihood of losing cultural traditions is growing. These combined climate change impacts result in loss of IK and nomadic lifestyles, thus losing important aspects of their identity as distinct Indigenous Peoples (<a class="reference-link" href="#Mustonen--2021">Mustonen and </a><a class="reference-link" href="#Shadrin--2021">Shadrin, 2021</a> ).</p>
                          <p class="Body_Box_blue_Box_subhead_H2" lang="en-GB">Climate Change Impacts on S&#225;mi Women</p>
                          <p class="Body_Box_blue_Box_body" lang="en-GB">Perspectives from S&#225;mi in Finland</p>
                          <p class="Body_Box_blue_Box_body" lang="en-GB"><a class="reference-link" href="#Feodoroff--2021">Feodoroff (2021)</a>  stresses that many S&#225;mi women are central to Indigenous-led adaptation. Indigenous women use their bodies as gauges of change. For example, the restoration work in N&#228;&#228;t&#228;m&#246;joki River in Finland (<a class="reference-link" href="#Ogar--2020">Ogar et al., 2020</a>; <a class="reference-link" href="#Feodoroff--2021">Feodoroff, 2021</a>) is based on the knowledge of traditional fishers and reindeer herders. IK and Western science offer possibilities to reflect on changes that the waters in Indigenous bodies have known of events of the past (<a class="reference-link" href="#Feodoroff--2021">Feodoroff, 2021</a>). Changes in temperature, pain and the gradual passing of pain, waves and intrusions within Indigenous bodies are knowledges that are difficult to communicate according to <a class="reference-link" href="#Feodoroff--2021">Feodoroff (2021)</a>. Women are sensitive to receiving messages from their home environments. <a class="reference-link" href="#Feodoroff--2021">Feodoroff (2021)</a>  stresses that Indigenous conservation work is a bodily commitment. This realisation is linked with difficult questions of what or who controls Indigenous bodies. <a class="reference-link" href="#Feodoroff--2021">Feodoroff (2021)</a>  links present change with lingering impacts of global environmental damage that has not been dealt with or addressed. It may lead to real pain in Indigenous bodies and minds, causing feelings of being nauseated and ultimately causing fade-out, wilt, withering and extinguishment of Indigenous Peoples.</p>
                          <p class="Body_Box_blue_Box_subhead_H2" lang="en-GB">Adaptation Successes Underpinned by Inuit Knowledge</p>
                          <p class="Body_Box_blue_Box_body" lang="en-GB">Perspectives from Inuit Circumpolar Council</p>
                          <p class="Body_Box_blue_Box_body" lang="en-GB">Inuit have survived and thrived in Inuit Nunaat, their homelands, for millennia. In an environment that presents unique challenges, they have cultivated resourceful and innovative approaches tailored to their surroundings. Their values and knowledge guide their relationships with all that is within the Arctic, and this has informed their decisions and management practices that continue to be in place today (<a class="reference-link" href="#Inuit Circumpolar Council Alaska--2020">Inuit Circumpolar Council Alaska, 2020</a>). They are experts in adaptation. Now more than ever, in the time of anthropogenic climate change, living in the fastest warming region on the planet requires this expertise and capacity.</p>
                          <p class="Body_Box_blue_Box_body" lang="en-GB">The extraordinary developments in the field of IK have crystallised the main tenant of interaction with the natural world that is &#8216;integral to a cultural complex that also encompasses language, systems of classification, resource use practices, social interactions, ritual and spirituality&#8217; (UNESCO, 2017). Inuit have used their knowledge of the land and coastal seas to design technology, monitoring systems (Atlas of Community-Based Monitoring in a Changing Arctic, 2021) and new hunting routes that respond to the changes they face (<a class="reference-link" href="#Inuit Circumpolar Council--2017">Inuit Circumpolar Council, 2017</a>; <a class="reference-link" href="#Nunavut Climate Change Center--2018">Nunavut Climate Change Center, 2018</a>; <a class="reference-link" href="#SIKU--2020">SIKU, 2020</a>). Such examples of &#8216;adaptation success&#8217; across Inuit Nunaat have been showcased and celebrated nationally and internationally (Youth Climate Report, 2019), and all are underpinned by Inuit knowledge and pivot on their right to self-determination. This is also embodied, for example, in Canada; the National Inuit Climate Change Strategy outlines the collective Canadian Inuit plan for climate action, centring on Inuit-determined priorities to protect their culture, language and way of life, and guiding partners in how to work with Inuit on implementing this strategy (<a class="reference-link" href="#ITK--2019">ITK, 2019</a>). Their action on adaptation also spans scales from local to international. As far back as 1977, Inuit have been organised and involved at the international level. Inuit were present at the Rio Earth Summit and have participated in diverse but interrelated United Nations conventions to protect their homelands (e.g., UNFCCC, CBD, Stockholm Convention). This history gives us unique insight and positions us as both leaders and partners with the ability to engage directly with governments, business and others.</p>
                          <p class="Body_Box_blue_Box_body" lang="en-GB">However, while Inuit are often recognised as leaders in adaptation, too often the academic literature ends there, citing &#8216;successful Inuit-led adaptation to climate change&#8217; but not going further to explore towards what end this adaptation is designed. We have demonstrated leadership and set an example for the world in how to respond to change, but successful adaptation is not enough; it is not the end goal.</p>
                          <p class="Body_Box_blue_Box_body" lang="en-GB">Central to their significant capacity to adapt is that it is done in recognition of the need to move beyond adaptation. Indeed, Inuit-led adaptation action is founded on the intention of contributing to and moving towards reformation and eventual transformation of systems to create a &#8216;climate resilient&#8217; Arctic. This concept has surfaced in academic climate change literature and discussion and has begun to filter into the climate policy arena, especially within the context of the current COVID-19 pandemic that challenges us all to think about our world differently. With acknowledgement that reform and transformation is needed, the question remains, &#8216;What does this look like?&#8217;</p>
                          <p class="Body_Box_blue_Box_body" lang="en-GB">Inuit have an answer. System reform and transformation is grounded in self-determination. It is based in a human rights framework and rooted in IK and culture. It recognises and respects interconnectedness and builds this into solutions. It demands collaboration and true partnership towards action. And it comes from thinking big and across scales. Shaping this change calls for willingness and support to rethink the current economic and governance models that have failed us. For example, decentralising governance and management, while it remains largely unconventional, has been shown to create some of the strongest systems we have. This is, in large part, due to the way in which decentralisation places more value and responsibility on the &#8216;self&#8217; in self-determination. Decentralised processes in the Arctic have IK holders playing a key and lead role in determining, defining and deciding how to work towards positive change.</p>
                          <p class="Body_Box_blue_Box_body" lang="en-GB">Across Inuit Nunaat, examples of direct management and control over lands, territories and resources have demonstrated that working from what is happening on the ground throughout their homelands, from their priorities and interests, has served to strengthen the health of their environment and their communities. For example, a comparative analysis on factors supporting and impeding Inuit food sovereignty between Alaska and the Inuvialuit Settlement Region found that the difference in outcomes within these regions is dependent on explicit respect for and recognition of the Inuit right of self-determination (<a class="reference-link" href="#Inuit Circumpolar Council Alaska--2020">Inuit Circumpolar Council Alaska, 2020</a>). Furthermore, a new agreement achieved in Nunavut by the Qikiqtani Inuit Association related to the marine environment touted as an exemplary model for marine management is rooted in Inuit-determined structures and policies, and manifested by Inuit themselves (<a class="reference-link" href="#QIA--2019">QIA, 2019</a>).</p>
                          <p class="Body_Box_blue_Box_body" lang="en-GB">Emphasis on decentralised management and substantial funding to do so at the grassroots level has been recognised by the IPCC previously in the SROCC. Ultimately, going beyond reform to system transformation requires, as Oren Lyons has stated, &#8216;value change for survival&#8217; (<a class="reference-link" href="#Lyons--2020">Lyons, 2020</a>). Valuing decentralisation, self-determination, Inuit knowledge, interconnectedness&#8212;core values held by Inuit&#8212;can move us in a climate-resilient direction.</p>
                        </div>
                      </div>
                      <div class="h2-container" id="CCP6.2.5">
                        <h2 class="Headings_H2-numbered" lang="de-DE">CCP6.2.5  Arctic Settlements and Communities <span class="arrow-up"/><span class="arrow-down"/><span class="share-block"><img class="share-icon" src="../../share.png"/></span></h2>
                        <div class="h2-siblings" id="h2-5-siblings">
                          <p class="Body_Body-justify" lang="en-GB">Polar settlements range from large well-serviced cities such as Troms&#248;, Murmansk and Reykjavik, to remote fly-in Indigenous communities, to scientific outposts and research stations. Polar settlements are at significant risk from climate change through shoreline erosion, permafrost thaw and flooding (<span class="condensed_italic" lang="">high confidence</span>) (CCP6.2.2). Opportunities for community development in small communities are underestimated as they are emergent and unknown (<span class="condensed_italic" lang="">highly likely </span>) (CCP6.2.5).</p>
                          <p class="Body_Body-justify" lang="en-GB">Degradation of ice-rich permafrost can threaten the structural stability and functional capacities of community-based infrastructure (i.e., airports and roads; CCP6.2.5) and can have implications for local economies with coupled impacts for local livelihoods, health and well-being (CCP6.2.5, CCP6.2.6) (<span class="condensed_italic" lang="">high confidence</span>). For instance, in Canada, infrastructure damage from permafrost instability caused temporary closures of schools in Yukon, permafrost degradation contributed to runway damage at Iqaluit International Airport in Nunavut, and flooding from heavy rains resulted in thermal erosion of river banks that interrupted water and sewage service in Nunavut (<a class="reference-link" href="#Oldenborger--2015">Oldenborger and LeBlanc, 2015</a>; <a class="reference-link" href="#Council of Canadian Academies--2016">Council of Canadian Academies, 2016</a>; <a class="reference-link" href="#Lemmen--2016">Lemmen et al., 2016</a>). In northeast Siberia, the floods of Alazaeya River attributed to thawing permafrost have severely affected Andreyushkino in Yakutia (<a class="reference-link" href="#Mustonen--2021">Mustonen and </a><a class="reference-link" href="#Shadrin--2021">Shadrin, 2021</a> ).</p>
                          <p class="Body_Body-justify" lang="en-GB">By 2050, 69% of fundamental human infrastructure in the Arctic is projected to be at risk under an RCP4.5 scenario, including more than 1200 settlements and 36,000 buildings, leaving 4,000,000 people living in areas with high potential for thaw (<a class="reference-link" href="#Hjort--2018">Hjort et al., 2018</a>). Widespread permafrost thaw could increase the cost of infrastructure lifecycle replacement by 27% by mid-century under RCP8.5 (<a class="reference-link" href="#Suter--2019">Suter et al., 2019</a>). Northern Canada and Western Siberia are at particularly high risk, which are projected to cost additional annual spending of over 1% of annual gross regional product to maintain existing infrastructure (<a class="reference-link" href="#Suter--2019">Suter et al., 2019</a>). For instance, under an RCP8.5 scenario, climate change could affect over 19% of structures and infrastructure assets in Russia, which would cost an estimated $84.4 billion USD to mitigate damages (<a class="reference-link" href="#Streletskiy--2019">Streletskiy et al., 2019</a>). Fifty-four percent of residential buildings are projected to be affected by significant permafrost degradation by the mid-century, costing an additional estimated $52.6 billion USD (<a class="reference-link" href="#Streletskiy--2019">Streletskiy et al., 2019</a>). Sea level rise (SLR) and reduced sea ice protection is projected to compound permafrost thaw damages, including low lying coasts (e.g., along southern Beaufort Sea), low-lying barrier islands (e.g., along Chukchi Sea), and deltas (e.g., Mackenzie, Lena) (<a class="reference-link" href="#Fritz--2017">Fritz et al., 2017</a>; <a class="reference-link" href="#Lantz--2020">Lantz et al., 2020</a>). In Alaska, proactive adaptation was substantially cost-saving (reducing costs by $2.9 billion USD for RCP8.5 and $2.3 billion USD for RCP4.5), highlighting the financial benefit of investing in adaptation now (<a class="reference-link" href="#Melvin--2017">Melvin et al., 2017</a>). Permafrost damage and SLR may result in tipping points, leaving some communities no longer habitable. In Alaska, USA, many communities at risk of flooding and storm surges are already engaged in community-led relocation planning processes (e.g., Shishmaref) (<a class="reference-link" href="#Melvin--2017">Melvin et al., 2017</a>; <a class="reference-link" href="#Farbotko--2020">Farbotko et al., 2020</a>; <a class="reference-link" href="#Rosales--2021">Rosales et al., 2021</a>).</p>
                          <p class="Body_Body-justify" lang="en-GB">Climate change has important intangible loss and damage implications in the Arctic, with negative impacts ranging from livelihoods to spirituality to solastalgia (i.e., distress caused by environmental change) (<a class="reference-link" href="#Cunsolo--2018">Cunsolo and Ellis, 2018</a>; <a class="reference-link" href="#Middleton--2020b">Middleton et al., 2020b</a>; <a class="reference-link" href="#Sawatzky--2020">Sawatzky et al., 2020</a>; <a class="reference-link" href="#Mustonen--2021">Mustonen and </a><a class="reference-link" href="#Shadrin--2021">Shadrin, 2021</a> ). Permafrost thaw, SLR and reduced sea ice protection also presents risk to sociocultural assets, including heritage sites in all Arctic regions (<span class="condensed_italic" lang="">very high confidence</span>) (<a class="reference-link" href="#Friesen--2015">Friesen, 2015</a>; <a class="reference-link" href="#Hollesen--2016">Hollesen et al., 2016</a>; <a class="reference-link" href="#Radosavljevic--2016">Radosavljevic et al., 2016</a>; <a class="reference-link" href="#O&#8217;Rourke--2017">O&#8217;Rourke, 2017</a>; <a class="reference-link" href="#Hillerdal--2019">Hillerdal et al., 2019</a>; <a class="reference-link" href="#Fenger-Nielsen--2020">Fenger-</a><a class="reference-link" href="#Nielsen--2020">Nielsen et al., 2020</a> ; <a class="reference-link" href="#Jensen--2020">Jensen, 2020</a>). A large number of archaeological sites are at risk from climate change in southwest Greenland; Yukon&#8217;s Beaufort coast, Canada; and Auyuittuq National Park Reserve, Nunavut, Canada (<a class="reference-link" href="#Westley--2011">Westley et al., 2011</a>; <a class="reference-link" href="#Hollesen--2018">Hollesen et al., 2018</a>; <a class="reference-link" href="#Irrgang--2019">Irrgang et al., 2019</a>; <a class="reference-link" href="#Fenger-Nielsen--2020">Fenger-</a><a class="reference-link" href="#Nielsen--2020">Nielsen et al., 2020</a> ). Siberian nomadic reindeer herding and fishing livelihoods are vulnerable to permafrost thaw, which alters northern landscapes and lakes, as well as rain-on-snow events, and rapidly changes landscapes and terrestrial and aquatic habitats (<a class="reference-link" href="#Mustonen--2016">Mustonen and Mustonen, 2016</a>; <a class="reference-link" href="#Brattland--2018">Brattland and Mustonen, 2018</a>; <a class="reference-link" href="#Mustonen--2020">Mustonen and Huusari, 2020</a>) (CCP6.2.2). The intangible loss and damage to nomadic cultures could cascade to losses of identity and social challenges (CCP6.2.6; Chapter 13).</p>
                        </div>
                      </div>
                      <div class="h2-container box-container" id="box-ccp6.1">
                        <p class="Body_Box_blue_Box_head" lang="en-GB"><span>Box CCP6.1  | Climate Change and the Emergence of Future Arctic Maritime Trade Routes</span> <span class="arrow-up"/><span class="arrow-down"/><span class="share-block"><img class="share-icon" src="../../share.png"/></span></p>
                        <div class="h2-siblings" id="h2-14-siblings">
                          <p class="Body_Box_blue_Box_body" lang="en-GB">Discovering a viable maritime trade route linking the Atlantic and Pacific oceans through the Arctic has captured the collective global imagination for centuries (<a class="reference-link" href="#Bockstoce--2018">Bockstoce, 2018</a>). Geographically shorter than southern trade routes via the Panama and Suez Canals, the Arctic presents the possibility for more economical and timely commercial trade, but has historically been limited by thick multi-year ice and other navigational challenges. Amplified warming in the Arctic has caused September sea ice extent to decline at a rate of &#8722;13% per decade (<a class="reference-link" href="#Serreze--2019">Serreze and Meier, 2019</a>) and reduced sea ice thickness by 66% (2 m) between 1958&#8211;1976 and 2011&#8211;2018 (<a class="reference-link" href="#Kwok--2018">Kwok, 2018</a>). Regardless of mitigation efforts, it is expected that before mid-century the Arctic will be seasonally ice free for the first time in 2,600,000 years (defined as &lt;1,000,000 km <span class="superscript CharOverride-3" lang="">2</span>) (<a class="reference-link" href="#Knies--2014">Knies et al., 2014</a>; <a class="reference-link" href="#SIMIP Community--2020">SIMIP Community, 2020</a>; <a class="reference-link" href="#Fox-Kemper--2021">Fox-Kemper et al., 2021</a>; <a class="reference-link" href="#Lee--2021">Lee et al., 2021</a>) and will make Arctic maritime trade a reality (<a class="reference-link" href="#Egu&#237;luz--2016">Egu&#237;luz et al., 2016</a>; <a class="reference-link" href="#Melia--2016">Melia et al., 2016</a>; <a class="reference-link" href="#Pizzolato--2016">Pizzolato et al., 2016</a>; <a class="reference-link" href="#Bennett--2020">Bennett et al., 2020</a>; <a class="reference-link" href="#Wei--2020">Wei et al., 2020</a>).</p>
                          <p class="Body_Box_blue_Box_body" lang="en-GB">There are three identified trade routes in the Arctic: Northern Sea Route (NSR), Northwest Passages (NWP) and the Transpolar Sea Route (TSR). Over the last decade, economic trends and reductions in sea ice have facilitated significant increases in ship traffic in the NSR (<a class="reference-link" href="#Aksenov--2017">Aksenov et al., 2017</a>; <a class="reference-link" href="#Li--2020">Li et al., 2020</a>), including a 79% increase in total transit tonnage from 2010 to 2017 (<a class="reference-link" href="#Babin--2020">Babin et al., 2020</a>) related mostly to domestic resource development. Relative to an early 21st century baseline, it is expected that the NSR will become 18% more accessible by mid-century (<a class="reference-link" href="#Stephenson--2013">Stephenson et al., 2013</a>) and could be navigable even for non-ice strengthened vessels for 101&#8211;118 days annually by 2050 and 125&#8211;192 days by 2100 (<a class="reference-link" href="#Khon--2017">Khon et al., 2017</a>). The NWP has experienced a tripling of km travelled by ships since 1990, attributed mostly to resource extraction and increases in tourism opportunities (<a class="reference-link" href="#Johnston--2017">Johnston et al., 2017</a>; <a class="reference-link" href="#Dawson--2018a">Dawson et al., 2018a</a>). The NWP could become 30% more accessible by 2050 compared with current conditions (<a class="reference-link" href="#Stephenson--2013">Stephenson et al., 2013</a>). Before 4&#176;C global warming above pre-industrial, re-supply vessels (Polar Class 7) in the western NWP could gain an additional month of operating time, whereas the eastern NWP could gain just 2 weeks (<a class="reference-link" href="#Mudryk--2021">Mudryk et al., 2021</a>) due to the dynamic import of mobile and hazardous ice from the Arctic Ocean (<a class="reference-link" href="#Haas--2015">Haas and Howell, 2015</a>; <a class="reference-link" href="#Howell--2019">Howell and Brady, 2019</a>). Comparatively, the TSR has historically only been viable for nuclear icebreakers, submarines, and occasional military and scientific activity due to thick multi-year ice regimes (<a class="reference-link" href="#Bennett--2020">Bennett et al., 2020</a>). However, this most sought-after route offers the greatest reduction in sailing times compared with southern routes (19&#8211;24 days) of all Arctic Sea routes and could be 56% more accessible by mid-century compared with current conditions (<a class="reference-link" href="#Stephenson--2013">Stephenson et al., 2013</a>; <a class="reference-link" href="#Melia--2016">Melia et al., 2016</a>).</p>
                          <div class="Figure" id="_idContainer023">
                            <p class="Body_Figures_Figure" lang="de-DE">
                              <img alt="" class="_idGenObjectAttribute-5" id="figure-ccp6-box611" loading="lazy" src="https://ipcc.ch/report/ar6/wg2/downloads/figures/IPCC_AR6_WGII_Figure_CCP6_Box_CCP6_1_1.png"/>
                            </p>
                            <p class="Body_Box_blue_Box_Figure_title" lang="en-GB">
                              <span class="figure_number" lang="">Figure Box CCP6.1.1 | </span>
                              <span class="bold_condensed-dark-blue" lang="">Arctic trade routes and projected operations related to sea ice loss. </span>
                            </p>
                            <p lang="en-GB">Growth in Arctic maritime trade will result in increased emission of black carbon (<a class="reference-link" href="#Stephenson--2018">Stephenson et al., 2018</a>; <a class="reference-link" href="#Zhang--2019">Zhang et al., 2019</a>; <a class="reference-link" href="#Wang--2021">Wang et al., 2021</a>), increases in ship-source underwater noise impacts on marine mammals (<a class="reference-link" href="#Halliday--2017">Halliday et al., 2017</a>), higher rates of accidents and incidents among vessels from increasing mobile sea ice and newly accessible ice-free waters that lack charting (<a class="reference-link" href="#Haas--2015">Haas and Howell, 2015</a>; <a class="reference-link" href="#Howell--2019">Howell and Brady, 2019</a>), impacts to cultural sustainability for Indigenous Peoples (<a class="reference-link" href="#Olsen--2019">Olsen et al., 2019</a>; <a class="reference-link" href="#Dawson--2020">Dawson et al., 2020</a>) (<span class="condensed_italic" lang="">high confidence</span>), the potential for the introduction and propagation of invasive species (<a class="reference-link" href="#Chan--2019">Chan et al., 2019</a>; <a class="reference-link" href="#Rosenhaim--2019">Rosenhaim et al., 2019</a>), and sovereignty tensions with implications for global geopolitics (<a class="reference-link" href="#Drewniak--2018">Drewniak et al., 2018</a>) (<span class="condensed_italic" lang="">medium confidence</span>). Globalisation and the almost universal adherence to economic growth models among nations will continue to fuel maritime trade (Box 14.5). As sea ice decreases facilitates growth in Arctic maritime trade and transportation specifically, adaptation strategies designed to facilitate mitigation co-benefits and that target the cascading implications and double exposure of climate change and Arctic shipping impacts will be essential in reducing risks (<a class="reference-link" href="#Ng--2018">Ng et al., 2018</a>; <a class="reference-link" href="#Pirotta--2019">Pirotta et al., 2019</a>; <a class="reference-link" href="#Bennett--2020">Bennett et al., 2020</a>; <a class="reference-link" href="#Zeng--2020">Zeng et al., 2020</a>). Electric and solar powered vessels, new engine and emission reduction technologies, investment in wind, water, ice and climate forecasting technologies and services (<a class="reference-link" href="#Haavisto--2020">Haavisto et al., 2020</a>; <a class="reference-link" href="#Stewart--2020">Stewart et al., 2020</a>; <a class="reference-link" href="#Simonee--2021">Simonee et al., 2021</a>), and efforts by the International Maritime Organization to reduce sulphur and the use of heavy fuel oils (<a class="reference-link" href="#PAME--2020">PAME, 2020</a>; <a class="reference-link" href="#van Luijk--2020">van Luijk et al., 2020</a>) could play a key role in limiting emissions and reducing risks related to the environmental and cultural impacts of fuel spills in ice-infested Arctic waters. The development of low-impact shipping corridors (<a class="reference-link" href="#Ch&#233;nier--2017">Ch&#233;nier et al., 2017</a>; <a class="reference-link" href="#Dawson--2020">Dawson et al., 2020</a>) and multi-lateral agreements such as those implemented by the Arctic Council and Indigenous Peoples&#8217; organisations on joint search and rescue (<a class="reference-link" href="#Arctic Council--2011">Arctic Council, 2011</a>) and shared spill responsibilities (<a class="reference-link" href="#Arctic Council--2013">Arctic Council, 2013</a>) represent important co-governance efforts that will be increasingly important in the future owing to projected climate-related risks.</p>
                            <div class="ch-figure-button-cont"><a href="/report/ar6/wg2/figures/chapter-ccp6/figure-ccp6-box611" target="_blank"><button class="btn-ipcc btn btn-primary ch-figure-button">Open figure</button></a> </div>
                          </div>
                        </div>
                      </div>
                      <h2 class="Body_Box_FAQ_FAQ-Box_subhead" lang="en-GB">FAQ CCP6.3  | How have arctic communities adapted to environmental change in the past and will these experiences help them respond now and in the future?<span class="arrow-up"/><span class="arrow-down"/><span class="share-block"><img class="share-icon" src="../../share.png"/></span></h2>
                      <div class="h2-siblings" id="h2-15-siblings">
                        <p class="Body_Box_FAQ_FAQ-Box_body" lang="en-US">
                          <span class="condensed_italic" lang="">For thousands of years, Arctic Indigenous Peoples and local communities have survived several major changes to the ecosystems on which they rely; however, the present changes in climate are more challenging than pre- and early historic changes in the Arctic, and polar communities will now face new unprecedented risks. </span>
                        </p>
                        <p class="Body_Box_FAQ_FAQ-Box_body" lang="en-US">The challenges for responding to present change are <span class="condensed_italic" lang=""/> due to the multiple imposed and simultaneous drivers combined with elimination and/or removal of endemic capacity to respond in culturally and locally appropriate ways. Adapting in the past may therefore inform and produce novel solutions for the present and convey baselines of important contextual information on significance of change. Arctic communities, especially Indigenous Peoples, have been marginalised in terms of their autonomous responses spaces and self-assessment that could be made without external pressures. Therefore, to increase the possibility of community-led adaptation, colonialism and the resultant lack of upheld rights, resources and equity need to be solved simultaneously with the present climate change impacts. New research, governance, policy and collaborations are needed to effectively adapt to risks that are projected to emerge in the polar regions as a result of rapid climate change.</p>
                      </div>
                      <div class="h2-container" id="CCP6.2.6">
                        <h2 class="Headings_H2-numbered" lang="de-DE">CCP6.2.6  Human Health and Wellness in the Arctic <span class="arrow-up"/><span class="arrow-down"/><span class="share-block"><img class="share-icon" src="../../share.png"/></span></h2>
                        <div class="h2-siblings" id="h2-6-siblings">
                          <p class="Body_Body-justify" lang="en-GB">Climate change continues to have wide-ranging physical human health risks in the Arctic, particularly for Indigenous Peoples (<span class="condensed_italic" lang="">high confidence</span>); however, future projections of physical risks are nascent. Climate change has already challenged food and nutritional security (CCP6.2.5). Climate change also creates safety concerns for those who access the land, ice and water for food, cultural and recreational purposes, with changing environmental conditions linked to injury and death (<a class="reference-link" href="#Durkalec--2014">Durkalec et al., 2014</a>; <a class="reference-link" href="#Clark--2016a">Clark et al., 2016a</a>; <a class="reference-link" href="#Clark--2016b">Clark et al., 2016b</a>; <a class="reference-link" href="#Driscoll--2016">Driscoll et al., 2016</a>; <a class="reference-link" href="#Brattland--2018">Brattland and Mustonen, 2018</a>). Foodborne disease risks are expected to increase in the Arctic, with warming temperatures linked to increased risk of microbial contamination of locally harvested foods (<a class="reference-link" href="#Grjibovski--2013">Grjibovski et al., 2013</a>; <a class="reference-link" href="#Harper--2015">Harper et al., 2015</a>), chemical contamination of locally harvest foods (<a class="reference-link" href="#Hansen--2015">Hansen et al., 2015</a>; <a class="reference-link" href="#Long--2015">Long et al., 2015</a>; <a class="reference-link" href="#Alava--2017">Alava et al., 2017</a>), compromised structural integrity and utility of ice cellars used to store locally harvested meat (<a class="reference-link" href="#Nyland--2017">Nyland et al., 2017</a>; <a class="reference-link" href="#Markon--2018">Markon et al., 2018</a>), and new challenges to traditional food preparation techniques (<a class="reference-link" href="#Shadrin--2021">Shadrin, 2021</a>). Waterborne disease risks have increased, with decreased drinking water quality and quantity, water treatment infrastructure failures and new waterborne pathogens emerging in the Arctic (<a class="reference-link" href="#Berner--2016">Berner et al., 2016</a>; <a class="reference-link" href="#Thivierge--2016">Thivierge et al., 2016</a>; <a class="reference-link" href="#Markon--2018">Markon et al., 2018</a>; <a class="reference-link" href="#Yoder--2018">Yoder, 2018</a>; <a class="reference-link" href="#Masina--2019">Masina et al., 2019</a>; <a class="reference-link" href="#Sachal--2019">Sachal et al., 2019</a>; <a class="reference-link" href="#Harper--2020">Harper et al., 2020</a>; <a class="reference-link" href="#Mustonen--2021">Mustonen and </a><a class="reference-link" href="#Shadrin--2021">Shadrin, 2021</a> ). Emerging environmental exposures to pathogens is also a concern. In 2016, a Nenets boy and over 200,000 reindeer died from anthrax linked to warming environments (<a class="reference-link" href="#Ezhova--2021">Ezhova et al., 2021</a>)&#8212;a risk which is projected to increase with climate change (<a class="reference-link" href="#Liskova--2021">Liskova et al., 2021</a>). Thawing permafrost increases smallpox risk in former nomadic campsites and graveyards (<a class="reference-link" href="#Mustonen--2021">Mustonen and </a><a class="reference-link" href="#Shadrin--2021">Shadrin, 2021</a> ; <a class="reference-link" href="#Shadrin--2021">Shadrin, 2021</a>). Arctic health systems&#8212;which are often already stressed&#8212;will be further challenged by climate change (<a class="reference-link" href="#Harper--2015">Harper et al., 2015</a>; <a class="reference-link" href="#Clark--2017">Clark and Ford, 2017</a>), especially in conjunction with other system shocks (e.g., COVID-19) (Cross-Chapter Box COVID in Chapter 7) (<a class="reference-link" href="#Zavaleta-Cortijo--2020">Zavaleta-Cortijo et al., 2020</a>). While physical health impacts have been observed, research examining future health projections or evaluating the efficacy of health adaptations is rare (<a class="reference-link" href="#Dobson--2015">Dobson et al., 2015</a>; <a class="reference-link" href="#Harper--2020">Harper et al., 2020</a>; <a class="reference-link" href="#Harper--2021">Harper et al., 2021</a>).</p>
                          <p class="Body_Body-justify" lang="en-GB">Climate change has negative, widespread and cumulative impacts on mental health in the Arctic, particularly for Indigenous Peoples (<span class="condensed_italic" lang="">very high confidence</span>) (Figure CCP6.3). Climate-sensitive mental health outcomes are complex, overlapping and interrelated, and have multiple direct and indirect pathways stemming from acute (e.g., major storms, flooding, wildfires) and chronic (e.g., temperature increases, sea ice loss, permafrost thaw) environmental conditions, and resulting disruptions to livelihoods, culture, food systems, social connections, health systems and economies (<a class="reference-link" href="#Cunsolo Willox--2013a">Cunsolo Willox et al., 2013a</a>; <a class="reference-link" href="#Cunsolo Willox--2013b">Cunsolo Willox et al., 2013b</a>; <a class="reference-link" href="#Cunsolo Willox--2014">Cunsolo Willox et al., 2014</a>; <a class="reference-link" href="#Beaumier--2015">Beaumier et al., 2015</a>; <a class="reference-link" href="#Durkalec--2015">Durkalec et al., 2015</a>; <a class="reference-link" href="#Hamilton--2016">Hamilton et al., 2016</a>; <a class="reference-link" href="#Clayton--2017">Clayton et al., 2017</a>; <a class="reference-link" href="#Dodd--2018">Dodd et al., 2018</a>; <a class="reference-link" href="#Jaakkola--2018">Jaakkola et al., 2018</a>; <a class="reference-link" href="#Markon--2018">Markon et al., 2018</a>; <a class="reference-link" href="#ITK--2019">ITK, 2019</a>; <a class="reference-link" href="#Minor--2019">Minor et al., 2019</a>; <a class="reference-link" href="#Middleton--2020a">Middleton et al., 2020a</a>; <a class="reference-link" href="#Middleton--2020b">Middleton et al., 2020b</a>; <a class="reference-link" href="#Feodoroff--2021">Feodoroff, 2021</a>).</p>
                          <div class="Figure" id="_idContainer023">
                            <p class="Body_Figures_Figure" lang="de-DE">
                              <img alt="" class="_idGenObjectAttribute-5" id="figure-ccp6-003" loading="lazy" src="https://ipcc.ch/report/ar6/wg2/downloads/figures/IPCC_AR6_WGII_Figure_CCP6_003.png"/>
                            </p>
                            <p class="Body_Figures_Figure_title" lang="en-US">
                              <span class="figure_number" lang="">Figure CCP6.3  | </span>
                              <span class="bold_condensed-dark-blue" lang="">The pathways through which climate change impacts mental and emotional health in the Arctic. </span>
                            </p>
                            <div class="ch-figure-button-cont"><a href="/report/ar6/wg2/figures/chapter-ccp6/figure-ccp6-003" target="_blank"><button class="btn-ipcc btn btn-primary ch-figure-button">Open figure</button></a> </div>
                          </div>
                          <p class="Body_Body-justify" lang="en-GB">Negative mental health outcomes from climate change include: emotional reactions (e.g., sadness, fear, anger, distress and anxiety); psychosocial outcomes (e.g., depression, post-traumatic stress disorder and generalised anxiety); experiences with grief and loss (i.e., ecological grief); increased drug and alcohol usage, family stress and domestic violence; increased suicide ideation and suicides; loss of cultural knowledge and continuity, disruptions to intergenerational knowledge transfer; and deterioration and loss of place-based identities and connections (i.e., solastalgia) (<a class="reference-link" href="#Cunsolo Willox--2013a">Cunsolo Willox et al., 2013a</a>; <a class="reference-link" href="#Cunsolo Willox--2013b">Cunsolo Willox et al., 2013b</a>; <a class="reference-link" href="#Cunsolo Willox--2014">Cunsolo Willox et al., 2014</a>; <a class="reference-link" href="#Durkalec--2015">Durkalec et al., 2015</a>; <a class="reference-link" href="#Harper--2015">Harper et al., 2015</a>; <a class="reference-link" href="#Cunsolo--2018">Cunsolo and Ellis, 2018</a>; <a class="reference-link" href="#Hayes--2018">Hayes et al., 2018</a>; <a class="reference-link" href="#Jaakkola--2018">Jaakkola et al., 2018</a>; <a class="reference-link" href="#Markon--2018">Markon et al., 2018</a>; <a class="reference-link" href="#Minor--2019">Minor et al., 2019</a>; <a class="reference-link" href="#Middleton--2020a">Middleton et al., 2020a</a>; <a class="reference-link" href="#Feodoroff--2021">Feodoroff, 2021</a>).</p>
                          <p class="Body_Body-justify" lang="en-GB">The negative mental health impacts from climate change are amplified among those most reliant on the environment for subsistence and livelihoods, those who already face chronic physical or mental health issues, and those facing socioeconomic inequities and marginalisation, particularly for Indigenous Peoples (<span class="condensed_italic" lang="">high confidence</span>). These climate change related mental health impacts are unequally distributed (<a class="reference-link" href="#Cunsolo Willox--2014">Cunsolo Willox et al., 2014</a>; <a class="reference-link" href="#Minor--2019">Minor et al., 2019</a>), and may vary by gender (<a class="reference-link" href="#Beaumier--2015">Beaumier et al., 2015</a>; <a class="reference-link" href="#Harper--2015">Harper et al., 2015</a>; <a class="reference-link" href="#Feodoroff--2021">Feodoroff, 2021</a>) and age (<a class="reference-link" href="#Petrasek MacDonald--2013">Petrasek MacDonald et al., 2013</a>; <a class="reference-link" href="#Ostapchuk--2015">Ostapchuk et al., 2015</a>; <a class="reference-link" href="#Petrasek MacDonald--2015">Petrasek MacDonald et al., 2015</a>; <a class="reference-link" href="#Kowalczewski--2018">Kowalczewski and Klein, 2018</a>).</p>
                          <p class="Body_Body-justify" lang="en-GB">Climate change will increase mental health risks in the Arctic in the future (<span class="condensed_italic" lang="">medium confidence</span>). Future risks include exposures to severe weather events and changing precipitation patterns, sea ice loss, wildfires and changing place attachment, as well as disruptions to underlying determinants of mental health and social support networks (<a class="reference-link" href="#Cunsolo Willox--2014">Cunsolo Willox et al., 2014</a>; <a class="reference-link" href="#Cunsolo--2018">Cunsolo and Ellis, 2018</a>; <a class="reference-link" href="#Markon--2018">Markon et al., 2018</a>; <a class="reference-link" href="#Council of Canadian Academies--2019">Council of Canadian Academies, 2019</a>; <a class="reference-link" href="#ITK--2019">ITK, 2019</a>; <a class="reference-link" href="#Middleton--2020a">Middleton et al., 2020a</a>; <a class="reference-link" href="#Middleton--2020b">Middleton et al., 2020b</a>).</p>
                          <p class="Body_Body-justify" lang="en-GB">There is <span class="condensed_italic" lang="">limited evidence</span> assessing adaptation options that effectively reduce climate-related mental health risks, but developing or enhancing access to mental health resources and infrastructure is critical, such as land-based healing programmes, enhanced access to culturally appropriate mental health resources, and climate-specific counselling services to support individual and community psychosocial resilience, particularly among Arctic Indigenous Peoples (<a class="reference-link" href="#Cunsolo--2018">Cunsolo and Ellis, 2018</a>; <a class="reference-link" href="#Middleton--2020a">Middleton et al., 2020a</a>). Incorporating a climate-sensitive mental health lens into mitigation and adaptation planning holds potential for increasing mental health and resilience in the Arctic, as well as supporting other social, economic and cultural co-benefits.</p>
                        </div>
                      </div>
                    </div>
                    <div class="h1-container" id="CCP6.3">
                      <h1 class="Headings_H1-numbered" lang="en-GB">CCP6.3  Key Risks and Adaptation <span class="share-block"><img class="share-icon" src="../../share.png"/></span><button class="btn-ipcc btn btn-primary chapter-expand">Expand section</button></h1>
                      <div class="h1-siblings" id="h1-4-siblings"/>
                      <div class="h2-container" id="CCP6.3.1">
                        <h2 class="Headings_H2-sub" lang="de-DE">CCP6.3.1  Key Risks <span class="arrow-up"/><span class="arrow-down"/><span class="share-block"><img class="share-icon" src="../../share.png"/></span></h2>
                        <div class="h2-siblings" id="h2-7-siblings">
                          <p class="Body_Body-justify" lang="en-GB">Key risks arising from changing climate hazards are presented in Table CCP6.6 (details in SMCCP6.4). Changing levels and magnitude of climate hazards translate into different levels of risks for ecosystems, industry, society and infrastructure (Figure CCP6.4) (see <a class="reference-link" href="#Meredith--2019">Meredith et al., 2019</a>  Figures 3.5, 3.10 (Arctic), Figure 3.6 (Antarctic). In the Arctic, these risks are often also shaped by non-climatic factors (<a class="reference-link" href="#Huntington--2019">Huntington et al., 2019</a>; <a class="reference-link" href="#Ford--2021">Ford et al., 2021</a>), including ongoing colonial legacies, land dispossession, landscape fragmentation and resulting challenges in the valuing and meaningful use of IK and LK (Box CCP6.2) (<a class="reference-link" href="#Huntington--2019">Huntington et al., 2019</a>; <a class="reference-link" href="#Kelman--2019">Kelman and N&#230;ss, 2019</a>; <a class="reference-link" href="#Ford--2020">Ford et al., 2020</a>). Available literature enabled assessment of particular polar assets based on projected future risk and including consideration of non-climatic compounding factors under 1&#176;C, 2&#176;C, 3&#176;C and 4&#176;C global warming above pre-industrial level, including sea ice ecosystems, marine mammals, sea birds, fisheries, infrastructure (Arctic only), local mobility (Arctic only) and coastal erosion (Arctic only) (Figure CCP6.5) (details in SMCCP6.4).</p>

                            <p class="Body_Figures_Figure" lang="de-DE">
                              <img alt="" class="_idGenObjectAttribute-7" id="figure-ccp6-005" loading="lazy" src="https://ipcc.ch/report/ar6/wg2/downloads/figures/IPCC_AR6_WGII_Figure_CCP6_005.png"/>
                            </p>
                            <p class="Body_Figures_Figure_title" lang="en-US"><span class="figure_number" lang="">Figure CCP6.5  | </span><span class="bold_condensed-dark-blue" lang="">Burning ember of the relative risks to select assets in the polar regions as a function of global mean surface temperature increase since pre-industrial times including: (1) sea ice ecosystems, (2) marine mammals, (3) sea birds, (4) fisheries, (5) infrastructure (Arctic only), (6) local mobility (Arctic only) and (7) coastal erosion (Arctic only). </span>The supporting literature and methods are provided in SMCCP6.5</p>
                            <div class="ch-figure-button-cont"><a href="/report/ar6/wg2/figures/chapter-ccp6/figure-ccp6-005" target="_blank"><button class="btn-ipcc btn btn-primary ch-figure-button">Open figure</button></a> </div>
                          </div>
                          <div class="Figure" id="_idContainer029">
                            <p class="Body_Figures_Figure" lang="de-DE">
                              <img alt="" class="_idGenObjectAttribute-6" id="figure-ccp6-004" loading="lazy" src="https://ipcc.ch/report/ar6/wg2/downloads/figures/IPCC_AR6_WGII_Figure_CCP6_004.png"/>
                            </p>
                            <p class="Body_Figures_Figure_title" lang="en-US"><span class="figure_number" lang="">Figure CCP6.4  | </span><span class="bold_condensed-dark-blue" lang="">Rapid assessment for relative risk by sector (</span><span class="bold_condensed-dark-blue" lang=""><span class="light_condensed_italic" lang="">y</span></span><span class="bold_condensed-dark-blue" lang="">-axis) and climate hazard (</span><span class="bold_condensed-dark-blue" lang=""><span class="light_condensed_italic" lang="">x</span></span><span class="bold_condensed-dark-blue" lang="">-axis) for polar regions based on an assessment of asset-specific vulnerability and exposure across climate hazards (see SMCCP6</span><span class="bold_condensed-dark-blue" lang="">. </span><span class="bold_condensed-dark-blue" lang="">4 for methodological details). </span>For each unique combination, the hazard by sector risk was ranked as very high (very high risk and <span class="light_condensed_italic" lang="">high confidence</span>), high (significant impacts and risk, <span class="light_condensed_italic" lang="">high to medium confidence</span>), medium (impacts are detectable and attributable to climate change, <span class="light_condensed_italic" lang="">medium confidence</span>) or low/not detected/positive (risk is low or not detectable). Blank cells are those where the assessment was not applicable or not conducted. Risks identified through the rapid assessment were further evaluated in the chapter assessments (see corresponding sector text for full assessment of risk and impacts).</p>
                            <div class="ch-figure-button-cont"><a href="/report/ar6/wg2/figures/chapter-ccp6/figure-ccp6-004" target="_blank"><button class="btn-ipcc btn btn-primary ch-figure-button">Open figure</button></a> </div>
                          </div>
