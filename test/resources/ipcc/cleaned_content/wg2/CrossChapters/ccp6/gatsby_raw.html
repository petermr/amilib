                              <p class="Body_Body-justify" lang="en-GB">Climate change has transformed Arctic marine ecosystems from sea ice-associated to open-water production regimes, with profound impacts on trophic energy transfer efficiencies and pathways (<span class="condensed_italic" lang="">high confidence</span>) (<a class="reference-link" href="#Behrenfeld--2017">Behrenfeld et al., 2017</a>; <a class="reference-link" href="#Meredith--2019">Meredith et al., 2019</a>; <a class="reference-link" href="#Huntington--2020">Huntington et al., 2020</a>) as well as benthic&#8211;pelagic coupling (<span class="condensed_italic" lang="">medium confidence</span>) (<a class="reference-link" href="#Birchenough--2015">Birchenough et al., 2015</a>; <a class="reference-link" href="#Degen--2016">Degen et al., 2016</a>; <a class="reference-link" href="#Solan--2020">Solan et al., 2020</a>). Shifts in bloom phenology favour small phytoplankton and smaller zooplankton over large lipid-rich macro-zooplankton, leading to longer, less efficient food chains (<span class="condensed_italic" lang="">medium confidence</span>) (<a class="reference-link" href="#Aarflot--2018">Aarflot et al., 2018</a>; <a class="reference-link" href="#Feng--2018">Feng et al., 2018</a>; <a class="reference-link" href="#Kimmel--2018">Kimmel et al., 2018</a>; <a class="reference-link" href="#Weydmann--2018">Weydmann et al., 2018</a>; <a class="reference-link" href="#M&#248;ller--2020">M&#248;ller and Nielsen, 2020</a>). In the Beaufort Sea and Svalbard waters, earlier spring phytoplankton blooms have resulted in a mismatch in dynamics between microalgae and herbivorous copepods (<a class="reference-link" href="#Renaud--2018">Renaud et al., 2018</a>; <a class="reference-link" href="#Dezutter--2019">Dezutter et al., 2019</a>). In the Bering Sea, zooplankton declines following the particularly pronounced sea ice retreats in 2017 and 2018 were associated with reduced forage fish production (<a class="reference-link" href="#Duffy-Anderson--2019">Duffy-Anderson et al., 2019</a>) as well as multi-trophic mortality of ctenophore, fish, bird and mammal species, coupled with severe emaciation, reproductive failure, disease and high mortality rates of sea bird predators (<a class="section-link" data-title="Indigenous Peoples and Climate Change" href="/report/ar6/wg2/chapter/chapter-14#14.4">Section 14.4.4.2</a>) (<a class="reference-link" href="#Jones--2019">Jones et al., 2019</a>; <a class="reference-link" href="#Maekakuchi--2020">Maekakuchi et al., 2020</a>; <a class="reference-link" href="#Piatt--2020">Piatt et al., 2020</a>; <a class="reference-link" href="#Romano--2020">Romano et al., 2020</a>). Species range shifts have restructured higher trophic levels in Arctic food webs (<span class="condensed_italic" lang="">high confidence</span>) (Table CCP6.2; CCP6.2.3.3  Chapter 3) (<a class="reference-link" href="#Huntington--2020">Huntington et al., 2020</a>). In the northern Barents Sea, increased predation mortality for key species and incursions of boreal fish have induced entire ecosystem reorganisation (<a class="reference-link" href="#Degen--2016">Degen et al., 2016</a>; <a class="reference-link" href="#Pecuchet--2020a">Pecuchet et al., 2020a</a>; <a class="reference-link" href="#Pecuchet--2020b">Pecuchet et al., 2020b</a>). Regional taxonomic and functional diversity increased with immigration of boreal species, although the ongoing decline in Arctic species suggests high species turnover (Table CCP6.2) (<a class="reference-link" href="#Frainer--2017">Frainer et al., 2017</a>). Recent marine heatwaves induced rapid and profound food web changes unprecedented over the last four decades (<a class="reference-link" href="#Siddon--2020">Siddon et al., 2020</a>).</p>
                              <p class="Body_Body-justify" lang="en-GB">Climate impacts on Arctic marine food webs will be profound and intensify with GWL (<span class="condensed_italic" lang="">high confidence</span>), regardless of mitigation scenarios due to multi-decadal lags in sea ice extent and atmospheric carbon (WGI) (<a class="reference-link" href="#Jones--2020">Jones et al., 2020</a>). However, the exact nature of these impacts remains unclear due to attenuating and amplifying dynamics of both top-down and bottom-up processes in polar food webs and the management of fisheries (<span class="condensed_italic" lang="">high confidence</span>) (Chapter 3) (<a class="reference-link" href="#Cavicchioli--2019">Cavicchioli et al., 2019</a>; <a class="reference-link" href="#Meredith--2019">Meredith et al., 2019</a>). Projected sea ice loss is associated with a &gt;50% decline in the density of large zooplankton species by 2100 (relative to early 21st century levels) in the southern Bering Sea and a net increase in large zooplankton in the Northern Bering Sea in scenarios without carbon mitigation (Representative Concentration Pathway (RCP) 8.5), whereas these declines are roughly half the magnitude under moderate mitigation scenarios (RCP4.5) (<a class="reference-link" href="#Hermann--2019">Hermann et al., 2019</a>; <a class="reference-link" href="#Kearney--2020">Kearney et al., 2020</a>). Warming is expected to reduce the quantity and quality of lipid-rich copepod prey (<span class="condensed_italic" lang="">high confidence</span>) (<a class="reference-link" href="#Aarflot--2018">Aarflot et al., 2018</a>; <a class="reference-link" href="#Kimmel--2018">Kimmel et al., 2018</a>; <a class="reference-link" href="#Bouchard--2020">Bouchard and Fortier, 2020</a>; <a class="reference-link" href="#M&#248;ller--2020">M&#248;ller and Nielsen, 2020</a>; <a class="reference-link" href="#Mueter--2020">Mueter et al., 2020</a>), leading to declines in survival and growth of multiple upper-trophic level fish species; these impacts are amplified over time under low mitigation scenarios (RCP8.5) (<span class="condensed_italic" lang="">high confidence</span>) (CCP6.2.1.1) (<a class="reference-link" href="#Dahlke--2018">Dahlke et al., 2018</a>; <a class="reference-link" href="#Holsman--2020">Holsman et al., 2020</a>; <a class="reference-link" href="#Mueter--2020">Mueter et al., 2020</a>; <a class="reference-link" href="#Oke--2020">Oke et al., 2020</a>; <a class="reference-link" href="#Reum--2020">Reum et al., 2020</a>; <a class="reference-link" href="#Thorson--2020">Thorson et al., 2020</a>; <a class="reference-link" href="#Whitehouse--2021">Whitehouse et al., 2021</a>). Marine mammals and sea birds will continue to attenuate climate change impacts by shifting their diets and behaviour (<span class="condensed_italic" lang="">medium confidence</span>) (Table CCP6.2) (<a class="reference-link" href="#Hamilton--2017">Hamilton et al., 2017</a>; <a class="reference-link" href="#Lowther--2017">Lowther et al., 2017</a>; <a class="reference-link" href="#Lydersen--2017">Lydersen et al., 2017</a>; <a class="reference-link" href="#Vihtakari--2018">Vihtakari et al., 2018</a>; <a class="reference-link" href="#Boveng--2020">Boveng et al., 2020</a>). However, sea birds generally have low temperature-mediated plasticity of reproductive timing, making them vulnerable to mismatches with their prey and limiting long-term adaptation (<span class="condensed_italic" lang="">medium confidence</span>) (<a class="reference-link" href="#Keogan--2018">Keogan et al., 2018</a>; <a class="reference-link" href="#Kharouba--2020">Kharouba and Wolkovich, 2020</a>; <a class="reference-link" href="#Piatt--2020">Piatt et al., 2020</a>; <a class="reference-link" href="#Samplonius--2021">Samplonius et al., 2021</a>).</p>
                              <p class="Body_Body-justify" lang="en-GB">Many factors have contributed to changes in Antarctic food webs, including historical exploitation of fish and marine mammals as well as changes driven by the ozone hole and climate factors (<a class="reference-link" href="#Meredith--2019">Meredith et al., 2019</a>; <a class="reference-link" href="#Morley--2020">Morley et al., 2020</a>; <a class="reference-link" href="#Grant--2021">Grant et al., 2021</a>). Most documented changes resulting from warming and sea ice losses relate to shifts in ranges and dynamics of species, with most impacts occurring around the Antarctic Peninsula (CCP6.2.1.1; Table CCP6.2).</p>
                              <p class="Body_Body-justify" lang="en-GB">The projected general rise in primary production in Antarctic seas by 2100 (CCP6.2.1.2) suggests a concomitant increase in the abundance of higher trophic species, but changes in the structure and function of food webs will vary (<a class="reference-link" href="#McCormack--2021">McCormack et al., 2021</a>; McCormack, accepted) depending on regional differences in changing drivers (<a class="reference-link" href="#Morley--2020">Morley et al., 2020</a>; <a class="reference-link" href="#Cavanagh--2021">Cavanagh et al., 2021</a>; <a class="reference-link" href="#Grant--2021">Grant et al., 2021</a>). Primary production in open water habitats is expected to be supported by smaller phytoplankton species in the future (<a class="reference-link" href="#Henley--2020">Henley et al., 2020</a>), which could increase the relative importance of the copepod-mesopelagic fish pathway (McCormack, accepted), because krill prefer larger diatoms as food (<a class="reference-link" href="#Siegel--2016">Siegel, 2016</a>). The optimum habitat for Antarctic krill is expected to decline with a shortening of suitable season for krill growth and reproduction, particularly in the northern Scotia and Bellingshausen Seas (<span class="condensed_italic" lang="">medium confidence</span>) (<a class="reference-link" href="#Veytia--2020">Veytia et al., 2020</a>), although changes may be difficult to distinguish from natural variability until later in the century (<a class="reference-link" href="#Sylvester--2021">Sylvester et al., 2021</a>). More subtle and unpredictable changes may occur in the structure and relative importance of energy pathways in the food webs (<a class="reference-link" href="#Trebilco--2020">Trebilco et al., 2020</a>). Small mesopelagic fish are increasingly recognised for their importance as mid-trophic level species in the Southern Ocean, particularly in the sub-Antarctic zone (<a class="reference-link" href="#Caccavo--2021">Caccavo et al., 2021</a>) and Central Indian Sector (<a class="reference-link" href="#Subramaniam--2020">Subramaniam et al., 2020</a>; <a class="reference-link" href="#McCormack--2021">McCormack et al., 2021</a>). Although salps have long been considered to be competitors of Antarctic krill (<a class="reference-link" href="#Suprenand--2017">Suprenand and Ainsworth, 2017</a>; <a class="reference-link" href="#Rogers--2020">Rogers et al., 2020</a>), they provide a third energy pathway in pelagic food webs and, given the changing ocean conditions and their preference for smaller phytoplankton, may increase in importance for copepods (<span class="condensed_italic" lang="">low confidence</span>) (<a class="reference-link" href="#Plum--2020">Plum et al., 2020</a>; <a class="reference-link" href="#Trebilco--2020">Trebilco et al., 2020</a>; <a class="reference-link" href="#McCormack--2021">McCormack et al., 2021</a>; <a class="reference-link" href="#Pauli--2021">Pauli et al., 2021</a>; McCormack, accepted). Declining ice shelves, such as those off the Antarctic Peninsula, will open up new pelagic and benthic habitats (CCP6.2.1.1) with expected increases in productivity of benthic assemblages in the new areas (<a class="reference-link" href="#Barnes--2017">Barnes, 2017</a>; <a class="reference-link" href="#Morley--2020">Morley et al., 2020</a>; <a class="reference-link" href="#Brasier--2021">Brasier et al., 2021</a>; <a class="reference-link" href="#Gutt--2021">Gutt et al., 2021</a>).</p>
                            </div>
                          </div>
                        </div>
                      </div>
                      <div class="h2-container" id="CCP6.2.2">
                        <h2 class="Headings_H2-numbered" lang="de-DE">CCP6.2.2  Terrestrial and Freshwater Ecosystems <span class="arrow-up"/><span class="arrow-down"/><span class="share-block"><img class="share-icon" src="../../share.png"/></span></h2>
                        <div class="h2-siblings" id="h2-2-siblings">
                          <p class="Body_Body-justify" lang="en-GB">Since the publication of AR5 (<a class="reference-link" href="#IPCC--2014">IPCC, 2014</a>) and SROCC (<a class="reference-link" href="#IPCC--2019">IPCC, 2019</a>) and their findings (Table CCP6.2), more studies confirm rapid changes in Arctic terrestrial and freshwater systems including increased permafrost thaw, changes to tundra hydrology and vegetation (overall greening of the tundra, regional browning of tundra and boreal forests), coastal and riverbank erosion (<span class="condensed_italic" lang="">high confidence</span>) (<a class="reference-link" href="#Canadell--2021">Canadell et al., 2021</a>; <a class="reference-link" href="#Mustonen--2021">Mustonen and </a><a class="reference-link" href="#Shadrin--2021">Shadrin, 2021</a> ), reduced duration of snow cover and river and lake ice, increased rain-on-snow events, and reduced land-ice extent and thickness (<a class="reference-link" href="#Bieniek--2018">Bieniek et al., 2018</a>; <a class="reference-link" href="#Brown--2018">Brown et al., 2018</a>). Climate change continues to alter vegetation and attendant biodiversity, with divergent regional trends across the Arctic due to disparities in local conditions and changes in growing seasons (<a class="reference-link" href="#Zhu--2016">Zhu et al., 2016</a>; <a class="reference-link" href="#Taylor--2020">Taylor et al., 2020</a>). Warming facilitates woody vegetation growth in northeastern Siberia, western Alaska, and northern Quebec (<a class="reference-link" href="#Song--2018">Song et al., 2018</a>; <a class="reference-link" href="#Garc&#237;a Criado--2020">Garc&#237;a Criado et al., 2020</a>), as well as a northward expansion of shrub vegetation and sub-Arctic and boreal species (<a class="reference-link" href="#Davidson--2020">Davidson et al., 2020</a>).</p>
                          <p class="Body_Body-justify" lang="en-GB">Further evidence shows that warming and changes to the Arctic hydrologic cycle increase the risk of wildfire (<span class="condensed_italic" lang="">medium confidence</span>) (<a class="reference-link" href="#Mustonen--2021">Mustonen and </a><a class="reference-link" href="#Shadrin--2021">Shadrin, 2021</a> ). Both the frequency of and the area burned by wildfires during recent years are unprecedented compared with the last 10,000 years (<span class="condensed_italic" lang="">high confidence</span>) (<a class="reference-link" href="#Meredith--2019">Meredith et al., 2019</a>; <a class="reference-link" href="#Irannezhad--2020">Irannezhad et al., 2020</a>). Fire risk levels are projected to increase across most tundra and boreal regions, and interactions between climate and shifting vegetation (<a class="reference-link" href="#Song--2018">Song et al., 2018</a>) will influence future fire intensity and frequency (<span class="condensed_italic" lang="">medium confidence</span>) (<a class="reference-link" href="#Curtis--2018">Curtis et al., 2018</a>).</p>
                          <p class="Body_Body-justify" lang="en-GB">For all warming scenarios, declines in snow cover in the Arctic by 2050 (Table CCP6.1) may accelerate vascular plant, moss and lichen extinction rates (32% for Arctic&#8211;alpine and 12% for boreal species), especially after the tipping point of 20&#8211;30% decrease in snow cover duration is passed (<a class="reference-link" href="#Niittynen--2018">Niittynen et al., 2018</a>). Even though the overall regional water cycle will intensify, including increased precipitation, evapotranspiration and river discharge to the Arctic Ocean (Table CCP6.1), snow and permafrost decline may lead to further soil drying (<span class="condensed_italic" lang="">medium confidence</span>) (<a class="reference-link" href="#Meredith--2019">Meredith et al., 2019</a>). Glacial ice melt poses a risk to ecosystems and people through remobilisation of sequestered hazardous waste and transported pollutants (Table CCP6.3) (<a class="reference-link" href="#Wang--2019">Wang et al., 2019</a>).</p>
                          <p class="Body_Body-justify" lang="en-GB">In the Antarctic, there is further <span class="condensed_italic" lang="">high agreement </span> since the publication of SROCC that melt and ice-free areas are causing increases in the rates of colonisation and utilisation of coastal environments by terrestrial biota and land-based colonies of seals and birds (<a class="reference-link" href="#Gutt--2021">Gutt et al., 2021</a>), although colonisation rates remain variable (<a class="reference-link" href="#Ruiz-Fernandez--2017">Ruiz-Fernandez et al., 2017</a>; <a class="reference-link" href="#Bokhorst--2021">Bokhorst et al., 2021</a>). Soil temperatures along the Antarctic Peninsula are now sufficient for germination of non-native plants; invasions by non-endemic species are expected to increase with rising temperatures (<span class="condensed_italic" lang="">high confidence</span>) (<a class="reference-link" href="#Bokhorst--2021">Bokhorst et al., 2021</a>), posing a risk to endemic polar species (<span class="condensed_italic" lang="">medium confidence</span>) (<a class="reference-link" href="#Chown--2019">Chown and Brooks, 2019</a>; <a class="reference-link" href="#Gutt--2021">Gutt et al., 2021</a>).</p>
                          <p class="Body_Body-justify" lang="en-GB">Vegetation responses to warming are contingent on water availability and local temperature (<span class="condensed_italic" lang="">medium confidence</span>) (<a class="reference-link" href="#Guglielmin--2014">Guglielmin et al., 2014</a>; <a class="reference-link" href="#Royles--2015">Royles and Griffiths, 2015</a>; <a class="reference-link" href="#Amesbury--2017">Amesbury et al., 2017</a>; <a class="reference-link" href="#Cannone--2017">Cannone et al., 2017</a>; <a class="reference-link" href="#Charman--2018">Charman et al., 2018</a>; <a class="reference-link" href="#Robinson--2018">Robinson et al., 2018</a>; <a class="reference-link" href="#Stelling--2018">Stelling et al., 2018</a>), which vary greatly around Antarctica (Figure CCP6.1) (<a class="reference-link" href="#Turner--2020a">Turner et al., 2020a</a>). Antarctic terrestrial ecosystem responses to changes in water availability are not homogeneous (<a class="reference-link" href="#Ball--2015">Ball and Levy, 2015</a>; <a class="reference-link" href="#Sadowsky--2016">Sadowsky et al., 2016</a>; <a class="reference-link" href="#Fuentes-Lillo--2017">Fuentes-Lillo et al., 2017</a>; <a class="reference-link" href="#Gooseff--2017">Gooseff et al., 2017</a>; <a class="reference-link" href="#Schroeter--2017">Schroeter et al., 2017</a>; <a class="reference-link" href="#Lee--2018">Lee et al., 2018</a>). West Antarctica is showing evidence of greening in the dominant cryptogrammic vegetation, with greater growth in mosses (<span class="condensed_italic" lang="">high confidence</span>) (<a class="reference-link" href="#Casanova-Katny--2016">Casanova-Katny et al., 2016</a>; <a class="reference-link" href="#Amesbury--2017">Amesbury et al., 2017</a>; <a class="reference-link" href="#Shortlidge--2017">Shortlidge et al., 2017</a>; <a class="reference-link" href="#Charman--2018">Charman et al., 2018</a>; <a class="reference-link" href="#Prather--2019">Prather et al., 2019</a>). Peatland ecosystems may increase on the west Antarctic Peninsula with future warming (<span class="condensed_italic" lang="">low confidence</span>) (<a class="reference-link" href="#Yu--2016">Yu et al., 2016</a>; <a class="reference-link" href="#Loisel--2017">Loisel et al., 2017</a>). In contrast, some parts of East Antarctica and the subantarctic islands to the north have been experiencing a drying climate, with declining health of mosses and other vegetation (<span class="condensed_italic" lang="">high confidence</span>) (<a class="reference-link" href="#Bergstrom--2015">Bergstrom et al., 2015</a>; <a class="reference-link" href="#Bramley-Alves--2015">Bramley-Alves et al., 2015</a>; <a class="reference-link" href="#Robinson--2018">Robinson et al., 2018</a>; <a class="reference-link" href="#Bergstrom--2021">Bergstrom et al., 2021</a>).</p>
                          <p class="Body_Body-justify" lang="en-GB">Antarctica encountered its first reported heatwave in 2020 (Table CCP6.1). Such abrupt heating can cause wide-ranging effects on biota, from flash-flooding damage and dislodgement of plants to excess melt waters supplying moisture to arid Antarctic ecosystems. This suggests that increased melt may reverse the drying trend if plant communities remain connected to melt streams and there is sufficient precipitation (<span class="condensed_italic" lang="">high agreement, limited evidence</span>) (<a class="reference-link" href="#Bergstrom--2021">Bergstrom et al., 2021</a>).</p>
                          <p class="Body_Body-justify" lang="en-GB">Warming of the Antarctic Peninsula has resulted in increased soil microbial abundance and biomass. However, this trend is not as great in southern colder locations (<span class="condensed_italic" lang="">medium confidence</span>) (e.g., <a class="reference-link" href="#Kim--2018">Kim et al., 2018</a>; <a class="reference-link" href="#Newsham--2019">Newsham et al., 2019</a>), as the microbial community structure is affected by vegetation cover and water availability (<span class="condensed_italic" lang="">high confidence</span>) (<a class="reference-link" href="#Dennis--2019">Dennis et al., 2019</a>; <a class="reference-link" href="#Newsham--2019">Newsham et al., 2019</a>).</p>
                          <p class="Body_Body-justify" lang="en-GB">Antarctic terrestrial invertebrate communities on the West Antarctic Peninsula may be controlled more by vegetation and water availability than by air temperature (<span class="condensed_italic" lang="">medium confidence</span>) (<a class="reference-link" href="#Bokhorst--2016">Bokhorst and Convey, 2016</a>; <a class="reference-link" href="#Knox--2016">Knox et al., 2016</a>; <a class="reference-link" href="#Andriuzzi--2018">Andriuzzi et al., 2018</a>; <a class="reference-link" href="#Prather--2019">Prather et al., 2019</a>; <a class="reference-link" href="#Newsham--2020">Newsham et al., 2020</a>). Evidence from laboratory studies, field programmes and sedimentary records indicate that Antarctic freshwater ecosystems may become more productive under climate warming scenarios (<span class="condensed_italic" lang="">medium confidence</span>) (e.g., <a class="reference-link" href="#Schiaffino--2011">Schiaffino et al., 2011</a>; <a class="reference-link" href="#Borghini--2016">Borghini et al., 2016</a>; <a class="reference-link" href="#P&#237;&#353;kov&#225;--2019">P&#237;&#353;kov&#225; et al., 2019</a>; <a class="reference-link" href="#&#268;ejka--2020">&#268;ejka et al., 2020</a>).</p>
                        </div>
                      </div>
                      <div class="h2-container" id="CCP6.2.3">
                        <h2 class="Headings_H2-numbered" lang="de-DE">CCP6.2.3  Food, Fibre and Other Ecosystem Products <span class="arrow-up"/><span class="arrow-down"/><span class="share-block"><img class="share-icon" src="../../share.png"/></span></h2>
                        <div class="h2-siblings" id="h2-3-siblings">
                          <p class="Body_Body-justify" lang="en-GB">Food and fibre production underpins regional identities, cultures and communities of practice and place in polar regions, are vital to local and distant economies (Table CCP6.4) and represent for fisheries a critical source of global nutrition and food security (<a class="reference-link" href="#Hicks--2019">Hicks et al., 2019</a>). Since SROCC, there is further evidence that climate change alterations of polar ecosystems increasingly challenge production of, and access to, sufficient, healthy and nutritious food, posing risks to future food and nutritional security within and beyond polar regions (<span class="condensed_italic" lang="">high confidence</span>).</p>
                          <p class="Body_Tables_Table_title" lang="en-US"><span class="table_number" lang="">Table CCP6.4  | </span>Climate change impacts on Arctic and Antarctic fisheries and fishing communities. Additional detail in Table SMCCP6.3.</p>
                          <table class="Table" id="table004">
                            <colgroup>
                              <col class="_idGenTableRowColumn-17"/>
                              <col class="_idGenTableRowColumn-27"/>
                              <col class="_idGenTableRowColumn-28"/>
                            </colgroup>
                            <thead>
                              <tr class="Table _idGenTableRowColumn-4">
                                <td class="Table Head-blue Head-blue">
                                  <p class="Body_Tables_Table_header-black" lang="en-US">
                                    <span class="bold_condensed" lang="en-GB">Driver</span>
                                  </p>
                                </td>
                                <td class="Table Head-blue Head-blue">
                                  <p class="Body_Tables_Table_header-black" lang="en-US">
                                    <span class="bold_condensed" lang="en-GB">Observed impacts and projected risks</span>
                                  </p>
                                </td>
                                <td class="Table Head-blue Head-blue">
                                  <p class="Body_Tables_Table_header-black" lang="en-US">
                                    <span class="bold_condensed" lang="en-GB">References</span>
                                  </p>
                                </td>
                              </tr>
                            </thead>
                            <tbody>
                              <tr class="Table _idGenTableRowColumn-12">
                                <td class="Table Body Body" colspan="2">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">
                                    <span class="condensed_italic" lang="">Current and past climate change impacts</span>
                                  </p>
                                </td>
                                <td class="Table Body Body"/>
                              </tr>
                              <tr class="Table _idGenTableRowColumn-8">
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Warming</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Fisheries productivity declined in multiple stocks across the Arctic including the Eastern Bering Sea (EBS), while Atlantic cod and other fisheries have increased.</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">(<a class="reference-link" href="#Free--2019">Free et al., 2019</a>; <a class="reference-link" href="#Cheung--2020">Cheung and Fr&#246;licher, 2020</a>)</p>
                                </td>
                              </tr>
                              <tr class="Table _idGenTableRowColumn-24">
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Extreme heat</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Commercially important fish species declined rapidly during recent MHWs (2016&#8211;2019), in the EBS due to reduced recruitment, increased metabolic demand and increased predation mortality, and it is probable that climate impacts have contributed to the closure of Pribilof islands blue king crab (<span class="condensed_italic" lang="">Paralithodes platypus</span>) fisheries.</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">(<a class="reference-link" href="#Zheng--2018">Zheng and Ianelli, 2018</a>; <a class="reference-link" href="#Duffy-Anderson--2019">Duffy-Anderson et al., 2019</a>; <a class="reference-link" href="#Stabeno--2019">Stabeno et al., 2019</a>; <a class="reference-link" href="#Basyuk--2020">Basyuk and Zuenko, 2020</a>; <a class="reference-link" href="#Reum--2020">Reum et al., 2020</a>; <a class="reference-link" href="#Thorson--2020">Thorson et al., 2020</a>)</p>
                                </td>
                              </tr>
                              <tr class="Table _idGenTableRowColumn-13">
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Temperature; shifting species distributions</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">In the Barents Sea, northward redistribution of stocks led fisheries into previously unfished habitats, exposing benthic ecosystems to novel trawling impacts. Large-scale redistributions of Pacific cod (&gt;1000 km per decade) and other groundfish species have challenged fisheries management in the EBS; ~50% of the biomass is now located in the Northern Bering Sea (NBS), outside of historical survey areas and in a region where bottom trawling is prohibited (although pelagic gear is permitted).</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">(<a class="reference-link" href="#Christiansen--2014">Christiansen et al., 2014</a>; <a class="reference-link" href="#J&#248;rgensen--2019">J&#248;rgensen et al., 2019</a>; <a class="reference-link" href="#Spies--2019">Spies et al., 2019</a>; <a class="reference-link" href="#Stevenson--2019">Stevenson and Lauth, 2019</a>)</p>
                                </td>
                              </tr>
                              <tr class="Table _idGenTableRowColumn-9">
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">OA, warming, winds</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Shellfish species such as snow crab are undergoing range contractions poleward in the Barents Sea and NBS, with increased catches in the north and declines in the south.</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">(<a class="reference-link" href="#J&#248;rgensen--2019">J&#248;rgensen et al., 2019</a>; <a class="reference-link" href="#Fedewa--2020">Fedewa et al., 2020</a>) (Cross-Chapter Box MOVING PLATE in Chapter 5)</p>
                                </td>
                              </tr>
                              <tr class="Table _idGenTableRowColumn-10">
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Warming; poleward expansion</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Poleward expansion of Pacific salmon into Arctic watersheds and Greenland fjords presents both new opportunities and novel threats to key subsistence and commercial species such as Arctic char and Atlantic salmon.</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">(<a class="reference-link" href="#Bilous--2020">Bilous and Dunmall, 2020</a>; <a class="reference-link" href="#Nielsen--2020">Nielsen et al., 2020</a>)</p>
                                </td>
                              </tr>
                              <tr class="Table _idGenTableRowColumn-11">
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Warming; harmful algal blooms (HABs)</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Altered seasonal freshwater habitats are impacting salmon productivity and phenology of important salmon resources in Alaska and in the Fennoscandian North, with subsequent community-specific impacts on commercial and subsistence resources.</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">(<a class="reference-link" href="#Brattland--2018">Brattland and Mustonen, 2018</a>; <a class="reference-link" href="#Cline--2019">Cline et al., 2019</a>; <a class="reference-link" href="#Mustonen--2020">Mustonen and Feodoroff, 2020</a>; <a class="reference-link" href="#Mustonen--2021">Mustonen and </a><a class="reference-link" href="#Shadrin--2021">Shadrin, 2021</a> )</p>
                                </td>
                              </tr>
                              <tr class="Table _idGenTableRowColumn-8">
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Multiple; sea ice</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Losses of winter sea ice to the north and west of the Antarctic Peninsula have enabled krill fishing vessels to fish all year round in that area.</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">(<a class="reference-link" href="#Meredith--2019">Meredith et al., 2019</a>)</p>
                                </td>
                              </tr>
                              <tr class="Table _idGenTableRowColumn-12">
                                <td class="Table Body Body" colspan="2">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">
                                    <span class="condensed_italic" lang="">Future climate change impacts and risks</span>
                                  </p>
                                </td>
                                <td class="Table Body Body"/>
                              </tr>
                              <tr class="Table _idGenTableRowColumn-25">
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Multiple</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Climate change impacts on the ecology and physiology of polar cod species contribute to expected increases in biomass and catch potential under high to moderate mitigation (RCP2.6 and RCP4.5) and reductions in groundfish recruitment and yield under low mitigation (RCP8.5) scenarios (CCP6.2.2) across a range of multispecies models.</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">(<a class="reference-link" href="#Laurel--2016">Laurel et al., 2016</a>; <a class="reference-link" href="#Spencer--2016">Spencer et al., 2016</a>; <a class="reference-link" href="#Lotze--2018">Lotze et al., 2018</a>; <a class="reference-link" href="#Spencer--2019">Spencer et al., 2019</a>; <a class="reference-link" href="#Dahlke--2020">Dahlke et al., 2020</a>; <a class="reference-link" href="#Gr&#252;ss--2020">Gr&#252;ss et al., 2020</a>; <a class="reference-link" href="#Hollowed--2020">Hollowed et al., 2020</a>; <a class="reference-link" href="#Reum--2020">Reum et al., 2020</a>; <a class="reference-link" href="#Thorson--2020">Thorson et al., 2020</a>)</p>
                                </td>
                              </tr>
                              <tr class="Table _idGenTableRowColumn-9">
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Climate &#215; management interaction</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Assuming no climate adaptation in current EBM, 50% declines (relative to projections under persistent current climate conditions) in EBS pollock and cod yield is <span class="condensed_italic" lang="">likely </span> under moderate carbon mitigation scenarios (RCP4.5), and <span class="condensed_italic" lang="">very likely </span> under low mitigation scenarios (RCP8.5).</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">(<a class="reference-link" href="#Holsman--2020">Holsman et al., 2020</a>; <a class="reference-link" href="#Reum--2020">Reum et al., 2020</a>; <a class="reference-link" href="#Whitehouse--2021">Whitehouse et al., 2021</a>)</p>
                                </td>
                              </tr>
                              <tr class="Table _idGenTableRowColumn-13">
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Warming; ocean acidification (OA)</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Warming, OA, fish predators and thermal tolerance differentiate impacts across crab species in the Arctic; increased productivity and redistribution offshore is expected for tanner crab; red king crab and snow crab are projected to continue to shift north and decrease in productivity. OA is expected to impact demographics, altering harvest recommendations and biological reference points for some species of some shellfish and flatfish (e.g., red king crab, Northern rock sole) in projection simulations.</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">(<a class="reference-link" href="#Punt--2014">Punt et al., 2014</a>; <a class="reference-link" href="#Sawatzky--2020">Sawatzky et al., 2020</a>; <a class="reference-link" href="#Punt--2021">Punt et al., 2021</a>)</p>
                                </td>
                              </tr>
                              <tr class="Table _idGenTableRowColumn-7">
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Climate &#215; management interaction</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Multiple rights-based fisheries operate in the Arctic, increasing investment in long-term sustainability but reducing harvest portfolio diversity and increasing vulnerability to climate shocks.</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">(<a class="reference-link" href="#Kasperski--2013">Kasperski and Holland, 2013</a>; <a class="reference-link" href="#Ojea--2017">Ojea et al., 2017</a>)</p>
                                </td>
                              </tr>
                              <tr class="Table _idGenTableRowColumn-14">
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Multiple; sea ice</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Physical and biological changes in Antarctic waters are expected to result in net declines in krill habitat and growth potential, although one study indicates a potential increase. Reduction in the Antarctic ice pack is as <span class="condensed_italic" lang="">likely  as not </span> to increase total season length in areas near to land-based predators.</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">(<a class="reference-link" href="#Melbourne-Thomas--2016">Melbourne-Thomas et al., 2016</a>; <a class="reference-link" href="#Pi&#241;ones--2016">Pi&#241;ones and Fedorov, 2016</a>; <a class="reference-link" href="#Klein--2018">Klein et al., 2018</a>; <a class="reference-link" href="#Rogers--2020">Rogers et al., 2020</a>; <a class="reference-link" href="#Veytia--2020">Veytia et al., 2020</a>)</p>
                                </td>
                              </tr>
                              <tr class="Table _idGenTableRowColumn-9">
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Phytoplankton and temperature</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Projected changes in primary production and temperature are expected to cause declines in krill growth and availability to predators; impacts may be countered by reducing fisheries, signifying a potential conflict between fisheries and top predators.</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">(<a class="reference-link" href="#Pi&#241;ones--2016">Pi&#241;ones and Fedorov, 2016</a>; <a class="reference-link" href="#Klein--2018">Klein et al., 2018</a>)</p>
                                </td>
                              </tr>
                            </tbody>
                          </table>
                          <div class="h3-container" id="CCP6.2.3.1">
                            <h3 class="Headings_H3" lang="de-DE">CCP6.2.3.1  Arctic subsistence resources <span class="arrow-up"/><span class="arrow-down"/><span class="share-block"><img class="share-icon" src="../../share.png"/></span></h3>
                            <div class="h3-siblings" id="h3-5-siblings">
                              <p class="Body_Body-justify" lang="en-GB">Subsistence harvest of fish, sea birds and marine mammals is the basis for economic, cultural and spiritual connections with Arctic marine systems (Box CCP6.2)(<a class="reference-link" href="#Fall--2013">Fall et al., 2013</a>; <a class="reference-link" href="#Haynie--2016">Haynie and Huntington, 2016</a>; <a class="reference-link" href="#Raymond-Yakoubian--2017">Raymond-Yakoubian et al., 2017</a>; <a class="reference-link" href="#Slats--2019">Slats et al., 2019</a>), and nature-based livelihoods (e.g., caribou and reindeer (<span class="condensed_italic" lang="">Rangifer tarandus</span>) herding, fishing, hunting, trapping, small-scale forestry) are fundamental to Indigenous Peoples across the Arctic as they have been for millennia (<a class="reference-link" href="#Koivurova--2015">Koivurova et al., 2015</a>; <a class="reference-link" href="#Betts--2016">Betts, 2016</a>; <a class="reference-link" href="#Gavin--2018">Gavin et al., 2018</a>; <a class="reference-link" href="#Raheem--2018">Raheem, 2018</a>; <a class="reference-link" href="#Mustonen--2021">Mustonen and </a><a class="reference-link" href="#Shadrin--2021">Shadrin, 2021</a> ). Climate change has impacted Indigenous subsistence resources across the Arctic (<span class="condensed_italic" lang="">very high confidence</span>) (SMCCP6.2), and future food systems and ecological connections are at risk from future climate change hazards interacting with non-climate pressures, some of which are mediated or amplified by novel conditions and opportunities in Arctic regions (<span class="condensed_italic" lang="">high confidence</span>) (<a class="reference-link" href="#Moerlein--2012">Moerlein and Carothers, 2012</a>; <a class="reference-link" href="#Fall--2013">Fall et al., 2013</a>; <a class="reference-link" href="#Raymond-Yakoubian--2017">Raymond-Yakoubian et al., 2017</a>; <a class="reference-link" href="#Meredith--2019">Meredith et al., 2019</a>; <a class="reference-link" href="#Slats--2019">Slats et al., 2019</a>; <a class="reference-link" href="#Huntington--2020">Huntington et al., 2020</a>; <a class="reference-link" href="#Huntington--2021">Huntington et al., 2021</a>). Increasing heatwaves, wildfires, extreme precipitation, permafrost loss and rapid seasonal snow and ice thaw events will further threaten terrestrial subsistence food resources across the Arctic (<span class="condensed_italic" lang="">high confidence</span>) (Table CCP6.3). Although climate impacts and non-climate factors systematically undermine access to and productivity of subsistence resources, resilience is inherently high for Indigenous Peoples, illustrating critical elements underpinning successful adaptation to climate change (Box CCP6.2) (<a class="reference-link" href="#Huntington--2021">Huntington et al., 2021</a>).</p>
                              <p class="Body_Tables_Table_title" lang="en-US"><span class="table_number" lang="">Table CCP6.3  | </span>Illustrative examples of climate change impacts on subsistence resources in the Arctic.</p>
                              <table class="Table" id="table003">
                                <colgroup>
                                  <col class="_idGenTableRowColumn-21"/>
                                  <col class="_idGenTableRowColumn-22"/>
                                  <col class="_idGenTableRowColumn-23"/>
                                </colgroup>
                                <thead>
                                  <tr class="Table _idGenTableRowColumn-19">
                                    <td class="Table Head-blue Head-blue">
                                      <p class="Body_Tables_Table_header-black" lang="en-US">
                                        <span class="bold_condensed" lang="en-GB">Changing</span>
                                      </p>
                                      <p class="Body_Tables_Table_header-black" lang="en-US">
                                        <span class="bold_condensed" lang="en-GB">drivers</span>
                                      </p>
                                    </td>
                                    <td class="Table Head-blue Head-blue">
                                      <p class="Body_Tables_Table_header-black" lang="en-US">
                                        <span class="bold_condensed" lang="en-GB">Observed impacts and projected risks</span>
                                      </p>
                                    </td>
                                    <td class="Table Head-blue Head-blue">
                                      <p class="Body_Tables_Table_header-black" lang="en-US">
                                        <span class="bold_condensed" lang="en-GB">References</span>
                                      </p>
                                    </td>
                                  </tr>
                                </thead>
                                <tbody>
                                  <tr class="Table _idGenTableRowColumn-7">
                                    <td class="Table Body">
                                      <p class="Body_Tables_Table_body-black-left" lang="en-US">Snow, ice, river environments</p>
                                    </td>
                                    <td class="Table Body">
                                      <p class="Body_Tables_Table_body-black-left" lang="en-US">Climate change is disrupting subsistence harvests for Indigenous Peoples in Arctic communities that depend on snow, ice and river environments for travel and access to subsistence resources.</p>
                                    </td>
                                    <td class="Table Body">
                                      <p class="Body_Tables_Table_body-black-left" lang="en-US">(<a class="reference-link" href="#Wildcat--2013">Wildcat, 2013</a>; <a class="reference-link" href="#Meredith--2019">Meredith et al., 2019</a>; <a class="reference-link" href="#Slats--2019">Slats et al., 2019</a>)</p>
                                    </td>
                                  </tr>
                                  <tr class="Table _idGenTableRowColumn-10">
                                    <td class="Table Body">
                                      <p class="Body_Tables_Table_body-black-left" lang="en-US">Multiple</p>
                                    </td>
                                    <td class="Table Body">
                                      <p class="Body_Tables_Table_body-black-left" lang="en-US">Across the Canadian Arctic, multiple populations of reindeer and caribou are in decline, with 95% of assessed herds listed as rare, decreasing or &#8216;threatened&#8217;; reindeer and caribou abundances in the Alaska&#8211;Canada region have declined 56% over the past 20 years.</p>
                                    </td>
                                    <td class="Table Body">
                                      <p class="Body_Tables_Table_body-black-left" lang="en-US">(<a class="reference-link" href="#Russell--2018">Russell et al., 2018</a>)</p>
                                    </td>
                                  </tr>
                                  <tr class="Table _idGenTableRowColumn-24">
                                    <td class="Table Body">
                                      <p class="Body_Tables_Table_body-black-left" lang="en-US">Multiple</p>
                                    </td>
                                    <td class="Table Body">
                                      <p class="Body_Tables_Table_body-black-left" lang="en-US">Reindeer herding is an important economic and Indigenous cultural activity in the Eurasian Arctic and is being affected by non-climate and climate events, including changes to thaw cycles, drought and unpredictable summer weather, which threaten pasture areas in Siberia. Although changes in vegetation and the freeze&#8211;thaw cycle are impacting Sami reindeer herding, adaptive measures by herders have been effective at offsetting multiple climate and non-climate impacts.</p>
                                    </td>
                                    <td class="Table Body">
                                      <p class="Body_Tables_Table_body-black-left" lang="en-US">(<a class="reference-link" href="#Furberg--2011">Furberg et al., 2011</a>; <a class="reference-link" href="#Uboni--2020">Uboni et al., 2020</a>; <a class="reference-link" href="#Mustonen--2021">Mustonen and </a><a class="reference-link" href="#Shadrin--2021">Shadrin, 2021</a> )</p>
                                    </td>
                                  </tr>
                                  <tr class="Table _idGenTableRowColumn-25">
                                    <td class="Table Body">
                                      <p class="Body_Tables_Table_body-black-left" lang="en-US">Sea ice; winds; visibility</p>
                                    </td>
                                    <td class="Table Body">
                                      <p class="Body_Tables_Table_body-black-left" lang="en-US">Loss of multi-year &#8216;mother ice&#8217;, declines in seasonal sea ice thickness and stability, and changes in winds and visibility have impacted the availability of, and access to, subsistence resources (<span class="condensed_italic" lang="">high confidence</span>) and have increased interactions between coastal communities and shipping, tourism and commercial fisheries, which directly impact human safety and well-being in Arctic communities (<span class="condensed_italic" lang="">high confidence</span>).</p>
                                    </td>
                                    <td class="Table Body">
                                      <p class="Body_Tables_Table_body-black-left" lang="en-US">(<a class="reference-link" href="#Stephenson--2015">Stephenson and Smith, 2015</a>; <a class="reference-link" href="#Brinkman--2016">Brinkman et al., 2016</a>; <a class="reference-link" href="#Melia--2016">Melia et al., 2016</a>; <a class="reference-link" href="#Raymond-Yakoubian--2017">Raymond-Yakoubian et al., 2017</a>; <a class="reference-link" href="#Ford--2019">Ford et al., 2019</a>; <a class="reference-link" href="#Slats--2019">Slats et al., 2019</a>; <a class="reference-link" href="#Huntington--2020">Huntington et al., 2020</a>; <a class="reference-link" href="#Huntington--2021">Huntington et al., 2021</a>)</p>
                                    </td>
                                  </tr>
                                  <tr class="Table _idGenTableRowColumn-7">
                                    <td class="Table Body">
                                      <p class="Body_Tables_Table_body-black-left" lang="en-US">Multiple</p>
                                    </td>
                                    <td class="Table Body">
                                      <p class="Body_Tables_Table_body-black-left" lang="en-US">Marine heatwave (MHW)-induced ecosystem changes contributed to widespread mortality events and declines in Northern Bering Sea sea birds and disrupted subsistence harvests in western Alaska.</p>
                                    </td>
                                    <td class="Table Body">
                                      <p class="Body_Tables_Table_body-black-left" lang="en-US">(<a class="reference-link" href="#Jones--2019">Jones et al., 2019</a>; <a class="reference-link" href="#Piatt--2020">Piatt et al., 2020</a>; <a class="reference-link" href="#Siddon--2020">Siddon et al., 2020</a>)</p>
                                    </td>
                                  </tr>
                                  <tr class="Table _idGenTableRowColumn-26">
                                    <td class="Table Body">
                                      <p class="Body_Tables_Table_body-black-left" lang="en-US">Storminess; sea ice; whale migration timing; shipping</p>
                                    </td>
                                    <td class="Table Body">
                                      <p class="Body_Tables_Table_body-black-left" lang="en-US">Although some communities have seen reduced whale harvests due to climate impacts on survival and productivity, changes in storminess and whale migration timing have lengthened the July harvest season for Inuvialuit from Inuvik, Aklavik and Tuktoyaktuk. Changes in Beluga migration routes have increased accessibility to communities of Ulukhaktok and Paulatuk. In Western Greenland, loss of sea ice has both reduced access to sealing and increased subsistence and commercial harvest of Atlantic cod, halibut and other fish species. Increased impacts of noise and ship strikes associated with shipping are expected to impact subsistence species, especially seals and whales in Lancaster sound as well as the Pacific Arctic.</p>
                                    </td>
                                    <td class="Table Body">
                                      <p class="Body_Tables_Table_body-black-left" lang="en-US">(<a class="reference-link" href="#George--2017">George et al., 2017</a>; <a class="reference-link" href="#Hauser--2018">Hauser et al., 2018</a>; <a class="reference-link" href="#Loseto--2018">Loseto et al., 2018</a>; <a class="reference-link" href="#Mustonen--2018a">Mustonen et al., 2018a</a>)</p>
                                    </td>
                                  </tr>
                                  <tr class="Table _idGenTableRowColumn-7">
                                    <td class="Table Body">
                                      <p class="Body_Tables_Table_body-black-left" lang="en-US">Sea ice</p>
                                    </td>
                                    <td class="Table Body">
                                      <p class="Body_Tables_Table_body-black-left" lang="en-US">Changes in sea ice will continue to undermine subsistence resources and disrupt access by smaller scale commercial and subsistence-based ice-edge fishing.</p>
                                    </td>
                                    <td class="Table Body">
                                      <p class="Body_Tables_Table_body-black-left" lang="en-US">(<a class="reference-link" href="#Jacobsen--2018">Jacobsen et al., 2018</a>; <a class="reference-link" href="#Ford--2019">Ford et al., 2019</a>)</p>
                                    </td>
                                  </tr>
                                  <tr class="Table _idGenTableRowColumn-13">
                                    <td class="Table Body">
                                      <p class="Body_Tables_Table_body-black-left" lang="en-US">Shifting distributions; food web changes</p>
                                    </td>
                                    <td class="Table Body">
                                      <p class="Body_Tables_Table_body-black-left" lang="en-US">Shifting species distributions and climate change mediated food web reorganisation pose a risk to near-shore subsistence harvests that are essential to sustaining Indigenous Peoples in Western Greenland and the Northern Bering, Beaufort and Chukchi Seas; for example, cod biomass in the Inuvialuit region is projected to decrease 17% by 2100 (RCP8.5). Climate-related declines in harvester access drive projected declines in subsistence availability in Alaska.</p>
                                    </td>
                                    <td class="Table Body">
                                      <p class="Body_Tables_Table_body-black-left" lang="en-US">(<a class="reference-link" href="#Moerlein--2012">Moerlein and Carothers, 2012</a>; <a class="reference-link" href="#Fall--2013">Fall et al., 2013</a>; <a class="reference-link" href="#Brinkman--2016">Brinkman et al., 2016</a>; <a class="reference-link" href="#Loseto--2018">Loseto et al., 2018</a>; <a class="reference-link" href="#Steiner--2019">Steiner et al., 2019</a>; <a class="reference-link" href="#Marsh--2020">Marsh and Mueter, 2020</a>; <a class="reference-link" href="#Ribeiro--2021">Ribeiro et al., 2021</a>)</p>
                                    </td>
                                  </tr>
                                </tbody>
                              </table>
                            </div>
                          </div>
                          <div class="h3-container" id="CCP6.2.3.2">
                            <h3 class="Headings_H3" lang="de-DE">CCP6.2.3.2  Agriculture, forestry, livestock and aquaculture <span class="arrow-up"/><span class="arrow-down"/><span class="share-block"><img class="share-icon" src="../../share.png"/></span></h3>
                            <div class="h3-siblings" id="h3-6-siblings">
                              <p class="Body_Body-justify" lang="en-GB">In addition to reindeer herding, Arctic agriculture primarily consists of local production of cool season crops, forage, small grains and livestock (sheep and goats) (<a class="reference-link" href="#Westergaard-Nielsen--2015">Westergaard-Nielsen et al., 2015</a>; <a class="reference-link" href="#Natcher--2019">Natcher et al., 2019</a>). Short growing seasons, cold conditions, permafrost and moisture stress, especially along coasts, have historically limited production, but agriculture is generally increasing across the region (<a class="reference-link" href="#Westergaard-Nielsen--2015">Westergaard-Nielsen et al., 2015</a>). Although only ~0.2% of Alaska is farmland, area farmed and income from agriculture have increased 2% and 80%, respectively, since 2012 (<a class="reference-link" href="#United States Department of Agriculture--2017">United States Department of Agriculture, 2017</a>). It is <span class="condensed_italic" lang="">likely </span> that growing seasons have extended by 1&#8211;3 days per decade in interior Alaska, although some coastal areas exhibit declines in growing season (<a class="reference-link" href="#Lader--2018">Lader et al., 2018</a>).</p>
                              <p class="Body_Body-justify" lang="en-GB">Arctic temperatures rarely exceed thermal tolerances for crops (e.g., 35&#8211;38&#176;C across corn, rice and grain), and warming will provide new opportunities for food and forage production in areas such as southwest Greenland and interior Alaska (<a class="reference-link" href="#Westergaard-Nielsen--2015">Westergaard-Nielsen et al., 2015</a>; <a class="reference-link" href="#Tripathi--2016">Tripathi et al., 2016</a>; <a class="reference-link" href="#Lader--2018">Lader et al., 2018</a>). Higher atmospheric CO<span class="subscript _idGenCharOverride-1" lang="">2</span> favours plant growth if soil quality and condition are sufficient, but benefits can be offset by increased heat and water stress associated with climate change (<a class="reference-link" href="#Tripathi--2016">Tripathi et al., 2016</a>; <a class="reference-link" href="#Unc--2021">Unc et al., 2021</a>). Growing seasons in Alaska will lengthen by 48&#8211;87 d yr <span class="superscript _idGenCharOverride-1" lang="">-1</span> relative to historical growing season length (1981&#8211;2010), and the start of growing season is expected to shift 1&#8211;4 weeks earlier (<a class="reference-link" href="#Lader--2018">Lader et al., 2018</a>). Feasible growing areas across the Arctic are expected to shift northward and increase within the 55&#176;&#8211;69&#176;N region (<a class="reference-link" href="#King--2018">King et al., 2018</a>). Permafrost thaw (Table CCP6.1) increases drainage, which is a potential benefit, but can also increase erosion, subsidence and irregular surfaces, inhibiting agriculture (<a class="reference-link" href="#Lader--2018">Lader et al., 2018</a>). Conversion of Arctic soils to croplands may also release carbon stored in vegetation and soils (<a class="reference-link" href="#Unc--2021">Unc et al., 2021</a>).</p>
                              <p class="Body_Body-justify" lang="en-GB">Arctic aquaculture contributes approximately 2% to global farm production (primarily Norwegian salmon (<span class="condensed_italic" lang="">Salmo salar</span>) as well as finfish in Iceland and Sweden and shellfish in Alaska), and will face increasing challenges from climate change (<a class="reference-link" href="#Troell--2017">Troell et al., 2017</a>) including increased frequency of storms (impacting sea farms), extreme temperatures and warmer conditions that favour pathogens, parasites and harmful algal blooms. Aquaculture feeds often depend on small pelagic fish or krill and supply may be affected by climate impacts on fisheries (Table CCP6.6) (<a class="reference-link" href="#Troell--2017">Troell et al., 2017</a>; <a class="reference-link" href="#Chen--2018">Chen and Tung, 2018</a>; <a class="reference-link" href="#M&#248;rk&#248;re--2020">M&#248;rk&#248;re et al., 2020</a>). Integrated policies and coordination across multiple food production sectors in Arctic regions are needed to address climate opportunities and challenges (<a class="reference-link" href="#Altdorff--2021">Altdorff et al., 2021</a>; <a class="reference-link" href="#Unc--2021">Unc et al., 2021</a>).</p>
                            </div>
                          </div>
                          <div class="h3-container" id="CCP6.2.3.3">
                            <h3 class="Headings_H3" lang="de-DE">CCP6.2.3.3  Commonalities in impacts and risks across polar fisheries <span class="arrow-up"/><span class="arrow-down"/><span class="share-block"><img class="share-icon" src="../../share.png"/></span></h3>
                            <div class="h3-siblings" id="h3-7-siblings">
                              <p class="Body_Body-justify" lang="en-GB">Fisheries play an increasingly important role in addressing global food and nutritional deficits (<a class="section-link" data-title="Implementation and Effectiveness of Adaptation and Mitigation Measures" href="/report/ar6/wg2/chapter/chapter-3#3.6.3">Section 3.6.3</a>)(<a class="reference-link" href="#B&#233;n&#233;--2016">B&#233;n&#233; et al., 2016</a>; <a class="reference-link" href="#Ding--2017">Ding et al., 2017</a>; <a class="reference-link" href="#Hicks--2019">Hicks et al., 2019</a>; <a class="reference-link" href="#Costello--2020">Costello et al., 2020</a>), especially as climate change has already reduced global yields from key crops (<a class="reference-link" href="#Myers--2017">Myers et al., 2017</a>; <a class="reference-link" href="#Ray--2019">Ray et al., 2019</a>; <a class="reference-link" href="#Thiault--2019">Thiault et al., 2019</a>). Antarctic and Arctic systems support some of the world&#8217;s largest fisheries, including those for Antarctic krill and Arctic walleye pollock (<span class="condensed_italic" lang="">Gadus chalcogrammus</span>), which constitute a critical source of protein and macronutrients to a growing population of seafood consumers, as well as various aquaculture and livestock feeds (Cross-Chapter Box MOVING PLATE in Chapter 5) (Table CCP6.4) (<a class="reference-link" href="#Huntington--2013">Huntington et al., 2013</a>; <a class="reference-link" href="#Raheem--2018">Raheem, 2018</a>; <a class="reference-link" href="#Hicks--2019">Hicks et al., 2019</a>; <a class="reference-link" href="#Steiner--2019">Steiner et al., 2019</a>; <a class="reference-link" href="#FAO--2020">FAO, 2020</a>; <a class="reference-link" href="#Cavanagh--2021">Cavanagh et al., 2021</a>; <a class="reference-link" href="#Grant--2021">Grant et al., 2021</a>; <a class="reference-link" href="#Murphy--2021">Murphy et al., 2021</a>). Marine sources of protein and nutrition are important in transformational future scenarios where dietary shifts and provisioning policies provide multiple co-benefits to equity, food security and carbon mitigation (<a class="reference-link" href="#Springmann--2016">Springmann et al., 2016</a>; <a class="reference-link" href="#Poore--2018">Poore and Nemecek, 2018</a>; <a class="reference-link" href="#Thiault--2019">Thiault et al., 2019</a>; <a class="reference-link" href="#Kim--2020">Kim et al., 2020</a>). Shifting spatial distributions of fish stocks have led to transboundary management challenges in the Atlantic, Bering Sea and Arctic areas previously inaccessible due to sea ice (Table CCP6.6) (<a class="reference-link" href="#Gullestad--2020">Gullestad et al., 2020</a>).</p>
                              <p class="Body_Body-justify" lang="en-GB">Cascading and interacting effects of climate change impacts in polar regions (Table CCP6.1) will reduce <span class="condensed_italic" lang=""/> access to, and productivity of, future fisheries, and pose significant risks to regional and global food and nutritional security that increase with atmospheric carbon levels and declines in sea ice (<span class="condensed_italic" lang="">high confidence</span>) (Table CCP6.6). Although it is expected <span class="condensed_italic" lang=""/> that fisheries will continue to contract poleward under future warming (Cross-Chapter Box MOVING PLATE in Chapter 5) (Table CCP6.4) (<a class="reference-link" href="#Alabia--2018">Alabia et al., 2018</a>; <a class="reference-link" href="#Morley--2018">Morley et al., 2018</a>; <a class="reference-link" href="#Stevenson--2019">Stevenson and Lauth, 2019</a>; <a class="reference-link" href="#Caccavo--2021">Caccavo et al., 2021</a>; <a class="reference-link" href="#Grant--2021">Grant et al., 2021</a>), global and regional models differ in their projections of fisheries catch potential for the polar regions under climate change. For example, some global-scale models project increases in potential fishery yields in Arctic Canada (<a class="reference-link" href="#Cheung--2018">Cheung, 2018</a>; <a class="reference-link" href="#Bindoff--2019">Bindoff et al., 2019</a>; <a class="reference-link" href="#Tai--2019">Tai et al., 2019</a>), whereas many observational studies and high-resolution regional projections suggest overall declines in biomass, productivity and yield associated with warming and loss of sea ice in multiple regions such as the Bering Sea (<span class="condensed_italic" lang="">medium confidence</span>) (<a class="reference-link" href="#Free--2019">Free et al., 2019</a>; <a class="reference-link" href="#Hollowed--2020">Hollowed et al., 2020</a>; <a class="reference-link" href="#Holsman--2020">Holsman et al., 2020</a>; <a class="reference-link" href="#Mueter--2020">Mueter et al., 2020</a>; <a class="reference-link" href="#Reum--2020">Reum et al., 2020</a>). Reduced production of macronutrients and protein by polar marine sources will disproportionately impact people already experiencing food and nutritional scarcity (<a class="reference-link" href="#Myers--2017">Myers et al., 2017</a>), marine-dependent communities within and beyond polar regions, and women and children who require higher quantities of macronutrients (<span class="condensed_italic" lang="">high confidence</span>).</p>
                              <p class="Body_Body-justify" lang="en-GB">Large-scale commercial fisheries are expected to continue to operate in polar regions (<span class="condensed_italic" lang="">high confidence</span>) (<a class="reference-link" href="#Barange--2018">Barange et al., 2018</a>; <a class="reference-link" href="#Cavanagh--2021">Cavanagh et al., 2021</a>; <a class="reference-link" href="#Grant--2021">Grant et al., 2021</a>), and will shift poleward (<span class="condensed_italic" lang="">high confidence</span>) toward geopolitical and management boundaries (<span class="condensed_italic" lang="">high confidence</span>) (CCP6.3.2.3; Table CCP6.6). Warming and climate impacts will continue to impact transboundary stocks and increase the potential for conflict in fisheries management (<a class="reference-link" href="#Pinsky--2018">Pinsky et al., 2018</a>; <a class="reference-link" href="#Mendenhall--2020">Mendenhall et al., 2020</a>; <a class="reference-link" href="#Palacios-Abrantes--2020">Palacios-Abrantes et al., 2020</a>; <a class="reference-link" href="#Sumaila--2020">Sumaila et al., 2020</a>). Increased distances from ports to redistributed fishing grounds as well as increased frequency of storms and other extreme events are expected to increase risks and costs for fishery operations (<span class="condensed_italic" lang="">medium confidence</span>) and impact shore-based infrastructure and emergency response services (CCP6.2.4). Observed and expected increases in mobile ice combined with abrupt wind can create major hazards for fish operators in Antarctica and the Arctic, with consequences to human safety and total revenue (Dawson and et al., 2017; <a class="reference-link" href="#Barber--2018">Barber et al., 2018</a>; <a class="reference-link" href="#Grant--2021">Grant et al., 2021</a>). There will be increased demand for new port infrastructure across the Arctic (<span class="condensed_italic" lang="">high confidence</span>); new ports have already been proposed for the Northern Bering Sea, and small craft harbour investments are being considered across Arctic Canada and Greenland. Ecosystem-based management (EBM), increasing diversity and flexibility in harvest portfolios as well as access to high-resolution ecological forecasts and projections, and climate-informed advice will promote adaptation and climate resilience in fisheries (Dawson and et al., 2017; <a class="reference-link" href="#Brooks--2018">Brooks et al., 2018</a>; <a class="reference-link" href="#Karp--2019">Karp et al., 2019</a>; <a class="reference-link" href="#Hollowed--2020">Hollowed et al., 2020</a>). Coupling adaptation measures with global carbon mitigation strategies substantially decreases climate change risks to polar fisheries (<span class="condensed_italic" lang="">very high confidence</span>) (CCP6.3).</p>
                            </div>
                          </div>
                        </div>
                      </div>
                      <div class="h2-container" id="FAQ">
                        <h2 class="Body_Box_FAQ_FAQ-Box_subhead" lang="en-GB">FAQ CCP6.1  | How do changes in ecosystems and human systems in the polar regions impact everyone around the globe? How will changes in polar fisheries impact food security and nutrition around the world?<span class="arrow-up"/><span class="arrow-down"/><span class="share-block"><img class="share-icon" src="../../share.png"/></span></h2>
                        <div class="h2-siblings" id="h2-12-siblings">
                          <p class="Body_Box_FAQ_FAQ-Box_body" lang="en-US">
                            <span class="condensed_italic" lang="">Polar regions are commonly known to be experiencing particularly fast and profound climate change, which strongly affects areas and people all around the world in several ways. Physical processes taking place in these regions are critically important for the global climate and sea level. Less known is that regional climate-driven changes of ecosystems and human communities will also have far-reaching impacts on a number of sectors of human societies at lower latitudes. </span>
                          </p>
                          <p class="Body_Box_FAQ_FAQ-Box_body" lang="en-US">Climate change has triggered rapid, unprecedented and cascading changes in polar regions that have profound implications for ecosystems and people globally. Although physically remote from the largest population centres, polar systems are inextricably linked to the rest of the world through interconnected ocean currents, atmospheric interactions and weather, ecological and social systems, commerce and trade. The nutrient-rich waters of the polar regions fuel some of the most productive marine ecosystems on earth, which in turn support fisheries for species packed with vital macronutrients that are essential for human health and well-being. The largest most sustainable fisheries in the world are located in polar waters, where a mix of ice, seasonal light and cold nutrient-rich waters fuel schools of millions of fish that swell and retract in numbers across the years, reflecting interlaced cycles of icy cold waters, lipid-rich prey and abundant predators. Polar systems thus exist in a productive balance that has supported vibrant ecocultural connections between Indigenous Peoples and the Arctic for millennia and has supported global food production and trade for centuries. Climate change increasingly destabilises this balance with uncertain outcomes for Indigenous Peoples and local residents in the Arctic as well as for the rest of the world. Triggered by warming oceans and air temperatures, accelerated melting of sea ice, glaciers and IS in polar regions in turn impacts ocean salinity, sea levels and circulation throughout the global ocean. Warming waters have also pushed cold-adapted species poleward, eroded the cold barrier between boreal and Arctic species, and induced rapid reorganisation of polar ecosystems. Studies increasingly indicate that the complex web of physical and biological connections that have fuelled these productive regions will falter without the strong regulating influence of cryospheric change. At the same time, the global demand for food is increasing, particularly the demand for highly nutritious marine protein, placing increasing importance on stabilising polar ecological systems and minimising climate change impacts and risks.</p>
                        </div>
                        <h2 class="Body_Box_FAQ_FAQ-Box_subhead" lang="en-GB">FAQ CCP6.2  |  Is sea ice reduction in the polar regions driving an increase in shipping traffic?<span class="arrow-up"/><span class="arrow-down"/><span class="share-block"><img class="share-icon" src="../../share.png"/></span></h2>
                        <div class="h2-siblings" id="h2-13-siblings">
                          <p class="Body_Box_FAQ_FAQ-Box_body" lang="en-US">
                            <span class="condensed_italic" lang="">The polar seas have captured the imagination of global nations for centuries for its natural resource, tourism, scientific, and maritime trade potential. As the polar regions are warming at two to three times the rate of the global average leading to rapid reductions in sea ice extent and thickness, international attention has been reinvigorated and investments are being made by Arctic and non-Arctic nations alike with a view to utilise newly accessible seaways. Between 2013 and 2019, ship traffic entering the Arctic grew by 25% and the total distance travelled increased by 75%. Similar shipping growth trends are evident in the Antarctic, albeit to a lesser extent. Expected growth in Arctic shipping will influence a suite of cascading environmental and cultural risks with implications for Indigenous Peoples. </span>
                          </p>
                          <p class="Body_Box_FAQ_FAQ-Box_Figure" lang="de-DE">
