                              <p class="Body_Body-justify" lang="en-GB">Impacts of desertification, climate change and environmental degradation, as well as vulnerability and capacity to adapt, are gendered. Differences are determined by socially structured gender-specific roles and responsibilities, ownership of, access to and control over natural resources and technology, decision making, and capacity to cope and adapt to long-term changes (<a class="reference-link" href="#Mirzabaev--2019">Mirzabaev et al., 2019</a>; Cross-Chapter Box GENDER in Chapter 18). Assessments of the gender dimension of desertification and climate change impacts and responses are scarce, and highly context specific. For example, in many lower income countries, rural women produce most of the household food, and are responsible for food preparation and collecting fuelwood and water from increasingly distant sources (<a class="reference-link" href="#Mekonnen--2017">Mekonnen et al., 2017</a>; Droy, 2020). Drought and water scarcity particularly affect women and girls in drylands because they need to spend more time and energy collecting water and fuelwood, have less time for education or income-generating activities, and may be more exposed to violence (<a class="reference-link" href="#Sommer--2014">Sommer et al., 2014</a>) and less able to migrate as an adaptation option. Women are also commonly excluded from family and community decision making on actions to address desertification and climate change, yet their engagement in climate adaptation is critical. International policy efforts are currently seeking to better recognise and address this challenge (<a class="reference-link" href="#Okpara--2019">Okpara et al., 2019</a>).</p>
                            </div>
                          </div>
                          <div class="h3-container" id="CCP3.2.2.5">
                            <h3 class="Headings_H3" lang="de-DE">CCP3.2.2.5 Climate Change, Migration and Conflict <span class="arrow-up"/><span class="arrow-down"/><span class="share-block"><img class="share-icon" src="../../share.png"/></span></h3>
                            <div class="h3-siblings" id="h3-13-siblings">
                              <p class="Body_Body-justify" lang="en-GB">Dryland populations pursuing traditional land-based livelihood options are generally mobile due to a highly fluctuating resource base (Box CCP 3.1). Many rural dwellers in drylands also move to urban areas for seasonal work, which can have positive impacts in terms of remittances. While reasons for migration vary and can be positive or negative, oppression and human rights abuses, lack of livelihood opportunities and food insecurity tend to be among the main push factors, while emerging opportunities at the rural&#8211;urban nexus present lucrative pull factors (Cross-Chapter Box MIGRATE in Chapter 7). In a survey in Libya in 2016, 80% of migrants interviewed said they had left home because of economic hardship (<a class="reference-link" href="#Hochleithner--2018">Hochleithner and Exner, 2018</a>), which in drylands under water scarcity linked to climate change, would be exacerbated.</p>
                              <p class="Body_Body-justify" lang="en-GB">Causes of migration and violent conflict need to be seen in a wider historical, agrarian, political, economic and environmental context, in a multi-scalar perspective integrating levels of analysis from the local to the global (<a class="reference-link" href="#Glick Schiller--2015">Glick Schiller, 2015</a>). Quantitative studies tend to conclude that climate change has so far not significantly impacted migration including in drylands (<a class="reference-link" href="#Owain--2018">Owain and Maslin, 2018</a>), although with some disagreement (<a class="reference-link" href="#Lima--2016">Lima et al., 2016</a>; <a class="reference-link" href="#Missirian--2017">Missirian and Schlenker, 2017</a>). In a study of the climate change&#8211;migration&#8211;conflict interface, <a class="reference-link" href="#Abel--2019">Abel et al. (2019)</a>  found limited empirical evidence supporting a link between climatic shocks, conflict and asylum-seeking for the period 2006&#8211;2015 from 157 countries. The authors found evidence of such a link for the period 2010&#8211;2012 relating to some countries affected by the Arab Spring and concluded that the impact of climate on conflict and migration is limited to specific time periods and contexts.</p>
                              <p class="Body_Body-justify" lang="en-GB">The same lack of general causality is largely concluded on the specific link between climate change and conflict (<a class="reference-link" href="#Buhaug--2014">Buhaug et al., 2014</a>; <a class="reference-link" href="#Buhaug--2015">Buhaug et al., 2015</a>; <a class="reference-link" href="#von Uexkull--2016">von Uexkull et al., 2016</a>; <a class="reference-link" href="#Koubi--2019">Koubi, 2019</a>), but a minority of quantitative studies argue for a stronger causal association (<a class="reference-link" href="#Hsiang--2013">Hsiang et al., 2013</a>). <a class="reference-link" href="#Mach--2019">Mach et al. (2019)</a>  found considerable agreement among experts that climate variability and change have influenced the risk of organised armed conflict within countries, but they also agreed that other factors, such as state capacity and level of socioeconomic development, played a much larger role. These factors also play a role in determining adaptation possibilities and in shaping the enabling environment (<a class="section-link" data-title="Enabling Environments for Adaptation in Different Socioeconomic Contexts" href="/report/ar6/wg2/chapter/chapter-8#8.5.2">Section 8.5.2</a>).</p>
                              <p class="Body_Body-justify" lang="en-GB">Qualitative case studies tend to frame conflict and migration within a larger political, economic and historical context. A number of studies from African drylands find that land dispossession is a key driver of both migration and conflict resulting from large-scale resource extraction or land encroachment, often associated with processes of elite capture and marginalisation (<a class="reference-link" href="#Benjaminsen--2009">Benjaminsen and Ba, 2009</a>; <a class="reference-link" href="#Benjaminsen--2009">Benjaminsen et al., 2009</a>; <a class="reference-link" href="#Cross--2013"> Cross, 2013</a>; <a class="reference-link" href="#Glick Schiller--2015">Glick Schiller, 2015</a>; Nyantakyi-Frimpong and Bezner Kerr, 2017; <a class="reference-link" href="#Obeng-Odoom--2017">Obeng-Odoom, 2017</a>; <a class="reference-link" href="#Bergius--2020">Bergius et al., 2020</a>). By undermining livelihoods, exacerbating poverty and setting rural population groups adrift, land dispossession in the Sahel may lead to increased migration to urban areas, to rural sites of non-farm employment (e.g., mines) (<a class="reference-link" href="#Chevrillon-Guibert--2019">Chevrillon-Guibert et al., 2019</a>) or out of the country. In addition, it may lead to other types of reactions including violent resistance (<a class="reference-link" href="#Oliver-Smith--2010">Oliver-Smith, 2010</a>; <a class="reference-link" href="#Cavanagh--2015">Cavanagh and Benjaminsen, 2015</a>; <a class="reference-link" href="#Hall--2015">Hall et al., 2015</a>) as already seen in the Sahel in terms of the emergence of jihadist armed groups (<a class="reference-link" href="#Benjaminsen--2019">Benjaminsen and Ba, 2019</a>). Major drivers of the current crisis in Mali include decades of bureaucratic mismanagement and widespread corruption, the spill-over of jihadist groups from Algeria after the civil war there in the 1990s and the current civil war in Libya. Climate change has played a marginal role as a driver of conflicts in the Sahel (<a class="reference-link" href="#Benjaminsen--2012">Benjaminsen et al., 2012</a>; <a class="reference-link" href="#Benjaminsen--2019">Benjaminsen and Hiernaux, 2019</a>) but has potential to exacerbate the situation in the future with regards to migration and conflict (<a class="reference-link" href="#Owain--2018">Owain and Maslin, 2018</a>).</p>
                            </div>
                          </div>
                        </div>
                      </div>
                      <div class="h2-container box-container" id="box-ccp3.1">
                        <h2 class="Body_Box_blue_Box_head" lang="en-GB"><span>Box CCP3.1  | Pastoralism and climate change</span> <span class="arrow-up"/><span class="arrow-down"/><span class="share-block"><img class="share-icon" src="../../share.png"/></span></h2>
                        <div class="h2-siblings" id="h2-7-siblings">
                          <p class="Body_Box_blue_Box_body" lang="en-GB">Pastoralism is a livestock-keeping system based on the herding of animals. Migrations often take place over long distances to track variable and unpredictable plant growth that tends to be patchy in space and variable in time (<a class="reference-link" href="#Homewood--2018">Homewood, 2018</a>). Pastoralism has a considerably lower carbon budget than other livestock-keeping systems. Research on pastoralism in the Sahel concluded that this system may be carbon neutral (<a class="reference-link" href="#Assouma--2019">Assouma et al., 2019</a>), despite contributing directly to greenhouse gas emissions via methane enteric emissions and indirectly through faeces-driven CO<span class="subscript _idGenCharOverride-1" lang="">2</span>, CH<span class="subscript _idGenCharOverride-1" lang="">4</span> and N<span class="subscript _idGenCharOverride-1" lang="">2</span>O emissions during mineralisation (<a class="reference-link" href="#Assouma--2017">Assouma et al., 2017</a>). Efforts to sedentarise and settle pastoralists in villages can lead to land degradation and higher overall emissions from the sector.</p>
                          <p class="Body_Box_blue_Box_body" lang="en-GB">Pastoralists migrate with their animals in some of the most remote and marginal environments on the planet. Globally, mobile pastoralists number about 200 million households and use about 25% of the Earth&#8217;s landmass (<a class="reference-link" href="#Dong--2016">Dong, 2016</a>). Many pastoralists operate in non-equilibrial environments that are unstable, fluctuating and generally uncertain, and are driven more by climatic variation than livestock numbers and grazing pressure (Behnke et al., 1993). Examples of such systems are grazing areas in the dry tropics (<a class="reference-link" href="#Sandford--1983">Sandford, 1983</a>; <a class="reference-link" href="#Turner--1993">Turner, 1993</a>; <a class="reference-link" href="#Sullivan--2002">Sullivan and Rohde, 2002</a>; <a class="reference-link" href="#Benjaminsen--2006">Benjaminsen et al., 2006</a>; <a class="reference-link" href="#Hiernaux--2016">Hiernaux et al., 2016</a>) and rangelands in the Arctic (<a class="reference-link" href="#Behnke--2000">Behnke, 2000</a>; <a class="reference-link" href="#Tyler--2008">Tyler et al., 2008</a>; <a class="reference-link" href="#Benjaminsen--2015">Benjaminsen et al., 2015</a>; <a class="reference-link" href="#Marin--2020">Marin et al., 2020</a>).</p>
                          <p class="Body_Box_blue_Box_body" lang="en-GB">Over many generations, pastoralists have accumulated practical experience and knowledge to cope with uncertainty and value variability (<a class="reference-link" href="#Kr&#228;tli--2010">Kr&#228;tli and Schareika, 2010</a>), mainly through a mobile and flexible approach. While pastoralists are also at risk of climate change impacts, they may be better able to adapt to a changing climate than other land users (<a class="reference-link" href="#Davies--2008">Davies and Nori, 2008</a>; <a class="reference-link" href="#Kr&#228;tli--2010">Kr&#228;tli and Schareika, 2010</a>; <a class="reference-link" href="#Jones--2016">Jones and Gutzler, 2016</a>).</p>
                          <p class="Body_Box_blue_Box_body" lang="en-GB">While pastoralists possess substantial adaptive capacity as a result of their Indigenous knowledge, this has been under pressure during the last few decades through continued loss of livestock corridors (essential to mobility) and pastures in general due to competing land uses, such as farming, mining, crop expansion and the establishment or extension of protected areas (<a class="reference-link" href="#Th&#233;baud--2001">Th&#233;baud and Batterbury, 2001</a>; <a class="reference-link" href="#Brockington--2002">Brockington, 2002</a>; <a class="reference-link" href="#Benjaminsen--2009">Benjaminsen and Ba, 2009</a>; <a class="reference-link" href="#Upton--2014">Upton, 2014</a>; <a class="reference-link" href="#Johnsen--2016">Johnsen, 2016</a>; Tappan, 2016; <a class="reference-link" href="#Homewood--2018">Homewood, 2018</a>; <a class="reference-link" href="#Weldemichel--2019">Weldemichel and Lein, 2019</a>; <a class="reference-link" href="#Bergius--2020">Bergius et al., 2020</a>). Many of these competing land uses erect fences and exclude other uses, while property rights often privilege sedentary farming.</p>
                          <p class="Body_Box_blue_Box_body" lang="en-GB">Modern states have typically tried to settle pastoralists and confine their movements within clearly defined boundaries, claiming that pastoral land use is neither ecologically sustainable nor economically productive. Based on such negative and often flawed views, stall-feeding and ranching are often presented by policymakers as successful models of livestock keeping in contrast to the pastoral way of life (<a class="reference-link" href="#Steinfeld--2006">Steinfeld et al., 2006</a>; <a class="reference-link" href="#Chatty--2007">Chatty, 2007</a>).</p>
                          <p class="Body_Box_blue_Box_body" lang="en-GB">Current pressures and processes of pastoral change are spatially variable and complex, and tend to result in further economic and political marginalisation of pastoralists, with adverse effects on livelihoods and landscapes. With climate change, which is projected to lead to higher temperatures and more frequent fluctuations in precipitation, maintaining flexibility and resilience in pastoral land use is essential. However, current processes of marginalisation, in addition to increased insecurity in some drylands (e.g., the Sahel), make pastoralists more vulnerable, and constrain them from fully employing their adaptive capacities (<a class="reference-link" href="#Davies--2008">Davies and Nori, 2008</a>). The skills and capacities held by pastoralists may, however, offer lessons for society at large in its struggle to adapt to climate change and deal with increased uncertainty (<a class="reference-link" href="#Davies--2008">Davies and Nori, 2008</a>; <a class="reference-link" href="#Scoones--2009">Scoones, 2009</a>; <a class="reference-link" href="#Nori--2019">Nori and Scoones, 2019</a>).</p>
                        </div>
                      </div>
                    </div>
                    <div class="h1-container" id="CCP3.3">
                      <h1 class="Headings_H1-numbered" lang="en-GB">CCP3.3  Future Projections <span class="share-block"><img class="share-icon" src="../../share.png"/></span><button class="btn-ipcc btn btn-primary chapter-expand">Expand section</button></h1>
                      <div class="h1-siblings" id="h1-4-siblings"/>
                      <div class="h2-container" id="CCP3.3.1">
                        <h2 class="Headings_H2-sub" lang="de-DE">CCP3.3.1  Projected Changes and Risks in Natural Systems <span class="arrow-up"/><span class="arrow-down"/><span class="share-block"><img class="share-icon" src="../../share.png"/></span></h2>
                        <div class="h2-siblings" id="h2-5-siblings">
                          <div class="h3-container" id="CCP3.3.1.1">
                            <h3 class="Headings_H3" lang="de-DE">CCP3.3.1.1  Temperature <span class="arrow-up"/><span class="arrow-down"/><span class="share-block"><img class="share-icon" src="../../share.png"/></span></h3>
                            <div class="h3-siblings" id="h3-14-siblings">
                              <p class="Body_Body-justify" lang="en-GB">Globally, warming rates have been twice as high in drylands as in humid lands, because the sparse vegetation cover and lower soil moisture of dryland ecosystems amplify temperature and aridity increases (<a class="reference-link" href="#Huang--2016">Huang et al., 2016</a>). This enhanced warming is expected to continue in the future. Surface warming over drylands is projected to reach ~6.5&#176;C (~3.5&#176;C) under the high Representative Concentration Pathway (RCP) 8.5 (low-moderate RCP4.5) emissions scenario by the end of this century, relative to the historical period (1961&#8211;1990) (<a class="reference-link" href="#Huang--2016">Huang et al., 2016</a>; <a class="reference-link" href="#Huang--2017">Huang et al., 2017</a>). Exploring the spatial variations between the aeolian desertification response in selected climate change scenarios, <a class="reference-link" href="#Wang--2017">Wang et al. (2017)</a>  reported that temperature rise could trigger aeolian desertification in West Asia, Central China and Mongolia. The number of extremely hot days with temperatures above 40&#176;C is projected to increase considerably across the Arab region by the end of the 21st century (<a class="reference-link" href="#ESCWA--2017">ESCWA, 2017</a>).</p>
                            </div>
                          </div>
                          <div class="h3-container" id="CCP3.3.1.2">
                            <h3 class="Headings_H3" lang="de-DE">CCP3.3.1.2 Rainfall, Evaporation and Drought <span class="arrow-up"/><span class="arrow-down"/><span class="share-block"><img class="share-icon" src="../../share.png"/></span></h3>
                            <div class="h3-siblings" id="h3-15-siblings">
                              <p class="Body_Body-justify" lang="en-GB">Drylands are highly sensitive to changes in precipitation and evapotranspiration. Potential evapotranspiration (PET) is projected to increase in all regions globally, under all RCPs, as a result of increasing temperatures and surface water vapour deficit (<a class="reference-link" href="#Mirzabaev--2019">Mirzabaev et al., 2019</a>). Simulations based on coupled land surface, energy, and water and vegetation models in the Central Sahel showed a strong response of the water budget. Under +2&#176;C and +4&#176;C warming scenarios, decreased evapotranspiration, runoff and drainage were found for all scenarios, except those with the highest precipitation (<a class="reference-link" href="#L&#233;authaud--2015">L&#233;authaud et al., 2015</a>).</p>
                              <p class="Body_Body-justify" lang="en-GB">Globally, soil moisture declined over the 20th century (<a class="reference-link" href="#Gu--2019">Gu et al., 2019</a>), a trend that is projected to continue under all emissions scenarios (WGI). Projected drier soils can further amplify aridity through feedbacks with land surface temperature, relative humidity and precipitation (<a class="reference-link" href="#Berg--2016">Berg et al., 2016</a>).</p>
                              <p class="Body_Body-justify" lang="en-GB">Drought conditions (frequency, severity and duration) are expected to substantially worsen in global drylands, driven by a higher saturation threshold and more intense and frequent dry spells under rising temperatures (<a class="reference-link" href="#Liu--2019">Liu et al., 2019</a> a; 2019b). In a +1.5&#176;C world, historical 50-year droughts (based on the Standardised Precipitation-Evapotranspiration Index (SPEI)) could occur twice as frequently across 58% of global landmasses relative to the 1976&#8211;2005 period, an area that increases to 67% under 2&#176;C warming (<a class="reference-link" href="#Gu--2020">Gu et al., 2020</a>). Multi-year drought events of magnitudes exceeding historical baselines will increase by 2050 in countries with drylands including Australia, Brazil, Spain, Portugal and the USA (Jenkins and Warren, 2015). The magnitude of drought stress in different regions differs depending on the metric used. Projections based on the PDSI suggest drought stress will increase by more than 70% globally, while a substantially lower estimate of 37% is found when precipitation minus evapotranspiration (P &#8211; E) is used (<a class="reference-link" href="#Swann--2016">Swann et al., 2016</a>). However, the two metrics agree on increasing drought stress in regions with more robust decreases in precipitation, such as southern North America, northeastern South America (<a class="section-link" data-title="Hazards" href="/report/ar6/wg2/chapter/chapter-12#12.3.1.1">Section 12.3.1.1</a>) and southern Europe (<a class="section-link" data-title="Impact Assessment of Climate Change Based on Previous Reports" href="/report/ar6/wg2/chapter/chapter-13#13.1.3">Section 13.1.3</a>; <a class="reference-link" href="#Swann--2016">Swann et al., 2016</a>).</p>
                            </div>
                          </div>
                          <div class="h3-container" id="CCP3.3.1.3">
                            <h3 class="Headings_H3" lang="de-DE">CCP3.3.1.3  Aridity <span class="arrow-up"/><span class="arrow-down"/><span class="share-block"><img class="share-icon" src="../../share.png"/></span></h3>
                            <div class="h3-siblings" id="h3-16-siblings">
                              <p class="Body_Body-justify" lang="en-GB">Studies based on the AI (the ratio of annual potential evapotranspiration to precipitation), almost always project conditions of increasing aridity under climate change, and associated widespread expansion of drylands (<a class="reference-link" href="#Huang--2016">Huang et al., 2016</a>). The limitations of the AI are widely reported (<a class="reference-link" href="#Mirzabaev--2019">Mirzabaev et al., 2019</a>), with alternative indices that consider different variables, including the Ecohydrological Index, PDSI, Standardised Precipitation Index and SPEI (<a class="reference-link" href="#Stringer--2021">Stringer et al., 2021</a>). AI projections indicate potentially severe aridification in the Amazon, Australia, Chile, the Mediterranean region, northern, southern and western Africa, southwestern USA and South America (<span class="condensed_italic" lang="">medium confidence</span>) (<a class="reference-link" href="#Feng--2013">Feng and Fu, 2013</a>; <a class="reference-link" href="#Greve--2015">Greve and Seneviratne, 2015</a>; <a class="reference-link" href="#Jones--2016">Jones and Gutzler, 2016</a>; <a class="reference-link" href="#Park--2018">Park et al., 2018</a>). However, the AI does not incorporate potential changes to plant transpiration under increasing CO<span class="subscript _idGenCharOverride-1" lang="">2</span> concentration and therefore overestimates drought conditions and aridity. Additionally, it does not reflect seasonality in rainfall and evapotranspiration, which is important in regions where temperature and actual evapotranspiration are not increasing during the wet season when vegetation growth is occurring. <a class="reference-link" href="#Mirzabaev--2019">Mirzabaev et al. (2019)</a>  concluded that while aridity will increase in some places (<span class="condensed_italic" lang="">high confidence</span>), there is insufficient evidence to suggest a global change in dryland aridity (<span class="condensed_italic" lang="">medium confidence</span>). Nevertheless, a comparison of several metrics of aridity showed aridity increases for several hotspots such as the Mediterranean region and South Africa (<a class="reference-link" href="#Greve--2019">Greve et al., 2019</a>). Under RCP8.5, aridity zones could expand by one-quarter of the 1990 area by 2100, increasing to over half of the global terrestrial area (<a class="reference-link" href="#Huang--2016">Huang et al., 2016</a>; <a class="reference-link" href="#Lickley--2018">Lickley and Solomon, 2018</a>). Lower greenhouse gas emissions, under RCP4.5, could limit expansion to one-tenth of the 1990 area by 2100 (<a class="reference-link" href="#Huang--2016">Huang et al., 2016</a>). Aridity could expand substantially on all continents except Antarctica (<a class="reference-link" href="#Huang--2016">Huang et al., 2016</a>), with expansion first manifesting in the Mediterranean region, southern Africa, southern South America and western Australia (<a class="reference-link" href="#Lickley--2018">Lickley and Solomon, 2018</a>). In the Northern Hemisphere, aridity zones could expand poleward as much as 11&#176; latitude (Rajaud and Noblet-Ducoudr&#233;, 2017). By 2100, the population of dryland areas could increase by 700 million people and, under RCP8.5, 3 billion people might live in areas with a 25% or greater increase in aridity (<a class="reference-link" href="#Lickley--2018">Lickley and Solomon, 2018</a>). Many studies point to an increasing dryland area based on the AI, but there is <span class="condensed_italic" lang="">low agreement </span> on the actual amount and area of change (<a class="reference-link" href="#Feng--2013">Feng and Fu, 2013</a>; <a class="reference-link" href="#Scheff--2015">Scheff and Frierson, 2015</a>; <a class="reference-link" href="#Huang--2017">Huang et al., 2017</a>). The inconsistency between studies is largely due to the substantial internal climate variability in regional precipitation. Changes in annual precipitation have been shown to range from &#8722;30% to 25% over drylands. Consistent changes in precipitation are only found at high latitudes, while total PET is projected to increase over most land areas (<a class="reference-link" href="#Feng--2013">Feng and Fu, 2013</a>). This leads to more consistent, widespread drying in the tropics, subtropics and mid-latitudes in most models (<a class="reference-link" href="#Feng--2013">Feng and Fu, 2013</a>; <a class="reference-link" href="#Cook--2014">Cook et al., 2014</a>; <a class="reference-link" href="#Scheff--2015">Scheff and Frierson, 2015</a>; <a class="reference-link" href="#Zhao--2015">Zhao and Dai, 2015</a>).</p>
                            </div>
                          </div>
                          <div class="h3-container" id="CCP3.3.1.4">
                            <h3 class="Headings_H3" lang="de-DE">CCP3.3.1.4  Dryland Extent <span class="arrow-up"/><span class="arrow-down"/><span class="share-block"><img class="share-icon" src="../../share.png"/></span></h3>
                            <div class="h3-siblings" id="h3-17-siblings">
                              <p class="Body_Body-justify" lang="en-GB">Global dryland area (based on the AI) is projected to expand by ~10% by 2100 compared to 1961&#8211;1990 under a high emission scenario (<a class="reference-link" href="#Feng--2013">Feng and Fu, 2013</a>). However, there are significant regional differences in the drivers of dryland expansion and subsequent estimates of change in dryland extent. Subtropical drylands are projected to expand as the climate in these regions shifts from temperate to subtropical and aridity increases in currently sub-humid subtropical regions, resulting in the loss of temperature-controlled seasonal cycles (Schlaepfer et al., 2017). Observed and projected warming and drying trends are most severe in transitional climate regions between dry and wet climates, with some exceptions (<a class="reference-link" href="#Nkrumah--2019">Nkrumah et al., 2019</a>), which are often highly populated agricultural regions with fragile ecosystems (<a class="reference-link" href="#Cheng--2016">Cheng and Huang, 2016</a>). In contrast, P &#8211; E predicts decreasing drought stress across temperate Asia and central Africa (<a class="reference-link" href="#Swann--2016">Swann et al., 2016</a>). Expansion of arid regions is anticipated in southwest North America, the northern fringe of Africa, southern Africa and Australia. The main areas of semiarid expansion are expected to occur in the north side of the Mediterranean, southern Africa, and North and South America. In contrast, India, eastern equatorial Africa and other areas of the southern Saharan regions are projected to have shrinking drylands (<a class="reference-link" href="#Biasutti--2006">Biasutti and Giannini, 2006</a>; <a class="reference-link" href="#Biasutti--2013">Biasutti, 2013</a>; <a class="reference-link" href="#Rowell--2016">Rowell et al., 2016</a>). Future projections may underestimate dryland expansion, since the Coupled Model Intercomparison Project 5 (CMIP5) models underestimate historical warming (<a class="reference-link" href="#Huang--2016">Huang et al., 2016</a>) and overestimate precipitation over drylands, particularly in the semiarid and dry sub-humid regions (<a class="reference-link" href="#Ji--2015">Ji et al., 2015</a>). However, estimates vary depending on the metric used (<a class="reference-link" href="#Swann--2016">Swann et al., 2016</a>; <a class="reference-link" href="#Berg--2017b">Berg et al., 2017b</a>). Studies based on off-line aridity and drought metrics (calculated from model output of precipitation, evapotranspiration or temperature) project strong surface drying trends (<a class="reference-link" href="#Cook--2014">Cook et al., 2014</a>; <a class="reference-link" href="#Scheff--2015">Scheff and Frierson, 2015</a>; <a class="reference-link" href="#Zhao--2015">Zhao and Dai, 2015</a>), while projections based on total soil water availability from CMIP5 models show weaker and less extensive drying (<a class="reference-link" href="#Berg--2017a">Berg et al., 2017a</a>). In contrast, projections in southern Africa may overestimate future drying, with systematic rainfall biases being found in the present-day climatology in models that simulate extreme future drying (<a class="reference-link" href="#Munday--2019">Munday and Washington, 2019</a>). Improvements in projections of future changes in aridity require better understanding of seasonality, land hydrology and the feedbacks between projected soil moisture decrease on land surface temperature, relative humidity and precipitation (<a class="reference-link" href="#Huang--2016">Huang et al., 2016</a>).</p>
                              <p class="Body_Body-justify" lang="en-GB">Higher dust emissions are consistent with climate change projections indicating an expansion in the global area of drylands (<a class="reference-link" href="#Feng--2013">Feng and Fu, 2013</a>; <a class="reference-link" href="#Huang--2016">Huang et al., 2016</a>) and increased drought risk (<a class="reference-link" href="#Cook--2014">Cook et al., 2014</a>; <a class="reference-link" href="#Xu--2019">Xu et al., 2019</a>), but future trends in dust event frequency and intensity as a result of climate change are uncertain and will vary geographically (Jia, 2019). Combined effects of climate change and anthropogenic activities are projected to increase sand encroachment and extreme dust storms (Omar <a class="reference-link" href="#Asem--2010">Asem and Roy, 2010</a>; <a class="reference-link" href="#Sharratt--2015">Sharratt et al., 2015</a>; <a class="reference-link" href="#Pu--2017">Pu and Ginoux, 2017</a>) as a result of increased aridity, accelerating soil erosion (<a class="section-link" data-title="Projected Changes in Soil Erosion and Sediment Load" href="/report/ar6/wg2/chapter/chapter-4#4.4.8">Section 4.4.8</a>; <a class="reference-link" href="#Sharratt--2015">Sharratt et al., 2015</a>) and loss of biomass (<a class="reference-link" href="#Sharratt--2015">Sharratt et al., 2015</a>; <a class="reference-link" href="#Middleton--2017">Middleton and Kang, 2017</a>). Shifts in dust storm timings are also projected in some regions (Hand et al., 2016). Dustiness is projected to increase in the southern US Great Plains in the late 21st century under the RCP8.5 climate change scenario but decrease over the northern Great Plains (<a class="reference-link" href="#Pu--2017">Pu and Ginoux, 2017</a>). A declining trend in dust emission and transport from the Sahara under RCP8.5 was detected by Evan et al. (2016), but regional climate model experiments conducted by <a class="reference-link" href="#Ji--2018">Ji et al. (2018)</a>  under the same scenario indicated that overall dust loadings would increase by the end of the 21st century over West Africa. New dust sources may emerge with changing climate conditions, as <a class="reference-link" href="#Bhattachan--2012">Bhattachan et al. (2012)</a>  indicate for the Kalahari Desert in southern Africa, due to vegetation loss and dune remobilisation. There is overall <span class="condensed_italic" lang="">low confidence</span> on future atmospheric dust loads at the global and regional scale. Models of future dust emissions are limited by the low accuracy of models of present anthropogenic dust emissions, which range from 10% to 60% of the total atmospheric dust load (<a class="reference-link" href="#Webb--2018">Webb and Pierre, 2018</a>). A global compilation of data from sedimentary archives (ice cores), remote sensing, airborne sediment sampling and meteorological station data estimated that anthropogenic dust emissions have at least doubled over the past 250 years (<a class="reference-link" href="#Hooper--2018">Hooper and Marx, 2018</a>). While future emissions of natural dust sources are projected to decrease (Mahowald et al., 2006) or remain stable (<a class="reference-link" href="#Ashkenazy--2012">Ashkenazy et al., 2012</a>), when sources of human emissions are included, projections of future atmospheric dust loads suggest that emissions may increase (<a class="reference-link" href="#Stanelle--2014">Stanelle et al., 2014</a>).</p>
                              <p class="Body_Body-justify" lang="en-GB">The relative contribution of albedo and evapotranspiration to regional trends in surface temperature (<a class="reference-link" href="#Charney--1975">Charney, 1975</a>) remains unresolved, and may be determined by different mechanisms in different systems, depending on site-specific conditions such as snow coverage, vegetation and soil moisture (<a class="reference-link" href="#Yu--2017">Yu et al., 2017</a>). For example, the vegetation&#8211;albedo feedback mechanism may dominate in the Arctic (<a class="reference-link" href="#Blok--2011">Blok et al., 2011</a>; <a class="reference-link" href="#te Beest--2016">te Beest et al., 2016</a>), while the vegetation&#8211;evaporation feedback may drive change in other regions. Actions that increase forest cover across Africa could thus, theoretically, moderate projected future temperature increases (<a class="reference-link" href="#Wu--2016">Wu et al., 2016</a>; <a class="reference-link" href="#Diba--2018">Diba et al., 2018</a>), but with potentially negative effects on biodiversity (Chapter 2). Soil drying exacerbates atmospheric aridity, which causes more soil drying in a self-reinforcing land&#8211;atmosphere feedback that could intensify under RCP8.5 (<a class="reference-link" href="#Zhou--2019">Zhou et al., 2019</a>).</p>
                              <p class="Body_Body-justify" lang="en-GB">Changes to the composition, structure and functioning of natural communities in deserts and dryland ecosystems are key risks resulting from water stress, drought intensity and continued habitat degradation, greater frequency of wildfire, biodiversity loss and the spread of invasive species (<a class="reference-link" href="#Hurlbert--2019">Hurlbert et al., 2019</a>). Not all these stresses occur at the same time in a particular environment, with some areas more exposed to, for example, wildfire than others, especially in areas with high amounts of dry herbaceous biomass. Grassland composition may shift as C3 plants are replaced by C4 species, which have higher optimal temperatures and higher water use efficiency (although seasonality of precipitation also plays a role) (Knapp et al., 2020). Many desert species have morphological, physiological and/or behavioural adaptations to cope with climatic extremes, including rapid regeneration following droughts (<a class="reference-link" href="#Boudet--1977">Boudet, 1977</a>; <a class="reference-link" href="#Hiernaux--2006">Hiernaux and Le Hou&#233;rou, 2006</a>), leaf dropping during the dry season to reduce water loss (<a class="reference-link" href="#Santos--2014">Santos et al., 2014</a>), alongside long histories of adaptation to climate change (<a class="reference-link" href="#Brooks--2005">Brooks et al., 2005</a>; <a class="reference-link" href="#Ballouche--2007">Ballouche and Rasse, 2007</a>), while many animals live near their physiological limits (<a class="reference-link" href="#Vale--2015">Vale and Brito, 2015</a>). Substantial ecological effects may occur when extreme events such as heatwaves or droughts are superimposed on the warming trend, pushing species beyond their physiological and mortality thresholds (<a class="reference-link" href="#Hoover--2015">Hoover et al., 2015</a>; <a class="reference-link" href="#Harris--2018">Harris et al., 2018</a>).</p>
                              <p class="Body_Body-justify" lang="en-GB">Climate change increases risks of continued range retractions of Karoo succulents in South Africa (Young et al., 2016), dry argan woodlands in Morocco (<a class="reference-link" href="#Alba-S&#225;nchez--2015">Alba-S&#225;nchez et al., 2015</a>), epiphytic cacti in Brazil (<a class="reference-link" href="#Cavalcante--2019">Cavalcante and Duarte, 2019</a>; <a class="reference-link" href="#Cavalcante--2020">Cavalcante et al., 2020</a>) and other plant species exposed to higher aridity. Projected increases in heat and aridity could increase mortality of trees and shrubs in Sonoran Desert ecosystems in the USA (<a class="reference-link" href="#Munson--2012">Munson et al., 2012</a>; 2016b), reduce sagebrush in arid ecosystems of the western USA (<a class="reference-link" href="#Renwick--2018">Renwick et al., 2018</a>), and contribute to the replacement of perennial grasses with xeric shrubs in the southwestern USA (<a class="reference-link" href="#Bestelmeyer--2018">Bestelmeyer et al., 2018</a>). CO<span class="subscript CharOverride-1" lang="">2</span> fertilization and warmer conditions, combined with changes in timing and availability of moisture, could increase invasive grasses and wildfire in desert ecosystems of Australia and southwestern USA, where wildfire has historically been absent or infrequent (<a class="reference-link" href="#Abatzoglou--2011">Abatzoglou and Kolden, 2011</a>; Horn and St. Clair, 2017; <a class="reference-link" href="#Klinger--2017">Klinger and Brooks, 2017</a>; <a class="reference-link" href="#Syphard--2017">Syphard et al., 2017</a>). Trends of woody encroachment may continue in some North American and African drylands or at least not reverse (<a class="reference-link" href="#Higgins--2012">Higgins and Scheiter, 2012</a>; <a class="reference-link" href="#Caracciolo--2016">Caracciolo et al., 2016</a>). Impacts of woody encroachment on drylands may show a slight increase in carbon, but a decline in water and huge negative impacts on biodiversity, with a tendency for open ecosystem species to be most affected (<a class="reference-link" href="#Archer--2017">Archer et al., 2017</a>). Expansion of grasses into these arid shrublands has the potential to transform them rapidly, especially through the acceleration of the fire cycle (<a class="reference-link" href="#Bradley--2016">Bradley et al., 2016</a>). While the impact of increased aridity may be offset by changing water use efficiency by plants under high CO<span class="subscript CharOverride-1" lang="">2</span> concentrations, limiting the expansion of dryland ecosystems (<a class="reference-link" href="#Swann--2016">Swann et al., 2016</a>; <a class="reference-link" href="#Mirzabaev--2019">Mirzabaev et al., 2019</a>), increased plant growth in response to elevated CO<span class="subscript CharOverride-1" lang="">2</span>, which results in increased water consumption, may counteract this. Increased water use efficiency is therefore not expected to counterbalance increased evaporative demand (Chapter 8). There is <span class="condensed_italic" lang="">medium confidence</span> that succulent species will be particularly vulnerable to increased heat and aridity due to reduced physiological performance, loss of seed banks, lower germination rates and increased mortality (Table CCP3.1; <a class="reference-link" href="#Musil--2005">Musil et al., 2005</a>; <a class="reference-link" href="#Arag&#243;n-Gast&#233;lum--2014">Arag&#243;n-Gast&#233;lum et al., 2014</a>; 2017; <a class="reference-link" href="#Shryock--2014">Shryock et al., 2014</a>; <a class="reference-link" href="#Martorell--2015">Martorell et al., 2015</a>; <a class="reference-link" href="#Carrillo-Angeles--2016">Carrillo-Angeles et al., 2016</a>; <a class="reference-link" href="#Ko&#378;mi&#324;ska--2019">Ko&#378;mi&#324;ska et al., 2019</a>).</p>
                            </div>
                          </div>
                        </div>
                      </div>
                      <div class="h2-container" id="CCP3.3.2">
                        <h2 class="Headings_H2-numbered" lang="de-DE">CCP3.3.2 Projected Impacts on Human Systems <span class="arrow-up"/><span class="arrow-down"/><span class="share-block"><img class="share-icon" src="../../share.png"/></span></h2>
                        <div class="h2-siblings" id="h2-6-siblings">
                          <p class="Body_Body-justify" lang="en-GB">Across many drylands, human-induced causes of desertification, SDS, climate change and unsustainable land use are projected to become more pronounced over the next several decades with global consequences. Future climate changes with increasing frequency, intensity and scales of droughts and heatwaves, are projected to further exacerbate the vulnerability and risk to humans from desertification (<a class="reference-link" href="#Hurlbert--2019">Hurlbert et al., 2019</a>).</p>
                          <p class="Body_Body-justify" lang="en-GB">SDS exert a wide range of impacts on people, within deserts and semi-deserts but also outside dryland environments because of long-range dust transport (<a class="reference-link" href="#Middleton--2017">Middleton, 2017</a>). Research on the economic impacts of SDS is lacking, while studies that have been conducted lack consistency in data collection methods and analysis (<a class="reference-link" href="#Middleton--2019">Middleton, 2019</a>). Although projections are rarely modelled, estimated economic damages of increased dust-related health impacts and mortality under RCP8.5 could total USD 47 billion/year additional to the 1986&#8211;2005 value of USD 13 billion/year in southwest USA (<a class="reference-link" href="#Allahbakhshi--2019">Allahbakhshi et al., 2019</a>).</p>
                          <p class="Body_Body-justify" lang="en-GB">Projected impacts of climate change on the risk of food insecurity are a particular concern for the developing world drylands (Chapter 16; <a class="reference-link" href="#Mirzabaev--2019">Mirzabaev et al., 2019</a>), potentially leading to the breakdown of food production systems, including crops, livestock and fisheries, as well as disruptions in food supply chains and distribution (<a class="reference-link" href="#Myers--2017">Myers et al., 2017</a>; <a class="reference-link" href="#Lewis--2018">Lewis and Mallela, 2018</a>). Developing country drylands are particularly vulnerable due to a higher share of populations with lower income, lower physical access to nutritious food, social discrimination and other environmental factors that link to climate change. For example, countries such as Somalia, Yemen and Sudan faced recent and resurging challenges from an increase in desert locusts, the effects of which, in 2020, extended from East Africa through the Arabian Peninsula and Iran as far as India and Pakistan. <a class="reference-link" href="#Meynard--2020">Meynard et al. (2020)</a>  note that under climate change, some areas suffering from previous outbreaks may see changes in formation of swarms of <span class="condensed_italic" lang="">Schistocerca gregaria</span>. <a class="reference-link" href="#Salih--2020">Salih et al. (2020)</a>  recognise that attributing the 2020 swarms as a single event to climate change remains challenging, but highlight that projected temperature and rainfall increases in deserts and strong tropical cycles can create conditions conducive to the development, aggregation, outbreak and survival of locusts. <a class="reference-link" href="#Mandumbu--2017">Mandumbu et al. (2017)</a>  highlight how crop parasites such as <span class="condensed_italic" lang="">Striga</span> spp. <span class="condensed_italic" lang=""/> in southern Africa may benefit from higher temperatures and rainfall activating dormant seeds, while high winds aid their dispersal. Combined with increasing risks of erosion and soil fertility losses (<span class="condensed_italic" lang="">Striga</span> is able to tolerate drought and a low nitrogen environment), this can have important impacts on the yields of key dryland crops such as maize and pearl millet.</p>
                          <p class="Body_Body-justify" lang="en-GB">Human responses can exacerbate desertification processes under climate change conditions, even in deserts. Exploitation of mineral resources (e.g., lithium mining in Chile&#8217;s Atacama Desert) can cause human population changes as people flock to the area for work (<a class="reference-link" href="#Liu--2019">Liu et al., 2019</a>), increasing vulnerability due to, for example, soil erosion and salinisation, as well as increasing pressure on potable water for human consumption (<a class="reference-link" href="#Stringer--2021">Stringer et al., 2021</a>) and exhausting aquifers. Salinisation is projected to increase in the drylands due to climate change impacts in future (<a class="reference-link" href="#Mirzabaev--2019">Mirzabaev et al., 2019</a>). For example, in India, about 7 million hectares of arable land area is currently affected by salt (<a class="reference-link" href="#Sharma--2015">Sharma et al., 2015</a>; <a class="reference-link" href="#Sharma--2015">Sharma and Singh, 2015</a>). It is projected that unsustainable use of marginal quality waters in irrigation and neglect of drainage, combined with climate change impacts, will accelerate land salinisation in India, rendering another 9 million hectares salty and less productive by 2050 (<a class="reference-link" href="#ICAR-CSSRI--2015">ICAR-CSSRI, 2015</a>). This has important cost implications given that annually, 16.84 million tonnes of farm production valued at INR 230.19 billion is already lost in India due to salinity and associated problems (<a class="reference-link" href="#Sharma--2015">Sharma and Singh, 2015</a>). The literature further shows evidence of desertification of oases and irrigated lands in parts of northern China&#8217;s drylands (<a class="reference-link" href="#Wang--2020">Wang et al., 2020</a>), the Indian subcontinent&#8217;s deserts, as well as the Mesopotamian Arabian Desert (<a class="reference-link" href="#Ezcurra--2006">Ezcurra, 2006</a>; <a class="reference-link" href="#Dilshat--2015">Dilshat et al., 2015</a>).</p>
                        </div>
                      </div>
                    </div>
                    <div class="h1-container" id="CCP3.4">
                      <h1 class="Headings_H1-numbered" lang="en-GB">CCP3.4  Adaptations and Responses <span class="share-block"><img class="share-icon" src="../../share.png"/></span><button class="btn-ipcc btn btn-primary chapter-expand">Expand section</button></h1>
                      <div class="h1-siblings" id="h1-5-siblings">
                        <p class="Body_Body-justify" lang="en-GB">Adaptations to climate change impacts in human systems vary depending on exposure to risks, types of risks and responses, underlying social vulnerabilities and adaptive capacities, including access to resources, the extent of adaptation responses and the potential of these responses to reduce risk/vulnerability (Chapter 16; Singh and Chudasama 2021). Adaptations tend to be applied locally, tackling symptoms of the problem and proximate drivers (e.g., of desertification), rather than distant or external drivers (Morris et al., 2016; Adenle and Ifejika Speranza, 2021). Different groups require different kinds of supports and levers to enable them to follow adaptive pathways (M&#248;ller et al., 2017; Stringer et al., 2020) and face different barriers and limits to adaptation (Chapter 18). What constitutes an incremental adaptation in one location may be transformational in another. Spatial patterns of dryland resilience and adaptive capacity can be partly explained by access to livelihood capitals (Mazhar et al., 2021) and are shaped by prevailing structures and power dynamics. Supportive policies, institutions and good governance approaches can strengthen the adaptive capacities of dryland farmers, pastoralists and other resource users (<span class="condensed_italic" lang="">high confidence</span>) (<a class="reference-link" href="#Stringer--2017">Stringer et al., 2017</a>). Table CCP3.2  provides examples of illustrative adaptation options responding to major challenges of climate change and desertification in deserts and semiarid areas. Some adaptations present no-regrets options while others tackle desertification and/ or climate changes to different extents.</p>
                        <p class="Body_Body-justify" lang="en-GB">Adaptations to climate change, desertification, drought management (<a class="section-link" data-title="Global Variation in Portfolios of Risk Management" href="/report/ar6/wg2/chapter/chapter-17#17.2.2.2">Section 17.2.2.2</a>) and sustainable development activities largely overlap in drylands, pointing to synergies between them (<a class="reference-link" href="#Reichhuber--2019">Reichhuber et al., 2019</a>). For example, support for communal and flexible land tenure could bring about benefits across multiple dimensions, while attention to water as a limiting factor in drylands can link to multiple SDGs (<a class="reference-link" href="#Stringer--2021">Stringer et al., 2021</a>), as well as adaptations in natural systems, where improved forecasting and anticipatory science and management can be appropriate (<a class="reference-link" href="#Bradford--2018">Bradford et al., 2018</a>). Currently, more than 125 countries around the world, particularly in drylands, are setting land degradation neutrality (LDN) targets. LDN and its hierarchical response mechanisms of avoiding, reducing and reversing land degradation can provide an overarching resilience-based framework for adaptation at the national level (<a class="reference-link" href="#Mirzabaev--2019">Mirzabaev et al., 2019</a>; <a class="reference-link" href="#Orr--2017b">Orr et al., 2017b</a>; <a class="reference-link" href="#Cowie--2018">Cowie et al., 2018</a>) and support biodiversity conservation (<a class="reference-link" href="#Akhtar-Schuster--2017">Akhtar-Schuster et al., 2017</a>). However, achieving LDN will require a transparent decision and prioritisation process (Dallimer and Stringer, 2018), anchored in a socio-ecological systems approach (Okpara et al., 2018), with investment in all dimensions of an enabling environment, including inclusive policies and regulations, sustainable institutions, accessible finance and effective science&#8211;policy communications and interactions (Verburg et al., 2019; Allen et al., 2020). LDN calls for integrated land use planning to ensure land uses are optimised at a landscape scale to help balance competition for limited land resources and harness multiple benefits (<a class="reference-link" href="#Cowie--2018">Cowie et al., 2018</a>, Verburg et al., 2019), recognising that adaptations present synergies and trade-offs along various dimensions of sustainable development such as poverty reduction, enhancing food security and human health or providing improved access to clean energy, land, water, and finance (see <a class="section-link" data-title="Climate Resilient Development for the Poor and Pro-poor Adaptation Finance: Ensuring Climate Justice and Sustainable Development" href="/report/ar6/wg2/chapter/chapter-8#8.6">Section 8.6</a>). Distributional effects of adaptation options also may vary between different socioeconomic groups within countries or locally among communities, pushing social justice concerns to the fore (<a class="section-link" data-title="Future Vulnerabilities, Risks and Livelihood Challenges and Consequences for Equity and Sustainability" href="/report/ar6/wg2/chapter/chapter-8#8.4">Section 8.4</a>). Measures promoting particular adaptations need to take into account such consequences, as well as the potential for some adaptations to become maladaptive at scale.</p>
                        <p class="Body_Body-justify" lang="en-GB">Natural systems are also able to adapt to climate change, be adapted and become more resilient to desertification. For example, the root network architecture of the hyper-arid Negev Desert acacia trees has enabled them to withstand intensive cultivation and climate change-driven desertification (<a class="reference-link" href="#Winter--2015">Winter et al., 2015</a>), while vegetation-induced sand mounds (&#8216;coppice dunes&#8217;) in the Arabian Desert have reduced desertification through reducing wind erosion and enriching sand desert land with water and nutrients (<a class="reference-link" href="#Quets--2017">Quets et al., 2017</a>). Vegetation cover of psammophyte shrub species (in the &#8216;desert oasis transitional area&#8217;) surrounding the Dunhuang Oasis (northwest China) reduces oasis land degradation risk by reducing sand grain size and velocity of winds from the aeolian desert (<a class="reference-link" href="#Zhang--2007">Zhang et al., 2007</a>); while land use planning in Israel&#8217;s Negev Desert taking a &#8216;sharing&#8217; approach between cultivation and urbanisation has helped to minimise the external degrading effects of adjacent desert land ecosystems (<a class="reference-link" href="#Portnov--2004">Portnov and Safriel, 2004</a>). Scholars are nevertheless questioning the wider suitability of tree planting in drylands, given concerns for water availability and other ecosystem services (<a class="reference-link" href="#Veldman--2015">Veldman et al., 2015</a>; 2019; <a class="reference-link" href="#Bond--2019">Bond et al., 2019</a>). How natural dryland systems are managed following disturbances such as wildfire is important too. van den Elsen et al. (2020) found that establishing vegetation and mulch cover after a fire in a Mediterranean dryland ecosystem reduced soil erosion, helping maintain soil fertility and nutrients. However, different management objectives require different adaptations. For example, adaptation measures that reduce land degradation through reforestation could increase vulnerability to fire if they exclude ecologically sound fire management or are based on plant species that are fire prone. Combinations of different land management practices and governance approaches tackling a range of different stresses appear to best support sustainability and adaptation over the long term (van den Elsen et al., 2020).</p>
                        <p class="Body_Body-justify" lang="en-GB">Collective action can facilitate the implementation of adaptation responses and help tackle challenges associated with upscaling of successful land-based adaptations (<a class="reference-link" href="#Thomas--2018">Thomas et al., 2018</a>). However, a lack of coordination between stakeholders and across sectors can be problematic (<a class="reference-link" href="#Amiraslani--2018">Amiraslani et al., 2018</a>), showing the importance of multi-stakeholder engagement (<a class="reference-link" href="#De Vente--2016">De Vente et al., 2016</a>). Multi-stakeholder engagement is recognised as an essential part of desertification control, as well as vital in tackling climate change (<a class="reference-link" href="#Reed--2016">Reed and Stringer, 2016</a>), with participation taking place to different extents in different drylands according to the prevailing governance system. In China, the Grain for Green programme is an example of a large-scale ecological restoration programme securing local engagement through payments for ecosystem services (<a class="reference-link" href="#Kong--2021">Kong et al., 2021</a>). Transdisciplinary stakeholder engagement involving researchers and central and local governments in the Heihe River Basin in China&#8217;s arid and semiarid northwest, using an interdisciplinary &#8216;web&#8217; approach, enabled basin restoration. Multi-stakeholder efforts saw improvement in the condition of Juyan Lake and the surrounding catchment, increasing both the lake surface area and groundwater in downstream locations (<a class="reference-link" href="#Liu--2019">Liu et al., 2019</a>).</p>
                        <p class="Body_Body-justify" lang="en-GB">In the short- to medium-term, monitoring, prediction and early warning can support adaptation and, for example, help reduce negative impacts of SDS by mobilising emergency responses. Daily dust forecasts enable preparation to minimise risks from SDS to both human and natural systems (e.g., the World Meteorological Organization Sand and Dust Storm Warning Advisory and Assessment System: <a href="https://sds-was.aemet.es/forecast-products/dust-forecasts">https://sds-was.aemet.es/forecast-products/dust-forecasts</a>). Preparedness and emergency response procedures benefit from covering diverse sectors, such as public health surveillance, hospital services, air and ground transportation services, water and sanitation, food production systems and public awareness, suggesting the need for a coherent, multi-sector governance approach. Longer-term actions include prioritising sustainable land management (<a class="reference-link" href="#Middleton--2017">Middleton and Kang, 2017</a>), based on IKLK and modern science (<a class="reference-link" href="#Verner--2012">Verner, 2012</a>), along with the investment of financial and human capital in supporting these measures. Devolved adaptation finance in dryland areas of, for example, Kenya (<a class="reference-link" href="#Nyangena--2017">Nyangena and Roba, 2017</a>) and Mali (<a class="reference-link" href="#Hesse--2016">Hesse, 2016</a>) has yielded promising insights, highlighting the importance of climate information services and local government support for community prioritisation of adaptation activities. Such actions can enable substantial benefits for poor and marginalised men and women. Among international institutional measures, a global coalition to combat SDS was launched at the United Nations Convention to Combat Desertification Conference of Parties (UNCCD COP14) in 2019, which could help to better mobilise a global response to SDS. Similarly, there have been calls for increased investment in regional institutions such as the Desert Locust Control Organisation for Eastern Africa to both pre-empt and tackle locust plagues (<a class="reference-link" href="#Salih--2020">Salih et al., 2020</a>), requiring transboundary cooperation.</p>
                        <p class="Body_Body-justify" lang="en-GB">There is <span class="condensed_italic" lang="">high agreement </span> and <span class="condensed_italic" lang="">robust evidence</span> that shifting emphasis to proactive risk mitigation, including solutions for drought, flooding, erosion and dust management, instead of exclusive focus on disaster management, reduces vulnerability and improves adaptive capacity (<a class="section-link" data-title="Constraints Leading to Limits to Adaptation" href="/report/ar6/wg2/chapter/chapter-16#16.4.3.2">Section 16.4.3.2</a>; 16.5.2.3.4; <a class="reference-link" href="#Sivakumar--2005">Sivakumar, 2005</a>; <a class="reference-link" href="#Grobicki--2015">Grobicki et al., 2015</a>; <a class="reference-link" href="#Wieriks--2015">Wieriks and Vlaanderen, 2015</a>; <a class="reference-link" href="#Aguilar-Barajas--2016">Aguilar-Barajas et al., 2016</a>; <a class="reference-link" href="#Runhaar--2016">Runhaar et al., 2016</a>; <a class="reference-link" href="#Wilhite--2018">Wilhite and Pulwarty, 2018</a>; <a class="reference-link" href="#Wilhite--2019">Wilhite, 2019</a>). It also underscores the LDN response hierarchy avoid &gt; reduce &gt; reverse (Orr et al., 2017a). Nevertheless, <span class="condensed_italic" lang="">ex ante</span> drought and flood risk mitigation has been adopted in limited dryland settings, despite it being preferable to increase preparedness before it happens, provide incentives for adaptation instead of insurance, provide insurance instead of relief and provide relief instead of regulation (<a class="reference-link" href="#Sivakumar--2005">Sivakumar, 2005</a>). Yet, providing disaster relief is often more publicly visible and politically expedient, despite its social, economic and environmental challenges. The absence of proactive risk mitigation and resulting crisis management increases vulnerability, increases reliance on government support, reduces self-reliance and increases costs (<a class="reference-link" href="#Grobicki--2015">Grobicki et al., 2015</a>; <a class="reference-link" href="#Wilhite--2019">Wilhite, 2019</a>), as well as hindering progress towards the SDGs. In the case of drought and flooding, major obstacles for the transition from reactive management to proactive drought risk mitigation include path dependencies and lack of knowledge about relative costs and benefits of reactive versus proactive approaches. This lack of information can deter large-scale and long-term investments into proactive approaches (<a class="reference-link" href="#Mirzabaev--2016">Mirzabaev, 2016</a>).</p>
                        <p class="Body_Body-justify" lang="en-GB">A range of risk mitigation and adaptation measures can be taken, to address drought, desertification and other climate change-related challenges in deserts and semiarid areas, some of which can be both proactive and reactive. These include <span class="condensed_italic" lang="">inter alia</span>:</p>
                        <ul>
                          <li class="Body_Lists_List_unnumbered-first" lang="en-GB">Implementing policies, public advocacy and social media campaigns that improve water use efficiency, especially in agriculture and industry, which can foster behavioural changes and reduce water consumption (<a class="reference-link" href="#Yusa--2015">Yusa et al., 2015</a>; <a class="reference-link" href="#Tsakiris--2017">Tsakiris, 2017</a>; <a class="reference-link" href="#Booysen--2019">Booysen et al., 2019</a>).</li>
                          <li class="Body_Lists_List_unnumbered-continued" lang="en-GB">Integrating access to insurance, financial services, savings programmes and cash transfers into policies to increase the effectiveness of, for example, drought responses. Such efforts can result in significant cost savings (<a class="reference-link" href="#Berhane--2014">Berhane et al., 2014</a>; <a class="reference-link" href="#Bazza--2018">Bazza et al., 2018</a> ; <a class="reference-link" href="#Guimar&#227;es Nobre--2019">Guimar&#227;es Nobre et al., 2019</a>).</li>
                          <li class="Body_Lists_List_unnumbered-continued" lang="en-GB">Developing robust early warning systems that provide information and improve knowledge surrounding drought and SDS to enable early recovery (<a class="reference-link" href="#Wilhite--2019">Wilhite, 2019</a>), also considering vulnerability and impact assessments (i.e., who is at greatest risk).</li>
                          <li class="Body_Lists_List_unnumbered-continued" lang="en-GB">Managing and storing water, including using methods that draw on Indigenous knowledge (<a class="reference-link" href="#Stringer--2021">Stringer et al., 2021</a>), water transfers and trade, all of which can reduce costs and provide timely adaptations to drought, supporting agricultural productivity and rural livelihoods (<a class="reference-link" href="#Harou--2010">Harou et al., 2010</a>; <a class="reference-link" href="#Hurlbert--2018">Hurlbert, 2018</a>).</li>
                          <li class="Body_Lists_List_unnumbered-continued" lang="en-GB">Implementing restoration, reclamation and landscape heterogeneity strategies, promoting ecosystem resilience to wind erosion and dust abatement (<a class="reference-link" href="#Duniway--2019">Duniway et al., 2019</a>), as well as restoring important ecosystem services at a catchment scale.</li>
                          <li class="Body_Lists_List_unnumbered-continued" lang="en-GB">Preventing soil erosion, providing of dust abatement and enhancing biodiversity by changing grazing techniques (e.g., rotational grazing), facilitating herd mobility, protecting rangeland areas from fragmentation, promoting common tenure and access rights on grazing land, enabling rapid post-fire restoration efforts, minimum tillage, sustainable land management, integrated landscape management, planting and caring for non-irrigated indigenous trees and other vegetation (<a class="reference-link" href="#Middleton--2017">Middleton and Kang, 2017</a>).</li>
                          <li class="Body_Lists_List_unnumbered-last" lang="en-GB">Creating drought-tolerant food crops through participatory plant breeding (<a class="reference-link" href="#Grobicki--2015">Grobicki et al., 2015</a>) and investment in research and development of drought-resistant varieties (<a class="reference-link" href="#Basu--2017">Basu et al., 2017</a>; <a class="reference-link" href="#Mottaleb--2017">Mottaleb et al., 2017</a>; <a class="reference-link" href="#Dar--2020">Dar et al., 2020</a>), alongside adjusted planting and harvesting periods (<a class="reference-link" href="#Frischen--2020">Frischen et al., 2020</a>). Similar to other adaptations, the net economic benefits of <span class="condensed_italic" lang="">ex ante</span> resilient plant development far outweigh the research investment (<a class="reference-link" href="#Basu--2017">Basu et al., 2017</a>; <a class="reference-link" href="#Mottaleb--2017">Mottaleb et al., 2017</a>; <a class="reference-link" href="#Dar--2020">Dar et al., 2020</a>).</li>
                        </ul>
                        <p class="Body_Body-justify" lang="en-GB">Many of these measures can also support climate change mitigation efforts in drylands. Uptake of adaptation measures is often grounded in clear communications and information provision to support behavioural changes, taking into account local risk aversion and risk perceptions (<a class="reference-link" href="#Zeweld--2018">Zeweld et al., 2018</a>; <a class="reference-link" href="#Jellason--2019">Jellason et al., 2019</a>). Building capacity by improving the knowledge base and access to information, as well as to financial and other resources, encourages vulnerable economic sectors and people to adopt more self-reliant measures that promote more integrated and sustainable use of natural resources <span class="condensed_italic" lang=""> (high confidence</span>) (<a class="reference-link" href="#Sivakumar--2005">Sivakumar, 2005</a>; <a class="reference-link" href="#Wieriks--2015">Wieriks and Vlaanderen, 2015</a>; <a class="reference-link" href="#Aguilar-Barajas--2016">Aguilar-Barajas et al., 2016</a>; <a class="reference-link" href="#Middleton--2017">Middleton and Kang, 2017</a>; <a class="reference-link" href="#Wilhite--2019">Wilhite, 2019</a>). Engaging natural resource users as active participants in planning and technology adoption using extension services, financial grants and services geared to the local area, can build resilience and drive changes in practices (<a class="reference-link" href="#Webb--2018">Webb and Pierre, 2018</a>), while approaches such as Integrated Water Resources Management can support adaptation and drought risk management, including in dryland urban megacities (<a class="reference-link" href="#Stringer--2021">Stringer et al., 2021</a>) and in deserts and semiarid areas where precipitation trends remain stable yet other pressures on water are growing (<a class="reference-link" href="#Reichhuber--2019">Reichhuber et al., 2019</a>).</p>
