                                <p class="Body_Tables_Table_body-black-left" lang="en-US">Climate change is projected to facilitate the spread of invasive species that can have profound impacts on dryland ecosystem functioning leading to the loss of biodiversity</p>
                                <p class="Body_Tables_Table_body-black-left" lang="en-US">Biomass harvesting and selective clearing; utilising intense fires to manage encroachment, combined browsing and fire management</p>
                                <p class="Body_Tables_Table_body-black-left" lang="en-US">Rewilding in open ecosystems and reintroduction of mega-herbivores (e.g., in parts of Africa) to counter negative impact of woody encroachment; chemical removal of undesirable encroached woody species</p>
                              </td>
                              <td class="Table Body Body">
                                <p class="Body_Tables_Table_body-black-left" lang="en-US"><a class="reference-link" href="#Mirzabaev--2019">Mirzabaev et al. (2019)</a>; <a class="reference-link" href="#Davies--2008">Davies and Nori (2008)</a>; <a class="reference-link" href="#Stafford--2017">Stafford et al. (2017)</a>; <a class="reference-link" href="#Cromsigt--2018">Cromsigt et al. (2018)</a>; <a class="reference-link" href="#Ding--2019">Ding and Eldridge (2019)</a></p>
                              </td>
                            </tr>
                            <tr class="Table _idGenTableRowColumn-36">
                              <td class="Table Body Body">
                                <p class="Body_Tables_Table_body-black-left" lang="en-US">Droughts</p>
                              </td>
                              <td class="Table Body Body">
                                <p class="Body_Tables_Table_body-black-left" lang="en-US">Proactive drought risk mitigation compared with reactive crisis management approaches</p>
                                <p class="Body_Tables_Table_body-black-left" lang="en-US">Promoting collective action in livestock management, optimising livestock policies and feed subsidies, interventions in livestock markets during drought onset</p>
                                <p class="Body_Tables_Table_body-black-left" lang="en-US">Expanding sustainable irrigation and shifting to drought-resistant crops and crop varieties</p>
                                <p class="Body_Tables_Table_body-black-left" lang="en-US">Environmentally sustainable seawater desalination</p>
                                <p class="Body_Tables_Table_body-black-left" lang="en-US">Promoting behavioural changes for more efficient residential water use; moving away from water-intensive agricultural practices in arid areas; harvesting rainwater by local communities; empowering women and engagement in local climate adaptation planning, community-based early warning systems, Integrated Water Resources Management, water governance benchmarking, and exploration of palaeo channels as freshwater sources using remote sensing</p>
                              </td>
                              <td class="Table Body Body">
                                <p class="Body_Tables_Table_body-black-left" lang="en-US"><a class="reference-link" href="#Morton--2002">Morton and Barton (2002)</a>; <a class="reference-link" href="#Abebe--2008">Abebe et al. (2008)</a>; <a class="reference-link" href="#Alary--2014">Alary et al. (2014)</a>; <a class="reference-link" href="#Catley--2014">Catley et al. (2014)</a>; <a class="reference-link" href="#Mohamed--2016">Mohamed et al. (2016)</a></p>
                              </td>
                            </tr>
                            <tr class="Table _idGenTableRowColumn-9">
                              <td class="Table Body Body">
                                <p class="Body_Tables_Table_body-black-left" lang="en-US">Grassland and savanna degradation</p>
                              </td>
                              <td class="Table Body Body">
                                <p class="Body_Tables_Table_body-black-left" lang="en-US">Prescribed fire and tree cutting, invasive plant removal, grazing management, reintroduction of grasses and forbs, restoration of soil disturbance</p>
                              </td>
                              <td class="Table Body Body">
                                <p class="Body_Tables_Table_body-black-left" lang="en-US">For review, see <a class="reference-link" href="#Buisson--2019">Buisson et al. (2019)</a></p>
                              </td>
                            </tr>
                            <tr class="Table _idGenTableRowColumn-15">
                              <td class="Table Body Body">
                                <p class="Body_Tables_Table_body-black-left" lang="en-US">Rangeland degradation (decreasing fodder quality or yield, invasion by fodder poor value species/refusals)</p>
                              </td>
                              <td class="Table Body Body">
                                <p class="Body_Tables_Table_body-black-left" lang="en-US">Promote local and regional herd mobility during the growing season to avoid intense grazing pressure on growing annual herbaceous vegetation of rangelands near settlements, water points, markets</p>
                                <p class="Body_Tables_Table_body-black-left" lang="en-US">Moderate grazing facilitates grass tillering and herbaceous flora diversity</p>
                                <p class="Body_Tables_Table_body-black-left" lang="en-US">Ecological restoration of grazing ecosystems by sowing a mixture of zone-typical dominant species and life forms of plants on severely degraded land; clearance of invasives</p>
                                <p class="Body_Tables_Table_body-black-left" lang="en-US">Ecological restoration of arid ecosystems by sowing a mixture of zone-typical dominant species and life forms of fodder plants with partial (ribbon) treatment of pasture lands</p>
                                <p class="Body_Tables_Table_body-black-left" lang="en-US">Ecological restoration of secondary salted irrigated soils using halophytes</p>
                              </td>
                              <td class="Table Body Body">
                                <p class="Body_Tables_Table_body-black-left" lang="en-US"><a class="reference-link" href="#De Vries--1982">De Vries and Djit&#232;ye (1982)</a>; <a class="reference-link" href="#Hiernaux--1994">Hiernaux et al. (1994)</a>; <a class="reference-link" href="#Hiernaux--2006">Hiernaux and Le Hou&#233;rou (2006)</a>; <a class="reference-link" href="#Reed--2015">Reed et al. (2015)</a></p>
                              </td>
                            </tr>
                            <tr class="Table _idGenTableRowColumn-11">
                              <td class="Table Body Body" rowspan="2">
                                <p class="Body_Tables_Table_body-black-left" lang="en-US">Poor livestock productivity (reproduction/dairy/meat) in relation with poor seasonal nutrition</p>
                              </td>
                              <td class="Table Body Body">
                                <p class="Body_Tables_Table_body-black-left" lang="en-US">Promote seasonal-regional herd mobility to optimise the use of complementary fodder resources (rangelands, browses, crop residues); implies institutionalised communal access, community agreements and infrastructures (water points, livestock path, grazing reserves, access to education, health care, markets for transhumant population); cross state boundary mobility implies international agreements such as promoted by N&#8217;djamena meeting (Declaration 2013)</p>
                              </td>
                              <td class="Table Body Body">
                                <p class="Body_Tables_Table_body-black-left" lang="en-US"><a class="reference-link" href="#Turner--1993">Turner (1993)</a>; <a class="reference-link" href="#Schlecht--2004">Schlecht et al. (2004)</a>; <a class="reference-link" href="#Fern&#225;ndez-Rivera--2005">Fern&#225;ndez-Rivera et al. (2005)</a>; <a class="reference-link" href="#Bonnet--2011">Bonnet and Herault (2011)</a>; <a class="reference-link" href="#Hiernaux--2016">Hiernaux et al. (2016)</a></p>
                              </td>
                            </tr>
                            <tr class="Table _idGenTableRowColumn-22">
                              <td class="Table Body Body">
                                <p class="Body_Tables_Table_body-black-left" lang="en-US">Promote strategic supplementation of reproductive and young animals by the end of dry and early wet season</p>
                                <p class="Body_Tables_Table_body-black-left" lang="en-US">Secondary effect on excretion quantity/ quality to manure croplands</p>
                              </td>
                              <td class="Table Body Body">
                                <p class="Body_Tables_Table_body-black-left" lang="en-US">Many trials in research stations and on farm: for example Sangar&#233; et al. (2002a; 2002b); <a class="reference-link" href="#Osbahr--2011">Osbahr et al. (2011)</a>; <a class="reference-link" href="#Sanogo--2011">Sanogo (2011)</a></p>
                              </td>
                            </tr>
                            <tr class="Table _idGenTableRowColumn-27">
                              <td class="Table Body Body">
                                <p class="Body_Tables_Table_body-black-left" lang="en-US">Decrease trend in cropland soil fertility</p>
                              </td>
                              <td class="Table Body Body">
                                <p class="Body_Tables_Table_body-black-left" lang="en-US">Rotational corralling of livestock in field during the dry season (and on cleared fallow the following year in the wet season) to ensure maximum retrieval of organic matter and nutrients from faeces and urine deposited</p>
                                <p class="Body_Tables_Table_body-black-left" lang="en-US">Application of mineral N and P fertilizers as placed (per pocket) microdoses (50&#8211;80 kg/ha) to intensify staple crop production</p>
                                <p class="Body_Tables_Table_body-black-left" lang="en-US">Impact on soil fertility, rain use efficiency, vegetation cover, organic matter production and recycling</p>
                                <p class="Body_Tables_Table_body-black-left" lang="en-US">Legume association with cereals (millet&#8211;cowpea; sorghum&#8211;groundnut)</p>
                                <p class="Body_Tables_Table_body-black-left" lang="en-US">Adapting cultivars and cropping techniques (calendar, fertilization).</p>
                              </td>
                              <td class="Table Body Body">
                                <p class="Body_Tables_Table_body-black-left" lang="en-US"><a class="reference-link" href="#Pieri--1989">Pieri (1989)</a>; Breman et al. (2001); <a class="reference-link" href="#Gandah--2003">Gandah et al. (2003)</a>; <a class="reference-link" href="#Manlay--2004">Manlay et al. (2004)</a>; <a class="reference-link" href="#Abdoulaye--2005">Abdoulaye and Sanders (2005)</a>; Reij et al. (2005); <a class="reference-link" href="#Akponikpe--2008">Akponikpe (2008)</a>; <a class="reference-link" href="#Bagayoko--2011">Bagayoko et al. (2011)</a>; <a class="reference-link" href="#Bationo--2011">Bationo et al. (2011)</a>; <a class="reference-link" href="#Hiernaux--2009b">Hiernaux et al. (2009b)</a>; Sendzimir et al. (2011); <a class="reference-link" href="#Turner--2015">Turner and Hiernaux (2015)</a>; Weston et al. (2015; <a class="reference-link" href="#Reij--2016">Reij and Garrity (2016)</a></p>
                              </td>
                            </tr>
                            <tr class="Table _idGenTableRowColumn-37">
                              <td class="Table Body Body">
                                <p class="Body_Tables_Table_body-black-left" lang="en-US">Salinisation and groundwater depletion</p>
                              </td>
                              <td class="Table Body Body">
                                <p class="Body_Tables_Table_body-black-left" lang="en-US">Indigenous and scientific adaptive practices to cope with salinity</p>
                                <p class="Body_Tables_Table_body-black-left" lang="en-US">Farmers in waterlogged saline areas harness subsurface drainage, salt tolerant crop varieties, land-shaping techniques and agroforestry to adapt to salinity and waterlogging risks</p>
                                <p class="Body_Tables_Table_body-black-left" lang="en-US">Locally adapted crops and landraces and the traditional tree- and animal-based means to sustain livelihoods in face of salinisation</p>
                              </td>
                              <td class="Table Body Body">
                                <p class="Body_Tables_Table_body-black-left" lang="en-US"><a class="reference-link" href="#Sengupta--2002">Sengupta (2002)</a>; <a class="reference-link" href="#Buechler--2005">Buechler and Mekala (2005)</a>; <a class="reference-link" href="#Wassmann--2009">Wassmann et al. (2009)</a>; Singh (2010); Jnandabhiram and Sailen Prasad (2012); Manga et al. (2015); <a class="reference-link" href="#Sharma--2015">Sharma and Singh (2015)</a>; <a class="reference-link" href="#Gupta--2016">Gupta and Dagar (2016)</a>; Nikam et al. (2016); Bundela et al. (2017); <a class="reference-link" href="#Sharma--2017">Sharma and Singh (2017)</a>; Patel et al. (2020); <a class="reference-link" href="#Singh--2020b">Singh et al. (2020b)</a>; Sharma, (2016); <a class="reference-link" href="#Mirzabaev--2019">Mirzabaev et al. (2019)</a></p>
                              </td>
                            </tr>
                            <tr class="Table _idGenTableRowColumn-38">
                              <td class="Table Body Body">
                                <p class="Body_Tables_Table_body-black-left" lang="en-US">Sand and dust storms</p>
                              </td>
                              <td class="Table Body Body">
                                <p class="Body_Tables_Table_body-black-left" lang="en-US">Use of live windbreaks or shelterbelts, protection of the loose soil particles through the use of crop residues or plastic sheets or chemical adhesives, increasing the cohesion of soil particles by mechanical tillage operations or soil mulching</p>
                                <p class="Body_Tables_Table_body-black-left" lang="en-US">Use of perennial plant species that can trap sediments (sand and fallen dust) and form sandy mounds, such as <span class="condensed_italic" lang="">Haloxylon salicornicum</span>, <span class="condensed_italic" lang="">Cyperus conglomerates</span>, <span class="condensed_italic" lang="">Lycium shawii</span> and <span class="condensed_italic" lang="">Nitraria retusa</span></p>
                                <p class="Body_Tables_Table_body-black-left" lang="en-US">In the Sahel, promote herbaceous (not woody plants) to trap sand: annuals such as <span class="condensed_italic" lang="">Colocynthis vulgaris</span>, <span class="condensed_italic" lang="">Chrozophora senegalensis</span>, <span class="condensed_italic" lang="">Farsetia ramosissima</span>; perennials such as <span class="condensed_italic" lang="">Cyperus conglomeratus</span>, <span class="condensed_italic" lang="">Leptadenia hastate</span></p>
                                <p class="Body_Tables_Table_body-black-left" lang="en-US">In the Sahel, leaving at least part of the crop residues (stalks) on the soil during the dry season (100 kg dry matter per hectare has already had significant effect on wind erosion, many trials on millet in Niger); trampling by grazing livestock improves the partial burying of the residues</p>
                                <p class="Body_Tables_Table_body-black-left" lang="en-US">Improve monitoring, prediction and early warning to mobilise emergency responses for human systems and prioritise long-term sustainable land management measures; establish a Global Dust&#8211;Health Early Warning System (building on the Sand and Dust Storm Warning Advisory and Assessment System (SDS-WAS) initiative); multi-sectoral preparedness and response including public health, hospital services, air and ground transportation and communication services</p>
                              </td>
                              <td class="Table Body Body">
                                <p class="Body_Tables_Table_body-black-left" lang="en-US">Ahmed et al. (2016); <a class="reference-link" href="#Al-Hemoud--2017">Al-Hemoud et al. (2017)</a>; <a class="reference-link" href="#Sivakumar--2005">Sivakumar (2005)</a>; <a class="reference-link" href="#Hiernaux--2009a">Hiernaux et al. (2009a)</a>; <a class="reference-link" href="#Hiernaux--2016">Hiernaux et al. (2016)</a>; <a class="reference-link" href="#Pierre--2018">Pierre et al. (2018)</a>; Lamers et al. (1995); Michels et al. (1998); Bielders et al. (2004),UNEP (2016); <a class="reference-link" href="#UNEP--1992">UNEP (1992)</a></p>
                              </td>
                            </tr>

                        </table>

                    <div class="h1-container" id="frequently-asked-questions">
                      <h1 class="Body_Box_FAQ_FAQ-Box_head" lang="en-US">Frequently Asked Questions <span class="share-block"><img class="share-icon" src="../../share.png"/></span><button class="btn-ipcc btn btn-primary chapter-expand">Expand section</button></h1>
                      <div class="h1-siblings" id="h1-7-siblings"/>
                      <div class="h2-container" id="FAQ">
                        <h2 class="Body_Box_FAQ_FAQ-Box_subhead" lang="en-GB">FAQ CCP3.1  | How has climate change already affected drylands and why are they so vulnerable?<span class="arrow-up"/><span class="arrow-down"/><span class="share-block"><img class="share-icon" src="../../share.png"/></span></h2>
                        <div class="h2-siblings" id="h2-8-siblings">
                          <p class="Body_Box_FAQ_FAQ-Box_body" lang="en-US">
                            <span class="condensed_italic" lang="">Human-caused climate change has so far had mixed effects across the drylands, leading to fewer trees and less biodiversity in some areas and increased grass and tree cover in others. In those dryland areas with increasing aridity, millions of people face difficulties in maintaining their livelihoods, particularly where there is water scarcity. </span>
                          </p>
                          <p class="Body_Box_FAQ_FAQ-Box_body" lang="en-US">Drylands include the hottest and most arid areas on Earth. Human-caused climate change has been intensifying this heat and aridity in some places, increasing temperatures more across global drylands than in humid areas. In areas which are hotter and drier, tree death has occurred and in some locations bird species have been lost. Climate change has reduced rainfall in some dryland areas and increased rainfall in other areas. Increased rainfall, combined with the plant-fertilizing effect of more carbon dioxide in the atmosphere, can increase grass and shrub production in dryland areas. Because water is scarce in drylands and aridity limits the productivity of agriculture, millions of people living in drylands have faced severe difficulties in maintaining their livelihoods. This challenge is exacerbated by non-climate change factors, such as low levels of infrastructure, remoteness and limited livelihood options that are less dependent on scarce natural resources. High temperatures in drylands increase the vulnerability of people to potential heat-related illnesses and deaths from heat under continued climate change.</p>
                        </div>
                        <h2 class="Body_Box_FAQ_FAQ-Box_subhead" lang="en-GB">FAQ CCP3.2  | How will climate change impact the world&#8217;s drylands and their people?<span class="arrow-up"/><span class="arrow-down"/><span class="share-block"><img class="share-icon" src="../../share.png"/></span></h2>
                        <div class="h2-siblings" id="h2-9-siblings">
                          <p class="Body_Box_FAQ_FAQ-Box_body" lang="en-US">
                            <span class="condensed_italic" lang="">Climate change is projected to lead to higher temperatures across global drylands. Many drylands also risk more irregular rainfall leading to increased irregularity in crop yields and increased water insecurity where less rainfall is projected, which may have profound implications for both dryland ecosystems and their human inhabitants. </span>
                          </p>
                          <p class="Body_Box_FAQ_FAQ-Box_body" lang="en-US">There is, however, considerable uncertainty about the changes that may occur in drylands in the future and how people and ecosystems will be affected. In some drylands, higher temperatures and declining rainfall have increased aridity. However, this is not a global trend as many drylands are experiencing increases in vegetation cover and rainfall. Both the amount of rainfall and its seasonality have changed in many dryland areas, associated with natural variability and warming.</p>
                          <p class="Body_Box_FAQ_FAQ-Box_body" lang="en-US">Most climate models project increased rainfall in tropical drylands, but more variability. High natural climatic variability in drylands makes predictions uncertain. Understanding future impacts is further complicated by many interacting factors such as land use change and urbanisation that affect the condition of drylands. Future trends in sand and dust storm activity are also uncertain and will not be the same everywhere, but there will likely  be increases in some regions (e.g., the USA) in the long term. The impacts of climate change in deserts and semiarid areas may have substantial implications globally: for agriculture, biodiversity, health, trade and poverty, as well as potentially, for conflicts and migration. Increasing temperatures and more irregular rainfall are expected to affect soil and water and contribute to tree death and loss of biodiversity. In other places, woody encroachment onto savannas may increase, in response to the combination of land use change, changes in rainfall, fire suppression and CO<span class="subscript CharOverride-1" lang="">2</span> fertilization. Crop yields are projected to decline in some areas, with adverse impacts on food security. The potential for conflicts and migration is primarily associated with socioeconomic development, while links to climate change remain uncertain and lack evidence.</p>
                          <div class="_idGenObjectLayout-2">
                            <div class="FAQ-Box_Header-continued" id="_idContainer014">
                              <p class="Body_Box_FAQ_FAQ-Box_continued-prev-page" lang="en-US">FAQ 5.1</p>
                            </div>
                          </div>
                        </div>
                        <h2 class="Body_Box_FAQ_FAQ-Box_subhead" lang="en-GB">FAQ CCP3.3  | What can be done to support sustainable development in desert and semiarid areas, given projected climate changes?<span class="arrow-up"/><span class="arrow-down"/><span class="share-block"><img class="share-icon" src="../../share.png"/></span></h2>
                        <div class="h2-siblings" id="h2-10-siblings">
                          <p class="Body_Box_FAQ_FAQ-Box_body" lang="en-US">
                            <span class="condensed_italic" lang="">Water is a major limiting factor in drylands. Many efforts to support sustainable development aim to improve water availability, access and quality, ranging from large engineering solutions that move or desalinise water, to herders&#8217; migrations with their animals to locations that have water, to land management and water harvesting practices that conserve water and support land cover. These solutions draw on IKLK and innovative science, and can help to address multiple Sustainable Development Goals. </span>
                          </p>
                          <p class="Body_Box_FAQ_FAQ-Box_body" lang="en-US">Different desert and semiarid areas can benefit from different incremental and transformational solutions to move toward sustainable development under climate change. In some dryland areas facing critical water shortages, transformational adaptations may be needed; for example, large-scale water desalination when they have access to sea water, despite high energy use and negative environmental impacts of waste brine. In dryland agricultural areas across the world, incremental adaptations include water conservation measures, use of improved crop varieties or increasing herd mobility. What counts as a transformational change in some places may be incremental in others. Often solutions can target multiple development goals. For example, water harvesting can make water available during drought, buffering water scarcity impacts, while also supporting food production, agricultural livelihoods and human health. Land-based approaches, e.g. restoration of grassland, shrubland, and savanna ecosystems, are important for ensuring ecological integrity, soil protection and preventing livelihoods from being undermined as a result of growing extreme weather events. It is important that policies, investments and interventions that aim to support sustainable development take into account which groups are likely  to be most affected by climate change. Those people directly dependent on natural resources for their survival are generally most vulnerable but least able to adapt. The capacity to translate IKLK and experience into actions can require external support. Governments and other stakeholders can help by investing in early warning systems, providing climate information, realigning policies and incentives for sustainable management, investing in supporting infrastructures, alongside developing alternative livelihood options that are less exposed and sensitive to climate change. Involving all relevant stakeholders is important. For example, in China, the Grain for Green programme secured local engagement by paying people to manage the environment more sustainably. At a global level, important groups have emerged to cooperate and offer solutions around issues such as sand and dust storms, and integrated drought management. Efforts are needed across all scales from local to global to support sustainable development in desert and semiarid areas, given projected climate changes.</p>
                        </div>
                      </div>

                            <p class="Body_Footnotes" lang="en-US"><a class="_idFootnoteAnchor _idGenColorInherit" href="ccp3.html#footnote-001-backlink">1</a> In this Report, the following summary terms are used to describe the available evidence: limited, medium, or robust; and for the degree of agreement: low, medium, or high. A level of confidence is expressed using five qualifiers: very low, low, medium, high, and very high, and typeset in italics, e.g., <span class="light_condensed_italic" lang="">medium confidence</span>. For a given evidence and agreement statement, different confidence levels can be assigned, but increasing levels of evidence and degrees of agreement are correlated with increasing confidence.</p>
                          </div>
                          <div class="_idFootnote" id="footnote-000">
                            <p class="Body_Footnotes" lang="en-US"><a class="_idFootnoteAnchor _idGenColorInherit" href="ccp3.html#footnote-000-backlink">2</a> In this Report, the following terms have been used to indicate the assessed likelihood of an outcome or a result: virtually certain 99&#8211;100% probability, very likely  90&#8211;100%, likely  66&#8211;100%, about as likely  as not 33&#8211;66%, unlikely  0&#8211;33%, very unlikely  0&#8211;10%, and exceptionally unlikely  0&#8211;1%. Additional terms (extremely likely : 95&#8211;100%, more likely  than not &gt;50&#8211;100%, and extremely unlikely  0&#8211;5%) may also be used when appropriate. Assessed likelihood is typeset in italics, e.g., <span class="light_condensed_italic" lang="">very likely </span>). This Report also uses the term &#8216;<span class="light_condensed_italic" lang="">likely </span> range&#8217; to indicate that the assessed likelihood of an outcome lies within the 17&#8211;83% probability range.</p>
