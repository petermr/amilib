                      <div id="chapter-citation">
                        <p class="Headings_Chapter_citation" lang="en-GB">This Cross-Chapter Paper should be cited as:</p>
                        <p class="Body_Chapter_citation" lang="en-GB">Mirzabaev, A., L.C. Stringer, T.A. Benjaminsen, P. Gonzalez, R. Harris, M. Jafari, N. Stevens, C.M. Tirado, and S. Zakieldeen, 2022: Cross-Chapter Paper 3: Deserts, Semiarid Areas and Desertification. In: <span class="light_condensed_italic" lang="">Climate Change 2022: Impacts, Adaptation and Vulnerability. </span>Contribution of Working Group II to the Sixth Assessment Report of the Intergovernmental Panel on Climate Change [H.-O. P&#246;rtner, D.C. Roberts, M. Tignor, E.S. Poloczanska, K. Mintenbeck, A. Alegr&#237;a, M. Craig, S. Langsdorf, S. L&#246;schke, V. M&#246;ller, A. Okem, B. Rama (eds.)]. Cambridge University Press, Cambridge, UK and New York, NY, USA, pp. 2195&#8211;2231, doi:10.1017/9781009325844.020.</p>

                    <div class="h1-container" id="Executive">
                      <h1 class="Headings_H1-unnumbered" lang="en-GB">Executive Summary <span class="share-block"><img class="share-icon" src="../../share.png"/></span><button class="btn-ipcc btn btn-primary chapter-expand">Expand section</button></h1>
                      <div class="h1-siblings" id="h1-1-siblings">
                        <div class="h4-container" id="Introduction">
                          <h4 class="Headings_H4-unnumbered" lang="de-DE">Introduction <span class="arrow-up"/><span class="arrow-down"/><span class="share-block"><img class="share-icon" src="../../share.png"/></span></h4>
                          <div class="h4-siblings" id="h4-1-siblings">
                            <p class="Body_Body-justify" lang="en-GB">This cross-chapter paper on &#8216;Deserts, semiarid areas and desertification&#8217; updates and extends <a class="section-link" data-title="Oceans and Coastal Ecosystems and their Services" href="/report/ar6/wg2/chapter/chapter-3">Chapter 3</a>  on &#8216;Desertification&#8217; in the IPCC Special Report on Climate Change and Land (SRCCL) (<a class="reference-link" href="#Mirzabaev--2019">Mirzabaev et al., 2019</a>). It assesses new information and links it to the findings across the chapters of Working Group II&#8217;s contribution as well as relevant chapters of Working Group I&#8217;s contribution to the IPCC Sixth Assessment Report (AR6), with an added focus on deserts which were outside the scope of the SRCCL.</p>
                          </div>
                        </div>
                        <div class="h4-container" id="Where">
                          <h4 class="Headings_H4-unnumbered" lang="de-DE">Where are we now: Observed impacts and adaptation responses <span class="arrow-up"/><span class="arrow-down"/><span class="share-block"><img class="share-icon" src="../../share.png"/></span></h4>
                          <div class="h4-siblings" id="h4-2-siblings">
                            <p class="Body_Body-justify" lang="en-GB"><span class="bold_condensed" lang="en-GB">Deserts and semiarid areas have already been affected by climate change, with some areas experiencing increases in aridity. Mixed trends of decreases and increases in vegetation productivity have been observed, depending on the time period, geographic region, detection methods used and vegetation type under consideration (</span><span class="bold_condensed_italic" lang="">high confidence</span><span class="superscript _idGenCharOverride-1" lang=""><span id="footnote-001-backlink"><a class="_idFootnoteLink _idGenColorInherit" href="ccp3.html#footnote-001">1</a> </span></span><span class="bold_condensed" lang="en-GB">). These changes have had varying and location-specific impacts on biodiversity, and have altered ecosystem carbon balance, water availability and the provision of ecosystem services (</span><span class="bold_condensed_italic" lang="">high confidence</span><span class="bold_condensed" lang="en-GB">). There is no evidence, however, of a global trend in dryland expansion based on analyses of vegetation patterns, precipitation and soil moisture, with overall, more greening than drying in drylands since the 1980s (</span><span class="bold_condensed_italic" lang="">medium confidence</span><span class="bold_condensed" lang="en-GB">). </span>Deserts and semiarid areas host unique biodiversity, rich cultural heritage and provide globally valuable ecosystem services. They are also highly vulnerable to climate change. The vitality of natural ecosystems in arid and semiarid regions greatly depends on water availability, as they are highly sensitive to changes in precipitation and potential evapotranspiration, as well as to land management practices. Multiple lines of evidence from 1920&#8211;2015 indicate that surface warming of 1.2<span class="superscript _idGenCharOverride-1" lang="">&#176;</span>C&#8211;1.3<span class="superscript _idGenCharOverride-1" lang="">&#176;</span>C over global drylands (<a class="section-link" data-title="A Changing Climate in a Changing World" href="/report/ar6/wg2/chapter/chapter-1#1.1.1">Section 1.1.1</a>) exceeded the 0.8<span class="superscript _idGenCharOverride-1" lang="">&#176;</span>C&#8211;1.0<span class="superscript _idGenCharOverride-1" lang="">&#176;</span>C warming over humid lands. From 1982 to 2015, unsustainable land use and climate change combined caused desertification of 6% of the global dryland area, while 41% showed significant increases in vegetation productivity (greening) and 53% of the area had no notable change, although greening rates are slowing or declining in some locations. Greening may cause biodiversity loss and ecosystem service degradation in relation to livelihood systems. Observed trends in deserts and semiarid areas have led to varying impacts on flora, fauna, soil, nutrient cycling, the carbon cycle and water resources. Ecological changes in dryland ecosystems detected and attributed primarily to climate change include tree mortality and losses of mesic tree species at specific sites in the African Sahel, particularly during the droughts of the 1970s and 1980s, and in North Africa from 1970 to 2007; and losses of bird species in the Mojave Desert of North America from 1908 to 2016. In contrast, growth in herbaceous vegetation production has increased in some drylands since the 1980s. Widespread woody encroachment has occurred in many shrublands and savannas in Africa, Australia, North America and South America, due to a combination of land use change, changes in rainfall, fire suppression and CO<span class="subscript _idGenCharOverride-1" lang="">2</span> fertilization which, together with unsustainable management, alters biodiversity and reduces ecosystem services, such as water availability and grazing potential <!-- -->{3.2.1, 3.2.2}<!-- -->.</p>
                            <p class="Body_Body-justify" lang="en-GB"><span class="bold_condensed" lang="en-GB">The impacts of climate change have affected the ecosystem services that humans can harness from drylands, with largely negative implications for livelihoods, human health and well-being, particularly in deserts and semiarid areas with lower adaptive capacities (</span><span class="bold_condensed_italic" lang="">high confidence</span><span class="bold_condensed" lang="en-GB">)</span>. Ecosystem degradation (<a class="section-link" data-title="Assessment of Representative Key Risks" href="/report/ar6/wg2/chapter/chapter-16#16.5.2.3">Section 16.5.2.3.2</a>) and desertification threaten the abilities of both natural and human systems to adapt to climate change (<span class="condensed_italic" lang="">high confidence</span>). Changes in desert and semiarid ecosystem services most acutely affect people who are directly dependent on natural resources for their livelihoods and survival. These groups also often have lower capacities to adapt, particularly given structural limitations of some drylands where healthcare, sanitation, infrastructure and efficient markets are lacking, reinforcing existing inequalities (<span class="condensed_italic" lang="">high confidence</span>). In rural drylands in tropical and Mediterranean areas, human populations are steadily expanding with mixed implications for ecosystem services under climate change, while rapid urbanisation in new and existing dryland megacities puts additional pressure on water ecosystem services (<span class="condensed_italic" lang="">high confidence</span>). Impacts resulting from consumption of dryland ecosystem services elsewhere, alongside other teleconnections associated with health, trade, conflict and migration, mean that dryland adaptive capacities have far reaching implications for other locations, while other locations affect dryland adaptation options. <!-- -->{3.1.1, 3.2.1, 3.2.2, 3.4}<span class="condensed_italic" lang="">. </span></p>
                          </div>
                          <h4 class="Headings_H4-unnumbered" lang="de-DE">Where are we going? Risks and adaptation under warming pathways <span class="arrow-up"/><span class="arrow-down"/><span class="share-block"><img class="share-icon" src="../../share.png"/></span></h4>
                          <div class="h4-siblings" id="h4-3-siblings">
                            <p class="Body_Body-justify" lang="en-GB"><span class="bold_condensed" lang="en-GB">Some drylands will expand by 2100, while others will shrink (</span><span class="bold_condensed_italic" lang="">high confidence</span><span class="bold_condensed" lang="en-GB">). Climate change affects drylands through increased temperatures and more irregular rainfall, with important differences between areas with different rainfall distributions linked to the dominant climate systems in each location. Projections are nevertheless uncertain and not well supported by observed trends, while different methodological approaches and indices exhibit different strengths and weaknesses (</span><span class="bold_condensed_italic" lang="">medium confidence</span><span class="bold_condensed" lang="en-GB">). </span>A fundamental methodological challenge is how to attribute projected impacts to climate change when background climate variability in drylands is so high. Some projections show aridity (as measured by the Aridity Index, AI) to expand substantially on all continents, except Antarctica. Expansion of arid regions is probable <span class="condensed_italic" lang=""/> in southwest North America, the northern fringe of Africa, southern Africa and Australia. The main areas of semiarid expansion are <span class="condensed_italic" lang="">likely </span><span class="superscript _idGenCharOverride-1" lang=""><span id="footnote-000-backlink"><a class="_idFootnoteLink _idGenColorInherit" href="ccp3.html#footnote-000">2</a> </span></span> to occur on the north side of the Mediterranean, southern Africa and North and South America. India, parts of northern China, eastern equatorial Africa and the southern Saharan regions are projected to have shrinking drylands. Under Representative Concentration Pathway (RCP) 8.5, aridity zones could expand by one-quarter of the 1990 area by 2100, increasing to over half the global terrestrial area. Lower greenhouse gas emissions, under RCP4.5, could limit expansion to one-tenth of the 1990 area by 2100. Nevertheless, the utility of the AI in delineating dryland biomes is limited under an increasing CO<span class="subscript _idGenCharOverride-1" lang="">2</span> environment (<span class="condensed_italic" lang="">medium confidence</span>) and how well the index fits observed trends has been questioned in recent research. The impacts of climate change on sand and dust storm activity are projected to be substantial, however, there is large regional variability in terms of rainfall seasonality, land management practices and differences in rates of change and the scales at which the projections are undertaken. The characteristics and speed of human responses and adaptations also affect future risks and impacts (<span class="condensed_italic" lang="">high confidence</span>). Increased temperature and rainfall variability will significantly change the interannual variability in the global carbon cycle, which is strongly influenced by the world&#8217;s drylands and the ways they are managed (<span class="condensed_italic" lang="">medium confidence</span>). Increased variability of precipitation would generally contribute to increased vulnerability for people in drylands, intensifying the challenges that people living in deserts and semiarid areas will face for their sustainable development (<span class="condensed_italic" lang="">medium confidence</span>). <!-- -->{3.3.1, 3.3.2}</p>
                          </div>
                        </div>
                        <div class="h4-container" id="Where"/>
                        <div class="h4-container" id="Contributions">
                          <h4 class="Headings_H4-unnumbered" lang="de-DE">Contributions of adaptation measures to climate resilient development <span class="arrow-up"/><span class="arrow-down"/><span class="share-block"><img class="share-icon" src="../../share.png"/></span></h4>
                          <div class="h4-siblings" id="h4-4-siblings">
                            <p class="Body_Body-justify _idGenParaOverride-1" lang="en-GB"><span class="bold_condensed" lang="en-GB">Drivers of desert expansion and greening are numerous, are attributed to environmental and human processes and differ across dryland types, yet a suite of adaptations can help to address human drivers of change, support resilience and build the adaptive capacity of dryland people (</span><span class="bold_condensed_italic" lang="">medium confidence</span><span class="bold_condensed" lang="en-GB">). </span>Deserts and semiarid areas have a rich cultural heritage, and Indigenous knowledge and local knowledge (IKLK) which enrich and influence sustainability and land use globally. Growing research evidence and experience highlight the necessary features of an enabling environment for dryland adaptation (<a class="section-link" data-title="Enabling Environments for Adaptation in Different Socioeconomic Contexts" href="/report/ar6/wg2/chapter/chapter-8#8.5.2">Section 8.5.2</a>). Key enablers include supportive policies, institutions and governance approaches that strengthen the adaptive capacities of dryland farmers, pastoralists and other dryland resource users (<span class="condensed_italic" lang="">high confidence</span>), addressing drivers (proximate and underlying) as well as symptoms of desertification. For instance, the skills and capacities held by the mobile and adaptive approach of pastoralists may provide lessons for society at large in adapting to climate change and dealing with increased uncertainty. Such a policy would stand in contrast to previous attempts at settling pastoralists. There is a persistent gap in terms of scaling-up already known good practices, combining nature-based, land-based and ecosystem-based approaches that facilitate sustainable land management, with contextually appropriate and responsible governance systems (e.g., including those supporting communal land tenure arrangements and IKLK; <span class="condensed_italic" lang="">medium confidence</span>). Land-based adaptations can help manage dryland changes, including sand and dust storms and desertification (<span class="condensed_italic" lang="">high confidence</span>), while technological options linked to water management draw from both traditional practices and new innovations. Adequate financing and investment is required to harness multiple benefits for managing the impacts of climate change and desertification while accelerating progress towards sustainable development in deserts and semiarid areas. <!-- -->{3.4}</p>
                          </div>
                        </div>
                      </div>
                    </div>
                    <div class="h1-container" id="CCP3.1">
                      <h1 class="Headings_H1-numbered" lang="en-GB">CCP3.1  Introduction <span class="share-block"><img class="share-icon" src="../../share.png"/></span><button class="btn-ipcc btn btn-primary chapter-expand">Expand section</button></h1>
                      <div class="h1-siblings" id="h1-2-siblings"/>
                      <div class="h2-container" id="CCP3.1.1">
                        <h2 class="Headings_H2-sub" lang="de-DE">CCP3.1.1  Concepts, Definitions and Scope <span class="arrow-up"/><span class="arrow-down"/><span class="share-block"><img class="share-icon" src="../../share.png"/></span></h2>
                        <div class="h2-siblings" id="h2-1-siblings">
                          <p class="Body_Body-justify" lang="en-GB">Deserts and semiarid areas are in &#8216;drylands&#8217;, which comprise hyper-arid, arid, semiarid and dry sub-humid areas (Figure CCP3.1). Drylands cover about 45&#8211;47% of the global land area (<a class="reference-link" href="#Pr&#259;v&#259;lie--2016">Pr&#259;v&#259;lie, 2016</a>; <a class="reference-link" href="#Koutroulis--2019">Koutroulis, 2019</a>) and are home to about 3 billion people residing primarily in semiarid and dry sub-humid areas (van der Esch et al., 2017). Drylands host unique, rich biodiversity (<a class="reference-link" href="#Maestre--2015">Maestre et al., 2015</a>) and provide important ecosystem services (<a class="reference-link" href="#Bidak--2015">Bidak et al., 2015</a>; <a class="reference-link" href="#Lu--2018">Lu et al., 2018</a>), while dryland people have a rich cultural and historical heritage. Rural human populations are growing in some Mediterranean and tropical drylands, while many are rapidly urbanising (Guengant Jean-Pierre, 2003; <a class="reference-link" href="#Tabutin--2004">Tabutin and Schoumaker, 2004</a>; <a class="reference-link" href="#Denis--2009">Denis and Moriconi-Ebrard, 2009</a>), with varying impacts on ecosystem services and adaptive capacities. In recent decades, 6% of global megacities have been established in arid areas and 2% in hyper-arid desert areas (<a class="reference-link" href="#Cherlet--2018">Cherlet et al., 2018</a>), with many of these areas suffering from severe water security challenges (<a class="reference-link" href="#Stringer--2021">Stringer et al., 2021</a>). Dryland inhabitants in many developing countries are also experiencing poverty (<a class="section-link" data-title="Poverty Trends and Socioeconomic Inequalities within and across Societies" href="/report/ar6/wg2/chapter/chapter-16#16.1.4.3">Section 16.1.4.3</a>), hunger, poor health, land degradation, and economic and political marginalisation (<a class="reference-link" href="#Mbow--2019">Mbow et al., 2019</a>; <a class="reference-link" href="#Mirzabaev--2019">Mirzabaev et al., 2019</a>), which sometimes limits their access to common pool resources. These challenges, together with a weak enabling environment, threaten opportunities to adapt to climate change.</p>
                          <p class="Body_Body-justify" lang="en-GB">The terms &#8216;desert&#8217; and &#8216;desertification&#8217; are subject to various interpretations due to the diverse components, processes and states they denote. Recognising &#8216;land degradation&#8217; as a contested and perceptual term (<a class="reference-link" href="#Blaikie--1987">Blaikie and Brookfield, 1987</a>; <a class="reference-link" href="#Behnke--2016">Behnke and Mortimore, 2016</a>; <a class="reference-link" href="#Robbins--2020">Robbins, 2020</a>), this cross-chapter paper (CCP), defines land degradation as &#8216;a negative trend in land condition, caused by direct or indirect human-induced processes including climate change, expressed as long-term reduction or loss of at least one of the following: biological productivity, ecological integrity or value to humans&#8217; (<a class="reference-link" href="#Olsson--2019">Olsson et al., 2019</a>). Desertification is land degradation in arid, semiarid and dry sub-humid areas (<a class="reference-link" href="#UNCCD--1994">UNCCD, 1994</a>). Following the above definitions, desertification is more common in arid and semiarid climates than in hyper-arid climates. When desertification does occur in arid and hyper-arid ecosystems it is often in oases and irrigated cultivated lands (<a class="reference-link" href="#Ezcurra--2006">Ezcurra, 2006</a>; <a class="reference-link" href="#Dilshat--2015">Dilshat et al., 2015</a>). Hyper-arid areas, except wetlands such as oases, wadis and riverbanks, are excluded in the United Nations Convention to Combat Desertification (UNCCD) definition of desertification used here, yet many of the world&#8217;s deserts are in hyper-arid areas. Hyper-arid areas are therefore included when discussing deserts but not when discussing desertification. Deserts are not the end point in a desertification process (<a class="reference-link" href="#Ezcurra--2006">Ezcurra, 2006</a>). There is <span class="condensed_italic" lang="">robust evidence</span> of desertification in deserts, mostly driven by human activities and climate variability, expressed as loss of biological productivity, ecological integrity or value to humans to below their natural levels (<a class="reference-link" href="#Moridnejad--2015">Moridnejad et al., 2015</a>).</p>
                          <p class="Body_Body-justify" lang="en-GB">Interactions between climate change and desertification in drylands create challenges for both ecosystem and human resilience, affecting ecosystem services, biodiversity, food security, human health and well-being (<a class="reference-link" href="#Reed--2016">Reed and Stringer, 2016</a>). Dryland livelihoods that heavily rely on natural ecosystems face pressures, including high population growth rates, weak or poor governance, low investment, unemployment and poverty, market distortions and underestimates of the value of drylands (<a class="reference-link" href="#Stringer--2017">Stringer et al., 2017</a>; <a class="reference-link" href="#Bawden--2018">Bawden, 2018</a>). These pressures intersect with broader societal challenges such as conflict and civil unrest (<a class="reference-link" href="#Okpara--2015">Okpara et al., 2015</a>; <a class="reference-link" href="#Almer--2017">Almer et al., 2017</a>), which together, can contribute to human displacement (<a class="section-link" data-title="Displacement and Migration" href="/report/ar6/wg2/chapter/chapter-16#16.2.3.10">Section 16.2.3.10</a>) in some drylands (<a class="reference-link" href="#Warner--2010">Warner, 2010</a>; <a class="reference-link" href="#Abel--2019">Abel et al., 2019</a>). Nevertheless, evidence linking conflict with climate change and desertification is weak (<a class="reference-link" href="#Benjaminsen--2012">Benjaminsen et al., 2012</a>) and data are insufficient to draw robust conclusions.</p>
                          <p class="Body_Body-justify" lang="en-GB">Drylands yield important opportunities for adapting to and mitigating climate change. They offer abundant solar energy, which could support mitigation efforts, opportunities for cultural and nature-based tourism, rich plant biodiversity in some areas (e.g. Namibia), and extensive Indigenous knowledge and experience of adapting to dynamic climates (<a class="reference-link" href="#Christie--2014">Christie et al., 2014</a>; <a class="reference-link" href="#Stringer--2017">Stringer et al., 2017</a>); for example, across West Asia and North Africa (<a class="reference-link" href="#Louhaichi--2010">Louhaichi and Tastad, 2010</a>; Hussein, 2011). Improved understanding of challenges and opportunities in drylands can be achieved by transdisciplinary, multi-scale and inter-sectoral approaches encompassing links between physical, biological, socioeconomic and institutional systems (<a class="reference-link" href="#Reynolds--2007">Reynolds et al., 2007</a>; <a class="reference-link" href="#Stringer--2017">Stringer et al., 2017</a>).</p>
                          <p class="Body_Body-justify" lang="en-GB"><a class="section-link" data-title="Oceans and Coastal Ecosystems and their Services" href="/report/ar6/wg2/chapter/chapter-3">Chapter 3</a>  of the IPCC Special Report on Climate Change and Land (SRCCL) focused on desertification (<a class="reference-link" href="#Mirzabaev--2019">Mirzabaev et al., 2019</a>), but links between climate change and deserts, desertification and semiarid areas have not been extensively considered in recent IPCC assessment cycles. Working Group II Assessment Report 5 noted that desertification contributes to atmospheric dust production, identifying desertification as needing consideration within climate change mitigation and adaptation governance and decision making (<a class="reference-link" href="#Boucher--2013">Boucher et al., 2013</a>; <a class="reference-link" href="#Myhre--2013">Myhre et al., 2013</a>). This cross-chapter paper focuses on environmental and human aspects, finding that climate change impacts will intensify the challenges faced by dryland populations in advancing sustainable development. However, viable options exist for adapting to climate change, reducing desertification and supporting progress towards the Sustainable Development Goals (SDGs), particularly by combining modern science, IKLK, and livelihood and land management strategies that enable land-based adaptation, mitigation and nature-based solutions (<a class="section-link" data-title="What Types of Responses Are Documented?" href="/report/ar6/wg2/chapter/chapter-16#16.3.2.3">Section 16.3.2.3</a>).</p>
                        </div>
                      </div>
                      <div class="h2-container" id="CCP3.1.2">
                        <h2 class="Headings_H2-numbered" lang="de-DE">CCP3.1.2  Key Measurement Challenges and Observed Dryland Dynamics <span class="arrow-up"/><span class="arrow-down"/><span class="share-block"><img class="share-icon" src="../../share.png"/></span></h2>
                        <div class="h2-siblings" id="h2-2-siblings">
                          <p class="Body_Body-justify" lang="en-GB">Maps of dryland extent commonly employ a climate-based approach measured using the Aridity Index (AI), or consider the extent of dryland vegetation. The two approaches sometimes do not demarcate the same geographical areas as being drylands, particularly when projecting future changes (<a class="reference-link" href="#Stringer--2021">Stringer et al., 2021</a>). Dryland dynamics therefore need to be viewed specifically in relation to the definitions and measurements being used. From 1982 to 2015, unsustainable land use and climate change combined caused desertification of 6% of the global dryland area, while 41% showed significant greening (i.e., increased vegetation productivity), and 53% of the area had no notable change (Figure CCP3.1; <a class="reference-link" href="#Burrell--2020">Burrell et al., 2020</a>). In contrast <a class="reference-link" href="#Yuan--2019">Yuan et al. (2019)</a>  conclude that during 1999&#8211;2015, trends of vegetation production reversed globally, and in drylands, showing extensive declines. Thus, while overall greening has occurred, this trend now appears to be declining. Analyses of vegetation, soil, and physical characteristics of over 50,000 sample points in drylands around the world indicate that aridification causes ecological degradation at three successive thresholds: vegetation decline at AI = 0.56, soil disruption at AI = 0.3 and loss of plant cover at AI = 0.2 (<a class="reference-link" href="#Berdugo--2020">Berdugo et al., 2020</a>). Drylands nevertheless show different dynamics depending on the index used and the variables assessed.</p>
                          <div class="Figure" id="_idContainer007">
                            <p class="Body_Figures_Figure_title" lang="en-US">
                              <span class="figure_number" lang="">
                                <img alt="" class="_idGenObjectAttribute-1" id="figure-ccp3-001" loading="lazy" src="https://ipcc.ch/report/ar6/wg2/downloads/figures/IPCC_AR6_WGII_Figure_CCP3_001.png"/>
                              </span>
                            </p>
                            <p class="Body_Figures_Figure_title" lang="en-US"><span class="figure_number" lang="">Figure CCP3.1  | </span><span class="bold_condensed-dark-blue" lang="">Aridity zone extent and observed changes in dryland areas as defined by the Aridity Index (AI). </span>Aridity zones, according to UNESCO (1979) and <a class="reference-link" href="#UNEP--1992">UNEP (1992)</a>  classifications, defined by the AI, consider the ratio of average annual precipitation to potential evapotranspiration: (i) dry sub-humid (0.5 &#8804; AI &lt; 0.65), (ii) semiarid (0.2 &#8804; AI &lt; 0.5), (iii) arid (0.05 &#8804; AI &lt; 0.2) and (iv) hyper-arid (AI &lt;0.05). Drylands include land with AI &lt;0.65, humid lands are those with AI &gt;0.65 (<a class="reference-link" href="#UNEP--1992">UNEP, 1992</a>). Deserts represent a major part of the hyper-arid and arid zones. The aridity zones are shown for climate in the period 1988&#8211;2017 and changes in dryland area (combined area of four aridity zones) are shown between the periods 1901&#8211;1930 and 1988&#8211;2017, based on climate time series at 50 km spatial resolution (<a class="reference-link" href="#Harris--2020">Harris et al., 2020</a>). The AI has various limitations in assessing dryland expansion and different indices highlight different areas and different changes. This is known as the aridity paradox (<a class="reference-link" href="#Greve--2019">Greve et al., 2019</a>). See SRCCL <a class="section-link" data-title="Introduction" href="/report/ar6/wg2/chapter/chapter-3#3.2.1">Section 3.2.1</a>  (<a class="reference-link" href="#Mirzabaev--2019">Mirzabaev et al., 2019</a>) for an in-depth analysis of limitations, and <a class="reference-link" href="#Stringer--2021">Stringer et al. (2021)</a>  for a summary of different measures and indices used in the literature.</p>
                            <div class="ch-figure-button-cont"><a href="/report/ar6/wg2/figures/chapter-ccp3/figure-ccp3-001" target="_blank"><button class="btn-ipcc btn btn-primary ch-figure-button">Open figure</button></a> </div>
                          </div>
                          <p class="Body_Body-justify" lang="en-GB">Based on the AI, some drylands are projected to expand and others to contract due to climate change. However, there is no evidence of a global trend in dryland expansion based on vegetation patterns, precipitation and soil moisture, based on the satellite record from the 1980s to the present (<span class="condensed_italic" lang="">medium confidence</span>). The AI will also be of limited use under a changing CO<span class="subscript _idGenCharOverride-1" lang="">2</span> environment due to higher water use efficiency by some plants (<a class="reference-link" href="#Mirzabaev--2019">Mirzabaev et al., 2019</a>), and it overvalues the role of potential evapotranspiration (PET) relative to rainfall. It also does not account for CO<span class="subscript _idGenCharOverride-1" lang="">2</span> impacts on evapotranspiration, and seasonality in rainfall and evapotranspiration. Higher annual PET because of increased temperatures will have little impact if temperature and actual evapotranspiration are not rising during the period of vegetation growth (<a class="reference-link" href="#Stringer--2021">Stringer et al., 2021</a>).</p>
                        </div>
                      </div>
                    </div>
                    <div class="h1-container" id="CCP3.2">
                      <h1 class="Headings_H1-numbered" lang="en-GB">CCP3.2  Observed Impacts of Climate Change Across Sectors and Regions <span class="share-block"><img class="share-icon" src="../../share.png"/></span><button class="btn-ipcc btn btn-primary chapter-expand">Expand section</button></h1>
                      <div class="h1-siblings" id="h1-3-siblings"/>
                      <div class="h2-container" id="CCP3.2.1">
                        <h2 class="Headings_H2-sub" lang="de-DE">CCP3.2.1  Observed Impacts on Natural Systems in Arid and Semiarid Areas <span class="arrow-up"/><span class="arrow-down"/><span class="share-block"><img class="share-icon" src="../../share.png"/></span></h2>
                        <div class="h2-siblings" id="h2-3-siblings">
                          <div class="h3-container" id="CCP3.2.1.1">
                            <h3 class="Headings_H3" lang="de-DE">CCP3.2.1.1  Temperature and Rainfall <span class="arrow-up"/><span class="arrow-down"/><span class="share-block"><img class="share-icon" src="../../share.png"/></span></h3>
                            <div class="h3-siblings" id="h3-1-siblings">
                              <p class="Body_Body-justify" lang="en-GB">Significant warming has occurred across drylands globally (<a class="reference-link" href="#IPCC--2021">IPCC, 2021</a>). Surface warming (1920&#8211;2015) of 1.2<span class="superscript _idGenCharOverride-1" lang="">&#176;</span>C&#8211;1.3<span class="superscript _idGenCharOverride-1" lang="">&#176;</span>C in global drylands has exceeded the 0.8<span class="superscript _idGenCharOverride-1" lang="">&#176;</span>C&#8211;1.0<span class="superscript _idGenCharOverride-1" lang="">&#176;</span>C warming over humid lands (<a class="reference-link" href="#Huang--2017">Huang et al., 2017</a>). As measured by the AI, this has expanded the area of drylands by ~4% from 1948&#8211;2004 (<a class="reference-link" href="#Ji--2015">Ji et al., 2015</a>; <a class="reference-link" href="#Spinoni--2015">Spinoni et al., 2015</a>; <a class="reference-link" href="#Huang--2016">Huang et al., 2016</a>). However, as mentioned in Figure CCP3.1, the AI has various limitations in assessing drylands expansion. Increases in potential evapotranspiration have exceeded increases in precipitation in the last half of the period 1901&#8211;2017 (<a class="reference-link" href="#Pan--2021">Pan et al., 2021</a>). Observations from the Sahel demonstrated that temperature seasonality changes differ from rainfall seasonality changes (Guichard et al., 2015), and there has been an increase in surface water and groundwater recharge in the Sahel since the 1980s, referred to as &#8216;the Sahel paradox&#8217; (<a class="reference-link" href="#Favreau--2009">Favreau et al., 2009</a>; <a class="reference-link" href="#Gardelle--2010">Gardelle et al., 2010</a>; <a class="reference-link" href="#Descroix--2013">Descroix et al., 2013</a>; <a class="reference-link" href="#Wendling--2019">Wendling et al., 2019</a>). Research from the USA suggests that historical soil moisture levels can contribute to such variability (<a class="reference-link" href="#Heisler-White--2009">Heisler-White et al., 2009</a>). Studies from the Middle East show rising temperatures and declining rainfall trends (<a class="reference-link" href="#ESCWA--2017">ESCWA, 2017</a>), with most decreasing aridity trends in north Sudan and most increasing aridity trends in eastern Arabia over the period 1948&#8211;2018 (<a class="reference-link" href="#Sahour--2020">Sahour et al., 2020</a>).</p>
                            </div>
                          </div>
                          <div class="h3-container" id="CCP3.2.1.2">
                            <h3 class="Headings_H3" lang="de-DE">CCP3.2.1.2  Ecosystem Processes <span class="arrow-up"/><span class="arrow-down"/><span class="share-block"><img class="share-icon" src="../../share.png"/></span></h3>
                            <div class="h3-siblings" id="h3-2-siblings">
                              <p class="Body_Body-justify" lang="en-GB">Semiarid ecosystems have a disproportionately large role in the global carbon cycle, driving trends and interannual variability of the global carbon sink (Alstrom et al., 2015). These systems are highly sensitive to annual precipitation and temperature variations (<span class="condensed_italic" lang="">high confidence</span>) (Alstrom et al., 2015, Poulter et al., 2014). The positive trend in semiarid regions is consistent with widespread woody encroachment and increased vegetation greenness (<a class="reference-link" href="#Andela--2013">Andela et al., 2013</a>; <a class="reference-link" href="#Piao--2019">Piao et al., 2019</a>; <a class="reference-link" href="#Piao--2020">Piao et al., 2020</a>) driven by CO<span class="subscript _idGenCharOverride-1" lang="">2</span> fertilization and rainfall increases (<a class="reference-link" href="#Sitch--2015">Sitch et al., 2015</a>; <a class="reference-link" href="#Piao--2020">Piao et al., 2020</a>), although some trends are complicated by irrigation practices (<a class="reference-link" href="#He--2019">He et al., 2019</a>). Increases in temperature and drought diminish this trend through reduced vegetation productivity and increased vegetation mortality (<a class="reference-link" href="#Brandt--2016">Brandt et al., 2016</a>; <a class="reference-link" href="#Ma--2016">Ma et al., 2016</a>; <a class="reference-link" href="#Fern&#225;ndez-Mart&#237;nez--2019">Fern&#225;ndez-Mart&#237;nez et al., 2019</a>; <a class="reference-link" href="#Maurer--2020">Maurer et al., 2020</a>) with indications that this trend is declining or reversing in some locations (<a class="reference-link" href="#Yuan--2019">Yuan et al., 2019</a>; <a class="reference-link" href="#Wang--2020">Wang et al., 2020</a>).</p>
                              <p class="Body_Body-justify" lang="en-GB">Changed climates have increased water constraints of vegetation growth most notably in the Mediterranean (Sections <a class="section-link" data-title="Projected Impacts" href="/report/ar6/wg2/chapter/ccp3#CCP1.2.3.2">CCP1.2.3.2</a>; <a class="section-link" data-title="The Specific Vulnerability of Mediterranean Countries" href="/report/ar6/wg2/chapter/ccp3#CCP4.2.1">CCP4.2.1</a>) and West and Central Asia (<a class="reference-link" href="#Jiao--2021">Jiao et al., 2021</a>)<span class="condensed_italic" lang="">. </span>Climate change and elevated CO<span class="subscript _idGenCharOverride-1" lang="">2</span> have both increased and decreased vegetation sensitivity to rainfall throughout drylands, with the degree of variation shaped by region, land use and vegetation traits (<a class="reference-link" href="#Haverd--2017">Haverd et al., 2017</a>; <a class="reference-link" href="#Abel--2021">Abel et al., 2021</a>). Mineral nitrogen production in drylands may become increasingly decoupled from consumption by plants over prolonged dry periods, and more extreme hydrological events can drive multiple changes to nutrient cycling (<a class="reference-link" href="#Manzoni--2019">Manzoni et al., 2019</a>). Soil biocrusts (composed of lichens, bryophytes and soil microorganisms), which contribute to dryland ecosystem function, including carbon uptake and soil stabilisation (<a class="reference-link" href="#Reed--2019">Reed et al., 2019</a>), are sensitive to warming and altered rainfall in a shift in biocrust communities of mosses and lichens in favour of early successional cyanobacteria-dominated biocrusts (<a class="reference-link" href="#Escolar--2012">Escolar et al., 2012</a>; <a class="reference-link" href="#Reed--2012">Reed et al., 2012</a>), which can increase surface albedo (<a class="reference-link" href="#Rutherford--2017">Rutherford et al., 2017</a>).</p>
                            </div>
                          </div>
                          <div class="h3-container" id="CCP3.2.1.3">
                            <h3 class="Headings_H3" lang="de-DE">CCP3.2.1.3  Vegetation Changes <span class="arrow-up"/><span class="arrow-down"/><span class="share-block"><img class="share-icon" src="../../share.png"/></span></h3>
                            <div class="h3-siblings" id="h3-3-siblings"/>
                          </div>
                          <div class="h3-container" id="CCP3.2.1.4">
                            <h3 class="Headings_H3" lang="de-DE">CCP3.2.1.4  Woody Cover Increase <span class="arrow-up"/><span class="arrow-down"/><span class="share-block"><img class="share-icon" src="../../share.png"/></span></h3>
                            <div class="h3-siblings" id="h3-4-siblings">
                              <p class="Body_Body-justify" lang="en-GB">Dryland ecosystems have shown mixed trends of decreases and increases in vegetation and biodiversity, depending on the time period, geographic region and vegetation type assessed (see Table CCP3.1  for examples of observed environmental changes and impacts in drylands and the role of climate change and non-climatic factors in causing these changes).</p>
                              <p class="Body_Body-justify" lang="en-GB">Increases in shrub cover in arid deserts and shrublands have been recorded in the North American drylands (<a class="reference-link" href="#Caracciolo--2016">Caracciolo et al., 2016</a>; <a class="reference-link" href="#Archer--2017">Archer et al., 2017</a>; <a class="reference-link" href="#Chambers--2019">Chambers et al., 2019</a>), the Namib desert (<a class="reference-link" href="#Rohde--2019">Rohde et al., 2019</a>), the Karoo (<a class="reference-link" href="#Ward--2014">Ward et al., 2014</a>; <a class="reference-link" href="#Masubelele--2015b">Masubelele et al., 2015b</a>), north and central Mexico (<a class="reference-link" href="#P&#233;rez-S&#225;nchez--2011">P&#233;rez-S&#225;nchez et al., 2011</a>; <a class="reference-link" href="#B&#225;ez--2013">B&#225;ez et al., 2013</a>; <a class="reference-link" href="#Castill&#243;n--2015">Castill&#243;n et al., 2015</a>; <a class="reference-link" href="#Sosa--2019">Sosa et al., 2019</a>), large parts of the West African Sahel with some local exceptions (<a class="reference-link" href="#Brandt--2016">Brandt et al., 2016</a>) and Central Asia (<a class="reference-link" href="#Jia--2015">Jia et al., 2015</a>; <a class="reference-link" href="#Li--2015">Li et al., 2015</a>; <a class="reference-link" href="#Deng--2016">Deng et al., 2016</a>; <a class="reference-link" href="#Jiao--2016">Jiao et al., 2016</a>; <a class="reference-link" href="#Wang--2016">Wang et al., 2016</a>). Increasing woodiness in the Namib is consistent with an increase in rainfall extremes and westward expansion of convective rainfall (<a class="reference-link" href="#Haensler--2010">Haensler et al., 2010</a>; <a class="reference-link" href="#Rohde--2019">Rohde et al., 2019</a>). Increasing rainfall and rising CO<span class="subscript _idGenCharOverride-1" lang="">2</span> concentrations (which improves water use efficiency) benefits some shrubs (<a class="reference-link" href="#Polley--1997">Polley et al., 1997</a>; <a class="reference-link" href="#Morgan--2004">Morgan et al., 2004</a>; <a class="reference-link" href="#Donohue--2013">Donohue et al., 2013</a>). Together with changes in land use (<a class="reference-link" href="#Hoffman--2018">Hoffman et al., 2018</a>), improved land management (<a class="reference-link" href="#Reij--2005">Reij et al., 2005</a>) and improved irrigation (<a class="reference-link" href="#He--2019">He et al., 2019</a>), this contributes to woody cover increases. Extensive woody encroachment has been recorded in savannas (measured between 1920&#8211;2015, over the past century) in Africa (2.4% woody cover increase per decade), Australia (1% increase per decade), and South America (8% increase per decade) (<a class="reference-link" href="#O&#8217;Connor--2014">O&#8217;Connor et al., 2014</a>; <a class="reference-link" href="#Stevens--2016">Stevens et al., 2016</a>; <a class="reference-link" href="#Skowno--2017">Skowno et al., 2017</a>; <a class="reference-link" href="#Venter--2018">Venter et al., 2018</a>; <a class="reference-link" href="#Zhang--2019">Zhang et al., 2019</a>). Following drought in the Sahel (1968&#8211;1973 and 1982&#8211;1984), a rainfall increase since the mid-1990s has been linked to increases of woody cover between 1992&#8211;2011/2012 (<a class="reference-link" href="#Brandt--2016">Brandt et al., 2016</a>; <a class="reference-link" href="#Brandt--2017">Brandt et al., 2017</a>; <a class="reference-link" href="#Brandt--2019">Brandt et al., 2019</a>). See SRCCL <a class="section-link" data-title="Introduction" href="/report/ar6/wg2/chapter/chapter-3#3.2.1">Section 3.2.1.1</a> for an evaluation of the normalized difference vegetation index (NDVI) and remote sensing approaches used in these studies. Tree regeneration by farmers has also increased woody cover, particularly next to villages (<span class="condensed_italic" lang="">high confidence</span>) (<a class="reference-link" href="#Reij--2005">Reij et al., 2005</a>; <a class="reference-link" href="#Reij--2016">Reij and Garrity, 2016</a>; <a class="reference-link" href="#Brandt--2018">Brandt et al., 2018</a>). Otherwise, savanna encroachment has been attributed to combinations of increased rainfall (<a class="reference-link" href="#Venter--2018">Venter et al., 2018</a>; <a class="reference-link" href="#Zhang--2019">Zhang et al., 2019</a>), warming (<a class="reference-link" href="#Venter--2018">Venter et al., 2018</a>) and CO<span class="subscript _idGenCharOverride-1" lang="">2</span> fertilization (<a class="reference-link" href="#Kgope--2010">Kgope et al., 2010</a>; <a class="reference-link" href="#Bond--2012">Bond and Midgley, 2012</a>; <a class="reference-link" href="#Buitenwerf--2012">Buitenwerf et al., 2012</a>; <a class="reference-link" href="#Stevens--2016">Stevens et al., 2016</a>; <a class="reference-link" href="#Quirk--2019">Quirk et al., 2019</a>) interacting with changing land use (<a class="reference-link" href="#Archer--2017">Archer et al., 2017</a>; <a class="reference-link" href="#Venter--2018">Venter et al., 2018</a>), where herbivory and fire regimes are altered (<a class="reference-link" href="#O&#8217;Connor--2014">O&#8217;Connor et al., 2014</a>; <a class="reference-link" href="#Archer--2017">Archer et al., 2017</a>; see also discussion on fire and herbivory in <a class="section-link" data-title="Detection and Attribution for Observed Biome Shifts" href="/report/ar6/wg2/chapter/chapter-2#2.4.3.1">Section 2.4.3.1</a>). In some cases, woody increase has been balanced locally by changes in runoff (<a class="reference-link" href="#Trichon--2018">Trichon et al., 2018</a>) or by land clearing and fuel wood harvesting, as seen in western Niger, northern Nigeria, and at the periphery of major towns (Montagn&#233; et al., 2016).</p>
                              <p class="Body_Tables_Table_title" lang="en-US"><span class="table_number" lang="">Table CCP3.1  | </span>Observed ecological changes in drylands.</p>

                          <div class="h3-container" id="CCP3.2.1.5">
                            <h3 class="Headings_H3" lang="de-DE">CCP3.2.1.5  Tree Death and Woody Cover Decline <span class="arrow-up"/><span class="arrow-down"/><span class="share-block"><img class="share-icon" src="../../share.png"/></span></h3>
                            <div class="h3-siblings" id="h3-5-siblings">
                              <p class="Body_Body-justify" lang="en-GB">Field measurements have also detected tree mortality and loss of mesic tree species at some Sahel sites during drought periods (<a class="reference-link" href="#Gonzalez--2012">Gonzalez et al., 2012</a>; <a class="reference-link" href="#Kusserow--2017">Kusserow, 2017</a>; <a class="reference-link" href="#Brandt--2018">Brandt et al., 2018</a>; <a class="reference-link" href="#Ibrahim--2018">Ibrahim et al., 2018</a>; <a class="reference-link" href="#Trichon--2018">Trichon et al., 2018</a>; <a class="reference-link" href="#Zwarts--2018">Zwarts et al., 2018</a>; <a class="reference-link" href="#Bernardino--2020">Bernardino et al., 2020</a>; <a class="reference-link" href="#Zida--2020">Zida et al., 2020</a>) and a reduction of mesic species in favour of drought-tolerant species (<span class="condensed_italic" lang="">high confidence</span>) (<a class="reference-link" href="#H&#228;nke--2016">H&#228;nke et al., 2016</a>; <a class="reference-link" href="#Kusserow--2017">Kusserow, 2017</a>; <a class="reference-link" href="#Ibrahim--2018">Ibrahim et al., 2018</a>; <a class="reference-link" href="#Trichon--2018">Trichon et al., 2018</a>; <a class="reference-link" href="#Dendoncker--2020">Dendoncker et al., 2020</a>; <a class="reference-link" href="#Zida--2020">Zida et al., 2020</a>b), with attribution to climate change (<a class="reference-link" href="#Gonzalez--2012">Gonzalez et al., 2012</a>). Furthermore, vegetation productivity per unit of rainfall showed a net decline of 4% in the period 2000&#8211;2015 across drylands globally, with the greatest net declines in Africa (16%) and Asia (33%) (<a class="reference-link" href="#Abel--2021">Abel et al., 2021</a>), but with location-specific increases in vegetation-rainfall sensitivity, for example, in southern and eastern Africa and parts of the Sahel. Furthermore, NDVI declines were reported across the Sahel from 1999 to 2015 (<a class="reference-link" href="#Yuan--2019">Yuan et al., 2019</a>; <a class="reference-link" href="#Zida--2020a">Zida et al., 2020a</a>). However, field site monitoring showed a strong regeneration of the decimated woody populations except on shallow soil where the runoff system had evolved towards a web of gullies (<a class="reference-link" href="#Hiernaux--2009a">Hiernaux et al., 2009a</a>; <a class="reference-link" href="#Trichon--2018">Trichon et al., 2018</a>; <a class="reference-link" href="#Wendling--2019">Wendling et al., 2019</a>) .</p>
                              <p class="Body_Body-justify" lang="en-GB">Other site-specific impacts include tree mortality in southwestern Morocco (<a class="reference-link" href="#Le Polain de Waroux--2012">Le Polain de Waroux and Lambin, 2012</a>), mortality of <span class="condensed_italic" lang="">Austrocedrus</span> and <span class="condensed_italic" lang="">Nothofagus</span> forests in the dry Patagonia forest-steppe (<a class="reference-link" href="#Rodr&#237;guez-Cat&#243;n--2019">Rodr&#237;guez-Cat&#243;n et al., 2019</a>) and a tree range contraction of <span class="condensed_italic" lang="">Aloidendron dichotmum</span> in southern Africa (<a class="reference-link" href="#Foden--2007b">Foden et al., 2007b</a>). In Morocco, tree mortality was most highly correlated to an increase in aridity, measured by the Palmer Drought Severity Index (PDSI), which showed a statistically significant increase since 1900 due to climate change (<a class="reference-link" href="#Dai--2004">Dai et al., 2004</a>; <a class="reference-link" href="#Esper--2007">Esper et al., 2007</a>; <a class="reference-link" href="#Dai--2011">Dai, 2011</a>).</p>
                              <p class="Body_Body-justify" lang="en-GB">In deserts of the southwestern USA, a drought since 2000, mainly due to climate change (<a class="reference-link" href="#Williams--2020">Williams et al., 2020</a>), together with land use change, invasive plant species and wildfire (<a class="reference-link" href="#Syphard--2017">Syphard et al., 2017</a>), has led to reductions in native desert plant species (<a class="reference-link" href="#Defalco--2010">Defalco et al., 2010</a>; <a class="reference-link" href="#Conver--2017">Conver et al., 2017</a>) and perennial vegetation cover (<a class="reference-link" href="#Munson--2016a">Munson et al., 2016a</a>; 2016b). An increase in invasive exotic grasses has increased wildfires in these desert ecosystems in which fire had been rare (<a class="reference-link" href="#Brooks--2006">Brooks and Matchett, 2006</a>; <a class="reference-link" href="#Abatzoglou--2011">Abatzoglou and Kolden, 2011</a>; <a class="reference-link" href="#Hegeman--2014">Hegeman et al., 2014</a>; Horn and St. Clair, 2017). In the Mojave Desert in the USA, a loss of bird biodiversity has also been detected and attributed to increased aridity caused by climate change (<a class="reference-link" href="#Iknayan--2018">Iknayan and Beissinger, 2018</a>; <a class="reference-link" href="#Riddell--2019">Riddell et al., 2019</a>).</p>
                            </div>
                          </div>
                          <div class="h3-container" id="CCP3.2.1.6">
                            <h3 class="Headings_H3" lang="de-DE">CCP3.2.1.6  Change in Herbaceous Cover <span class="arrow-up"/><span class="arrow-down"/><span class="share-block"><img class="share-icon" src="../../share.png"/></span></h3>
                            <div class="h3-siblings" id="h3-6-siblings">
                              <p class="Body_Body-justify" lang="en-GB">Changes in aridity (<a class="reference-link" href="#Rudgers--2018">Rudgers et al., 2018</a>) have caused some expansion of dominant grasses (often invasive) into desert shrublands. The spread of invasive <span class="condensed_italic" lang="">Bromus tectorum</span> may be enhanced by altered precipitation and freeze&#8211;thaw cycles (<span class="condensed_italic" lang="">low confidence</span>) (<a class="reference-link" href="#Collins--2015">Collins and Xia, 2015</a>; <a class="reference-link" href="#Rudgers--2018">Rudgers et al., 2018</a>). Arid grassland has expanded (between 10&#8211;100 km) into the eastern Karoo, South Africa (<span class="condensed_italic" lang="">high confidence</span>) (<a class="reference-link" href="#du Toit--2015">du Toit et al., 2015</a>; <a class="reference-link" href="#Masubelele--2015a">Masubelele et al., 2015a</a>; 2015b). Observations from 100-year-old grazing trials demonstrate that the increase in grassiness is a product of shift in rainfall seasonality and an increase in rainfall (<a class="reference-link" href="#Du Toit--2014">Du Toit and O&#8217;Connor, 2014</a>; <a class="reference-link" href="#du Toit--2015">du Toit et al., 2015</a>; 2018; <a class="reference-link" href="#Masubelele--2015a">Masubelele et al., 2015a</a>;, 2015b). These changes are causing an increase in fire frequency in these seldom burnt areas (<a class="reference-link" href="#du Toit--2015">du Toit et al., 2015</a>). The Sahara was suggested to have expanded 10% from 1902 to 2013 (<a class="reference-link" href="#Thomas--2018">Thomas and Nigam, 2018</a>), although herbaceous vegetation production has increased in general in the Sahel since the dry 1980s (<a class="reference-link" href="#Eklundh--2003">Eklundh and Olsson, 2003</a>; <a class="reference-link" href="#Anyamba--2005">Anyamba and Tucker, 2005</a>; <a class="reference-link" href="#Herrmann--2005">Herrmann et al., 2005</a>; <a class="reference-link" href="#Hutchinson--2005">Hutchinson et al., 2005</a>; <a class="reference-link" href="#Olsson--2005">Olsson et al., 2005</a>; <a class="reference-link" href="#Fensholt--2006">Fensholt et al., 2006</a>; <a class="reference-link" href="#Dardel--2014">Dardel et al., 2014</a>; <a class="reference-link" href="#Hiernaux--2016">Hiernaux et al., 2016</a>; <a class="reference-link" href="#Stith--2016">Stith et al., 2016</a>; <a class="reference-link" href="#Benjaminsen--2019">Benjaminsen and Hiernaux, 2019</a>; <a class="reference-link" href="#Hiernaux--2020">Hiernaux and Assouma, 2020</a>).</p>
                              <p class="Body_Body-justify" lang="en-GB">Trends of land degradation (<a class="section-link" data-title="Residual Risk since AR5" href="/report/ar6/wg2/chapter/chapter-16#16.4.1.2">Section 16.4.1.2</a>) and desertification (as demonstrated by loss of cover or reduced vegetation productivity) as an impact of changing climatic trends have been reported in Burkina Faso (<a class="reference-link" href="#Zida--2020">Zida et al., 2020</a>), the northwestern regions of China during 1975&#8211;1990 (<a class="reference-link" href="#Zhang--2020">Zhang et al., 2020</a>) in Afghanistan (<a class="reference-link" href="#Savage--2009">Savage et al., 2009</a>), Iran (Mahmoudi et al., 2011; <a class="reference-link" href="#Kamali--2017">Kamali et al., 2017</a>), Argentina (<a class="reference-link" href="#Barbosa--2015">Barbosa et al., 2015</a>) and India (<a class="reference-link" href="#Javed--2012">Javed et al., 2012</a>). Encroachment, re-greening and an increase of unpalatable plant species into rangeland areas (e.g., in East Africa and southern Africa&#8217;s Kalahari) all contribute to dryland degradation through the loss of open ecosystems and their services (<a class="reference-link" href="#Reed--2015">Reed et al., 2015</a>; Le et al., 2016; <a class="reference-link" href="#Chen--2019b">Chen et al., 2019b</a>).</p>
                            </div>
                          </div>
                          <div class="h3-container" id="CCP3.2.1.7">
                            <h3 class="Headings_H3" lang="de-DE">CCP3.2.1.7  Sand and Dust Storms <span class="arrow-up"/><span class="arrow-down"/><span class="share-block"><img class="share-icon" src="../../share.png"/></span></h3>
                            <div class="h3-siblings" id="h3-7-siblings">
                              <p class="Body_Body-justify" lang="en-GB">Soil dust emissions are highly sensitive to changing climate conditions but also to changing land use and management practices (<span class="condensed_italic" lang="">high confidence</span>). Distinguishing between the effects of these drivers is not straightforward, even in well-documented locations (<a class="reference-link" href="#Middleton--2019">Middleton, 2019</a>). There is <span class="condensed_italic" lang="">limited evidence</span> and <span class="condensed_italic" lang="">low agreement </span> about the impacts of climate change on sand and dust storms (SDS), with studies pointing to either substantial increases (+300%) or decreases (-60%) (<a class="reference-link" href="#Boucher--2013">Boucher et al., 2013</a>). Current climate models cannot adequately model the impact of climate change on SDS activity (<a class="reference-link" href="#Mirzabaev--2019">Mirzabaev et al., 2019</a>). However, there is <span class="condensed_italic" lang="">high confidence</span> that land degradation, loss of vegetative cover and drying of water bodies in semiarid and arid areas will contribute to sand and dust activity (<a class="reference-link" href="#Mirzabaev--2019">Mirzabaev et al., 2019</a>).</p>
                              <p class="Body_Body-justify" lang="en-GB">SDS remain a major concern for desert areas under conditions of climate change and desertification (<a class="reference-link" href="#Middleton--2017">Middleton, 2017</a>). Only about 20% of deserts are covered by sand, but desert SDS provide an important feedback mechanism to climate (<a class="reference-link" href="#Pu--2017">Pu and Ginoux, 2017</a>), with literature showing that some areas have very frequent dust days (Figure CCP3.2; <a class="reference-link" href="#Ginoux--2012">Ginoux et al., 2012</a>). In some locations, such as the USA, desert dust can be deposited downwind on snowpacks, hastening snowmelt and altering river hydrology (<a class="reference-link" href="#Painter--2010">Painter et al., 2010</a>). Deserts and other natural dryland surfaces produced 75&#8211;90% of atmospheric dust globally in the early 21st century, with the remainder from agricultural and other land dominated by human land use (<a class="reference-link" href="#Ginoux--2012">Ginoux et al., 2012</a>; <a class="reference-link" href="#Stanelle--2014">Stanelle et al., 2014</a>).</p>
                              <div class="Figure" id="_idContainer010">
                                <p class="Body_Figures_Figure_title" lang="en-US">
                                  <span class="figure_number" lang="">
                                    <img alt="" class="_idGenObjectAttribute-1" id="figure-ccp3-002" loading="lazy" src="https://ipcc.ch/report/ar6/wg2/downloads/figures/IPCC_AR6_WGII_Figure_CCP3_002.png"/>
                                  </span>
                                </p>
                                <p class="Body_Figures_Figure_title" lang="en-US"><span class="figure_number" lang="">Figure CCP3.2  | </span><span class="bold_condensed-dark-blue" lang="">Frequency of high dust days (dust optical depth &gt;0. </span><span class="bold_condensed-dark-blue" lang="">2) during the dust season, based on 2003&#8211;2009 remote sensing, the most recent data analysed, and divided into areas primarily under agriculture and areas dominated by natural land cover (<a class="reference-link" href="#Ginoux--2012">Ginoux et al., 2012</a>). </span>Dust seasons: Africa (North), Year-round; Africa (South), September&#8211;February; America (North), March&#8211;May; America (South), December&#8211;February), Asia, March&#8211;May; Australia, September&#8211;February.</p>
                                <div class="ch-figure-button-cont"><a href="/report/ar6/wg2/figures/chapter-ccp3/figure-ccp3-002" target="_blank"><button class="btn-ipcc btn btn-primary ch-figure-button">Open figure</button></a> </div>
                              </div>
                              <p class="Body_Body-justify" lang="en-GB">Recent changes in dust emissions and their attributions vary geographically. Warming in Iran over the period 1951&#8211;2013 has been associated with an increased frequency of dust events (<a class="reference-link" href="#Alizadeh-Choobari--2018">Alizadeh-Choobari and Najafi, 2018</a>) and a trend (2000&#8211;2014) towards increased fine atmospheric mineral dust concentrations in the US southwest has been linked to increasing aridity (<a class="reference-link" href="#Hand--2017">Hand et al., 2017</a>). Conversely, increases in rainfall, soil moisture and vegetation linked to changes in circulation strength of the Indian summer monsoon since 2002 have led to a substantial reduction of dust in the Thar Desert and surrounding region, showing agreement with findings from the Sahel and the West African Monsoon (<a class="reference-link" href="#Kergoat--2017">Kergoat et al., 2017</a>). A decreasing trend in the number and intensity of SDS in spring (2007&#8211;2016) in East Asia has also responded to higher precipitation and soil moisture, related to a decrease in the intensity of the polar vortex, favouring higher vegetation cover during the period studied (<a class="reference-link" href="#An--2018">An et al., 2018</a>). Global climate change, transboundary movement of aeolian material by atmospheric flows from Central Asia, dynamics of the Caspian Sea regime, erosion, salinisation and the loss of land as a result of the placement of industrial facilities have expanded the land area prone to desertification in Russia. Desertification has been observed to some extent in 27 sub-regions of the Russian Federation on territory of more than 100 million hectares (<a class="reference-link" href="#Kust--2011">Kust et al., 2011</a>; also recently confirmed by National Report, 2019). Eastern and south-eastern regions of Kalmykia, Russia, serve as dust sources, while dust and sand masses from areas of the Black Land sometimes move far beyond to parts of Rostov, Astrakhan, Volgograd and Stavropol regions. Agricultural land in these areas can become covered with dust and sand 10 cm or more thick, with negative impacts on yields (<a class="reference-link" href="#Tsymbarovich--2020">Tsymbarovich et al., 2020</a>). High dust day frequency is also occurring in the High Latitude Dust (HLD) source areas not reported in Figure CCP3.2, such as in Iceland, Patagonia, Canada, Alaska and, based on <span class="condensed_italic" lang="">in situ</span> measurements, in Antarctica (<a class="reference-link" href="#Dagsson-Waldhauserov&#225;--2014">Dagsson-Waldhauserov&#225; et al., 2014</a>; <a class="reference-link" href="#Bullard--2016">Bullard et al., 2016</a>; <a class="reference-link" href="#Dagsson-Waldhauserova--2019">Dagsson-Waldhauserova and Meinander, 2019</a>; <a class="reference-link" href="#Bachelder--2020">Bachelder et al., 2020</a>). Active HLD sources cover at least 500,000 km <span class="superscript _idGenCharOverride-1" lang="">2</span> and produce at least 5% of global dust budget (<a class="reference-link" href="#Bullard--2016">Bullard et al., 2016</a>). HLD has negative impacts on the cryosphere via albedo changes and snow/ice melting (<a class="reference-link" href="#Boy--2019">Boy, 2019</a>; <a class="reference-link" href="#Dagsson-Waldhauserova--2019">Dagsson-Waldhauserova and Meinander, 2019</a>).</p>
                            </div>
                          </div>
                          <div class="h3-container" id="CCP3.2.1.8">
                            <h3 class="Headings_H3" lang="de-DE">CCP3.2.1.8  Water Scarcity <span class="arrow-up"/><span class="arrow-down"/><span class="share-block"><img class="share-icon" src="../../share.png"/></span></h3>
                            <div class="h3-siblings" id="h3-8-siblings">
                              <p class="Body_Body-justify" lang="en-GB">Climate change and desertification have been linked to water loss (<a class="reference-link" href="#Bayram--2014">Bayram and &#214;zt&#252;rk, 2014</a>; <a class="reference-link" href="#Schwilch--2014">Schwilch et al., 2014</a>; <a class="reference-link" href="#Mohamed--2016">Mohamed et al., 2016</a>), decreases in water quantity for irrigation and contamination of surface water bodies (<a class="reference-link" href="#Middleton--2017">Middleton, 2017</a>). Increased runoff in areas in the Sahel with shallow soils increased water flows to lakes and the recharge of water tables (<a class="reference-link" href="#Favreau--2009">Favreau et al., 2009</a>; <a class="reference-link" href="#Gardelle--2010">Gardelle et al., 2010</a>; <a class="reference-link" href="#Descroix--2013">Descroix et al., 2013</a>; <a class="reference-link" href="#Kaptu&#233;--2015">Kaptu&#233; et al., 2015</a>; <a class="reference-link" href="#Gal--2017">Gal et al., 2017</a>). Water scarcity (<a class="section-link" data-title="Risk to water security (RKR-G)" href="/report/ar6/wg2/chapter/chapter-16#16.5.2.3.7">Section 16.5.2.3.7</a>) was among the first impacts of climate change recognised in North African countries such as Morocco which have extensive dryland areas, with countries such as Turkey, Libya, USA and China carrying out large-scale water transfer projects (<a class="reference-link" href="#Sternberg--2016">Sternberg, 2016</a>; <a class="reference-link" href="#Stringer--2021">Stringer et al., 2021</a>). The decrease in water availability in Morocco was substantial in terms of both surface water supply (<a class="reference-link" href="#Rochdane--2012">Rochdane et al., 2012</a>; <a class="reference-link" href="#Choukri--2020">Choukri et al., 2020</a>) and groundwater (<a class="reference-link" href="#Bahir--2020">Bahir et al., 2020</a>), threatening agricultural production.</p>
                            </div>
                          </div>
                        </div>
                      </div>
                      <div class="h2-container" id="CCP3.2.2">
                        <h2 class="Headings_H2-numbered" lang="de-DE">CCP3.2.2  Observed Impacts of Climate Change on Human Systems in Desert and Semiarid Areas <span class="arrow-up"/><span class="arrow-down"/><span class="share-block"><img class="share-icon" src="../../share.png"/></span></h2>
                        <div class="h2-siblings" id="h2-4-siblings">
                          <p class="Body_Body-justify" lang="en-GB">
                            <span lang="en-US">Climate change and desertification, alongside other drivers of degradation, reduce dryland ecosystem services, leading to losses of biodiversity, water, food and impacts on human health (Section <a class="section-link" data-title="Social and Human Vulnerability" href="/report/ar6/wg2/chapter/ccp3#CCP4.2.3">CCP4.2.3</a>) and well-being (</span>
                            <span class="condensed_italic" lang="en-US">high confidence</span>
                            <span lang="en-US">) (<a class="reference-link" href="#Mirzabaev--2019">Mirzabaev et al., 2019</a>) resulting in disruption to the economic structures and cultural practices of affected communities (<a class="reference-link" href="#Elhadary--2014">Elhadary, 2014</a>; <a class="reference-link" href="#Middleton--2017">Middleton, 2017</a>). </span>
                          </p>
                          <div class="h3-container" id="CCP3.2.2.1">
                            <h3 class="Headings_H3" lang="de-DE">CCP3.2.2.1  Sand and Dust Storms <span class="arrow-up"/><span class="arrow-down"/><span class="share-block"><img class="share-icon" src="../../share.png"/></span></h3>
                            <div class="h3-siblings" id="h3-9-siblings">
                              <p class="Body_Body-justify" lang="en-GB">Desertification and SDS can cause substantial socioeconomic damage in drylands (<a class="reference-link" href="#UNEP--1992">UNEP, 1992</a>; <a class="reference-link" href="#Opp--2021">Opp et al., 2021</a>) over both the short and long term. Short-term impacts occur on health, food production systems, infrastructure (damaging buildings, energy systems and communications), transport and related economic productivity, air and road traffic, and costs incurred in clearing sand and dust from deposition areas (<a class="reference-link" href="#Mirzabaev--2019">Mirzabaev et al., 2019</a>). In the Arab region increasing frequency of SDS events is projected to further exacerbate water scarcity and drought (<a class="reference-link" href="#ESCWA--2017">ESCWA, 2017</a>). Longer-term costs include loss of ecosystem services, biodiversity and habitat, chronic health problems, soil erosion and reduced soil quality (particularly through nutrient losses and deposition of pollutants), and disruption of global climate regulation (<a class="reference-link" href="#Middleton--2018">Middleton, 2018</a>; <a class="reference-link" href="#Allahbakhshi--2019">Allahbakhshi et al., 2019</a>). Dust deposition nevertheless can offer environmental and economic benefits, bringing important nutrients that improve and sustain soil fertility (Marticorena et al., 2017). Preventing and reducing SDS entails upfront investment costs but full benefit&#8211;cost analyses of different measures compared to the costs of inaction are scarce and need to consider the likely  frequency and magnitude of SDS events (Tozer and Leys, 2013).</p>
                            </div>
                          </div>
                          <div class="h3-container" id="CCP3.2.2.2">
                            <h3 class="Headings_H3" lang="de-DE">CCP3.2.2.2  Human Health <span class="arrow-up"/><span class="arrow-down"/><span class="share-block"><img class="share-icon" src="../../share.png"/></span></h3>
                            <div class="h3-siblings" id="h3-10-siblings">
                              <p class="Body_Body-justify" lang="en-GB">The potential impacts of climate change, recurrent droughts and desertification on human health in drylands include: higher risks from water scarcity (linked to deteriorating surface and ground water quality and water-borne diseases; <a class="reference-link" href="#Stringer--2021">Stringer et al., 2021</a>), food insecurity and malnutrition (<a class="section-link" data-title="Food system" href="/report/ar6/wg2/chapter/chapter-16#16.2.3.4">Section 16.2.3.4</a>) in the absence of sufficient imports, respiratory, cardiovascular and infectious diseases caused by SDS (<a class="reference-link" href="#Mirzabaev--2019">Mirzabaev et al., 2019</a>), potential displacement and migration and mental health consequences (Chapter 7; <a class="reference-link" href="#Stringer--2021">Stringer et al., 2021</a>) and heat stress (<a class="reference-link" href="#Dunne--2013">Dunne et al., 2013</a>; <a class="reference-link" href="#Zhao--2015">Zhao et al., 2015</a>; <a class="reference-link" href="#Russo--2016">Russo et al., 2016</a>). SDS negatively impact human health through various pathways, causing respiratory, cardiovascular diseases and facilitating infections (<span class="condensed_italic" lang="">high confidence</span>) (<a class="reference-link" href="#D&#237;az--2017">D&#237;az et al., 2017</a>; <a class="reference-link" href="#Goudarzi--2017">Goudarzi et al., 2017</a>; <a class="reference-link" href="#Allahbakhshi--2019">Allahbakhshi et al., 2019</a>; <a class="reference-link" href="#M&#252;nzel--2019">M&#252;nzel et al., 2019</a>). <span class="condensed_italic" lang=""/> SDS can cause mortality and injuries related to transport accidents (<a class="reference-link" href="#Goudie--2014">Goudie, 2014</a>). Research from China suggests that prenatal exposure to SDS can affect children&#8217;s cognitive function (<a class="reference-link" href="#Li--2018">Li et al., 2018</a>). The pollutants that are entrained and ingested or inhaled closely link to the land management strategies in source areas.</p>
                              <p class="Body_Body-justify" lang="en-GB">Droughts are among the natural hazards with the highest adverse impacts on human populations (<a class="reference-link" href="#Mishra--2010">Mishra and Singh, 2010</a>; Arias et al., 2021). Although droughts represented just 4% of hazard events, their impacts amounted to 31% of affected people (29 million) (<a class="reference-link" href="#Louvain--2019">Louvain, 2019</a>). Drought exposure relates to a higher risk of undernutrition (<a class="section-link" data-title="Risk to food security (RKR-F)" href="/report/ar6/wg2/chapter/chapter-16#16.5.2.3.6">Section 16.5.2.3.6</a>), among vulnerable populations (<a class="reference-link" href="#Kumar--2016">Kumar, 2016</a>), particularly children (<a class="reference-link" href="#IFPRI--2016">IFPRI, 2016</a>) for whom the impacts can lead to lifelong consequences through stunted growth, impaired cognitive ability and reduced future educational and work performance (UNICEF/WHO/WBG, 2019). The corresponding costs of children stunting in terms of lost economic growth can be of the order of 7% of per capita income in developing countries (Galasso and Wagstaff, 2018).</p>
                            </div>
                          </div>
                          <div class="h3-container" id="CCP3.2.2.3">
                            <h3 class="Headings_H3" lang="de-DE">CCP3.2.2.3  Agro-ecological Food Systems, Livelihoods and Food Security <span class="arrow-up"/><span class="arrow-down"/><span class="share-block"><img class="share-icon" src="../../share.png"/></span></h3>
                            <div class="h3-siblings" id="h3-11-siblings">
                              <p class="Body_Body-justify" lang="en-GB">Rising temperatures, variation in rainfall patterns and frequent extreme weather events associated with climate change have adversely affected agro-ecological food systems and pastoral systems in some drylands (<a class="reference-link" href="#Zhu--2013">Zhu et al., 2013</a>; <a class="reference-link" href="#Amin--2018">Amin et al., 2018</a>), especially in developing countries (<a class="reference-link" href="#Haider--2014">Haider and Adnan, 2014</a>; <a class="reference-link" href="#Ahmed--2016">Ahmed et al., 2016</a>; <a class="reference-link" href="#ur Rahman--2018">ur Rahman et al., 2018</a>) where desertification is a key challenge to agricultural livelihoods. Recurrent droughts in recent decades, coupled with wind erosion (particularly of fine sediment which gives soil its water-holding capacity and nutrients), affected vast areas in Argentina, leading to land abandonment and agricultural fields being covered by sand and invasive plants (<a class="reference-link" href="#Abraham--2016">Abraham et al., 2016</a>). Temperature increases have contributed to reduced wheat yields in arid, semiarid and dry sub-humid zones of Pakistan (<a class="reference-link" href="#Sultana--2019">Sultana et al., 2019</a>). Agricultural production in the drylands of South Punjab is experiencing irreversible impacts since the grain formation phase has become swifter with a warmer climate, leading to improper growth and reduced yields (<a class="reference-link" href="#Rasul--2011">Rasul et al., 2011</a>).</p>
                              <p class="Body_Body-justify" lang="en-GB"><a class="reference-link" href="#Aslam--2018">Aslam et al. (2018)</a>  regard climate change impacts as particularly threatening to the livestock sector, water and food security, and the economy beyond agriculture in South Punjab, particularly as yields decrease. In the livestock sector across global drylands (WGI TS.4.3.2.10), observed impacts include reduction of plant cover in rangelands, reduced livestock and crop yields, loss of biodiversity and increased land degradation and soil nutrient loss (Van de Steeg, 2012; <a class="reference-link" href="#Mganga--2015">Mganga et al., 2015</a>; <a class="reference-link" href="#Ahmed--2016">Ahmed et al., 2016</a>; <a class="reference-link" href="#Mohamed--2016">Mohamed et al., 2016</a>; <a class="reference-link" href="#Eldridge--2018">Eldridge and Beecham, 2018</a>, Arias et al., 2021), as well as injury and livestock death due to SDS. This is particularly worrisome for traditional pastoralists who find themselves with fewer safety nets and more limited adaptive capacities than in the past, particularly where mobility, access and tenure rights are becoming restricted (Box CCP3.1) and where use of technologies such as mobile phones can result in mixed effects, as found in Morocco (<a class="reference-link" href="#Vidal-Gonz&#225;lez--2018">Vidal-Gonz&#225;lez and Nahhass, 2018</a>). Observed SDS impacts can increase food production costs and threaten sustainability more generally (<a class="reference-link" href="#Middleton--2017">Middleton, 2017</a>).</p>
                              <p class="Body_Body-justify" lang="en-GB">Woody plant encroachment and greening may be masking underlying land degradation processes and losses of ecosystem services, livelihood and adaptation options in pastoral livelihood systems (<a class="reference-link" href="#Reed--2015">Reed et al., 2015</a>; <a class="reference-link" href="#Chen--2019a">Chen et al., 2019a</a>). Woody encroachment alters ecosystem services, particularly in rangelands, resulting in reduction of grass cover, hindering livestock production (Anad&#243;n et al. 2014), reducing water availability (Honda and Durigan 2016, <a class="reference-link" href="#Stringer--2021">Stringer et al., 2021</a>) but increasing availability of wood (Mograbi et al., 2019).</p>
                            </div>
                          </div>
                          <div class="h3-container" id="CCP3.2.2.4">
                            <h3 class="Headings_H3" lang="de-DE">CCP3.2.2.4  Gender Differentiated Impacts <span class="arrow-up"/><span class="arrow-down"/><span class="share-block"><img class="share-icon" src="../../share.png"/></span></h3>
                            <div class="h3-siblings" id="h3-12-siblings">
