                      </div>
                      <div class="h2-container" id="CCP4.3.3">
                        <h2 class="Headings_H2-numbered" lang="de-DE">CCP4.3.3  Inland Ecosystems <span class="arrow-up"/><span class="arrow-down"/><span class="share-block"><img class="share-icon" src="../../share.png"/></span></h2>
                        <div class="h2-siblings" id="h2-10-siblings">
                          <p class="Body_Body-justify" lang="en-GB">Beyond 3&#176;C GWL, 13&#8211;30% of the Mediterranean Natura 2000 protected area and 15&#8211;23% of Natura 2000 sites are projected to change towards more arid ecosystem types (<a class="reference-link" href="#Barredo--2016">Barredo et al., 2016</a>). Biodiversity and ecosystem services would be exposed to degradation of wetland hydrology, which could affect 19&#8211;32% of localities under a 1.5&#176;C&#8211;2&#176;C GWL (48&#8211;73% under higher warming), particularly in Spain, Portugal, Morocco and Algeria (<a class="reference-link" href="#Lefebvre--2019">Lefebvre et al., 2019</a>). There is also a substantial shrinking of terrestrial and freshwater ecosystem habitats, in particular in Mediterranean islands (Chapters 2; 4; CCP1).</p>
                          <p class="Body_Body-justify" lang="en-GB">Increased aridity impacts forest ecosystems (<a class="reference-link" href="#Costa-Saura--2017">Costa-Saura et al., 2017</a>; <a class="reference-link" href="#Garc&#237;a S&#225;nchez--2018">Garc&#237;a S&#225;nchez et al., 2018</a>). Increasing heat waves, combined with drought and land use change, reduce fuel moisture, thereby increasing fire risk, extending the duration of fire seasons and increasing the likelihood of large, severe fires (<span class="condensed_italic" lang="">high confidence</span>) (<a class="reference-link" href="#EEA--2017">EEA, 2017</a>; <a class="reference-link" href="#Lozano--2017">Lozano et al., 2017</a>; <a class="reference-link" href="#Pe&#241;uelas--2017">Pe&#241;uelas et al., 2017</a>; <a class="reference-link" href="#Varela--2019">Varela et al., 2019</a>). Fires impact vegetation recovery after abandonment, thus transforming landscapes (<a class="reference-link" href="#Gonz&#225;lez-De Vega--2016">Gonz&#225;lez-De Vega et al., 2016</a>). At warming levels of 1.5&#176;C, 2&#176;C and 3&#176;C, burnt area in Mediterranean Europe could increase by 40&#8211;54%, 62&#8211;87% and 96&#8211;187%, respectively (<a class="reference-link" href="#Turco--2018b">Turco et al., 2018b</a>), although changes are highly site dependent and also affected by management (<a class="reference-link" href="#Caon--2014">Caon et al., 2014</a>; <a class="reference-link" href="#Wu--2015">Wu et al., 2015</a>; <a class="reference-link" href="#Parra--2018">Parra and Moreno, 2018</a>; <a class="reference-link" href="#Brotons--2019">Brotons and Duane, 2019</a>; <a class="reference-link" href="#Hinojosa--2019">Hinojosa et al., 2019</a>).</p>
                          <p class="Body_Body-justify" lang="en-GB">Desertification occurs in large parts of the region, generally due to unsustainable land use (<a class="reference-link" href="#Pe&#241;uelas--2017">Pe&#241;uelas et al., 2017</a>). Increasing drought is projected to exacerbate desertification in North Africa and, under high warming, also southern Spain. In some areas, sclerophyllous vegetation could replace deciduous forests (<a class="reference-link" href="#Guiot--2016">Guiot and Cramer, 2016</a>). Increasing temperatures and drought could trigger dieback for some forest species such as Mediterranean oak (<a class="reference-link" href="#S&#225;nchez-Salguero--2020">S&#225;nchez-Salguero et al., 2020</a>), potentially also in combination with biotic factors such as pathogens (<a class="reference-link" href="#Mat&#237;as--2019">Mat&#237;as et al., 2019</a>).</p>
                        </div>
                      </div>
                      <div class="h2-container" id="CCP4.3.4">
                        <h2 class="Headings_H2-numbered" lang="de-DE">CCP4.3.4  Water, Agriculture and Food Production <span class="arrow-up"/><span class="arrow-down"/><span class="share-block"><img class="share-icon" src="../../share.png"/></span></h2>
                        <div class="h2-siblings" id="h2-11-siblings">
                          <p class="Body_Body-justify" lang="en-GB">River runoff and low flows are expected to decrease (possibly by 12&#8211;15% or more) in most locations due to reduced precipitation (<a class="reference-link" href="#Giuntoli--2015">Giuntoli et al., 2015</a>; <a class="reference-link" href="#Roudier--2016">Roudier et al., 2016</a>; <a class="reference-link" href="#Andrew--2017">Andrew and Sauquet, 2017</a>; <a class="reference-link" href="#Gosling--2017">Gosling et al., 2017</a>; <a class="reference-link" href="#Marchane--2017">Marchane et al., 2017</a>; <a class="reference-link" href="#Marcos-Garcia--2017">Marcos-Garcia et al., 2017</a>; <a class="reference-link" href="#Marx--2018">Marx et al., 2018</a>; <a class="reference-link" href="#Yeste--2021">Yeste et al., 2021</a>). Groundwater recharge is projected to decrease due to reduced inflow (WGI AR6 Chapter 11, Ranasinghe et al., 2021; <a class="reference-link" href="#Koutroulis--2016">Koutroulis et al., 2016</a>; <a class="reference-link" href="#Guyennon--2017">Guyennon et al., 2017</a>; <a class="reference-link" href="#Braca--2019">Braca et al., 2019</a>; <a class="reference-link" href="#Calvache--2020">Calvache et al., 2020</a>). Water levels in lakes and availability of reservoirs are expected to decline by up to 45% in 2100 (<a class="reference-link" href="#Koutroulis--2016">Koutroulis et al., 2016</a>; <a class="reference-link" href="#Masia--2018">Masia et al., 2018</a>; <a class="reference-link" href="#Okkan--2018">Okkan and Kirdemir, 2018</a>; <a class="reference-link" href="#Braca--2019">Braca et al., 2019</a>; <a class="reference-link" href="#Tramblay--2020">Tramblay et al., 2020</a>). The largest freshwater lake in the basin, Lake Bey&#351;ehir (Turkey), could dry out after 2070 (<a class="reference-link" href="#Bucak--2017">Bucak et al., 2017</a>). In northern Africa, surface water availability is projected to be reduced by 5&#8211;40% in 2030&#8211;2065 and by 7&#8211;55% in 2066&#8211;2095 from 1976&#8211;2005 (<a class="reference-link" href="#Tramblay--2018">Tramblay et al., 2018</a>), with decreases of runoff by 10&#8211;63% by mid-century in Morocco and Tunisia (<a class="reference-link" href="#Marchane--2017">Marchane et al., 2017</a>; <a class="reference-link" href="#Dakhlaoui--2020">Dakhlaoui et al., 2020</a>). Reduced summer river flows and increasing water temperatures will constrain freshwater-cooled thermoelectric (including nuclear) power plants and hydropower plants, with possible reductions of production in the northern Mediterranean by 6&#8211;33% under 2&#176;C and by 20&#8211;60% beyond 3&#176;C warming (<a class="reference-link" href="#Lobanova--2016">Lobanova et al., 2016</a>; <a class="reference-link" href="#Solaun--2017">Solaun and Cerd&#225;, 2017</a>; <a class="reference-link" href="#Payet-Burin--2018">Payet-Burin et al., 2018</a>; <a class="reference-link" href="#Tobin--2018">Tobin et al., 2018</a>).These findings confirm the WGI AR6 <a class="section-link" data-title="Poverty, livelihoods and sustainable development" href="/report/ar6/wg2/chapter/chapter-8">Chapter 8</a>  statement that drought duration and frequencies and water scarcity are projected to increase drastically between 1.5&#176;C and 2&#176;C of GWLs (Douville et al., 2021).</p>
                          <p class="Body_Body-justify" lang="en-GB">Climate change will <span class="condensed_italic" lang="">likely </span> reduce crop yields in many areas (Table CCP4.1), mainly due to higher temperatures affecting crop phenology and the shortening of the crop growing season (<span class="condensed_italic" lang="">high confidence</span>). Additional irrigation will be needed for most crops, although the shortening of the growing season could reduce irrigation needs in some cases (<a class="reference-link" href="#Saadi--2015">Saadi et al., 2015</a>). Irrigation needs could increase by 25% in northern and two-fold in southeastern Mediterranean (<a class="reference-link" href="#Fader--2016">Fader et al., 2016</a>), with arid southern areas at risk of insufficient water resources by 2100. The use of supplemental irrigation for winter wheat could become more common in northern Mediterranean (<a class="reference-link" href="#Saadi--2015">Saadi et al., 2015</a>; <a class="reference-link" href="#Ruiz-Ramos--2018">Ruiz-Ramos et al., 2018</a>).</p>
                          <p class="Body_Body-justify" lang="en-GB">Seawater intrusion is projected to cause additional risks in coastal aquifers, with severe impacts on agricultural productivity (<a class="reference-link" href="#Ali--2016">Ali and El-Magd, 2016</a>; <a class="reference-link" href="#Wassef--2016">Wassef and Sch&#252;ttrumpf, 2016</a>; <a class="reference-link" href="#Pulido-Velazquez--2018">Pulido-Velazquez et al., 2018</a>; <a class="reference-link" href="#Twining-Ward--2018">Twining-Ward et al., 2018</a>; <a class="reference-link" href="#Omran--2020">Omran and Negm, 2020</a>). While elevated atmospheric CO<span class="subscript CharOverride-1" lang="">2</span> concentration could be positive for photosynthesis and cereal yields (<a class="reference-link" href="#Dixit--2018">Dixit et al., 2018</a>; <a class="reference-link" href="#Ben-Asher--2019">Ben-Asher et al., 2019</a>; <a class="reference-link" href="#Kapur--2019">Kapur et al., 2019</a>; <a class="reference-link" href="#Kheir--2019">Kheir et al., 2019</a>), the net outcome for agricultural production is highly uncertain (<a class="reference-link" href="#Moriondo--2016">Moriondo et al., 2016</a>). The projected yield losses will <span class="condensed_italic" lang="">likely </span> reduce farm revenues, for example, in Morocco (<a class="reference-link" href="#Ouraich--2018">Ouraich and Tyner, 2018</a>), Egypt (<a class="reference-link" href="#Abd El-Azeem--2020">Abd El-Azeem, 2020</a>), Greece (<a class="reference-link" href="#Georgopoulou--2017">Georgopoulou et al., 2017</a>) and Israel (<a class="reference-link" href="#Zelingher--2019">Zelingher et al., 2019</a>). Given the growing water demand from agriculture and other users and the increasing competition over water resources, adaptation efforts for water supply need to be enhanced (<a class="reference-link" href="#Guyennon--2017">Guyennon et al., 2017</a>; <a class="reference-link" href="#Zabalza-Mart&#237;nez--2018">Zabalza-Mart&#237;nez et al., 2018</a>).</p>
                          <p class="Body_Body-justify" lang="en-GB">Climate-driven change in pelagic production (Section CCP4.3.1), together with overfishing, will <span class="condensed_italic" lang="">likely </span> increase risks for fishery landings (<a class="reference-link" href="#Hidalgo--2018">Hidalgo et al., 2018</a>). By 2060, more than 20% of exploited fishes and invertebrates currently found in eastern Mediterranean could become locally extinct (<a class="reference-link" href="#Jones--2015">Jones and Cheung, 2015</a>; <a class="reference-link" href="#Cheung--2016">Cheung et al., 2016</a>; <a class="reference-link" href="#Balzan--2020">Balzan et al., 2020</a>). Thermophilic and/or thermal-tolerant tropical species may increasingly dominate the catch composition (<a class="reference-link" href="#Moullec--2019">Moullec et al., 2019</a>), creating possible opportunities depending on technology and consumer acceptance of new species (<a class="reference-link" href="#Hidalgo--2018">Hidalgo et al., 2018</a>). Warming and acidification may weaken mussel shells, negatively impacting shellfish aquaculture (<a class="reference-link" href="#Martinez--2018">Martinez et al., 2018</a>). High losses of clawed lobster production by the end of the century are projected under RCP4.5 (<a class="reference-link" href="#Boavida-Portugal--2018">Boavida-Portugal et al., 2018</a>). For much of the region, fisheries revenue may decrease by 15&#8211;30% by 2050 relative to 2000 under RCP8.5 (<a class="reference-link" href="#Lam--2016">Lam et al., 2016</a>).</p>
                          <p class="Body_Body-justify" lang="en-GB">Overall, reduced crop yields and fishery landings, combined with other factors such as rapid population growth and urbanisation, increasing competition for water and changing lifestyles, will <span class="condensed_italic" lang="">likely </span> impact food security, particularly in North Africa and the Middle East (<a class="reference-link" href="#Jobbins--2015">Jobbins and Henley, 2015</a>).</p>
                          <p class="Body_Tables_Table_title" lang="en-US"><span class="table_number" lang="">Table CCP4.1  | </span>Projected risks for crop production in the Mediterranean Basin.</p>
                          <table class="Table" id="table001">
                            <colgroup>
                              <col class="_idGenTableRowColumn-1"/>
                              <col class="_idGenTableRowColumn-2"/>
                            </colgroup>
                            <thead>
                              <tr class="Table _idGenTableRowColumn-3">
                                <td class="Table Head-blue Head-blue">
                                  <p class="Body_Tables_Table_header-black" lang="en-US">
                                    <span class="bold_condensed" lang="en-GB">Crop</span>
                                  </p>
                                </td>
                                <td class="Table Head-blue Head-blue">
                                  <p class="Body_Tables_Table_header-black" lang="en-US">
                                    <span class="bold_condensed" lang="en-GB">Projected risk</span>
                                  </p>
                                </td>
                              </tr>
                            </thead>
                            <tbody>
                              <tr class="Table _idGenTableRowColumn-4">
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Cereals and rice</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Under 2&#176;C warming and beyond, rain-fed wheat yield in most locations could decline by 2&#8211;59%, depending on agricultural practices (<a class="reference-link" href="#Chourghal--2016">Chourghal et al., 2016</a>; <a class="reference-link" href="#Dettori--2017">Dettori et al., 2017</a>; <a class="reference-link" href="#Iocola--2017">Iocola et al., 2017</a>; <a class="reference-link" href="#Brouziyne--2018">Brouziyne et al., 2018</a>; <a class="reference-link" href="#Kheir--2019">Kheir et al., 2019</a>). Under 1.5&#8211;3&#176;C warming and reduced rainfall, yield decreases are also projected for maize (<a class="reference-link" href="#Georgopoulou--2017">Georgopoulou et al., 2017</a>; <a class="reference-link" href="#Iocola--2017">Iocola et al., 2017</a>) and barley (<a class="reference-link" href="#Bouregaa--2019">Bouregaa, 2019</a>; <a class="reference-link" href="#Cammarano--2019">Cammarano et al., 2019</a>), mainly due to the shortening of the crop growing season by up to 30 days due to higher temperatures (<a class="reference-link" href="#Saadi--2015">Saadi et al., 2015</a>; <a class="reference-link" href="#Bird--2016">Bird et al., 2016</a>; <a class="reference-link" href="#Waha--2017">Waha et al., 2017</a>; <a class="reference-link" href="#Bouregaa--2019">Bouregaa, 2019</a>). In Tunisia, cereal production may decrease by 0.79% with a 1% decrease in precipitation (<a class="reference-link" href="#Zouabi--2015">Zouabi and Peridy, 2015</a>). Reductions of rice yields in parts of the region are projected in the absence of adaptation; for example, by 6&#8211;20% in southern France and Italy in 2070 under RCP8.5 (<a class="reference-link" href="#Bregaglio--2017">Bregaglio et al., 2017</a>).</p>
                                </td>
                              </tr>
                              <tr class="Table _idGenTableRowColumn-5">
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Olives</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Higher temperatures and more frequent extreme heat events around flowering will <span class="condensed_italic" lang="">likely </span> affect phenology. While suitable areas for olive cultivation could extend northward and to higher elevations under the A1B scenario in 2036&#8211;2065 (<a class="reference-link" href="#Tanasijevic--2014">Tanasijevic et al., 2014</a>), negative consequences for several countries are expected, including southern Spain (<a class="reference-link" href="#Gabald&#243;n-Leal--2017">Gabald&#243;n-Leal et al., 2017</a>; <a class="reference-link" href="#Arenas-Castro--2020">Arenas-Castro et al., 2020</a>) and Tunisia (<a class="reference-link" href="#Ouessar--2017">Ouessar, 2017</a>) under 2&#176;C warming. Under 1.5&#176;C&#8211;2&#176;C GWL, olive yields in northern Mediterranean locations could decrease by up to 21% (<a class="reference-link" href="#Brilli--2019">Brilli et al., 2019</a>; <a class="reference-link" href="#Fraga--2020">Fraga et al., 2020</a>). A 3&#176;C warming could cause a 15&#8211;64% drop of production of rain-fed olives in Algeria (<a class="reference-link" href="#Bouregaa--2019">Bouregaa, 2019</a>).</p>
                                </td>
                              </tr>
                              <tr class="Table _idGenTableRowColumn-6">
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Vegetables</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Yields could decline by up to 45% under current irrigation in some areas by 2050 under the A1B scenario (<a class="reference-link" href="#Zhao--2015">Zhao et al., 2015</a>; <a class="reference-link" href="#Georgopoulou--2017">Georgopoulou et al., 2017</a>), while a lower availability of irrigation water would lead to further losses (<a class="reference-link" href="#Saadi--2015">Saadi et al., 2015</a>) or even to non-viability of crops in some locations; for example, in Tunisia beyond 2&#176;C warming (<a class="reference-link" href="#Bird--2016">Bird et al., 2016</a>).</p>
                                </td>
                              </tr>
                              <tr class="Table _idGenTableRowColumn-7">
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Fruit trees</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Flowering of many fruit trees may be delayed, and chilling accumulation may be threatened. In Spain, under the A2 scenario, apples at maturity could be of inferior quality from mid-century, while after 2070, 28&#8211;72% of the years could have winters that do not fulfil chilling requirements (<a class="reference-link" href="#Rodr&#237;guez--2019">Rodr&#237;guez et al., 2019</a>) Similar threats for other fruit trees were found beyond 3&#176;C GWL (<a class="reference-link" href="#Funes--2016">Funes et al., 2016</a>).</p>
                                </td>
                              </tr>
                              <tr class="Table _idGenTableRowColumn-8">
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Grapevines and orchards</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Climate change could advance bud break and flowering, shortening the growing season by 20&#8211;35 days after 2060 under RCP8.5 (<a class="reference-link" href="#Fraga--2016">Fraga et al., 2016</a>; <a class="reference-link" href="#Ramos--2017">Ramos, 2017</a>; <a class="reference-link" href="#Leolini--2018">Leolini et al., 2018</a>; <a class="reference-link" href="#Ramos--2018">Ramos et al., 2018</a>) and shifting maturation under high summer temperatures, thus affecting grape quality. Higher temperatures may increase evapotranspiration and therefore water deficit (<a class="reference-link" href="#Ramos--2018">Ramos et al., 2018</a>). Some locations may suffer from high winter temperatures, causing a lack of chilling accumulation and ultimately missed bud break (<a class="reference-link" href="#Leolini--2018">Leolini et al., 2018</a>). Early maturation may result in unbalanced wine quality through higher sugar and lower acids in the grape must after 2050 under RCP8.5 (<a class="reference-link" href="#Fraga--2016">Fraga et al., 2016</a>; <a class="reference-link" href="#Koufos--2018">Koufos et al., 2018</a>). Negative impacts of climate change on table quality vines and wine grape production in Southern Europe after 2040 under RCP8.5 have been projected (<a class="reference-link" href="#Cardell--2019">Cardell et al., 2019</a>).</p>
                                </td>
                              </tr>
                              <tr class="Table _idGenTableRowColumn-9">
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Dates</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Irrigation requirements for date palms in Tunisia under RCP8.5 could increase by 34% in 2050 from present to sustain date production (<a class="reference-link" href="#Haj-Amor--2020">Haj-Amor et al., 2020</a>), with adverse effects on groundwater resources.</p>
                                </td>
                              </tr>
                            </tbody>
                          </table>
                        </div>
                      </div>
                      <div class="h2-container" id="CCP4.3.5">
                        <h2 class="Headings_H2-numbered" lang="de-DE">CCP4.3.5  Human Health and Cultural Heritage <span class="arrow-up"/><span class="arrow-down"/><span class="share-block"><img class="share-icon" src="../../share.png"/></span></h2>
                        <div class="h2-siblings" id="h2-12-siblings">
                          <p class="Body_Body-justify" lang="en-GB">Warming is projected to impact human health, mostly through increased intensity, frequency and duration of heat waves (<span class="condensed_italic" lang="">high confidence</span>) (<a class="reference-link" href="#Guerreiro--2018">Guerreiro et al., 2018</a>; <a class="reference-link" href="#Jacob--2018">Jacob et al., 2018</a>; <a class="reference-link" href="#Rohat--2019">Rohat et al., 2019</a>; <a class="reference-link" href="#Smid--2019">Smid et al., 2019</a>). Under current socioeconomic conditions, 53&#8211;93 million more people could be exposed to high or very high heat stress in northern Mediterranean by 2050 (<a class="reference-link" href="#Rohat--2019">Rohat et al., 2019</a>) and heat-related excess mortality could increase by more than six-fold above 3&#176;C GWL (<a class="reference-link" href="#Gasparrini--2017">Gasparrini et al., 2017</a>). In MENA countries, the mortality risk of the elderly in 2100 could be 8&#8211;20 times higher under RCP8.5 compared to 1951&#8211;2005, and still 3&#8211;7 times higher under RCP4.5 (<a class="reference-link" href="#Ahmadalipour--2018">Ahmadalipour and Moradkhani, 2018</a>). Deaths attributable to high temperatures in the northern Mediterranean could increase by 18&#8211;20,000 in 2050 (50,000 in 2100) under RCP8.5 (1.4 and 2.6 times lower under RCP4.5) (<a class="reference-link" href="#Kendrovski--2017">Kendrovski et al., 2017</a>).</p>
                          <p class="Body_Body-justify" lang="en-GB">Climate change and variability may also influence the emergence of vector-, food- and water-borne diseases (<a class="reference-link" href="#Negev--2015">Negev et al., 2015</a>). Under RCP8.5, the epidemic potential of dengue fever in Southern Europe is projected to increase by 2100 (<a class="reference-link" href="#Liu-Helmersson--2019">Liu-Helmersson et al., 2019</a>), as well as the risk of infections by West Nile virus in 2050 under A1B (<a class="reference-link" href="#Semenza--2016">Semenza et al., 2016</a>). Climate-induced diseases could reduce labour productivity in the region by 2060, particularly in MENA countries (<a class="reference-link" href="#Dellink--2019">Dellink et al., 2019</a>). Overall, there is still uncertainty in projections of the future severity and distribution of diseases because of climate change due to the complex interactions between hosts, pathogens and vectors. Reductions in fruit and vegetable consumption as a result of climate change on food availability could lead to more than 20,000 deaths in 2050 under RCP8.5 from diseases caused by malnutrition (<a class="reference-link" href="#Springmann--2016">Springmann et al., 2016</a>).</p>
                          <p class="Body_Body-justify" lang="en-GB">Extreme high temperatures, hot days and nights and consequently cooling degree days will <span class="condensed_italic" lang="">likely </span> increase (<span class="condensed_italic" lang="">high confidence</span>) (<a class="reference-link" href="#Spinoni--2018a">Spinoni et al., 2018a</a>; <a class="reference-link" href="#Coppola--2021">Coppola et al., 2021</a>), with specific cooling needs in cities possibly increasing by 50&#8211;278% under 2&#176;C GWL and 134&#8211;375% beyond 3&#176;C GWL (<a class="reference-link" href="#Cellura--2018">Cellura et al., 2018</a>). Urban heat island effects will further increase cooling needs (<a class="reference-link" href="#Salvati--2017">Salvati et al., 2017</a>; <a class="reference-link" href="#Zinzi--2017">Zinzi and Carnielo, 2017</a>). Higher temperatures will increase thermal and chemical stress on materials used in many ancient buildings and sculptures, such as marble, stone and masonry (<a class="reference-link" href="#Bonazza--2009">Bonazza et al., 2009</a>; <a class="reference-link" href="#Leissner--2015">Leissner et al., 2015</a>).</p>
                          <p class="Body_Body-justify" lang="en-GB">Many studies project a decrease of climatic comfort for tourism in the Mediterranean by 2071 to 2100, particularly during summer (<a class="reference-link" href="#Grillakis--2016">Grillakis et al., 2016</a>; <a class="reference-link" href="#Jacob--2018">Jacob et al., 2018</a>; <a class="reference-link" href="#Braki--2019">Braki and Anagnostopoulou, 2019</a>). There is adaptive potential in the extension of the period with favourable climatic conditions for urban tourism in northern Mediterranean cities (<a class="reference-link" href="#Scott--2016">Scott et al., 2016</a>). Water scarcity may create additional constraints for tourism (<a class="reference-link" href="#K&#246;berl--2016">K&#246;berl et al., 2016</a>).</p>
                          <p class="Body_Body-justify" lang="en-GB">Cultural heritage sites in the region face risks from coastal flooding, with 37 out of 49 cultural World Heritage sites today facing risk from a 100-year flood, and 42 of them from coastal erosion (<a class="reference-link" href="#Reimann--2018b">Reimann et al., 2018b</a>). Sea level rise will increase these risks (<span class="condensed_italic" lang="">high confidence</span>) (<a class="reference-link" href="#Lionello--2012">Lionello, 2012</a>; <a class="reference-link" href="#Rizzi--2017">Rizzi et al., 2017</a>; <a class="reference-link" href="#Reimann--2018b">Reimann et al., 2018b</a>; <a class="reference-link" href="#Ravanelli--2019">Ravanelli et al., 2019</a>; <a class="reference-link" href="#Tagliapietra--2019">Tagliapietra et al., 2019</a>). By 2100, 47 of the 49 United Nations Educational, Scientific and Cultural Organization (UNESCO) sites are projected to be at risk from coastal flooding or erosion (<a class="reference-link" href="#Reimann--2018b">Reimann et al., 2018b</a>). Beyond 2100, sea levels are committed to rise further and represent an existential threat for the high number of coastal cultural heritage located in the Mediterranean (WGI AR6 Chapter 9, Fox-Kemper et al., 2021; Chapter 13; Cross-Chapter Box SLR in Chapter 3; <a class="reference-link" href="#Marzeion--2014">Marzeion and Levermann, 2014</a>).</p>
                        </div>
                      </div>
                      <div class="h2-container" id="CCP4.3.6">
                        <h2 class="Headings_H2-numbered" lang="de-DE">CCP4.3.6  Synthesis of Key Risks <span class="arrow-up"/><span class="arrow-down"/><span class="share-block"><img class="share-icon" src="../../share.png"/></span></h2>
                        <div class="h2-siblings" id="h2-13-siblings">
                          <p class="Body_Body-justify" lang="en-GB">For the Mediterranean Basin, all currently projected pathways of climate change will exacerbate climate-related risks in multiple systems and economic sectors, and for human health and well-being, amplifying current pressures on local ecosystems, economies and human well-being (Figures CCP4.7; CCP4.8; <a class="reference-link" href="#Cramer--2018">Cramer et al., 2018</a>; <a class="reference-link" href="#MedECC--2020">MedECC, 2020</a>). While the majority of these risks apply across the entire region, many are specific for certain sub-regions or locations.</p>
                          <div class="Figure" id="_idContainer023">
                            <p class="Body_Figures_Figure" lang="de-DE">
                              <img alt="" class="_idGenObjectAttribute-7" id="figure-ccp4-007" loading="lazy" src="https://ipcc.ch/report/ar6/wg2/downloads/figures/IPCC_AR6_WGII_Figure_CCP4_007.png"/>
                            </p>
                            <p class="Body_Figures_Figure_title" lang="en-US"><span class="figure_number" lang="">Figure CCP4.7 | </span><span class="bold_condensed-dark-blue" lang="">Key risks in the Mediterranean and their location across the Mediterranean region for SSP5-RCP8. </span><span class="bold_condensed-dark-blue" lang="">5 by 2100 (Sections CCP4.3.2 &#8211;6; Table SMCCP4.2a and b for details). </span>Risks to World Cultural Heritage sites from flooding or erosion due to sea level rise in multiple locations (Section CCP4.3.5) and Mediterranean river deltas are hotspots of vulnerability to climate change (Section CCP4.3.2). The population exposed to risks is mapped for an SSP5-8.5 pathway. Adaptation can reduce these risks (Section CCP4.4) (based on: <a class="reference-link" href="#Reimann--2018a">Reimann et al., 2018a</a>; 2018b; <a class="reference-link" href="#Wolff--2018">Wolff et al., 2018</a>).</p>
                            <div class="ch-figure-button-cont"><a href="/report/ar6/wg2/figures/chapter-ccp4/figure-ccp4-007" target="_blank"><button class="btn-ipcc btn btn-primary ch-figure-button">Open figure</button></a> </div>
                          </div>
                          <div class="Figure" id="_idContainer025">
                            <p class="Body_Figures_Figure" lang="de-DE">
                              <img alt="" class="_idGenObjectAttribute-8" id="figure-ccp4-008" loading="lazy" src="https://ipcc.ch/report/ar6/wg2/downloads/figures/IPCC_AR6_WGII_Figure_CCP4_008.png"/>
                            </p>
                            <p class="Body_Figures_Figure_title" lang="en-US"><span class="figure_number" lang="">Figure CCP4.8 | </span><span class="bold_condensed-dark-blue" lang="">Summary of key risks for the Mediterranean (Sections CCP4. </span><span class="bold_condensed-dark-blue" lang="">3.2&#8211;8; Table SMCCP4.2a&#8211;h for details). </span>Coastal risks include one burning ember displaying additional risks due to climate change as specific GWL are exceeded (Coastal risks), and one burning ember describing additional risks due to committed sea level rise at timescales of centuries and millennia for long-living infrastructure and cultural heritage (WGI AR6 Chapter 9, Fox-Kemper et al., 2021; Marzeion et al., 2014; <a class="reference-link" href="#Marzeion--2014">Marzeion and Levermann, 2014</a>; <a class="reference-link" href="#Clark--2016">Clark et al., 2016</a>; see SMCCP4.2h).</p>
                            <div class="ch-figure-button-cont"><a href="/report/ar6/wg2/figures/chapter-ccp4/figure-ccp4-008" target="_blank"><button class="btn-ipcc btn btn-primary ch-figure-button">Open figure</button></a> </div>
                          </div>
                        </div>
                      </div>
                    </div>
                    <div class="h1-container" id="CCP4.4">
                      <h1 class="Headings_H1-numbered" lang="en-GB">CCP4.4  Adaptation and Sustainable Development in the Mediterranean Basin <span class="share-block"><img class="share-icon" src="../../share.png"/></span><button class="btn-ipcc btn btn-primary chapter-expand">Expand section</button></h1>
                      <div class="h1-siblings" id="h1-5-siblings"/>
                      <div class="h2-container" id="CCP4.4.1">
                        <h2 class="Headings_H2-sub" lang="de-DE">CCP4.4.1  Ocean and Coastal Systems <span class="arrow-up"/><span class="arrow-down"/><span class="share-block"><img class="share-icon" src="../../share.png"/></span></h2>
                        <div class="h2-siblings" id="h2-14-siblings">
                          <p class="Body_Body-justify" lang="en-GB">Adaptation options for climate change impacts on marine ecosystems and fisheries include improving and enlarging the regional network of marine protected areas, transnational management of marine food resources, sustainable fishery practices, developing collaborative monitoring, research and managing knowledge platforms for fisheries (<a class="reference-link" href="#Bj&#248;rkan--2020">Bj&#248;rkan et al., 2020</a>; <a class="reference-link" href="#Raicevich--2020">Raicevich et al., 2020</a>) and sustainable aquaculture (<a class="reference-link" href="#Ehlers--2016">Ehlers, 2016</a>; Lacroix, 2016).</p>
                          <p class="Body_Body-justify" lang="en-GB">Adaptation options to sea level rise in the Mediterranean include nature-based solutions, such as beach and shore nourishment, dune restoration, or ecosystem-based adaptation and restoration in low-lying coasts, lagoons, estuaries and deltas (<a class="reference-link" href="#Aragon&#233;s--2015">Aragon&#233;s et al., 2015</a>; <a class="reference-link" href="#Aspe--2016">Aspe et al., 2016</a>; <a class="reference-link" href="#Loizidou--2016">Loizidou et al., 2016</a>; <a class="reference-link" href="#Danovaro--2018">Danovaro et al., 2018</a>). Engineering plays a major role for coastal adaptation too, through breakwaters, seawalls, dykes, surge barriers and submerged breakwaters (<a class="reference-link" href="#Sancho-Garc&#237;a--2013">Sancho-Garc&#237;a et al., 2013</a>; <a class="reference-link" href="#Becchi--2014">Becchi et al., 2014</a>; <a class="reference-link" href="#Balouin--2015">Balouin et al., 2015</a>; <a class="reference-link" href="#Masria--2015">Masria et al., 2015</a>; <a class="reference-link" href="#Tsoukala--2015">Tsoukala et al., 2015</a>; <a class="reference-link" href="#Bouvier--2017">Bouvier et al., 2017</a>). Many engineering-based coastal adaptation imply large residual impacts on coastal ecosystems (<span class="condensed_italic" lang="">high confidence</span>) (<a class="reference-link" href="#Micheli--2013">Micheli et al., 2013</a>; <a class="reference-link" href="#Masria--2015">Masria et al., 2015</a>; <a class="reference-link" href="#Cooper--2016">Cooper et al., 2016</a>; <a class="reference-link" href="#Bonnici--2018">Bonnici et al., 2018</a>). A sea surface height control dam at the Strait of Gibraltar has been proposed for mitigating sea level rise in the Mediterranean, but this would <span class="condensed_italic" lang="">likely </span> involve major impacts on ecosystems and fisheries (<a class="reference-link" href="#Gower--2015">Gower, 2015</a>).</p>
                        </div>
                      </div>
                      <div class="h2-container" id="CCP4.4.2">
                        <h2 class="Headings_H2-numbered" lang="de-DE">CCP4.4.2  Inland Ecosystems <span class="arrow-up"/><span class="arrow-down"/><span class="share-block"><img class="share-icon" src="../../share.png"/></span></h2>
                        <div class="h2-siblings" id="h2-15-siblings">
                          <p class="Body_Body-justify" lang="en-GB">In forests, adaptation to impacts of warming and drought may involve multiple forest management strategies, such as thinning (<a class="reference-link" href="#Fern&#225;ndez-de-U&#241;a--2015">Fern&#225;ndez-de-U&#241;a et al., 2015</a>; <a class="reference-link" href="#Giuggiola--2016">Giuggiola et al., 2016</a>; <a class="reference-link" href="#Aldea--2017">Aldea et al., 2017</a>; <a class="reference-link" href="#del R&#237;o--2017">del R&#237;o et al., 2017</a>; <a class="reference-link" href="#Gleason--2017">Gleason et al., 2017</a>; <a class="reference-link" href="#Lechuga--2017">Lechuga et al., 2017</a>; <a class="reference-link" href="#Vil&#224;-Cabrera--2018">Vil&#224;-Cabrera et al., 2018</a>), increasing the share of drought-tolerant species and provenances (<a class="reference-link" href="#Hl&#225;sny--2014">Hl&#225;sny et al., 2014</a>; <a class="reference-link" href="#Calvo--2016">Calvo et al., 2016</a>), or promoting mixed-species stands (<a class="reference-link" href="#Ruiz-Benito--2014">Ruiz-Benito et al., 2014</a>; <a class="reference-link" href="#Guyot--2016">Guyot et al., 2016</a>; <a class="reference-link" href="#S&#225;nchez-Pinillos--2016">S&#225;nchez-Pinillos et al., 2016</a>; <a class="reference-link" href="#del R&#237;o--2017">del R&#237;o et al., 2017</a>; <a class="reference-link" href="#Jactel--2017">Jactel et al., 2017</a>; <a class="reference-link" href="#Ratcliffe--2017">Ratcliffe et al., 2017</a>).</p>
                          <p class="Body_Body-justify" lang="en-GB">Adaptation options to increased fire risks include improved planning of residential development such as to avoid inevitable wildfire (<a class="reference-link" href="#Schoennagel--2017">Schoennagel et al., 2017</a>; <a class="reference-link" href="#Samara--2018">Samara et al., 2018</a>), improved fire suppression capacities and strategies (<a class="reference-link" href="#Brotons--2013">Brotons et al., 2013</a>; <a class="reference-link" href="#Regos--2014">Regos et al., 2014</a>; <a class="reference-link" href="#Khabarov--2016">Khabarov et al., 2016</a>; <a class="reference-link" href="#Turco--2018a">Turco et al., 2018a</a>; 2018b), managing and planning landscape matrix schemes to reduce fire risk (<a class="reference-link" href="#de Rigo--2017">de Rigo et al., 2017</a>; <a class="reference-link" href="#Erd&#337;s--2018">Erd&#337;s et al., 2018</a>), thinning, slash management and prescribed burning techniques (<a class="reference-link" href="#Fernandes--2016">Fernandes et al., 2016</a>; 2018; <a class="reference-link" href="#Khabarov--2016">Khabarov et al., 2016</a>; <a class="reference-link" href="#Regos--2016">Regos et al., 2016</a>; <a class="reference-link" href="#Piqu&#233;--2018">Piqu&#233; and Dom&#232;nech, 2018</a>; <a class="reference-link" href="#Samara--2018">Samara et al., 2018</a>; <a class="reference-link" href="#Vil&#224;-Cabrera--2018">Vil&#224;-Cabrera et al., 2018</a>; <a class="reference-link" href="#Duane--2019">Duane et al., 2019</a>), as well as understory grazing (<a class="reference-link" href="#Varga--2016">Varga et al., 2016</a>; <a class="reference-link" href="#Vil&#224;-Cabrera--2018">Vil&#224;-Cabrera et al., 2018</a>).</p>
                          <p class="Body_Body-justify" lang="en-GB">Adaptation of forest management generally requires improved monitoring systems of forest condition and natural disturbances (<a class="reference-link" href="#Hl&#225;sny--2014">Hl&#225;sny et al., 2014</a>; <a class="reference-link" href="#Hengeveld--2015">Hengeveld et al., 2015</a>; <a class="reference-link" href="#Maes--2015">Maes et al., 2015</a>), supported by participatory forest management and planning processes and local self-governance mechanisms (<a class="reference-link" href="#Bouriaud--2013">Bouriaud et al., 2013</a>; 2015).</p>
                          <p class="Body_Body-justify" lang="en-GB">For freshwater ecosystems, adaptation options include hydrological and land use planning at basin scale, which can be complemented with local conservation and restoration efforts, and the preservation of natural flow variability of rivers and streams (<a class="reference-link" href="#Aspe--2016">Aspe et al., 2016</a>; <a class="reference-link" href="#Loizidou--2016">Loizidou et al., 2016</a>; <a class="reference-link" href="#Cid--2017">Cid et al., 2017</a>; <a class="reference-link" href="#Menci&#243;--2018">Menci&#243; and Boix, 2018</a>; <a class="reference-link" href="#Morant--2020">Morant et al., 2020</a>).</p>
                        </div>
                      </div>
                      <div class="h2-container" id="CCP4.4.3">
                        <h2 class="Headings_H2-numbered" lang="de-DE">CCP4.4.3  Water Management, Agriculture and Food Security <span class="arrow-up"/><span class="arrow-down"/><span class="share-block"><img class="share-icon" src="../../share.png"/></span></h2>
                        <div class="h2-siblings" id="h2-16-siblings">
                          <p class="Body_Body-justify" lang="en-GB">Adaptation options to address water shortages at the national scale include transboundary resource management (<a class="reference-link" href="#Escriva-Bou--2017">Escriva-Bou et al., 2017</a>; <a class="reference-link" href="#Pulido-Velazquez--2018">Pulido-Velazquez et al., 2018</a>), promoting fair, equitable and sustainable water trade in international markets (<a class="reference-link" href="#Johansson--2016">Johansson et al., 2016</a>; <a class="reference-link" href="#Lee--2019">Lee et al., 2019</a>), regional, national and basin-scale management plans for water resources (<a class="reference-link" href="#Wilhite--2014">Wilhite et al., 2014</a>; <a class="reference-link" href="#Paneque--2015">Paneque, 2015</a>; <a class="reference-link" href="#Urquijo--2015">Urquijo et al., 2015</a>; <a class="reference-link" href="#Estrela--2016">Estrela and Sancho, 2016</a>; <a class="reference-link" href="#Vargas--2019">Vargas and Paneque, 2019</a>), improved groundwater monitoring and strategic management (<a class="reference-link" href="#Pulido-Velazquez--2020">Pulido-Velazquez et al., 2020</a>), and economic instruments to manage water demand (prices policies, markets and subsidies).</p>
                          <p class="Body_Body-justify" lang="en-GB">Technical options include the reduction of losses in water distribution networks for drinking water and irrigation (<a class="reference-link" href="#Burak--2016">Burak and Margat, 2016</a>; <a class="reference-link" href="#Fader--2016">Fader et al., 2016</a>), desalinisation, often combined with generation of electricity (<a class="reference-link" href="#Papanicolas--2016">Papanicolas et al., 2016</a>; <a class="reference-link" href="#Bonanos--2017">Bonanos et al., 2017</a>; <a class="reference-link" href="#Jones--2019">Jones et al., 2019</a>), artificial recharge of groundwater and subterranean dams (<a class="reference-link" href="#Djuma--2017">Djuma et al., 2017</a>; <a class="reference-link" href="#De Giglio--2018">De Giglio et al., 2018</a>; <a class="reference-link" href="#Missimer--2018">Missimer and Maliva, 2018</a>; <a class="reference-link" href="#Baena-Ruiz--2020">Baena-Ruiz et al., 2020</a>), and waste water reuse (<a class="reference-link" href="#Kalavrouziotis--2015">Kalavrouziotis et al., 2015</a>; <a class="reference-link" href="#Barba-Su&#241;ol--2018">Barba-Su&#241;ol et al., 2018</a>; <a class="reference-link" href="#Cherfouh--2018">Cherfouh et al., 2018</a>). On the demand side, options include changing diet and water consumption patterns (<a class="reference-link" href="#Blas--2016">Blas et al., 2016</a>; <a class="reference-link" href="#Gul--2017">Gul et al., 2017</a>; <a class="reference-link" href="#Blas--2018">Blas et al., 2018</a>), and enhancing water use efficiency in the tourism and food sectors (<a class="reference-link" href="#Hadjikakou--2013">Hadjikakou et al., 2013</a>; <a class="reference-link" href="#Moresi--2014">Moresi, 2014</a>).</p>
                          <p class="Body_Body-justify" lang="en-GB">In the agriculture sector, improved efficiency of irrigation practices can be achieved by changing surface water irrigation for other techniques and shifting to more sustainable practices (<a class="reference-link" href="#Mrabet--2012">Mrabet et al., 2012</a>; <a class="reference-link" href="#Benlhabib--2014">Benlhabib et al., 2014</a>; <a class="reference-link" href="#Boari--2015">Boari et al., 2015</a>; <a class="reference-link" href="#&#262;osi&#263;--2015">&#262;osi&#263; et al., 2015</a>; <a class="reference-link" href="#Guilherme--2015">Guilherme et al., 2015</a>; <a class="reference-link" href="#Iglesias--2015">Iglesias and Garrote, 2015</a>; <a class="reference-link" href="#Cantore--2016">Cantore et al., 2016</a>; <a class="reference-link" href="#Triberti--2016">Triberti et al., 2016</a>; <a class="reference-link" href="#AbdAllah--2018">AbdAllah et al., 2018</a>; <a class="reference-link" href="#Billen--2018">Billen et al., 2018</a>; <a class="reference-link" href="#Iglesias--2018">Iglesias et al., 2018</a>; <a class="reference-link" href="#Malek--2018">Malek and Verburg, 2018</a>; <a class="reference-link" href="#Vargas--2019">Vargas and Paneque, 2019</a>). Overall, the region could save 35% of water resources by improved irrigation techniques (<a class="reference-link" href="#Fader--2016">Fader et al., 2016</a>). However, maladaptive drip irrigation subsidies and developments can also result in the unsustainable use of groundwater resources and excessive agriculture intensification, indicating the need for careful strategic planning, regulation and monitoring of these options (<a class="reference-link" href="#Venot--2017">Venot et al., 2017</a>). In the livestock sector, adaptation options for heat wave-induced mortality of animals include the choice of more resistant genetic provenances (<a class="reference-link" href="#Rojas-Downing--2017">Rojas-Downing et al., 2017</a>).</p>
                          <p class="Body_Body-justify" lang="en-GB">Other adaptation options in the agricultural sector include agro-ecological techniques that increase the water retention capacity of soils (mulching, zero tillage, reduced tillage, etc.) (<a class="reference-link" href="#Aguilera--2013a">Aguilera et al., 2013a</a>; <a class="reference-link" href="#Aguilera--2013b">Aguilera et al., 2013b</a>; <a class="reference-link" href="#Almagro--2016">Almagro et al., 2016</a>; <a class="reference-link" href="#Sanz-Cobena--2017">Sanz-Cobena et al., 2017</a>; <a class="reference-link" href="#Tomaz--2017">Tomaz et al., 2017</a>; <a class="reference-link" href="#Bhakta--2019">Bhakta et al., 2019</a>; <a class="reference-link" href="#Garc&#237;a-Tejero--2020">Garc&#237;a-Tejero et al., 2020</a>) and promoting crop diversification, adapting the crop calendar and the use of new varieties adapted to evolving conditions. Many of these strategies for more sustainable production are also intended to address the food security risks and import dependence in the region. Other options are to manage nitrogen resources, food demand, change diets and reduce food waste (<a class="reference-link" href="#Billen--2018">Billen et al., 2018</a>; <a class="reference-link" href="#Schils--2018">Schils et al., 2018</a>; <a class="reference-link" href="#Billen--2019">Billen et al., 2019</a>; <a class="reference-link" href="#Garnier--2019">Garnier et al., 2019</a>; <a class="reference-link" href="#Aguilera--2020">Aguilera et al., 2020</a>; <a class="reference-link" href="#Lassaletta--2021">Lassaletta et al., 2021</a>).</p>
                        </div>
                      </div>
                      <div class="h2-container" id="CCP4.4.4">
                        <h2 class="Headings_H2-numbered" lang="de-DE">CCP4.4.4  Human Health <span class="arrow-up"/><span class="arrow-down"/><span class="share-block"><img class="share-icon" src="../../share.png"/></span></h2>
                        <div class="h2-siblings" id="h2-17-siblings">
                          <p class="Body_Body-justify" lang="en-GB">In the Mediterranean region, adapting to increasing heat wave impacts involves local urban health adaptation plans, as well as increasing the capacity of healthcare systems (<a class="reference-link" href="#Fernandez Milan--2015">Fernandez Milan and Creutzig, 2015</a>; <a class="reference-link" href="#Larsen--2015">Larsen, 2015</a>; <a class="reference-link" href="#Paz--2016">Paz et al., 2016</a>; <a class="reference-link" href="#Liotta--2018">Liotta et al., 2018</a>; <a class="reference-link" href="#Reckien--2018">Reckien et al., 2018</a>; <a class="reference-link" href="#Tsiros--2018">Tsiros et al., 2018</a>). Local urban adaptation strategies need to be integrative and address housing and infrastructure, the increase and design of urban green areas, education and awareness-raising of the most vulnerable communities, the implementation of early warning systems for extreme events and the surveillance of climate change induced diseases, the strengthening of local emergency and healthcare services, and the general strengthening adaptive capacity of the community and of the local institutions.</p>
                        </div>
                      </div>
                      <div class="h2-container" id="CCP4.4.5">
                        <h2 class="Headings_H2-numbered" lang="de-DE">CCP4.4.5  Limits to Adaptation, Equity and Climate Justice <span class="arrow-up"/><span class="arrow-down"/><span class="share-block"><img class="share-icon" src="../../share.png"/></span></h2>
                        <div class="h2-siblings" id="h2-18-siblings">
                          <p class="Body_Body-justify" lang="en-GB">There is <span class="condensed_italic" lang="">low confidence</span> that the Mediterranean region can adapt to rapid sea level rise for the case of rapid Antarctic ice-sheets collapse, even in regions with high capabilities to adapt, such as the northwest Mediterranean (<a class="reference-link" href="#Poumad&#232;re--2008">Poumad&#232;re et al., 2008</a>). Residual coastal risks are still largely unquantified. For moderate levels of sea level rise, it is <span class="condensed_italic" lang="">unlikely </span> that these changes alone will exceed the technical limits of coastal adaptation over the 21st century (<a class="reference-link" href="#Hinkel--2018">Hinkel et al., 2018</a>). Beyond 2100, continued sea level rise may require managed retreat in low-lying Mediterranean areas, particularly in delta areas, such as the Nile (Figure CCP4.6). There is little knowledge on the potential for adaptation at these timescales.</p>
                          <p class="Body_Body-justify" lang="en-GB">Regional adaptation initiatives occur in a highly asymmetric geographic context characterised by contrasting demographic, environmental and socioeconomic trends in the southern, eastern and northern parts of the Mediterranean Basin (<a class="reference-link" href="#Pausas--2012">Pausas and Fern&#225;ndez-Mu&#241;oz, 2012</a>). Adaptation plans in Mediterranean countries are also limited by a lack of effective regional governance schemes (with the partial exception of European countries subject to the European directives and strategies), hampering the effective implementation of regionally harmonised adaptation strategies, plans and quantitative targets (<a class="reference-link" href="#UNEP/MAP--2016">UNEP/MAP, 2016</a>; <a class="reference-link" href="#Sachs--2019">Sachs et al., 2019</a>). Adaptation to sea level rise is essentially limited by social barriers along urban coasts in the northwest Mediterranean at present (<a class="reference-link" href="#Hinkel--2018">Hinkel et al., 2018</a>), while the adaptation dilemma involving economic and financial barriers is greater in peri-urban, rural and natural areas, as well as in the southern and eastern Mediterranean. In addition, limited regional monitoring of risks and adaptation options hampers adaptation in domains and sectors (<a class="reference-link" href="#Cramer--2018">Cramer et al., 2018</a>).</p>
                          <p class="Body_Body-justify" lang="en-GB">In the Mediterranean region, vulnerability is strongly affected by equity: people most vulnerable to the effects of climate change are the elderly, especially women (<a class="reference-link" href="#I&#241;iguez--2016">I&#241;iguez et al., 2016</a>; <a class="reference-link" href="#Achebak--2018">Achebak et al., 2018</a>) and children, who are often strongly affected by climate change (<a class="reference-link" href="#Watts--2019">Watts et al., 2019</a>). An increase of heat waves poses a significant health risk especially for young children living in urban areas (<a class="reference-link" href="#UNICEF--2014">UNICEF, 2014</a>; <a class="reference-link" href="#Perera--2017">Perera, 2017</a>; <a class="reference-link" href="#Roy&#233;--2017">Roy&#233;, 2017</a>) and for elderly women, in particular those affected by other conditions such as respiratory diseases (<a class="reference-link" href="#Sellers--2016">Sellers, 2016</a>; <a class="reference-link" href="#Achebak--2018">Achebak et al., 2018</a>). Children and future generations in eastern Mediterranean countries are those most at risk of food insecurity, in both quantity and quality (<a class="reference-link" href="#Prosperi--2014">Prosperi et al., 2014</a>). In the region, many children are particularly vulnerable due to scarcity of drinking water and food, aggravated by droughts and flooding (<a class="reference-link" href="#Philipsborn--2018">Philipsborn and Chan, 2018</a>). The potential for adaptation to and preparation for vector-borne diseases and other health risks, expected to increase with climate change, differs among Mediterranean countries (<a class="reference-link" href="#Negev--2015">Negev et al., 2015</a>). Climate change in the Mediterranean region also impacts some groups disproportionately (e.g., poor farmers, urban migrants, seasonal workers) and livelihoods (<a class="reference-link" href="#Waha--2017">Waha et al., 2017</a>), favouring mobility and migration (<a class="reference-link" href="#Nori--2020">Nori and Farinella, 2020</a>).</p>
                          <p class="Body_Body-justify" lang="en-GB">To safeguard the rights of the most vulnerable people in the Mediterranean region, climate adaptation plans and measures must consider the cost of adaptation (<a class="reference-link" href="#Watts--2019">Watts et al., 2019</a>). In addition, some adaptation options can have side and residual effects, favouring some countries/groups over others. Climate-just adaptation options are those that promote fair solutions for all and take into account region-specific socioeconomic and geopolitical variabilities and vulnerabilities, such as the lack of inclusive and participatory approaches (<a class="reference-link" href="#Iglesias--2015">Iglesias and Garrote, 2015</a>) and pre-existing vulnerabilities, as in the case of Palestine (<a class="reference-link" href="#Jarrar--2015">Jarrar, 2015</a>) and Syria (<a class="reference-link" href="#Gleick--2014">Gleick, 2014</a>).</p>
                        </div>
                      </div>
                      <div class="h2-container" id="CCP4.4.6 ">
                        <h2 class="Headings_H2-numbered" lang="de-DE">CCP4.4.6  Pathways for Sustainable Development <span class="arrow-up"/><span class="arrow-down"/><span class="share-block"><img class="share-icon" src="../../share.png"/></span></h2>
                        <div class="h2-siblings" id="h2-19-siblings">
                          <p class="Body_Body-justify" lang="en-GB">Climate-resilient sustainable development pathways are trajectories that combine adaptation and mitigation to realise the goal of sustainable development through iterative, continually evolving socioecological processes (Chapters 1; 18; <a class="reference-link" href="#Denton--2014">Denton et al., 2014</a>). Transformative adaptation can be promoted through social and political processes, identifying the enabling conditions and strategies that facilitate structural changes (<a class="reference-link" href="#UNEP/MAP--2016">UNEP/MAP, 2016</a>; <a class="reference-link" href="#Ramieri--2018">Ramieri et al., 2018</a>; <a class="reference-link" href="#EC--2020">EC, 2020</a>; <a class="reference-link" href="#UNEP/MAP and Plan Bleu--2020">UNEP/MAP and Plan Bleu, 2020</a>). The main options include ongoing structural change in the renewable energy system in this region, the production of renewable biological resources, measures towards increased water irrigation efficiency, behavioural changes in multiple sectors and improved regional governance (Table CCP4.2; <a class="reference-link" href="#Cramer--2018">Cramer et al., 2018</a>).</p>
                          <p class="Body_Tables_Table_title" lang="en-US"><span class="table_number" lang="">Table CCP4.2  | </span>Transformative adaptation and mitigation options for climate-resilient sustainable development in the Mediterranean Basin.</p>

                            <tbody>
                              <tr class="Table _idGenTableRowColumn-14">
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">T1</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Energy, transport and tourism</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">National plans and regulations to decarbonise fuel sources and electricity grids on the supply side, for reducing energy demand and increasing efficiency and converting transport systems from fossil fuels to electricity.</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US"><a class="reference-link" href="#UNEP/MAP--2016">UNEP/MAP (2016)</a>; Bastianin et al. (2017); EEA (2018a; 2018b; 2019); <a class="reference-link" href="#OME--2018">OME (2018)</a>; <a class="reference-link" href="#CMI and EC--2019">CMI and EC (2019)</a>; <a class="reference-link" href="#Sachs--2019">Sachs et al. (2019)</a>; <a class="reference-link" href="#EC--2020">EC (2020)</a>; Simionescu et al. (2020)</p>
                                </td>
                              </tr>
                              <tr class="Table _idGenTableRowColumn-7">
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">T2</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Energy</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Deployment of large-scale Mediterranean transboundary renewable energy infrastructures and interconnections. Transboundary energy market integration schemes.</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US"><a class="reference-link" href="#EIB and IRENA--2015">EIB and IRENA (2015)</a>; <a class="reference-link" href="#Tagliapietra--2018">Tagliapietra (2018)</a>; <a class="reference-link" href="#CMI and EC--2019">CMI and EC (2019)</a>; Zappa et al. (2019); <a class="reference-link" href="#CMI and EC--2020">CMI and </a><a class="reference-link" href="#EC--2020">EC (2020)</a> </p>
                                </td>
                              </tr>
                              <tr class="Table _idGenTableRowColumn-14">
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">T3</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Energy</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Definition of &#8216;Important Projects of Common European Interest&#8217; pooling financial resources and funding large-scale innovation projects across borders in the Mediterranean. Green hydrogen projects in Mediterranean North Africa (especially Morocco) have already been suggested as strategic actions.</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">CMI and EC (2019; 2020)</p>
                                </td>
                              </tr>
                              <tr class="Table _idGenTableRowColumn-15">
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">T4</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Energy &#8211; finance</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">EU Renewable Energy Financing Mechanisms such as calls for proposals for new renewable energy projects, including joint projects with third Mediterranean countries, joint support schemes, innovative technology projects or other projects that contribute to the enabling framework of the Renewable Directive 2018/2001. The mechanism can provide resources from payments by Member States, EU funds (European Green Deal Investment Plan, the Sustainable Finance Strategy, the Just Transition Fund, Connecting Europe Facility) or private sector contributions.</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">CMI and EC (2019; 2020)</p>
                                </td>
                              </tr>
                              <tr class="Table _idGenTableRowColumn-16">
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">T5</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Water</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Improving efficiency of irrigation practices, including changing surface water irrigation for other techniques, use of remote sensing in intensive agriculture, optimisation of irrigation practices and other approaches. The Mediterranean region could save 35% of water by implementing improved irrigation techniques.</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US"><a class="reference-link" href="#Iglesias--2011">Iglesias et al. (2011)</a>; <a class="reference-link" href="#Boari--2015">Boari et al. (2015)</a>; <a class="reference-link" href="#&#262;osi&#263;--2015">&#262;osi&#263; et al. (2015)</a>; <a class="reference-link" href="#Dhehibi--2015">Dhehibi et al. (2015)</a>; <a class="reference-link" href="#Guilherme--2015">Guilherme et al. (2015)</a>; <a class="reference-link" href="#Iglesias--2015">Iglesias and Garrote (2015)</a>; <a class="reference-link" href="#Cantore--2016">Cantore et al. (2016)</a>; <a class="reference-link" href="#Fader--2016">Fader et al. (2016)</a>; <a class="reference-link" href="#Iglesias--2017">Iglesias et al. (2017)</a>; <a class="reference-link" href="#Kang--2017">Kang et al. (2017)</a>; AbdAllah et al. (2018); Iglesias et al. (2018); <a class="reference-link" href="#Malek--2018">Malek and Verburg (2018)</a>; <a class="reference-link" href="#Vargas--2019">Vargas and Paneque (2019)</a></p>
                                </td>
                              </tr>
                              <tr class="Table _idGenTableRowColumn-5">
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">T6</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Water</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Improvement of water resource availability and quality. Desalinisation and co-generation of electricity and potable water in integrated Concentration Solar Power plants. Reduce climate impacts on nitrate and other pollutant concentrations through improved agriculture and fertilizer management.</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Abufayed and El-Ghuel (2001); <a class="reference-link" href="#Elimelech--2011">Elimelech and Phillip (2011)</a>; Aguilera et al. (2015); <a class="reference-link" href="#Papanicolas--2016">Papanicolas et al. (2016)</a>; <a class="reference-link" href="#Bonanos--2017">Bonanos et al. (2017)</a>; <a class="reference-link" href="#Cramer--2018">Cramer et al. (2018)</a>; <a class="reference-link" href="#Jones--2019">Jones et al. (2019)</a>; <a class="reference-link" href="#Lange--2019">Lange (2019)</a></p>
                                </td>
                              </tr>
                              <tr class="Table _idGenTableRowColumn-17">
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">T7</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Water</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Reduce/control water demand and use through efficiency management and/or modernisation in irrigation.</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Sanchis-Ibor et al. (2016); <a class="reference-link" href="#UNEP/MAP--2016">UNEP/MAP (2016)</a></p>
                                </td>
                              </tr>
                              <tr class="Table _idGenTableRowColumn-7">
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">T8</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Water</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Water demand management. Behavioural shifts in consumption and diet choice. Diet type influences the amount of water needed to produce and process food. Food waste implies the waste of the water used in the production cycle.</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Blas et al. (2016; 2018); Gul et al. (2017)</p>
                                </td>
                              </tr>
                              <tr class="Table _idGenTableRowColumn-6">
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">T9</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Water</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Adaptation by increasing water trade in international markets (commodity markets).</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Antonelli et al. (2012); <a class="reference-link" href="#Hoekstra--2012">Hoekstra and Mekonnen (2012)</a>; <a class="reference-link" href="#Johansson--2016">Johansson et al. (2016)</a>; Lee et al. (2019)</p>
                                </td>
                              </tr>
                              <tr class="Table _idGenTableRowColumn-18">
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">T10</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Food and fisheries</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Changing diets, managing food demand and reducing food waste. Reductions in the demand for livestock products.</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US"><a class="reference-link" href="#Baj&#382;elj--2014">Baj&#382;elj et al. (2014)</a>; <a class="reference-link" href="#Havl&#237;k--2014">Havl&#237;k et al. (2014)</a>; <a class="reference-link" href="#Tilman--2014">Tilman and Clark (2014)</a>; <a class="reference-link" href="#Westhoek--2014">Westhoek et al. (2014)</a>; <a class="reference-link" href="#Herrero--2016">Herrero et al. (2016)</a>; <a class="reference-link" href="#van Sluisveld--2016">van Sluisveld et al. (2016)</a></p>
                                </td>
                              </tr>
                              <tr class="Table _idGenTableRowColumn-17">
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">T11</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Food and fisheries</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Shift to more sustainable fishery practices. Collaborative monitoring, research and managing knowledge platforms.</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US"><a class="reference-link" href="#Bj&#248;rkan--2020">Bj&#248;rkan et al. (2020)</a>; <a class="reference-link" href="#Raicevich--2020">Raicevich et al. (2020)</a></p>
                                </td>
                              </tr>
                              <tr class="Table _idGenTableRowColumn-18">
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">T12</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Human conflict, displacement, migration and security</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Implementation of more effective Mediterranean regional policies and institutional frameworks for human rights protection, management of transboundary human migration, resolution of political and armed conflicts, increased internal displacements and food security.</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">
                                    <a class="reference-link" href="#UNEP/MAP--2016">UNEP/MAP (2016)</a>
                                  </p>
                                </td>
                              </tr>
                              <tr class="Table _idGenTableRowColumn-6">
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">T13</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Finance</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Enhanced Mediterranean transnational governance and financial bilateral and multilateral capacity. Increased finance for regional cooperation and development (above current levels, USD 8300 million yr <span class="superscript _idGenCharOverride-1" lang="">-1</span>).</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US"><a class="reference-link" href="#UNEP/MAP--2016">UNEP/MAP (2016)</a>; <a class="reference-link" href="#Midgley--2018">Midgley et al. (2018)</a>; <a class="reference-link" href="#Fosse--2019">Fosse et al. (2019)</a></p>
                                </td>
                              </tr>
                              <tr class="Table _idGenTableRowColumn-18">
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">T14</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Coastal</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Nature-based solutions aiming at reducing future coastal risks by restoring a buffer zone in coastal areas (e.g., through managed realignment), leaving space for sediments and coastal ecosystems, thus reducing the hazard and exposure to coastal flooding and erosion.</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Pranzini et al. (2015)</p>
                                </td>
                              </tr>
                            </tbody>
                          </table>
                          <p class="Body_Body-justify" lang="en-GB">There also are risks for nonlinear climate change impacts in key socioeconomic and environmental processes, which could promote reactive changes and forced transformations (Table CCP4.3).</p>
                          <p class="Body_Tables_Table_title" lang="en-US"><span class="table_number" lang="">Table CCP4.3  | </span>Nonlinear processes that could force reactive changes and social transformations for climate-resilient sustainable development in the Mediterranean Basin. Nonlinearity implies the absence of a straight-line relationship between the independent variable and the response variable. In other words, changes in the output do not change in direct proportion to changes in the independent variable and the form of the relationship is often described by applying nonlinear mathematical models. Gradual changes induced by climate warming in thermal exposure or rainfall availability can induce nonlinear effects on social and ecological response variables.</p>
                          <table class="Table" id="table003">

                              <col class="_idGenTableRowColumn-19"/>
                              <col class="_idGenTableRowColumn-20"/>
                              <col class="_idGenTableRowColumn-21"/>

                            </colgroup>

                              <tr class="Table _idGenTableRowColumn-3">
