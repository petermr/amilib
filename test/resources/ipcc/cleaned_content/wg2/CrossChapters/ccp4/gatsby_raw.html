                                    <span class="bold_condensed" lang="en-GB">Code</span>
                                  </p>
                                </td>
                                <td class="Table Head-blue Head-blue">

                                <td class="Table Head-blue Head-blue">
                                  <p class="Body_Tables_Table_header-black" lang="en-US">
                                    <span class="bold_condensed" lang="en-GB">Processes</span>
                                  </p>
                                </td>
                                <td class="Table Head-blue Head-blue">
                                  <p class="Body_Tables_Table_header-black" lang="en-US">
                                    <span class="bold_condensed" lang="en-GB">References</span>
                                  </p>
                                </td>

                            <tbody>
                              <tr class="Table _idGenTableRowColumn-8">
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">P1</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Agriculture and migration</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Adverse nonlinear impacts of temperature on agricultural productivity can induce nonlinear effect on human migration. The temperature&#8211;migration relationship is nonlinear and resembles the nonlinear temperature&#8211;yield relationship. These relationships affect mostly agriculture-dependent countries and especially people in those countries whose livelihoods depend on agriculture.</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US"><a class="reference-link" href="#Reuveny--2007">Reuveny (2007)</a>; <a class="reference-link" href="#Schlenker--2009">Schlenker and Roberts (2009)</a>; <a class="reference-link" href="#Cai--2016">Cai et al. (2016)</a></p>
                                </td>
                              </tr>
                              <tr class="Table _idGenTableRowColumn-18">
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">P3</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">All societal sectors</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">The increase in climatic impacts and catastrophic events is associated with nonlinear changes in economic and social impacts.</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US"><a class="reference-link" href="#Burke--2014">Burke et al. (2014)</a>; Burke et al. (2015); <a class="reference-link" href="#Carleton--2016">Carleton and Hsiang (2016)</a>; <a class="reference-link" href="#Hsiang--2017">Hsiang et al. (2017)</a>; <a class="reference-link" href="#Prahl--2018">Prahl et al. (2018)</a>; <a class="reference-link" href="#Coronese--2019">Coronese et al. (2019)</a></p>
                                </td>
                              </tr>
                              <tr class="Table _idGenTableRowColumn-6">
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">P4</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">All economic sectors</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Nonlinear temperature effects on labour conditions.</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US"><a class="reference-link" href="#Burke--2014">Burke et al. (2014)</a>; <a class="reference-link" href="#Graff Zivin--2014">Graff Zivin and Neidell (2014)</a>; Burke et al. (2015); <a class="reference-link" href="#Somanathan--2018">Somanathan et al. (2018)</a></p>
                                </td>
                              </tr>
                              <tr class="Table _idGenTableRowColumn-15">
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">P5</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">All economic sectors</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Nonlinear temperature effects on GDP. Higher temperature may reduce GDP in Mediterranean agricultural countries more than non-agricultural countries. Extreme heat over 30&#176;C significantly reduces the GDP of agricultural countries but not the non-agricultural ones. GDP is a main determinant of international migration. The nonlinear relationship between GDP and temperature in agricultural countries provides indirect evidence for the agricultural linkage between temperature and migration.</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Dell et al. (2012); Burke et al. (2014; 2015); <a class="reference-link" href="#Cai--2016">Cai et al. (2016)</a></p>
                                </td>
                              </tr>
                              <tr class="Table _idGenTableRowColumn-17">
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">P6</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">All societal sectors</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Nonlinear effects of temperature on human conflict.</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US"><a class="reference-link" href="#Baylis--2015">Baylis (2015)</a>; <a class="reference-link" href="#Burke--2018">Burke et al. (2018)</a>; <a class="reference-link" href="#Koubi--2018">Koubi (2018)</a>; <a class="reference-link" href="#Baylis--2020">Baylis (2020)</a></p>
                                </td>
                              </tr>
                              <tr class="Table _idGenTableRowColumn-15">
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">P7</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Food, health and demography</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">In low-income areas of the Mediterranean Basin and sub-Saharan Africa regions higher poverty rates, malnutrition and elevated infant mortality are coupled with higher fertility, implying a higher rate of population growth that in turn can generate more poverty. These demographic cycles can in turn interact with climatic impacts and conflict-induced displacement and migration processes.</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US"><a class="reference-link" href="#V&#246;r&#246;smarty--2000">V&#246;r&#246;smarty et al. (2000)</a>; Barrios et al. (2006); <a class="reference-link" href="#Reuveny--2007">Reuveny (2007)</a>; Hsiang et al. (2013); Ghimire et al. (2015); <a class="reference-link" href="#Brzoska--2016">Brzoska and </a><a class="reference-link" href="#Fr&#246;hlich--2016">Fr&#246;hlich (2016)</a> ; <a class="reference-link" href="#Cai--2016">Cai et al. (2016)</a>; <a class="reference-link" href="#Cattaneo--2016">Cattaneo and Peri (2016)</a>; <a class="reference-link" href="#Grecequet--2017">Grecequet et al. (2017)</a>; <a class="reference-link" href="#Waha--2017">Waha et al. (2017)</a>; <a class="reference-link" href="#WFP--2017">WFP (2017)</a>; <a class="reference-link" href="#Livi Bacci--2018">Livi Bacci (2018)</a>; <a class="reference-link" href="#Raineri--2018">Raineri (2018)</a>; <a class="reference-link" href="#Scott--2020">Scott et al. (2020)</a></p>
                                </td>
                              </tr>
                              <tr class="Table _idGenTableRowColumn-6">
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">P8</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Energy</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Nonlinear effects of increased temperatures on energy demand and supply. High temperatures provoke demand surges while straining supply and transmission.</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">
                                    <a class="reference-link" href="#Carleton--2016">Carleton and Hsiang (2016)</a>
                                  </p>
                                </td>
                              </tr>
                              <tr class="Table _idGenTableRowColumn-23">
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">P9</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Industry</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">Nonlinear effects of temperature on industrial production.</p>
                                </td>
                                <td class="Table Body Body">
                                  <p class="Body_Tables_Table_body-black-left" lang="en-US">
                                    <a class="reference-link" href="#Hsiang--2015">Hsiang and Meng (2015)</a>
                                  </p>
                                </td>
                              </tr>
                            </tbody>
                          </table>
                          <p class="Body_Body-justify" lang="en-GB">In the Mediterranean Basin, indicators for progress towards the Sustainable Development Goals (SDGs) show multiple directions of transformative change (<a class="reference-link" href="#Sachs--2019">Sachs et al., 2019</a>). In some sectors, such as energy, there are general positive trends in sustainability (<a class="reference-link" href="#UNEP/MAP--2016">UNEP/MAP, 2016</a>), but there also are significant imbalances between northern and southern shores of the basin for most SDGs. Over the coming decades the Mediterranean Basin will <span class="condensed_italic" lang="">likely </span> experience sustained growth in renewable energy investments, accompanied by a shift in regional geographical patterns of energy demand (<a class="reference-link" href="#OME--2018">OME, 2018</a>). However, future developmental pathways, solution space and feasible system transformations could be constrained by multiple factors for several SDGs, such as social conflicts, lack of regional governance, limited action capacity and financial constraints (Figure CCP4.9; Table CCP4.3).</p>
                          <div class="Figure" id="_idContainer028">
                            <p class="Body_Figures_Figure" lang="de-DE">
                              <img alt="" class="_idGenObjectAttribute-9" id="figure-ccp4-009" loading="lazy" src="https://ipcc.ch/report/ar6/wg2/downloads/figures/IPCC_AR6_WGII_Figure_CCP4_009.png"/>
                            </p>
                            <p class="Body_Figures_Figure_title ParaOverride-2" lang="en-US"><span class="figure_number" lang="">Figure CCP4.9 | </span><span class="bold_condensed-dark-blue" lang="">Differences in present-day SDG indicator values between northern (blue) and southern (gold) Mediterranean countries. </span>Yellow-shaded areas indicate better indicator values for the SDG descriptor. Red-shaded areas indicate poor performance on SDG values. Details of calculations and indicators in Table SMCCP4.3.</p>
                            <div class="ch-figure-button-cont"><a href="/report/ar6/wg2/figures/chapter-ccp4/figure-ccp4-009" target="_blank"><button class="btn-ipcc btn btn-primary ch-figure-button">Open figure</button></a> </div>
                          </div>
                        </div>
                      </div>
                      <div class="h2-container" id="CCP4.4.7">
                        <h2 class="Headings_H2-numbered" lang="de-DE">CCP4.4.7  Governance and Finance for Sustainable Development <span class="arrow-up"/><span class="arrow-down"/><span class="share-block"><img class="share-icon" src="../../share.png"/></span></h2>
                        <div class="h2-siblings" id="h2-20-siblings">
                          <p class="Body_Body-justify" lang="en-GB">Several multilateral institutions are managing international environmental governance in the Mediterranean Sea, including, (a) the Barcelona Convention or Convention for the Protection of the Marine Environment and the Coastal Region of the Mediterranean (established under the United Nations Environment Programme, UNEP), (b) the General Fisheries Commission for the Mediterranean (GFCM, a subsidiary of the FAO) and (iii) the Agreement on the Conservation of Cetaceans in the Black Sea, Mediterranean Sea (ACCOBAMS, also under UNEP). These institutions act cooperatively pursuing synergies and greater effectiveness (Lacroix, 2016). The Mediterranean Action Plan (MAP) under the Barcelona Convention System involves 21 Mediterranean countries and the EU and promotes the Mediterranean Strategy for Sustainable Development (MSSD), coordinated by the Mediterranean Commission on Sustainable Development (MCSD) (<a class="reference-link" href="#UNEP/MAP--2016">UNEP/MAP, 2016</a>). MAP is primarily financed by national governments and the EU. Its financial capacity for regional environmental governance remains limited, with available annual funds in the range of 5&#8211;10 million Euro (<a class="reference-link" href="#Humphrey--2015">Humphrey and Lucas, 2015</a>).</p>
                          <p class="Body_Body-justify ParaOverride-1" lang="en-GB">Bilateral public climate finance in the Mediterranean area includes loans by multilateral development banks, bilateral official development aid and international climate fund projects (<a class="reference-link" href="#Midgley--2018">Midgley et al., 2018</a>; <a class="reference-link" href="#Tagliapietra--2018">Tagliapietra, 2018</a>). Bilateral public and private financial resources invested in international climate finance in southern Mediterranean countries are two orders of magnitude greater than the existing multilateral regional governance programmes for the environment (<a class="reference-link" href="#EC--2018">EC, 2018</a>; <a class="reference-link" href="#Midgley--2018">Midgley et al., 2018</a>; <a class="reference-link" href="#Fosse--2019">Fosse et al., 2019</a>). The MSSD is a tool for enhancing the governance of environmental issues, proposing the biannual reporting by the national parties of a set of quantitative indicators, including the commitments and obligations under the United Nations Framework Convention on Climate Change climate agreement, and other climate change mitigation and adaptation policy actions.</p>
                          <p class="Body_Body-justify" lang="en-GB">Existing legal and institutional structures can facilitate coordination and collaboration across scales (<a class="reference-link" href="#DeCaro--2017">DeCaro et al., 2017</a>). Legislative mechanisms, such as the rules governing water uses in time of drought, already exist in some Mediterranean countries, but they might not be suitable to cope with irreversible changes (e.g., the depletion of groundwater aquifers) or be flexible enough to respond to the needs of water users under a changing climate (<a class="reference-link" href="#Nanni--2012">Nanni, 2012</a>). Although legislation can be recognised as a tool in support of adaptive water management, there is a need for better coordination among the various legal provisions that define institutional roles and set out the mechanisms for the management of water resources across different scales (regional/national/sub-national) and sectors (agriculture, industry, urban, energy).</p>
                        </div>
                      </div>
                    </div>
                    <div class="h1-container" id="frequently-asked-questions">
                      <h1 class="Body_Box_FAQ_FAQ-Box_head" lang="en-US">Frequently Asked Questions <span class="share-block"><img class="share-icon" src="../../share.png"/></span><button class="btn-ipcc btn btn-primary chapter-expand">Expand section</button></h1>
                      <div class="h1-siblings" id="h1-7-siblings"/>
                      <div class="h2-container" id="FAQ">
                        <h2 class="Body_Box_FAQ_FAQ-Box_subhead" lang="en-GB">FAQ CCP4.1  | Is the Mediterranean Basin a &#8216;climate change hotspot&#8217;?<span class="arrow-up"/><span class="arrow-down"/><span class="share-block"><img class="share-icon" src="../../share.png"/></span></h2>
                        <div class="h2-siblings" id="h2-21-siblings">
                          <p class="Body_Box_FAQ_FAQ-Box_body" lang="en-US">
                            <span class="condensed_italic" lang="">Is the Mediterranean &#8216;a geographical area characterised by high vulnerability and exposure to climate change&#8217;? Climate change projections for the Mediterranean Basin indicate with very high consistency that the region will experience higher temperatures, less rainfall and continued sea level rise during the coming decades. Given that summers are already comparatively dry, these factors together will likely  cause substantially drier and hotter conditions as well as coastal flooding, impacting people directly but also harming ecosystems on land and in the ocean. </span>
                          </p>
                          <p class="Body_Box_FAQ_FAQ-Box_body" lang="en-US">For the Mediterranean Basin, climate models consistently project regional warming at rates about 20% above global means and reduced rainfall (&#8211;12% for global warming of 3&#176;C). While it is not the region with the highest rate of expected warming on Earth, the Mediterranean Basin is considered particular in comparison to most other regions due to the high exposure and vulnerability of human societies and ecosystems to these changes: a &#8216;climate change hotspot&#8217;.</p>
                          <p class="Body_Box_FAQ_FAQ-Box_body" lang="en-US">Rising temperatures trigger extensive evaporation of water from all wet surfaces, notably the sea, lakes and rivers, but also from soils. Along with decreasing rainfall, this evaporation leads to shrinking water resources on land, drier soils, reduced river flow, and significantly longer and more intensive drought spells. Since the Mediterranean climate is already relatively dry and warm in the summer, any additional drought (and also heat) will affect plants, animals and people significantly, and ultimately entire societies and economies.</p>
                          <p class="Body_Box_FAQ_FAQ-Box_body" lang="en-US">In general, increasing temperatures and more intensive heat waves in the basin threaten human well-being, economic activities, and also many ecosystems on land and in the ocean. Extreme rainfall events, which despite the lower total rainfall are expected to increase in intensity and frequency in some regions, generate significant risks for infrastructure and people through flash floods. Warming also affects the ocean and its ecosystems, jointly with acidification caused by atmospheric carbon dioxide. Finally, sea level rise, currently accelerating because of global ice loss, threatens coastal ecosystems, historical sites and a growing human population.</p>
                          <div class="Figure" id="_idContainer010x">
                            <p class="Body_Figures_Figure" lang="de-DE">
                              <img alt="" class="_idGenObjectAttribute-1" id="figure-ccp4-001" loading="lazy" src="https://ipcc.ch/report/ar6/wg2/downloads/figures/IPCC_AR6_WGII_Figure_CCP4_FAQ_4_1_1.png"/>
                            </p>
                            <p class="Body_Box_FAQ_FAQ-Box_Figure_title" lang="en-US"><span class="figure_number" lang="">Figure FAQ CCP4.1.1  | </span><span class="bold_condensed-dark-blue" lang="">Key risks across the Mediterranean region by 2100. </span>The symbols above the map highlight risks enhanced by climate change which apply to the entire region with <span class="light_condensed_italic" lang="">high confidence</span>. Other risks are localised in the map.</p>
                            <div class="ch-figure-button-cont"><a href="/report/ar6/wg2/figures/ccp4/figure-ccp4-faq-ccp4-1-1" target="_blank"><button class="btn-ipcc btn btn-primary ch-figure-button">Open figure</button></a> </div>
                          </div>
                          <p class="Body_Box_FAQ_FAQ-Box_body" lang="en-US">Risks associated with projected climate change are particularly high for people and ecosystems in the Mediterranean Basin due to the unique combination of many factors, including:</p>
                          <ul>
                            <li class="Body_Box_FAQ_FAQ-Box_List_unnumbered" lang="en-US">A large and growing urban population exposed to heat waves, with limited access to air conditioning</li>
                            <li class="Body_Box_FAQ_FAQ-Box_List_unnumbered" lang="en-US">A large and growing number of people living in settlements impacted by rising sea level</li>
                            <li class="Body_Box_FAQ_FAQ-Box_List_unnumbered" lang="en-US">Important and increasing water shortages, already experienced by 180 million people today</li>
                            <li class="Body_Box_FAQ_FAQ-Box_List_unnumbered" lang="en-US">Growing demand for water by agriculture for on irrigation</li>
                            <li class="Body_Box_FAQ_FAQ-Box_List_unnumbered" lang="en-US">High economic dependency on tourism, which is likely  to suffer from increasing heat but also from the consequences of international emission reduction policies on aviation and cruise-ship travel</li>
                            <li class="Body_Box_FAQ_FAQ-Box_List_unnumbered-last" lang="en-US">Loss of ecosystems in the ocean, wetlands, rivers and also uplands, many of which are already endangered by unsustainable practices (e.g., overfishing, land use change).</li>
                          </ul>
                        </div>
                        <h2 class="Body_Box_FAQ_FAQ-Box_subhead" lang="en-GB">FAQ CCP4.2  | Can Mediterranean countries adapt to sea level rise?<span class="arrow-up"/><span class="arrow-down"/><span class="share-block"><img class="share-icon" src="../../share.png"/></span></h2>
                        <div class="h2-siblings" id="h2-22-siblings">
                          <p class="Body_Box_FAQ_FAQ-Box_body" lang="en-US"><span class="condensed_italic" lang="">The rates of observed and projected sea level rise in the Mediterranean are similar to the Northeast Atlantic, potentially reaching 1.1 metres at the end of the present century. Erosion, flooding and the impacts of salinisation are projected to be particularly severe due to the special conditions of the coastal zones in the region. Beyond a few tens of centimetres, adaptation to sea level rise will require very large investments and may be impossible in some regions</span>.</p>
                          <p class="Body_Box_FAQ_FAQ-Box_body" lang="en-US">Sea level in the Mediterranean has been rising by only 1.4 mm yr <span class="superscript _idGenCharOverride-1" lang="">-1</span> during the 20th century, more recently by 2.4&#177;0.5 mm yr <span class="superscript _idGenCharOverride-1" lang="">&#8722;1</span> from 1993 to 2012, and it is bound to continue rising in the future. Future rates are projected to be similar to the global mean (within an uncertainty of 10&#8211;20 cm), potentially reaching 1.1 m or more around 2100 in the event of 3&#176;C of global warming (Figure FAQ CCP4.2; Table SMCCP4.4). Due to the ongoing ice loss in Greenland and Antarctica, this trend is expected to continue in coming centuries. Sea level rise already impacts extreme coastal waters around the Mediterranean and it is projected to increase coastal flooding, erosion and salinisation risks. These impacts would affect agriculture, fisheries and aquaculture, urban development, port operations, tourism, cultural sites and many coastal ecosystems.</p>
                          <p class="Body_Box_FAQ_FAQ-Box_body" lang="en-US">Most of the Mediterranean Sea is a micro-tidal environment, which means that the difference between regular high and mean water levels (astronomical tides) is very small. Storm surges and waves can produce coastal floods that persist for several hours, causing particularly large impacts on sandy coasts and eventually also on coastal infrastructure. Mediterranean coasts are also characterised by narrow sandy beaches that are highly valuable for coastal ecosystems and tourism. These beaches are projected to be increasingly affected by erosion and eventually disappear where sedimentary stocks are small.</p>
                          <p class="Body_Box_FAQ_FAQ-Box_body" lang="en-US">Overall, Mediterranean low-lying areas of significant width occur along 37% of the coastline and currently host 42 million inhabitants. The coastal population growth projected until 2050 mostly occurs in southern Mediterranean countries, with Egypt, Libya, Morocco and Tunisia being the most exposed countries to future sea level rise. The area at risk also hosts 49 cultural World Heritage sites, including the city of Venice and the early Christian monuments of Ravenna. The Mediterranean also includes areas subjected to sinking of the land (subsidence), including the eastern Nile Delta (Egypt) and the Thessaloniki flood plain (Greece), where local relative sea level rise can exceed 10 mm yr <span class="superscript _idGenCharOverride-1" lang="">-1</span> today.</p>
                          <div class="Figure" id="_idContainer010y">
                            <p class="Body_Figures_Figure" lang="de-DE">
                              <img alt="" class="_idGenObjectAttribute-1" id="figure-ccp4-001" loading="lazy" src="https://ipcc.ch/report/ar6/wg2/downloads/figures/IPCC_AR6_WGII_Figure_CCP4_FAQ_4_2_1.png"/>
                            </p>
                            <p class="Body_Box_FAQ_FAQ-Box_Figure_title" lang="en-US"><span class="figure_number" lang="">Figure FAQ CCP4.2.1  | </span><span class="bold_condensed-dark-blue" lang="">Mediterranean Sea level projections. </span>These projections translate the global estimates in WGI AR6 <a class="section-link" data-title="Africa" href="/report/ar6/wg2/chapter/chapter-9">Chapter 9</a>  to the Mediterranean Basin (Fox-Kemper et al., 2021). They assume that sea level change in the Mediterranean continues to be forced by Atlantic Sea level change seen at the Gibraltar Strait (Section CCP4.1) and thus follow the global mean beyond 2100. Vertical ground motions induced by glacial isostatic adjustments are also included, but not those due to other natural or anthropogenic processes such as tectonics or groundwater extractions. Intra-basin sea level changes are not included. Data available as supplementary material.</p>
                            <div class="ch-figure-button-cont"><a href="/report/ar6/wg2/figures/ccp4/figure-ccp4-faq-ccp4-2-1" target="_blank"><button class="btn-ipcc btn btn-primary ch-figure-button">Open figure</button></a> </div>
                          </div>
                          <p class="Body_Box_FAQ_FAQ-Box_body" lang="en-US">Adaptation to sea level rise in the Mediterranean includes engineering or soft/ecosystem-based protection, accommodation, and retreat or managed realignment. Despite various limitations, adaptation already happens today to some extent, as for example the coastal flood and erosion protections along the subsiding Nile Delta coast. Only massive coastal protection and other sustainable development policies could reduce the growing number of people exposed to sea level rise by 20%. It appears therefore <span class="condensed_italic" lang="">likely </span> that the number of people exposed could increase by up to 130% by 2100.</p>
                          <p class="Body_Box_FAQ_FAQ-Box_body" lang="en-US">Without drastic mitigation of climate change, sea level rise is projected to accelerate and will require additional coastal engineering protection projects (e.g., dykes or groynes). Despite their efficiency for the few next decades, these engineering options have also adverse impacts for coastal ecosystems and may not ensure that the recreative value of Mediterranean coasts can be sustained (see Box 13.1 on Venice on the movable barriers protecting the Venice Lagoon). Among nature-based solutions, there are immediate benefits of restoring dunes and coastal wetlands to restore a buffer zone between coastal infrastructure and the sea and therefore reduce coastal risks (Cross-Chapter Box SLR in Chapter 3). Yet, this kind of protection is not feasible everywhere, particularly in urbanised areas, where it faces its limits. The limits for adaptation in the Mediterranean to further acceleration of sea level rise have stimulated ideas of large-scale geoengineering projects such as surface height control dams at Gibraltar. However, such projects come with unknown risks for humans and ecosystems.</p>
                        </div>
                        <h2 class="Body_Box_FAQ_FAQ-Box_subhead" lang="en-GB">FAQ CCP4.3  | What is the link between climate change and human migration in the Mediterranean Basin?<span class="arrow-up"/><span class="arrow-down"/><span class="share-block"><img class="share-icon" src="../../share.png"/></span></h2>
                        <div class="h2-siblings" id="h2-23-siblings">
                          <p class="Body_Box_FAQ_FAQ-Box_body" lang="en-US">
                            <span class="condensed_italic" lang="">Climate change already influences conflict and migrations occurring within countries or regions. However, climate is only one of the multiple factors affecting conflict and migration decisions across countries and regions. It is currently not possible to attribute particular conflicts or migrations to climate change and also in the future migration will most likely  depend on the economic, social and governance context. </span>
                          </p>
                          <p class="Body_Box_FAQ_FAQ-Box_body" lang="en-US">The Mediterranean Sea is the world&#8217;s most dangerous place for migrants, with more than 20,000 deaths reported since 2014. Although empirical evidence indicates that migration related to climate impacts is mostly internal to national borders, climate change is likely  to contribute to migration in the Mediterranean Basin as one out of several factors. Climate impacts contribute to migration flows particularly by affecting the economic and political drivers of migration.</p>
                          <p class="Body_Box_FAQ_FAQ-Box_body" lang="en-US">Many migrants attempting to cross the Mediterranean to Europe originate from sub-Saharan Africa, a region heavily affected by climate change. In West Africa, for example, migration decisions are heavily influenced by perceptions of climate change and of its economic impact on resources and income. However, projections are uncertain, because climate impacts in Africa might both increase human suffering and thus enhance mobility, but they could also limit mobility of people through lack of financial resources.</p>
                          <p class="Body_Box_FAQ_FAQ-Box_body" lang="en-US">The impacts of climate change on conflicts and security are increasingly documented, especially in Africa. Climate impacts may not in itself have caused social and political unrest but can contribute to them. The conflict in Syria has occurred after the drought that marred the country in the years before, but there is no evidence for direct causal linkage. There is, however, high agreement that food insecurity and land degradation, which can be induced by climate change, are major drivers of political upheavals and instability in northern and sub-Saharan Africa.</p>
                        </div>
                      </div>
                    </div>

                            <p class="Body_Footnotes" lang="en-US"><a class="_idFootnoteAnchor _idGenColorInherit" href="ccp4.html#footnote-002-backlink">1</a> In this Report, the following summary terms are used to describe the available evidence: limited, medium or robust; and for the degree of agreement: low, medium or high. A level of confidence is expressed using five qualifiers: very low, low, medium, high and very high, and typeset in italics, e.g., <span class="light_condensed_italic" lang="">medium confidence</span>. For a given evidence and agreement statement, different confidence levels can be assigned, but increasing levels of evidence and degrees of agreement are correlated with increasing confidence.</p>

                          <div class="_idFootnote" id="footnote-001">
                            <p class="Body_Footnotes" lang="en-US"><a class="_idFootnoteAnchor _idGenColorInherit" href="ccp4.html#footnote-001-backlink">2</a> In this Report, the following terms have been used to indicate the assessed likelihood of an outcome or a result: Virtually certain 99&#8211;100% probability, very likely  90&#8211;100%, likely  66&#8211;100%, about as likely  as not 33&#8211;66%, unlikely  0&#8211;33%, very unlikely  0&#8211;10%, and exceptionally unlikely  0&#8211;1%. Additional terms (extremely likely  95&#8211;100%, more likely  than not &gt;50&#8211;100%, and extremely unlikely  0&#8211;5%) may also be used when appropriate. Assessed likelihood is typeset in italics, e.g., <span class="light_condensed_italic" lang="">very likely </span>). This Report also uses the term &#8216;<span class="light_condensed_italic" lang="">likely </span> range&#8217; to indicate that the assessed likelihood of an outcome lies within the 17&#8211;83% probability range.</p>
