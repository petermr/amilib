                    <div class="h1-container" id="Executive">
                      <h1 class="Headings_H1-unnumbered" lang="en-GB">Executive Summary <span class="share-block"><img class="share-icon" src="../../share.png"/></span><button class="btn-ipcc btn btn-primary chapter-expand">Expand section</button></h1>
                      <div class="h1-siblings" id="h1-1-siblings">
                        <p class="Body_Body-justify" lang="en-GB"><span class="bold_condensed" lang="en-GB">The Mediterranean region hosts exceptional biological diversity and socio-cultural richness originating from three continents. </span>The nature of the semi-enclosed Mediterranean Sea and the complex topography imply unique physiographic and ecological features. The region has undergone continuous change in human activities over several millennia, and now hosts more than 500 million people with a high concentration of urban settlements and industrial infrastructure close to sea level. The region is the world&#8217;s leading tourist destination and one of its busiest shipping routes. Climate change strongly interacts with other environmental problems in the Mediterranean Basin, resulting from urbanisation, land use change, overfishing, pollution, biodiversity loss and degradation of land and marine ecosystems. <!-- -->{CCP4.1.1}</p>
                        <p class="Body_Body-justify" lang="en-GB"><span class="bold_condensed" lang="en-GB">Previous Intergovernmental Panel on Climate Change (IPCC) reports have never assessed the Mediterranean region as an entity &#8211; but they have nevertheless shown that virtually all parts of it are vulnerable and face significant risks due to climate change. </span>Identified regional key risks include increased water scarcity (notably in the south and east) and droughts (in the north), coastal risks due to flooding, erosion and saltwater intrusions, wildfire, terrestrial and marine ecosystem losses, as well as risks to food production and security, human health, well-being and cultural heritage. <!-- -->{CCP4.1.2}</p>
                        <p class="Body_Body-justify" lang="en-GB"><span class="bold_condensed" lang="en-GB">Surface temperature in the Mediterranean region is now 1.5&#176;C above the pre-industrial level, with a corresponding increase in high-temperature extreme events (</span><span class="bold_condensed_italic" lang="">high confidence</span><span class="superscript _idGenCharOverride-1" lang=""><span id="footnote-002-backlink"><a class="_idFootnoteLink _idGenColorInherit" href="ccp4.html#footnote-002">1</a> </span></span><span class="bold_condensed" lang="en-GB">). Trends in precipitation are variable across the basin (</span><span class="bold_condensed_italic" lang="">low confidence</span><span class="bold_condensed" lang="en-GB">). Droughts have become more frequent and intense, especially in the north Mediterranean (</span><span class="bold_condensed_italic" lang="">high confidence</span><span class="bold_condensed" lang="en-GB">). The sea surface has warmed by 0.29&#176;C&#8211;0.44&#176;C per decade since the early 1980s with stronger trends in the eastern basin. Sea level has risen by 1.4&#177;0.2 mm yr</span><span class="ZFFettHochgestellt" lang="">-1</span><span class="bold_condensed" lang="en-GB">during the 20th century (2.8&#177;0.1 mm yr</span><span class="ZFFettHochgestellt" lang="">-1</span><span class="bold_condensed" lang="en-GB">over 1993&#8211;2018) (</span><span class="bold_condensed_italic" lang="">high confidence</span><span class="bold_condensed" lang="en-GB">). Ocean acidity is increasing (</span><span class="bold_condensed_italic" lang="">medium confidence</span><span class="bold_condensed" lang="en-GB">). </span>{CCP4.1.3}</p>
                        <p class="Body_Body-justify" lang="en-GB"><span class="bold_condensed" lang="en-GB">A growing number of observed impacts across the entire basin are now being attributed to climate change, along with major roles of other forcings of environmental change (</span><span class="bold_condensed_italic" lang="">high confidence</span><span class="bold_condensed" lang="en-GB">). </span>These impacts include multiple consequences of longer and/or more intensive heat waves, droughts, floods, ocean acidification and sea level rise, such as cascading impacts on marine and terrestrial ecosystems, as well as on land and sea use (agriculture, forestry, fisheries, tourism, recreation, etc.) and human health. <!-- -->{CCP4.1.4}</p>
                        <p class="Body_Body-justify" lang="en-GB"><span class="bold_condensed" lang="en-GB">During the 21st century, climate change is projected to intensify throughout the region. Air and sea temperature and their extremes (notably heat waves) are</span><span class="bold_condensed_italic" lang="">likely </span><span class="superscript _idGenCharOverride-1" lang=""><span id="footnote-001-backlink"><a class="_idFootnoteLink _idGenColorInherit" href="ccp4.html#footnote-001">2</a> </span></span><span class="bold_condensed" lang="en-GB">to continue to increase more than the global average (</span><span class="bold_condensed_italic" lang="">high confidence</span><span class="bold_condensed" lang="en-GB">). </span>The projected annual mean warming on land at the end of the century is in the range of 0.9&#8211;5.6&#176;C compared to the last two decades of the 20th century, depending on the emission scenario (<span class="condensed_italic" lang="">high confidence</span>). <span class="bold_condensed" lang="en-GB"/>Precipitation will <span class="condensed_italic" lang="">likely </span> decrease in most areas by 4&#8211;22%, depending on the emission scenario (<span class="condensed_italic" lang="">medium confidence</span>). Rainfall extremes will <span class="condensed_italic" lang="">likely </span> increase in the northern part of the region (<span class="condensed_italic" lang="">high confidence</span>). Droughts will become more prevalent in many areas (<span class="condensed_italic" lang="">high confidence</span>). <!-- -->{CCP4.1.3}</p>
                        <p class="Body_Body-justify" lang="en-GB"><span class="bold_condensed" lang="en-GB">Mediterranean Sea level is projected to rise further during the coming decades and centuries (</span><span class="bold_condensed_italic" lang="">high confidence</span><span class="bold_condensed" lang="en-GB">), </span><span class="bold_condensed_italic" lang="">likely </span><span class="bold_condensed" lang="en-GB">reaching 0.15&#8211;0.33 m in 2050, and 0.3&#8211;0.6 m for shared socioeconomic pathways (SSP) 1-1.9 and 0.6&#8211;1.1 m for SSP5-8.5 in 2100 (relative to 1995&#8211;2014) (</span><span class="bold_condensed_italic" lang="">medium confidence</span><span class="bold_condensed" lang="en-GB">). Higher values cannot be excluded (</span><span class="bold_condensed_italic" lang="">low confidence</span><span class="bold_condensed" lang="en-GB">) and the process is irreversible at the scale of centuries to millennia (</span><span class="bold_condensed_italic" lang="">high confidence</span><span class="bold_condensed" lang="en-GB">). </span>Coastal flood risks will increase in low-lying areas along 37% of the Mediterranean coastline that currently hosts 42 million people. The number of people exposed to sea level rise is projected to increase up to 2050, especially in the southern and eastern Mediterranean region, and may reach up to 130% compared to present in 2100 (<span class="condensed_italic" lang="">medium confidence</span>). Coastal settlements, World Heritage sites and ecosystems are at longer-term risk from sustained sea level rise over at least the coming three centuries (<span class="condensed_italic" lang="">high confidence</span>). <!-- -->{CCP4.1.3; CCP4.2; CCP4.3; SMCCP4.4}</p>
                        <p class="Body_Body-justify" lang="en-GB"><span class="bold_condensed" lang="en-GB">Due to its particular combination of multiple strong climate hazards and high vulnerability, the Mediterranean region is a hotspot for highly interconnected climate risks. </span>The main economic sectors in the region (agriculture, fisheries, forestry, tourism) are highly vulnerable to climatic hazards, while socioeconomic vulnerability is also considerable. The low-lying areas are the most vulnerable areas for coastal climate-related risks (e.g., sea level rise, floods, erosion) and other consequent risks (e.g., saltwater intrusion and agriculture damage) (<span class="condensed_italic" lang="">high confidence</span>). Climate change threatens water availability, reducing river low flows and annual runoff by 5&#8211;70%, reducing hydropower capacity (<span class="condensed_italic" lang="">high confidence</span>). Yields of rain-fed crops may decrease by 64% in some locations (<span class="condensed_italic" lang="">high confidence</span>). Ocean warming and acidification will impact marine ecosystems, with uncertain consequences on fisheries (<span class="condensed_italic" lang="">low confidence</span>). Desertification will affect additional areas, notably in the south and southeast (<span class="condensed_italic" lang="">medium confidence</span>). Burnt area of forests may increase by 96&#8211;187% under 3&#176;C, depending on fire management. Beyond 3&#176;C, 13&#8211;30% of the Natura 2000 protected area and 15&#8211;23% of Natura 2000 sites could be lost due to climate-driven habitat change (<span class="condensed_italic" lang="">medium confidence</span>). <!-- -->{CCP4.2; CCP4.3 }</p>
                        <p class="Body_Body-justify" lang="en-GB"><span class="bold_condensed" lang="en-GB">The adaptive capacity of ecosystems and human systems is expected to encounter hard limits due to the interacting, cumulative and cascading effects of droughts, heat waves, sea level rise, ocean warming and acidification (</span><span class="bold_condensed_italic" lang="">high confidence</span><span class="bold_condensed" lang="en-GB">). </span>Coastal protection can reduce risks from sea level rise in some regions, but the costs of such interventions and their consequences for coastal ecosystems are high (<span class="condensed_italic" lang="">medium confidence</span>). <!-- -->{CCP4.4.1}<!-- --> There is <span class="condensed_italic" lang="">low confidence</span> in the feasibility of adaptation options to sea level rise beyond 2100 or for large Antarctic ice melting. <!-- -->{CCP4.4.5}</p>
                        <p class="Body_Body-justify" lang="en-GB"><span class="bold_condensed" lang="en-GB">Progress towards achievement of the United Nations Sustainable Development Goals differs strongly between Mediterranean sub-regions, with northwestern countries having stronger resilience than southern and eastern countries (</span><span class="bold_condensed_italic" lang="">high confidence</span><span class="bold_condensed" lang="en-GB">). </span>To equitably enhance regional adaptive capacity and sustainable development, while safeguarding the rights of the most vulnerable people, regional cooperation can be strengthened with a focus on the link between adaptation, costs and financial limitation, and climate justice (<span class="condensed_italic" lang="">high confidence</span>). Cooperative policies across various sectors, involving all user groups and considering all regional and sectorial differences may enhance sustainable resource use in the region (<span class="condensed_italic" lang="">high confidence</span>). <!-- -->{CCP4.4.6}</p>
                        <p class="Body_Body-justify _idGenParaOverride-1" lang="en-GB"><span class="bold_condensed" lang="en-GB">Sharing and co-production of knowledge can support climate adaptation practices and enhance sustainability in the Mediterranean region</span><span class="bold_condensed_italic" lang=""> (medium to high confidence)</span>. Currently incomplete knowledge of climate impacts and risks in the southern and eastern part of the basin hinders the implementation of adaptation measures, creating a need for implementable plans with enhanced and cooperative research and monitoring capacities between the north, south and southeast countries (high agreement). <!-- -->{CCP4.4}</p>
                      </div>
                    </div>
                    <div class="h1-container" id="CCP4.1">
                      <h1 class="Headings_H1-numbered" lang="en-GB">CCP4.1  Climate Change in the Mediterranean Basin <span class="share-block"><img class="share-icon" src="../../share.png"/></span><button class="btn-ipcc btn btn-primary chapter-expand">Expand section</button></h1>
                      <div class="h1-siblings" id="h1-2-siblings"/>
                      <div class="h2-container" id="CCP4.1.1">
                        <h2 class="Headings_H2-sub" lang="de-DE">CCP4.1.1  The Mediterranean Sea, Land and People <span class="arrow-up"/><span class="arrow-down"/><span class="share-block"><img class="share-icon" src="../../share.png"/></span></h2>
                        <div class="h2-siblings" id="h2-1-siblings">
                          <p class="Body_Body-justify" lang="en-GB">The Mediterranean Basin, known for its exceptional environmental and socio-cultural richness, comprises the semi-enclosed Mediterranean Sea and the countries and regions bordering it, <span class="superscript _idGenCharOverride-1" lang=""><span id="footnote-000-backlink"><a class="_idFootnoteLink _idGenColorInherit" href="ccp4.html#footnote-000">3</a> </span></span> which belong to Europe, Asia and Africa (Figure CCP4.1). The region has a unique historical and environmental identity (<a class="reference-link" href="#Abulafia--2011">Abulafia, 2011</a>), despite undeniable variations in the environment, socioeconomic conditions and cultural traditions. The countries in the Mediterranean Basin hosted approximately 542 million people in 2020, a number which is expected to increase to 657 million by 2050 and 694 million by 2100. In 1950, only 23.7% of the Mediterranean population lived in countries of the south, this number increased to 41.2% in 2000, 46.3% in 2020, and is projected to reach 55.5% in 2050 and 64.6% in 2100 (<a class="reference-link" href="#UN DESA--2019">UN DESA, 2019</a>).</p>
                          <div class="Figure" id="_idContainer010">
                            <p class="Body_Figures_Figure" lang="de-DE">
                              <img alt="" class="_idGenObjectAttribute-1" id="figure-ccp4-001" loading="lazy" src="https://ipcc.ch/report/ar6/wg2/downloads/figures/IPCC_AR6_WGII_Figure_CCP4_001.png"/>
                            </p>
                            <p class="Body_Figures_Figure_title" lang="en-US"><span class="figure_number" lang="">Figure CCP4.1  | </span><span class="bold_condensed-dark-blue" lang="">The Mediterranean region: Topography and bathymetry</span><span class="bold_condensed-dark-blue CharOverride-3" lang=""> (colour bar in metres), main urban areas (population in thousands for 2020 from</span><a href="http://www.naturalearthdata.com"><span class="bold_condensed-dark-blue CharOverride-3" lang=""> w</span><span class="bold_condensed-dark-blue CharOverride-3" lang=""> ww. </span><span class="CharOverride-3" lang="">naturalearthda</span><span class="CharOverride-3" lang="">ta.com</span></a> <span class="CharOverride-3" lang="">), container ports (millions of TEU [twenty-foot container equivalent units] in 2017, from International Association of Ports and Harbours) and borders of the Mediterranean region used in WGI AR6 <a class="section-link" data-title="Asia" href="/report/ar6/wg2/chapter/chapter-10">Chapter 10</a>  (Doblas-Reyes et al., 2021). </span></p>
                            <div class="ch-figure-button-cont"><a href="/report/ar6/wg2/figures/chapter-ccp4/figure-ccp4-001" target="_blank"><button class="btn-ipcc btn btn-primary ch-figure-button">Open figure</button></a> </div>
                          </div>
                        </div>
                      </div>
                      <div class="h2-container" id="CCP4.1.2">
                        <h2 class="Headings_H2-numbered" lang="de-DE">CCP4.1.2  Main Findings from Previous Assessments <span class="arrow-up"/><span class="arrow-down"/><span class="share-block"><img class="share-icon" src="../../share.png"/></span></h2>
                        <div class="h2-siblings" id="h2-2-siblings">
                          <p class="Body_Body-justify" lang="en-GB">All previous assessments of climate change for the Mediterranean Basin and its sub-regions indicate ongoing warming of the atmosphere and the sea, as well as projected warming and changes in rainfall (<a class="reference-link" href="#Stocker--2013">Stocker et al., 2013</a>; <a class="reference-link" href="#Cherif--2020">Cherif et al., 2020</a>). The projected increase in climate hazards, in combination with high regional vulnerability and exposure make it a prominent &#8216;climate change hotspot&#8217; (<a class="reference-link" href="#Giorgi--2006">Giorgi, 2006</a>), with a large number of vulnerable natural systems and socioeconomic sectors (<a class="reference-link" href="#Field--2014">Field et al., 2014</a>; <a class="reference-link" href="#MedECC--2020">MedECC, 2020</a>). In addition to high temperatures, the main risk factor identified is drought, generally expected to increase in the region, significant already at global warming of only 1.5&#176;C, reaching, for higher warming levels, intensities unprecedented during the past 10 ka (<a class="reference-link" href="#Hoegh-Guldberg--2018">Hoegh-Guldberg et al., 2018</a>). In Southern Europe and North Africa, groundwater recharge and soil water content will consequently decline, especially during summer (<a class="reference-link" href="#Kovats--2014">Kovats et al., 2014</a>; <a class="reference-link" href="#Niang--2014">Niang et al., 2014</a>).</p>
                          <p class="Body_Body-justify" lang="en-GB">With the changing climate, marine ecosystems have already undergone changes in structure, including the spread of tropical species from the Atlantic Ocean and the Red Sea (<span class="condensed_italic" lang="">high confidence</span>) and mass mortality in at least 25 invertebrate species, threatening, along with ocean acidification, marine ecosystems, including seagrass meadows (<a class="reference-link" href="#Hoegh-Guldberg--2014">Hoegh-Guldberg et al., 2014</a>; <a class="reference-link" href="#Nurse--2014">Nurse et al., 2014</a>; <a class="reference-link" href="#P&#246;rtner--2014">P&#246;rtner et al., 2014</a>; <a class="reference-link" href="#Wong--2014">Wong et al., 2014</a>). Endemic marine species are at higher risk of extinction due to limited possibilities for migrating northward (<a class="reference-link" href="#Kovats--2014">Kovats et al., 2014</a>; <a class="reference-link" href="#Poloczanska--2014">Poloczanska et al., 2014</a>; <a class="reference-link" href="#Balzan--2020">Balzan et al., 2020</a>). Southern and eastern Mediterranean coastal systems with narrow dune belts and often rapid urbanisation are vulnerable to both warming and sea level rise (<a class="reference-link" href="#Seneviratne--2012">Seneviratne et al., 2012</a>; <a class="reference-link" href="#Wong--2014">Wong et al., 2014</a>; <a class="reference-link" href="#Balzan--2020">Balzan et al., 2020</a>).</p>
                          <p class="Body_Body-justify" lang="en-GB">Most Mediterranean land ecosystems are impacted negatively by drier conditions, causing the ranges of many endemic species to shrink, and the health and growth rates of trees to decline (<a class="reference-link" href="#Kovats--2014">Kovats et al., 2014</a>; <a class="reference-link" href="#Niang--2014">Niang et al., 2014</a>; <a class="reference-link" href="#Nurse--2014">Nurse et al., 2014</a>; <a class="reference-link" href="#Settele--2014">Settele et al., 2014</a>). Climate change is expected to increase wildfire risk in the region (<a class="reference-link" href="#Kovats--2014">Kovats et al., 2014</a>), although earlier estimates of burnt area have been reduced in the most recent assessments to approx. 40&#8211;100%, considering that prevention and mitigation actions have successfully reduced this risk so far (<a class="reference-link" href="#Balzan--2020">Balzan et al., 2020</a>). Wetlands and mountain summits are hotspots for biodiversity loss and extinctions (<span class="condensed_italic" lang="">medium confidence</span>) (<a class="reference-link" href="#Jim&#233;nez Cisneros--2014">Jim&#233;nez Cisneros et al., 2014</a>; <a class="reference-link" href="#Nurse--2014">Nurse et al., 2014</a>; <a class="reference-link" href="#IPBES--2018a">IPBES, 2018a</a>; <a class="reference-link" href="#IPBES--2018b">IPBES, 2018b</a>; <a class="reference-link" href="#Balzan--2020">Balzan et al., 2020</a>). Along with unsustainable land use practices, climate change is projected to increase soil erosion in semiarid areas (<a class="reference-link" href="#Jim&#233;nez Cisneros--2014">Jim&#233;nez Cisneros et al., 2014</a>).</p>
                          <p class="Body_Body-justify" lang="en-GB">The increasing water scarcity was found to be a significant threat to agriculture (<a class="reference-link" href="#Jim&#233;nez Cisneros--2014">Jim&#233;nez Cisneros et al., 2014</a>; <a class="reference-link" href="#Kovats--2014">Kovats et al., 2014</a>; <a class="reference-link" href="#Niang--2014">Niang et al., 2014</a>; <a class="reference-link" href="#Mrabet--2020">Mrabet et al., 2020</a>). Associated with increased extreme temperatures, the Mediterranean is expected to become less attractive for tourism (<a class="reference-link" href="#Kovats--2014">Kovats et al., 2014</a>; <a class="reference-link" href="#Nurse--2014">Nurse et al., 2014</a>; <a class="reference-link" href="#Wong--2014">Wong et al., 2014</a>; <a class="reference-link" href="#Dos Santos--2020">Dos Santos et al., 2020</a>). Several critical risks for human health increase due to climate change, including heat waves and vector-borne diseases (<a class="reference-link" href="#Kovats--2014">Kovats et al., 2014</a>; <a class="reference-link" href="#Nurse--2014">Nurse et al., 2014</a>; <a class="reference-link" href="#Linares--2020">Linares et al., 2020</a>). Adaptation options have been identified for many risks (buildings, water management, coastal protection, etc.) (<a class="reference-link" href="#Murray--2012">Murray et al., 2012</a>; <a class="reference-link" href="#Revi--2014">Revi et al., 2014</a>; <a class="reference-link" href="#Wong--2014">Wong et al., 2014</a>). There are synergies between adaptation and mitigation, for example, renewable energies or nature-based solutions focused on the conservation and restoration of ecosystems (<a class="reference-link" href="#Nurse--2014">Nurse et al., 2014</a>; <a class="reference-link" href="#Hoegh-Guldberg--2018">Hoegh-Guldberg et al., 2018</a>; <a class="reference-link" href="#Vafeidis--2020">Vafeidis et al., 2020</a>).</p>
                        </div>
                      </div>
                      <div class="h2-container" id="CCP4.1.3">
                        <h2 class="Headings_H2-numbered" lang="de-DE">CCP4.1.3  Observed and Projected Climate Change <span class="arrow-up"/><span class="arrow-down"/><span class="share-block"><img class="share-icon" src="../../share.png"/></span></h2>
                        <div class="h2-siblings" id="h2-3-siblings">
                          <p class="Body_Body-justify" lang="en-GB">The Mediterranean Basin is located in a transition zone between mid-latitude and subtropical atmospheric circulation regimes, with large topographic gradients. The analysis of observed climate changes and their impacts is strongly affected by the imbalance of observations between northern and southern countries, where available time series have often not allowed past climate evolution to be reconstructed over a sufficiently long-time scale (<a class="reference-link" href="#Cramer--2018">Cramer et al., 2018</a>).</p>
                          <p class="Body_Body-justify ParaOverride-1" lang="en-GB">Since the 1980s, Mediterranean atmospheric warming has exceeded global average rates (<span class="condensed_italic" lang="">high confidence</span>) (WGI AR6 Chapter 11, Seneviratne et al., 2021; <a class="reference-link" href="#Lionello--2018">Lionello and Scarascia, 2018</a>; <a class="reference-link" href="#Cherif--2020">Cherif et al., 2020</a>). Future annual and summer warming rates are projected to be 20% and 50% larger than the global annual average, respectively. Summer warming is projected to be particularly strong in the north (Figure CCP4.2, WGI AR6; Chapter 11, Seneviratne et al., 2021; <a class="reference-link" href="#Mariotti--2015">Mariotti et al., 2015</a>; <a class="reference-link" href="#Lionello--2018">Lionello and Scarascia, 2018</a>). Temperature extremes and heat waves have increased in intensity, number, and length during recent decades, particularly in summer, and are projected to continue increasing (<span class="condensed_italic" lang="">high confidence</span>) (WGI AR6 Chapter 11, Seneviratne et al., 2021; <a class="reference-link" href="#Zittis--2016">Zittis et al., 2016</a>; <a class="reference-link" href="#Hoegh-Guldberg--2018">Hoegh-Guldberg et al., 2018</a>; <a class="reference-link" href="#Cherif--2020">Cherif et al., 2020</a>).</p>
                          <div class="Figure" id="_idContainer012">
                            <p class="Body_Figures_Figure" lang="de-DE">
                              <img alt="" class="_idGenObjectAttribute-2" id="figure-ccp4-002" loading="lazy" src="https://ipcc.ch/report/ar6/wg2/downloads/figures/IPCC_AR6_WGII_Figure_CCP4_002.png"/>
                            </p>
                            <p class="Body_Figures_Figure_title" lang="en-US"><span class="figure_number" lang="">Figure CCP4.2  | </span><span class="bold_condensed-dark-blue" lang="">Changes in climate impact drivers with respect to the 1995&#8211;2014 period for 1. </span><span class="bold_condensed-dark-blue" lang="">5&#176;C (left column) and 3&#176;C (right column) global warming: </span> mean summer (June to August) temperature (&#176;C, a, b), number of days with maximum temperature above 40&#176;C (days, c, d), total precipitation during the cold (October to March) season (%, e, f) and 1-day maximum precipitation (mm, g, h). Values based on CMIP6 global projections and SSP5-8.5. Sea level rise concerns the long term (2081&#8211;2100) and SSP1-2.6 for (i) and SSP3-7.0 for (j) (source: Annex I: Atlas).</p>
                            <div class="ch-figure-button-cont"><a href="/report/ar6/wg2/figures/chapter-ccp4/figure-ccp4-002" target="_blank"><button class="btn-ipcc btn btn-primary ch-figure-button">Open figure</button></a> </div>
                          </div>
                          <p class="Body_Body-justify" lang="en-GB">Sea surface temperatures have increased in recent decades (<span class="condensed_italic" lang="">high confidence</span>), with regional variation between +0.29&#176;C and +0.44&#176;C per decade (<a class="reference-link" href="#Darmaraki--2019a">Darmaraki et al., 2019a</a>), and stronger trends in the eastern basin (<a class="reference-link" href="#Iona--2018">Iona et al., 2018</a>; <a class="reference-link" href="#Pastor--2019">Pastor et al., 2019</a>), involving the whole upper mixed layer (<a class="reference-link" href="#Rivetti--2017">Rivetti et al., 2017</a>). Towards the end of the 21st century, ocean warming in the range 0.8&#176;C&#8211;3.8&#176;C is projected near the surface (<span class="condensed_italic" lang="">high confidence</span>), 0.8&#176;C&#8211;3.0&#176;C at intermediate depth and 0.15&#176;C&#8211;0.18&#176;C in deeper waters (<a class="reference-link" href="#Darmaraki--2019b">Darmaraki et al., 2019b</a>; <a class="reference-link" href="#Soto-Navarro--2020">Soto-Navarro et al., 2020</a>). The duration and intensity of marine heat waves have increased (<span class="condensed_italic" lang="">high confidence</span>) (<a class="reference-link" href="#Darmaraki--2019a">Darmaraki et al., 2019a</a>) and both parameters are projected to continue increasing in the future (<a class="reference-link" href="#Galli--2017">Galli et al., 2017</a>). Under Representative Concentration Pathway (RCP) 8.5, at least one long-lasting marine heat wave is projected for every year by 2100, up to 3 months longer and about four times more intense than present-day events (WGI AR6 Chapter 9, Fox-Kemper et al., 2021; <a class="reference-link" href="#Darmaraki--2019b">Darmaraki et al., 2019b</a>). Salinity is projected to increase, with anomalies from +0.48 to +0.89 psu by the end of the century (<span class="condensed_italic" lang="">medium confidence</span>) (WGI AR6 Chapter 9, Fox-Kemper et al., 2021; <a class="reference-link" href="#Adloff--2015">Adloff et al., 2015</a>).</p>
                          <p class="Body_Body-justify" lang="en-GB">Observed trends in annual precipitation are significant only in some areas and some periods, and they are stationary over the long term throughout the region (<span class="condensed_italic" lang="">medium confidence</span>) (WGI AR6 Chapter 11, Seneviratne et al., 2021; Figure CCP4.3; <a class="reference-link" href="#Harris--2014">Harris et al., 2014</a>; <a class="reference-link" href="#Lionello--2018">Lionello and Scarascia, 2018</a>; <a class="reference-link" href="#Vicente-Serrano--2020">Vicente-Serrano et al., 2020</a>). Precipitation is projected to decrease (<span class="condensed_italic" lang="">high confidence</span> for global warming levels above 2&#176;C) (Figure CCP4.2) by approximately 4% per 1&#176;C global warming, for all seasons in the central and southern basin, and mostly in summer in the north (<a class="reference-link" href="#Mariotti--2015">Mariotti et al., 2015</a>; <a class="reference-link" href="#Hertig--2017">Hertig and Tramblay, 2017</a>; <a class="reference-link" href="#Lionello--2018">Lionello and Scarascia, 2018</a>). Precipitation extremes have increased in some northern areas (<span class="condensed_italic" lang="">medium confidence</span>), and are projected to increase in the north (<span class="condensed_italic" lang="">high confidence</span> for global warming levels above 2&#176;C), potentially accompanied by an increase in of flash floods (<a class="reference-link" href="#Llasat--2016">Llasat et al., 2016</a>), with no change in the south (<span class="condensed_italic" lang="">low confidence</span>) (WGI AR6 ATLAS, Guti&#233;rrez et al. 2021; Figures CCP4.2; CCP4.3; <a class="reference-link" href="#Tramblay--2018">Tramblay and Somot, 2018</a>; <a class="reference-link" href="#Lionello--2020">Lionello and Scarascia, 2020</a>). These trends enhance the gradient between northern (already characterised by more intense events) and southern areas (where extreme precipitation events are comparatively milder) (<a class="reference-link" href="#Giorgi--2014">Giorgi et al., 2014</a>; <a class="reference-link" href="#Jacob--2014">Jacob et al., 2014</a>; <a class="reference-link" href="#Vautard--2014">Vautard et al., 2014</a>; <a class="reference-link" href="#Lionello--2020">Lionello and Scarascia, 2020</a>).</p>
                          <p class="Body_Body-justify" lang="en-GB">Widespread increase of evaporative demand and some decrease of precipitation explain the drying of the Mediterranean region during recent decades (<span class="condensed_italic" lang="">high confidence</span>) (WGI AR6 Chapter 11, Seneviratne et al., 2021; Figure CCP4.3) (<a class="reference-link" href="#Spinoni--2015">Spinoni et al., 2015</a>; <a class="reference-link" href="#Gudmundsson--2016">Gudmundsson and Seneviratne, 2016</a>; <a class="reference-link" href="#Spinoni--2017">Spinoni et al., 2017</a>; <a class="reference-link" href="#Stagge--2017">Stagge et al., 2017</a>; <a class="reference-link" href="#Caloiero--2018">Caloiero et al., 2018</a>). Droughts are projected to become more severe, more frequent and longer under moderate emission scenarios, and strongly enhanced under severe emission scenarios (<span class="condensed_italic" lang="">high confidence</span>) (WGI AR6 Chapter 11, Seneviratne et al. 2021; <a class="reference-link" href="#Hertig--2017">Hertig and Tramblay, 2017</a>; <a class="reference-link" href="#Lehner--2017">Lehner et al., 2017</a>; <a class="reference-link" href="#Ruosteenoja--2018">Ruosteenoja et al., 2018</a>; <a class="reference-link" href="#Spinoni--2018b">Spinoni et al., 2018b</a>; <a class="reference-link" href="#Grillakis--2019">Grillakis, 2019</a>; <a class="reference-link" href="#Lionello--2020">Lionello and Scarascia, 2020</a>).</p>
                          <div class="Figure" id="_idContainer014">
                            <p class="Body_Figures_Figure" lang="de-DE">
                              <img alt="" class="_idGenObjectAttribute-3" id="figure-ccp4-003" loading="lazy" src="https://ipcc.ch/report/ar6/wg2/downloads/figures/IPCC_AR6_WGII_Figure_CCP4_003.png"/>
                            </p>
                            <p class="Body_Figures_Figure_title" lang="en-US">
                              <span class="figure_number" lang="">Figure CCP4.3  | </span>
                              <span class="bold_condensed-dark-blue" lang="">Observed and projected (at global warming levels of 1</span>
                              <span class="bold_condensed-dark-blue" lang="">. </span>
                              <span class="bold_condensed-dark-blue" lang="">5&#176;C and 3&#176;C) direction of change of climate drivers and confidence levels for Mediterranean land sub-regions. </span>
                            </p>
                            <div class="ch-figure-button-cont"><a href="/report/ar6/wg2/figures/chapter-ccp4/figure-ccp4-003" target="_blank"><button class="btn-ipcc btn btn-primary ch-figure-button">Open figure</button></a> </div>
                          </div>
                          <p class="Body_Body-justify" lang="en-GB">No trends in mid-latitude cyclones crossing the Mediterranean Basin have been detected for recent decades (<a class="reference-link" href="#Lionello--2016">Lionello et al., 2016</a>). For Mediterranean hurricanes (&#8216;medicanes&#8217;), no observed trends are known because of insufficient monitoring. In the future, mid-latitude cyclones and medicanes are projected to decrease in frequency, but medicane intensity will <span class="condensed_italic" lang="">likely </span> increase (<a class="reference-link" href="#Cavicchia--2014">Cavicchia et al., 2014</a>; <a class="reference-link" href="#Nissen--2014">Nissen et al., 2014</a>; <a class="reference-link" href="#Romera--2017">Romera et al., 2017</a>).</p>
                          <p class="Body_Body-justify" lang="en-GB">Mediterranean waters have acidified since the pre-industrial period, more rapidly than the global ocean, due to faster ventilation times (<span class="condensed_italic" lang="">high confidence</span>) (<a class="reference-link" href="#Palmi&#233;ri--2015">Palmi&#233;ri et al., 2015</a>). Acidification is projected to continue (<span class="condensed_italic" lang="">virtually certain</span>) (WGI AR6 Chapter 11, Seneviratne et al., 2021), with a pH decrease of up to -0.46 in a high emission scenario (<a class="reference-link" href="#Goyet--2016">Goyet et al., 2016</a>).</p>
                          <p class="Body_Body-justify" lang="en-GB">Mediterranean mean sea level has risen by 1.4&#177;0.2 mm yr <span class="superscript _idGenCharOverride-1" lang="">&#8722;1</span> during the 20th century (<a class="reference-link" href="#W&#246;ppelmann--2012">W&#246;ppelmann and Marcos, 2012</a>) and accelerated to 2.4&#177;0.5 mm yr <span class="superscript _idGenCharOverride-1" lang="">&#8722;1</span> for 1993 to 2012 (<a class="reference-link" href="#Bonaduce--2016">Bonaduce et al., 2016</a>) and 3.4 mm yr <span class="superscript _idGenCharOverride-1" lang="">&#8722;1</span> for 1990 to 2009 in the northwest (<span class="condensed_italic" lang="">medium confidence</span>) (<a class="reference-link" href="#Calvo--2011">Calvo et al., 2011</a>). The accelerating trend is robust, although different methods and time horizons yield slightly different rates of change (<a class="reference-link" href="#Meyssignac--2011">Meyssignac et al., 2011</a>; <a class="reference-link" href="#Cazenave--2018">Cazenave et al., 2018</a>; <a class="reference-link" href="#von Schuckmann--2020">von Schuckmann et al., 2020</a>). For 2150, sea level is <span class="condensed_italic" lang="">likely </span> to reach 0.52 m [0.32&#8211;0.81] for SSP1-1.9, to 1.22 [0.91&#8211;1.78] for SSP5-8.5 relative to 1996&#8211;2014 (<span class="condensed_italic" lang="">medium confidence</span>) (WGI AR6 Chapter 9, Fox-Kemper et al., 2021; Figure FAQ CCP4.2; SMCCP4.4), with uncertain variation between sub-basins (<a class="reference-link" href="#Slangen--2017">Slangen et al., 2017</a>). Melting processes in Greenland and Antarctica could result in even higher levels (<span class="condensed_italic" lang="">low confidence</span>, WGI AR6 Chapter 9, Fox-Kemper et al., 2021; Cross-Chapter Box SLR in Chapter 3).</p>
                          <p class="Body_Body-justify" lang="en-GB">The Mediterranean Basin includes within small distances a large variety of climatic conditions that are <span class="condensed_italic" lang="">likely </span> to shift northwards with global warming. Consequently, ecoregions will be exposed to potentially unsuitable conditions: more arid climate for the Mediterranean forests of North Africa, more subtropical climate and temperate climate for the mountain forests of the Balkans and of the Alps, respectively, and Mediterranean climate for the temperate forests of North Anatolia (Figure CCP4.4; <a class="reference-link" href="#Lelieveld--2012">Lelieveld et al., 2012</a>; <a class="reference-link" href="#Simpson--2014">Simpson et al., 2014</a>).</p>
                          <div class="Figure" id="_idContainer016">
                            <p class="Body_Figures_Figure" lang="de-DE">
                              <img alt="" class="_idGenObjectAttribute-4" id="figure-ccp4-004" loading="lazy" src="https://ipcc.ch/report/ar6/wg2/downloads/figures/IPCC_AR6_WGII_Figure_CCP4_004.png"/>
                            </p>
                            <p class="Body_Figures_Figure_title" lang="en-US">
                              <span class="figure_number" lang="">Figure CCP4.4  | </span>
                              <span class="bold_condensed-dark-blue" lang="">Climate and natural land ecosystems in the Mediterranean Basin, based on K&#246;ppen-Geiger climate types, for the baseline climate (a, 1985&#8211;2014) and the future climate (b, 2076&#8211;2100, A1FI scenario (corresponding to global warming of approximately 4&#176;C), based on (<a class="reference-link" href="#Rubel--2010">Rubel and Kottek, 2010</a>), with the three terrestrial biodiversity hot spots that are present in the region (see WG2 Cross-Chapter Paper 1: Biodiversity Hotspots). </span>
                            </p>
                            <div class="ch-figure-button-cont"><a href="/report/ar6/wg2/figures/chapter-ccp4/figure-ccp4-004" target="_blank"><button class="btn-ipcc btn btn-primary ch-figure-button">Open figure</button></a> </div>
                          </div>
                        </div>
                      </div>
                      <div class="h2-container" id="CCP4.1.4">
                        <h2 class="Headings_H2-numbered" lang="de-DE">CCP4.1.4  Detection and Attribution of Climate Change Impacts <span class="arrow-up"/><span class="arrow-down"/><span class="share-block"><img class="share-icon" src="../../share.png"/></span></h2>
                        <div class="h2-siblings" id="h2-4-siblings">
                          <p class="Body_Body-justify" lang="en-GB">New evidence published since Working Group II Assessment Report 5 (WGII AR5) confirms that climate change is increasingly affecting many systems and sectors in the Mediterranean region (<span class="condensed_italic" lang="">high confidence</span>) (Figure CCP4.5; Chapters 9, 13 and 16). There is <span class="condensed_italic" lang="">high confidence</span> that climate change has worsened heat waves and droughts (CCP4.1.3; <a class="reference-link" href="#Lionello--2014">Lionello et al., 2014</a>; <a class="reference-link" href="#Caloiero--2018">Caloiero et al., 2018</a>; <a class="reference-link" href="#Mathbout--2018">Mathbout et al., 2018</a>; <a class="reference-link" href="#Spinoni--2019">Spinoni et al., 2019</a>), and <span class="condensed_italic" lang="">medium to high confidence</span> that heat waves are impacting marine (<a class="reference-link" href="#Rivetti--2014">Rivetti et al., 2014</a>; <a class="reference-link" href="#Tsikliras--2014">Tsikliras and Stergiou, 2014</a>; <a class="reference-link" href="#Stergiou--2016">Stergiou et al., 2016</a>; <a class="reference-link" href="#Corrales--2017">Corrales et al., 2017</a>), freshwater and terrestrial ecosystems (<a class="reference-link" href="#Pe&#241;uelas--2018">Pe&#241;uelas et al., 2018</a>; <a class="reference-link" href="#Bartsch--2020">Bartsch et al., 2020</a>; <a class="reference-link" href="#Carosi--2021">Carosi et al., 2021</a>), as well as agriculture (<a class="reference-link" href="#El-Maayar--2013">El-Maayar and Lange, 2013</a>; <a class="reference-link" href="#Ortas--2013">Ortas and Lal, 2013</a>; <a class="reference-link" href="#Ponti--2014">Ponti et al., 2014</a>; <a class="reference-link" href="#Garcia-Mozo--2015">Garcia-Mozo et al., 2015</a>; <a class="reference-link" href="#Moore--2015">Moore and Lobell, 2015</a>; <a class="reference-link" href="#Oteros--2015">Oteros et al., 2015</a>; <a class="reference-link" href="#Di Lena--2018">Di Lena et al., 2018</a>) and fisheries (<a class="reference-link" href="#Fortibuoni--2015">Fortibuoni et al., 2015</a>; <a class="reference-link" href="#Givan--2018">Givan et al., 2018</a>; <a class="reference-link" href="#IPBES--2018a">IPBES, 2018a</a>). Heat waves have also increased thermal discomfort, especially in urban areas (WGI AR6 Chapter 10, Doblas-Reyes et al., 2021; WGI AR6 Chapter 12, Ranasinghe et al., 2021; <a class="reference-link" href="#Zinzi--2017">Zinzi and Carnielo, 2017</a>). Despite increasing wildfire hazard, forest fires are generally decreasing in the European part of the basin, due to more efficient risk management (<span class="condensed_italic" lang="">medium confidence</span>) (<a class="reference-link" href="#Turco--2016">Turco et al., 2016</a>; 2017). Mixed trends of increasing and decreasing flash and river floods across the Mediterranean are reported, but there is <span class="condensed_italic" lang="">low confidence</span> in their attribution to climate change (<a class="reference-link" href="#Mediero--2014">Mediero et al., 2014</a>; <a class="reference-link" href="#Baahmed--2015">Baahmed et al., 2015</a>; <a class="reference-link" href="#Gaume--2016">Gaume et al., 2016</a>; <a class="reference-link" href="#Paprotny--2018">Paprotny et al., 2018</a>; <a class="reference-link" href="#Bl&#246;schl--2019">Bl&#246;schl et al., 2019</a>; <a class="reference-link" href="#Vicente-Serrano--2019">Vicente-Serrano et al., 2019</a>).</p>
                          <div class="Figure" id="_idContainer018">
                            <p class="Body_Figures_Figure" lang="de-DE">
                              <img alt="" class="_idGenObjectAttribute-5" id="figure-ccp4-005" loading="lazy" src="https://ipcc.ch/report/ar6/wg2/downloads/figures/IPCC_AR6_WGII_Figure_CCP4_005.png"/>
                            </p>
                            <p class="Body_Figures_Figure_title" lang="en-US">
                              <span class="figure_number" lang="">Figure CCP4.5 | </span>
                              <span class="bold_condensed-dark-blue" lang="">Attribution of observed impacts of climate change in the Mediterranean region (see SMCCP4. </span>
                              <span class="bold_condensed-dark-blue" lang="">1 for supporting references). </span>
                            </p>
                            <div class="ch-figure-button-cont"><a href="/report/ar6/wg2/figures/chapter-ccp4/figure-ccp4-005" target="_blank"><button class="btn-ipcc btn btn-primary ch-figure-button">Open figure</button></a> </div>
                          </div>
                          <p class="Body_Body-justify" lang="en-GB">Flooding, erosion and salinisation are significant observed impacts in coastal regions, especially where subsidence is significant, such as in the region of Thessaloniki in Greece or the eastern Nile Delta in Egypt (<a class="reference-link" href="#Raucoules--2008">Raucoules et al., 2008</a>; <a class="reference-link" href="#Frihy--2010">Frihy et al., 2010</a>), with only <span class="condensed_italic" lang="">low confidence</span> in attribution to climate change so far (Section SMCCP4.1). Coastal urbanisation and engineering protection are expanding in the Mediterranean, resulting in substantial impacts on coastal biodiversity (<a class="reference-link" href="#Masria--2015">Masria et al., 2015</a>; <a class="reference-link" href="#Carranza--2020">Carranza et al., 2020</a>).</p>
                          <p class="Body_Body-justify" lang="en-GB">The attribution of impacts displays little variability across sub-regions, but confidence in attribution to climate change is higher in the north, due to the larger number of observations and studies in Europe. While land use and fisheries are still major non-climatic drivers of changing hazards and biodiversity losses (<a class="reference-link" href="#Aguilera--2015">Aguilera et al., 2015</a>; <a class="reference-link" href="#Turco--2016">Turco et al., 2016</a>; <a class="reference-link" href="#IPBES--2018a">IPBES, 2018a</a>; 2018b; <a class="reference-link" href="#Tramblay--2019">Tramblay et al., 2019</a>; <a class="reference-link" href="#Vicente-Serrano--2019">Vicente-Serrano et al., 2019</a>), impacts of climate change are now being observed in all parts of the Mediterranean region (<span class="condensed_italic" lang="">high confidence</span>).</p>
                        </div>
                      </div>
                    </div>
                    <div class="h1-container" id="CCP4.2">
                      <h1 class="Headings_H1-numbered" lang="en-GB">CCP4.2  Vulnerability of Mediterranean Countries to Climate Change <span class="share-block"><img class="share-icon" src="../../share.png"/></span><button class="btn-ipcc btn btn-primary chapter-expand">Expand section</button></h1>
                      <div class="h1-siblings" id="h1-3-siblings"/>
                      <div class="h2-container" id="CCP4.2.1">
                        <h2 class="Headings_H2-sub" lang="de-DE">CCP4.2.1  The Specific Vulnerability of Mediterranean Countries <span class="arrow-up"/><span class="arrow-down"/><span class="share-block"><img class="share-icon" src="../../share.png"/></span></h2>
                        <div class="h2-siblings" id="h2-5-siblings">
                          <p class="Body_Body-justify" lang="en-GB">The Mediterranean region is predominantly vulnerable to the impacts of warming, notably prolonged and stronger heat waves, increased drought in an already dry climate and risk of coastal flooding (Section CCP4.1). southern and eastern countries are generally more vulnerable than countries in the north. Several countries (Tunisia, Algeria and Libya) are below the water scarcity threshold set by the Food and Agriculture Organization of the United Nations (FAO); others (Morocco) are close to the threshold for severe water stress. Uncertainties regarding the timing, duration, intensity and interval between extreme climatic events put some sectors, such as agriculture and tourism, at particular risk in the Mediterranean region (Section CCP4.3; <a class="reference-link" href="#Kallis--2008">Kallis, 2008</a>; <a class="reference-link" href="#Kutiel--2019">Kutiel, 2019</a>).</p>
                        </div>
                      </div>
                      <div class="h2-container" id="CCP4.2.2">
                        <h2 class="Headings_H2-numbered" lang="de-DE">CCP4.2.2  Economic Vulnerability <span class="arrow-up"/><span class="arrow-down"/><span class="share-block"><img class="share-icon" src="../../share.png"/></span></h2>
                        <div class="h2-siblings" id="h2-6-siblings">
                          <p class="Body_Body-justify" lang="en-GB">All Mediterranean countries are vulnerable to climate change across most socioeconomic sectors. In low-income countries of the Basin, a 1.1-point reduction of gross domestic product (GDP) could occur as a consequence of 1&#176;C rise warming (<a class="reference-link" href="#Radhouane--2013">Radhouane, 2013</a>). In Morocco, GDP impacts of climate change could be -3% to +0.4% by 2050 relative to 2003 (<a class="reference-link" href="#Ouraich--2018">Ouraich and Tyner, 2018</a>). In Middle East and North Africa (MENA) countries, approximately 10&#8211;13% of GDP loss is projected for an increase in global mean temperature of 4.8&#176;C by 2100 (<a class="reference-link" href="#Kompas--2018">Kompas et al., 2018</a>). In Southern Europe, mean labour productivity loss would shrink by approximately 2% under 2&#176;C warming, along with a GDP loss of 0.1% by the 2030s, reaching 0.4% by the 2080s (<a class="reference-link" href="#Szewczyk--2018">Szewczyk et al., 2018</a>).</p>
                          <p class="Body_Body-justify" lang="en-GB">Freshwater resources are vulnerable to climate change and growing demand, notably from agriculture (<a class="section-link" data-title="Centrality of Water Security in Climate Change and Climate Resilient Development" href="/report/ar6/wg2/chapter/chapter-4#4.1">Section 4.1.3</a>; <a class="reference-link" href="#Gudmundsson--2017">Gudmundsson et al., 2017</a>; <a class="reference-link" href="#Zabalza-Mart&#237;nez--2018">Zabalza-Mart&#237;nez et al., 2018</a>; <a class="reference-link" href="#Masseroni--2020">Masseroni et al., 2020</a>). The share of GDP and population exposed to high or very high water stress in MENA countries is 71% and 61%, respectively, compared to 22% and 36% in the world (<a class="reference-link" href="#World Bank--2018">World Bank, 2018</a>). Freshwater resources are also vulnerable to sea level rise and associated salinisation (<a class="reference-link" href="#Ali--2016">Ali and El-Magd, 2016</a>; <a class="reference-link" href="#Wassef--2016">Wassef and Sch&#252;ttrumpf, 2016</a>; <a class="reference-link" href="#Twining-Ward--2018">Twining-Ward et al., 2018</a>). Due to the impact of climate change on water supplies (&#8722;14% to &#8722;6%), MENA countries are projected to experience high losses in GDP by 2050 (<a class="reference-link" href="#World Bank--2016">World Bank, 2016</a>).</p>
                          <p class="Body_Body-justify" lang="en-GB">The agricultural sector is important for most Mediterranean economies, both in terms of GDP and employment, with its share of the total GDP in the region at 6.7% in 2016 (<a class="reference-link" href="#Kutiel--2019">Kutiel, 2019</a>). Water stress in southern countries is largely driven by growing demand from agriculture, with a potential water deficit of 28&#8211;47% by 2030 (<a class="reference-link" href="#Sebri--2017">Sebri, 2017</a>). In Spain, 11 out of 15 river basin districts are under water stress due to demand from agriculture (<a class="reference-link" href="#Vargas--2019">Vargas and Paneque, 2019</a>). In Greece, the largest agricultural region (Thessaly) where 70% of the irrigation water comes from groundwater, is under water stress (<a class="reference-link" href="#Gemitzi--2018">Gemitzi and Lakshmi, 2018</a>). Water scarcity and high dependence on rain-fed agriculture make MENA countries vulnerable to warming and reduced rainfall, associated with high irrigation requirements (<a class="reference-link" href="#Dhehibi--2015">Dhehibi et al., 2015</a>; <a class="reference-link" href="#Fader--2016">Fader et al., 2016</a>; <a class="reference-link" href="#World Bank--2016">World Bank, 2016</a>; 2018; <a class="reference-link" href="#Asseng--2018">Asseng et al., 2018</a>). This is exacerbated by poverty and political instability (<a class="reference-link" href="#Price--2017">Price, 2017</a>). For cropping systems in MENA countries, the Nile Valley and the western parts of North Africa on the Atlas Mountains are classified as the areas with highest vulnerability (<a class="reference-link" href="#ESCWA--2017">ESCWA, 2017</a>). Grassland and pastoral systems are also vulnerable to increasing drought, notably in the western part of the basin (<a class="reference-link" href="#Balzan--2020">Balzan et al., 2020</a>). Increased heat stress in summer negatively impacts animal health and welfare, i.e., increased incidence of diseases and mortality or lower fertility (Lacetera 2019).</p>
                          <p class="Body_Body-justify" lang="en-GB">As MENA countries are net food importers, they are not only vulnerable to the impact of climate change on food production in the Mediterranean region, but also the climate impacts on food production elsewhere, for example, in China and Russia (<a class="reference-link" href="#Waha--2017">Waha et al., 2017</a>). The agri-food sector in the Mediterranean region is also important for global food security because several large producing countries in the region, such as France, Italy and Morocco, are net exporters of many essential micronutrients to low- and lower-middle-income countries. Changing quantity and quality of production would have direct (availability) and indirect (price signals) impacts on their trade partners.</p>
                          <p class="Body_Body-justify" lang="en-GB">The economic value of fisheries in the Mediterranean Sea is over USD 3.4 billion (<a class="reference-link" href="#Randone--2017">Randone et al., 2017</a>), with about 76,250 fishing vessels in 2019 (<a class="reference-link" href="#FAO--2020">FAO, 2020</a>), most of them (about 62%) in the eastern and central Mediterranean (<a class="reference-link" href="#FAO--2018">FAO, 2018</a>). Total employment on-board fishing vessels is 202,000 and six countries, Tunisia, Algeria, Turkey, Italy, Greece and Egypt, account for approximately 82% of total employment (<a class="reference-link" href="#FAO--2020">FAO, 2020</a>). About 78% of the fish stocks in the Mediterranean are currently fished at unsustainable levels (<a class="reference-link" href="#Galli--2015">Galli et al., 2015</a>). The share of stocks in overexploitation has decreased from 88% in 2012 to 75% in 2018 (<a class="reference-link" href="#FAO--2020">FAO, 2020</a>). Nearly half of the catches consist of small pelagic species (anchovies, sardines, herrings), which are very vulnerable to increased seawater temperatures (<a class="reference-link" href="#FAOSTAT--2019">FAOSTAT, 2019</a>). Turkey is particularly sensitive to climate change in the fisheries sector (<a class="reference-link" href="#Turan--2016">Turan et al., 2016</a>; <a class="reference-link" href="#Hidalgo--2018">Hidalgo et al., 2018</a>). Fisheries in northern countries are less vulnerable because they have a greater capacity to adapt (i.e., more assets, flexibility, learning potential and social organisation), while southern countries are more vulnerable (<a class="reference-link" href="#Ding--2017">Ding et al., 2017</a>). The reduction of fish availability directly impacts the income of employees, for example, in the Italian fisheries industry (<a class="reference-link" href="#Tulone--2019">Tulone et al., 2019</a>).</p>
                          <p class="Body_Body-justify" lang="en-GB">Mediterranean forests are diverse and play a major ecological and social role through significant ecosystem services, including wood, but also their recreational value and production of non-wood goods, such as mushrooms (<a class="reference-link" href="#Ding--2016">Ding et al., 2016</a>; <a class="reference-link" href="#Pe&#241;uelas--2017">Pe&#241;uelas et al., 2017</a>; <a class="reference-link" href="#Gauquelin--2018">Gauquelin et al., 2018</a>; <a class="reference-link" href="#Herrero--2019">Herrero et al., 2019</a>). Many forests grow at the dry margin of their distribution area; therefore, projected drier conditions will affect their productivity and health (<a class="reference-link" href="#Doblas-Miranda--2017">Doblas-Miranda et al., 2017</a>; <a class="reference-link" href="#Dorado-Li&#241;&#225;n--2019">Dorado-Li&#241;&#225;n et al., 2019</a>; <a class="reference-link" href="#Sang&#252;esa-Barreda--2019">Sang&#252;esa-Barreda et al., 2019</a>). Vulnerability to wildfire is a significant matter of concern, particularly in the northern and southwestern Mediterranean region (<a class="reference-link" href="#Ager--2014">Ager et al., 2014</a>; <a class="reference-link" href="#Gomes da Costa--2020">Gomes da Costa et al., 2020</a>). In C&#243;rdoba (Spain), for example, fire suppression costs have increased by 66&#8211;87% in the last decade (<a class="reference-link" href="#Molina--2019">Molina et al., 2019</a>).</p>
                          <p class="Body_Body-justify" lang="en-GB">The Mediterranean region accounts for one-third of global tourism with 330 million tourists in 2016 (<a class="reference-link" href="#Tovar-S&#225;nchez--2019">Tovar-S&#225;nchez et al., 2019</a>). Before the COVID-19 crisis, international tourist arrivals were assumed to increase by 60% between 2015 and 2030, reaching 500 million. In 2015, tourism supported 15% of the total employment in the region (<a class="reference-link" href="#Randone--2017">Randone et al., 2017</a>). France, Spain, Italy and Greece are the top tourist destinations (<a class="reference-link" href="#UNWTO--2016">UNWTO, 2016</a>), but the highest growth was in Turkey, Croatia and Albania during 1995&#8211;2015 (MGI, 2017). The tourism industry is vulnerable to climate change, particularly in low-income countries (<a class="reference-link" href="#Dogru--2016">Dogru et al., 2016</a>; <a class="reference-link" href="#Dogru--2019">Dogru et al., 2019</a>). Coastal tourism in the region generates USD 300 billion annually followed by marine tourism (USD 110 billion) (<a class="reference-link" href="#Radhouane--2013">Radhouane, 2013</a>; <a class="reference-link" href="#Randone--2017">Randone et al., 2017</a>).</p>
                          <p class="Body_Body-justify" lang="en-GB">By providing around 550,000 jobs in the Mediterranean region, the maritime transport and trade industry comprises approximately 20&#8211;40% of GDP. As a hub for trade, the Mediterranean, with approximately 600 ports of different sizes, accounts for 25% of all international seaborne trade, including 22% of oil trade. In the region, the shift to green energy to combat climate change would significantly influence the structure of foreign trade in terms of commodities and maritime energy transport flows (<a class="reference-link" href="#Manoli--2021">Manoli, 2021</a>).</p>
                        </div>
                      </div>
                      <div class="h2-container" id="CCP4.2.3">
                        <h2 class="Headings_H2-numbered" lang="de-DE">CCP4.2.3  Social and Human Vulnerability <span class="arrow-up"/><span class="arrow-down"/><span class="share-block"><img class="share-icon" src="../../share.png"/></span></h2>
                        <div class="h2-siblings" id="h2-7-siblings">
                          <p class="Body_Body-justify" lang="en-GB">With population growth, food demand in the region increases and will continue to do so, while regional food production on land and from the sea is threatened by climate change, creating the need for additional import. In MENA countries, livestock production increased by 25% in 1993&#8211;2013, causing animal feed imports to increase to about 32% of the total food import in 2014 (<a class="reference-link" href="#FAO--2018">FAO, 2018</a>), thereby increasing food import dependence of southern countries (<a class="reference-link" href="#INRA--2015">INRA, 2015</a>; <a class="reference-link" href="#Saladini--2018">Saladini et al., 2018</a>). Sharp increases in international food prices since 2007 have caused inflation, trade deficits, fiscal pressure, increased poverty and political instability, all affecting food supply, notably in the south and east of the region (<a class="reference-link" href="#Harrigan--2011">Harrigan, 2011</a>; <a class="reference-link" href="#Kamrava--2012">Kamrava and Babar, 2012</a>; <a class="reference-link" href="#Ferragina--2015">Ferragina and Canitano, 2015</a>; <a class="reference-link" href="#Paciello--2015">Paciello, 2015</a>).</p>
                          <p class="Body_Body-justify" lang="en-GB">Heat waves and other climatic extremes affect densely populated urban centres and coastal regions, causing health risks for vulnerable groups, in particular those who live in poverty with substandard housing (<a class="reference-link" href="#Paz--2016">Paz et al., 2016</a>; <a class="reference-link" href="#Scortichini--2018">Scortichini et al., 2018</a>; <a class="reference-link" href="#Rohat--2019">Rohat et al., 2019</a>). Nights with temperatures higher than 23&#176;C have been increasing, with a corresponding increase in health risks (<a class="reference-link" href="#Roy&#233;--2017">Roy&#233;, 2017</a>). Human health is also vulnerable to other risks altered by climate change, either directly through droughts, floods, fires and so forth or indirectly through impacts on disease vectors, air pollution, water quality and food security (<a class="reference-link" href="#Negev--2015">Negev et al., 2015</a>). Cases of dengue fever were recently reported from several countries, and there is an apparent threat of outbreaks transmitted by <span class="condensed_italic" lang="">Aedes</span> mosquitoes in the northern Mediterranean (<a class="reference-link" href="#Semenza--2016">Semenza et al., 2016</a>; <a class="reference-link" href="#Semenza--2017">Semenza and Suk, 2017</a>). The most vulnerable to climate impacts are the elderly, pregnant women, children, the chronically ill, the obese and people with cognitive impairment (<a class="reference-link" href="#Linares--2015">Linares et al., 2015</a>; <a class="reference-link" href="#Paravantis--2017">Paravantis et al., 2017</a>).</p>
                          <p class="Body_Body-justify" lang="en-GB">One-third of the Mediterranean population (about 150 million people) currently lives close to the sea, often in growing urban regions and with infrastructure vulnerable to sea level rise (Cross-Chapter Box SLR in Chapter 3; <a class="reference-link" href="#Briche--2016">Briche et al., 2016</a>; <a class="reference-link" href="#UN DESA--2017">UN DESA, 2017</a>). Future exposure to sea level rise is related to demographic growth. All SSPs project an increase of coastal population in the Mediterranean region to 2050. By 2100, coastal population could grow by up to 130%, mostly in the south, but it could also drop by 20% for SSP1 (<a class="reference-link" href="#Reimann--2018b">Reimann et al., 2018b</a>). Overall, countries in the southeastern Mediterranean are most vulnerable to coastal risks, but the exposure is also high in the northern Mediterranean (<a class="reference-link" href="#Satta--2017">Satta et al., 2017</a>).</p>
                          <p class="Body_Body-justify" lang="en-GB">In terms of the number of people, Egypt, Libya, Morocco and Tunisia are the most exposed countries to sea level rise (<a class="reference-link" href="#World Bank--2014">World Bank, 2014</a>), and this difference is projected to increase under SSP2-4 (<a class="reference-link" href="#Reimann--2018a">Reimann et al., 2018a</a>). Among MENA countries, Egypt is particularly exposed with several coastal cities at risk of inundation (<a class="reference-link" href="#Frihy--2010">Frihy et al., 2010</a>; <a class="reference-link" href="#Solyman--2020">Solyman and Abdel Monem, 2020</a>; <a class="reference-link" href="#Elshinnawy--2021">Elshinnawy and Almaliki, 2021</a>). In the Nile Delta, between 1500 and 2600 km <span class="superscript _idGenCharOverride-1" lang="">2</span> of land are projected to be exposed to flooding by 2100 by a sea level rise of 0.75 m (median sea level rise scenario for SSP5-85) and additional subsidence up to 0.25 m, threatening around 6.3 million residents (Figure CCP4.6; <a class="reference-link" href="#Ali--2016">Ali and El-Magd, 2016</a>; <a class="reference-link" href="#Solyman--2020">Solyman and Abdel Monem, 2020</a>). Basin-wide economic losses are estimated at USD 5 billion, assuming a rise of sea levels by 1.26 m in 2100 (<a class="reference-link" href="#Frihy--2010">Frihy et al., 2010</a>; <a class="reference-link" href="#World Bank--2014">World Bank, 2014</a>).</p>
                          <div class="Figure" id="_idContainer025x">
                            <p class="Body_Figures_Figure" lang="de-DE">
                              <img alt="" class="_idGenObjectAttribute-6" id="figure-ccp4-006" loading="lazy" src="https://ipcc.ch/report/ar6/wg2/downloads/figures/IPCC_AR6_WGII_Figure_CCP4_006.png"/>
                            </p>
                            <p class="Body_Figures_Figure_title" lang="en-US">
                              <span class="figure_number" lang="">Figure CCP4.6 | </span>
                              <span class="bold_condensed-dark-blue" lang="">Present-day and projected exposure to sea level rise in the Nile Delta, due to sea level change and land subsidence: (a) current exposure, (b) exposure for 2&#176;C of global warming by 2100, (c) exposure for 3&#176;C of global warming by 2100, (d) exposure for a high-end sea level rise scenario involving additional mass losses from the Antarctica ice sheet (Frihy et al. </span>
                              <span class="bold_condensed-dark-blue" lang="">, 2010; <a class="reference-link" href="#Ali--2016">Ali and El-Magd, 2016</a>; <a class="reference-link" href="#Kulp--2019">Kulp and Strauss, 2019</a>); sea level scenarios from WG1 AR6 Chapter 9, Fox-Kemper et al., 2021; see <a class="section-link" data-title="Water" href="/report/ar6/wg2/chapter/chapter-4">Chapter 4</a>  Supplementary Material for additional details. </span>
                            </p>
                            <div class="ch-figure-button-cont"><a href="/report/ar6/wg2/figures/chapter-ccp4/figure-ccp4-006" target="_blank"><button class="btn-ipcc btn btn-primary ch-figure-button">Open figure</button></a> </div>
                          </div>
                        </div>
                        <p class="Body_Body-justify" lang="en-GB">The Mediterranean area is characterised by high human mobility, mostly within countries, but also between them (Cross-Chapter Box MIGRATE in Chapter 7; <a class="reference-link" href="#Charef--2016">Charef and Dora&#239;, 2016</a>; Ben <a class="reference-link" href="#Youssef--2017">Youssef et al., 2017</a>). In 2017, the value of remittances from migrants was about 16% of southern Mediterranean countries&#8217; exports to the European Union (EU) (<a class="reference-link" href="#Alcidi--2019">Alcidi et al., 2019</a>). Impacts of recent climate change, notably drought and their effects on human livelihoods and vulnerability, may have contributed to migration decisions, although there is debate about the relative importance (<a class="reference-link" href="#Kelley--2015">Kelley et al., 2015</a>; <a class="reference-link" href="#Fr&#246;hlich--2016">Fr&#246;hlich, 2016</a>; <a class="reference-link" href="#Hamed--2018">Hamed et al., 2018</a>; <a class="reference-link" href="#Ash--2020">Ash and Obradovich, 2020</a>). One study of five MENA countries estimated that extreme climate events account for about 10&#8211;20% of migration, with an expected increase of the role of environmental factors in the future as climatic conditions deteriorate further (<a class="reference-link" href="#Wodon--2014">Wodon et al., 2014</a>).</p>
                        <p class="Body_Body-justify" lang="en-GB">Improved sharing and co-production of knowledge can support climate adaptation practices, ensure their implementation and thereby reduce vulnerability (<a class="reference-link" href="#Nguyen--2019">Nguyen et al., 2019</a>), for example, in the water sector (<a class="reference-link" href="#Iglesias--2015">Iglesias and Garrote, 2015</a>; <a class="reference-link" href="#Iglesias--2018">Iglesias et al., 2018</a>) and notably river management (<a class="reference-link" href="#T&#224;bara--2018">T&#224;bara et al., 2018</a>). The individual perception of climate risks is also a component of vulnerability (<a class="reference-link" href="#Nguyen--2016">Nguyen et al., 2016</a>). Understanding the gap between perceptions and scientific evidence, and increasing risk perception and awareness, will be crucial to promote adaptive responses both at the individual and the collective level throughout the Mediterranean Basin (<a class="reference-link" href="#Macias--2015">Macias et al., 2015</a>; <a class="reference-link" href="#Bodoque--2016">Bodoque et al., 2016</a>; <a class="reference-link" href="#Cramer--2018">Cramer et al., 2018</a>).</p>
                      </div>
                    </div>
                    <div class="h1-container" id="CCP4.3">
                      <h1 class="Headings_H1-numbered" lang="en-GB">CCP4.3  Projected Climate Risks in the Mediterranean Basin <span class="share-block"><img class="share-icon" src="../../share.png"/></span><button class="btn-ipcc btn btn-primary chapter-expand">Expand section</button></h1>
                      <div class="h1-siblings" id="h1-4-siblings"/>
                      <div class="h2-container" id="CCP4.3.1">
                        <h2 class="Headings_H2-sub" lang="de-DE">CCP4.3.1  Ocean Systems <span class="arrow-up"/><span class="arrow-down"/><span class="share-block"><img class="share-icon" src="../../share.png"/></span></h2>
                        <div class="h2-siblings" id="h2-8-siblings">
                          <p class="Body_Body-justify" lang="en-GB">With warming, marine primary production is projected to decrease in the western and increase in the eastern Mediterranean Sea (<a class="reference-link" href="#Macias--2015">Macias et al., 2015</a>). The diversity of copepods (species which dominate the meso-zooplankton communities feeding Mediterranean fishes) is projected to decline over most of the Mediterranean, albeit with regional variation (<a class="reference-link" href="#Benedetti--2018">Benedetti et al., 2018</a>). Total marine biomass (and fishery potential) is projected to increase in the southeastern Mediterranean, whereas significant decreases are most likely  in the west (<a class="reference-link" href="#Moullec--2019">Moullec et al., 2019</a>). The projected increase of marine heat waves in the Mediterranean Sea will add additional pressures to coastal and marine ecosystems. Warm-water fish species are expected to move northwards, while cold-water species will decline, and invasions of thermal-tolerant tropical species will increase (<span class="condensed_italic" lang="">high confidence</span>) (<a class="reference-link" href="#Lloret--2015">Lloret et al., 2015</a>; <a class="reference-link" href="#Corrales--2018">Corrales et al., 2018</a>). Fish species richness is predicted to increase in the eastern and decrease in the western Mediterranean by 2050 but, by 2100, the cooler areas in the north will become a &#8216;cul-de-sac&#8217; for many species (<a class="reference-link" href="#Albouy--2013">Albouy et al., 2013</a>; <a class="reference-link" href="#Burrows--2014">Burrows et al., 2014</a>). Out of 75 endemic fish species, 14 are projected to go extinct, almost all of them benthic and demersal species (<a class="reference-link" href="#Ben Rais Lasram--2010">Ben Rais Lasram et al., 2010</a>). The abundance of small and medium-sized pelagic fish (e.g., European anchovy) is projected to decline by 15&#8211;33% by 2100 (<a class="reference-link" href="#Stergiou--2016">Stergiou et al., 2016</a>; <a class="reference-link" href="#Raybaud--2017">Raybaud et al., 2017</a>).</p>
                          <p class="Body_Body-justify" lang="en-GB">Heat waves will <span class="condensed_italic" lang="">likely </span> cause increasing mass mortality events of benthic species, mostly invertebrate organisms, such as corals, sponges, bivalves, ascidians and bryozoans, increasing the risks of abrupt collapse of endemic species (<a class="reference-link" href="#Kersting--2013">Kersting et al., 2013</a>; <a class="reference-link" href="#Rivetti--2014">Rivetti et al., 2014</a>; <a class="reference-link" href="#Rivetti--2017">Rivetti et al., 2017</a>; <a class="reference-link" href="#Garrabou--2019">Garrabou et al., 2019</a>; <a class="reference-link" href="#Garrabou--2021">Garrabou et al., 2021</a>). Deep-water corals live near their upper thermal tolerance and further warming could thus reduce their biotic potential and long-term survival (<a class="reference-link" href="#Nannini--2015">Nannini et al., 2015</a>; <a class="reference-link" href="#Yasuhara--2016">Yasuhara and Danovaro, 2016</a>; <a class="reference-link" href="#Marchini--2019">Marchini et al., 2019</a>), although there are some exceptions (<a class="reference-link" href="#Naumann--2013">Naumann et al., 2013</a>) and also knowledge gaps (<a class="reference-link" href="#Maier--2019">Maier et al., 2019</a>). Warming has been shown to severely reduce the metabolism of some Mediterranean coral species (<a class="reference-link" href="#Gori--2016">Gori et al., 2016</a>). In summary, the observed shift in marine ecosystems since 1980 is projected to continue and intensify, resulting in very high risks for marine ecosystems between 1.5&#176;C&#8211;2&#176;C global warming levels (GWL) (Figure CCP4.8; Chapters 3; 13; CCP1; <a class="reference-link" href="#Manes--2021">Manes et al., 2021</a>).</p>
                        </div>
                      </div>
                      <div class="h2-container" id="CCP4.3.2">
                        <h2 class="Headings_H2-numbered" lang="de-DE">CCP4.3.2  Coastal Systems <span class="arrow-up"/><span class="arrow-down"/><span class="share-block"><img class="share-icon" src="../../share.png"/></span></h2>
                        <div class="h2-siblings" id="h2-9-siblings">
                          <p class="Body_Body-justify" lang="en-GB">Sea level rise is the origin of multiple risks for low-lying areas in the Mediterranean Basin; for example, the further increase in flooding at high tide in some locations, such as Venice (<span class="condensed_italic" lang="">high confidence</span>) (Chapter 13; <a class="reference-link" href="#Cid--2016">Cid et al., 2016</a>; <a class="reference-link" href="#Pomaro--2017">Pomaro et al., 2017</a>). Currently, 37% of coastal areas are at moderate to high risk from coastal erosion and flooding (<a class="reference-link" href="#Satta--2017">Satta et al., 2017</a>). Due to rapid urban development, many coastal assets are directly exposed to projected sea level rise and coastal hazards, with limited adaptation options and resilience of beaches (Section CCP4.2;<a class="reference-link" href="#Brown--2016">Brown et al., 2016</a>; <a class="reference-link" href="#Jim&#233;nez--2017">Jim&#233;nez et al., 2017</a>).</p>
                          <p class="Body_Body-justify" lang="en-GB">The Mediterranean is a micro-tidal sea, where storms may hit the coast over several hours or longer, and not only during high tides (<a class="reference-link" href="#Le Cozannet--2015">Le Cozannet et al., 2015</a>; <a class="reference-link" href="#S&#225;nchez-Arcilla--2016">S&#225;nchez-Arcilla et al., 2016</a>; <a class="reference-link" href="#Sierra--2016">Sierra et al., 2016</a>; <a class="reference-link" href="#Sayol--2018">Sayol and Marcos, 2018</a>). Projected changes of winds, storms and waves are small, and confidence in these changes is limited by the quality of climate models applied to the Mediterranean (<a class="reference-link" href="#Calafat--2014">Calafat et al., 2014</a>; <a class="reference-link" href="#Androulidakis--2015">Androulidakis et al., 2015</a>; <a class="reference-link" href="#Vousdoukas--2017">Vousdoukas et al., 2017</a>). Overall, sea level rise is projected to increase the risk of coastal flooding despite the potential slight reductions of marine storms (<span class="condensed_italic" lang="">high confidence</span>) (<a class="reference-link" href="#Lionello--2017">Lionello et al., 2017</a>; <a class="reference-link" href="#Vousdoukas--2017">Vousdoukas et al., 2017</a>). Risks of erosion and flooding will be amplified with climate change, particularly in river deltas (Figure CCP4.6; <a class="reference-link" href="#Ali--2016">Ali and El-Magd, 2016</a>), on low-lying floodplains, on sandy beaches around the basin and in many coastal cities (<a class="reference-link" href="#Satta--2017">Satta et al., 2017</a>). Impacts are projected to increase nonlinearly during the 21st century with higher sea level rise, because coastal flooding will progressively change from overtopping to overflow, high-tide flooding and ultimately permanent flooding and shoreline retreat (<span class="condensed_italic" lang="">high confidence</span>) (<a class="reference-link" href="#Le Cozannet--2015">Le Cozannet et al., 2015</a>; <a class="reference-link" href="#S&#225;nchez-Arcilla--2016">S&#225;nchez-Arcilla et al., 2016</a>; <a class="reference-link" href="#Sierra--2016">Sierra et al., 2016</a>; <a class="reference-link" href="#Antonioli--2017">Antonioli et al., 2017</a>; <a class="reference-link" href="#Anzidei--2017">Anzidei et al., 2017</a>; <a class="reference-link" href="#Ciro Aucelli--2017">Ciro Aucelli et al., 2017</a>; <a class="reference-link" href="#Enr&#237;quez--2017">Enr&#237;quez et al., 2017</a>; <a class="reference-link" href="#Jim&#233;nez--2017">Jim&#233;nez et al., 2017</a>; <a class="reference-link" href="#Sayol--2018">Sayol and Marcos, 2018</a>). These risks may be amplified further in areas with poor storm water management and sealed urban surfaces (<a class="reference-link" href="#Llasat--2013">Llasat et al., 2013</a>; <a class="reference-link" href="#Gaume--2016">Gaume et al., 2016</a>).</p>
                          <p class="Body_Body-justify" lang="en-GB">Combined with storm surges, sea level rise may disrupt Mediterranean port operations (<a class="reference-link" href="#S&#225;nchez-Arcilla--2016">S&#225;nchez-Arcilla et al., 2016</a>; <a class="reference-link" href="#Sierra--2016">Sierra et al., 2016</a>), with risks depending on adaptation, physical protection measures and basin depth. Risks for deep ports are more limited (<a class="reference-link" href="#Sierra--2017">Sierra et al., 2017</a>), while low-depth small harbours, common in the Mediterranean, could be significantly affected (<a class="reference-link" href="#Sierra--2016">Sierra et al., 2016</a>). Sea level rise may enhance sandy beach erosion and thereby impact recreation and tourism (<a class="reference-link" href="#Bitan--2018">Bitan and Zviely, 2018</a>; <a class="reference-link" href="#Rizzetto--2020">Rizzetto, 2020</a>), magnifying coastal degradation and pollution (<a class="reference-link" href="#Enr&#237;quez--2017">Enr&#237;quez et al., 2017</a>; <a class="reference-link" href="#G&#246;ssling--2018">G&#246;ssling et al., 2018</a>).</p>
                        </div>
