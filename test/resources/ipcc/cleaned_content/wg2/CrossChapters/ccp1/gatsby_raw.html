                      <div id="chapter-citation">
                        <p class="Headings_Chapter_citation" lang="en-GB">This cross-chapter paper should be cited as:</p>
                        <p class="Body_Chapter_citation" lang="en-GB">Costello, M.J., M.M. Vale, W. Kiessling, S. Maharaj, J. Price, and G.H. Talukdar, 2022: Cross-Chapter Paper 1: Biodiversity Hotspots. In: <span class="light_condensed_italic" lang="">Climate Change 2022: Impacts, Adaptation and Vulnerability. </span>Contribution of Working Group II to the Sixth Assessment Report of the Intergovernmental Panel on Climate Change [H.-O. P&#246;rtner, D.C. Roberts, M. Tignor, E.S. Poloczanska, K. Mintenbeck, A. Alegr&#237;a, M. Craig, S. Langsdorf, S. L&#246;schke, V. M&#246;ller, A. Okem, B. Rama (eds.)]. Cambridge University Press, Cambridge, UK and New York, NY, USA, pp. 2123&#8211;2161, doi:10.1017/9781009325844.018.</p>
                      </div>
                    </div>
                    <div class="h1-container" id="Executive">
                      <h1 class="Headings_H1-unnumbered" lang="en-GB">Executive Summary <span class="share-block"><img class="share-icon" src="../../share.png"/></span><button class="btn-ipcc btn btn-primary chapter-expand">Expand section</button></h1>
                      <div class="h1-siblings" id="h1-1-siblings">
                        <p class="Body_Body-justify" lang="en-GB">Geographic areas that are exceptionally rich in species, ecologically distinct and/or show high endemism (species occurring in that defined geographic area and nowhere else) are broadly recognised as biodiversity hotspots and prioritised for conservation. Here, we assess the impacts and vulnerability to climate change of terrestrial, freshwater and marine regions considered to be biodiversity hotspots. <!-- -->{CCP1.1}</p>
                        <p class="Body_Body-justify" lang="en-GB"><span class="bold_condensed" lang="en-GB">Species in biodiversity hotspots already show changes in response to climate change (</span><span class="bold_condensed_italic" lang="">high confidence</span><span class="superscript _idGenCharOverride-1" lang=""><span id="footnote-000-backlink"><a class="_idFootnoteLink _idGenColorInherit" href="ccp1.html#footnote-000">1</a> </span></span><span class="bold_condensed" lang="en-GB">). </span>The geographic ranges of the animal and plant species assessed have shifted from low to high latitudes in response to climate warming on land and in the ocean (<span class="condensed_italic" lang="">very high confidence</span>). On land, climate change-induced shifts towards higher elevations are also common in biodiversity hotspots (<span class="condensed_italic" lang="">high confidence</span>); while, in the ocean, climate-induced shifts to greater water depths are little studied. In the ocean, abrupt mortality of habitat-forming species on coral reefs and kelp forests, especially following heatwaves, are increasing in frequency in biodiversity hotspots (<span class="condensed_italic" lang="">high confidence</span>). <!-- -->{CCP1.2.1; 1.2.2; 1.2.4}</p>
                        <p class="Body_Body-justify" lang="en-GB"><span class="bold_condensed" lang="en-GB">All biodiversity hotspots are impacted, to differing degrees, by human activities (</span><span class="bold_condensed_italic" lang="">very</span><span class="bold_condensed" lang="en-GB"/><span class="bold_condensed_italic" lang="">high confidence</span>)<span class="bold_condensed" lang="en-GB">. </span>Climate change impacts are compounded by other anthropogenic impacts. These include habitat loss and fragmentation, hunting, fishing and its bycatch, over-exploitation, water abstraction, nutrient enrichment, pollution, human introduction of invasive species, pests and diseases. All of these reduce climate resilience <span class="bold_condensed" lang="en-GB"/> (<span class="condensed_italic" lang="">very high confidence</span>), complicating the attribution of observed changes to climate change. <span class="bold_condensed" lang="en-GB"/>{CCP1.2.1}</p>
                        <p class="Body_Body-justify" lang="en-GB"><span class="bold_condensed" lang="en-GB">Observed climate velocities are approximately 20% lower inside than outside of terrestrial and freshwater biodiversity hotspots, but 69% higher inside than outside marine hotspots (</span><span class="bold_condensed_italic" lang="">high confidence</span><span class="bold_condensed" lang="en-GB">). </span>In spite of the lower climate velocities inside terrestrial hotspots, these areas are not projected to serve as effective climate refugia from the effects of global warming, especially for endemic species (unique to a hotspot) (<span class="condensed_italic" lang="">medium confidence</span>). The greater climate velocities inside marine hotspots exposes their species to greater climate-induced pressures inside than outside hotspots (<span class="condensed_italic" lang="">high confidence</span>). The differences between temperatures inside and outside of hotspots narrow with increasing warming (<span class="condensed_italic" lang="">medium confidence</span>). <!-- -->{CCP1.2.2}</p>
                        <p class="Body_Body-justify" lang="en-GB"><span class="bold_condensed" lang="en-GB">The risk of species extinction increases with warming in all climate change projections for native species studied in hotspots (</span><span class="bold_condensed_italic" lang="">high confidence</span><span class="bold_condensed" lang="en-GB">), being about 10-times greater for endemic species from 1.5&#176;C to 3&#176;C above pre-industrial levels (</span><span class="bold_condensed_italic" lang="">medium confidence</span><span class="bold_condensed" lang="en-GB">). </span>Of the 6116 projections for more than 2700 species assessed in biodiversity hotspots, ~44% were found to be at high extinction risk, and ~24% at very high extinction risk due to climate change (<span class="condensed_italic" lang="">medium confidence</span>). Very high extinction risk in biodiversity hotspots due to climate change is more common for endemic species than other native species (<span class="condensed_italic" lang="">high confidence</span>). For these endemic species, considering all scenarios and time periods evaluated, ~100% on islands, ~84% on mountains, ~12% on continents (<span class="condensed_italic" lang="">medium confidence</span>) and ~54% in the ocean (notably the Mediterranean) (<span class="condensed_italic" lang="">low confidence</span>) are projected to be threatened with extinction due to climate change. With further warming, increasingly high risks of local and global extinctions are projected in biodiversity hotspots from climate-related stressors (<span class="condensed_italic" lang="">high confidence</span>). <!-- -->{CCP1.2.1; Figure CCP1.7; Figure CCP1.6}</p>
                        <p class="Body_Body-justify _idGenParaOverride-1" lang="en-GB">Adaptation options can enhance the persistence of biodiversity in hotspots (high confidence). Noting that over 3 billion people live within biodiversity hotspots, reduction of existing (non-climatic) pressures due to human activities is critical for building resilience within hotspots. Adaptation options for biodiversity (e.g., expanding fully protected areas, restoration and sustainable use practices) are as applicable inside biodiversity hotspots as outside (high confidence). Nevertheless, the protection of biodiversity hotspots is key to preventing a substantial global biodiversity decline from climate change. <!-- -->{CCP1.3; 2.6; 3.6; Table CCP1.2; Cross-Chapter Box NATURAL in Chapter 2}<!-- -->.</p>
                      </div>
                    </div>
                    <div class="h1-container" id="CCP1.1">
                      <h1 class="Headings_H1-numbered" lang="en-GB">CCP1.1  Point of Departure <span class="share-block"><img class="share-icon" src="../../share.png"/></span><button class="btn-ipcc btn btn-primary chapter-expand">Expand section</button></h1>
                      <div class="h1-siblings" id="h1-2-siblings">
                        <p class="Body_Body-justify" lang="en-GB">Biodiversity hotspots are geographic areas with an exceptionally high richness of species, including rare and endemic species. Such hotspots have deep evolutionary roots and are concentrated in areas where past climatic variability was moderate (<a class="reference-link" href="#Enquist--2019">Enquist et al., 2019</a>; <a class="reference-link" href="#Brown--2020">Brown et al., 2020</a>; <a class="reference-link" href="#Trew--2021">Trew and Maclean, 2021</a>). An important limitation of the biodiversity hotspot concept is that there may be species highly threatened with extinction that do not occur within what has traditionally been classified as a hotspot (<a class="reference-link" href="#Grenyer--2006">Grenyer et al., 2006</a>). Thus, biodiversity hotspot assessments need to be paralleled by assessments of highly endangered species, and the threats they face.</p>
                        <p class="Body_Body-justify" lang="en-GB">Many studies have proposed biodiversity hotspots based on different criteria, taxa and geographic contexts (e.g., <a class="reference-link" href="#Myers--2000">Myers et al., 2000</a>; <a class="reference-link" href="#Mittermeier--2004">Mittermeier et al., 2004</a>; <a class="reference-link" href="#Mittermeier--2011">Mittermeier et al., 2011</a>; <a class="reference-link" href="#Williams--2011">Williams et al., 2011</a>; <a class="reference-link" href="#Noss--2015">Noss et al., 2015</a>; <a class="reference-link" href="#Asaad--2017">Asaad et al., 2017</a>). A coherent comparative assessment of all such schemes is beyond the scope of this chapter but is provided in recent reviews (<a class="reference-link" href="#Asaad--2017">Asaad et al., 2017</a>; Jefferson and <a class="reference-link" href="#Costello--2019">Costello, 2019</a>). We base this assessment on the &#8216;WWF Global 200&#8217; areas of conservation importance (<a class="reference-link" href="#Olson--2002">Olson and Dinerstein, 2002</a>). These 238 ecoregions have been used in a previous climate risk assessment (<a class="reference-link" href="#Warren--2018b">Warren et al., 2018b</a>) and cover terrestrial, freshwater and marine environments (Table CCP1.1; Figures CCP1.1; CCP1.2). In addition, we included terrestrial &#8216;biodiversity hotspots&#8217; as defined by <a class="reference-link" href="#Myers--2000">Myers et al. (2000)</a>  and extended later (<a class="reference-link" href="#Mittermeier--2011">Mittermeier et al., 2011</a>; <a class="reference-link" href="#Williams--2011">Williams et al., 2011</a>; <a class="reference-link" href="#Noss--2015">Noss et al., 2015</a>). This assessment thus covers the &#8216;Global 200&#8217; (hereafter G200) and &#8216;Myers&#8217; biodiversity hotspots, rather than particular species or ecological systems, such as rainforests, coral reefs or the deep sea. Such systems are assessed in Chapters 2 and 3. Chapters 2 and 3 also cover observed and projected impacts, changes in ecosystem functioning, and species extinction risks at a global level.</p>
                        <p class="Body_Body-justify" lang="en-GB">Biodiversity hotspots were not explicitly covered in the Working Group II (WGII) Fifth Assessment Report (<a class="reference-link" href="#IPCC--2014">IPCC, 2014</a>) (hereafter AR5). Thus, the point of departure is WGII AR4 (<a class="reference-link" href="#IPCC--2007">IPCC, 2007</a>), which assessed that climate change exacerbates biodiversity risks in hotspots and that 15&#8211;40% of endemic species (species only occurring in one region) were projected to become extinct at 3.5&#176;C global warming (<a class="reference-link" href="#Fischlin--2007">Fischlin et al., 2007</a>). Risks of extinction are assessed using the guidelines in Chapter 2, with species projected to lose 80% of their range or abundance being classified as at very high risk of extinction and those projected to lose 50% being at high risk of extinction (Figure 2.8 for definitions and a global overview).</p>
                      </div>
                    </div>
                    <div class="h1-container" id="CCP1.2">
                      <h1 class="Headings_H1-numbered" lang="en-GB">CCP1.2  Assessment <span class="share-block"><img class="share-icon" src="../../share.png"/></span><button class="btn-ipcc btn btn-primary chapter-expand">Expand section</button></h1>
                      <div class="h1-siblings" id="h1-3-siblings">
                        <p class="Body_Body-justify ParaOverride-1" lang="en-GB">Specific hotspot numbers (H) are indicated in this chapter text to aid their identification in Table CCP1.1  and Figures CCP1.1  and CCP1.2.</p>

                            <img alt="" class="_idGenObjectAttribute-1" id="figure-ccp1-001" loading="lazy" src="https://ipcc.ch/report/ar6/wg2/downloads/figures/IPCC_AR6_WGII_Figure_CCP1_001.png"/>
                          </p>
                          <p class="Body_Figures_Figure_title" lang="en-US"><span class="figure_number" lang="">Figure CCP1.1  | </span><span class="bold_condensed-dark-blue" lang="">Recent human impacts on the terrestrial biodiversity hotspots (coloured, grey is non hotspot) </span> <span class="bold_condensed-dark-blue" lang=""> (Table CCP1. </span><span class="bold_condensed-dark-blue" lang="">SM.1). </span>Impacts are scaled in five equal 20% categories. <span class="bold_condensed-dark-blue" lang=""> (a) </span> North and Central America; <span class="bold_condensed-dark-blue" lang=""> (b) </span>  South America; <span class="bold_condensed-dark-blue" lang=""> (c) </span> <span class="bold_condensed" lang="en-GB"/> Southeast Asia; <span class="bold_condensed-dark-blue" lang=""> (d) </span> Europe and North Africa; <span class="bold_condensed-dark-blue" lang=""> (e) </span> Africa and Arabia; <span class="bold_condensed-dark-blue" lang=""> (f) </span> North Asia; <span class="bold_condensed-dark-blue" lang=""> (g) </span> <span class="bold_condensed" lang="en-GB"/> Southeast Asian archipelagos, Australia and New Zealand. See Table CCP1.1  for key to hotspot numbers.</p>
                          <div class="ch-figure-button-cont"><a href="/report/ar6/wg2/figures/chapter-ccp1/figure-ccp1-001" target="_blank"><button class="btn-ipcc btn btn-primary ch-figure-button">Open figure</button></a> </div>
                        </div>
                        <div class="Figure" id="_idContainer009">
                          <p class="Body_Figures_Figure" lang="de-DE">
                            <img alt="" class="_idGenObjectAttribute-2" id="figure-ccp1-002" loading="lazy" src="https://ipcc.ch/report/ar6/wg2/downloads/figures/IPCC_AR6_WGII_Figure_CCP1_002.png"/>
                          </p>
                          <p class="Body_Figures_Figure_title" lang="en-US"><span class="figure_number" lang="">Figure CCP1.2  | </span><span class="bold_condensed-dark-blue" lang="">Recent human impacts from multiple factors on</span><span class="bold_condensed-dark-blue" lang=""><span class="bold_condensed" lang="en-GB"> (a) </span> </span><span class="bold_condensed-dark-blue" lang="">freshwater hotspots since 2000, based on Janse et </span><span class="bold_condensed-dark-blue" lang="">al. </span><span class="bold_condensed-dark-blue" lang=""> (2015) and (b) marine hotspots based on <a class="reference-link" href="#Halpern--2015">Halpern et al. (2015)</a>. </span>Human impacts in freshwater areas refer to the remaining wilderness. Marine impacts represent land-based, fishing, climate change and ocean-based stressors. Impacts are scaled into five equal 20% categories. See Table CCP1.1  for the key to hotspot numbers.</p>
                          <div class="ch-figure-button-cont"><a href="/report/ar6/wg2/figures/chapter-ccp1/figure-ccp1-002" target="_blank"><button class="btn-ipcc btn btn-primary ch-figure-button">Open figure</button></a> </div>
                        </div>
                      </div>
                      <div class="h2-container" id="CCP1.2.1">
                        <h2 class="Headings_H2-numbered" lang="de-DE">CCP1.2.1  Global Perspective <span class="arrow-up"/><span class="arrow-down"/><span class="share-block"><img class="share-icon" src="../../share.png"/></span></h2>
                        <div class="h2-siblings" id="h2-1-siblings">
                          <div class="h3-container" id="CCP1.2.1.1">
                            <h3 class="Headings_H3" lang="de-DE">CCP1.2.1.1  Observed Impacts <span class="arrow-up"/><span class="arrow-down"/><span class="share-block"><img class="share-icon" src="../../share.png"/></span></h3>
                            <div class="h3-siblings" id="h3-1-siblings">
                              <div class="h4-container" id="CCP1.2.1.1.1">
                                <h4 class="Headings_H4 ParaOverride-2" lang="de-DE">CCP1.2.1.1.1  Observed climatic hazards <span class="arrow-up"/><span class="arrow-down"/><span class="share-block"><img class="share-icon" src="../../share.png"/></span></h4>
                                <div class="h4-siblings" id="h4-1-siblings">
                                  <p class="Body_Body-justify" lang="en-GB">Terrestrial and freshwater hotspots have been warming less over the last 50 years than non-hotspot areas, whereas marine hotspots have been warming more (<a class="reference-link" href="#Kocsis--2021">Kocsis et al., 2021</a>). The warming inside terrestrial hotspots is 0.91&#176;C (Myers) and 1.04&#176;C (G200), respectively, while for freshwater hotspots it is 0.89&#176;C, compared to 1.08&#176;C warming outside (<a class="reference-link" href="#Kocsis--2021">Kocsis et al., 2021</a>). In contrast, mean annual sea surface temperatures in the G200 marine biodiversity hotspots have warmed 41% more than the regions outside (0.53&#176;C compared with 0.38&#176;C) (<a class="reference-link" href="#Kocsis--2021">Kocsis et al., 2021</a>). Thus, terrestrial biodiversity hotspots have been warming slightly less, and marine hotspots considerably more than non-hotspots (<span class="condensed_italic" lang="">medium confidence</span>).</p>
                                  <p class="Body_Body-justify" lang="en-GB">Climate velocity, the direction and pace of movement in climate variables (typically temperature) in space, is key to understanding the origin and fate of biodiversity hotspots under climate change (<a class="reference-link" href="#Loarie--2009">Loarie et al., 2009</a>; <a class="reference-link" href="#Burrows--2011">Burrows et al., 2011</a>). Climate trajectories generally predict the direction and pace of past and future species range shifts (<a class="reference-link" href="#Pinsky--2013">Pinsky et al., 2013</a>; <a class="reference-link" href="#Brito-Morales--2018">Brito-Morales et al., 2018</a>), although there are exceptions (<a class="reference-link" href="#Fuchs--2020">Fuchs et al., 2020</a>). Spatial patterns of climate trajectories show regions where species are expected to leave, pass through, and/or arrive under climate change (<a class="reference-link" href="#Burrows--2014">Burrows et al., 2014</a>). Regions of high climate velocities are those with low topographic relief on land, particularly flooded grasslands and deserts (<a class="reference-link" href="#Loarie--2009">Loarie et al., 2009</a>), and tropical as well as offshore and polar sea regions (<a class="reference-link" href="#Burrows--2011">Burrows et al., 2011</a>; <a class="reference-link" href="#Burrows--2014">Burrows et al., 2014</a>; <a class="reference-link" href="#Garc&#237;a Molinos--2016">Garc&#237;a Molinos et al., 2016</a>; <a class="reference-link" href="#Brito-Morales--2018">Brito-Morales et al., 2018</a>; <a class="reference-link" href="#Brito-Morales--2020">Brito-Morales et al., 2020</a>).</p>
                                  <p class="Body_Body-justify" lang="en-GB">On millennial time scales, some areas of low climate velocity have more endemic species and can be considered climate refugia, at least on land (<a class="reference-link" href="#Sandel--2011">Sandel et al., 2011</a>) and, for marine species, around Antarctica (H213) (<a class="reference-link" href="#Costello--2010">Costello et al., 2010</a>). This suggests that, if these areas are subject to increased velocities, they will lose species that are not able to disperse fast enough to cope with the pace of climate change (<span class="condensed_italic" lang="">medium confidence</span>) (<a class="reference-link" href="#Sandel--2011">Sandel et al., 2011</a>; <a class="reference-link" href="#Brito-Morales--2018">Brito-Morales et al., 2018</a>).</p>
                                  <p class="Body_Body-justify" lang="en-GB">Climate velocities are 47% (Myers), 29% (G200, terrestrial) and 10% (G200, freshwater) lower inside biodiversity hotspots than outside, respectively (<a class="reference-link" href="#Kocsis--2021">Kocsis et al., 2021</a>), but are 69% higher inside marine hotspots than outside (<span class="condensed_italic" lang="">medium confidence</span>). Climate velocities from 1970 to 2019 ranged from 3&#8211;4 km per decade (terrestrial and freshwater) to ~11 km per decade in marine (<a class="reference-link" href="#Kocsis--2021">Kocsis et al., 2021</a>).</p>
                                  <p class="Body_Body-justify" lang="en-GB">For terrestrial and freshwater hotspots, the highest climate velocities are in central South America, including the Amazon (H153, 154) (Figure CCP1.3). Terrestrial hotspots also have high velocities in the Arctic (H196, 214) and east of the Caspian Sea, while freshwater hotspots have low velocities in the eastern European Mediterranean and eastern Australia.</p>
                                  <div class="Figure" id="_idContainer011">
                                    <p class="Body_Figures_Figure" lang="de-DE">
                                      <img alt="" class="_idGenObjectAttribute-3" id="figure-ccp1-003" loading="lazy" src="https://ipcc.ch/report/ar6/wg2/downloads/figures/IPCC_AR6_WGII_Figure_CCP1_003.png"/>
                                    </p>
                                    <p class="Body_Figures_Figure_title" lang="en-US"><span class="figure_number" lang="">Figure CCP1.3  | </span><span class="bold_condensed-dark-blue" lang="">Climate velocities in terrestrial</span><span class="bold_condensed-dark-blue" lang=""><span class="bold_condensed" lang="en-GB"> (a) </span> </span><span class="bold_condensed-dark-blue" lang="">, freshwater</span><span class="bold_condensed-dark-blue" lang=""><span class="bold_condensed" lang="en-GB"> (b) </span> </span><span class="bold_condensed-dark-blue" lang="">and marine</span><span class="bold_condensed-dark-blue" lang=""><span class="bold_condensed" lang="en-GB"> (c) </span> </span><span class="bold_condensed-dark-blue" lang="">hotspots between 1970&#8211;2019. </span>Values are presented in kilometres per decade and derived using the analytical package VoCC (<a class="reference-link" href="#Garc&#237;a Molinos--2019">Garc&#237;a Molinos et al., 2019</a>) from gridded temperature data, sea surface temperatures for marine (<a class="reference-link" href="#Rayner--2003">Rayner et al., 2003</a>) and near-surface air temperatures on land and freshwater (<a class="reference-link" href="#Harris--2020">Harris et al., 2020</a>). Positive and negative velocities indicate warming and cooling, respectively.</p>
                                    <div class="ch-figure-button-cont"><a href="/report/ar6/wg2/figures/chapter-ccp1/figure-ccp1-003" target="_blank"><button class="btn-ipcc btn btn-primary ch-figure-button">Open figure</button></a> </div>
                                  </div>
                                  <p class="Body_Body-justify" lang="en-GB">Marine hotspots have a wider range of climate velocities than terrestrial and freshwater environments (Figure CCP1.3), being faster in equatorial, Mediterranean (H216), Baltic (H215), North and Okhotsk (H229), and Arctic hotspots (H196, 214), and slow in the Antarctic hotspot (H213). Marine species tend to follow climate velocities more closely than terrestrial species (<span class="condensed_italic" lang="">high confidence</span>) (<a class="reference-link" href="#Sunday--2012">Sunday et al., 2012</a>; <a class="reference-link" href="#Pinsky--2019">Pinsky et al., 2019</a>; <a class="reference-link" href="#Lenoir--2020">Lenoir et al., 2020</a>). The reasons may be smaller thermal safety margins in the seas or greater human impacts on land impeding species range shifts. Climate velocities are particularly fast in equatorial seas (Figure CCP1.3; (<a class="reference-link" href="#Burrows--2011">Burrows et al., 2011</a>), which are therefore expected to be source areas for species shifting their ranges towards the subtropics (<a class="reference-link" href="#Burrows--2014">Burrows et al., 2014</a>). The subtropics are then source areas of species that shift to temperate latitudes and so forth, such that observed impacts in marine biodiversity hotspots are largely attributable to species range shifts (<span class="condensed_italic" lang="">high confidence</span>) (<a class="reference-link" href="#Pecl--2017">Pecl et al., 2017</a>). Because marine climate velocities are significantly greater within than outside hotspots, marine hotspots are especially prone to species redistributions (<span class="condensed_italic" lang="">medium confidence</span>) (Figure CCP1.3; (<a class="reference-link" href="#Kocsis--2021">Kocsis et al., 2021</a>).</p>
                                  <p class="Body_Body-justify" lang="en-GB">While species from lower latitudes may shift their geographic ranges to higher latitudes to adapt to changing climate, there are no species to replace low latitude species. Thus, as already observed in the oceans around the equator, the loss of species in low latitudes will continue with future climate warming (<span class="condensed_italic" lang="">high confidence</span>) (<a class="reference-link" href="#Yasuhara--2020">Yasuhara et al., 2020</a>; <a class="reference-link" href="#Chaudhary--2021">Chaudhary et al., 2021</a>). The issue also extends to altitudinal ranges in terrestrial environments, with species moving to higher elevations where surface area generally declines with increasing elevation; mountaintop species may have nowhere to go (<a class="reference-link" href="#Flousek--2015">Flousek et al., 2015</a>; <a class="reference-link" href="#Freeman--2018">Freeman et al., 2018</a>; <a class="reference-link" href="#Kidane--2019">Kidane et al., 2019</a>).</p>
                                </div>
                              </div>
                              <div class="h4-container" id="CCP1.2.1.1.2">
                                <h4 class="Headings_H4" lang="de-DE">CCP1.2.1.1.2  Observed impacts on biodiversity <span class="arrow-up"/><span class="arrow-down"/><span class="share-block"><img class="share-icon" src="../../share.png"/></span></h4>
                                <div class="h4-siblings" id="h4-2-siblings">
                                  <p class="Body_Body-justify" lang="en-GB">Although conservation status has only been assessed globally for about 6% of all species (<a class="reference-link" href="#Costello--2019">Costello, 2019</a>) and most confirmed extinctions and threatened species are terrestrial, a higher proportion of freshwater species are threatened. This is reflected in the higher proportion of freshwater hotspots impacted by humans (<a class="reference-link" href="#Collen--2014">Collen et al., 2014</a>; <a class="reference-link" href="#Costello--2015">Costello, 2015</a>; <a class="reference-link" href="#Harrison--2018">Harrison et al., 2018</a>). The rate of species endemicity is exceptionally high in freshwater biogeographic realms (i.e., large regions of distinct species composition and endemicity), at 89&#8211;96% for fish in all but one realm, compared to 11&#8211;98% for terrestrial vertebrate groups (<a class="reference-link" href="#Leroy--2019">Leroy et al., 2019</a>) and 17&#8211;84% for marine realms (<a class="reference-link" href="#Costello--2017">Costello et al., 2017</a>). Already, one-third of wetlands have been lost and 9000 freshwater species are threatened with extinction without considering the effects of climate change (<a class="reference-link" href="#Darwall--2018">Darwall et al., 2018</a>), and only 13% of world rivers were recently classified as least impacted (<a class="reference-link" href="#Su--2021">Su et al., 2021</a>).</p>
                                  <p class="Body_Body-justify" lang="en-GB">Globally, observed climate-driven changes in biodiversity are typically of species distributions shifting to higher latitudes (<span class="condensed_italic" lang="">virtually certain</span>) (<a class="reference-link" href="#Lenoir--2020">Lenoir et al., 2020</a>, Ch.2, Ch. 3.4). Since the 1950s, marine species richness has shifted poleward in the Northern Hemisphere, increased in mid-latitudes and declined at the equator in concert with ocean warming (<span class="condensed_italic" lang="">medium confidence</span>) (<a class="reference-link" href="#Chaudhary--2021">Chaudhary et al., 2021</a>). Climate-driven altitudinal shifts are common on land (<span class="condensed_italic" lang="">high confidence</span>) (<a class="reference-link" href="#Lenoir--2015">Lenoir and Svenning, 2015</a>; <a class="reference-link" href="#Steinbauer--2018">Steinbauer et al., 2018</a>), and depth shifts in the ocean may occur but are little studied (<span class="condensed_italic" lang="">low confidence</span>) (<a class="reference-link" href="#Burrows--2019">Burrows et al., 2019</a>; <a class="reference-link" href="#Jorda--2020">Jorda et al., 2020</a>). While climate-induced range expansions can be viewed as opportunities for increasing regional biodiversity, range contractions adversely affect biodiversity through regional extirpations (<span class="condensed_italic" lang="">high confidence</span>) (<a class="reference-link" href="#Cahill--2013">Cahill et al., 2013</a>; <a class="reference-link" href="#Chaudhary--2021">Chaudhary et al., 2021</a>).</p>
                                  <p class="Body_Body-justify" lang="en-GB">Both of the two climate change associated global species extinctions to date support the predictions that endemic species on mountains and islands are at the greatest risk of extinction (<a class="reference-link" href="#Manes--2021">Manes et al., 2021</a>). The golden toad (<span class="condensed_italic" lang="">Bufo periglenes</span>) became extinct after some years of decline associated with changes in climate warming and precipitation in the Talamancan-Isthmian Pacific Forests biodiversity hotspot (H22) (<a class="reference-link" href="#Pounds--1999">Pounds et al., 1999</a>; <a class="reference-link" href="#Cahill--2013">Cahill et al., 2013</a>, WGII Ch2.4.2.2). The Bramble Cay melomys (<span class="condensed_italic" lang="">Melomys rubicola</span>)<span class="condensed_italic" lang="">, </span> a rodent endemic to an island between Australia and Papua New Guinea and closely related to a mainland Australian species, became extinct due to habitat loss arising from climate change-related sea level rise and cyclone activity (<a class="reference-link" href="#Fulton--2017">Fulton, 2017</a>; <a class="reference-link" href="#Roycroft--2021">Roycroft et al., 2021</a>, WGII Ch.11).</p>
                                </div>
                              </div>
                            </div>
                          </div>
                          <div class="h3-container" id="CCP1.2.1.2">
                            <h3 class="Headings_H3" lang="de-DE">CCP1.2.1.2  Projected Impacts <span class="arrow-up"/><span class="arrow-down"/><span class="share-block"><img class="share-icon" src="../../share.png"/></span></h3>
                            <div class="h3-siblings" id="h3-2-siblings">
                              <div class="h4-container" id="CCP1.2.1.2.1">
                                <h4 class="Headings_H4" lang="de-DE">CCP1.2.1.2.1  Projected climatic hazards <span class="arrow-up"/><span class="arrow-down"/><span class="share-block"><img class="share-icon" src="../../share.png"/></span></h4>
                                <div class="h4-siblings" id="h4-3-siblings">
                                  <p class="Body_Body-justify" lang="en-GB">Comparison of climate warming projected for air and sea temperature shows biodiversity hotspots will continue to experience the greatest net increases in temperature at higher Northern Hemisphere latitudes, particularly in tundra regions (Figures CCP1.4; CCP1.5; Table CCP1.1). Generally, terrestrial and freshwater hotspots are projected to continue to warm more than marine (Figure CCP1.3). Modelled temperatures are projected to continue to be the highest in the tropics, indicating where there are more thermally stressful conditions for more species (<span class="condensed_italic" lang="">high confidence</span>) (<a class="reference-link" href="#Stuart-Smith--2015">Stuart-Smith et al., 2015</a>; <a class="reference-link" href="#Stuart-Smith--2017">Stuart-Smith et al., 2017</a>; <a class="reference-link" href="#Foster--2018">Foster et al., 2018</a>; <a class="reference-link" href="#Waldock--2019">Waldock et al., 2019</a>). By the end of this century, all terrestrial biodiversity hotspots in Central and South America, Africa, India and southern and eastern Asia (including the Indo&#8211;West Pacific islands) are projected to experience climates unprecedented in their species&#8217; evolutionary history (<span class="condensed_italic" lang="">medium confidence</span>) (<a class="reference-link" href="#Williams--2007">Williams et al., 2007</a>).</p>
                                  <p class="Body_Body-justify" lang="en-GB">Based on WGI<span class="condensed_italic" lang="">Interactive Atlas</span> data (Guti&#233;rrez et al., 2021), global warming is projected to affect terrestrial hotspots less than non-hotspot areas: 80% less for Myers and 95&#8211;96% less for G200 terrestrial and freshwater hotspots at global warming of 1.5&#176;C&#8211;3&#176;C (<span class="condensed_italic" lang="">medium confidence</span>) (<a class="reference-link" href="#Kocsis--2021">Kocsis et al., 2021</a>). In contrast, warming is projected to be 12&#8211;13% greater inside than outside marine hotspots (<span class="condensed_italic" lang="">medium confidence</span>) (<a class="reference-link" href="#Kocsis--2021">Kocsis et al., 2021</a>). Precipitation is generally projected to increase more in terrestrial and freshwater biodiversity hotspots compared to outside them (<span class="condensed_italic" lang="">low confidence</span>) (<a class="reference-link" href="#Kocsis--2021">Kocsis et al., 2021</a>). The exception is Myers hotspots, which are projected to have, on average, ~28% less precipitation at 1.5&#176;C warming, but ~33% more at 2&#176;C and ~65% more at 3&#176;C (<span class="condensed_italic" lang="">low confidence</span>). However, precipitation changes are often difficult to assess as many hotspots cover large areas, with some areas projected to be wetter and some drier with wide differences between different climate models.</p>
                                  <div class="Figure" id="_idContainer014">
                                    <p class="Body_Figures_Figure" lang="de-DE">
                                      <img alt="" class="_idGenObjectAttribute-4" id="figure-ccp1-004" loading="lazy" src="https://ipcc.ch/report/ar6/wg2/downloads/figures/IPCC_AR6_WGII_Figure_CCP1_004.png"/>
                                    </p>
                                    <p class="Body_Figures_Figure_title" lang="en-US"><span class="figure_number" lang="">Figure CCP1.4 | </span><span class="bold_condensed-dark-blue" lang=""/><span class="bold_condensed-dark-blue" lang="">Projected loss of climatically suitable area in terrestrial biodiversity hotspots for a global average of 1. </span><span class="bold_condensed-dark-blue" lang="">5&#176;C (upper row, a&#8211;b), 2&#176;C (middle, c&#8211;d) and 3&#176;C (lower, e&#8211;f). </span>Left-hand column displays the projected human impact using the five equal 20% categories of present-day impact (Figure CCP1.1). The right-hand column indicates the changes of impact categories compared to present-day impact. See Table SMCCP1.1 for more details.</p>
                                    <div class="ch-figure-button-cont"><a href="/report/ar6/wg2/figures/chapter-ccp1/figure-ccp1-004" target="_blank"><button class="btn-ipcc btn btn-primary ch-figure-button">Open figure</button></a> </div>
                                  </div>
                                  <div class="Figure" id="_idContainer016">
                                    <p class="Body_Figures_Figure" lang="de-DE">
                                      <img alt="" class="_idGenObjectAttribute-4" id="figure-ccp1-005" loading="lazy" src="https://ipcc.ch/report/ar6/wg2/downloads/figures/IPCC_AR6_WGII_Figure_CCP1_005.png"/>
                                    </p>
                                    <p class="Body_Figures_Figure_title" lang="en-US"><span class="figure_number" lang="">Figure CCP1.5 | </span><span class="bold_condensed-dark-blue" lang="">Projected future warming in degrees Celsius for freshwater (left column, near-surface air temperature, panels</span><span class="bold_condensed-dark-blue" lang=""><span class="bold_condensed" lang="en-GB">a</span></span><span class="bold_condensed-dark-blue" lang="">, </span><span class="bold_condensed-dark-blue" lang=""><span class="bold_condensed" lang="en-GB">c</span></span><span class="bold_condensed-dark-blue" lang="">and</span><span class="bold_condensed-dark-blue" lang=""><span class="bold_condensed" lang="en-GB">e</span></span><span class="bold_condensed-dark-blue" lang="">) and marine (right column as sea surface temperature, panels</span><span class="bold_condensed-dark-blue" lang=""><span class="bold_condensed" lang="en-GB">b</span></span><span class="bold_condensed-dark-blue" lang="">, </span><span class="bold_condensed-dark-blue" lang=""><span class="bold_condensed" lang="en-GB">d</span></span><span class="bold_condensed-dark-blue" lang="">and</span><span class="bold_condensed-dark-blue" lang=""><span class="bold_condensed" lang="en-GB">f </span></span><span class="bold_condensed-dark-blue" lang="">) </span> <span class="bold_condensed-dark-blue" lang="">hotspots for a global average warming of +1. </span><span class="bold_condensed-dark-blue" lang="">5&#176;C (a, b), +2&#176;C (c, d) and +3&#176;C</span><span class="bold_condensed-dark-blue" lang=""> (e, f) compared to pre-industrial conditions. </span>Values in text boxes in the figures indicate temperature increase from present-day (2005&#8211;2014) settings. Projected temperatures were calculated with averages of multi-model, yearly means across Shared Socioeconomic Pathways (SSP) 1.26 (only for +1.5&#176;C), SSP2-45, SSP3-70 and SSP5-85.</p>
                                    <div class="ch-figure-button-cont"><a href="/report/ar6/wg2/figures/chapter-ccp1/figure-ccp1-005" target="_blank"><button class="btn-ipcc btn btn-primary ch-figure-button">Open figure</button></a> </div>
                                  </div>
                                </div>
                              </div>
                              <div class="h4-container" id="CCP1.2.1.2.2">
                                <h4 class="Headings_H4" lang="de-DE">CCP1.2.1.2.2  Projected impacts on biodiversity <span class="arrow-up"/><span class="arrow-down"/><span class="share-block"><img class="share-icon" src="../../share.png"/></span></h4>
                                <div class="h4-siblings" id="h4-4-siblings">
                                  <p class="Body_Body-justify" lang="en-GB">Biodiversity hotspots are expected to be especially vulnerable to climate change because their endemic species have smaller geographic ranges (<span class="condensed_italic" lang="">high confidence</span>) (<a class="reference-link" href="#Sandel--2011">Sandel et al., 2011</a>; <a class="reference-link" href="#Brown--2020">Brown et al., 2020</a>; <a class="reference-link" href="#Manes--2021">Manes et al., 2021</a>). <a class="reference-link" href="#Manes--2021">Manes et al. (2021)</a>  reviewed over 8000 projections of climate change impacts on biodiversity in 232 studies, including 6116 projections on endemic, native and introduced species in terrestrial (200 studies), freshwater (14 studies) and marine (34 studies) environments in biodiversity hotspots. Only half of the hotspots had studies on climate change impacts. All measures of biodiversity were found to be negatively impacted by projected climate change, namely, species abundance, diversity, area, physiology and fisheries catch potential (<span class="condensed_italic" lang="">medium confidence</span>). However, introduced species&#8217; responses were neutral to positive (<span class="condensed_italic" lang="">medium confidence</span>). Land areas were projected to be more negatively affected by climate warming than marine. Land plants, insects, birds, reptiles and mammals were all projected to be negatively affected (<span class="condensed_italic" lang="">medium confidence</span>), as well as fish, coral reef, benthic, planktonic and other marine species (<span class="condensed_italic" lang="">medium confidence</span>).</p>
                                  <p class="Body_Body-justify" lang="en-GB">Of the 6116 projections for more than 2,700 species assessed in biodiversity hotspots, ~44% were found to be at high extinction risk, and ~24% at very high extinction risk due to climate change (<a class="reference-link" href="#Manes--2021">Manes et al., 2021</a>) (<span class="condensed_italic" lang="">medium confidence</span>). Risks of extinction were estimated based on the projections for all warming levels combined, showing that endemic species were about 2.7 times more at very high risk of extinction compared to non-endemic native species (<a class="reference-link" href="#Manes--2021">Manes et al., 2021</a>). Extinction risks were highest for endemic species of both land and ocean (<span class="condensed_italic" lang="">medium confidence</span>), and were higher for those living on islands (~100%, <span class="condensed_italic" lang="">medium confidence</span>) and mountains (~84%, <span class="condensed_italic" lang="">medium confidence</span>) than in the ocean (~54%, <span class="condensed_italic" lang="">low evidence, medium agreement </span>; <span class="condensed_italic" lang="">low confidence</span>) and on continents (~12%, <span class="condensed_italic" lang="">robust evidence, medium agreement, medium confidence</span>) (Figure CCP1.6). Extinction risks for non-endemic natives were ~20% for both terrestrial and marine species, with introduced species projected to become more rather than less invasive. At 1.5&#176;C warming, ~2% of both terrestrial and marine species and at 3&#176;C, ~20% and ~32% respectively, were projected to be at very high risk of extinction in the hotspots (Figure CCP1.6). Thus, a doubling of warming results in a roughly 10-fold increase in species at very high extinction risk.</p>
                                  <div class="Figure" id="_idContainer018">
                                    <p class="Body_Figures_Figure" lang="de-DE">
                                      <img alt="" class="_idGenObjectAttribute-5" id="figure-ccp1-006" loading="lazy" src="https://ipcc.ch/report/ar6/wg2/downloads/figures/IPCC_AR6_WGII_Figure_CCP1_006.png"/>
                                    </p>
                                    <p class="Body_Figures_Figure_title" lang="en-US"><span class="figure_number" lang="">Figure CCP1.6 | </span><span class="bold_condensed-dark-blue" lang="">A summary of </span><span class="bold_condensed-dark-blue" lang=""><span class="bold_condensed" lang="en-GB"/></span><span class="bold_condensed-dark-blue" lang="">the projected risks of species extinction at global warming levels of &lt;1</span><span class="bold_condensed-dark-blue" lang=""><span class="black_condensed-dark-blue" lang="">. </span></span><span class="black_condensed-dark-blue" lang="">5&#176;C, 1.5&#8211;2.0&#176;C and &gt;3&#176;C in terrestrial and marine biodiversity hotspots. </span>Data from <a class="reference-link" href="#Manes--2021">Manes et al. (2021)</a>.</p>
                                    <div class="ch-figure-button-cont"><a href="/report/ar6/wg2/figures/chapter-ccp1/figure-ccp1-006" target="_blank"><button class="btn-ipcc btn btn-primary ch-figure-button">Open figure</button></a> </div>
                                  </div>
                                  <p class="Body_Body-justify" lang="en-GB"><a class="reference-link" href="#Manes--2021">Manes et al. (2021)</a>  found that any benefits to species (e.g., range or abundance increase) were projected to be localised and transient (e.g., Arctic, H196, 214). This and previous assessments indicate that, while climate change varies spatially and taxa may respond differently, a loss of biodiversity is projected across all terrestrial hotspots (<span class="condensed_italic" lang="">high confidence</span>) (<a class="reference-link" href="#Foden--2013">Foden et al., 2013</a>; <a class="reference-link" href="#Warren--2018a">Warren et al., 2018a</a>; <a class="reference-link" href="#Manes--2021">Manes et al., 2021</a>). Abrupt changes across species assemblages may occur under all scenarios: in 9% of assemblages at 1.75&#176;C and 35% at 4.4&#176;C on both land and sea (<a class="reference-link" href="#Trisos--2020">Trisos et al., 2020</a>). However, species losses may be reduced if species have thermal microclimate refugia and behavioural thermoregulation, or greater due to extreme events, such as heatwaves.</p>
                                </div>
                              </div>
                            </div>
                          </div>
                          <div class="h3-container" id="CCP1.2.1.3">
                            <h3 class="Headings_H3" lang="de-DE">CCP1.2.1.3  Compounding and Cascading Effects <span class="arrow-up"/><span class="arrow-down"/><span class="share-block"><img class="share-icon" src="../../share.png"/></span></h3>
                            <div class="h3-siblings" id="h3-3-siblings">
                              <p class="Body_Body-justify" lang="en-GB">All biodiversity hotspots are already impacted, to differing degrees, by human activities (<span class="condensed_italic" lang="">high confidence</span>) (Table CCP1.1, Figures CCP1.1, CCP1.2, <a class="reference-link" href="#Myers--2000">Myers et al., 2000</a>; <a class="reference-link" href="#Le Roux--2019">Le Roux et al., 2019</a>). At present, over three billion people live within terrestrial and (catchments of) freshwater biodiversity hotspots, many of which border marine hotspots (Figures CCP1.1; CCP1.2; Table SMCCP1.1; Guti&#233;rrez et al., 2021). Thus, climate change impacts on biodiversity hotspots are compounded by other anthropogenic impacts, increasing the vulnerability and reducing the resilience of biodiversity to climate change (<span class="condensed_italic" lang="">very high confidence</span>). Projections of changing climate alone may overestimate or underestimate the impacts on biodiversity (<span class="condensed_italic" lang="">medium evidence, high agreement </span>). The additional risk of the combined effects of climate change and other impacts (e.g., land use change, overhunting, pollution and invasive species) on species has been raised since the Third Assessment Report. The terrestrial hotspots projected to be most affected by global warming are, in general, those already being impacted by loss of habitat due to land use change (Figure CCP1.4; Table SMCCP1.1) (<a class="reference-link" href="#Warren--2018a">Warren et al., 2018a</a>). This remains a trend in the recent literature, although most studies still address only one stressor (<a class="reference-link" href="#Titeux--2016">Titeux et al., 2016</a>). For example, <a class="reference-link" href="#Mantyka-Pringle--2015">Mantyka-Pringle et al. (2015)</a>  show that when the interaction between projected climate change and habitat loss is taken into account, the extinction risk of birds and mammals in 15&#8211;32% of terrestrial biodiversity hotspots changes. Similarly, <a class="reference-link" href="#Bellard--2014b">Bellard et al. (2014b)</a>  found different results when examining the impact of climate change, invasive species and land use change independently, as opposed to synergistically. When combining those three impacts they identified the Atlantic Forest (H47), Cape Floristic Region (H65) and Polynesia-Micronesia (H1, 2, 138, 139, 142) as particularly vulnerable.</p>
                              <p class="Body_Body-justify" lang="en-GB">In a global assessment of the threat of climate change to river fish biodiversity, <a class="reference-link" href="#Tedesco--2013">Tedesco et al. (2013)</a>  projected that current extinction rates of species may be 7% greater due to climate change. The main threat is due to the effects of drought and reduced river flows, which would be 18 times greater than without climate change. However, just 20 of the 110 river basins studied would experience sufficient climate-driven water loss to cause fish extinctions by 2090. Moreover, the present rates of species loss due to human activities are 130 times greater than those projected under future climate change (<span class="condensed_italic" lang="">medium confidence</span>) (<a class="reference-link" href="#Tedesco--2013">Tedesco et al., 2013</a>).</p>
                              <p class="Body_Body-justify" lang="en-GB">Marine systems are also vulnerable to cumulative human impacts, which can be direct (e.g., pollution, overfishing) and indirect (altered food webs) (<span class="condensed_italic" lang="">very high confidence</span>) (<a class="reference-link" href="#Halpern--2008">Halpern et al., 2008</a>; <a class="reference-link" href="#Halpern--2015">Halpern et al., 2015</a>). The marine hotspots most currently threatened by non-climate-related human impacts are all situated in the Northern Hemisphere, specifically along the northern European, Mediterranean and Asian coasts, where the overlap of overfishing and pollution is especially large (Figure CCP1.2 b; <a class="reference-link" href="#Halpern--2008">Halpern et al., 2008</a>; <a class="reference-link" href="#Halpern--2015">Halpern et al., 2015</a>; <a class="reference-link" href="#Ram&#237;rez--2018">Ram&#237;rez et al., 2018</a>). Although there is a strong overlap of non-climatic and climatic impacts in marine ecosystems (<a class="reference-link" href="#Blowes--2019">Blowes et al., 2019</a>; <a class="reference-link" href="#Bowler--2020">Bowler et al., 2020</a>), the effects suggest that climate change impacts are most severe in tropical and northern high-latitude seas (<span class="condensed_italic" lang="">high confidence</span>) (<a class="reference-link" href="#Doney--2012">Doney et al., 2012</a>; <a class="reference-link" href="#Gattuso--2015">Gattuso et al., 2015</a>; <a class="reference-link" href="#Cheung--2018">Cheung et al., 2018</a>; <a class="reference-link" href="#IPCC--2019b">IPCC, 2019b</a>). Temperature-driven range shifts and range expansions are projected to also lead to cascading effects on marine biodiversity through ecological interactions (<span class="condensed_italic" lang="">high confidence</span>) (<a class="reference-link" href="#Pecl--2017">Pecl et al., 2017</a>; <a class="reference-link" href="#Verg&#233;s--2019">Verg&#233;s et al., 2019</a>). Cascading effects may be especially pronounced in temperate reefs, where tropicalisation could lead to the arrival of herbivorous fish and predators previously absent (<a class="reference-link" href="#Verg&#233;s--2019">Verg&#233;s et al., 2019</a>). However, how these indirect effects of climate change on species may change food webs and ecosystem function, including carbon sequestration, is unknown. Direct and indirect human impacts due to fisheries and pollution can also lead to cascading effects that may be additive to climate impacts on biodiversity. Destruction of marine biogenic habitats due to trawling and dredging and loss of large proportions of marine megafauna, particularly fish, mammals, birds and reptiles, alter food webs and reduce resilience to additional disturbances, such as those caused by climate change (<span class="condensed_italic" lang="">medium evidence, high agreement </span>) (<a class="reference-link" href="#Brander--2007">Brander, 2007</a>; <a class="reference-link" href="#Wernberg--2011">Wernberg et al., 2011</a>; <a class="reference-link" href="#Ram&#237;rez--2017">Ram&#237;rez et al., 2017</a>; <a class="reference-link" href="#Cheung--2018">Cheung et al., 2018</a>; <a class="reference-link" href="#Bates--2019">Bates et al., 2019</a>; <a class="reference-link" href="#Costello--2021">Costello, 2021</a>).</p>
                              <p class="Body_Body-justify" lang="en-GB">The following sections report observed and projected climate change impacts on terrestrial, freshwater and marine environments.</p>
                            </div>
                          </div>
                        </div>
                      </div>
                      <div class="h2-container" id="CCP1.2.2">
                        <h2 class="Headings_H2-numbered" lang="de-DE">CCP1.2.2  Terrestrial <span class="arrow-up"/><span class="arrow-down"/><span class="share-block"><img class="share-icon" src="../../share.png"/></span></h2>
                        <div class="h2-siblings" id="h2-2-siblings">
                          <p class="Body_Body-justify" lang="en-GB">The 177 terrestrial hotspots assessed here (including 142 G200) cover about 61,000,000 km <span class="superscript _idGenCharOverride-1" lang="">2</span> (41% of global land area), with a 37% overlap with freshwater hotspots (Table CCP1.1; Figure CCP1.2). They include wet and dry forests, woodland and scrub, highlands, mangroves, deserts, steppe, savanna, grasslands, moorlands and tundra (Figures CCP1.8-1.11). Over 77% of publications on climate change impacts on hotspots since AR5 have been on terrestrial ecosystems, most on projected (as opposed to observed) impacts (<a class="reference-link" href="#Manes--2021">Manes et al., 2021</a>).</p>

                            <p class="Body_Figures_Figure" lang="de-DE">

                            </p>

                            <p class="Body_Figures_Figure" lang="de-DE">
                              <img alt="" class="_idGenObjectAttribute-8" id="figure-ccp1-009" loading="lazy" src="https://ipcc.ch/report/ar6/wg2/downloads/figures/IPCC_AR6_WGII_Figure_CCP1_009.png"/>

                            <div class="ch-figure-button-cont"><a href="/report/ar6/wg2/figures/chapter-ccp1/figure-ccp1-009" target="_blank"><button class="btn-ipcc btn btn-primary ch-figure-button">Open figure</button></a> </div>

                          <div class="Figure" id="_idContainer022">
                            <p class="Body_Figures_Figure" lang="de-DE">
                              <img alt="" class="_idGenObjectAttribute-7" id="figure-ccp1-008" loading="lazy" src="https://ipcc.ch/report/ar6/wg2/downloads/figures/IPCC_AR6_WGII_Figure_CCP1_008.png"/>

                            <p class="Body_Figures_Figure_title" lang="en-US"><span class="figure_number" lang="">Figure CCP1.8 | </span><span class="bold_condensed-dark-blue" lang="">Terrestrial biodiversity hotspots in the Americas, Asia and New Zealand. </span>Photos by Denis Costello (top four), Mariana M. Vale (Brazil), and Mark Costello (other three).</p>
                            <div class="ch-figure-button-cont"><a href="/report/ar6/wg2/figures/chapter-ccp1/figure-ccp1-008" target="_blank"><button class="btn-ipcc btn btn-primary ch-figure-button">Open figure</button></a> </div>
