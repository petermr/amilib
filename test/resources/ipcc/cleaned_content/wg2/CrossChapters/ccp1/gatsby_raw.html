                      <div class="h2-container box-container" id="box-ccp1.1">
                        <h2 class="Body_Box_blue_Box_head" lang="en-GB"><span>Box CCP1.1  | Climate change and terrestrial biodiversity hotspots on small islands</span> <span class="arrow-up"/><span class="arrow-down"/><span class="share-block"><img class="share-icon" src="../../share.png"/></span></h2>
                        <div class="h2-siblings" id="h2-5-siblings">
                          <p class="Body_Box_blue_Box_body" lang="en-GB">Despite covering approximately 2% of the Earth&#8217;s land area, islands harbour more than 20% of extant terrestrial species (<a class="reference-link" href="#Wetzel--2013">Wetzel et al., 2013</a>). Islands have disproportionately higher rates of endemism and threat when compared to continents, with 80% of historical extinctions (since 1500 CE) having occurred on islands (<span class="condensed_italic" lang="">high confidence</span>) (<a class="reference-link" href="#Taylor--2016">Taylor and Kumar, 2016</a>; <a class="reference-link" href="#Spatz--2017">Spatz et al., 2017</a>; <a class="reference-link" href="#Due&#241;as--2021">Due&#241;as et al., 2021</a>). Current climate change projections suggest that insular species are particularly sensitive and, even at mild warming levels, substantial losses are expected (<span class="condensed_italic" lang="">high confidence</span>) (<a class="reference-link" href="#Pouteau--2016">Pouteau and Birnbaum, 2016</a>; <a class="reference-link" href="#Taylor--2016">Taylor and Kumar, 2016</a>; <a class="reference-link" href="#Dawson--2017">Dawson et al., 2017</a>; <a class="reference-link" href="#Manes--2021">Manes et al., 2021</a>). Given islands&#8217; characteristic high endemicity, current high threat levels and the fact that islands host almost half of all species currently considered to be at risk of extinction, especially at higher warming levels (<span class="condensed_italic" lang="">high confidence</span>) (<a class="reference-link" href="#Taylor--2016">Taylor and Kumar, 2016</a>; <a class="reference-link" href="#Spatz--2017">Spatz et al., 2017</a>), further losses could contribute disproportionately to global biodiversity decline (<span class="condensed_italic" lang="">medium evidence, high agreement </span>) (<a class="reference-link" href="#Harter--2015">Harter et al., 2015</a>; <a class="reference-link" href="#Pouteau--2016">Pouteau and Birnbaum, 2016</a>; <a class="reference-link" href="#Manes--2021">Manes et al., 2021</a>).</p>
                          <p class="Body_Box_blue_Box_body" lang="en-GB">The high vulnerability of terrestrial biodiversity on islands to global change can be explained by a number of limitations, characteristic of both islands and insular species. Older, isolated islands tend to have fewer species and lower functional redundancy but a higher proportion of endemism (<a class="reference-link" href="#Pouteau--2016">Pouteau and Birnbaum, 2016</a>; <a class="reference-link" href="#M&#233;dail--2017">M&#233;dail, 2017</a>). Many of these islands contain species with inherently high sensitivity to environmental change (narrow habitat ranges, small population sizes, low genetic diversity and poor adaptive, dispersal and defensive capabilities) (<a class="reference-link" href="#Harter--2015">Harter et al., 2015</a>). Unlike continental environments, insular species often have limited opportunities for autonomous adaptation from not having enough geographic space to shift their ranges to track suitable climatic conditions (<span class="condensed_italic" lang="">high confidence</span>) (<a class="reference-link" href="#Fortini--2015">Fortini et al., 2015</a>; <a class="reference-link" href="#Manes--2021">Manes et al., 2021</a>). Local extinction risks are amplified by even small losses of habitat due to global change including human-induced disturbances, extreme events, sea level rise (Chapter 15; Cross-Chapter Box SLR in Chapter 3) and invasive species.</p>
                          <p class="Body_Box_blue_Box_body" lang="en-GB">However, some insular species have shown resilience to climate change. Intact island forests, for example, have shown rapid recovery rates after tropical cyclones, despite high levels of initial damage, especially in the Caribbean (<span class="condensed_italic" lang="">medium confidence</span>) (<a class="reference-link" href="#Luke--2016">Luke et al., 2016</a>; <a class="reference-link" href="#Richardson--2018">Richardson et al., 2018</a>). Additionally, many Mediterranean islands are &#8216;disturbance adapted&#8217;, with continued persistence of some single-island endemic plants, despite exposure to multiple threats (<a class="reference-link" href="#Vogiatzakis--2016">Vogiatzakis et al., 2016</a>). This continued persistence has been attributed, at least partially, to climate refugia, oceanic buffering and high habitat heterogeneity within topographically complex mountainous regions (<a class="reference-link" href="#Pouteau--2016">Pouteau and Birnbaum, 2016</a>; <a class="reference-link" href="#M&#233;dail--2017">M&#233;dail, 2017</a>, Chapter 15, Table 15.1). However, this climate resilience will not be sustained under climate change, especially when coupled with habitat degradation (<span class="condensed_italic" lang="">high confidence</span>) (<a class="reference-link" href="#Wiens--2016">Wiens, 2016</a>).</p>
                          <p class="Body_Box_blue_Box_body" lang="en-GB">Adaptation strategies depend on the ability to project future impacts from climate change, but this is hampered by lack of fine-scale climate data, especially for developing small island nations. There is a paucity of robust impacts-based modelling output for terrestrial biodiversity from these islands due to the wide, chronic unavailability of Regional Climate Model (RCM) data premised on the most recent suite of scenarios (RCPs and especially SSPs)<span class="condensed_italic" lang=""> (medium evidence</span>, <span class="condensed_italic" lang="">high agreement </span>) (Guti&#233;rrez et al., 2021, Ch.15.8; <a class="reference-link" href="#P&#246;rtner--2021">P&#246;rtner et al., 2021</a>; <a class="reference-link" href="#WMO--2021">WMO, 2021</a>). Additionally, realistic assessments of changing climate on such small ecosystems require further RCM downscaling and verification to sub-island resolutions of &lt;5 km. Furthermore, widely used statistically (bias-corrected) downscaled data at sub-5 km resolutions, such as WorldClim are often unsuitable due to limited spatial and temporal resolutions of observation station data from small islands (<a class="reference-link" href="#Maharaj--2013">Maharaj and New, 2013</a>; Guti&#233;rrez et al., 2021) and higher errors associated with statistical downscaling and locations with complex topography and coastlines (<a class="reference-link" href="#Fick--2017">Fick and Hijmans, 2017</a>; <a class="reference-link" href="#Lanzante--2018">Lanzante et al., 2018</a>). Widespread unavailability of such data constrains accurate simulations of climatic variation within the small-scale mountainous and coastal regions of islands, associated with climate refugia and high habitat heterogeneity (<span class="condensed_italic" lang="">high confidence</span>) (<a class="reference-link" href="#Balzan--2018">Balzan et al., 2018</a>). This is a key element contributing to the continued delay in development of robust adaptation strategies towards not only biodiversity conservation but other important cross-sectoral issues (<span class="condensed_italic" lang="">medium confidence</span>) (<a class="reference-link" href="#Robinson--2020b">Robinson, 2020b</a>).</p>
                          <p class="Body_Box_blue_Box_body" lang="en-GB">Due to islands&#8217; limited size and isolation, conventional conservation measures focused on expanding protected areas, dispersal corridors and buffer zones are of limited effectiveness on islands (<span class="condensed_italic" lang="">high confidence</span>) (<a class="reference-link" href="#Vogiatzakis--2016">Vogiatzakis et al., 2016</a>). Instead, multifaceted, locally driven holistic climate-smart strategies across mosaics of human-impacted, often heavily degraded and fragmented, landscapes are required. These should ideally be long-term, flexible and sustainable solutions that incorporate social and biocultural knowledge as well as economic co-benefits to island communities in order to &#8216;buy time&#8217; (<a class="reference-link" href="#Betzold--2015">Betzold, 2015</a>; <a class="reference-link" href="#Robinson--2020a">Robinson, 2020a</a>). Examples include ecosystem-based approaches such as ridge-to-reef management (<a class="reference-link" href="#Struebig--2015">Struebig et al., 2015</a>; <a class="reference-link" href="#Ferreira--2019">Ferreira et al., 2019</a>, Figure CCP1.1 5.4), which incorporates conservation partnerships among lands inside and outside protected areas to increase connectivity and reduce land use impacts, while building on the interconnections among terrestrial, freshwater, coastal and marine ecosystems. Such strategies require raising awareness of biodiversity values among local communities, and cross-sectoral planning and policy at both island, regional and trans-boundary scales. These lend to private&#8211;public partnerships, increasing the potential of solutions reaching beyond protected areas boundaries and affecting socio-political change (<span class="condensed_italic" lang="">high confidence</span>) (<a class="reference-link" href="#Scobie--2016">Scobie, 2016</a>).</p>
                          <div class="_idGenObjectLayout-2">
                            <div class="Box_Header-continued" id="_idContainer036">
                              <p class="Body_Box_blue_Box_continued-subhead" lang="en-GB">Box CCP1.1</p>
                            </div>
                          </div>
                          <p class="Body_Box_blue_Box_body" lang="en-GB">Limited terrain, natural, economic and data resources across small developing nation islands mean that unconstrained habitat destruction and degradation cannot be sustained, as this harms both people and the biodiversity upon which they depend. This limitation of resources compromises climate adaptation, which is often further complicated by varying governance and states of economic development (<a class="reference-link" href="#Petzold--2019">Petzold and Magnan, 2019</a>). With changing climate conditions, there is an increased urgency to re-think how progress can be measured, and to create opportunities building on synergies between disaster risk reduction, food security and social justice, so that islands can most benefit from their natural resources and biodiversity in a sustained manner (Box 15.2; <a class="section-link" data-title="Fisheries and Agriculture" href="/report/ar6/wg2/chapter/chapter-15#15.3.4.4">Section 15.3.4.4</a>  ).</p>
                        </div>
                      </div>

                    <div class="h1-container" id="frequently-asked-questions">
                      <h1 class="Body_Box_FAQ_FAQ-Box_head" lang="en-US">Frequently Asked Questions <span class="share-block"><img class="share-icon" src="../../share.png"/></span><button class="btn-ipcc btn btn-primary chapter-expand">Expand section</button></h1>
                      <div class="h1-siblings" id="h1-6-siblings"/>
                      <div class="h2-container" id="FAQ">
                        <h2 class="Body_Box_FAQ_FAQ-Box_subhead" lang="en-GB">FAQ CCP1.1  | Why are biodiversity hotspots important?<span class="arrow-up"/><span class="arrow-down"/><span class="share-block"><img class="share-icon" src="../../share.png"/></span></h2>
                        <div class="h2-siblings" id="h2-6-siblings">
                          <p class="Body_Box_FAQ_FAQ-Box_body" lang="en-US">
                            <span class="condensed_italic" lang="">Biodiversity hotspots are regions that are exceptionally rich in species, ecologically unique and which may contain geographically restricted species. They are thus priority targets for nature conservation. </span>
                          </p>
                          <p class="Body_Box_FAQ_FAQ-Box_body" lang="en-US">Recognising that the Convention on Biological Diversity definition of biodiversity includes the variation within and between species and of ecosystems, different schemes have been applied to define hotspots, leading to hundreds of different areas being proposed as hotspots. However, all identify a set of priority areas that cover a small portion of the Earth, but house an exceptionally high proportion of its biodiversity. Because biodiversity underpins all life on Earth, these hotspots have significant global value as they contain species and habitats that are found nowhere else. Their loss would mean loss of species and habitats that provide wild and farmed food, medicine and other materials, and services such as climate regulation, pollination and water purification, all of which maintain the health of the ecosystems we depend upon.</p>
                          <p class="Body_Box_FAQ_FAQ-Box_body" lang="en-US">Healthy ecosystems, with flourishing biodiversity in natural conditions, are more resilient to disturbances, whether natural or human in origin. Environmentally sustainable development inside and outside hotspots could help reverse human impacts on biodiversity. The hotspots also capture and store carbon, thereby helping to mitigate climate change. Prioritisation of protecting biodiversity in hotspots thus benefits nature conservation and helps mitigate climate change. A global network of protected areas and restoration initiatives inside biodiversity hotspots can also help increase resilience to the effects of climate change on biodiversity.</p>
                        </div>
                        <h2 class="Body_Box_FAQ_FAQ-Box_subhead" lang="en-GB">FAQ CCP1.2  | How can society ensure conservation of biodiversity in climate policies?<span class="arrow-up"/><span class="arrow-down"/><span class="share-block"><img class="share-icon" src="../../share.png"/></span></h2>
                        <div class="h2-siblings" id="h2-7-siblings">
                          <p class="Body_Box_FAQ_FAQ-Box_body" lang="en-US">
                            <span class="condensed_italic" lang="">To reduce the effects of climate change on biodiversity, it is first essential to address direct human impacts that are already leading to a loss of biodiversity. This can be achieved by protecting biodiversity in conservation areas, restoring biodiversity everywhere possible and promoting sustainable development. Climate policies should thus integrate with policies to protect and restore nature. </span>
                          </p>
                          <p class="Body_Box_FAQ_FAQ-Box_body" lang="en-US">Avoiding further loss of biodiversity is implicit in sustainable development. This needs to happen on land, rivers, lakes and in the oceans. It is especially important in &#8216;biodiversity hotspots&#8217; (FAQ 1.1) and protected areas to minimise species losses. Hence calls by the International Union for the Conservation of Nature, Convention on Biological Diversity, United Nations Sustainable Development Goals (SDGs) to increase the size and connectivity of fully protected areas (which aim to have biodiversity in a near natural condition) and include in them the biodiversity hotspots, need to be immediately implemented.</p>
                          <p class="Body_Box_FAQ_FAQ-Box_body" lang="en-US">Five of the SDGs are life on land, life below water, good health and well-being, food security and climate action. They underpin and interact with many other SDGs. Healthy ecosystems play a role in mitigating greenhouse gas emissions, not only protecting areas to prevent the release of carbon through land conversion activities but also restoring otherwise degraded land. The United Nations has declared 2021&#8211;2030 as the Decade on Ecosystem Restoration and the Decade of Ocean Science for Sustainable Development. Restoration means actively or passively allowing habitat to return to its natural state (e.g., grassland, forest, peatland, oyster beds), including replanting native vegetation. This can benefit the recovery of biodiversity, help remove carbon dioxide from the atmosphere and improve the delivery of nature&#8217;s contributions to people, such as climate regulation, water purification, pollination, and pest and disease control. Thus, protecting biodiversity helps to meet two SDGs directly, and three indirectly.</p>
                          <p class="Body_Box_FAQ_FAQ-Box_body" lang="en-US">On land, the loss of natural forests and grasslands not only means a loss of carbon and many of their associated species, but exposes soils to erosion, affecting food production, and can affect the climate by altering the water cycle. Sustainable development, even within hotspots, involves active restoration of natural biodiversity, reducing poaching and trafficking of wildlife (UN SDG 15), and needs to include agriculture. This includes working to ensure biodiverse soils and supporting healthy pollinator populations. Biodiversity includes not only wild species but also genetic diversity, including crops and wild crop relatives. These wild relatives may contain important genes that could help farmed crops survive better in a changed climate. At least some of these wild relatives come from areas designated as hotspots. In the ocean, sustainable development means reducing pollution, carefully managed aquaculture development, increased protected areas (from the present 2.5% of the ocean area), enforcement of fisheries regulations, and removal of fishery subsidies that perpetuate overfishing within Exclusive Economic Zones and on the High Seas (UN SDG 14). Generally, the use of freshwaters, rivers, lakes and groundwaters, has not been sustainable and there is a need to restore biodiversity and water quality by eliminating pollution and to better manage abstraction, river flows, fishing and invasive species. Thus, as is the case with land and oceans, climate policies must prioritise the restoration of freshwater biodiversity, and reduction of the current negative impacts of human activities.</p>
                        </div>
