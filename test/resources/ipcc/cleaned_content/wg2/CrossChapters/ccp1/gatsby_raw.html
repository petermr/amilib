                          <div class="h3-container" id="CCP1.2.2.1">
                            <h3 class="Headings_H3" lang="de-DE">CCP1.2.2.1  Observed Impacts <span class="arrow-up"/><span class="arrow-down"/><span class="share-block"><img class="share-icon" src="../../share.png"/></span></h3>
                            <div class="h3-siblings" id="h3-4-siblings">
                              <p class="Body_Body-justify" lang="en-GB">There is <span class="condensed_italic" lang="">high confidence</span> that climate change has already had impacts in North American hotspots. Phenological and range shifts have been reported for bird and mammal species within the boreal forest hotspot (<a class="reference-link" href="#Davidson--2020">Davidson et al., 2020</a>), and earlier egg laying in birds in tundra hotspots (H3, 5) owing to changes in snowmelt (<a class="reference-link" href="#Grabowski--2013">Grabowski et al., 2013</a>). Woody vegetation is already shifting north into the tundra (<a class="reference-link" href="#Larsen--2014">Larsen et al., 2014</a>).</p>
                              <p class="Body_Body-justify" lang="en-GB">In Central and South America, observed impacts within Mesoamerica (H15, 16) and the Tropical Andes hotspots (H26, 27, 28, 32, 33) comprise upward altitudinal range shifts of birds, frogs, beetles and butterflies (<a class="reference-link" href="#Narins--2014">Narins and Meenderink, 2014</a>; <a class="reference-link" href="#Molina-Mart&#237;nez--2016">Molina-Mart&#237;nez et al., 2016</a>; <a class="reference-link" href="#Moret--2016">Moret et al., 2016</a>; <a class="reference-link" href="#Freeman--2018">Freeman et al., 2018</a>) (<span class="condensed_italic" lang="">medium confidence</span>). A shift of the Guianan-Amazon mangroves (H37) to higher grounds inland was attributed to the effects of observed sea level rise (<span class="condensed_italic" lang="">low confidence</span>) (<a class="reference-link" href="#Cohen--2018">Cohen et al., 2018</a>).</p>
                              <p class="Body_Body-justify" lang="en-GB">In Europe, the Mediterranean hotspot (H216) has seen increases in wildfires and droughts attributed to anthropogenic climate change (<a class="reference-link" href="#Gudmundsson--2017">Gudmundsson et al., 2017</a>; <a class="reference-link" href="#Barbero--2020">Barbero et al., 2020</a>). Range shifts in birds have been observed at higher elevations (<span class="condensed_italic" lang="">medium confidence</span>) (<a class="reference-link" href="#Teller&#237;a--2020">Teller&#237;a, 2020</a>).</p>
                              <p class="Body_Body-justify" lang="en-GB">In Africa, multiple lines of evidence suggest woody plants are increasing in area, density and cover in previously lightly wooded savanna and grassland hotspots (H65, 82) (<a class="reference-link" href="#Poulsen--2015">Poulsen and Hoffman, 2015</a>; <a class="reference-link" href="#Stevens--2017">Stevens et al., 2017</a>). Significant vulture and cheetah range reductions in these hotspots are at least partially attributable to bush encroachment (<a class="reference-link" href="#Nghikembua--2016">Nghikembua et al., 2016</a>; <a class="reference-link" href="#Wolter--2016">Wolter et al., 2016</a>; <a class="reference-link" href="#Santangeli--2018">Santangeli et al., 2018</a>). Thus, climate-driven bush encroachment has adversely affected unique mammal and bird diversity (<span class="condensed_italic" lang="">robust evidence, medium agreement, medium confidence</span>). Warming and drying trends have historically been shown to reduce the range of the Ethiopian wolf (<span class="condensed_italic" lang="">Canis simensis</span>), and they interact with land use pressures in the Ethiopian hotspot (H68) (<a class="reference-link" href="#Sintayehu--2018">Sintayehu, 2018</a>) and plant species richness in the Cape Fynbos (H65) of southern Africa to reduce post-wildfire recruitment (<span class="condensed_italic" lang="">low confidence</span>) (<a class="reference-link" href="#Slingsby--2017">Slingsby et al., 2017</a>).</p>
                              <p class="Body_Body-justify" lang="en-GB">Observed impacts in Asia were mostly restricted to the Himalaya (H95, 98, 99), Sundaland (H109, 110, 111, 112, 117, 118) and Indo-Burma (H105, 106, 107, 114, 115) hotspots, showing negative impacts through increased invasion by exotic plants, decreased suitable area for endemic species and significant changes in phenology (<span class="condensed_italic" lang="">medium confidence</span>) (<a class="reference-link" href="#Telwala--2013">Telwala et al., 2013</a>; <a class="reference-link" href="#Braby--2014">Braby et al., 2014</a>; <a class="reference-link" href="#Padalia--2015">Padalia et al., 2015</a>; <a class="reference-link" href="#Lamsal--2017">Lamsal et al., 2017</a>). In the Central Asian mountain landscape (H87), studies have shown increased aridity induced by climate change impacts on several shrub species (<a class="reference-link" href="#Seim--2016">Seim et al., 2016</a>). Some positive effects were observed for native species in terms of an increase of suitable habitat (<span class="condensed_italic" lang="">limited evidence, low agreement </span>) (<a class="reference-link" href="#Priti--2016">Priti et al., 2016</a>; <a class="reference-link" href="#Tang--2017">Tang et al., 2017</a>; <a class="reference-link" href="#Rathore--2019">Rathore et al., 2019</a>).</p>
                              <p class="Body_Body-justify" lang="en-GB">In Australia, climate change has been implicated in: drought-induced canopy dieback across a range of forest and woodland types due to decades of declining rainfall in the southwestern hotspot (H133); fires in the palaeo-endemic pencil pine forests (Tasmania H142); declines in vertebrates in the Australian Wet Tropics World Heritage Area, which overlaps with the eastern part of the northern Australia hotspot (H131), related to warming and increased length of the dry season; and declines in grass and increases in shrubs in the Bogong High Plains (<span class="condensed_italic" lang="">high confidence</span>) (<a class="reference-link" href="#Hoffmann--2019">Hoffmann et al., 2019</a>). The Australian Alps have seen increased species diversity following retreat of the snow line (<a class="reference-link" href="#Slatyer--2010">Slatyer, 2010</a>), replacement of long-lived trees by short-lived shrubs following multiple wildfires (<a class="reference-link" href="#Zylstra--2018">Zylstra, 2018</a>), and changing ecological interactions due to climate-related snow loss, drought and fires (<span class="condensed_italic" lang="">high confidence</span>) (<a class="reference-link" href="#Hoffmann--2019">Hoffmann et al., 2019</a>). While warming is allowing mangroves to expand their range in coastal hotspots of Asia and Australia (<a class="reference-link" href="#Ward--2016">Ward et al., 2016</a>; <a class="reference-link" href="#Hughes--2019a">Hughes et al., 2019a</a>), drought and associated salinity stress has killed mangroves in northern Australia hotspots (<a class="reference-link" href="#Babcock--2019">Babcock et al., 2019</a>).</p>
                              <p class="Body_Body-justify" lang="en-GB">Approximately 76% of biodiversity hotspots within this assessment either contain, or are comprised of islands &gt;100 km <span class="superscript CharOverride-1" lang="">2</span> (Table CCP1.1). However, just 0.08% of these hotspots were represented in post-AR5 literature examining climate change impacts on terrestrial biodiversity. Most observed impacts were assessed with <span class="condensed_italic" lang="">low evidence</span>, but <span class="condensed_italic" lang="">high agreement </span>, and focused on plants and insects. Impacts described included abundance changes and extirpations (<a class="reference-link" href="#Jenouvrier--2014">Jenouvrier et al., 2014</a>), altitudinal range shifts (<a class="reference-link" href="#Koide--2017">Koide et al., 2017</a>), increased invasive alien species&#8217; abundance and extent in Madagascar (H76, 77), Balearic (H51) and Pacific islands (<a class="reference-link" href="#Ghulam--2014">Ghulam, 2014</a>; <a class="reference-link" href="#Silva-Rocha--2015">Silva-Rocha et al., 2015</a>; <a class="reference-link" href="#Goulding--2016">Goulding et al., 2016</a>; <a class="reference-link" href="#Dawson--2017">Dawson et al., 2017</a>), increased temperature affecting physiology, body size and behaviour of frogs in the Caribbean (H20) (<a class="reference-link" href="#Narins--2014">Narins and Meenderink, 2014</a>) and phenological alterations (<a class="reference-link" href="#Font&#250;rbel--2018">Font&#250;rbel et al., 2018</a>). One positive observation was the high resilience to recovery of intact forest ecosystems to tropical cyclones within Caribbean (H20) and Pacific islands (<span class="condensed_italic" lang="">medium confidence</span>) (<a class="reference-link" href="#Keppel--2014">Keppel et al., 2014</a>; <a class="reference-link" href="#Marler--2014">Marler, 2014</a>; <a class="reference-link" href="#Shiels--2014">Shiels et al., 2014</a>).</p>
                            </div>
                          </div>
                          <div class="h3-container" id="CCP1.2.2.2">
                            <h3 class="Headings_H3" lang="de-DE">CCP1.2.2.2  Projected Impacts <span class="arrow-up"/><span class="arrow-down"/><span class="share-block"><img class="share-icon" src="../../share.png"/></span></h3>
                            <div class="h3-siblings" id="h3-5-siblings">
                              <p class="Body_Body-justify" lang="en-GB">Most terrestrial species in biodiversity hotspots in North America have been projected to be negatively impacted by climate change (<span class="condensed_italic" lang="">medium evidence, medium agreement </span>, <span class="condensed_italic" lang="">medium confidence</span>). About ~80% of projections for assessed species showed a negative impact of climate change, with ~25% at very high risk of extinction (Figure CCP1.7; <a class="reference-link" href="#Manes--2021">Manes et al., 2021</a>). Alterations to vegetation that would have ecosystem-wide impacts, such as a shift from oak-dominated forests to predominantly hickory and maple species in the Appalachian Forests (H17) (<a class="reference-link" href="#Ma--2016">Ma et al., 2016</a>) or the continued shrinking of tundra ecosystems, have also been projected. Range shifts have been projected for a variety of plants (<a class="reference-link" href="#Beltr&#225;n--2014">Beltr&#225;n et al., 2014</a>; <a class="reference-link" href="#Riordan--2014">Riordan and Rundel, 2014</a>) and vertebrate taxa (<a class="reference-link" href="#Warren--2014">Warren et al., 2014</a>; <a class="reference-link" href="#Stralberg--2015">Stralberg et al., 2015</a>; <a class="reference-link" href="#McKelvy--2017">McKelvy and Burbrink, 2017</a>). Sizeable range loss, which particularly affects endemic species, is projected with higher levels of climate change. Adaptation in the agricultural sector poses an additional risk to remaining wildlife habitat (e.g., wine in California: <a class="reference-link" href="#Roehrdanz--2016">Roehrdanz and Hannah, 2016</a>).</p>
                              <div class="Figure" id="_idContainer020">
                                <p class="Body_Figures_Figure" lang="de-DE">
                                  <img alt="" class="_idGenObjectAttribute-6" id="figure-ccp1-007" loading="lazy" src="https://ipcc.ch/report/ar6/wg2/downloads/figures/IPCC_AR6_WGII_Figure_CCP1_007.png"/>
                                </p>
                                <p class="Body_Figures_Figure_title" lang="en-US"><span class="figure_number" lang="">Figure CCP1.7 | </span><span class="bold_condensed-dark-blue" lang="">The projected impacts of climate change on species in 232 studies</span><span class="bold_condensed-dark-blue" lang=""><span class="bold_condensed" lang="en-GB"> (a) </span> </span><span class="bold_condensed-dark-blue" lang="">terrestrial and</span><span class="bold_condensed-dark-blue" lang=""><span class="bold_condensed" lang="en-GB"> (b) </span> </span><span class="bold_condensed-dark-blue" lang="">marine hotspots (adapted from Manes e</span><span class="bold_condensed-dark-blue" lang="">t al. </span><span class="bold_condensed-dark-blue" lang="">, 2021), illustrating the number and percentage of species showing positive (blue) and negative (orange) responses to climate change, and threatened with extinction (red). </span>Note Oceania includes Australia, New Zealand, Wallacea, New Guinea, New Caledonia, Polynesia and Micronesia and overlaps the global Small Islands category, which excludes Australia. The Small Islands category represents oceanic and continent-associated small islands, and thus overlaps with Oceania and continental data.</p>
                                <div class="ch-figure-button-cont"><a href="/report/ar6/wg2/figures/chapter-ccp1/figure-ccp1-007" target="_blank"><button class="btn-ipcc btn btn-primary ch-figure-button">Open figure</button></a> </div>
                              </div>
                              <p class="Body_Body-justify" lang="en-GB">In Central and South America, risks have been assessed in at least 24 terrestrial hotspots, especially within the Atlantic Forest, Cerrado, Mesoamerica and the Caribbean, the most studied hotspots in the world in terms of climate change impacts (H47, 44, 15, 16, 20, respectively) (<a class="reference-link" href="#Manes--2021">Manes et al., 2021</a>). About 85% of projections for assessed species showed a negative impact of climate change (<span class="condensed_italic" lang="">high confidence</span>), with ~26% projecting species extinctions (Figure CCP1.7; <a class="reference-link" href="#Manes--2021">Manes et al., 2021</a>). Projected impacts include contraction or loss of species&#8217; geographic range, loss of diversity and high species turnover (<span class="condensed_italic" lang="">high confidence</span>). Most studies had focused on vertebrates and plants in the Atlantic Forest (H47) and Cerrado (H44) (<a class="reference-link" href="#Loyola--2014">Loyola et al., 2014</a>; <a class="reference-link" href="#de Oliveira--2015">de Oliveira et al., 2015</a>; <a class="reference-link" href="#Vale--2018">Vale et al., 2018</a>; <a class="reference-link" href="#Vasconcelos--2018">Vasconcelos et al., 2018</a>; <a class="reference-link" href="#Hidasi-Neto--2019">Hidasi-Neto et al., 2019</a>; <a class="reference-link" href="#Lima--2019">Lima et al., 2019</a>; <a class="reference-link" href="#Louren&#231;o-de-Moraes--2019">Louren&#231;o-de-Moraes et al., 2019</a>; <a class="reference-link" href="#Vasconcelos--2019">Vasconcelos and Prado, 2019</a>; <a class="reference-link" href="#Velazco--2019">Velazco et al., 2019</a>). Several insect species are projected to lose suitable climatic conditions, including moths in Cerrado (H44) (<a class="reference-link" href="#Khormi--2014">Khormi and Kumar, 2014</a>). There were projected negative impacts on vegetation such as rupestrian grasslands in Cerrado (H44) (<a class="reference-link" href="#Fernandes--2018">Fernandes et al., 2018</a>) and tropical and temperate forests in Mesoamerica (H15, H16) (<a class="reference-link" href="#Mendoza-Ponce--2018">Mendoza-Ponce et al., 2018</a>; <a class="reference-link" href="#Mendoza-Ponce--2019">Mendoza-Ponce et al., 2019</a>). Endemic species face consistent risks of decrease in suitable habitat in the Atlantic Forest (H47) (<a class="reference-link" href="#Vale--2018">Vale et al., 2018</a>), Cerrado (H44) (<a class="reference-link" href="#Vasconcelos--2014">Vasconcelos, 2014</a>), Tumbes-Choc&#243;-Magdalena (H28, H23) (<a class="reference-link" href="#Hermes--2018">Hermes et al., 2018</a>), and Mesoamerica (H15, H16) (<a class="reference-link" href="#Garcia--2014">Garcia et al., 2014</a>; <a class="reference-link" href="#Ram&#237;rez-Amezcua--2016">Ram&#237;rez-Amezcua et al., 2016</a>). Climate change may also benefit invasive plant species in terms of range expansion (<a class="reference-link" href="#Wang--2017">Wang et al., 2017</a>) and physiology (<a class="reference-link" href="#de Faria--2018">de Faria et al., 2018</a>) in the region.</p>
                              <p class="Body_Body-justify" lang="en-GB">In European biodiversity hotspots, about 75% of projections for assessed species showed a negative impact of climate change, with ~30% at very high risk of extinction (<span class="condensed_italic" lang="">medium confidence</span>) (Figure CCP1.7; <a class="reference-link" href="#Manes--2021">Manes et al., 2021</a>). These threats are projected to be worse under higher levels of warming. Increased wildfire size and frequency is projected to have a strong effect on the Mediterranean basin (H216) ecosystems (<span class="condensed_italic" lang="">medium confidence</span>) (<a class="reference-link" href="#Lozano--2017">Lozano et al., 2017</a>). Range reductions have been projected for endemic plants (<a class="reference-link" href="#P&#233;rez-Garc&#237;a--2013">P&#233;rez-Garc&#237;a et al., 2013</a>; <a class="reference-link" href="#Casazza--2014">Casazza et al., 2014</a>), reptiles (<a class="reference-link" href="#Ahmadi--2019">Ahmadi et al., 2019</a>), birds (<a class="reference-link" href="#Abolafya--2013">Abolafya et al., 2013</a>) and insects (<a class="reference-link" href="#S&#225;nchez-Guill&#233;n--2013">S&#225;nchez-Guill&#233;n et al., 2013</a>) (<span class="condensed_italic" lang="">medium confidence</span>).</p>
                              <p class="Body_Body-justify" lang="en-GB">In African biodiversity hotspots, about 80% of projections for assessed species showed a negative impact of climate change, with ~10% at very high risk of extinction, especially of endemic species including birds, plants, bees across several taxa and hotspots if warming exceeds 2&#176;C (<span class="condensed_italic" lang="">high confidence</span>) (Figure CCP1.7; <a class="reference-link" href="#Huntley--2012">Huntley and Barnard, 2012</a>; <a class="reference-link" href="#Kuhlmann--2012">Kuhlmann et al., 2012</a>; <a class="reference-link" href="#Baker--2015">Baker et al., 2015</a>; <a class="reference-link" href="#Lee--2016">Lee and Barnard, 2016</a>; <a class="reference-link" href="#Young--2016">Young et al., 2016</a>; <a class="reference-link" href="#Hannah--2020">Hannah et al., 2020</a>; <a class="reference-link" href="#Manes--2021">Manes et al., 2021</a>).</p>
                              <p class="Body_Body-justify" lang="en-GB">In Asia, there is a bias in studies towards Indo-Burma (H105, 106, 107, 114, 115), followed by Himalaya (H95, 98, 99) and Southeast Asian montane tropical and temperate forests. About ~70% of projections for assessed species showed a negative impact of climate change, with ~30% at very high risk of extinction (<span class="condensed_italic" lang="">medium confidence</span>) (Figure CCP1.7; <a class="reference-link" href="#Manes--2021">Manes et al., 2021</a>). Impacts include species&#8217; range changes, habitat loss for endemic plants, expansion of invasive species, decreased connectivity and overall species richness decline (<span class="condensed_italic" lang="">high confidence</span>) (<a class="reference-link" href="#DasGupta--2013">DasGupta and Shaw, 2013</a>; <a class="reference-link" href="#Telwala--2013">Telwala et al., 2013</a>; <a class="reference-link" href="#Sridhar--2014">Sridhar et al., 2014</a>; <a class="reference-link" href="#Zomer--2014">Zomer et al., 2014</a>; <a class="reference-link" href="#Ali--2015">Ali and Begum, 2015</a>; <a class="reference-link" href="#Aryal--2016">Aryal et al., 2016</a>). A projected decrease in habitat suitability for large species like the Asiatic black bear (<span class="condensed_italic" lang="">Ursus thibetanus</span>) is of concern as alternative habitats are outside protected areas, and may lead to human&#8211;wildlife conflicts (<a class="reference-link" href="#Farashi--2018">Farashi and Erfani, 2018</a>). The few positive impacts of climate change were projected as increases in suitable habitat and distribution range for a few endangered plants and mammals (<span class="condensed_italic" lang="">medium confidence</span>) (<a class="reference-link" href="#Banag--2015">Banag et al., 2015</a>; <a class="reference-link" href="#Shrestha--2018">Shrestha et al., 2018</a>). Animals benefiting from increased fruit and seed production in Southeast Asian forests during warm El Ni&#241;o cycles were also projected to increase with climate warming (<a class="reference-link" href="#Corlett--2011">Corlett, 2011</a>).</p>
                              <p class="Body_Body-justify" lang="en-GB">All projections for assessed species in Australia and New Zealand terrestrial biodiversity hotspots showed a negative impact of climate change, with half at very high risk of extinction (<span class="condensed_italic" lang="">low confidence</span>) (<a class="reference-link" href="#Manes--2021">Manes et al., 2021</a>). Observed impacts in the Australian Alps were projected to continue under future climate change (<a class="reference-link" href="#Zylstra--2018">Zylstra, 2018</a>). The northern Australia savanna (H131) may experience increased rainfall and carbon dioxide due to climate change (<a class="reference-link" href="#Scheiter--2015">Scheiter et al., 2015</a>), and the range of exotic grasses was projected to be reduced under climate warming (<a class="reference-link" href="#Gallagher--2009">Gallagher et al., 2009</a>). In Australian tropical wet forests, ground-living vertebrates may be more sensitive than arboreal species to unstable climates (<a class="reference-link" href="#Scheffers--2017">Scheffers et al., 2017</a>). <a class="reference-link" href="#Bellard--2016">Bellard et al. (2016)</a>  projected losses of land due to sea level rise in the East Australian Forest hotspot (H140), and <a class="reference-link" href="#Gonz&#225;lez-Orozco--2016">Gonz&#225;lez-Orozco et al. (2016)</a>  projected the contraction of eucalyptus species towards the coast of the Southwest Australia hotspot (H134), exposing them to sea level rise. In New Zealand forests (H139), native plants may be replaced by more fire-resistant introduced species following climate change-related fires (<a class="reference-link" href="#Perry--2014">Perry et al., 2014</a>). While forest growth is projected to potentially increase due to carbon dioxide fertilization, this may be compromised by drought (<span class="condensed_italic" lang="">low confidence</span>) (<a class="reference-link" href="#Ausseil--2013">Ausseil et al., 2013</a>). Seed production in native New Zealand beech forests is projected to increase due to climate warming, fuelling the abundance of invasive rats and stoats, which then predate native species and lead to loss of endemic fauna and flora (<span class="condensed_italic" lang="">medium confidence</span>) (<a class="reference-link" href="#Tompkins--2013">Tompkins et al., 2013</a>, Ch. 11).</p>
                              <p class="Body_Body-justify" lang="en-GB">About 80% of projections for assessed terrestrial species within insular biodiversity hotspots showed a negative impact of climate change, with ~50% at very high risk of extinction, including 100% of endemic species (<span class="condensed_italic" lang="">medium confidence</span>) (Figure CCP1.7; <a class="reference-link" href="#Manes--2021">Manes et al., 2021</a>). In addition to habitat loss and species range reductions, changes in precipitation are projected to be a major driver impacting tropical and subtropical island species (<span class="condensed_italic" lang="">medium confidence</span>) (<a class="reference-link" href="#Maharaj--2013">Maharaj and New, 2013</a>; <a class="reference-link" href="#Harter--2015">Harter et al., 2015</a>; <a class="reference-link" href="#Struebig--2015">Struebig et al., 2015</a>; <a class="reference-link" href="#Vogiatzakis--2016">Vogiatzakis et al., 2016</a>; <a class="reference-link" href="#Maharaj--2018">Maharaj et al., 2018</a>). Compared to continents, island species are projected to undergo greater impacts from changing climate, especially birds and amphibians (<span class="condensed_italic" lang="">high confidence</span>) (<a class="reference-link" href="#Fortini--2015">Fortini et al., 2015</a>; <a class="reference-link" href="#Holmes--2015">Holmes et al., 2015</a>; <a class="reference-link" href="#Manes--2021">Manes et al., 2021</a>, Box CCP1.1). Of all biodiversity hotspots, island species face the highest proportion of extirpation risk at high elevations due to decreasing habitat area (e.g., <a class="reference-link" href="#Brown--2015">Brown et al., 2015</a>) and at low elevations from sea level rise, habitat loss and introduced species (<span class="condensed_italic" lang="">medium confidence</span>) (<a class="reference-link" href="#Bellard--2014a">Bellard et al., 2014a</a>).</p>
                            </div>
                          </div>
                        </div>
                      </div>
                      <div class="h2-container" id="CCP1.2.3">
                        <h2 class="Headings_H2-numbered" lang="de-DE">CCP1.2.3  Freshwater <span class="arrow-up"/><span class="arrow-down"/><span class="share-block"><img class="share-icon" src="../../share.png"/></span></h2>
                        <div class="h2-siblings" id="h2-3-siblings">
                          <p class="Body_Body-justify" lang="en-GB">The 53 hotspots in freshwater ecosystems assessed here cover about 32,830,000 km <span class="superscript _idGenCharOverride-1" lang="">2</span> (17% of global freshwater habitats and 22% of the global land area), with a 68% overlap with terrestrial ecosystems (Table CCP1.1; Figure CCP1.2). They include lakes, rivers and streams (Figure CCP1.1 2).</p>
                          <div class="Figure" id="_idContainer030">
                            <p class="Body_Figures_Figure" lang="de-DE">
                              <img alt="" class="_idGenObjectAttribute-11" id="figure-ccp1-012" loading="lazy" src="https://ipcc.ch/report/ar6/wg2/downloads/figures/IPCC_AR6_WGII_Figure_CCP1_012.png"/>
                            </p>
                            <p class="Body_Figures_Figure_title" lang="en-US"><span class="figure_number" lang="">Figure CCP1.1 2 | </span><span class="bold_condensed-dark-blue" lang="">Photographs of freshwater biodiversity hotspots. </span>Photos by Will Darwall <span class="bold_condensed-dark-blue" lang=""> (b, c) </span> , Pablo Tedesco <span class="bold_condensed-dark-blue" lang=""> (a, d) </span> , and Mark Costello <span class="bold_condensed-dark-blue" lang=""> (e, f)</span>.</p>
                            <div class="ch-figure-button-cont"><a href="/report/ar6/wg2/figures/chapter-ccp1/figure-ccp1-012" target="_blank"><button class="btn-ipcc btn btn-primary ch-figure-button">Open figure</button></a> </div>
                          </div>
                          <div class="h3-container" id="CCP1.2.3.1">
                            <h3 class="Headings_H3" lang="de-DE">CCP1.2.3.1  Observed Impacts <span class="arrow-up"/><span class="arrow-down"/><span class="share-block"><img class="share-icon" src="../../share.png"/></span></h3>
                            <div class="h3-siblings" id="h3-6-siblings">
                              <p class="Body_Body-justify" lang="en-GB">An analysis of trends in 190 river basins in Australia found that stream-flows have been declining, including in the Central Australian (H194) and Kimberley (H191) hotspots, due to greater terrestrial plant uptake of water in response to climate-related increases in carbon dioxide (<span class="condensed_italic" lang="">low confidence</span>) (<a class="reference-link" href="#Ukkola--2016">Ukkola et al., 2016</a>). We did not find any other publications providing evidence of impacts of climate change on freshwater biodiversity within the hotspots. Whether this is because freshwater temperatures tend to be cooler due to inputs from groundwater and/or mountain streams (<a class="reference-link" href="#Knouft--2017">Knouft and Ficklin, 2017</a>), resilience of freshwater species or lack of research is unclear.</p>
                            </div>
                          </div>
                          <div class="h3-container" id="CCP1.2.3.2">
                            <h3 class="Headings_H3" lang="de-DE">CCP1.2.3.2  Projected Impacts <span class="arrow-up"/><span class="arrow-down"/><span class="share-block"><img class="share-icon" src="../../share.png"/></span></h3>
                            <div class="h3-siblings" id="h3-7-siblings">
                              <p class="Body_Body-justify" lang="en-GB">Cold-water species are projected to lose habitat in Canada and this may apply in the Alaskan river (H143) and Russian Far East Lake Inle (H181) hotspots (<span class="condensed_italic" lang="">medium confidence</span>) (<a class="reference-link" href="#Comte--2013">Comte et al., 2013</a>). Water abstraction is significant in the Colorado river hotspot (H145) and reduces its resilience to climate change effects on flow rates (<a class="reference-link" href="#Grafton--2013">Grafton et al., 2013</a>).</p>
                              <p class="Body_Body-justify" lang="en-GB">In South America, in the Brazilian Amazon hotspot (H153, 154, 157), half the assessed fish species were considered sensitive to increased temperatures and reduced oxygen due to climate change (<span class="condensed_italic" lang="">low confidence</span>) (<a class="reference-link" href="#Frederico--2016">Frederico et al., 2016</a>). The use of protected areas was recommended to reduce the impacts of deforestation and water pollution (<a class="reference-link" href="#J&#233;z&#233;quel--2020">J&#233;z&#233;quel et al., 2020</a>). El Ni&#241;o-related floods have led to declines in numbers of caiman, a top predator in the Brazilian Paran&#225; river hotspot (H158), which indicates that increased floods due to climate change may reduce its population and alter food webs (<a class="reference-link" href="#Herrera--2015">Herrera et al., 2015</a>).</p>
                              <p class="Body_Body-justify" lang="en-GB">In Europe, including the Mediterranean freshwater hotspots, climate change is projected to result in reduced river flow, low oxygen in summer, salinity incursions, further eutrophication and spread of invasive species, compromising the survival of native biodiversity (<span class="condensed_italic" lang="">medium confidence</span>) (<a class="reference-link" href="#Moss--2009">Moss et al., 2009</a>). The longer growth season in the boreal and Arctic latitudes is projected to aid the invasion of exotic species, and increase lake stratification resulting in lower oxygen below the hypolimnion (<span class="condensed_italic" lang="">medium confidence</span>). In addition, strict cold-water species are projected to lose suitable habitat (<a class="reference-link" href="#Moss--2009">Moss et al., 2009</a>). An analysis of 1648 species of freshwater fish, amphibians, turtles, plants, molluscs, crayfish and dragonflies, projected ~6% of common and ~77% of rare species to lose 90% of their geographic range (<span class="condensed_italic" lang="">low confidence</span>) (<a class="reference-link" href="#Markovic--2014">Markovic et al., 2014</a>). Even if some species can spread to other areas and follow the climate, <a class="reference-link" href="#Markovic--2014">Markovic et al. (2014)</a>  projected a loss of species, especially molluscs, from the southeastern Mediterranean, including the Balkan biodiversity hotspot (H162) (<span class="condensed_italic" lang="">medium confidence</span>). Similarly, within Europe, Mediterranean fish (<a class="reference-link" href="#Jari&#263;--2019">Jari&#263; et al., 2019</a>) and insects (<a class="reference-link" href="#Conti--2014">Conti et al., 2014</a>) are the most threatened by climate warming, droughts and floods. The fish species of the Danube river delta hotspot (H161) are less susceptible to climate change than in the Balkans (H162) and Anatolian (H163) hotspots. The rest of Europe, from the Iberian Peninsula to Scandinavia is not classified as a biodiversity hotspot. Thus, the areas where freshwater biodiversity is most threatened by climate change in Europe are in two of the three hotspots (<span class="condensed_italic" lang="">high confidence</span>).</p>
                              <p class="Body_Body-justify" lang="en-GB">
                                <span lang="en-US">The African Rift Valley Lakes (H171), including Lakes Tanganyika and Turkana, are suffering from climate change influenced drought, potentially impacting freshwater biodiversity (</span>
                                <span class="condensed_italic" lang="en-US">medium confidence</span>
                                <span lang="en-US">) (<a class="reference-link" href="#Dudgeon--2006">Dudgeon et al., 2006</a>). Africa and Madagascar (H172) are projected to see a climate-driven 10% reduction in freshwater flow that is projected to threaten the survival of ~9% of freshwater-dependent fish and birds (</span>
                                <span class="condensed_italic" lang="en-US">low confidence</span>
                                <span lang="en-US">) (<a class="reference-link" href="#Thieme--2010">Thieme et al., 2010</a>). Climate change is projected to increase the extinction vulnerability of most freshwater fish in the western South Africa Cape hotspot (H170) (</span>
                                <span class="condensed_italic" lang="en-US">low confidence</span>
                                <span lang="en-US">) (<a class="reference-link" href="#Shelton--2018">Shelton et al., 2018</a>). </span>
                              </p>
                              <p class="Body_Body-justify" lang="en-GB">In Asia, although climate change impacts on the Yangtze (H183) and Mekong river (H186) biodiversity hotspots have not been reported, they are subject to the range of human impacts of over-exploitation, pollution, water abstraction, altered flow regimes, habitat loss and spread of invasive species, which makes them more vulnerable to climate effects (<span class="condensed_italic" lang="">medium confidence</span>) (<a class="reference-link" href="#Dudgeon--2006">Dudgeon et al., 2006</a>). The release of water from shrinking glaciers in Asia to some extent protects downstream freshwaters against drought, but half of these glaciers are projected to disappear by 2100 (<span class="condensed_italic" lang="">medium confidence</span>) (<a class="reference-link" href="#Pritchard--2019">Pritchard, 2019</a>).</p>
                              <p class="Body_Body-justify" lang="en-GB">In Australia, the Murray-Darling river basin occupies much of the Eastern Rivers hotspot (H195) and climate-related drought exacerbated by water abstraction is projected to drive declines in freshwater birds, fish and invertebrates (<span class="condensed_italic" lang="">high confidence</span>) (<a class="reference-link" href="#Grafton--2013">Grafton et al., 2013</a>). However, a national scale analysis projected climate change to cause freshwater species range shifts, but no losses of species in this hotspot (<span class="condensed_italic" lang="">low confidence</span>) (<a class="reference-link" href="#James--2017">James et al., 2017</a>, WG2 Ch. 11).</p>
                            </div>
                          </div>
                        </div>
                      </div>
                      <div class="h2-container" id="CCP1.2.4">
                        <h2 class="Headings_H2-numbered" lang="de-DE">CCP1.2.4  Marine <span class="arrow-up"/><span class="arrow-down"/><span class="share-block"><img class="share-icon" src="../../share.png"/></span></h2>
                        <div class="h2-siblings" id="h2-4-siblings">
                          <p class="Body_Body-justify" lang="en-GB">
                            <span lang="en-US">The 43 hotspots in marine ecosystems cover 46,600,000 km</span>
                            <span class="superscript CharOverride-1" lang="en-US">2</span>
                            <span lang="en-US">, representing 9% of the ocean area (Table CCP1.1; Figure CCP1.2). They include coral reef ecosystems, kelp forests, seagrass meadows, polar and upwelling zones (Figures CCP1.1 3; CCP1.1 4). </span>
                          </p>
                          <div class="Figure" id="_idContainer034">
                            <p class="Body_Figures_Figure" lang="de-DE">
                              <img alt="" class="_idGenObjectAttribute-13" id="figure-ccp1-014" loading="lazy" src="https://ipcc.ch/report/ar6/wg2/downloads/figures/IPCC_AR6_WGII_Figure_CCP1_014.png"/>
                            </p>
                            <p class="Body_Figures_Figure_title" lang="en-US"><span class="figure_number" lang="">Figure CCP1.1 4 | </span><span class="bold_condensed-dark-blue" lang="">Species in island coral and rocky reef biodiversity hotspots. </span>Photos by Galice Hoarau (top four Sulawesi), and Mark Costello (other nine).</p>
                            <div class="ch-figure-button-cont"><a href="/report/ar6/wg2/figures/chapter-ccp1/figure-ccp1-014" target="_blank"><button class="btn-ipcc btn btn-primary ch-figure-button">Open figure</button></a> </div>
                          </div>
                          <div class="Figure" id="_idContainer032">
                            <p class="Body_Figures_Figure" lang="de-DE">
                              <img alt="" class="_idGenObjectAttribute-12" id="figure-ccp1-013" loading="lazy" src="https://ipcc.ch/report/ar6/wg2/downloads/figures/IPCC_AR6_WGII_Figure_CCP1_013.png"/>
                            </p>
                            <p class="Body_Figures_Figure_title" lang="en-US"><span class="figure_number" lang="">Figure CCP1.1 3 | </span><span class="bold_condensed-dark-blue" lang="">High-latitude marine biodiversity hotspots. </span>Northeast Atlantic temperate seagrass beds, soft-corals, and kelp forests in Norway (photos by Galice Hoarau). South African fynbos and Agulhas current and Antarctic Peninsula and Weddell Sea (photos by Denis Costello). In the Americas, the Humboldt Current Chile and Chesapeake Bay (photos by Mark Costello).</p>
                            <div class="ch-figure-button-cont"><a href="/report/ar6/wg2/figures/chapter-ccp1/figure-ccp1-013" target="_blank"><button class="btn-ipcc btn btn-primary ch-figure-button">Open figure</button></a> </div>
                          </div>
                          <div class="h3-container" id="CCP1.2.4.1">
                            <h3 class="Headings_H3" lang="de-DE">CCP1.2.4.1  Observed Impacts <span class="arrow-up"/><span class="arrow-down"/><span class="share-block"><img class="share-icon" src="../../share.png"/></span></h3>
                            <div class="h3-siblings" id="h3-8-siblings">
                              <p class="Body_Body-justify" lang="en-GB">Observed impacts attributable to climate change are strongly biased geographically, with most data from the temperate Northern Hemisphere, followed by subtropical to temperate Australia and few long-term data in the tropics (<a class="reference-link" href="#Poloczanska--2013">Poloczanska et al., 2013</a>; <a class="reference-link" href="#Poloczanska--2016">Poloczanska et al., 2016</a>). Marine heatwaves have increased over the past century, causing mass mortalities in the hotspots of the Mediterranean (H216), Great Barrier Reef (H236), western and southern Australia (H227, 228), northwest Atlantic (H207) and northeast Pacific (H197) (<span class="condensed_italic" lang="">high confidence</span>) (<a class="reference-link" href="#Hobday--2018">Hobday et al., 2018</a>; <a class="reference-link" href="#Oliver--2018">Oliver et al., 2018</a>). The shift of thousands of species from equatorial latitudes since the 1950s has been attributed to climate warming (<span class="condensed_italic" lang="">medium confidence</span>) (<a class="reference-link" href="#Chaudhary--2021">Chaudhary et al., 2021</a>).</p>
                              <p class="Body_Body-justify" lang="en-GB">Climate change-related hazards, particularly marine heat events, have caused widespread coral bleaching and mass mortalities as the time between consecutive bleaching events decreases (<span class="condensed_italic" lang="">high confidence</span>) (<a class="reference-link" href="#IPCC--2018">IPCC, 2018</a>; <a class="reference-link" href="#Bindoff--2019">Bindoff et al., 2019</a>; <a class="reference-link" href="#IPCC--2019b">IPCC, 2019b</a>). Coral reefs in some Indian Ocean hotspots (H230, 234) already exhibit net loss of coral reefs (<span class="condensed_italic" lang="">low confidence</span>) (<a class="reference-link" href="#Perry--2018">Perry et al., 2018</a>). While coral bleaching is a visible symptom of heat stress, warming has also induced restructuring of associated fish and invertebrate communities in the Great Barrier Reef (H236) (<span class="condensed_italic" lang="">medium confidence</span>) (<a class="reference-link" href="#Stuart-Smith--2018">Stuart-Smith et al., 2018</a>).</p>
                              <p class="Body_Body-justify" lang="en-GB">Although the number of coral species that are both exposed and vulnerable to climate hazards is greatest in the central Indo-Pacific, the proportion of corals at risk is greater in the lower diversity Caribbean hotspots (H209) (<span class="condensed_italic" lang="">medium confidence</span>) (<a class="reference-link" href="#Foden--2013">Foden et al., 2013</a>). Some reef corals are able to acclimate to heatwaves (<span class="condensed_italic" lang="">low confidence</span>) (<a class="reference-link" href="#DeCarlo--2019">DeCarlo et al., 2019</a>), and some have expanded their latitudinal ranges polewards (<span class="condensed_italic" lang="">high confidence</span>), up to 14 km yr <span class="superscript CharOverride-1" lang="">&#8211;1</span> in the northwest Pacific (<a class="reference-link" href="#Yamano--2011">Yamano et al., 2011</a>). Although future latitudinal expansions may be limited by winter light availability (<a class="reference-link" href="#Muir--2015">Muir et al., 2015</a>), new coral reefs are already emerging in Japan (<a class="reference-link" href="#Kumagai--2018">Kumagai et al., 2018</a>).</p>
                              <p class="Body_Body-justify" lang="en-GB">The Mediterranean Sea hotspot (H216) is negatively affected by climate change (<span class="condensed_italic" lang="">high confidence</span>) (Cross-Chapter Paper 4). Species entering via the Suez Canal from the Red Sea (H220) are facilitated by warming and lead to profound community changes (<span class="condensed_italic" lang="">high confidence</span>) (<a class="reference-link" href="#Yeruham--2015">Yeruham et al., 2015</a>; <a class="reference-link" href="#Rilov--2016">Rilov, 2016</a>; <a class="reference-link" href="#Vasilakopoulos--2017">Vasilakopoulos et al., 2017</a>; <a class="reference-link" href="#Givan--2018">Givan et al., 2018</a>; <a class="reference-link" href="#Bianchi--2019">Bianchi et al., 2019</a>). In contrast, the more open coastal seas of the Atlantic and Pacific coasts of North America have had increasing species richness since the 1970s (<a class="reference-link" href="#Batt--2017">Batt et al., 2017</a>).</p>
                              <p class="Body_Body-justify" lang="en-GB">Kelp forests are in decline in mid-latitudes due to warming and associated increased herbivory (<span class="condensed_italic" lang="">medium confidence</span>) (<a class="section-link" data-title="Kelp Ecosystems" href="/report/ar6/wg2/chapter/chapter-3#3.4.2.3">Section 3.4.2.3</a>, Chapter 11). South and southeastern (H228), and southwestern (H227) Australia have experienced a climate-related decline of kelp forests (<a class="reference-link" href="#Wernberg--2011">Wernberg et al., 2011</a>; <a class="reference-link" href="#Verg&#233;s--2016">Verg&#233;s et al., 2016</a>; <a class="reference-link" href="#Wernberg--2016">Wernberg et al., 2016</a>). West Australia (H227) has been affected by extreme climate events characterised by the replacement of kelp and sessile invertebrates by algal turfs and warm-water fish species (<a class="reference-link" href="#Wernberg--2013">Wernberg et al., 2013</a>; <a class="reference-link" href="#Wernberg--2016">Wernberg et al., 2016</a>). Australia&#8217;s Great Barrier Reef (H236), kelp forests, seagrass meadows and mangroves (due to drought), have suffered mortalities due to climate change (<span class="condensed_italic" lang="">medium confidence</span>) (<a class="reference-link" href="#Babcock--2019">Babcock et al., 2019</a>). Climate warming driven changes in seaweed assemblages have been reported not only in Australia, but in the marine biodiversity hotspots of Atlantic Canada, Japan, Mediterranean, New Zealand (<a class="reference-link" href="#Laffoley--2016">Laffoley and Baxter, 2016</a>; <a class="reference-link" href="#Thomsen--2019">Thomsen et al., 2019</a>; <a class="reference-link" href="#Thomsen--2019">Thomsen and South, 2019</a>) and California (H207, 231, 216, 238, 199) (<a class="reference-link" href="#Arafeh-Dalmau--2019">Arafeh-Dalmau et al., 2019</a>; <a class="reference-link" href="#McPherson--2021">McPherson et al., 2021</a>). However, while climate change is having measurable effects on kelp, the dominant effects on kelp projected to 2025 are fishing, through its effects on herbivores and predators (<span class="condensed_italic" lang="">medium confidence</span>) (<a class="reference-link" href="#Steneck--2002">Steneck et al., 2002</a>). Although fishing affected Atlantic cod in the Barents Sea (H214) and Gulf of Maine (H207) biodiversity hotspots, it was also affected by climate change, but negatively and positively, respectively (<a class="reference-link" href="#Kjesbu--2014">Kjesbu et al., 2014</a>; <a class="reference-link" href="#Pershing--2015">Pershing et al., 2015</a>).</p>
                              <p class="Body_Body-justify" lang="en-GB">Range expansions out of the Nansei Shoto (H231) hotspot south of Japan has led to the replacement of temperate kelp forests by tropical coral and herbivorous fishes on Japanese coasts (<a class="reference-link" href="#Kumagai--2018">Kumagai et al., 2018</a>). The Yellow Sea (H230) is one of the most exploited marine hotspots, with decreasing ecosystem services compounded by climate change but there is <span class="condensed_italic" lang="">low confidence</span> for climate change contributing substantially to ecological degradation (<a class="reference-link" href="#Wang--2016">Wang et al., 2016</a>; <a class="reference-link" href="#Song--2019">Song and Duan, 2019</a>).</p>
                              <p class="Body_Body-justify" lang="en-GB">Upwelling systems are best known for bringing nutrients to the surface. These stimulate phytoplankton blooms, which in turn support important fisheries (<a class="section-link" data-title="Warm-Water Coral Reefs" href="/report/ar6/wg2/chapter/chapter-3#3.4.2.1">Section 3.4.2.1</a> 1). However, this deep water also tends to be low in oxygen, which can be further depleted by respiration and surface warming. Prolonged marine heatwaves in the Californian Current hotspot (H197) drove major shifts in the geographic range of birds, mammals, fish, crustaceans, molluscs and other species, and toxic algal blooms (<a class="reference-link" href="#Sanford--2019">Sanford et al., 2019</a>).</p>
                              <p class="Body_Body-justify" lang="en-GB">In both the Antarctic (H213) and Arctic (H196, 214), the loss of ice impacts on the behaviour and foraging ability of marine mammals and birds (<a class="reference-link" href="#Doney--2012">Doney et al., 2012</a>). The retreat of sea ice in the Bering Sea (H196) hotspot has been followed by a reorganisation of the seabed and fish communities, a northward shift in species, and greater species&#8217; biomass and richness (<a class="reference-link" href="#Mueter--2008">Mueter and Litzow, 2008</a>; <a class="reference-link" href="#Grebmeier--2018">Grebmeier et al., 2018</a>). In the Eurasian Arctic (H214), species richness has similarly been increasing (<a class="reference-link" href="#W&#281;s&#322;awski--2011">W&#281;s&#322;awski et al., 2011</a>; <a class="reference-link" href="#Kortsch--2012">Kortsch et al., 2012</a>; <a class="reference-link" href="#Certain--2015">Certain and Planque, 2015</a>; <a class="reference-link" href="#Fossheim--2015">Fossheim et al., 2015</a>; <a class="reference-link" href="#W&#281;s&#322;awski--2018">W&#281;s&#322;awski et al., 2018</a>), as has phytoplankton productivity (<a class="reference-link" href="#Arrigo--2008">Arrigo et al., 2008</a>). The distribution of krill has already contracted with ocean warming in the Southern Ocean (<span class="condensed_italic" lang="">medium confidence</span>) (<a class="reference-link" href="#Cox--2018">Cox et al., 2018</a>; <a class="reference-link" href="#Atkinson--2019">Atkinson et al., 2019</a>).</p>
                            </div>
                          </div>
                          <div class="h3-container" id="CCP1.2.4.2">
                            <h3 class="Headings_H3" lang="de-DE">CCP1.2.4.2  Projected Impacts <span class="arrow-up"/><span class="arrow-down"/><span class="share-block"><img class="share-icon" src="../../share.png"/></span></h3>
                            <div class="h3-siblings" id="h3-9-siblings">
                              <p class="Body_Body-justify" lang="en-GB">Tropical extirpations, already underway (<a class="section-link" data-title="Different Entry Points for Understanding Climate Change Impacts, Adaptation and Vulnerability" href="/report/ar6/wg2/chapter/chapter-1#1.2">Section 1.2.4.1</a>), are projected to reduce hotspot diversity especially in the Coral Triangle (H226, 232, 234), Maldives (H224) and, to a lesser extent, in the Caribbean (H200, H210) (<a class="reference-link" href="#Jones--2015">Jones and Cheung, 2015</a>; <a class="reference-link" href="#Garc&#237;a Molinos--2016">Garc&#237;a Molinos et al., 2016</a>) and Persian Gulf (H219) (<a class="reference-link" href="#Wabnitz--2018">Wabnitz et al., 2018</a>). Paleo evidence supports projections of tropical biodiversity loss under high global warming (<span class="condensed_italic" lang="">high confidence</span>) (<a class="reference-link" href="#Kiessling--2012">Kiessling et al., 2012</a>; <a class="reference-link" href="#Yasuhara--2020">Yasuhara et al., 2020</a>).</p>
                              <p class="Body_Body-justify" lang="en-GB">Warm-water coral reefs are expected to decline with 1.5&#176;C warming <span class="condensed_italic" lang=""> (very high confidence</span>) (<a class="reference-link" href="#King--2017">King et al., 2017</a>; <a class="reference-link" href="#Bindoff--2019">Bindoff et al., 2019</a>) leading to systems with reduced biodiversity and structural complexity (<span class="condensed_italic" lang="">high confidence</span>) (Chapters 3; 11; Box 11.2). In the Coral Triangle, marine heatwaves are projected to have the same effect as an added mean annual 0.5&#176;C sea surface temperature increase (<a class="reference-link" href="#McManus--2020">McManus et al., 2020</a>). While some corals are expected to survive in deep &#8216;mesophotic&#8217; reefs (<a class="reference-link" href="#Laverick--2019">Laverick and Rogers, 2019</a>), the shallow coral reefs of today will not last the century if climate warming continues without mitigation (<span class="condensed_italic" lang="">high confidence</span>) (<a class="reference-link" href="#Hughes--2018a">Hughes et al., 2018a</a>; <a class="reference-link" href="#Hughes--2018b">Hughes et al., 2018b</a>; <a class="reference-link" href="#IPCC--2018">IPCC, 2018</a>; <a class="reference-link" href="#Bindoff--2019">Bindoff et al., 2019</a>; <a class="reference-link" href="#Hughes--2019b">Hughes et al., 2019b</a>).</p>
                              <p class="Body_Body-justify" lang="en-GB">In the Mediterranean, ocean acidification has been projected to lead to increases of fleshy algae at the expense of calcifying algae (<a class="reference-link" href="#Zunino--2017">Zunino et al., 2017</a>). However, seagrass has been projected to decline (<a class="reference-link" href="#Chefaoui--2018">Chefaoui et al., 2018</a>) and increase (<a class="reference-link" href="#Zunino--2017">Zunino et al., 2017</a>) in the Mediterranean Sea hotspot (H216). Kelp forests are expected to decline in the northwest Atlantic (Grand Banks, H207), whereas gains and losses are projected to be approximately balanced in the Northeast Atlantic Shelf (H215) under Representative Concentration Pathway (RCP) 8.5 (<a class="reference-link" href="#Assis--2018">Assis et al., 2018</a>; <a class="reference-link" href="#Wilson--2019">Wilson et al., 2019</a>), but may lead to impoverished benthic assemblages (<a class="reference-link" href="#Teagle--2018">Teagle and Smale, 2018</a>).</p>
                              <p class="Body_Body-justify ParaOverride-3" lang="en-GB">Projected climate caused changes in biodiversity in coastal upwelling regions are uncertain. While productivity in the California Current (H197) system is projected to increase with future climate change, nonlinear plankton responses and uncertain interactions with food web dynamics hinder predictions of ecosystem responses (<a class="reference-link" href="#Xiu--2018">Xiu et al., 2018</a>). In addition, this hotspot is projected to suffer from ocean acidification by 2050 (<a class="reference-link" href="#Gruber--2012">Gruber et al., 2012</a>).</p>
                              <p class="Body_Body-justify" lang="en-GB">Around Antarctica (H213), almost half of all species are endemic (<a class="reference-link" href="#Costello--2010">Costello et al., 2010</a>), and warming during this century is projected to cause a reduction in suitable thermal environment for 79% of its species (RCP8.5) (<span class="condensed_italic" lang="">low confidence</span>) (<a class="reference-link" href="#Basher--2016">Basher and Costello, 2016</a>; <a class="reference-link" href="#Griffiths--2017">Griffiths et al., 2017</a>). The previously mentioned declines in Southern Ocean krill due to climate change contribute to projected declines in baleen whales there (<a class="reference-link" href="#Tulloch--2019">Tulloch et al., 2019</a>).</p>
                              <p class="Body_Body-justify" lang="en-GB">Species richness in the northern polar hotspots is expected to increase substantially (<span class="condensed_italic" lang="">high confidence</span>) (<a class="reference-link" href="#Cheung--2015">Cheung et al., 2015</a>). However, population sizes of presently occurring native species are expected to decline, especially in the Barents Sea (H214) (<a class="reference-link" href="#Koenigstein--2018">Koenigstein et al., 2018</a>). Ocean acidification is projected to continue globally, and while its impact is uncertain and projected to be less than the effect of warming, it may lead to changes in marine food webs due to varying effects on marine species (<a class="reference-link" href="#Terhaar--2020">Terhaar et al., 2020</a>). Hotspots in temperate latitudes are projected to have assemblages modified by immigration from the tropics and emigration to polar waters. Where land barriers and other geographical limits to range shifts occur, limited dispersal and habitat fragmentation may also limit the capacity of some species to track climate velocities, such as in the Baltic Sea (H215) (<a class="reference-link" href="#Jonsson--2018">Jonsson et al., 2018</a>), Mediterranean Sea (H216) (<a class="reference-link" href="#Burrows--2014">Burrows et al., 2014</a>; <a class="reference-link" href="#Arafeh-Dalmau--2021">Arafeh-Dalmau et al., 2021</a>) and Antarctica (H213) (<span class="condensed_italic" lang="">medium confidence</span>) (<a class="reference-link" href="#Cristofari--2018">Cristofari et al., 2018</a>).</p>
                            </div>
                          </div>
                        </div>
                      </div>
                    </div>
                    <div class="h1-container" id="CCP1.3">
                      <h1 class="Headings_H1-numbered" lang="en-GB">CCP1.3  Adaptation and Solutions <span class="share-block"><img class="share-icon" src="../../share.png"/></span><button class="btn-ipcc btn btn-primary chapter-expand">Expand section</button></h1>
                      <div class="h1-siblings" id="h1-4-siblings">
                        <p class="Body_Body-justify" lang="en-GB">Terrestrial, freshwater and coastal marine ecosystems are impacted by the 3 billion people that currently live in in biodiversity hotspots (Guti&#233;rrez et al., 2021). At the same time, biodiversity in hotspots supports the livelihoods of the local communities. The suite of adaptation options for biodiversity are as applicable inside as outside hotspots (Table CCP1.2). Many of these hotspots are now faced with widespread fragmentation and habitat degradation (<span class="condensed_italic" lang="">high confidence</span>) (Table SMCCP1.1).</p>
                        <p class="Body_Body-justify" lang="en-GB">Because projected changes in biodiversity increase disproportionately with warming, climate change mitigation is the primary action to conserve biodiversity within hotspots. If global warming is kept within the 1.5&#176;C limit of the Paris Agreement, just ~4% of endemic species in biodiversity hotspots would be threatened with extinction from climate change. However, at the current commitments there is projected to be ~3&#176;C warming by 2100 and ~20% and ~32% for terrestrial and marine species, respectively, fall into the category of very high extinction risk (Figure CCP1.6; <a class="reference-link" href="#Manes--2021">Manes et al., 2021</a>).</p>
                        <p class="Body_Body-justify" lang="en-GB">Although mitigation can sharply reduce extinction risk associated with climate change (<span class="condensed_italic" lang="">high confidence</span>), it cannot reduce all of the risk, nor the risk associated with other drivers that can have a compound effect with climate change. Thus, in addition to mitigation, the literature consistently calls for reducing current non-climate impacts (e.g., habitat conversion, over-exploitation, hunting, fishing, wildfire, pollution, human-introduced invasive species) in order to increase biodiversity resilience to climate change (<span class="condensed_italic" lang="">very high confidence</span>) (Table CCP1.2; e.g., <a class="reference-link" href="#Mantyka-Pringle--2015">Mantyka-Pringle et al., 2015</a>; <a class="reference-link" href="#Warren--2018a">Warren et al., 2018a</a>; <a class="reference-link" href="#Costello--2021">Costello, 2021</a>). The main strategies to increase resilience rely on the combination of well-planned protected areas, restoration of degraded areas and the sustainable use of biodiversity (<span class="condensed_italic" lang="">high confidence</span>) (<a class="reference-link" href="#IPCC--2019a">IPCC, 2019a</a>; <a class="reference-link" href="#P&#246;rtner--2021">P&#246;rtner et al., 2021</a>) . On land, creating corridors for species is key for facilitating species movements (<span class="condensed_italic" lang="">high confidence</span>) (<a class="reference-link" href="#McGuire--2016">McGuire et al., 2016</a>; <a class="reference-link" href="#Heikkinen--2020">Heikkinen et al., 2020</a>; <a class="reference-link" href="#P&#246;rtner--2021">P&#246;rtner et al., 2021</a>). Habitat protection has numerous co-benefits, including potential climate mitigation through carbon storage and sequestration, in addition to climatic regulation (<a class="reference-link" href="#Alkama--2016">Alkama and Cescatti, 2016</a>; <a class="reference-link" href="#Mackey--2020">Mackey et al., 2020</a>) and pandemic prevention (<a class="reference-link" href="#Allen--2017">Allen et al., 2017</a>; <a class="reference-link" href="#Dobson--2020">Dobson et al., 2020</a>, Cross-Chapter Box COVID-19 in Chapter 7).</p>
                        <p class="Body_Body-justify" lang="en-GB">Active relocation of endangered species to areas where they may be safer from predation and human impacts, as already practised for a few charismatic fauna, is expensive and fraught with complex regulations and concerns over impacts on native species (<a class="reference-link" href="#Brodie--2021">Brodie et al., 2021</a>). Therefore, managed relocation of species threatened by climate change is questionable for most species.</p>
                        <p class="Body_Body-justify" lang="en-GB">Healthier marine ecosystems are more resilient to additional stressors, such as storms and climate change (<span class="condensed_italic" lang="">high confidence</span>) (<a class="reference-link" href="#Isbell--2015">Isbell et al., 2015</a>; <a class="reference-link" href="#Duffy--2016">Duffy et al., 2016</a>; <a class="reference-link" href="#Roberts--2017">Roberts et al., 2017</a>; <a class="reference-link" href="#Bates--2019">Bates et al., 2019</a>; <a class="reference-link" href="#Mariani--2020">Mariani et al., 2020</a>; <a class="reference-link" href="#Costello--2021">Costello, 2021</a>; <a class="reference-link" href="#Donovan--2021">Donovan et al., 2021</a>). Extinction risk is lower when populations are larger and more genetically diverse, individuals are larger and older, and seabed habitats (e.g., coral, kelp, seagrass) are flourishing, as occurs in marine reserves (<span class="condensed_italic" lang="">high confidence</span>) (<a class="reference-link" href="#Costello--2014">Costello, 2014</a>; <a class="reference-link" href="#Roberts--2017">Roberts et al., 2017</a>; <a class="reference-link" href="#Bates--2019">Bates et al., 2019</a>; <a class="reference-link" href="#Costello--2021">Costello, 2021</a>). Similarly, global fish biomass may be less affected by climate change if biodiversity is greater (<a class="reference-link" href="#Duffy--2016">Duffy et al., 2016</a>). Thus, a network of reserves representative of global biodiversity, helps attenuate the effects of climate change (<span class="condensed_italic" lang="">medium confidence</span>), for example, by having more abundant fish and top predator populations (<a class="reference-link" href="#Roberts--2017">Roberts et al., 2017</a>; <a class="reference-link" href="#Beyer--2018">Beyer et al., 2018</a>; <a class="reference-link" href="#Carter--2020">Carter et al., 2020</a>; <a class="reference-link" href="#Sala--2021">Sala et al., 2021</a>). However, the impacts of marine heatwaves on corals across marine reserves illustrates that enhanced resilience is not enough to protect against extreme and future climate change conditions (<span class="condensed_italic" lang="">high confidence</span>) (<a class="reference-link" href="#Bruno--2018">Bruno et al., 2018</a>; <a class="reference-link" href="#Hughes--2018a">Hughes et al., 2018a</a>; <a class="reference-link" href="#Kleypas--2021">Kleypas et al., 2021</a>).</p>
                        <p class="Body_Body-justify" lang="en-GB">Mangroves occupy the interface of terrestrial, freshwater and marine environments, dominate in eight hotspots (Table CCP1.1) and are connected to or integral habitats within one-third of all terrestrial and freshwater, and two-thirds of marine, hotspots (Figures CCP1.1; CCP1.2). A global analysis of sediment cores from mangroves indicated that mangroves can accrete sediment at levels of sea level rise projected under low emission scenarios, but may decline at their seaward edge under high emission scenarios (<a class="reference-link" href="#Saintilan--2020">Saintilan et al., 2020</a>, Chapter 3.4.2, Cross-Chapter Box Sea-level rise). However, even if this seaward erosion occurs, the expansion of mangroves inland due to sea level rise will increase carbon sequestration, because they capture carbon from seawater and freshwater runoff, in addition to photosynthesis, into their underlying sediments. If coastal management permits the expansion of mangroves inland with rising sea level, this will increase carbon sequestration because mangroves capture and preserve more carbon in their sediments than other terrestrial and marine forests and biomes (<span class="condensed_italic" lang="">high confidence</span>) (Table CCP1.2; <a class="reference-link" href="#Alongi--2020">Alongi, 2020</a>; <a class="reference-link" href="#Goldstein--2020">Goldstein et al., 2020</a>; <a class="reference-link" href="#Lovelock--2020">Lovelock and Reef, 2020</a>; <a class="reference-link" href="#Saintilan--2020">Saintilan et al., 2020</a>).</p>
                        <p class="Body_Body-justify" lang="en-GB">On land, fragmentation and habitat degradation are particularly pervasive, imposing hard limits to adaptation of terrestrial and freshwater ecosystems (<a class="reference-link" href="#Ibisch--2016">Ibisch et al., 2016</a>; <a class="reference-link" href="#Lenoir--2020">Lenoir et al., 2020</a>; <a class="reference-link" href="#Mechler--2020">Mechler et al., 2020</a>). Thus, the protection of existing natural habitats coupled with the restoration of the surrounding non-protected habitat can increase the effectiveness of adaptation strategies in terrestrial and freshwater hotspots (<span class="condensed_italic" lang="">very high confidence</span>) (Table CCP1.2; <a class="reference-link" href="#IPCC--2019a">IPCC, 2019a</a>; <a class="reference-link" href="#Jung--2021">Jung et al., 2021</a>). Additionally, strategic allocation of new protected areas within gaps across elevational and climatic gradients could enhance biodiversity conservation across hotspots. This would align with Target 3 of the Convention on Biological Diversity&#8217;s post-2020 draft Global Biodiversity Framework, and could include underrepresented climate and elevation spaces as well as potential climate refugia currently not under protection (<a class="reference-link" href="#P&#246;rtner--2021">P&#246;rtner et al., 2021</a>). In terrestrial ecosystems, restoration initiatives can help sustain biodiversity, improve resilience in a changing climate, and avoid maladaptation by selecting appropriate native species to be planted (Cross-Chapter Box Bioeconomy in Chapter 5; (<a class="reference-link" href="#Gann--2019">Gann et al., 2019</a>). In freshwater ecosystems, conservation needs catchment level management of human activities (<a class="reference-link" href="#Saunders--2002">Saunders et al., 2002</a>; <a class="reference-link" href="#Dudgeon--2006">Dudgeon et al., 2006</a>), especially as 37% of the terrestrial biodiversity hotspots overlap with freshwater (Figure CCP1.2) and 23% border marine hotspots (<a class="reference-link" href="#Olson--2002">Olson and Dinerstein, 2002</a>).</p>
                        <p class="Body_Body-justify" lang="en-GB">Protecting biodiversity hotspots is a pragmatic way to conserve biodiversity that is representative of a substantive fraction of genetic and species diversity on Earth (<a class="reference-link" href="#Mittermeier--2011">Mittermeier et al., 2011</a>) while achieving co-benefits (<a class="reference-link" href="#Bonan--2016">Bonan, 2016</a>; <a class="reference-link" href="#Sala--2021">Sala et al., 2021</a>). Protecting hotspots also helps protect important ecosystem services. In a global ranking of areas that combine biodiversity conservation while maximising carbon retention and water quality regulation, for example, the terrestrial and freshwater hotspots assessed here ranked high (41st and 34th on average, respectively, on a scale of 100) (<a class="reference-link" href="#Jung--2021">Jung et al., 2021</a>). The solutions needed to reverse biodiversity decline are well known and articulated in numerous international agreements and goals, such as the Convention of Biological Diversity the United Nations&#8217; Sustainable Development Goals, the Nationally Determined Contributions under the Paris Agreement, the International Union for Nature Conservation&#8217;s Bonn Restoration Challenge and the Ramsar Convention on Wetland Conservation. Thus, expanding and enhancing protection of a worldwide network of fully protected areas and protection and restoration of non-protected areas representative of the biodiversity hotspots, including marine, freshwater and terrestrial environments, is a highly recommended adaptation strategy to increase resilience of biodiversity to climate change (<a class="reference-link" href="#Brito-Morales--2018">Brito-Morales et al., 2018</a>). However, adaptation strategies alone cannot protect biodiversity from climate impacts without complementary and concomitant reduction of greenhouse gas emissions.</p>
                        <p class="Body_Tables_Table_title" lang="en-US"><span class="table_number" lang="">Table CCP1.2  | </span>Examples of adaptation actions that benefit the conservation of biodiversity and climate change mitigation.</p>
