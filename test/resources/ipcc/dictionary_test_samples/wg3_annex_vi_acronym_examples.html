<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style type="text/css">
    [role="term"] { font-weight: bold; }
    [role="definition"] { font-weight: normal; }
    [role="abbreviation"] { font-weight: normal; font-size: 0.9em; color: #666; }
  </style>
</head>
<body>
  <div class="glossary" data-report="wg3" data-annex="vi" data-annex-type="acronyms">
    <!-- Example 1: Simple acronym where definition starts with full term -->
    <div class="entry" id="wg3-annex-vi-acronyms-entry-aum">
      <div role="term"><span class="role-term">AUM</span></div>
      <div role="definition"><span class="role-definition">assets under management</span></div>
    </div>
    
    <!-- Example 2: Acronym with full term and additional info -->
    <div class="entry" id="wg3-annex-vi-acronyms-entry-ipcc">
      <div role="term"><span class="role-term">IPCC</span></div>
      <div role="definition"><span class="role-definition">Intergovernmental Panel on Climate Change</span></div>
    </div>
    
    <!-- Example 3: Acronym with full term and extended definition -->
    <div class="entry" id="wg3-annex-vi-acronyms-entry-ndc">
      <div role="term"><span class="role-term">NDC</span></div>
      <div role="definition"><span class="role-definition">Nationally Determined Contribution. A climate action plan submitted by parties to the Paris Agreement.</span></div>
    </div>
    
    <!-- Example 4: Acronym with full term and comma-separated additional info -->
    <div class="entry" id="wg3-annex-vi-acronyms-entry-ghg">
      <div role="term"><span class="role-term">GHG</span></div>
      <div role="definition"><span class="role-definition">greenhouse gas, including carbon dioxide, methane, and nitrous oxide</span></div>
    </div>
    
    <!-- Example 5: Acronym with full term in parentheses pattern -->
    <div class="entry" id="wg3-annex-vi-acronyms-entry-ar6">
      <div role="term"><span class="role-term">AR6</span></div>
      <div role="definition"><span class="role-definition">Sixth Assessment Report (of the IPCC)</span></div>
    </div>
  </div>
